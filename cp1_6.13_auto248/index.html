<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <meta name="description" content="引力·星墟 - 3D交互粒子星系可视化" />
  <title>引力·星墟</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      min-width: 1024px;
      min-height: 768px;
      overflow: hidden;
      cursor: none;
    }

    body {
      background: linear-gradient(180deg, #0a0b16 0%, #0f172a 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #app {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #crosshair {
      position: fixed;
      pointer-events: none;
      width: 20px;
      height: 20px;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 100;
    }

    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    }

    #crosshair::before {
      left: 50%;
      top: 0;
      width: 1px;
      height: 100%;
      transform: translateX(-50%);
    }

    #crosshair::after {
      top: 50%;
      left: 0;
      width: 100%;
      height: 1px;
      transform: translateY(-50%);
    }

    #crosshair.visible {
      opacity: 1;
    }

    #crosshair::before,
    #crosshair::after {
      border-radius: 1px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="crosshair"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
