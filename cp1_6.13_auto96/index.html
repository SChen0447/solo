<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星云调色盘·粒子交响</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
    }
    #loading-dot {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 4px;
      height: 4px;
      background: #ffffff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      animation: dotExpand 2s ease-out forwards;
      pointer-events: none;
      z-index: 100;
    }
    @keyframes dotExpand {
      0% { width: 4px; height: 4px; opacity: 1; }
      60% { width: 4px; height: 4px; opacity: 1; }
      100% { width: 400px; height: 400px; opacity: 0; }
    }
    #title {
      position: fixed;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 6px;
      pointer-events: none;
      z-index: 10;
      opacity: 0;
      animation: fadeInTitle 1s ease-out 2s forwards;
    }
    @keyframes fadeInTitle {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    #color-palette {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(40, 40, 40, 0.5);
      z-index: 10;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    #color-palette:hover {
      width: 80px;
      height: 80px;
      background: rgba(40, 40, 40, 1);
      bottom: 20px;
      right: 20px;
    }
    #color-palette .color-swatch {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      cursor: pointer;
      transition: box-shadow 0.5s ease;
    }
    #color-palette .color-swatch.active {
      box-shadow: 0 0 6px 2px #ffffff;
    }
  </style>
</head>
<body>
  <div id="loading-dot"></div>
  <div id="title">星云调色盘</div>
  <div id="color-palette"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
