<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>引力沙盒 - 群星模拟</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }
    #controls {
      position: absolute;
      top: 0;
      right: 0;
      width: 220px;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    #controls.active {
      pointer-events: auto;
    }
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.6s ease-out;
    }
    #loading.fade {
      opacity: 0;
      pointer-events: none;
    }
    .loader-ring {
      width: 80px;
      height: 80px;
      border: 3px solid transparent;
      border-top-color: #6b8fff;
      border-right-color: #4a6fff;
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
      position: relative;
    }
    .loader-ring::after {
      content: '';
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      bottom: 8px;
      border: 2px solid transparent;
      border-top-color: #9b59ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite reverse;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @media (max-width: 768px) {
      #controls {
        top: auto;
        bottom: 0;
        right: 0;
        left: 0;
        width: 100%;
        height: 60px;
      }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loader-ring"></div>
  </div>
  <div id="app">
    <canvas id="canvas"></canvas>
    <div id="controls"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
