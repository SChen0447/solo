<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CYBER BEAT RUN</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      user-select: none;
    }
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    #ui-overlay.interactive {
      pointer-events: auto;
    }
    .screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      pointer-events: auto;
      background: rgba(10, 10, 26, 0.85);
      backdrop-filter: blur(8px);
    }
    .screen.active {
      display: flex;
    }
    .game-title {
      font-size: clamp(2rem, 8vw, 5rem);
      font-weight: 900;
      letter-spacing: 0.1em;
      background: linear-gradient(90deg, #00ffff, #ff00ff, #ffff00);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 40px rgba(0, 255, 255, 0.5);
      margin-bottom: 1rem;
      animation: titleGlow 2s ease-in-out infinite;
    }
    @keyframes titleGlow {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.4)); }
      50% { filter: drop-shadow(0 0 40px rgba(255, 0, 255, 0.6)); }
    }
    .game-subtitle {
      color: #8888aa;
      font-size: clamp(0.9rem, 2vw, 1.2rem);
      letter-spacing: 0.3em;
      margin-bottom: 3rem;
    }
    .instructions {
      display: flex;
      gap: 2rem;
      margin-bottom: 3rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .instruction-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }
    .key-icon {
      width: 70px;
      height: 50px;
      border: 2px solid #00ffff;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #00ffff;
      font-weight: bold;
      font-size: 0.9rem;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.3), inset 0 0 10px rgba(0, 255, 255, 0.1);
      background: rgba(0, 255, 255, 0.05);
    }
    .key-label {
      color: #aaaacc;
      font-size: 0.85rem;
    }
    .btn {
      padding: 1rem 3rem;
      font-size: 1.1rem;
      font-weight: bold;
      letter-spacing: 0.2em;
      color: #00ffff;
      background: transparent;
      border: 2px solid #00ffff;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.3), inset 0 0 10px rgba(0, 255, 255, 0.05);
      text-transform: uppercase;
    }
    .btn:hover {
      background: rgba(0, 255, 255, 0.1);
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.6), inset 0 0 20px rgba(0, 255, 255, 0.1);
      transform: scale(1.05);
    }
    .btn.pink {
      color: #ff00ff;
      border-color: #ff00ff;
      box-shadow: 0 0 20px rgba(255, 0, 255, 0.3), inset 0 0 10px rgba(255, 0, 255, 0.05);
    }
    .btn.pink:hover {
      background: rgba(255, 0, 255, 0.1);
      box-shadow: 0 0 40px rgba(255, 0, 255, 0.6), inset 0 0 20px rgba(255, 0, 255, 0.1);
    }
    .stats-panel {
      background: rgba(20, 10, 40, 0.9);
      border: 1px solid rgba(255, 215, 0, 0.4);
      border-radius: 12px;
      padding: 2.5rem 3rem;
      box-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
      text-align: center;
      margin-bottom: 2rem;
      min-width: 300px;
    }
    .stats-title {
      font-size: 1.8rem;
      color: #ffd700;
      margin-bottom: 1.5rem;
      letter-spacing: 0.15em;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    }
    .stats-score {
      font-size: 3.5rem;
      font-weight: 900;
      color: #00ffff;
      margin-bottom: 1.5rem;
      text-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
      font-variant-numeric: tabular-nums;
    }
    .stats-row {
      display: flex;
      justify-content: space-between;
      padding: 0.6rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .stats-row:last-of-type {
      border-bottom: none;
    }
    .stats-label {
      color: #8888aa;
      font-size: 0.95rem;
    }
    .stats-value {
      font-weight: bold;
      font-variant-numeric: tabular-nums;
    }
    .stats-value.perfect { color: #ffd700; }
    .stats-value.good { color: #c0c0c0; }
    .stats-value.miss { color: #ff4060; }
    .stats-value.combo { color: #ff00ff; }

    .mobile-controls {
      position: absolute;
      bottom: 20px;
      left: 0;
      width: 100%;
      display: none;
      justify-content: space-between;
      padding: 0 30px;
      pointer-events: auto;
    }
    .mobile-controls.visible {
      display: flex;
    }
    .mobile-btn {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: bold;
      letter-spacing: 0.1em;
      color: #00ffff;
      background: rgba(0, 255, 255, 0.1);
      border: 2px solid rgba(0, 255, 255, 0.5);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
      touch-action: none;
    }
    .mobile-btn.slide {
      color: #ff00ff;
      background: rgba(255, 0, 255, 0.1);
      border-color: rgba(255, 0, 255, 0.5);
      box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
    }
    .mobile-btn:active {
      transform: scale(0.95);
      opacity: 0.8;
    }
    @media (max-width: 768px) {
      .stats-panel {
        padding: 1.5rem 2rem;
        min-width: 260px;
      }
      .stats-score {
        font-size: 2.5rem;
      }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="ui-overlay">
      <div id="menu-screen" class="screen active">
        <h1 class="game-title">CYBER BEAT RUN</h1>
        <p class="game-subtitle">赛博节拍跑酷</p>
        <div class="instructions">
          <div class="instruction-item">
            <div class="key-icon">SPACE</div>
            <span class="key-label">跳跃</span>
          </div>
          <div class="instruction-item">
            <div class="key-icon">SHIFT</div>
            <span class="key-label">滑铲</span>
          </div>
        </div>
        <button id="start-btn" class="btn">开始游戏</button>
      </div>
      <div id="gameover-screen" class="screen">
        <div class="stats-panel">
          <div class="stats-title">GAME OVER</div>
          <div class="stats-score" id="final-score">0</div>
          <div class="stats-row">
            <span class="stats-label">Perfect</span>
            <span class="stats-value perfect" id="final-perfect">0</span>
          </div>
          <div class="stats-row">
            <span class="stats-label">Good</span>
            <span class="stats-value good" id="final-good">0</span>
          </div>
          <div class="stats-row">
            <span class="stats-label">Miss</span>
            <span class="stats-value miss" id="final-miss">0</span>
          </div>
          <div class="stats-row">
            <span class="stats-label">最高连击</span>
            <span class="stats-value combo" id="final-combo">0</span>
          </div>
        </div>
        <button id="restart-btn" class="btn pink">再来一局</button>
      </div>
      <div id="mobile-controls" class="mobile-controls">
        <div id="btn-jump" class="mobile-btn">JUMP</div>
        <div id="btn-slide" class="mobile-btn slide">SLIDE</div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
