<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D水晶矿脉生成与切面观察</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: radial-gradient(ellipse at center, #1a0f0a 0%, #000000 100%);
      color: #e0e0e0;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }

    .control-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 260px;
      background: rgba(26, 26, 46, 0.85);
      border-radius: 8px;
      padding: 18px;
      backdrop-filter: blur(10px);
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.5), 0 4px 20px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      user-select: none;
      z-index: 100;
    }

    .panel-title {
      font-size: 14px;
      font-weight: 600;
      color: #c9b8ff;
      margin-bottom: 14px;
      letter-spacing: 0.5px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .panel-section {
      margin-bottom: 14px;
    }

    .panel-label {
      font-size: 12px;
      color: #a0a0b8;
      margin-bottom: 6px;
      display: block;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      background: rgba(138, 43, 226, 0.2);
      border: 1px solid rgba(138, 43, 226, 0.4);
      color: #d0c0ff;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease-out;
      text-align: center;
    }

    .btn:hover {
      background: rgba(138, 43, 226, 0.35);
      transform: scale(1.02);
      border-color: rgba(138, 43, 226, 0.7);
    }

    .btn:active {
      transform: scale(0.98);
      background: rgba(138, 43, 226, 0.5);
    }

    .btn.primary {
      background: linear-gradient(135deg, rgba(138, 43, 226, 0.4), rgba(80, 200, 120, 0.3));
      border-color: rgba(138, 43, 226, 0.5);
    }

    .slider-container {
      width: 100%;
    }

    input[type="range"] {
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: linear-gradient(135deg, #8a2be2, #50c878);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(138, 43, 226, 0.6);
      transition: transform 0.2s ease-out;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: linear-gradient(135deg, #8a2be2, #50c878);
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 8px rgba(138, 43, 226, 0.6);
    }

    .slider-value {
      float: right;
      font-size: 12px;
      color: #8a2be2;
      font-weight: 600;
    }

    select {
      width: 100%;
      padding: 7px 10px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 12px;
      cursor: pointer;
      outline: none;
      transition: all 0.2s ease-out;
    }

    select:hover {
      border-color: rgba(138, 43, 226, 0.5);
      background: rgba(255, 255, 255, 0.1);
    }

    select:focus {
      border-color: #8a2be2;
      box-shadow: 0 0 0 2px rgba(138, 43, 226, 0.2);
    }

    select option {
      background: #1a1a2e;
      color: #e0e0e0;
    }

    .info-popup {
      position: absolute;
      background: rgba(45, 27, 78, 0.92);
      border: 1px solid rgba(138, 43, 226, 0.4);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 12px;
      pointer-events: none;
      z-index: 200;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(6px);
      opacity: 0;
      transform: scale(0.9);
      transition: opacity 0.2s ease-out, transform 0.2s ease-out;
      min-width: 160px;
    }

    .info-popup.visible {
      opacity: 1;
      transform: scale(1);
    }

    .info-popup .crystal-name {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
    }

    .info-popup .crystal-prop {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      color: #c0b0d8;
    }

    .info-popup .crystal-prop span:last-child {
      color: #e0d0ff;
      font-weight: 500;
    }

    .color-swatch {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 3px;
      margin-right: 6px;
      vertical-align: middle;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .status-bar {
      position: absolute;
      bottom: 12px;
      left: 16px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      z-index: 100;
    }

    .status-bar span {
      margin-right: 16px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div class="control-panel">
      <div class="panel-title">💎 水晶矿脉控制台</div>

      <div class="panel-section">
        <label class="panel-label">视角控制</label>
        <div class="btn-group">
          <button class="btn" id="btn-reset">重置视角</button>
          <button class="btn" id="btn-topview">切换俯视图</button>
          <button class="btn primary" id="btn-regenerate">🔄 重新生成矿脉</button>
        </div>
      </div>

      <div class="panel-section">
        <label class="panel-label">
          深度切片
          <span class="slider-value" id="depth-value">-1.0</span>
        </label>
        <div class="slider-container">
          <input type="range" id="depth-slider" min="-10" max="-1" step="0.5" value="-1" />
        </div>
      </div>

      <div class="panel-section">
        <label class="panel-label">颜色筛选</label>
        <select id="color-filter">
          <option value="all">全部晶体</option>
          <option value="amethyst">紫水晶</option>
          <option value="emerald">翡翠绿</option>
          <option value="iceBlue">冰蓝水晶</option>
        </select>
      </div>
    </div>

    <div class="info-popup" id="info-popup">
      <div class="crystal-name" id="popup-name">--</div>
      <div class="crystal-prop">
        <span>颜色：</span>
        <span id="popup-color"><span class="color-swatch" id="popup-swatch"></span><span id="popup-hex">--</span></span>
      </div>
      <div class="crystal-prop">
        <span>莫氏硬度：</span>
        <span id="popup-hardness">--</span>
      </div>
    </div>

    <div class="status-bar">
      <span>WASD: 移动</span>
      <span>鼠标拖拽: 旋转</span>
      <span>滚轮: 缩放</span>
      <span>点击晶体: 查看详情</span>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
