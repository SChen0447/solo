<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>色彩感知与色盲辅助测试</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      background: radial-gradient(ellipse at center, #0d1117 0%, #161b22 100%);
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #c9d1d9;
      overflow-x: hidden;
    }

    #app {
      width: 100%;
      min-height: 100vh;
      padding: 32px 24px;
    }

    .main-container {
      max-width: 1400px;
      margin: 0 auto;
      background: rgba(13, 17, 23, 0.7);
      border: 0.5px solid #30363d;
      border-radius: 16px;
      padding: 32px 40px;
      backdrop-filter: blur(8px);
    }

    .app-header {
      margin-bottom: 28px;
    }

    .app-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: #c9d1d9;
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }

    .title-divider {
      height: 2px;
      background: linear-gradient(90deg, #58a6ff 0%, #1f6feb 100%);
      border-radius: 1px;
      margin-bottom: 24px;
    }

    .app-content {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    .stats-panel {
      width: 280px;
      flex-shrink: 0;
      background: rgba(22, 27, 34, 0.9);
      border: 0.5px solid #30363d;
      border-radius: 12px;
      padding: 20px;
      transform: translateX(-12px);
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .stats-panel.visible {
      transform: translateX(0);
      opacity: 1;
    }

    .stats-title {
      font-size: 16px;
      font-weight: 600;
      color: #8b949e;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-item {
      margin-bottom: 20px;
    }

    .stat-label {
      font-size: 12px;
      color: #6e7681;
      margin-bottom: 6px;
    }

    .stat-value {
      font-family: 'Fira Code', monospace;
      font-size: 28px;
      color: #f0f6fc;
      font-weight: 600;
    }

    .history-list {
      margin-top: 20px;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 0.5px solid #21262d;
      font-size: 13px;
    }

    .history-item:last-child {
      border-bottom: none;
    }

    .history-acc {
      font-family: 'Fira Code', monospace;
      color: #3fb950;
    }

    .history-time {
      font-family: 'Fira Code', monospace;
      color: #d29922;
    }

    .main-area {
      flex: 1;
      min-width: 0;
    }

    .controls-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
      align-items: center;
    }

    .btn {
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      padding: 12px 24px;
      border-radius: 8px;
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 500;
    }

    .btn:hover {
      background: #30363d;
      border-color: #58a6ff;
      color: #f0f6fc;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn.primary {
      background: linear-gradient(135deg, #1f6feb 0%, #58a6ff 100%);
      border-color: #58a6ff;
      color: #ffffff;
    }

    .btn.primary:hover {
      background: linear-gradient(135deg, #388bfd 0%, #79c0ff 100%);
    }

    .filter-group {
      display: flex;
      gap: 8px;
    }

    .filter-btn.active {
      background: #1f6feb;
      border-color: #58a6ff;
      color: #ffffff;
    }

    .timer-display {
      font-family: 'Fira Code', monospace;
      font-size: 28px;
      color: #f0f6fc;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 8px 20px;
      min-width: 120px;
      text-align: center;
    }

    .timer-display.warning {
      color: #f85149;
      border-color: #f85149;
    }

    .matrix-wrapper {
      position: relative;
    }

    .color-matrix {
      display: grid;
      grid-template-columns: repeat(8, 100px);
      gap: 8px;
      justify-content: center;
      transition: filter 0.8s ease;
      position: relative;
    }

    .color-block {
      width: 100px;
      height: 100px;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      will-change: transform;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: visible;
    }

    .color-block:hover {
      transform: scale(1.1);
      z-index: 5;
    }

    .color-block:active {
      transform: scale(0.95);
    }

    .color-block.found {
      cursor: default;
      outline: 3px solid #3fb950;
      outline-offset: 2px;
    }

    .color-block.error {
      animation: flashError 0.3s ease;
    }

    @keyframes flashError {
      0%, 100% { box-shadow: none; }
      50% { box-shadow: 0 0 0 8px rgba(248, 81, 73, 0.6); }
    }

    .ripple {
      position: absolute;
      top: 50%;
      left: 50%;
      border-radius: 50%;
      background: rgba(88, 166, 255, 0.6);
      pointer-events: none;
      transform: translate(-50%, -50%);
      animation: rippleExpand 0.5s ease-out forwards;
      z-index: 10;
    }

    @keyframes rippleExpand {
      0% {
        width: 0;
        height: 0;
        opacity: 0.6;
      }
      100% {
        width: 120px;
        height: 120px;
        opacity: 0;
      }
    }

    .color-label {
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: #8b949e;
      white-space: nowrap;
      font-family: 'Fira Code', monospace;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .show-labels .color-label {
      opacity: 1;
    }

    .checker-section {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 0.5px solid #30363d;
    }

    .checker-title {
      font-size: 20px;
      font-weight: 700;
      color: #c9d1d9;
      margin-bottom: 16px;
    }

    .checker-input-group {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .checker-input {
      flex: 1;
      min-width: 280px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px 16px;
      color: #f0f6fc;
      font-family: 'Fira Code', monospace;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .checker-input:focus {
      border-color: #58a6ff;
    }

    .checker-input::placeholder {
      color: #6e7681;
    }

    .preview-container {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .preview-rect {
      width: 200px;
      height: 120px;
      border-radius: 8px;
      border: 0.5px solid #30363d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fira Code', monospace;
      font-size: 14px;
    }

    .contrast-result {
      text-align: center;
      margin-bottom: 16px;
    }

    .contrast-ratio {
      font-family: 'Fira Code', monospace;
      font-size: 32px;
      font-weight: 600;
      color: #f0f6fc;
    }

    .contrast-badges {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .badge {
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge.pass {
      background: rgba(63, 185, 80, 0.15);
      color: #3fb950;
      border: 1px solid rgba(63, 185, 80, 0.4);
    }

    .badge.fail {
      background: rgba(248, 81, 73, 0.15);
      color: #f85149;
      border: 1px solid rgba(248, 81, 73, 0.4);
    }

    .warning-text {
      text-align: center;
      color: #f85149;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .alternatives-section {
      margin-top: 20px;
    }

    .alternatives-title {
      font-size: 14px;
      color: #8b949e;
      margin-bottom: 12px;
    }

    .alternatives-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .alt-item {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .alt-item:hover {
      border-color: #58a6ff;
      transform: translateY(-2px);
    }

    .alt-swatches {
      display: flex;
      gap: 4px;
      margin-bottom: 8px;
    }

    .alt-swatch {
      flex: 1;
      height: 40px;
      border-radius: 4px;
    }

    .alt-ratio {
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      color: #c9d1d9;
      text-align: center;
    }

    .svg-filters {
      position: absolute;
      width: 0;
      height: 0;
      overflow: hidden;
    }

    @media (max-width: 768px) {
      #app {
        padding: 16px 8px;
      }

      .main-container {
        padding: 20px 16px;
      }

      .app-title {
        font-size: 24px;
      }

      .app-content {
        flex-direction: column;
      }

      .stats-panel {
        width: 100%;
        height: 160px;
        overflow-x: auto;
        order: 2;
        transform: translateY(12px);
      }

      .stats-panel.visible {
        transform: translateY(0);
      }

      .history-list {
        display: flex;
        gap: 16px;
        white-space: nowrap;
      }

      .history-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
        border-bottom: none;
        padding: 0 8px;
        border-right: 0.5px solid #21262d;
      }

      .history-item:last-child {
        border-right: none;
      }

      .main-area {
        width: 100%;
        order: 1;
      }

      .color-matrix {
        grid-template-columns: repeat(5, 80px);
        gap: 6px;
      }

      .color-block {
        width: 80px;
        height: 80px;
      }

      .preview-rect {
        width: 140px;
        height: 84px;
      }

      .checker-input {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="main-container">
      <header class="app-header">
        <h1 class="app-title">色彩感知与色盲辅助测试</h1>
        <div class="title-divider"></div>
      </header>

      <div class="app-content">
        <aside class="stats-panel" id="statsPanel">
          <div class="stats-title">成绩统计</div>
          <div class="stat-item">
            <div class="stat-label">剩余时间</div>
            <div class="stat-value" id="timerDisplay">30</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">已找到目标</div>
            <div class="stat-value"><span id="foundCount">0</span> / 5</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">正确率</div>
            <div class="stat-value" id="accuracyDisplay">--</div>
          </div>
          <div class="history-list" id="historyList"></div>
        </aside>

        <main class="main-area">
          <div class="controls-bar">
            <button class="btn primary" id="startBtn">开始新游戏</button>
            <div class="filter-group" id="filterGroup">
              <button class="btn filter-btn active" data-filter="none">正常视觉</button>
              <button class="btn filter-btn" data-filter="protanopia">红色盲</button>
              <button class="btn filter-btn" data-filter="deuteranopia">绿色盲</button>
              <button class="btn filter-btn" data-filter="tritanopia">蓝黄色盲</button>
            </div>
            <button class="btn" id="toggleLabelsBtn">显示颜色标注</button>
          </div>

          <div class="matrix-wrapper">
            <div class="color-matrix" id="colorMatrix"></div>
          </div>

          <section class="checker-section">
            <h2 class="checker-title">配色可访问性检查</h2>
            <div class="checker-input-group">
              <input type="text" class="checker-input" id="colorInput"
                     placeholder="输入颜色对，例如：#FF7F50, #FFFFFF 或 coral, white" />
              <button class="btn primary" id="checkBtn">检查对比度</button>
            </div>
            <div class="preview-container" id="previewContainer">
              <div class="preview-rect" id="preview1" style="background:#21262d;color:#c9d1d9">颜色 1</div>
              <div class="preview-rect" id="preview2" style="background:#30363d;color:#c9d1d9">颜色 2</div>
            </div>
            <div class="contrast-result" id="contrastResult"></div>
            <div class="alternatives-section" id="alternativesSection" style="display:none">
              <div class="alternatives-title">推荐替代配色：</div>
              <div class="alternatives-grid" id="alternativesGrid"></div>
            </div>
          </section>
        </main>
      </div>
    </div>
  </div>

  <svg class="svg-filters" aria-hidden="true">
    <defs>
      <filter id="protanopia-filter">
        <feColorMatrix type="matrix" values="
          0.567, 0.433, 0.000, 0, 0
          0.558, 0.442, 0.000, 0, 0
          0.000, 0.242, 0.758, 0, 0
          0.000, 0.000, 0.000, 1, 0
        "/>
      </filter>
      <filter id="deuteranopia-filter">
        <feColorMatrix type="matrix" values="
          0.625, 0.375, 0.000, 0, 0
          0.700, 0.300, 0.000, 0, 0
          0.000, 0.300, 0.700, 0, 0
          0.000, 0.000, 0.000, 1, 0
        "/>
      </filter>
      <filter id="tritanopia-filter">
        <feColorMatrix type="matrix" values="
          0.950, 0.050, 0.000, 0, 0
          0.000, 0.433, 0.567, 0, 0
          0.000, 0.475, 0.525, 0, 0
          0.000, 0.000, 0.000, 1, 0
        "/>
      </filter>
    </defs>
  </svg>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
