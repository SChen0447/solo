<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D粒子星系可视化</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Orbitron', sans-serif;
      background: #0a0a2e;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      background: radial-gradient(ellipse at center, #1a1a4e 0%, #0a0a2e 50%, #050510 100%);
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    #fps-counter {
      position: absolute;
      top: 20px;
      right: 24px;
      color: #00ff88;
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      text-shadow: 0 0 10px rgba(0, 255, 136, 0.6),
                   0 0 20px rgba(0, 255, 136, 0.3);
      letter-spacing: 2px;
      pointer-events: none;
      user-select: none;
    }

    #controls {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      align-items: flex-end;
      pointer-events: auto;
    }

    .shape-btn {
      background: rgba(20, 20, 60, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(120, 140, 255, 0.35);
      border-radius: 14px;
      padding: 14px 22px;
      color: #e0e8ff;
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4),
                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }

    .shape-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(180, 200, 255, 0.15), transparent);
      transition: left 0.6s;
    }

    .shape-btn:hover {
      background: rgba(40, 50, 100, 0.65);
      border-color: rgba(150, 180, 255, 0.7);
      color: #ffffff;
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(100, 130, 255, 0.4),
                  0 0 25px rgba(120, 150, 255, 0.25),
                  inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .shape-btn:hover::before {
      left: 100%;
    }

    .shape-btn.active {
      background: rgba(80, 100, 200, 0.55);
      border-color: rgba(180, 200, 255, 0.9);
      color: #ffffff;
      box-shadow: 0 0 30px rgba(130, 160, 255, 0.5),
                  0 0 60px rgba(130, 160, 255, 0.2);
    }

    #speed-panel {
      position: absolute;
      bottom: 32px;
      left: 32px;
      pointer-events: auto;
      background: rgba(20, 20, 60, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(120, 140, 255, 0.35);
      border-radius: 14px;
      padding: 16px 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    #speed-label {
      color: #a0b0e0;
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #speed-value {
      color: #00d4ff;
      font-weight: 600;
      text-shadow: 0 0 8px rgba(0, 212, 255, 0.6);
    }

    #speed-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 180px;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(90deg, rgba(0, 212, 255, 0.2), rgba(180, 120, 255, 0.2));
      outline: none;
      cursor: pointer;
    }

    #speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffffff 0%, #00d4ff 60%, #0080ff 100%);
      cursor: pointer;
      box-shadow: 0 0 12px rgba(0, 212, 255, 0.8),
                  0 0 24px rgba(0, 212, 255, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    #speed-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 16px rgba(0, 212, 255, 1),
                  0 0 32px rgba(0, 212, 255, 0.6);
    }

    #speed-slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffffff 0%, #00d4ff 60%, #0080ff 100%);
      cursor: pointer;
      border: none;
      box-shadow: 0 0 12px rgba(0, 212, 255, 0.8);
    }

    #toast {
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ffffff;
      font-family: 'Orbitron', sans-serif;
      font-size: 42px;
      font-weight: 700;
      letter-spacing: 8px;
      text-shadow: 0 0 20px rgba(180, 200, 255, 0.8),
                   0 0 40px rgba(130, 160, 255, 0.5),
                   0 0 80px rgba(100, 130, 255, 0.3);
      opacity: 0;
      pointer-events: none;
      user-select: none;
      transition: opacity 0.5s ease;
    }

    #toast.show {
      opacity: 1;
    }

    #hint {
      position: absolute;
      bottom: 32px;
      right: 32px;
      color: rgba(160, 176, 224, 0.5);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      pointer-events: none;
      user-select: none;
      text-align: right;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="ui-layer">
      <div id="fps-counter">FPS: --</div>
      <div id="toast"></div>
      <div id="speed-panel">
        <div id="speed-label">
          <span>SPEED</span>
          <span id="speed-value">1.0x</span>
        </div>
        <input type="range" id="speed-slider" min="0" max="5" step="0.1" value="1" />
      </div>
      <div id="controls">
        <button class="shape-btn active" data-shape="spiral">旋涡星系</button>
        <button class="shape-btn" data-shape="globular">球状星团</button>
        <button class="shape-btn" data-shape="ring">光环</button>
        <button class="shape-btn" data-shape="irregular">不规则星云</button>
      </div>
      <div id="hint">
        拖拽旋转 · 滚轮缩放
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
