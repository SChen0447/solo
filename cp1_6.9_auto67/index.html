<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>碑帖拓印模拟器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background-color: #f5e6c8;
      font-family: 'Noto Serif SC', 'KaiTi', '楷体', serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }

    .app-container {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: center;
      gap: 30px;
      max-width: 100%;
      position: relative;
    }

    .canvas-wrapper {
      position: relative;
      flex-shrink: 0;
    }

    #stoneCanvas {
      display: block;
      border: 2px solid #3e2723;
      border-radius: 4px;
      box-shadow:
        0 4px 20px rgba(0, 0, 0, 0.3),
        inset 0 2px 4px rgba(255, 255, 255, 0.05),
        inset 0 -2px 4px rgba(0, 0, 0, 0.2);
      cursor: crosshair;
      touch-action: none;
    }

    #stoneCanvas.resetting {
      animation: fadeInOut 0.5s ease-in-out;
    }

    @keyframes fadeInOut {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }

    .canvas-hint {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      color: #5d4037;
      opacity: 0.7;
      pointer-events: none;
      white-space: nowrap;
      font-style: italic;
    }

    .control-panel {
      position: absolute;
      right: 16px;
      bottom: 16px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 0.3px solid rgba(255, 255, 255, 0.5);
      border-radius: 8px;
      padding: 16px;
      min-width: 220px;
      z-index: 10;
    }

    .control-panel h3 {
      font-size: 14px;
      color: #fff;
      margin-bottom: 12px;
      font-weight: 400;
      letter-spacing: 2px;
      text-align: center;
      opacity: 0.9;
    }

    .control-group {
      margin-bottom: 14px;
    }

    .control-group label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #fff;
      margin-bottom: 6px;
      opacity: 0.85;
    }

    .control-group label span.value {
      font-variant-numeric: tabular-nums;
      background: rgba(0, 0, 0, 0.2);
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 11px;
    }

    .control-group input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 2px;
      outline: none;
    }

    .control-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
      transition: transform 0.1s;
    }

    .control-group input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    .control-group input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
    }

    .reset-btn {
      width: 100%;
      padding: 8px 0;
      font-family: inherit;
      font-size: 13px;
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
      border: 0.3px solid rgba(255, 255, 255, 0.4);
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 3px;
      transition: background 0.2s;
      opacity: 0.9;
    }

    .reset-btn:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    .reset-btn:active {
      transform: scale(0.98);
    }

    @media (max-width: 768px) {
      body {
        padding: 12px;
        align-items: flex-start;
      }

      .app-container {
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      .canvas-wrapper {
        width: 100%;
        max-width: 360px;
      }

      #stoneCanvas {
        width: 100%;
        height: auto;
      }

      .control-panel {
        position: static;
        margin: 0 auto;
        width: 100%;
        max-width: 360px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        border: 1px solid #d7ccc8;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .control-panel h3 {
        color: #3e2723;
      }

      .control-group label {
        color: #5d4037;
      }

      .control-group label span.value {
        background: #efebe9;
        color: #3e2723;
      }

      .control-group input[type="range"] {
        background: #d7ccc8;
      }

      .control-group input[type="range"]::-webkit-slider-thumb {
        background: #5d4037;
      }

      .control-group input[type="range"]::-moz-range-thumb {
        background: #5d4037;
      }

      .reset-btn {
        color: #3e2723;
        background: #efebe9;
        border: 1px solid #d7ccc8;
      }

      .reset-btn:hover {
        background: #d7ccc8;
      }

      .canvas-hint {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="canvas-wrapper">
      <canvas id="stoneCanvas"></canvas>
      <div class="canvas-hint">轻握鼠标，如拓包轻拍，慢慢让碑文显现</div>
      <div class="control-panel" id="controlPanel">
        <h3>拓印工具</h3>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
