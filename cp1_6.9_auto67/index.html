<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>虚拟熔岩灯 - Lava Lamp Art</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
    }

    .temp-panel {
      position: fixed;
      top: 24px;
      left: 24px;
      background: rgba(255, 255, 255, 0.13);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      padding: 18px 22px;
      color: #ffffff;
      z-index: 10;
      transition: all 0.3s ease;
      min-width: 220px;
    }

    .temp-panel:hover {
      background: rgba(255, 255, 255, 0.18);
      box-shadow: 0 0 30px rgba(0, 204, 255, 0.15);
    }

    .temp-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 10px;
    }

    .temp-value {
      font-size: 36px;
      font-weight: 200;
      color: #00ccff;
      text-shadow: 0 0 20px rgba(0, 204, 255, 0.5);
      margin-bottom: 12px;
      transition: all 0.3s ease;
    }

    .temp-value span {
      font-size: 18px;
      opacity: 0.6;
      margin-left: 2px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right, #550000, #ff4400, #00ccff);
      outline: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #00ccff;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(0, 204, 255, 0.8), 0 0 30px rgba(0, 204, 255, 0.4);
      border: 2px solid #ffffff;
      transition: all 0.3s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      box-shadow: 0 0 25px rgba(0, 204, 255, 1), 0 0 50px rgba(0, 204, 255, 0.6);
    }

    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #00ccff;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(0, 204, 255, 0.8);
      border: 2px solid #ffffff;
    }

    .control-bar {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.13);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      gap: 24px;
      z-index: 10;
      transition: all 0.3s ease;
    }

    .control-bar:hover {
      background: rgba(255, 255, 255, 0.18);
    }

    .control-info {
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    .control-info strong {
      color: #00ccff;
      font-weight: 500;
    }

    .reset-btn {
      background: linear-gradient(135deg, rgba(0, 204, 255, 0.2), rgba(0, 204, 255, 0.05));
      border: 1px solid rgba(0, 204, 255, 0.5);
      color: #00ccff;
      padding: 10px 22px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      font-family: inherit;
    }

    .reset-btn:hover {
      background: linear-gradient(135deg, rgba(0, 204, 255, 0.4), rgba(0, 204, 255, 0.15));
      box-shadow: 0 0 25px rgba(0, 204, 255, 0.5), 0 0 50px rgba(0, 204, 255, 0.2);
      border-color: #00ccff;
      transform: translateY(-1px);
    }

    .reset-btn:active {
      transform: translateY(0);
    }

    .divider {
      width: 1px;
      height: 30px;
      background: rgba(255, 255, 255, 0.15);
    }

    .hint {
      position: fixed;
      top: 24px;
      right: 24px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      padding: 12px 16px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 11px;
      line-height: 1.8;
      z-index: 10;
      max-width: 200px;
      transition: all 0.3s ease;
    }

    .hint:hover {
      color: rgba(255, 255, 255, 0.7);
      background: rgba(255, 255, 255, 0.12);
    }

    .hint-title {
      color: #00ccff;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  
  <div class="temp-panel">
    <div class="temp-label">温度控制</div>
    <div class="temp-value" id="tempValue">50<span>°C</span></div>
    <input type="range" id="tempSlider" min="0" max="100" value="50" />
  </div>

  <div class="hint">
    <div class="hint-title">操作提示</div>
    拖拽瓶身可倾斜角度<br/>
    调节滑块改变温度<br/>
    观察蜡泡浮升与融合
  </div>

  <div class="control-bar">
    <div class="control-info">
      蜡泡数量: <strong id="blobCount">0</strong>
    </div>
    <div class="divider"></div>
    <div class="control-info">
      FPS: <strong id="fpsCounter">60</strong>
    </div>
    <div class="divider"></div>
    <button class="reset-btn" id="resetBtn">复位倾斜</button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
