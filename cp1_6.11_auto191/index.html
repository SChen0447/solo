<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurora & Ice Crystal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #control-panel {
      position: fixed;
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      width: 220px;
      padding: 20px 16px;
      background: rgba(10, 10, 30, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 8px;
      border: 1px solid #4060aa;
      box-shadow: 0 0 12px rgba(64, 96, 170, 0.3);
      z-index: 100;
      font-family: 'Segoe UI', sans-serif;
      color: #a0c0ff;
      font-size: 14px;
    }
    .control-group {
      margin-bottom: 16px;
    }
    .control-group:last-child {
      margin-bottom: 0;
    }
    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 14px;
      color: #a0c0ff;
    }
    .control-value {
      font-size: 12px;
      color: #7090cc;
    }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, #1a2a5a, #4466cc);
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: radial-gradient(circle, #88aaff, #4466cc);
      border: 2px solid #a0c0ff;
      box-shadow: 0 0 6px rgba(100, 140, 255, 0.5);
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: radial-gradient(circle, #88aaff, #4466cc);
      border: 2px solid #a0c0ff;
      box-shadow: 0 0 6px rgba(100, 140, 255, 0.5);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="control-panel">
    <div class="control-group">
      <div class="control-label">
        <span>Aurora Intensity</span>
        <span class="control-value" id="intensity-value">50</span>
      </div>
      <input type="range" id="intensity-slider" min="0" max="100" value="50" />
    </div>
    <div class="control-group">
      <div class="control-label">
        <span>Color Shift</span>
        <span class="control-value" id="color-value">0</span>
      </div>
      <input type="range" id="color-slider" min="-100" max="100" value="0" />
    </div>
    <div class="control-group">
      <div class="control-label">
        <span>Particle Density</span>
        <span class="control-value" id="density-value">60</span>
      </div>
      <input type="range" id="density-slider" min="0" max="100" value="60" />
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
