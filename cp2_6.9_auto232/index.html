<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canvas 动态光栅字体展示工具</title>
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
  <canvas id="mainCanvas"></canvas>

  <div id="controlPanel" class="control-panel">
    <div class="panel-header">
      <span class="panel-title">字体参数控制</span>
      <button id="togglePanel" class="toggle-btn" aria-label="收起面板">–</button>
    </div>

    <div class="panel-content" id="panelContent">
      <div class="param-group">
        <div class="param-header">
          <label for="distortion">纹理扭曲强度</label>
          <span id="distortionValue" class="param-value">30</span>
        </div>
        <input type="range" id="distortion" min="0" max="100" value="30" class="slider" />
      </div>

      <div class="param-group">
        <div class="param-header">
          <label for="glowRadius">发光模糊半径</label>
          <span id="glowRadiusValue" class="param-value">5</span>
        </div>
        <input type="range" id="glowRadius" min="0" max="20" value="5" class="slider" />
      </div>

      <div class="param-group">
        <div class="param-header">
          <label for="glowColor">发光颜色</label>
          <span id="glowColorValue" class="param-value">#00D4FF</span>
        </div>
        <input type="color" id="glowColor" value="#00D4FF" class="color-picker" />
      </div>

      <div class="param-group">
        <div class="param-header">
          <label for="noiseIntensity">阈值噪声强度</label>
          <span id="noiseIntensityValue" class="param-value">10</span>
        </div>
        <input type="range" id="noiseIntensity" min="0" max="50" value="10" class="slider" />
      </div>
    </div>
  </div>

  <input
    type="text"
    id="textInput"
    class="text-input"
    placeholder="输入文字"
    maxlength="20"
    value="Raster Font"
  />

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
