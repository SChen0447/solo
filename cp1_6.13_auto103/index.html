<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="声色·盲选 - 在线黑胶唱片盲听与标签交换平台" />
    <title>声色·盲选</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        min-height: 100vh;
      }
      body {
        background-color: #1a1a2e;
        background-image:
          radial-gradient(ellipse at 20% 50%, rgba(233, 69, 96, 0.08) 0%, transparent 50%),
          radial-gradient(ellipse at 80% 80%, rgba(15, 52, 96, 0.15) 0%, transparent 50%),
          repeating-radial-gradient(
            circle at 50% 50%,
            rgba(255, 255, 255, 0.015) 0px,
            rgba(255, 255, 255, 0.015) 1px,
            transparent 1px,
            transparent 4px
          );
        background-attachment: fixed;
        color: #e94560;
        font-family: 'Inter', 'Noto Serif SC', -apple-system, BlinkMacSystemFont,
          'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      .loading-screen {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1a1a2e;
        z-index: 9999;
        transition: opacity 0.6s ease;
      }
      .loading-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      .vinyl-loader {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background:
          radial-gradient(circle, #2a2a4a 20%, transparent 21%),
          radial-gradient(circle, #0a0a1e 60%, #1a1a2e 61%),
          repeating-radial-gradient(
            circle,
            #111 0px,
            #111 2px,
            #1a1a2e 2px,
            #1a1a2e 4px
          );
        position: relative;
        animation: spin 1.2s linear infinite;
      }
      .vinyl-loader::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #e94560;
        box-shadow: 0 0 20px rgba(233, 69, 96, 0.6);
      }
      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      .loader-text {
        position: absolute;
        bottom: -40px;
        left: 50%;
        transform: translateX(-50%);
        color: #e94560;
        font-family: 'Noto Serif SC', serif;
        font-size: 14px;
        letter-spacing: 4px;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div id="loading-screen" class="loading-screen">
      <div class="vinyl-loader">
        <span class="loader-text">声 · 色 · 盲 · 选</span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/frontend/main.tsx"></script>
    <script>
      window.addEventListener('load', () => {
        const loader = document.getElementById('loading-screen');
        setTimeout(() => {
          loader?.classList.add('fade-out');
          setTimeout(() => loader?.remove(), 700);
        }, 600);
      });
    </script>
  </body>
</html>
