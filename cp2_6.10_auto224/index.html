<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Audio Editor - 浏览器音频编辑器</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="app">
    <!-- 顶部工具栏 -->
    <header id="top-toolbar" class="toolbar">
      <div class="toolbar-group">
        <button id="btn-play" class="btn-play" title="播放/暂停">
          <svg id="icon-play" width="18" height="18" viewBox="0 0 24 24" fill="white">
            <path d="M8 5v14l11-7z"/>
          </svg>
          <svg id="icon-pause" width="18" height="18" viewBox="0 0 24 24" fill="white" style="display:none">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
          </svg>
        </button>
        <button id="btn-stop" class="btn-stop" title="停止">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="white">
            <path d="M6 6h12v12H6z"/>
          </svg>
        </button>
      </div>
      <div class="toolbar-group">
        <label class="speed-label">速度:</label>
        <select id="speed-select" class="speed-select">
          <option value="0.5">0.5x</option>
          <option value="1" selected>1x</option>
          <option value="1.5">1.5x</option>
          <option value="2">2x</option>
        </select>
      </div>
      <div class="toolbar-group time-display">
        <span id="current-time">00:00.000</span>
        <span class="time-sep">/</span>
        <span id="total-time">00:00.000</span>
      </div>
    </header>

    <!-- 主内容区 -->
    <main id="main-content">
      <!-- 时间轴刻度 -->
      <div id="timeline-container">
        <canvas id="timeline-canvas"></canvas>
      </div>

      <!-- 拖拽上传区域 -->
      <div id="drop-zone" class="drop-zone">
        <input type="file" id="file-input" accept=".wav,.mp3,audio/wav,audio/mp3,audio/mpeg" multiple hidden />
        <div class="drop-content">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="#6b6b8a">
            <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/>
          </svg>
          <p class="drop-text">拖拽WAV/MP3文件到此处，或<em>点击选择文件</em></p>
        </div>
      </div>

      <!-- 主波形显示区 -->
      <div id="waveform-container" class="waveform-container">
        <canvas id="main-waveform"></canvas>
        <div id="playhead-indicator" class="playhead"></div>
      </div>

      <!-- 轨道区域 -->
      <div id="tracks-container">
        <!-- 轨道由JS动态生成 -->
      </div>

      <!-- 主输出控制区 -->
      <div id="master-control">
        <div class="master-section">
          <span class="master-label">主音量</span>
          <div class="master-volume-wrapper">
            <input type="range" id="master-volume" min="0" max="100" value="80" class="slider-h" />
          </div>
        </div>
        <div class="master-section">
          <button id="btn-reset" class="btn-reset" title="重置">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
              <path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
            </svg>
          </button>
        </div>
      </div>
    </main>

    <!-- 底部操作栏 -->
    <footer id="bottom-toolbar" class="bottom-toolbar">
      <button id="btn-export" class="btn-export">导出混音</button>
      <button id="btn-save" class="btn-save">保存项目</button>
    </footer>

    <!-- 导出进度弹窗 -->
    <div id="export-modal" class="modal hidden">
      <div class="modal-content">
        <h3 id="modal-title">正在导出...</h3>
        <div class="progress-bar-wrapper">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
        <p id="progress-text" class="progress-text">0%</p>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
