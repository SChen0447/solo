<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>记忆之树 · 修复解谜</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0F0C29;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #0F0C29 0%, #302B63 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.8s ease;
    }

    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loading-title {
      color: #FFD700;
      font-size: 48px;
      font-weight: bold;
      letter-spacing: 8px;
      margin-bottom: 40px;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255, 215, 0, 0.2);
      border-top-color: #FFD700;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: rgba(255, 255, 255, 0.7);
      margin-top: 24px;
      font-size: 16px;
      letter-spacing: 2px;
    }

    #fullscreen-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(255, 215, 0, 0.15);
      border: 2px solid #FFD700;
      color: #FFD700;
      font-size: 20px;
      cursor: pointer;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    #fullscreen-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    @media (max-width: 1024px) {
      .loading-title {
        font-size: 36px;
        letter-spacing: 6px;
      }
    }

    @media (max-width: 768px) {
      .loading-title {
        font-size: 28px;
        letter-spacing: 4px;
      }

      #fullscreen-btn {
        width: 36px;
        height: 36px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="loading-screen">
      <div class="loading-title">记忆之树</div>
      <div class="loading-spinner"></div>
      <div class="loading-text">正在唤醒古老的记忆...</div>
    </div>
    <button id="fullscreen-btn" title="全屏">⛶</button>
    <canvas id="game-canvas"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
  <script>
    document.getElementById('fullscreen-btn').addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    });

    window.addEventListener('load', () => {
      setTimeout(() => {
        const loading = document.getElementById('loading-screen');
        if (loading) loading.classList.add('fade-out');
      }, 1500);
    });
  </script>
</body>
</html>
