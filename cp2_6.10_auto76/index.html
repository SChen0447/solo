<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>程序化地形纹理生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background-color: #1a1a2e;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #e0e0e0;
      overflow-x: hidden;
    }

    .app-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      position: relative;
    }

    .seed-display {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(22, 33, 62, 0.9);
      padding: 8px 16px;
      border-radius: 8px;
      border: 2px solid #e94560;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: #e94560;
      z-index: 100;
    }

    .main-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 900px;
    }

    .app-title {
      font-size: 28px;
      font-weight: 600;
      color: #e94560;
      text-shadow: 0 0 10px rgba(233, 69, 96, 0.3);
      margin-bottom: 10px;
    }

    .canvas-wrapper {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #textureCanvas {
      width: 600px;
      height: 600px;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 40px rgba(233, 69, 96, 0.15);
      background: #0f0f1e;
    }

    .control-panel {
      background: rgba(22, 33, 62, 0.95);
      border: 2px solid #e94560;
      border-radius: 12px;
      padding: 20px;
      width: 100%;
      max-width: 800px;
    }

    .control-section {
      margin-bottom: 20px;
    }

    .control-section:last-child {
      margin-bottom: 0;
    }

    .section-label {
      font-size: 14px;
      font-weight: 500;
      color: #b8b8d1;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .biome-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .biome-btn {
      flex: 1;
      min-width: 100px;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      color: #fff;
    }

    .biome-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.3);
    }

    .biome-btn:active {
      transform: scale(1.1);
    }

    .biome-btn.active {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 0 20px currentColor;
    }

    .biome-forest {
      background: #2d6a4f;
    }

    .biome-desert {
      background: #e9c46a;
      color: #1a1a2e;
    }

    .biome-snow {
      background: #e0fbfc;
      color: #1a1a2e;
    }

    .action-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .action-btn {
      flex: 1;
      min-width: 140px;
      padding: 12px 20px;
      border: 2px solid #e94560;
      border-radius: 8px;
      background: transparent;
      color: #e94560;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .action-btn:hover {
      background: #e94560;
      color: #1a1a2e;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(233, 69, 96, 0.3);
    }

    .slider-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .slider-info {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #b8b8d1;
    }

    .slider-value {
      font-family: 'Courier New', monospace;
      color: #e94560;
      font-weight: 600;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 8px;
      border-radius: 4px;
      background: linear-gradient(to right, #2d6a4f 0%, #2d6a4f 50%, #0f0f1e 50%, #0f0f1e 100%);
      outline: none;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #e94560;
      border: 3px solid #16213e;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(233, 69, 96, 0.5);
    }

    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #e94560;
      border: 3px solid #16213e;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(233, 69, 96, 0.5);
    }

    .history-section {
      width: 100%;
      max-width: 800px;
    }

    .history-container {
      background: rgba(22, 33, 62, 0.95);
      border: 2px solid #e94560;
      border-radius: 12px;
      padding: 16px;
      overflow-x: auto;
    }

    .history-list {
      display: flex;
      gap: 12px;
      padding: 4px;
    }

    .history-item {
      flex-shrink: 0;
      cursor: pointer;
      border-radius: 6px;
      overflow: hidden;
      border: 2px solid transparent;
      transition: all 0.2s ease;
      position: relative;
    }

    .history-item:hover {
      border-color: #e94560;
      transform: translateY(-3px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.3);
    }

    .history-item.active {
      border-color: #e94560;
    }

    .history-item canvas {
      display: block;
      width: 64px;
      height: 64px;
    }

    .history-seed {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.7);
      font-size: 9px;
      font-family: 'Courier New', monospace;
      text-align: center;
      padding: 2px;
      color: #e94560;
    }

    .empty-history {
      color: #666;
      font-size: 13px;
      font-style: italic;
      padding: 20px;
      text-align: center;
    }

    @media (max-width: 768px) and (orientation: landscape) {
      .app-container {
        padding: 10px;
      }

      .app-title {
        font-size: 20px;
        margin-bottom: 5px;
      }

      #textureCanvas {
        width: 90vw;
        height: 90vw;
        max-width: 500px;
        max-height: 500px;
      }

      .seed-display {
        top: 10px;
        right: 10px;
        font-size: 12px;
        padding: 6px 12px;
      }

      .control-panel {
        padding: 12px;
      }

      .biome-btn,
      .action-btn {
        padding: 10px 14px;
        font-size: 13px;
      }
    }

    @media (max-width: 480px) {
      .app-title {
        font-size: 18px;
      }

      #textureCanvas {
        width: 90vw;
        height: 90vw;
      }

      .biome-buttons,
      .action-buttons {
        flex-direction: column;
      }

      .biome-btn,
      .action-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="seed-display" id="seedDisplay">Seed: --</div>

    <div class="main-wrapper">
      <h1 class="app-title">程序化地形纹理生成器</h1>

      <div class="canvas-wrapper">
        <canvas id="textureCanvas" width="512" height="512"></canvas>
      </div>

      <div class="control-panel">
        <div class="control-section">
          <div class="section-label">生物群落</div>
          <div class="biome-buttons">
            <button class="biome-btn biome-forest active" data-biome="forest">🌲 森林</button>
            <button class="biome-btn biome-desert" data-biome="desert">🏜️ 沙漠</button>
            <button class="biome-btn biome-snow" data-biome="snow">❄️ 雪原</button>
          </div>
        </div>

        <div class="control-section">
          <div class="section-label">噪声缩放</div>
          <div class="slider-container">
            <div class="slider-info">
              <span>细节程度</span>
              <span class="slider-value" id="scaleValue">4.0</span>
            </div>
            <input type="range" id="scaleSlider" min="1" max="8" step="0.1" value="4" />
          </div>
        </div>

        <div class="control-section">
          <div class="section-label">操作</div>
          <div class="action-buttons">
            <button class="action-btn" id="generateBtn">🎲 生成新纹理</button>
            <button class="action-btn" id="exportBtn">💾 导出为 PNG</button>
          </div>
        </div>
      </div>

      <div class="history-section">
        <div class="section-label" style="margin-bottom: 10px;">历史记录 (最近 5 次)</div>
        <div class="history-container">
          <div class="history-list" id="historyList">
            <div class="empty-history">暂无历史记录，点击「生成新纹理」开始创作</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
