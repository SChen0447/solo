<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <title>声漾·流形</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
      font-family: 'Segoe UI', sans-serif;
    }
    #canvas-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    #permission-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      background: rgba(0, 0, 0, 0.85);
      cursor: pointer;
      transition: opacity 0.8s ease;
    }
    #permission-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #permission-overlay h1 {
      color: #feca57;
      font-size: 2.4rem;
      font-weight: 300;
      letter-spacing: 0.5em;
      margin-bottom: 1.5rem;
      text-shadow: 0 0 30px rgba(254, 202, 87, 0.4);
    }
    #permission-overlay p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      margin-bottom: 2.5rem;
    }
    #start-btn {
      background: transparent;
      border: 1px solid rgba(254, 202, 87, 0.4);
      color: #feca57;
      padding: 14px 48px;
      font-size: 1rem;
      letter-spacing: 0.3em;
      cursor: pointer;
      transition: all 0.4s ease;
      border-radius: 2px;
    }
    #start-btn:hover {
      background: rgba(254, 202, 87, 0.1);
      border-color: rgba(254, 202, 87, 0.7);
      box-shadow: 0 0 30px rgba(254, 202, 87, 0.15);
    }
    #info-bar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.25);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="permission-overlay">
    <h1>声漾 · 流形</h1>
    <p>呼吸驱动的流体雕塑</p>
    <button id="start-btn">开启麦克风</button>
  </div>
  <div id="info-bar">拖拽旋转 · 呼吸交互</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
