<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日食与行星连珠天文模拟</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0B0B1A;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #F0F0F0;
      font-size: 14px;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #control-panel {
      position: absolute;
      right: 20px;
      bottom: 20px;
      width: 280px;
      background: rgba(20, 20, 40, 0.85);
      border-radius: 12px;
      padding: 20px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 10;
    }

    #control-panel h3 {
      font-size: 16px;
      margin-bottom: 16px;
      color: #FFD700;
      font-weight: 600;
    }

    .slider-group {
      margin-bottom: 16px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      color: #F0F0F0;
    }

    .slider-value {
      color: #FFD700;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: linear-gradient(to right, rgba(255, 215, 0, 0.2), rgba(255, 140, 0, 0.2));
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FFD700 0%, #FF8C00 100%);
      border: 2px solid #fff;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(255, 215, 0, 0.4);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FFD700 0%, #FF8C00 100%);
      border: 2px solid #fff;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(255, 215, 0, 0.4);
    }

    #trigger-eclipse-btn {
      width: 100%;
      padding: 10px 16px;
      background: linear-gradient(135deg, #FFD700 0%, #FF8C00 100%);
      border: none;
      border-radius: 8px;
      color: #1a1a2e;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 4px;
    }

    #trigger-eclipse-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(255, 215, 0, 0.4);
    }

    #trigger-eclipse-btn:active {
      transform: translateY(0);
    }

    #info-card {
      position: absolute;
      width: 220px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 8px;
      padding: 14px;
      color: #F0F0F0;
      z-index: 20;
      display: none;
      pointer-events: none;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    #info-card .card-title {
      font-size: 16px;
      font-weight: 600;
      color: #FFD700;
      margin-bottom: 10px;
    }

    #info-card .card-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 13px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    #info-card .card-row:last-child {
      border-bottom: none;
    }

    #info-card .card-label {
      color: rgba(240, 240, 240, 0.7);
    }

    #info-card .card-val {
      color: #F0F0F0;
      font-variant-numeric: tabular-nums;
    }

    #eclipse-vignette {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.5s ease;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(0, 0, 0, 0.85) 100%);
    }

    #title {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
    }

    #title h1 {
      font-size: 20px;
      font-weight: 600;
      color: #FFD700;
      margin-bottom: 4px;
    }

    #title p {
      font-size: 12px;
      color: rgba(240, 240, 240, 0.6);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="eclipse-vignette"></div>

    <div id="title">
      <h1>🌞 日食与行星连珠模拟</h1>
      <p>拖拽旋转视角 · 滚轮缩放 · 点击天体查看信息</p>
    </div>

    <div id="control-panel">
      <h3>控制面板</h3>

      <div class="slider-group">
        <div class="slider-label">
          <span>时间倍率</span>
          <span class="slider-value" id="time-speed-val">1.0</span>
        </div>
        <input type="range" id="time-speed" min="0.1" max="10" step="0.1" value="1" />
      </div>

      <div class="slider-group">
        <div class="slider-label">
          <span>视角仰角</span>
          <span class="slider-value" id="pitch-val">30°</span>
        </div>
        <input type="range" id="pitch-angle" min="0" max="90" step="1" value="30" />
      </div>

      <div class="slider-group">
        <div class="slider-label">
          <span>太阳辉光强度</span>
          <span class="slider-value" id="glow-val">1.0</span>
        </div>
        <input type="range" id="sun-glow" min="0.5" max="2.0" step="0.1" value="1.0" />
      </div>

      <div class="slider-group">
        <div class="slider-label">
          <span>月球轨道半径</span>
          <span class="slider-value" id="moon-orbit-val">3.2</span>
        </div>
        <input type="range" id="moon-orbit" min="2.5" max="4.0" step="0.1" value="3.2" />
      </div>

      <button id="trigger-eclipse-btn">🌑 触发日食</button>
    </div>

    <div id="info-card">
      <div class="card-title" id="card-name">天体名称</div>
      <div class="card-row">
        <span class="card-label">半径比例</span>
        <span class="card-val" id="card-radius">-</span>
      </div>
      <div class="card-row">
        <span class="card-label">公转角度</span>
        <span class="card-val" id="card-angle">-</span>
      </div>
      <div class="card-row">
        <span class="card-label">最近天体距离</span>
        <span class="card-val" id="card-distance">-</span>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
