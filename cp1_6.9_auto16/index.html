<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生态瓶 · Terrarium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F7F3E9;
      color: #4a6b5a;
      overflow: hidden;
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(136, 216, 176, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(255, 220, 180, 0.12) 0%, transparent 50%),
        #F7F3E9;
    }
    .app {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 40px;
      max-width: 1100px;
      width: 100%;
    }
    .canvas-wrap {
      position: relative;
      width: 700px;
      height: 700px;
      flex-shrink: 0;
      opacity: 0;
      transform: scale(0.85);
      animation: jarIn 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes jarIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 24px;
      cursor: pointer;
    }
    .panel {
      width: 280px;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 24px;
      padding: 28px 24px;
      box-shadow:
        0 8px 32px rgba(136, 184, 160, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
      display: flex;
      flex-direction: column;
      gap: 22px;
    }
    .panel-title {
      font-size: 20px;
      font-weight: 500;
      color: #3d6b54;
      text-align: center;
      letter-spacing: 2px;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(136, 216, 176, 0.3);
    }
    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .slider-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      font-weight: 400;
      color: #5a8270;
    }
    .slider-value {
      display: inline-block;
      min-width: 36px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: #3d6b54;
      font-weight: 500;
      background: rgba(136, 216, 176, 0.25);
      padding: 2px 8px;
      border-radius: 8px;
      font-size: 12px;
    }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 8px;
      border-radius: 4px;
      outline: none;
      cursor: pointer;
    }
    #lightSlider {
      background: linear-gradient(to right, #6d9e8c, #ffe08a, #fff6c2);
    }
    #waterSlider {
      background: linear-gradient(to right, #a3d9c2, #5fb8d4, #4a90c2);
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      border: 2px solid #88D8B0;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(136, 216, 176, 0.4);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      box-shadow: 0 4px 14px rgba(136, 216, 176, 0.55);
    }
    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      border: 2px solid #88D8B0;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(136, 216, 176, 0.4);
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 12px;
      font-size: 13px;
    }
    .info-label { color: #5a8270; }
    .info-value {
      color: #3d6b54;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }
    .btn-row {
      display: flex;
      gap: 10px;
    }
    .btn {
      flex: 1;
      padding: 11px 0;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.6);
      color: #3d6b54;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(136, 216, 176, 0.35);
      box-shadow: 0 3px 10px rgba(136, 184, 160, 0.15);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      letter-spacing: 1px;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow:
        0 6px 18px rgba(136, 216, 176, 0.35),
        0 0 12px rgba(136, 216, 176, 0.2);
      background: rgba(255, 255, 255, 0.75);
    }
    .btn:active {
      transform: translateY(0) scale(0.96);
      box-shadow: 0 1px 4px rgba(136, 184, 160, 0.15);
    }
    .btn-primary {
      background: linear-gradient(135deg, #88D8B0 0%, #6dc4a0 100%);
      color: #fff;
      border: none;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #95e0bc 0%, #7dd0ae 100%);
      box-shadow:
        0 6px 18px rgba(136, 216, 176, 0.5),
        0 0 14px rgba(136, 216, 176, 0.3);
    }
    .btn-primary.active {
      background: linear-gradient(135deg, #ffb870 0%, #ff9a4d 100%);
      box-shadow:
        0 6px 18px rgba(255, 154, 77, 0.5),
        0 0 14px rgba(255, 154, 77, 0.3);
    }
    .morph-tag {
      text-align: center;
      padding: 8px 12px;
      background: rgba(136, 216, 176, 0.2);
      border-radius: 10px;
      font-size: 12px;
      color: #5a8270;
      letter-spacing: 1px;
    }
    @media (max-width: 768px) {
      body { overflow: auto; padding: 16px; align-items: flex-start; }
      .app {
        flex-direction: column;
        gap: 20px;
      }
      .canvas-wrap {
        width: 90vw;
        height: 90vw;
        max-width: 500px;
        max-height: 500px;
      }
      .panel {
        width: 90vw;
        max-width: 500px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="canvas-wrap">
      <canvas id="gameCanvas" width="700" height="700"></canvas>
    </div>
    <div class="panel">
      <div class="panel-title">生 态 瓶</div>

      <div class="slider-group">
        <div class="slider-label">
          <span>☀ 光照强度</span>
          <span class="slider-value" id="lightValue">50</span>
        </div>
        <input type="range" id="lightSlider" min="0" max="100" value="50" />
      </div>

      <div class="slider-group">
        <div class="slider-label">
          <span>💧 水分值</span>
          <span class="slider-value" id="waterValue">50</span>
        </div>
        <input type="range" id="waterSlider" min="0" max="100" value="50" />
      </div>

      <div class="info-row">
        <span class="info-label">生长阶段</span>
        <span class="info-value" id="stageLabel">种子</span>
      </div>

      <div class="info-row">
        <span class="info-label">成长时间</span>
        <span class="info-value" id="timeLabel">0s</span>
      </div>

      <div class="morph-tag" id="morphTag">· 正常形态 ·</div>

      <div class="btn-row">
        <button class="btn btn-primary" id="speedBtn">⏩ 加速</button>
        <button class="btn" id="saveBtn">💾 保存</button>
      </div>

      <button class="btn" id="resetBtn">🔄 重置生态瓶</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
