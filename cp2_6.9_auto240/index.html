<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>电磁波传播可视化 - 3D Interactive</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #app {
      width: 100vw;
      height: 100vh;
      background: #0A0A2E;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #gui-container {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 100;
      background: rgba(0, 0, 0, 0.6);
      padding: 10px;
      border-radius: 8px;
    }

    #info-panel {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: #fff;
      background: rgba(0, 0, 0, 0.6);
      padding: 15px 20px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.6;
      max-width: 320px;
    }

    #info-panel h3 {
      margin-bottom: 8px;
      color: #64B5F6;
      font-size: 15px;
    }

    #info-panel p {
      opacity: 0.85;
    }

    #mobile-toggle {
      display: none;
      position: absolute;
      top: 15px;
      right: 15px;
      width: 44px;
      height: 44px;
      background: rgba(0, 0, 0, 0.7);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 20px;
      cursor: pointer;
      z-index: 101;
    }

    @media (max-width: 768px) {
      #gui-container {
        display: none;
        top: 70px;
        right: 10px;
        max-width: calc(100% - 20px);
      }

      #gui-container.visible {
        display: block;
      }

      #mobile-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #info-panel {
        bottom: 10px;
        left: 10px;
        font-size: 11px;
        padding: 10px 12px;
        max-width: 260px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <button id="mobile-toggle">☰</button>
    <div id="gui-container"></div>
    <div id="info-panel">
      <h3>电磁波传播演示</h3>
      <p>鼠标拖拽旋转视角 | 滚轮缩放</p>
      <p style="margin-top:6px;">
        <span style="color:#2196F3;">■</span> 入射波
        <span style="color:#8BC34A;margin-left:10px;">■</span> 反射波
        <span style="color:#F44336;margin-left:10px;">■</span> 强电场区
      </p>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
