<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>历史时间线回溯</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0a0a1a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #ffffff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #0a0a1a;
    }

    #timeline-container {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      border-top: 1px solid #2d3436;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #timeline-wrapper {
      position: relative;
      width: 80%;
      height: 30px;
    }

    #timeline-track {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 6px;
      transform: translateY(-50%);
      background-color: rgba(20, 20, 40, 0.8);
      border-radius: 8px;
      cursor: pointer;
    }

    #timeline-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: linear-gradient(90deg, #ff6b35, #ff9f43);
      border-radius: 8px;
      pointer-events: none;
    }

    #timeline-thumb {
      position: absolute;
      top: 50%;
      left: 0%;
      width: 20px;
      height: 20px;
      background-color: #ff6b35;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      cursor: grab;
      box-shadow: 0 0 12px rgba(255, 107, 53, 0.8),
        0 0 24px rgba(255, 107, 53, 0.4);
      transition: box-shadow 0.2s ease;
      z-index: 2;
    }

    #timeline-thumb:hover,
    #timeline-thumb:active {
      cursor: grabbing;
      box-shadow: 0 0 16px rgba(255, 107, 53, 1),
        0 0 32px rgba(255, 107, 53, 0.6);
    }

    #timeline-ticks {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 100%;
      pointer-events: none;
    }

    .timeline-tick {
      position: absolute;
      top: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .tick-line {
      width: 1px;
      height: 5px;
      background-color: rgba(255, 255, 255, 0.6);
    }

    .tick-label {
      margin-top: 18px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      white-space: nowrap;
    }

    #current-year-label {
      position: absolute;
      bottom: 62px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 16px;
      font-weight: 600;
      color: #ff6b35;
      text-shadow: 0 0 8px rgba(255, 107, 53, 0.5);
      pointer-events: none;
    }

    #info-card {
      position: absolute;
      top: 24px;
      left: 24px;
      width: 220px;
      padding: 16px;
      background-color: rgba(26, 26, 46, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      z-index: 20;
      opacity: 0;
      transform: translateY(-20px);
      transition: opacity 0.3s ease-out, transform 0.3s ease-out;
      pointer-events: none;
    }

    #info-card.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    #info-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    #info-card-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
    }

    #info-card-title {
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
      flex: 1;
    }

    #info-card-year {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 8px;
    }

    #info-card-type {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      margin-bottom: 10px;
    }

    #info-card-description {
      font-size: 12px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.8);
    }

    .type-war { background-color: rgba(231, 76, 60, 0.25); color: #e74c3c; }
    .type-culture { background-color: rgba(52, 152, 219, 0.25); color: #3498db; }
    .type-science { background-color: rgba(46, 204, 113, 0.25); color: #2ecc71; }
    .type-disaster { background-color: rgba(243, 156, 18, 0.25); color: #f39c12; }

    #legend {
      position: absolute;
      top: 24px;
      right: 24px;
      padding: 12px 16px;
      background-color: rgba(26, 26, 46, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      z-index: 10;
    }

    #legend-title {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .legend-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
    }

    #title {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.9);
      letter-spacing: 4px;
      z-index: 10;
      text-shadow: 0 0 20px rgba(255, 107, 53, 0.3);
    }

    #hint {
      position: absolute;
      bottom: 92px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div id="title">历史时间线回溯</div>

    <div id="hint">拖拽滑块回溯历史 · 点击粒子查看详情 · 鼠标拖拽旋转视角 · 滚轮缩放</div>

    <div id="legend">
      <div id="legend-title">事件类型</div>
      <div class="legend-item">
        <span class="legend-dot" style="background-color: #e74c3c;"></span>
        <span class="legend-label">战争</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot" style="background-color: #3498db;"></span>
        <span class="legend-label">文化</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot" style="background-color: #2ecc71;"></span>
        <span class="legend-label">科技</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot" style="background-color: #f39c12;"></span>
        <span class="legend-label">灾难</span>
      </div>
    </div>

    <div id="info-card">
      <div id="info-card-header">
        <div id="info-card-icon"></div>
        <div id="info-card-title"></div>
      </div>
      <div id="info-card-year"></div>
      <div id="info-card-type"></div>
      <div id="info-card-description"></div>
    </div>

    <div id="timeline-container">
      <div id="current-year-label">公元前 500 年</div>
      <div id="timeline-wrapper">
        <div id="timeline-track">
          <div id="timeline-fill" style="width: 0%;"></div>
        </div>
        <div id="timeline-thumb" style="left: 0%;"></div>
        <div id="timeline-ticks"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
