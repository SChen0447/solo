<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>潮汐地貌</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b0f19;
      color: #e0e6ed;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 300;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #ui-panel {
      position: absolute;
      bottom: 24px;
      right: 24px;
      width: 300px;
      padding: 20px 24px;
      background: rgba(10, 15, 30, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 10;
    }

    .panel-title {
      font-size: 16px;
      font-weight: 300;
      letter-spacing: 2px;
      margin-bottom: 20px;
      color: #e0e6ed;
      text-transform: uppercase;
    }

    .control-group {
      margin-bottom: 18px;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #e0e6ed;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .control-value {
      font-size: 13px;
      color: #73c6b6;
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, #2c3e50, #34495e);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3498db, #2980b9);
      cursor: pointer;
      transition: transform 0.2s ease-out;
      box-shadow: 0 0 10px rgba(52, 152, 219, 0.4);
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.1);
      box-shadow: 0 0 15px rgba(52, 152, 219, 0.6);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3498db, #2980b9);
      cursor: pointer;
      border: none;
      transition: transform 0.2s ease-out;
      box-shadow: 0 0 10px rgba(52, 152, 219, 0.4);
    }

    input[type="range"]::-moz-range-thumb:hover {
      transform: scale(1.1);
      box-shadow: 0 0 15px rgba(52, 152, 219, 0.6);
    }

    #randomize-btn {
      width: 100%;
      padding: 12px 20px;
      margin-top: 8px;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 2px;
      color: #e0e6ed;
      background: linear-gradient(135deg, rgba(52, 152, 219, 0.2), rgba(41, 128, 185, 0.3));
      border: 1px solid rgba(52, 152, 219, 0.4);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease-out;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
    }

    #randomize-btn:hover {
      background: linear-gradient(135deg, rgba(52, 152, 219, 0.35), rgba(41, 128, 185, 0.45));
      border-color: rgba(52, 152, 219, 0.6);
      transform: translateY(-1px);
    }

    #randomize-btn:active {
      transform: translateY(0);
    }

    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(52, 152, 219, 0.5);
      transform: scale(0);
      animation: ripple-effect 0.3s ease-out forwards;
      pointer-events: none;
    }

    @keyframes ripple-effect {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="ui-panel">
    <div class="panel-title">潮汐地貌</div>
    <div class="control-group">
      <div class="control-label">
        <span>海拔高度</span>
        <span class="control-value" id="elevation-value">0</span>
      </div>
      <input type="range" id="elevation-slider" min="-5" max="5" step="0.1" value="0" />
    </div>
    <div class="control-group">
      <div class="control-label">
        <span>水流强度</span>
        <span class="control-value" id="water-value">30</span>
      </div>
      <input type="range" id="water-slider" min="0" max="100" step="1" value="30" />
    </div>
    <div class="control-group">
      <div class="control-label">
        <span>植被密度</span>
        <span class="control-value" id="particle-value">100</span>
      </div>
      <input type="range" id="particle-slider" min="0" max="200" step="1" value="100" />
    </div>
    <button id="randomize-btn">随机地貌</button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
