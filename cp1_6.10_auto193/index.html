<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>记忆晶格 · Memory Lattice</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b0e1a;
    }
    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 30% 30%, #2a244a 0%, #1a1d3a 45%, #0b0e1a 100%);
    }
    #canvas-container {
      position: absolute;
      inset: 0;
    }
    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #ui-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    #ui-overlay > * {
      pointer-events: auto;
    }
    .info-card {
      position: absolute;
      top: 24px;
      left: 24px;
      min-width: 260px;
      max-width: 360px;
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(10, 10, 30, 0.8);
      border: 1px solid #48dbfb;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #e8ecff;
      opacity: 0;
      transform: scale(0.85);
      transform-origin: top left;
      transition: opacity 0.2s ease, transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      box-shadow: 0 0 24px rgba(72, 219, 251, 0.15);
    }
    .info-card.visible {
      opacity: 1;
      transform: scale(1);
    }
    .info-card .title {
      font-size: 15px;
      font-weight: 600;
      color: #48dbfb;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }
    .info-card .memory-text {
      font-size: 13px;
      line-height: 1.6;
      color: #c8cdf5;
    }
    .recombine-btn {
      position: absolute;
      right: 28px;
      bottom: 28px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 1px solid rgba(72, 219, 251, 0.6);
      background: rgba(72, 219, 251, 0.3);
      color: #e8ecff;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 16px rgba(72, 219, 251, 0.2);
      user-select: none;
    }
    .recombine-btn:hover {
      background: #48dbfb;
      color: #0b0e1a;
      transform: scale(1.05);
      box-shadow: 0 0 28px rgba(72, 219, 251, 0.5);
    }
    .recombine-btn:active {
      transform: scale(0.95);
    }
    .hint {
      position: absolute;
      bottom: 28px;
      left: 28px;
      font-size: 12px;
      color: rgba(200, 205, 245, 0.55);
      letter-spacing: 0.5px;
      line-height: 1.8;
    }
    .hint span {
      display: inline-block;
      padding: 2px 8px;
      margin-right: 6px;
      border-radius: 4px;
      background: rgba(72, 219, 251, 0.12);
      border: 1px solid rgba(72, 219, 251, 0.25);
      color: #8fd8ff;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="ui-overlay">
      <div id="info-card" class="info-card">
        <div class="title">记忆片段</div>
        <div class="memory-text" id="memory-text"></div>
      </div>
      <button id="recombine-btn" class="recombine-btn" title="手动重组">重组</button>
      <div class="hint">
        <div><span>拖拽</span>旋转视角</div>
        <div><span>滚轮</span>缩放</div>
        <div><span>点击</span>查看记忆</div>
        <div><span>Esc</span>关闭卡片</div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
