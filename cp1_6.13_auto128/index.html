<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星尘·调色盘</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, #0a0a2e 0%, #000000 70%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s ease-out;
    }

    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .nebula-logo {
      width: 120px;
      height: 120px;
      position: relative;
    }

    .nebula-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      border-radius: 50%;
      border: 2px solid transparent;
    }

    .nebula-ring-1 {
      width: 100px;
      height: 100px;
      margin: -50px 0 0 -50px;
      border-top-color: #9b59b6;
      border-right-color: #3498db;
      animation: spin 3s linear infinite;
    }

    .nebula-ring-2 {
      width: 70px;
      height: 70px;
      margin: -35px 0 0 -35px;
      border-bottom-color: #e91e9c;
      border-left-color: #1abc9c;
      animation: spin 2s linear infinite reverse;
    }

    .nebula-ring-3 {
      width: 40px;
      height: 40px;
      margin: -20px 0 0 -20px;
      border-top-color: #f39c12;
      border-right-color: #e67e22;
      animation: spin 1.5s linear infinite;
    }

    .nebula-core {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 16px;
      height: 16px;
      margin: -8px 0 0 -8px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff 0%, #9b59b6 40%, transparent 70%);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.4); opacity: 1; }
    }

    .loading-text {
      margin-top: 30px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      letter-spacing: 4px;
      animation: textFade 2s ease-in-out infinite;
    }

    @keyframes textFade {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    .ui-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    .btn-group {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
      z-index: 20;
      pointer-events: auto;
    }

    .btn {
      padding: 8px 20px;
      border-radius: 20px;
      border: 1px solid #9b59b6;
      background: transparent;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 1px;
      backdrop-filter: blur(4px);
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 100%;
      background: rgba(155, 89, 182, 0.3);
      transition: width 0.3s ease;
      z-index: -1;
    }

    .btn:hover::before {
      width: 100%;
    }

    .btn:hover {
      border-color: #bb7dd6;
      box-shadow: 0 0 15px rgba(155, 89, 182, 0.4);
    }

    .btn-save {
      border-color: #1abc9c;
    }

    .btn-save::before {
      background: rgba(26, 188, 156, 0.3);
    }

    .btn-save:hover {
      border-color: #2ed8a8;
      box-shadow: 0 0 15px rgba(26, 188, 156, 0.4);
    }

    #palette-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 70px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 15;
      pointer-events: auto;
      border-top: 1px solid rgba(155, 89, 182, 0.2);
    }

    .color-block {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: grab;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      flex-shrink: 0;
    }

    .color-block:hover {
      transform: scale(1.1);
    }

    .color-block.dragging {
      cursor: grabbing;
      opacity: 0.7;
      z-index: 100;
      position: fixed;
    }

    .hint-text {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.3);
      font-size: 12px;
      letter-spacing: 2px;
      z-index: 12;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="nebula-logo">
      <div class="nebula-ring nebula-ring-1"></div>
      <div class="nebula-ring nebula-ring-2"></div>
      <div class="nebula-ring nebula-ring-3"></div>
      <div class="nebula-core"></div>
    </div>
    <div class="loading-text">星 尘 · 调 色 盘</div>
  </div>

  <div id="app">
    <canvas id="canvas"></canvas>
    <div class="ui-layer"></div>
    <div class="btn-group">
      <button class="btn btn-save" id="btn-save">保存画作</button>
      <button class="btn" id="btn-reset">重置画布</button>
    </div>
    <div id="palette-bar"></div>
    <div class="hint-text" id="hint">拖拽色块到画布 · 双击触发星尘脉冲</div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
