<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>数字黏土塑形 - Digital Clay Sculptor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Cormorant Garamond', 'Times New Roman', serif;
      color: #c0c0c0;
      background: radial-gradient(ellipse at top, #0a1628 0%, #000510 50%, #000000 100%);
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* Loading Animation */
    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, #0a1628 0%, #000510 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.6s ease-out;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-clay {
      width: 80px;
      height: 80px;
      position: relative;
      margin-bottom: 30px;
    }

    .loading-clay-sphere {
      width: 60px;
      height: 60px;
      background: radial-gradient(circle at 30% 30%, #e8e4dc, #b8b4ac 60%, #8a8680 100%);
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: inset -8px -8px 20px rgba(0, 0, 0, 0.3),
                  0 4px 20px rgba(0, 0, 0, 0.5);
      animation: claySpin 2s ease-in-out infinite;
    }

    .loading-clay-disc {
      width: 70px;
      height: 12px;
      background: linear-gradient(90deg, #1a1a1a, #2a2a2a, #1a1a1a);
      border-radius: 50%;
      position: absolute;
      bottom: 5px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 10px rgba(100, 150, 255, 0.3);
      animation: discSpin 2s linear infinite;
    }

    .loading-text {
      font-size: 18px;
      letter-spacing: 3px;
      color: #8a9aaa;
      font-weight: 300;
    }

    @keyframes claySpin {
      0%, 100% { transform: translate(-50%, -50%) rotateY(0deg); }
      50% { transform: translate(-50%, -50%) rotateY(180deg); }
    }

    @keyframes discSpin {
      0% { transform: translateX(-50%) rotate(0deg); }
      100% { transform: translateX(-50%) rotate(360deg); }
    }

    /* Control Panel */
    #control-panel {
      position: fixed;
      left: 24px;
      top: 50%;
      transform: translateY(-50%);
      width: 260px;
      padding: 24px;
      background: rgba(20, 30, 50, 0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      z-index: 100;
      transition: all 0.3s ease;
    }

    .panel-title {
      font-size: 18px;
      font-weight: 500;
      color: #d0d8e0;
      margin-bottom: 20px;
      letter-spacing: 2px;
      text-align: center;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .control-group {
      margin-bottom: 20px;
    }

    .control-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: #a0a8b0;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .control-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Brush icon - dashed circle */
    .icon-brush {
      width: 16px;
      height: 16px;
      border: 1.5px dashed #8a9aaa;
      border-radius: 50%;
    }

    /* Strength icon - spring */
    .icon-strength {
      width: 18px;
      height: 14px;
      position: relative;
    }

    .icon-strength::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 1.5px solid #8a9aaa;
      border-radius: 3px;
      clip-path: polygon(0% 0%, 20% 0%, 20% 50%, 40% 50%, 40% 0%, 60% 0%, 60% 50%, 80% 50%, 80% 0%, 100% 0%, 100% 100%, 80% 100%, 80% 50%, 60% 50%, 60% 100%, 40% 100%, 40% 50%, 20% 50%, 20% 100%, 0% 100%);
    }

    /* Direction icon */
    .icon-direction {
      width: 16px;
      height: 16px;
      position: relative;
    }

    .icon-direction::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 10px;
      height: 10px;
      border: 1.5px solid #8a9aaa;
      border-radius: 50%;
    }

    .icon-direction::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 4px;
      height: 4px;
      background: #8a9aaa;
      border-radius: 50%;
    }

    /* Slider styles */
    .slider-container {
      position: relative;
      width: 100%;
      height: 6px;
    }

    .slider-track {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .slider-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcf7f);
      border-radius: 3px;
      transition: width 0.1s ease;
    }

    input[type="range"] {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      margin: 0;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .slider-value {
      text-align: right;
      font-size: 13px;
      color: #7a828a;
      margin-top: 6px;
      font-variant-numeric: tabular-nums;
    }

    /* Direction toggle - flip card */
    .direction-toggle {
      perspective: 800px;
      width: 100%;
      height: 40px;
      cursor: pointer;
    }

    .direction-toggle-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }

    .direction-toggle.flipped .direction-toggle-inner {
      transform: rotateX(180deg);
    }

    .direction-front,
    .direction-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 14px;
      letter-spacing: 2px;
      font-weight: 500;
    }

    .direction-front {
      background: rgba(255, 107, 107, 0.2);
      border: 1px solid rgba(255, 107, 107, 0.4);
      color: #ff8a8a;
    }

    .direction-back {
      background: rgba(107, 167, 255, 0.2);
      border: 1px solid rgba(107, 167, 255, 0.4);
      color: #8ab4ff;
      transform: rotateX(180deg);
    }

    /* Brush cursor */
    #brush-cursor {
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      border: 2px solid rgba(255, 107, 107, 0.6);
      background: rgba(255, 107, 107, 0.15);
      transform: translate(-50%, -50%);
      z-index: 500;
      display: none;
      transition: border-color 0.2s ease, background-color 0.2s ease;
    }

    #brush-cursor.bulge {
      border-color: rgba(107, 167, 255, 0.6);
      background: rgba(107, 167, 255, 0.15);
    }

    /* Info hint */
    .info-hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      color: #5a6678;
      letter-spacing: 1px;
      z-index: 50;
      text-align: center;
    }

    .info-hint span {
      margin: 0 8px;
      opacity: 0.7;
    }

    /* Mobile styles */
    @media (max-width: 768px) {
      #control-panel {
        left: 50%;
        top: auto;
        bottom: 16px;
        transform: translateX(-50%);
        width: calc(100% - 32px);
        max-width: 400px;
        padding: 16px;
      }

      .panel-title {
        font-size: 16px;
        margin-bottom: 12px;
        padding-bottom: 8px;
      }

      .control-group {
        margin-bottom: 12px;
      }

      .control-label {
        font-size: 13px;
        margin-bottom: 8px;
      }

      .info-hint {
        bottom: auto;
        top: 16px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <!-- Loading Overlay -->
    <div id="loading-overlay">
      <div class="loading-clay">
        <div class="loading-clay-sphere"></div>
        <div class="loading-clay-disc"></div>
      </div>
      <div class="loading-text">PREPARING CLAY...</div>
    </div>

    <!-- Control Panel -->
    <div id="control-panel">
      <div class="panel-title">雕 刻 参 数</div>

      <div class="control-group">
        <div class="control-label">
          <div class="control-icon">
            <div class="icon-brush"></div>
          </div>
          <span>笔刷半径</span>
        </div>
        <div class="slider-container">
          <div class="slider-track">
            <div class="slider-fill" id="brush-radius-fill" style="width: 25%"></div>
          </div>
          <input type="range" id="brush-radius" min="0.1" max="0.5" step="0.01" value="0.2" />
        </div>
        <div class="slider-value" id="brush-radius-value">0.20</div>
      </div>

      <div class="control-group">
        <div class="control-label">
          <div class="control-icon">
            <div class="icon-strength"></div>
          </div>
          <span>强 度</span>
        </div>
        <div class="slider-container">
          <div class="slider-track">
            <div class="slider-fill" id="strength-fill" style="width: 50%"></div>
          </div>
          <input type="range" id="strength" min="0.1" max="1.0" step="0.01" value="0.5" />
        </div>
        <div class="slider-value" id="strength-value">0.50</div>
      </div>

      <div class="control-group">
        <div class="control-label">
          <div class="control-icon">
            <div class="icon-direction"></div>
          </div>
          <span>变形方向</span>
        </div>
        <div class="direction-toggle" id="direction-toggle">
          <div class="direction-toggle-inner">
            <div class="direction-front">凹 陷</div>
            <div class="direction-back">凸 起</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Brush Cursor -->
    <div id="brush-cursor"></div>

    <!-- Info Hint -->
    <div class="info-hint">
      <span>拖拽旋转视角</span> | <span>左键塑形</span> | <span>R 重置</span>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
