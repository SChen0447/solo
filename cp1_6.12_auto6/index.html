<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>战术回合制对战</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0b0e14 0%, #1a2634 100%);
      color: #ffffff;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    #scoreboard {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 80px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 40px;
      z-index: 10;
      background: rgba(11, 14, 20, 0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(58, 95, 138, 0.3);
    }

    .player-panel {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 24px;
      border-radius: 12px;
      transition: all 0.3s ease;
      min-width: 200px;
    }

    .player-panel.red {
      border: 2px solid rgba(255, 77, 77, 0.3);
    }

    .player-panel.blue {
      border: 2px solid rgba(77, 166, 255, 0.3);
    }

    .player-panel.active.red {
      border-color: #ff4d4d;
      animation: breathe-red 1s ease-in-out infinite;
    }

    .player-panel.active.blue {
      border-color: #4da6ff;
      animation: breathe-blue 1s ease-in-out infinite;
    }

    @keyframes breathe-red {
      0%, 100% {
        box-shadow: 0 0 10px rgba(255, 77, 77, 0.3);
      }
      50% {
        box-shadow: 0 0 25px rgba(255, 77, 77, 0.7);
      }
    }

    @keyframes breathe-blue {
      0%, 100% {
        box-shadow: 0 0 10px rgba(77, 166, 255, 0.3);
      }
      50% {
        box-shadow: 0 0 25px rgba(77, 166, 255, 0.7);
      }
    }

    .player-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
    }

    .player-icon.red {
      background: radial-gradient(circle at 35% 35%, #ff8a8a, #ff4d4d 60%, #cc3d3d);
      box-shadow: 0 2px 8px rgba(255, 77, 77, 0.5);
    }

    .player-icon.blue {
      background: radial-gradient(circle at 35% 35%, #8acaff, #4da6ff 60%, #3d85cc);
      box-shadow: 0 2px 8px rgba(77, 166, 255, 0.5);
    }

    .player-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .player-name {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .player-score {
      font-size: 28px;
      font-weight: 700;
    }

    .mode-switch {
      padding: 8px 16px;
      border: 1px solid rgba(58, 95, 138, 0.5);
      background: rgba(58, 95, 138, 0.15);
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .mode-switch:hover {
      background: rgba(58, 95, 138, 0.3);
      border-color: rgba(58, 95, 138, 0.8);
    }

    .turn-indicator {
      position: fixed;
      top: 90px;
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 20px;
      background: rgba(58, 95, 138, 0.2);
      border-radius: 20px;
      font-size: 14px;
      z-index: 5;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding-top: 80px;
    }

    canvas {
      display: block;
    }

    .game-over-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(11, 14, 20, 0.9);
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .game-over-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .game-over-panel {
      background: linear-gradient(145deg, #1a2634, #0f1620);
      border: 1px solid rgba(58, 95, 138, 0.4);
      border-radius: 20px;
      padding: 48px 64px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      min-width: 400px;
    }

    .game-over-title {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #4da6ff, #ff4d4d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .winner-text {
      font-size: 24px;
      margin-bottom: 32px;
      font-weight: 600;
    }

    .winner-text.red {
      color: #ff4d4d;
    }

    .winner-text.blue {
      color: #4da6ff;
    }

    .winner-text.draw {
      color: #a0a8b0;
    }

    .stats-container {
      display: flex;
      justify-content: space-around;
      margin-bottom: 32px;
      gap: 32px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stat-label {
      font-size: 14px;
      color: #8892a0;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
    }

    .stat-value.red {
      color: #ff4d4d;
    }

    .stat-value.blue {
      color: #4da6ff;
    }

    .stat-value.neutral {
      color: #ffffff;
    }

    .buttons-container {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    .game-btn {
      padding: 14px 32px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.5px;
    }

    .game-btn.primary {
      background: linear-gradient(135deg, #4da6ff, #3d85cc);
      color: #fff;
      box-shadow: 0 4px 15px rgba(77, 166, 255, 0.3);
    }

    .game-btn.primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(77, 166, 255, 0.5);
    }

    .game-btn.secondary {
      background: rgba(58, 95, 138, 0.2);
      color: #fff;
      border: 1px solid rgba(58, 95, 138, 0.5);
    }

    .game-btn.secondary:hover {
      background: rgba(58, 95, 138, 0.35);
      transform: translateY(-2px);
    }

    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 12px 28px;
      background: rgba(255, 77, 77, 0.9);
      color: #fff;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .toast.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="scoreboard">
      <div class="player-panel red" id="player-red">
        <div class="player-icon red"></div>
        <div class="player-info">
          <div class="player-name">红方</div>
          <div class="player-score" id="score-red">0</div>
        </div>
      </div>

      <button class="mode-switch" id="mode-switch">模式：人机对战</button>

      <div class="player-panel blue" id="player-blue">
        <div class="player-info" style="text-align: right;">
          <div class="player-name">蓝方</div>
          <div class="player-score" id="score-blue">0</div>
        </div>
        <div class="player-icon blue"></div>
      </div>
    </div>

    <div class="turn-indicator" id="turn-indicator">
      第 <span id="turn-count">1</span> 回合 - <span id="current-player-name">红方</span> 行动
    </div>

    <div id="canvas-container">
      <canvas id="game-canvas"></canvas>
    </div>

    <div class="game-over-overlay" id="game-over-overlay">
      <div class="game-over-panel">
        <div class="game-over-title">游戏结束</div>
        <div class="winner-text" id="winner-text">红方获胜！</div>
        <div class="stats-container">
          <div class="stat-item">
            <div class="stat-label">红方得分</div>
            <div class="stat-value red" id="final-score-red">0</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">总回合数</div>
            <div class="stat-value neutral" id="final-turns">0</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">蓝方得分</div>
            <div class="stat-value blue" id="final-score-blue">0</div>
          </div>
        </div>
        <div class="buttons-container">
          <button class="game-btn primary" id="restart-btn">再来一局</button>
          <button class="game-btn secondary" id="switch-mode-btn">切换模式</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
