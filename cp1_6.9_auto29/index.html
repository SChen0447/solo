<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星云造物主 - Nebula Cosmos</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #000008;
      color: #e0e0ff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    .control-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 280px;
      padding: 20px;
      background: rgba(10, 10, 30, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 0.5px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(100, 150, 255, 0.3);
      z-index: 100;
      transition: all 0.3s ease;
    }

    .panel-title {
      font-size: 16px;
      font-weight: 600;
      color: #a0b0ff;
      margin-bottom: 16px;
      text-shadow: 0 0 10px rgba(100, 150, 255, 0.5);
    }

    .stats-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
    }

    .stats-row:last-of-type {
      border-bottom: none;
    }

    .stats-label {
      font-size: 13px;
      color: #8090b0;
    }

    .stats-value {
      font-size: 15px;
      font-weight: 600;
      color: #c0d0ff;
    }

    .control-group {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 0.5px solid rgba(255, 255, 255, 0.1);
    }

    .control-label {
      font-size: 13px;
      color: #8090b0;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }

    .control-label span {
      color: #c0d0ff;
      font-weight: 600;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(100, 150, 255, 0.2);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #80a0ff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(128, 160, 255, 0.6);
      transition: all 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: #a0c0ff;
      box-shadow: 0 0 15px rgba(160, 192, 255, 0.8);
    }

    .info-hint {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 0.5px solid rgba(255, 255, 255, 0.1);
      font-size: 11px;
      color: #607090;
      line-height: 1.6;
    }

    .info-hint kbd {
      display: inline-block;
      padding: 2px 6px;
      background: rgba(100, 150, 255, 0.2);
      border: 0.5px solid rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      font-family: monospace;
      color: #a0b0ff;
    }

    .panel-toggle {
      display: none;
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      background: rgba(10, 10, 30, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 0.5px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(100, 150, 255, 0.3);
      cursor: pointer;
      z-index: 100;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #a0b0ff;
    }

    .panel-toggle:hover {
      box-shadow: 0 0 30px rgba(100, 150, 255, 0.5);
    }

    @media (max-width: 768px) {
      .control-panel {
        position: absolute;
        top: auto;
        right: 20px;
        bottom: 80px;
        width: calc(100% - 40px);
        transform: translateY(150%);
      }

      .control-panel.open {
        transform: translateY(0);
      }

      .panel-toggle {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
