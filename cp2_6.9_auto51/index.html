<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>水墨书法 - 交互式书法应用</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Brush Script MT', 'Segoe Script', cursive;
      background: #2C1810;
      color: #D4AF37;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    #app {
      display: flex;
      width: 100%;
      height: 100%;
      position: relative;
    }

    .toolbar {
      width: 80px;
      background: linear-gradient(180deg, #5C4033 0%, #3E2A20 50%, #5C4033 100%);
      border-right: 3px solid #8B4513;
      box-shadow: 
        inset 2px 0 4px rgba(0,0,0,0.3),
        inset -2px 0 4px rgba(255,215,0,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 8px;
      gap: 12px;
      z-index: 10;
      position: relative;
    }

    .toolbar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 2px,
          rgba(0,0,0,0.03) 2px,
          rgba(0,0,0,0.03) 4px
        ),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 6px,
          rgba(139,69,19,0.08) 6px,
          rgba(139,69,19,0.08) 7px
        );
      pointer-events: none;
    }

    .tool-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 100%;
      position: relative;
    }

    .tool-label {
      font-size: 13px;
      color: #D4AF37;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
      white-space: nowrap;
    }

    .style-btn {
      width: 60px;
      height: 36px;
      background: linear-gradient(145deg, #6B4A3A, #4A3428);
      border: 2px solid #8B4513;
      border-radius: 6px;
      color: #D4AF37;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.1s ease;
      box-shadow: 
        2px 2px 4px rgba(0,0,0,0.4),
        inset 1px 1px 2px rgba(255,215,0,0.1);
      position: relative;
    }

    .style-btn:hover {
      background: linear-gradient(145deg, #7B5A4A, #5A4438);
      transform: translateY(-1px);
    }

    .style-btn:active,
    .style-btn.active {
      transform: translateY(1px) scale(0.98);
      box-shadow: 
        inset 2px 2px 4px rgba(0,0,0,0.4),
        inset -1px -1px 2px rgba(255,215,0,0.1);
      background: linear-gradient(145deg, #4A3428, #6B4A3A);
    }

    .style-btn.active::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 8px;
      background: #D4AF37;
      border-radius: 50%;
      box-shadow: 0 0 6px #D4AF37;
    }

    .color-picker-wrapper {
      position: relative;
    }

    .color-picker-trigger {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 3px solid #8B4513;
      cursor: pointer;
      box-shadow: 
        2px 2px 6px rgba(0,0,0,0.4),
        inset 0 0 10px rgba(0,0,0,0.2);
      transition: transform 0.1s ease;
    }

    .color-picker-trigger:hover {
      transform: scale(1.08);
    }

    .color-picker-trigger:active {
      transform: scale(0.95);
    }

    .color-picker-panel {
      position: absolute;
      left: 72px;
      top: 50%;
      transform: translateY(-50%) scale(0.9);
      background: rgba(44, 24, 16, 0.95);
      border: 2px solid #8B4513;
      border-radius: 10px;
      padding: 10px;
      display: none;
      flex-direction: column;
      gap: 8px;
      box-shadow: 4px 4px 12px rgba(0,0,0,0.5);
      z-index: 100;
      opacity: 0;
      transition: all 0.2s ease;
    }

    .color-picker-panel.show {
      display: flex;
      opacity: 1;
      transform: translateY(-50%) scale(1);
    }

    .color-swatch {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .color-swatch:hover {
      transform: scale(1.15);
      border-color: #D4AF37;
    }

    .color-swatch.selected {
      border-color: #D4AF37;
      box-shadow: 0 0 10px #D4AF37;
    }

    .slider-wrapper {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 4px;
      width: 100%;
      justify-content: center;
    }

    .ink-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 50px;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, #333 0%, #8B4513 100%);
      outline: none;
      cursor: pointer;
    }

    .ink-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(145deg, #D4AF37, #B8860B);
      border: 2px solid #8B4513;
      cursor: pointer;
      box-shadow: 1px 1px 3px rgba(0,0,0,0.4);
      transition: transform 0.1s ease;
    }

    .ink-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .ink-slider::-webkit-slider-thumb:active {
      transform: scale(0.9) translateY(1px);
    }

    .ink-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(145deg, #D4AF37, #B8860B);
      border: 2px solid #8B4513;
      cursor: pointer;
    }

    .slider-value {
      font-size: 12px;
      color: #D4AF37;
      min-width: 28px;
      text-align: center;
      background: rgba(0,0,0,0.3);
      padding: 2px 4px;
      border-radius: 4px;
    }

    .toggle-switch {
      position: relative;
      width: 48px;
      height: 24px;
      background: #333;
      border-radius: 12px;
      cursor: pointer;
      border: 2px solid #8B4513;
      transition: background 0.2s ease;
    }

    .toggle-switch.active {
      background: linear-gradient(90deg, #8B4513, #D4AF37);
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 1px;
      left: 1px;
      width: 18px;
      height: 18px;
      background: linear-gradient(145deg, #D4AF37, #B8860B);
      border-radius: 50%;
      transition: transform 0.2s cubic-bezier(0.68, -0.55, 0.27, 1.55);
      box-shadow: 1px 1px 3px rgba(0,0,0,0.4);
    }

    .toggle-switch.active::after {
      transform: translateX(24px);
    }

    .clear-btn {
      width: 60px;
      height: 36px;
      background: linear-gradient(145deg, #8B2500, #5C1A00);
      border: 2px solid #A52A2A;
      border-radius: 6px;
      color: #FFD700;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.1s ease;
      box-shadow: 2px 2px 4px rgba(0,0,0,0.4);
      margin-top: auto;
    }

    .clear-btn:hover {
      background: linear-gradient(145deg, #A52A2A, #8B2500);
    }

    .clear-btn:active {
      transform: translateY(1px) scale(0.98);
      box-shadow: inset 2px 2px 4px rgba(0,0,0,0.4);
    }

    .canvas-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .canvas-frame {
      position: relative;
      padding: 20px;
      background: 
        linear-gradient(45deg, #8B0000 25%, transparent 25%),
        linear-gradient(-45deg, #8B0000 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #A52A2A 75%),
        linear-gradient(-45deg, transparent 75%, #A52A2A 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      border-radius: 4px;
      box-shadow: 
        0 0 30px rgba(0,0,0,0.6),
        inset 0 0 20px rgba(0,0,0,0.3);
    }

    .canvas-frame::before,
    .canvas-frame::after {
      content: '';
      position: absolute;
      background: linear-gradient(90deg, #6B0000, #8B0000, #6B0000);
      z-index: 1;
    }

    .canvas-frame::before {
      top: 0;
      left: 0;
      right: 0;
      height: 20px;
      background: 
        repeating-linear-gradient(
          90deg,
          #8B0000 0px, #A52A2A 4px, #8B0000 8px, #6B0000 12px, #8B0000 16px
        );
    }

    .canvas-frame::after {
      bottom: 0;
      left: 0;
      right: 0;
      height: 20px;
      background: 
        repeating-linear-gradient(
          90deg,
          #8B0000 0px, #A52A2A 4px, #8B0000 8px, #6B0000 12px, #8B0000 16px
        );
    }

    .canvas-inner {
      position: relative;
      background: 
        repeating-linear-gradient(
          0deg,
          #8B0000 0px, #A52A2A 4px, #8B0000 8px, #6B0000 12px, #8B0000 16px
        );
      padding: 8px;
    }

    .canvas-inner::before,
    .canvas-inner::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      width: 8px;
      background: 
        repeating-linear-gradient(
          0deg,
          #8B0000 0px, #A52A2A 4px, #8B0000 8px, #6B0000 12px, #8B0000 16px
        );
      z-index: 1;
    }

    .canvas-inner::before { left: 0; }
    .canvas-inner::after { right: 0; }

    #mainCanvas {
      display: block;
      background: #F5F0E1;
      cursor: crosshair;
      touch-action: none;
    }

    .status-panel {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(44, 24, 16, 0.85);
      border: 2px solid #8B4513;
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 20;
      box-shadow: 2px 2px 8px rgba(0,0,0,0.4);
      min-width: 140px;
    }

    .status-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .status-label {
      font-size: 12px;
      color: #D4AF37;
      opacity: 0.8;
    }

    .status-value-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .speed-bar {
      flex: 1;
      height: 8px;
      background: #333;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .speed-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #4A90D9, #50C878, #FFD700, #FF4500);
      border-radius: 4px;
      width: 0%;
      transition: width 0.05s linear;
    }

    .ink-display {
      width: 100%;
      height: 12px;
      background: #333;
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }

    .ink-fill {
      height: 100%;
      background: linear-gradient(90deg, #1A1A1A, #4A4A4A);
      border-radius: 6px;
      transition: width 0.1s ease;
    }

    .ink-fill.low {
      background: linear-gradient(90deg, #8B4513, #CD853F);
    }

    .ink-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 10px;
      color: #FFF;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }

    @media (max-width: 767px) {
      #app {
        flex-direction: column;
      }

      .toolbar {
        width: 100%;
        height: 80px;
        flex-direction: row;
        border-right: none;
        border-top: 3px solid #8B4513;
        padding: 8px 16px;
        gap: 16px;
        order: 2;
      }

      .canvas-container {
        order: 1;
        padding: 12px;
      }

      .tool-group {
        flex-direction: row;
        width: auto;
      }

      .tool-label {
        display: none;
      }

      .color-picker-panel {
        left: 50%;
        top: auto;
        bottom: 88px;
        transform: translateX(-50%) scale(0.9);
        flex-direction: row;
      }

      .color-picker-panel.show {
        transform: translateX(-50%) scale(1);
      }

      .status-panel {
        top: 8px;
        right: 8px;
        padding: 8px 12px;
        min-width: 120px;
      }

      .ink-slider {
        width: 60px;
      }

      .canvas-frame {
        padding: 12px;
      }

      .canvas-inner {
        padding: 4px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <aside class="toolbar" id="toolbar">
      <div class="tool-group">
        <span class="tool-label">字体</span>
        <button class="style-btn active" data-style="kaishu">楷</button>
        <button class="style-btn" data-style="xingshu">行</button>
        <button class="style-btn" data-style="caoshu">草</button>
      </div>

      <div class="tool-group">
        <span class="tool-label">墨色</span>
        <div class="color-picker-wrapper">
          <div class="color-picker-trigger" id="colorTrigger" style="background: #0D0D0D;"></div>
          <div class="color-picker-panel" id="colorPanel">
            <div class="color-swatch selected" data-color="#0D0D0D" style="background: #0D0D0D;" title="浓墨"></div>
            <div class="color-swatch" data-color="#1A1A1A" style="background: #1A1A1A;" title="焦墨"></div>
            <div class="color-swatch" data-color="#333333" style="background: #333333;" title="宿墨"></div>
            <div class="color-swatch" data-color="#4A4A4A" style="background: #4A4A4A;" title="淡墨"></div>
            <div class="color-swatch" data-color="#B22222" style="background: #B22222;" title="朱砂"></div>
          </div>
        </div>
      </div>

      <div class="tool-group">
        <span class="tool-label">墨量</span>
        <div class="slider-wrapper">
          <div class="slider-row">
            <input type="range" class="ink-slider" id="inkSlider" min="0" max="100" value="100">
            <span class="slider-value" id="inkValue">100</span>
          </div>
        </div>
      </div>

      <div class="tool-group">
        <span class="tool-label">纸纹</span>
        <div class="toggle-switch active" id="textureToggle"></div>
      </div>

      <button class="clear-btn" id="clearBtn">清空</button>
    </aside>

    <main class="canvas-container">
      <div class="canvas-frame">
        <div class="canvas-inner">
          <canvas id="mainCanvas"></canvas>
        </div>
      </div>

      <div class="status-panel" id="statusPanel">
        <div class="status-item">
          <span class="status-label">书写速度</span>
          <div class="status-value-row">
            <div class="speed-bar">
              <div class="speed-bar-fill" id="speedFill"></div>
            </div>
          </div>
        </div>
        <div class="status-item">
          <span class="status-label">剩余墨量</span>
          <div class="ink-display">
            <div class="ink-fill" id="inkFill" style="width: 100%;"></div>
            <span class="ink-text" id="inkText">100%</span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
