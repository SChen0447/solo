<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>符语·星仪</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #040720 0%, #0a0e27 100%);
      cursor: crosshair;
    }
    
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    
    .title {
      position: fixed;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.6);
      font-family: 'Times New Roman', serif;
      font-size: 24px;
      letter-spacing: 8px;
      pointer-events: none;
      text-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
    }
    
    .hint {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.4);
      font-family: 'Arial', sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="title">符 语 · 星 仪</div>
    <div class="hint">鼠标悬停探索符文 · 点击激活共鸣 · 拖拽旋转视角</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
