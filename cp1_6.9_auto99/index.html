<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fluid Particle Sandbox</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse at top, #0a0a1a 0%, #1a1a2e 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    #canvas-container {
      position: relative;
      border: 1px solid #4a8aff33;
      border-radius: 4px;
    }

    #canvas-container canvas {
      display: block;
      cursor: default;
    }

    #canvas-container canvas:hover {
      cursor: crosshair;
    }

    #ui-hint {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #ffffffcc;
      font-size: 14px;
      line-height: 1.8;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
      pointer-events: none;
      z-index: 10;
    }

    #ui-hint .hint-line {
      display: block;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #ui-hint .hint-line.visible {
      opacity: 1;
    }

    #mode-indicator {
      position: fixed;
      top: 20px;
      right: 20px;
      color: #ffffffcc;
      font-size: 14px;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
      z-index: 10;
      transition: opacity 0.3s ease;
    }

    #mode-indicator.fade {
      opacity: 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="ui-hint">
      <span class="hint-line visible">🖱️ 拖动鼠标注入彩色粒子</span>
      <span class="hint-line visible">💥 点击产生爆炸</span>
      <span class="hint-line visible">🔄 按 P 切换模式</span>
      <span class="hint-line visible">🗑️ 空格清空</span>
    </div>
    <div id="mode-indicator">模式: 流体渲染</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
