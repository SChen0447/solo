<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>像素炼金术 - Pixel Alchemy</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: #1F1F2A;
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-container {
      position: relative;
      width: 600px;
      height: 600px;
    }

    #game-canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: default;
    }

    .toast {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 16px;
      background: rgba(42, 42, 58, 0.85);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 2px solid #555566;
      border-radius: 4px;
      color: #FFFFFF;
      font-size: 14px;
      letter-spacing: 1px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      box-shadow: inset 0 0 4px rgba(0,0,0,0.5);
    }

    .toast.show {
      opacity: 1;
    }

    .tutorial {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      padding: 20px 24px;
      background: rgba(30, 30, 42, 0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 2px solid #666677;
      border-radius: 6px;
      color: #FFFFFF;
      font-size: 14px;
      line-height: 1.6;
      text-align: center;
      letter-spacing: 0.5px;
      opacity: 0;
      transition: opacity 0.5s ease;
      box-shadow: inset 0 0 8px rgba(0,0,0,0.6), 0 4px 20px rgba(0,0,0,0.4);
      z-index: 10;
    }

    .tutorial.show {
      opacity: 1;
    }

    .recipe-panel {
      position: absolute;
      top: 140px;
      left: 50%;
      transform: translateX(-50%);
      width: 240px;
      height: 160px;
      padding: 10px;
      background: rgba(42, 42, 58, 0.9);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: 2px solid #555566;
      border-radius: 4px;
      overflow-y: auto;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      box-shadow: inset 0 0 6px rgba(0,0,0,0.5);
      z-index: 5;
    }

    .recipe-panel.show {
      opacity: 1;
      pointer-events: auto;
    }

    .recipe-panel::-webkit-scrollbar {
      width: 6px;
    }

    .recipe-panel::-webkit-scrollbar-track {
      background: #2A2A3A;
    }

    .recipe-panel::-webkit-scrollbar-thumb {
      background: #555566;
      border-radius: 3px;
    }

    .recipe-item {
      padding: 6px 8px;
      margin-bottom: 4px;
      color: #FFFFFF;
      font-size: 12px;
      border-radius: 2px;
      transition: background 0.15s ease;
    }

    .recipe-item:hover {
      background: rgba(120, 120, 160, 0.3);
    }

    .recipe-item.unknown {
      color: #888899;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="game-container">
      <canvas id="game-canvas" width="600" height="600"></canvas>
      <div id="toast" class="toast"></div>
      <div id="tutorial" class="tutorial">拖动元素到熔炉合成新物质，点击右下角探索地图寻找隐藏配方！</div>
      <div id="recipe-panel" class="recipe-panel"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
