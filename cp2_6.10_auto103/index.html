<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2D RPG 对话沙盒</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #2d3436;
      color: #dfe6e9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      user-select: none;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* 顶部工具栏 */
    #toolbar {
      height: 48px;
      background: #1e272e;
      border-bottom: 1px solid #3d464d;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      flex-shrink: 0;
    }

    .toolbar-title {
      font-size: 16px;
      font-weight: 600;
      margin-right: auto;
      color: #74b9ff;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: #0984e3;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:hover {
      background: #0a6dc1;
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn-secondary {
      background: #636e72;
    }

    .btn-secondary:hover {
      background: #4a5356;
    }

    /* 主体区域 */
    #main-area {
      flex: 1;
      display: flex;
      position: relative;
      overflow: hidden;
    }

    /* 左侧角色面板 */
    #left-panel {
      width: 150px;
      background: #1e272e;
      border-right: 1px solid #3d464d;
      padding: 16px 12px;
      flex-shrink: 0;
      transition: transform 0.3s ease;
    }

    .panel-title {
      font-size: 13px;
      font-weight: 600;
      color: #74b9ff;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #3d464d;
    }

    .character-preview {
      text-align: center;
      margin-bottom: 16px;
    }

    .character-preview svg {
      background: #2d3436;
      border-radius: 8px;
      padding: 8px;
    }

    .character-name {
      margin-top: 8px;
      font-size: 12px;
      color: #dfe6e9;
    }

    /* 折叠按钮（响应式） */
    #panel-toggle-btn {
      display: none;
      position: absolute;
      left: 0;
      top: 12px;
      z-index: 100;
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 0 6px 6px 0;
      background: #1e272e;
      color: #dfe6e9;
      cursor: pointer;
      font-size: 18px;
      transition: background 0.2s;
    }

    #panel-toggle-btn:hover {
      background: #3d464d;
    }

    /* 中央画布区域 */
    #canvas-wrapper {
      flex: 1;
      min-width: 800px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #2d3436;
      position: relative;
      overflow: auto;
    }

    #scene-canvas {
      background: #2d3436;
      border-radius: 8px;
      display: block;
    }

    /* 右侧情感面板 */
    #right-panel {
      width: 150px;
      background: #1e272e;
      border-left: 1px solid #3d464d;
      padding: 16px 12px;
      flex-shrink: 0;
    }

    .emotion-section {
      margin-bottom: 20px;
    }

    .emotion-label {
      font-size: 12px;
      color: #b2bec3;
      margin-bottom: 6px;
    }

    .emotion-select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #3d464d;
      border-radius: 4px;
      background: #2d3436;
      color: #dfe6e9;
      font-size: 12px;
      cursor: pointer;
    }

    .emotion-select:focus {
      outline: none;
      border-color: #74b9ff;
    }

    /* 底部时间线容器 */
    #timeline-container {
      background: #1e272e;
      border-top: 1px solid #3d464d;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      max-height: 120px;
      min-height: 80px;
    }

    #timeline-bar {
      height: 80px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      position: relative;
      overflow-x: auto;
      overflow-y: hidden;
    }

    #timeline-track {
      height: 100%;
      position: relative;
      display: flex;
      align-items: center;
      flex: 1;
      min-width: 500px;
    }

    #timeline-grid {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
    }

    .timeline-node {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      cursor: grab;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: #2d3436;
      transition: transform 0.1s, box-shadow 0.2s;
      top: 50%;
      transform: translateY(-50%);
    }

    .timeline-node:hover {
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
    }

    .timeline-node:active {
      cursor: grabbing;
    }

    .timeline-node.current {
      box-shadow: 0 0 0 3px #00b894, 0 0 16px rgba(0, 184, 148, 0.5);
    }

    .timeline-node.dialogue {
      background: #74b9ff;
    }

    .timeline-node.choice {
      background: #fdcb6e;
    }

    .timeline-node.jump {
      background: #a29bfe;
    }

    .timeline-node.dragging {
      z-index: 10;
      opacity: 0.8;
      transition: none;
    }

    .play-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: #00b894;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    .play-btn:hover {
      background: #00a381;
    }

    .play-btn:active {
      transform: scale(0.95);
    }

    .play-btn.playing {
      background: #e17055;
    }

    .play-btn.playing:hover {
      background: #c95d45;
    }

    /* 分支路径图 */
    #branch-graph {
      padding: 8px 16px;
      min-height: 40px;
      display: none;
      border-top: 1px solid #3d464d;
      overflow-x: auto;
    }

    #branch-graph.visible {
      display: block;
    }

    #branch-graph svg {
      display: block;
    }

    .branch-node {
      cursor: pointer;
    }

    .branch-node circle {
      fill: #2d3436;
      stroke: #636e72;
      stroke-width: 2;
      transition: stroke 0.2s, fill 0.2s;
    }

    .branch-node.visited circle {
      fill: #00b894;
      stroke: #00b894;
    }

    .branch-node.current circle {
      stroke: #fff;
      stroke-width: 3;
    }

    .branch-node:hover circle {
      stroke: #74b9ff;
    }

    .branch-link {
      stroke: #3d464d;
      stroke-width: 2;
      fill: none;
    }

    .branch-link.active {
      stroke: #00b894;
      stroke-width: 3;
    }

    #branch-summary {
      display: none;
      padding: 6px 16px;
      font-size: 12px;
      color: #b2bec3;
      border-top: 1px solid #3d464d;
    }

    #branch-summary.visible {
      display: block;
    }

    /* 节点编辑弹窗 */
    #edit-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    #edit-modal.visible {
      display: flex;
    }

    #edit-modal-content {
      background: #1e272e;
      border-radius: 12px;
      padding: 24px;
      width: 400px;
      max-width: 90vw;
      border: 1px solid #3d464d;
    }

    #edit-modal h3 {
      margin-bottom: 16px;
      color: #74b9ff;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      color: #b2bec3;
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #3d464d;
      border-radius: 6px;
      background: #2d3436;
      color: #dfe6e9;
      font-size: 13px;
      font-family: inherit;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 60px;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #74b9ff;
    }

    .choice-input-group {
      margin-bottom: 10px;
      padding: 10px;
      background: #2d3436;
      border-radius: 6px;
    }

    .choice-input-group input {
      margin-bottom: 6px;
    }

    .choice-input-group input:last-child {
      margin-bottom: 0;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }

    .char-count {
      font-size: 11px;
      color: #636e72;
      text-align: right;
      margin-top: 4px;
    }

    /* 响应式适配 */
    @media (max-width: 1100px) {
      #left-panel {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 50;
        transform: translateX(-100%);
        box-shadow: 2px 0 12px rgba(0, 0, 0, 0.3);
      }

      #left-panel.open {
        transform: translateX(0);
      }

      #panel-toggle-btn {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #canvas-wrapper {
        min-width: 0;
      }
    }

    @media (max-width: 700px) {
      #timeline-container {
        height: 80px;
        max-height: 80px;
      }

      #timeline-bar {
        height: 80px;
      }

      #branch-graph {
        display: none !important;
      }
    }

    /* 隐藏的文件输入 */
    #file-input {
      display: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- 顶部工具栏 -->
    <div id="toolbar">
      <span class="toolbar-title">2D RPG 对话沙盒</span>
      <button class="btn" id="import-btn">导入JSON</button>
      <button class="btn btn-secondary" id="export-btn">导出JSON</button>
      <input type="file" id="file-input" accept=".json" />
    </div>

    <!-- 主体区域 -->
    <div id="main-area">
      <button id="panel-toggle-btn">☰</button>

      <!-- 左侧角色面板 -->
      <div id="left-panel">
        <div class="panel-title">角色列表</div>
        <div class="character-preview" id="left-char-preview">
          <svg width="80" height="120" viewBox="0 0 80 120"></svg>
          <div class="character-name">红发女孩</div>
        </div>
        <div class="character-preview" id="right-char-preview">
          <svg width="80" height="120" viewBox="0 0 80 120"></svg>
          <div class="character-name">蓝发男孩</div>
        </div>
      </div>

      <!-- 中央画布 -->
      <div id="canvas-wrapper">
        <canvas id="scene-canvas" width="900" height="520"></canvas>
      </div>

      <!-- 右侧情感面板 -->
      <div id="right-panel">
        <div class="panel-title">情感配置</div>
        <div class="emotion-section">
          <div class="emotion-label">红发女孩</div>
          <select class="emotion-select" id="left-emotion-select">
            <option value="neutral">中性</option>
            <option value="happy">高兴</option>
            <option value="sad">悲伤</option>
            <option value="angry">愤怒</option>
            <option value="surprised">惊讶</option>
          </select>
        </div>
        <div class="emotion-section">
          <div class="emotion-label">蓝发男孩</div>
          <select class="emotion-select" id="right-emotion-select">
            <option value="neutral">中性</option>
            <option value="happy">高兴</option>
            <option value="sad">悲伤</option>
            <option value="angry">愤怒</option>
            <option value="surprised">惊讶</option>
          </select>
        </div>
      </div>
    </div>

    <!-- 底部时间线 -->
    <div id="timeline-container">
      <div id="timeline-bar">
        <button class="play-btn" id="play-btn">▶</button>
        <div id="timeline-track">
          <svg id="timeline-grid" width="100%" height="100%"></svg>
        </div>
      </div>
      <div id="branch-graph"></div>
      <div id="branch-summary"></div>
    </div>
  </div>

  <!-- 节点编辑弹窗 -->
  <div id="edit-modal">
    <div id="edit-modal-content">
      <h3>编辑节点</h3>
      <div id="edit-form"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="modal-cancel-btn">取消</button>
        <button class="btn" id="modal-save-btn">保存</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
