<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>墨染·飞花令</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "KaiTi", "STKaiti", "楷体", serif;
      background-color: #f5e6ca;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(139, 119, 91, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(139, 119, 91, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(62, 39, 35, 0.03) 0%, transparent 70%);
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.05;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      z-index: 1;
    }

    .app-container {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 2;
    }

    .title-bar {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border-radius: 4px;
      border: 1px solid rgba(62, 39, 35, 0.1);
      z-index: 100;
      transition: all 0.3s ease;
    }

    .title-bar:hover {
      background: rgba(255, 255, 255, 0.8);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(62, 39, 35, 0.15);
    }

    .title-bar h1 {
      font-size: 20px;
      font-weight: normal;
      color: #3e2723;
      letter-spacing: 4px;
      white-space: nowrap;
    }

    .canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #mainCanvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }

    .reset-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: #c0392b;
      color: #fff;
      font-family: "STZhongsong", "SimSun", serif;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      z-index: 100;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 1px;
      box-shadow: 0 2px 8px rgba(192, 57, 43, 0.3);
      transform-origin: center;
    }

    .reset-btn::before {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      right: 2px;
      bottom: 2px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 50%;
    }

    .reset-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 8px #c0392b, 0 4px 16px rgba(192, 57, 43, 0.4);
    }

    .reset-btn:active {
      transform: scale(0.95);
    }

    .info-panel {
      position: fixed;
      bottom: 20px;
      left: 20px;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border-radius: 4px;
      font-size: 12px;
      color: #5d4037;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    .info-panel.visible {
      opacity: 1;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #f5e6ca;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    .loading-overlay.hidden {
      opacity: 0;
    }

    .loading-text {
      font-size: 18px;
      color: #3e2723;
      letter-spacing: 8px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    @media (max-width: 1279px) {
      .title-bar h1 {
        font-size: 18px;
        letter-spacing: 3px;
      }
      
      .title-bar {
        padding: 10px 20px;
        top: 15px;
        left: 15px;
      }
      
      .reset-btn {
        width: 36px;
        height: 36px;
        font-size: 13px;
        bottom: 25px;
        right: 25px;
      }
    }

    @media (max-width: 767px) {
      .title-bar h1 {
        font-size: 16px;
        letter-spacing: 2px;
      }
      
      .title-bar {
        padding: 8px 16px;
        top: 10px;
        left: 10px;
      }
      
      .reset-btn {
        width: 34px;
        height: 34px;
        font-size: 12px;
        bottom: 20px;
        right: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header class="title-bar">
      <h1>墨染·飞花令</h1>
    </header>

    <div class="canvas-container">
      <canvas id="mainCanvas"></canvas>
    </div>

    <button id="resetBtn" class="reset-btn" title="重写">
      重写
    </button>

    <div class="info-panel" id="infoPanel">
      点击文字，感受水墨诗意
    </div>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-text">墨 染 中</div>
  </div>

  <script type="module" src="/src/main.ts"></script>

  <script>
    setTimeout(() => {
      const overlay = document.getElementById('loadingOverlay');
      if (overlay) {
        overlay.classList.add('hidden');
        setTimeout(() => {
          overlay.style.display = 'none';
        }, 500);
      }
      
      const infoPanel = document.getElementById('infoPanel');
      if (infoPanel) {
        infoPanel.classList.add('visible');
        setTimeout(() => {
          infoPanel.classList.remove('visible');
        }, 4000);
      }
    }, 1800);
  </script>
</body>
</html>
