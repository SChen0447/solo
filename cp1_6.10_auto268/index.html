<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星轨绘卷</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a15;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #canvas-container canvas {
      display: block;
    }

    .control-panel {
      position: absolute;
      top: 24px;
      left: 24px;
      background: rgba(10, 14, 39, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 20px;
      color: #c8d6e5;
      z-index: 10;
      min-width: 220px;
    }

    .control-panel h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #fff;
      letter-spacing: 2px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 10px 16px;
      margin-bottom: 10px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      color: #c8d6e5;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: inherit;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.2);
      color: #fff;
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .counter {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .counter-label {
      font-size: 12px;
      color: rgba(200, 214, 229, 0.6);
    }

    .counter-value {
      font-size: 22px;
      font-weight: 700;
      color: #ff6b35;
      font-family: monospace;
      transition: opacity 0.4s ease;
    }

    .counter-value.fading {
      opacity: 0;
    }

    .info-panel {
      position: absolute;
      bottom: 24px;
      left: 24px;
      background: rgba(10, 14, 39, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 20px 24px;
      color: #c8d6e5;
      z-index: 10;
      min-width: 280px;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
    }

    .info-panel.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .info-panel .info-title {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      letter-spacing: 1px;
    }

    .info-panel .info-row {
      font-family: monospace;
      font-size: 13px;
      line-height: 1.6;
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }

    .info-panel .info-key {
      color: rgba(200, 214, 229, 0.6);
    }

    .info-panel .info-val {
      color: #c8d6e5;
      text-align: right;
    }

    .hint {
      position: absolute;
      bottom: 24px;
      right: 24px;
      color: rgba(200, 214, 229, 0.4);
      font-size: 12px;
      font-family: monospace;
      z-index: 10;
      text-align: right;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div class="control-panel">
      <h1>✦ 星轨绘卷</h1>
      <button class="btn" id="btn-regenerate">生成新星域</button>
      <button class="btn" id="btn-reset">重置视角</button>
      <div class="counter">
        <span class="counter-label">恒星数量</span>
        <span class="counter-value" id="star-count">0</span>
      </div>
    </div>

    <div class="info-panel" id="info-panel">
      <div class="info-title" id="info-title">星体信息</div>
      <div class="info-row">
        <span class="info-key">名称</span>
        <span class="info-val" id="info-name">—</span>
      </div>
      <div class="info-row">
        <span class="info-key">类型</span>
        <span class="info-val" id="info-type">—</span>
      </div>
      <div class="info-row">
        <span class="info-key">表面温度</span>
        <span class="info-val" id="info-temp">—</span>
      </div>
      <div class="info-row">
        <span class="info-key">质量</span>
        <span class="info-val" id="info-mass">—</span>
      </div>
      <div class="info-row" id="info-planets-row">
        <span class="info-key">行星数量</span>
        <span class="info-val" id="info-planets">—</span>
      </div>
      <div class="info-row" id="info-orbit-row" style="display:none;">
        <span class="info-key">轨道半径</span>
        <span class="info-val" id="info-orbit">—</span>
      </div>
    </div>

    <div class="hint">
      拖拽旋转视角 · 滚轮缩放 · 点击恒星触发超新星
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
