<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>虚拟水晶矿洞模拟器</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #e0e0ff;
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 100%);
    }
    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
    .control-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 200px;
      padding: 20px;
      background: rgba(26, 26, 46, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 12px;
      border: 1px solid rgba(100, 100, 180, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      z-index: 10;
    }
    .panel-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #a0b0ff;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .panel-title i {
      color: #4a9eff;
    }
    .slider-group {
      margin-bottom: 18px;
    }
    .slider-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      margin-bottom: 8px;
      color: #b0b0d0;
    }
    .slider-label i {
      margin-right: 6px;
      font-size: 11px;
    }
    .slider-value {
      font-weight: 600;
      color: #4a9eff;
      font-size: 13px;
    }
    input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.1);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    input[type="range"]:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    input[type="range"].temp-slider {
      background: linear-gradient(to right, #4a9eff, #b06eff);
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ffffff;
      border: 2px solid #4a9eff;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(74, 158, 255, 0.5);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      box-shadow: 0 2px 12px rgba(74, 158, 255, 0.8);
    }
    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ffffff;
      border: 2px solid #4a9eff;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(74, 158, 255, 0.5);
    }
    .export-btn {
      position: absolute;
      bottom: 24px;
      right: 24px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(26, 26, 46, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(100, 100, 180, 0.3);
      color: #4a9eff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      z-index: 10;
      transition: all 0.2s ease;
      animation: pulse 2s infinite;
    }
    .export-btn:hover {
      transform: scale(1.1);
      background: rgba(74, 158, 255, 0.2);
      box-shadow: 0 0 20px rgba(74, 158, 255, 0.4);
    }
    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(74, 158, 255, 0.4);
      }
      50% {
        box-shadow: 0 0 0 10px rgba(74, 158, 255, 0);
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
