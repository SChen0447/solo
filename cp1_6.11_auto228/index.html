<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>极光舞动 · Aurora Visualizer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #0a0e1a 0%, #0a2a1a 100%);
      font-family: 'Courier New', 'Monaco', monospace;
      color: #00ff88;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .tp-dfwv {
      background: rgba(10, 14, 26, 0.7) !important;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid #00ff88 !important;
      border-radius: 8px !important;
      box-shadow: 0 0 30px rgba(0, 255, 136, 0.15);
      transition: opacity 0.3s ease, transform 0.1s ease;
    }

    .tp-dfwv:active {
      transform: scale(0.98);
    }

    .tp-lblv_l {
      color: #00ff88 !important;
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    .tp-sldtr {
      height: 6px !important;
      background: #2a3a4a !important;
      border-radius: 3px;
    }

    .tp-sldtr_g {
      background: #00ff88 !important;
      border-radius: 3px;
    }

    .tp-sldtr_k {
      width: 14px !important;
      height: 14px !important;
      background: #00ff88 !important;
      border: none !important;
      box-shadow: 0 0 8px rgba(0, 255, 136, 0.6);
      cursor: pointer;
    }

    .tp-btnv {
      background: rgba(0, 255, 136, 0.15) !important;
      border: 1px solid #00ff88 !important;
      color: #00ff88 !important;
      border-radius: 6px !important;
      transition: all 0.2s ease;
      cursor: pointer;
      font-family: 'Courier New', monospace;
    }

    .tp-btnv:hover {
      background: rgba(0, 255, 136, 0.3) !important;
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
    }

    .tp-btnv:active {
      transform: scale(0.95);
    }

    .tp-rotv_gv {
      color: #00ddff !important;
      font-size: 11px;
    }

    .tp-txtv_i {
      background: rgba(42, 58, 74, 0.5) !important;
      border: 1px solid #2a3a4a !important;
      color: #00ffcc !important;
      font-family: 'Courier New', monospace;
    }

    .mobile-toggle {
      display: none;
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(10, 14, 26, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid #00ff88;
      color: #00ff88;
      font-size: 24px;
      cursor: pointer;
      z-index: 1001;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
    }

    .mobile-toggle:hover {
      transform: scale(1.1);
      box-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
    }

    .mobile-toggle:active {
      transform: scale(0.95);
    }

    .title-overlay {
      position: fixed;
      top: 24px;
      left: 32px;
      z-index: 100;
      pointer-events: none;
    }

    .title-overlay h1 {
      font-size: 20px;
      font-weight: normal;
      letter-spacing: 3px;
      color: #00ff88;
      text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
    }

    .title-overlay p {
      font-size: 11px;
      color: #00ddff;
      margin-top: 6px;
      letter-spacing: 1.5px;
      opacity: 0.7;
    }

    @media (max-width: 768px) {
      .tp-dfwv {
        display: none !important;
      }

      .tp-dfwv.mobile-open {
        display: block !important;
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        border-radius: 0 !important;
        border: none !important;
        z-index: 1000 !important;
        overflow-y: auto !important;
      }

      .mobile-toggle {
        display: flex;
      }

      .title-overlay {
        top: 16px;
        left: 20px;
      }

      .title-overlay h1 {
        font-size: 16px;
        letter-spacing: 2px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="title-overlay">
      <h1>AURORA VISUALIZER</h1>
      <p>Polar Observation System v1.0</p>
    </div>
    <button class="mobile-toggle" id="mobileToggle" aria-label="控制面板">⚙</button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
