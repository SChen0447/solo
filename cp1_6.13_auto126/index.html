<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>符文铭刻师 - Rune Inscriber</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #2d1b4e 0%, #1a0f2e 40%, #0d0a1a 100%);
      font-family: 'Times New Roman', serif;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, #2d1b4e 0%, #0d0a1a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.5s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader {
      width: 80px;
      height: 80px;
      position: relative;
    }

    .loader::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 60px;
      height: 60px;
      margin: -30px 0 0 -30px;
      border: 3px solid transparent;
      border-top-color: rgba(212, 175, 55, 0.8);
      border-radius: 50%;
      animation: spin 1.5s linear infinite;
    }

    .loader::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 40px;
      height: 40px;
      margin: -20px 0 0 -20px;
      border: 3px solid transparent;
      border-top-color: rgba(212, 175, 55, 0.4);
      border-radius: 50%;
      animation: spin 1.5s linear infinite reverse;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loader-text {
      position: absolute;
      top: calc(50% + 60px);
      left: 50%;
      transform: translateX(-50%);
      color: rgba(212, 175, 55, 0.9);
      font-size: 14px;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loader"></div>
    <div class="loader-text">符文正在觉醒...</div>
  </div>
  <canvas id="gameCanvas"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
