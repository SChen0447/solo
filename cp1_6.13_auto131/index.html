<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>回声·地宫</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }

    body {
      background: radial-gradient(ellipse at center, #1a1a1a 0%, #0a0a0a 70%, #050505 100%);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #game-canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      box-shadow: 0 0 60px rgba(212, 175, 55, 0.15);
    }

    #info-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 15px 20px;
      background: rgba(20, 20, 20, 0.85);
      border: 1px solid #d4af37;
      border-radius: 4px;
      color: #e6d691;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.8;
      min-width: 200px;
      backdrop-filter: blur(4px);
      z-index: 10;
    }

    #info-panel .label {
      color: #b8a65c;
      margin-right: 8px;
    }

    #info-panel .value {
      color: #ffd700;
      font-weight: bold;
    }

    #permission-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(10, 10, 10, 0.95);
      z-index: 100;
      transition: opacity 0.5s ease;
    }

    #permission-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .mic-icon {
      width: 120px;
      height: 120px;
      margin-bottom: 30px;
      position: relative;
    }

    .mic-icon svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.5));
    }

    .mic-icon .pulse-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      border: 2px solid #d4af37;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 2s ease-out infinite;
    }

    @keyframes pulse {
      0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0.8;
      }
      100% {
        transform: translate(-50%, -50%) scale(1.8);
        opacity: 0;
      }
    }

    #permission-overlay h1 {
      color: #ffd700;
      font-size: 48px;
      margin-bottom: 15px;
      letter-spacing: 8px;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
    }

    #permission-overlay .subtitle {
      color: #b8a65c;
      font-size: 18px;
      margin-bottom: 40px;
      letter-spacing: 3px;
    }

    #permission-btn {
      padding: 15px 50px;
      font-size: 18px;
      font-family: 'Courier New', monospace;
      background: transparent;
      color: #ffd700;
      border: 2px solid #d4af37;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 3px;
      transition: all 0.3s ease;
    }

    #permission-btn:hover {
      background: rgba(212, 175, 55, 0.2);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
      transform: scale(1.05);
    }

    #permission-btn:active {
      transform: scale(0.98);
    }

    .hint {
      position: absolute;
      bottom: 30px;
      color: #666;
      font-size: 12px;
      text-align: center;
      letter-spacing: 2px;
    }

    #victory-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(10, 10, 10, 0.9);
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }

    #victory-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    #victory-overlay h2 {
      color: #ffd700;
      font-size: 72px;
      letter-spacing: 15px;
      text-shadow: 0 0 50px rgba(255, 215, 0, 0.8);
      margin-bottom: 20px;
    }

    #victory-overlay .victory-sub {
      color: #e6d691;
      font-size: 24px;
      letter-spacing: 5px;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #ffd700;
      border-radius: 50%;
      pointer-events: none;
      box-shadow: 0 0 10px #ffd700;
    }

    #controls-hint {
      position: absolute;
      bottom: 20px;
      right: 20px;
      color: #666;
      font-size: 11px;
      text-align: right;
      line-height: 1.6;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>

    <div id="info-panel">
      <div><span class="label">频率:</span><span class="value" id="freq-value">-- Hz</span></div>
      <div><span class="label">响度:</span><span class="value" id="loud-value">-- dB</span></div>
      <div><span class="label">宝石:</span><span class="value" id="gem-count">0 / 3</span></div>
    </div>

    <div id="controls-hint">
      WASD / 方向键 移动<br/>
      用声音探索迷宫
    </div>

    <div id="permission-overlay">
      <div class="mic-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#d4af37" stroke-width="2">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        <div class="pulse-ring"></div>
      </div>
      <h1>回声·地宫</h1>
      <p class="subtitle">ECHO DUNGEON</p>
      <button id="permission-btn">点击授权麦克风</button>
      <div class="hint">
        用声音照亮前路，寻找隐藏的回音宝石<br/>
        哼唱、口哨或拍手，让声波成为你的眼睛
      </div>
    </div>

    <div id="victory-overlay">
      <h2>回声大师</h2>
      <p class="victory-sub">ECHO MASTER</p>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
