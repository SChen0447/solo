<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>层染·丝印工坊</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div class="app-container">
    <div class="canvas-area">
      <div class="toolbar">
        <div class="toolbar-left">
          <span class="toolbar-label">缩放</span>
          <input type="range" id="zoomSlider" min="0.5" max="2" step="0.1" value="1" class="zoom-slider" />
          <span id="zoomValue" class="zoom-value">100%</span>
        </div>
        <div class="toolbar-right">
          <button id="resetViewBtn" class="reset-btn" title="重置视角">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
              <path d="M3 3v5h5"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="canvas-wrapper">
        <canvas id="mainCanvas" width="800" height="600"></canvas>
        <canvas id="overlayCanvas" width="800" height="600"></canvas>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-header">
        <h2 class="app-title">层染·丝印工坊</h2>
        <span class="app-subtitle">Silk Screen Studio</span>
      </div>

      <div class="layers-section">
        <div class="section-title">图层列表</div>
        <div id="layerList" class="layer-list"></div>
      </div>

      <div class="properties-section">
        <div class="section-title">图层属性</div>
        
        <div class="color-wheel-container">
          <canvas id="colorWheel" width="160" height="160"></canvas>
          <div id="colorGlow" class="color-glow"></div>
        </div>
        
        <div class="color-hex-row">
          <span class="label">颜色</span>
          <input type="text" id="colorHex" value="#e74c3c" class="color-hex-input" />
        </div>

        <div class="property-row">
          <span class="label">透明度</span>
          <div class="opacity-slider-container">
            <input type="range" id="opacitySlider" min="0" max="1" step="0.01" value="0.8" class="opacity-slider" />
          </div>
          <span id="opacityValue" class="value-text">80%</span>
        </div>

        <div class="property-row">
          <span class="label">混合模式</span>
          <select id="blendModeSelect" class="blend-mode-select">
            <option value="normal">正常</option>
            <option value="multiply">正片叠底</option>
            <option value="screen">滤色</option>
          </select>
        </div>

        <div class="property-row">
          <span class="label">网点密度</span>
          <input type="range" id="halftoneSlider" min="10" max="60" step="1" value="30" class="halftone-slider" />
          <span id="halftoneValue" class="value-text">30 lpi</span>
        </div>

        <div class="shape-tools">
          <span class="label">形状工具</span>
          <div class="shape-btn-group">
            <button class="shape-btn active" data-shape="rectangle" title="矩形">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
              </svg>
            </button>
            <button class="shape-btn" data-shape="circle" title="圆形">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="9"/>
              </svg>
            </button>
            <button class="shape-btn" data-shape="polygon" title="多边形">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="12,2 22,22 2,22"/>
              </svg>
            </button>
          </div>
          <label class="svg-upload-btn">
            <input type="file" id="svgUpload" accept=".svg" style="display:none" />
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            上传SVG
          </label>
        </div>
      </div>

      <div class="sidebar-footer">
        <button id="addLayerBtn" class="add-layer-btn" title="添加图层">
          <span class="plus-icon">+</span>
        </button>
        <button id="exportBtn" class="export-btn">
          <span class="export-text">导出 PNG</span>
        </button>
      </div>
    </div>
  </div>

  <input type="color" id="bgColorPicker" class="bg-color-picker" value="#ffffff" title="背景色" />

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
