<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>动态光能晶体谐振器阵列</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a0a3a 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a0a3a 100%);
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-content {
      text-align: center;
      color: #fff;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(0, 212, 255, 0.2);
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    .loading-text {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 2px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #hint {
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      line-height: 1.8;
      pointer-events: none;
      z-index: 10;
    }

    #hint span {
      display: inline-block;
      padding: 2px 8px;
      margin-right: 4px;
      background: rgba(0, 212, 255, 0.15);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 4px;
      color: #00d4ff;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <div class="loading-text">LOADING CRYSTAL ARRAY</div>
    </div>
  </div>
  <div id="app"></div>
  <div id="hint">
    <div><span>拖拽</span> 旋转视角 &nbsp; <span>滚轮</span> 缩放 &nbsp; <span>点击晶体</span> 触发谐振</div>
    <div><span>W/S</span> 光源仰角 &nbsp; <span>A/D</span> 光源方位</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
