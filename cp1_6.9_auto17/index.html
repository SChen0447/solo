<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分子碰撞模拟可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #000;
      color: #fff;
      user-select: none;
    }

    #three-canvas {
      display: block;
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    #stats-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 10;
      padding: 18px 22px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      font-size: 14px;
      min-width: 180px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
    }

    .stats-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      gap: 16px;
    }

    .stats-row + .stats-row {
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .stats-label {
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 0.5px;
    }

    .stats-value {
      color: #fff;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      transition: color 0.3s ease;
      min-width: 50px;
      text-align: right;
    }

    #control-bar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 24px;
      padding: 16px 28px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.75);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      letter-spacing: 0.3px;
    }

    .control-value {
      color: #7fd4ff;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 180px;
      height: 6px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #7fd4ff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(127, 212, 255, 0.5);
      transition: transform 0.15s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #7fd4ff;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(127, 212, 255, 0.5);
    }

    #reset-btn {
      padding: 10px 22px;
      background: linear-gradient(135deg, rgba(127, 212, 255, 0.25), rgba(127, 127, 255, 0.25));
      border: 1px solid rgba(127, 212, 255, 0.4);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    #reset-btn:hover {
      background: linear-gradient(135deg, rgba(127, 212, 255, 0.45), rgba(127, 127, 255, 0.45));
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(127, 212, 255, 0.3);
    }

    #reset-btn:active {
      transform: translateY(0);
    }

    @media (max-width: 768px) {
      #stats-panel {
        top: 12px;
        left: 12px;
        padding: 12px 16px;
        font-size: 13px;
        min-width: 150px;
      }

      #control-bar {
        bottom: 16px;
        left: 12px;
        right: 12px;
        transform: none;
        flex-direction: column;
        align-items: stretch;
        gap: 14px;
        padding: 16px;
      }

      .control-group {
        width: 100%;
      }

      input[type="range"] {
        width: 100%;
      }

      #reset-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="control-bar">
    <div class="control-group">
      <div class="control-label">
        <span>粒子数量</span>
        <span class="control-value" id="particle-value">100</span>
      </div>
      <input
        type="range"
        id="particle-slider"
        min="50"
        max="200"
        value="100"
        step="1"
      />
    </div>
    <div class="control-group">
      <div class="control-label">
        <span>速度因子</span>
        <span class="control-value" id="speed-value">1.0</span>
      </div>
      <input
        type="range"
        id="speed-slider"
        min="0.1"
        max="3.0"
        value="1.0"
        step="0.1"
      />
    </div>
    <button id="reset-btn">重置</button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
