<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>全球空气质量3D可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0A0B1A 0%, #1A1A2E 100%);
      color: #FFFFFF;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* 左侧筛选面板 */
    #filter-panel {
      position: fixed;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 220px;
      background: rgba(22, 33, 62, 0.85);
      backdrop-filter: blur(10px);
      padding: 20px 16px;
      border-radius: 0 16px 16px 0;
      z-index: 10;
      transition: all 0.3s ease;
    }

    .panel-title {
      font-size: 16px;
      font-weight: 600;
      color: #00D4FF;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    .control-group {
      margin-bottom: 20px;
    }

    .control-label {
      font-size: 12px;
      color: #8892B0;
      margin-bottom: 8px;
      display: block;
    }

    .select-wrapper {
      position: relative;
    }

    select {
      width: 100%;
      padding: 10px 14px;
      background: #0F3460;
      border: 1px solid #00D4FF33;
      border-radius: 8px;
      color: #FFFFFF;
      font-size: 14px;
      cursor: pointer;
      appearance: none;
      transition: all 0.2s ease;
      outline: none;
    }

    select:hover {
      background: #1a4a7a;
      border-color: #00D4FF;
    }

    select:active {
      transform: translateY(1px);
    }

    .select-wrapper::after {
      content: '▼';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #00D4FF;
      font-size: 10px;
      pointer-events: none;
    }

    /* 开关按钮 */
    .toggle-wrapper {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: #0F3460;
      border: 1px solid #00D4FF33;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      user-select: none;
    }

    .toggle-wrapper:hover {
      background: #1a4a7a;
      border-color: #00D4FF;
    }

    .toggle-wrapper:active {
      transform: translateY(1px);
    }

    .toggle-label {
      font-size: 14px;
      color: #FFFFFF;
    }

    .toggle-switch {
      width: 40px;
      height: 22px;
      background: #2D3748;
      border-radius: 11px;
      position: relative;
      transition: all 0.2s ease;
    }

    .toggle-switch.active {
      background: #00D4FF;
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      background: #FFFFFF;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: all 0.2s ease;
    }

    .toggle-switch.active::after {
      left: 20px;
    }

    /* 右上角统计卡片 */
    #stats-card {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 200px;
      background: linear-gradient(145deg, #0B0C10, #1F2833);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 18px;
      z-index: 10;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    .stats-title {
      font-size: 14px;
      color: #00D4FF;
      font-weight: 600;
      margin-bottom: 14px;
      letter-spacing: 0.5px;
    }

    .stats-item {
      margin-bottom: 10px;
      font-size: 12px;
    }

    .stats-label {
      color: #8892B0;
    }

    .stats-value {
      color: #FFFFFF;
      font-weight: 500;
      float: right;
    }

    .stats-value.highlight {
      color: #FFA500;
    }

    .stats-update-time {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 11px;
      color: #8892B0;
      text-align: center;
    }

    /* 底部时间轴 */
    #timeline-container {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 70%;
      max-width: 800px;
      background: rgba(22, 33, 62, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 18px 24px;
      z-index: 10;
      transition: all 0.3s ease;
    }

    .timeline-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .timeline-title {
      font-size: 13px;
      color: #00D4FF;
      font-weight: 600;
    }

    .timeline-current {
      font-size: 13px;
      color: #FFFFFF;
    }

    .timeline-track {
      position: relative;
      height: 8px;
      background: #2D3748;
      border-radius: 4px;
      cursor: pointer;
    }

    .timeline-progress {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      background: linear-gradient(90deg, #00D4FF, #FFA500);
      border-radius: 4px;
      width: 100%;
    }

    .timeline-marks {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .timeline-mark {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 8px;
      height: 8px;
      background: #00D4FF;
      border-radius: 50%;
      transition: all 0.2s ease;
    }

    .timeline-mark:hover {
      transform: translate(-50%, -50%) scale(1.5);
    }

    .timeline-slider {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 18px;
      height: 18px;
      background: #FFFFFF;
      border: 3px solid #00D4FF;
      border-radius: 50%;
      cursor: grab;
      left: 100%;
      z-index: 2;
      box-shadow: 0 2px 8px rgba(0, 212, 255, 0.5);
    }

    .timeline-slider:active {
      cursor: grabbing;
    }

    .timeline-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 11px;
      color: #8892B0;
    }

    /* 悬停信息面板 */
    #hover-panel {
      position: fixed;
      background: rgba(26, 26, 46, 0.95);
      backdrop-filter: blur(8px);
      padding: 14px 18px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 212, 255, 0.1);
      pointer-events: none;
      opacity: 0;
      z-index: 20;
      transition: opacity 0.2s ease;
      min-width: 180px;
    }

    #hover-panel.visible {
      opacity: 1;
    }

    .hover-city-name {
      font-size: 16px;
      font-weight: 600;
      color: #00D4FF;
      margin-bottom: 10px;
    }

    .hover-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .hover-label {
      color: #8892B0;
    }

    .hover-value {
      color: #FFFFFF;
      font-weight: 500;
    }

    .hover-value.good { color: #00FF88; }
    .hover-value.moderate { color: #FFD700; }
    .hover-value.high { color: #FF6B6B; }

    /* 详细数据弹窗 */
    #modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #modal-overlay.visible {
      display: flex;
      opacity: 1;
    }

    #detail-modal {
      width: 600px;
      height: 400px;
      background: #0B0C10;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 10px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(0, 212, 255, 0.15);
      transform: scale(0.8);
      opacity: 0;
      transition: all 0.3s ease;
      position: relative;
    }

    #detail-modal.visible {
      transform: scale(1);
      opacity: 1;
    }

    .modal-close {
      position: absolute;
      top: 18px;
      right: 22px;
      width: 32px;
      height: 32px;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: #FFFFFF;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover {
      background: rgba(255, 107, 107, 0.8);
      transform: rotate(90deg);
    }

    .modal-title {
      font-size: 22px;
      font-weight: 600;
      color: #00D4FF;
      margin-bottom: 6px;
    }

    .modal-subtitle {
      font-size: 13px;
      color: #8892B0;
      margin-bottom: 20px;
    }

    .modal-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      height: calc(100% - 70px);
    }

    .chart-container {
      background: rgba(22, 33, 62, 0.5);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      flex-direction: column;
    }

    .chart-title {
      font-size: 13px;
      color: #8892B0;
      margin-bottom: 10px;
    }

    .chart-placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #00D4FF;
      font-size: 12px;
      text-align: center;
    }

    canvas.chart-canvas {
      width: 100%;
      height: 100%;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      #filter-panel {
        width: 160px;
        padding: 14px 12px;
        top: 80px;
        transform: none;
      }

      #stats-card {
        width: 160px;
        padding: 12px;
        top: 12px;
        right: 12px;
      }

      #timeline-container {
        width: 90%;
        bottom: 16px;
        padding: 14px 16px;
      }

      #detail-modal {
        width: 90%;
        height: auto;
        min-height: 350px;
      }

      .modal-content {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <!-- 左侧筛选面板 -->
    <div id="filter-panel">
      <div class="panel-title">⚙ 控制面板</div>
      
      <div class="control-group">
        <label class="control-label">污染物类型</label>
        <div class="select-wrapper">
          <select id="pollutant-select">
            <option value="AQI">AQI 空气质量指数</option>
            <option value="PM2.5">PM2.5 细颗粒物</option>
            <option value="PM10">PM10 可吸入颗粒物</option>
          </select>
        </div>
      </div>

      <div class="control-group">
        <label class="control-label">显示选项</label>
        <div class="toggle-wrapper" id="wind-toggle">
          <span class="toggle-label">风向箭头</span>
          <div class="toggle-switch" id="wind-switch"></div>
        </div>
      </div>
    </div>

    <!-- 右上角统计卡片 -->
    <div id="stats-card">
      <div class="stats-title">📊 当前概览</div>
      <div class="stats-item">
        <span class="stats-label">监控城市</span>
        <span class="stats-value" id="stat-cities">200</span>
      </div>
      <div class="stats-item">
        <span class="stats-label">平均 AQI</span>
        <span class="stats-value highlight" id="stat-avg-aqi">--</span>
      </div>
      <div class="stats-item">
        <span class="stats-label">最高污染</span>
        <span class="stats-value" id="stat-worst-city">--</span>
      </div>
      <div class="stats-item">
        <span class="stats-label">AQI 值</span>
        <span class="stats-value highlight" id="stat-worst-aqi">--</span>
      </div>
      <div class="stats-update-time" id="stat-update-time">更新时间: --</div>
    </div>

    <!-- 底部时间轴 -->
    <div id="timeline-container">
      <div class="timeline-header">
        <span class="timeline-title">⏱ 24小时时间轴</span>
        <span class="timeline-current" id="timeline-current-time">--:--</span>
      </div>
      <div class="timeline-track" id="timeline-track">
        <div class="timeline-progress" id="timeline-progress"></div>
        <div class="timeline-marks" id="timeline-marks"></div>
        <div class="timeline-slider" id="timeline-slider"></div>
      </div>
      <div class="timeline-labels">
        <span id="timeline-start">-24h</span>
        <span id="timeline-end">现在</span>
      </div>
    </div>

    <!-- 悬停信息面板 -->
    <div id="hover-panel">
      <div class="hover-city-name" id="hover-city">城市名</div>
      <div class="hover-row">
        <span class="hover-label">AQI</span>
        <span class="hover-value" id="hover-aqi">--</span>
      </div>
      <div class="hover-row">
        <span class="hover-label">PM2.5</span>
        <span class="hover-value" id="hover-pm25">-- µg/m³</span>
      </div>
      <div class="hover-row">
        <span class="hover-label">PM10</span>
        <span class="hover-value" id="hover-pm10">-- µg/m³</span>
      </div>
    </div>

    <!-- 详细数据弹窗 -->
    <div id="modal-overlay">
      <div id="detail-modal">
        <button class="modal-close" id="modal-close">✕</button>
        <div class="modal-title" id="modal-city-name">城市名</div>
        <div class="modal-subtitle" id="modal-city-subtitle">实时空气质量数据</div>
        <div class="modal-content">
          <div class="chart-container">
            <div class="chart-title">过去24小时污染物浓度趋势</div>
            <canvas class="chart-canvas" id="trend-chart"></canvas>
          </div>
          <div class="chart-container">
            <div class="chart-title">风向玫瑰图（8方向）</div>
            <canvas class="chart-canvas" id="wind-chart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
