<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>色彩混合演示</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      min-height: 100vh;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0e1a;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      overflow-x: hidden;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #e0e0e0;
      margin-bottom: 20px;
      text-align: center;
      letter-spacing: 0.5px;
    }

    .app-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 1100px;
    }

    .mode-bar {
      display: flex;
      gap: 10px;
      padding: 12px;
      background: #1a1a2e;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      transition: box-shadow 250ms ease-out;
      flex-wrap: wrap;
      justify-content: center;
    }

    .mode-bar:hover {
      box-shadow: 0 4px 16px rgba(0, 188, 212, 0.4);
    }

    .mode-btn {
      padding: 8px 18px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: transparent;
      color: #e0e0e0;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 150ms ease-out;
    }

    .mode-btn:hover {
      border-color: rgba(255, 255, 255, 0.6);
    }

    .mode-btn:active {
      transform: scale(0.96);
      transition: transform 100ms ease-out;
    }

    .mode-btn.active-normal {
      background: #607d8b;
      border-color: #607d8b;
      color: #fff;
    }

    .mode-btn.active-multiply {
      background: #ff5722;
      border-color: #ff5722;
      color: #fff;
    }

    .mode-btn.active-screen {
      background: #00bcd4;
      border-color: #00bcd4;
      color: #fff;
    }

    .mode-btn.active-overlay {
      background: #9c27b0;
      border-color: #9c27b0;
      color: #fff;
    }

    .mode-btn.active-soft-light {
      background: #ffc107;
      border-color: #ffc107;
      color: #1a1a2e;
    }

    .main-layout {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      justify-content: center;
      flex-wrap: wrap;
    }

    .canvas-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }

    .canvas-wrapper {
      position: relative;
      width: 400px;
      height: 400px;
      border-radius: 20px;
      background: #1a1a2e;
      box-shadow:
        0 2px 8px rgba(0, 0, 0, 0.3),
        inset 0 2px 8px rgba(0, 0, 0, 0.4);
      transition: box-shadow 250ms ease-out;
      overflow: hidden;
    }

    .canvas-wrapper:hover {
      box-shadow:
        0 4px 16px rgba(0, 188, 212, 0.4),
        inset 0 2px 8px rgba(0, 0, 0, 0.4);
    }

    .canvas-wrapper canvas {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 20px;
      transition: opacity 300ms ease-out;
    }

    .color-info-panel {
      width: 400px;
      background: #0f3460;
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      transition: box-shadow 250ms ease-out;
    }

    .color-info-panel:hover {
      box-shadow: 0 4px 16px rgba(0, 188, 212, 0.4);
    }

    .color-info-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .color-info-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .color-info-hsl {
      font-size: 12px;
      font-weight: 500;
      font-family: 'Consolas', 'Courier New', monospace;
    }

    .color-info-hex {
      font-size: 14px;
      font-weight: 600;
      font-family: 'Consolas', 'Courier New', monospace;
    }

    .control-panel {
      width: 280px;
      background: #16213e;
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      transition: box-shadow 250ms ease-out;
    }

    .control-panel:hover {
      box-shadow: 0 4px 16px rgba(0, 188, 212, 0.4);
    }

    .color-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .color-group-title {
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .color-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .slider-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .slider-label {
      font-size: 12px;
      color: #888;
    }

    .slider-value {
      font-size: 12px;
      color: #e0e0e0;
      font-weight: 500;
      font-family: 'Consolas', 'Courier New', monospace;
      min-width: 40px;
      text-align: right;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #0f3460;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #00bcd4;
      cursor: pointer;
      box-shadow: 0 0 4px rgba(0, 188, 212, 0.6);
      transition: transform 100ms ease-out;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #00bcd4;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 4px rgba(0, 188, 212, 0.6);
    }

    input[type="range"].hue-slider {
      background: linear-gradient(
        to right,
        #ff0000 0%, #ffff00 17%, #00ff00 33%,
        #00ffff 50%, #0000ff 67%, #ff00ff 83%, #ff0000 100%
      );
    }

    .history-panel {
      width: 200px;
      background: #0b1a2e;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      transition: box-shadow 250ms ease-out;
      max-height: 480px;
    }

    .history-panel:hover {
      box-shadow: 0 4px 16px rgba(0, 188, 212, 0.4);
    }

    .history-title {
      font-size: 13px;
      font-weight: 600;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .history-title::before {
      content: '';
      width: 3px;
      height: 14px;
      background: #00bcd4;
      border-radius: 2px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      flex: 1;
      min-height: 40px;
    }

    .history-empty {
      font-size: 14px;
      color: #666;
      text-align: center;
      padding: 24px 8px;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.03);
      cursor: pointer;
      transition: all 150ms ease-out;
    }

    .history-item:hover {
      background: rgba(0, 188, 212, 0.1);
      transform: translateX(2px);
    }

    .history-thumb {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      flex-shrink: 0;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
    }

    .history-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .history-hsl {
      font-size: 10px;
      font-family: 'Consolas', 'Courier New', monospace;
      color: #e0e0e0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-mode {
      font-size: 10px;
      color: #888;
    }

    .history-delete {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #e53935;
      border: none;
      color: #fff;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 150ms ease-out;
      opacity: 0.7;
    }

    .history-delete:hover {
      transform: scale(1.1);
      opacity: 1;
      box-shadow: 0 2px 8px rgba(229, 57, 53, 0.5);
    }

    .history-delete:active {
      transform: scale(0.96);
    }

    .clear-history-btn {
      width: 100%;
      padding: 8px 12px;
      background: #b71c1c;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 150ms ease-out;
    }

    .clear-history-btn:hover {
      background: #c62828;
      box-shadow: 0 2px 8px rgba(183, 28, 28, 0.5);
    }

    .clear-history-btn:active {
      transform: scale(0.96);
      transition: transform 100ms ease-out;
    }

    @media (max-width: 768px) {
      .main-layout {
        flex-direction: column;
        align-items: center;
      }

      .canvas-wrapper,
      .color-info-panel {
        width: 100%;
        max-width: 400px;
      }

      .canvas-wrapper {
        aspect-ratio: 1 / 1;
        height: auto;
      }

      .control-panel,
      .history-panel {
        width: 100%;
        max-width: 400px;
      }

      .history-panel {
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <div class="app-container" id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
