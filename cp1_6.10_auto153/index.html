<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>流光书法</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a1a;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #f5e6c8;
    }

    #main-canvas {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 600px;
      cursor: crosshair;
      touch-action: none;
    }

    #particle-counter {
      position: absolute;
      top: 16px;
      right: 72px;
      padding: 6px 14px;
      background: rgba(44, 44, 44, 0.8);
      color: #ffffff;
      font-size: 14px;
      border-radius: 8px;
      user-select: none;
      pointer-events: none;
    }

    #fullscreen-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 8px;
      background: rgba(44, 44, 44, 0.8);
      color: #ffffff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    #fullscreen-btn:hover {
      transform: translateY(-2px);
      background: rgba(60, 60, 60, 0.9);
    }

    #toolbar {
      height: 60px;
      background: #2c2c2c;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 0 24px;
      flex-shrink: 0;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .control-label {
      color: #d4a76a;
      font-size: 13px;
      white-space: nowrap;
      min-width: 58px;
    }

    .control-value {
      color: #ffffff;
      font-size: 12px;
      min-width: 32px;
      text-align: right;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 140px;
      height: 8px;
      border-radius: 12px;
      background: #8b5e3c;
      outline: none;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    input[type="range"]:hover {
      transform: translateY(-2px);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #d4a76a;
      cursor: pointer;
      border: 2px solid #f5e6c8;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #d4a76a;
      cursor: pointer;
      border: 2px solid #f5e6c8;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    #clear-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: #cd5c5c;
      color: #ffffff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease, background 0.15s ease;
      flex-shrink: 0;
    }

    #clear-btn:hover {
      transform: translateY(-2px);
      background: #e07070;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container">
      <canvas id="main-canvas"></canvas>
      <div id="particle-counter">粒子: 0</div>
      <button id="fullscreen-btn" title="全屏">⛶</button>
    </div>
    <div id="toolbar">
      <div class="control-group">
        <span class="control-label">笔刷粗细</span>
        <input type="range" id="brush-size" min="4" max="40" value="12" step="1" />
        <span class="control-value" id="brush-size-value">12</span>
      </div>
      <div class="control-group">
        <span class="control-label">墨色浓淡</span>
        <input type="range" id="ink-opacity" min="0.1" max="1.0" value="0.8" step="0.05" />
        <span class="control-value" id="ink-opacity-value">0.8</span>
      </div>
      <div class="control-group">
        <span class="control-label">扩散速度</span>
        <input type="range" id="diffusion-speed" min="0.1" max="2.0" value="1.0" step="0.1" />
        <span class="control-value" id="diffusion-speed-value">1.0</span>
      </div>
      <button id="clear-btn" title="清空画布">✕</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
