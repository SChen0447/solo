<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>多级火箭发射模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0e27;
      font-family: 'Courier New', Consolas, monospace;
    }
    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(180deg, #0a0e27 0%, #1a1f4a 50%, #0d1137 100%);
    }
    #gameCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    .controls {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 100;
      display: flex;
      gap: 12px;
    }
    .btn {
      padding: 12px 28px;
      font-size: 16px;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      border: 2px solid #00d4ff;
      border-radius: 6px;
      cursor: pointer;
      background: rgba(0, 212, 255, 0.12);
      color: #00d4ff;
      letter-spacing: 1px;
      transition: all 0.25s ease;
      box-shadow: 0 0 12px rgba(0, 212, 255, 0.3);
      text-transform: uppercase;
    }
    .btn:hover:not(:disabled) {
      background: rgba(0, 212, 255, 0.28);
      box-shadow: 0 0 24px rgba(0, 212, 255, 0.6);
      transform: translateY(-2px);
    }
    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      border-color: #555;
      color: #888;
      box-shadow: none;
    }
    .btn.ignite {
      border-color: #ff6b35;
      color: #ff8c5a;
      background: rgba(255, 107, 53, 0.12);
      box-shadow: 0 0 12px rgba(255, 107, 53, 0.3);
    }
    .btn.ignite:hover:not(:disabled) {
      background: rgba(255, 107, 53, 0.28);
      box-shadow: 0 0 24px rgba(255, 107, 53, 0.6);
    }
    .btn.reset {
      border-color: #a8ff3e;
      color: #a8ff3e;
      background: rgba(168, 255, 62, 0.12);
      box-shadow: 0 0 12px rgba(168, 255, 62, 0.3);
    }
    .btn.reset:hover:not(:disabled) {
      background: rgba(168, 255, 62, 0.28);
      box-shadow: 0 0 24px rgba(168, 255, 62, 0.6);
    }
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .loading.hidden {
      display: none;
    }
    .rocket-icon {
      font-size: 80px;
      animation: pulse 1.4s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.8));
    }
    .loading-text {
      color: #00d4ff;
      font-size: 18px;
      letter-spacing: 4px;
      text-transform: uppercase;
      animation: textPulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1) rotate(-45deg); opacity: 1; }
      50% { transform: scale(1.2) rotate(-45deg); opacity: 0.6; }
    }
    @keyframes textPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .tooltip {
      position: absolute;
      pointer-events: none;
      background: rgba(0, 15, 40, 0.92);
      border: 1px solid #00d4ff;
      border-radius: 6px;
      padding: 10px 14px;
      color: #00ffc8;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      box-shadow: 0 0 16px rgba(0, 212, 255, 0.4);
      z-index: 200;
      display: none;
      white-space: nowrap;
    }
    .tooltip.visible {
      display: block;
    }
    .tooltip .label {
      color: #8899aa;
      margin-right: 8px;
    }
    .tooltip .value {
      color: #00ffc8;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="gameCanvas"></canvas>
    <div class="controls">
      <button id="btnIgnite" class="btn ignite">🔥 点火</button>
      <button id="btnReset" class="btn reset" disabled>↺ 重置</button>
    </div>
    <div id="loading" class="loading">
      <div class="rocket-icon">🚀</div>
      <div class="loading-text">加载中...</div>
    </div>
    <div id="tooltip" class="tooltip">
      <div><span class="label">高度:</span><span class="value" id="tipAlt">0.0 m</span></div>
      <div><span class="label">速度:</span><span class="value" id="tipVel">0.0 m/s</span></div>
      <div><span class="label">时间:</span><span class="value" id="tipTime">0.0 s</span></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
