<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>魔法蘑菇孢子共鸣</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000510;
      font-family: 'JetBrains Mono', monospace;
      color: #ffffff;
      min-width: 800px;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-width: 800px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .hud-panel {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      border-radius: 8px;
      padding: 14px 28px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(170, 0, 255, 0.3);
      display: flex;
      gap: 40px;
      z-index: 10;
      box-shadow: 0 0 30px rgba(0, 255, 136, 0.15);
    }

    .hud-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .hud-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.6);
      font-weight: 700;
    }

    .hud-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      font-weight: 300;
      background: linear-gradient(135deg, #00ff88, #aa00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hud-value.bold {
      font-weight: 900;
    }

    .minimap {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 136, 255, 0.3);
      overflow: hidden;
      z-index: 10;
      backdrop-filter: blur(4px);
      box-shadow: 0 0 20px rgba(255, 136, 255, 0.2);
    }

    .minimap-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .instructions {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.5);
      text-align: center;
      z-index: 10;
      line-height: 1.8;
    }

    .instructions span {
      display: inline-block;
      padding: 2px 8px;
      background: rgba(170, 0, 255, 0.2);
      border-radius: 4px;
      margin: 0 4px;
      color: #ff88ff;
      font-weight: 700;
    }

    @media (max-width: 800px) {
      #app {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        width: 800px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="hud-panel">
      <div class="hud-item">
        <span class="hud-label">菌群数量</span>
        <span class="hud-value bold" id="mushroomCount">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">共鸣频率</span>
        <span class="hud-value" id="avgFreq">0.00</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">孢子释放</span>
        <span class="hud-value" id="sporeCount">0</span>
      </div>
    </div>
    <div class="minimap">
      <canvas class="minimap-canvas" id="minimap" width="120" height="120"></canvas>
    </div>
    <div class="instructions">
      <span>点击空白处</span> 播撒孢子
      &nbsp;&nbsp;
      <span>点击蘑菇</span> 设为主导频率
      &nbsp;&nbsp;
      <span>空格键</span> 释放孢子爆裂
    </div>
  </div>
  <script type="module" src="/src/controller.ts"></script>
</body>
</html>
