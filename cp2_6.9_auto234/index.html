<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数字水彩画模拟器</title>
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>
  <div id="app">
    <canvas id="main-canvas"></canvas>

    <div class="undo-redo-container">
      <button id="undo-btn" class="circle-btn" title="撤销">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7v6h6"></path>
          <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6.7 3L3 13"></path>
        </svg>
      </button>
      <button id="redo-btn" class="circle-btn" title="重做">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 7v6h-6"></path>
          <path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6.7 3L21 13"></path>
        </svg>
      </button>
    </div>

    <button id="new-paper-btn" class="new-paper-btn">新画纸</button>

    <aside id="control-panel" class="control-panel">
      <div class="panel-section">
        <h3 class="panel-title">画笔</h3>
        <div class="brush-types">
          <button class="brush-btn active" data-brush="round">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"></circle>
            </svg>
            <span>圆头笔</span>
          </button>
          <button class="brush-btn" data-brush="flat">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="6" y="9" width="12" height="6" rx="1"></rect>
            </svg>
            <span>平头笔</span>
          </button>
          <button class="brush-btn" data-brush="wash">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 14c0-4 3.5-8 8-8s8 4 8 8-3.5 4-8 4-8 0-8-4z"></path>
            </svg>
            <span>渲染笔</span>
          </button>
        </div>
      </div>

      <div class="panel-section">
        <h3 class="panel-title">调色板</h3>
        <div id="palette-grid" class="palette-grid"></div>
        <div class="color-picker-wrapper">
          <label for="color-picker" class="picker-label">自定义颜色</label>
          <input type="color" id="color-picker" value="#4A90A4">
        </div>
      </div>

      <div class="panel-section">
        <h3 class="panel-title">水分</h3>
        <div class="moisture-display">
          <div class="moisture-bar-bg">
            <div id="moisture-bar" class="moisture-bar"></div>
          </div>
          <span id="moisture-value" class="moisture-value">100%</span>
        </div>
      </div>

      <div class="panel-section">
        <button id="save-btn" class="save-btn">保存为 PNG</button>
      </div>
    </aside>

    <div id="toast" class="toast">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
      <span>画作已保存！</span>
    </div>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
