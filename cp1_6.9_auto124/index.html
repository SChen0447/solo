<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>萤火虫森林模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      background-color: #050a10;
    }
    #scene-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 1000px;
      height: 700px;
      max-width: 100%;
      max-height: calc(100% - 40px);
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #info-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40px;
      background-color: rgba(16, 32, 48, 0.7);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      color: #e6d9b8;
      font-size: 14px;
      border-radius: 8px 8px 0 0;
      backdrop-filter: blur(4px);
      z-index: 10;
    }
    #info-bar .count {
      font-weight: 500;
    }
    #info-bar .hints {
      opacity: 0.85;
    }
    .ripple {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(255, 221, 68, 0.8);
      pointer-events: none;
      z-index: 5;
      animation: rippleExpand 0.3s ease-out forwards;
    }
    @keyframes rippleExpand {
      0% {
        width: 0;
        height: 0;
        opacity: 0.5;
        transform: translate(-50%, -50%);
      }
      100% {
        width: 40px;
        height: 40px;
        opacity: 0;
        transform: translate(-50%, -50%);
      }
    }
    @media (max-width: 768px) {
      #info-bar {
        height: 60px;
        flex-direction: column;
        justify-content: center;
        gap: 4px;
        padding: 8px 16px;
      }
      #scene-container {
        max-height: calc(100% - 60px);
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="scene-container"></div>
    <div id="info-bar">
      <span class="count">萤火虫: 30</span>
      <span class="hints">拖拽旋转 | 点击捕获 | M切换月相 | 空格流星</span>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
