<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>全球地震 3D 可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #0b0f19;
      color: #ffffff;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    #status-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 20px;
      background: rgba(10, 20, 40, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-size: 12px;
      color: #a0aec0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      border-top: 1px solid rgba(0, 212, 255, 0.2);
    }

    #status-bar .status-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #status-bar .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00d4ff;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #info-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 16px 20px;
      background: rgba(10, 20, 40, 0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 8px;
      border: 1px solid rgba(0, 212, 255, 0.3);
      min-width: 260px;
      opacity: 0;
      transform: translateX(-20px);
      transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
      z-index: 20;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    #info-panel.visible {
      opacity: 1;
      transform: translateX(0);
    }

    #info-panel .location {
      font-size: 16px;
      font-weight: bold;
      color: #ffffff;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(0, 212, 255, 0.2);
    }

    #info-panel .detail-row {
      display: flex;
      justify-content: space-between;
      margin: 6px 0;
      font-size: 14px;
    }

    #info-panel .detail-label {
      color: #a0aec0;
    }

    #info-panel .detail-value {
      font-family: 'SF Mono', Monaco, 'Courier New', monospace;
      color: #00d4ff;
      font-weight: 500;
    }

    #info-panel .detail-value.high-magnitude {
      color: #ff6b6b;
    }

    #controls {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      padding: 16px 24px;
      background: rgba(10, 20, 40, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 8px;
      border: 1px solid rgba(0, 212, 255, 0.2);
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.3),
                  inset 0 1px 0 rgba(255, 255, 255, 0.05);
      z-index: 15;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 90%;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control-group label {
      font-size: 12px;
      color: #a0aec0;
      font-weight: 500;
    }

    .slider-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .slider-value {
      font-family: 'SF Mono', Monaco, 'Courier New', monospace;
      font-size: 13px;
      color: #00d4ff;
      min-width: 32px;
      text-align: right;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 140px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      transition: filter 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    input[type="range"]:hover {
      filter: brightness(1.1);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: #00d4ff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(0, 212, 255, 0.6);
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    input[type="range"]:hover::-webkit-slider-thumb {
      transform: scale(1.15);
    }

    input[type="range"]:active::-webkit-slider-thumb {
      transform: scale(1.0);
    }

    .checkbox-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background 0.2s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      user-select: none;
    }

    .checkbox-item:hover {
      background: rgba(255, 255, 255, 0.08);
      filter: brightness(1.1);
    }

    .checkbox-item:active {
      transform: scale(0.96);
    }

    .checkbox-item input[type="checkbox"] {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border: 1.5px solid rgba(0, 212, 255, 0.5);
      border-radius: 3px;
      background: transparent;
      cursor: pointer;
      position: relative;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .checkbox-item input[type="checkbox"]:checked {
      background: #00d4ff;
      border-color: #00d4ff;
    }

    .checkbox-item input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      top: 1px;
      left: 4px;
      width: 4px;
      height: 8px;
      border: solid #0b0f19;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .checkbox-item span {
      font-size: 12px;
      color: #e2e8f0;
    }

    .depth-shallow { color: #4ade80 !important; }
    .depth-mid { color: #fbbf24 !important; }
    .depth-deep { color: #f87171 !important; }

    .playback-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .play-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      color: #0b0f19;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px rgba(0, 212, 255, 0.4);
    }

    .play-btn:hover {
      filter: brightness(1.1);
      transform: scale(1.08);
    }

    .play-btn:active {
      transform: scale(1.15);
    }

    .play-btn.playing {
      background: linear-gradient(135deg, #ff6b6b, #cc5555);
    }

    .speed-selector {
      display: flex;
      gap: 4px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      padding: 2px;
    }

    .speed-btn {
      padding: 4px 10px;
      border: none;
      background: transparent;
      color: #a0aec0;
      font-size: 11px;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: 'SF Mono', Monaco, 'Courier New', monospace;
    }

    .speed-btn:hover {
      color: #ffffff;
      filter: brightness(1.1);
    }

    .speed-btn.active {
      background: #00d4ff;
      color: #0b0f19;
      font-weight: bold;
    }

    .event-count {
      font-size: 12px;
      color: #a0aec0;
      padding: 4px 10px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
    }

    .event-count strong {
      color: #00d4ff;
      font-family: 'SF Mono', Monaco, 'Courier New', monospace;
    }

    .timeline-container {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 180px;
    }

    .timeline-label {
      font-size: 11px;
      color: #a0aec0;
      white-space: nowrap;
    }

    .timeline-bar {
      flex: 1;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      position: relative;
      overflow: hidden;
    }

    .timeline-progress {
      height: 100%;
      background: linear-gradient(90deg, #00d4ff, #ffd93d);
      border-radius: 2px;
      width: 0%;
      transition: width 0.1s linear;
    }

    .timeline-date {
      font-size: 11px;
      color: #00d4ff;
      font-family: 'SF Mono', Monaco, 'Courier New', monospace;
      min-width: 70px;
    }

    @media (max-width: 768px) {
      #controls {
        flex-direction: column;
        gap: 12px;
        padding: 12px 16px;
        bottom: 45px;
      }

      .control-group {
        width: 100%;
      }

      .slider-container {
        width: 100%;
      }

      input[type="range"] {
        flex: 1;
        width: auto;
      }

      .checkbox-group {
        justify-content: flex-start;
      }

      #info-panel {
        width: 85%;
        left: 7.5%;
        right: 7.5%;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <div id="info-panel">
      <div class="location" id="info-location">--</div>
      <div class="detail-row">
        <span class="detail-label">震级</span>
        <span class="detail-value" id="info-magnitude">--</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">深度</span>
        <span class="detail-value" id="info-depth">--</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">时间</span>
        <span class="detail-value" id="info-time">--</span>
      </div>
    </div>

    <div id="controls">
      <div class="control-group">
        <label>最小震级</label>
        <div class="slider-container">
          <input type="range" id="magnitude-slider" min="2.5" max="9.0" step="0.5" value="2.5" />
          <span class="slider-value" id="magnitude-value">2.5</span>
        </div>
      </div>

      <div class="control-group">
        <label>深度筛选</label>
        <div class="checkbox-group">
          <label class="checkbox-item">
            <input type="checkbox" id="depth-shallow" checked />
            <span class="depth-shallow">浅层 &lt;70km</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" id="depth-mid" checked />
            <span class="depth-mid">中层 70-300km</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" id="depth-deep" checked />
            <span class="depth-deep">深层 &gt;300km</span>
          </label>
        </div>
      </div>

      <div class="control-group">
        <label>历史回放</label>
        <div class="playback-controls">
          <button class="play-btn" id="play-btn" title="播放/暂停">
            ▶
          </button>
          <div class="speed-selector">
            <button class="speed-btn" data-speed="1">1x</button>
            <button class="speed-btn active" data-speed="2">2x</button>
            <button class="speed-btn" data-speed="5">5x</button>
          </div>
        </div>
      </div>

      <div class="control-group">
        <label>时间进度</label>
        <div class="timeline-container">
          <div class="timeline-bar">
            <div class="timeline-progress" id="timeline-progress"></div>
          </div>
          <span class="timeline-date" id="timeline-date">--</span>
        </div>
      </div>

      <div class="event-count">
        可见事件: <strong id="event-count">0</strong>
      </div>
    </div>

    <div id="status-bar">
      <div class="status-left">
        <span class="status-dot"></span>
        <span>数据来源: USGS Earthquake Hazards Program</span>
      </div>
      <div class="status-right">
        <span>最后更新: <span id="last-update">加载中...</span></span>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
