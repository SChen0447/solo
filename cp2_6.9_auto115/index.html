<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>动态水面纹理模拟器</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        min-height: 100vh;
        overflow-x: hidden;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: radial-gradient(ellipse at center, #0B1B2F 0%, #1A1A2E 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .app-container {
        width: 100%;
        max-width: 1200px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      #waterCanvas {
        display: block;
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        cursor: crosshair;
      }

      #controls {
        width: 100%;
        max-width: 800px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        padding: 16px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.1);
        margin-bottom: 12px;
      }

      .sliders {
        display: flex;
        flex-direction: column;
        gap: 16px;
        margin-bottom: 16px;
      }

      .slider-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .slider-label {
        color: #CCCCCC;
        font-size: 13px;
        min-width: 72px;
      }

      .slider-wrapper {
        flex: 1;
        position: relative;
        height: 24px;
        display: flex;
        align-items: center;
      }

      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 3px;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 2px;
        outline: none;
        cursor: pointer;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #FFFFFF;
        cursor: pointer;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        transition: transform 0.2s ease;
      }

      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.2);
      }

      input[type="range"]::-moz-range-thumb {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #FFFFFF;
        cursor: pointer;
        border: none;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        transition: transform 0.2s ease;
      }

      input[type="range"]::-moz-range-thumb:hover {
        transform: scale(1.2);
      }

      .slider-value {
        color: #CCCCCC;
        font-size: 12px;
        min-width: 40px;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .controls-footer {
        display: flex;
        justify-content: flex-end;
      }

      #resetBtn {
        padding: 8px 16px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 8px;
        color: #FFFFFF;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      #resetBtn:hover {
        background: rgba(126, 200, 227, 0.3);
        border-color: rgba(126, 200, 227, 0.5);
      }

      #resetBtn:active {
        transform: scale(0.95);
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <canvas id="waterCanvas" width="800" height="600"></canvas>
      <div id="controls">
        <div class="divider"></div>
        <div class="sliders"></div>
        <div class="controls-footer">
          <button id="resetBtn">重置为默认</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
