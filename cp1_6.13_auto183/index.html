<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ffd93d'%3E%3Cpath d='M12 2L14.09 8.26L21 9.27L16 13.97L17.18 20.92L12 17.77L6.82 20.92L8 13.97L3 9.27L9.91 8.26L12 2Z'/%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=375px" />
    <title>时光·织梦录</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body, #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0e27;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      }
      .loading-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at center, #1b1c3a 0%, #0a0e27 100%);
        z-index: 9999;
      }
      .loading-star {
        width: 60px;
        height: 60px;
        animation: spin 2s linear infinite, glow 1.5s ease-in-out infinite alternate;
        filter: drop-shadow(0 0 20px #ffd93d);
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes glow {
        from { filter: drop-shadow(0 0 10px #ffd93d); }
        to { filter: drop-shadow(0 0 30px #ffd93d) drop-shadow(0 0 50px #ff6b6b); }
      }
      .loading-title {
        margin-top: 30px;
        color: #aab;
        font-size: 20px;
        letter-spacing: 8px;
        animation: fadeIn 1.5s ease-in-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-container">
        <svg class="loading-star" viewBox="0 0 24 24" fill="#ffd93d">
          <path d="M12 2L14.09 8.26L21 9.27L16 13.97L17.18 20.92L12 17.77L6.82 20.92L8 13.97L3 9.27L9.91 8.26L12 2Z" />
        </svg>
        <div class="loading-title">时光·织梦录</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
