<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1a1a2e" />
    <title>心情诗歌壁纸</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #1a1a2e;
        --text: rgba(255, 255, 255, 0.9);
        --text-dim: rgba(255, 255, 255, 0.5);
        --happy: #ff9a56;
        --melancholy: #6a4c93;
        --romantic: #ff6b9d;
        --serene: #00b894;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        -webkit-tap-highlight-color: transparent;
      }

      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      #wallpaper-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
      }

      .ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        padding: 48px 24px;
        z-index: 10;
      }

      .emotion-selector {
        pointer-events: auto;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 24px;
      }

      .emotion-btn {
        position: relative;
        width: 88px;
        height: 88px;
        border: none;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: var(--text);
        font-size: 12px;
        font-weight: 400;
        transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                    box-shadow 0.3s ease,
                    background 0.3s ease;
        outline: none;
        user-select: none;
      }

      .emotion-btn:hover {
        transform: scale(1.1);
      }

      .emotion-btn.happy:hover { box-shadow: 0 0 32px rgba(255, 154, 86, 0.5); }
      .emotion-btn.melancholy:hover { box-shadow: 0 0 32px rgba(106, 76, 147, 0.5); }
      .emotion-btn.romantic:hover { box-shadow: 0 0 32px rgba(255, 107, 157, 0.5); }
      .emotion-btn.serene:hover { box-shadow: 0 0 32px rgba(0, 184, 148, 0.5); }

      .emotion-btn.selected {
        animation: pulse 2s ease-in-out infinite;
      }

      .emotion-btn.happy.selected { box-shadow: 0 0 24px rgba(255, 154, 86, 0.6); background: rgba(255, 154, 86, 0.18); }
      .emotion-btn.melancholy.selected { box-shadow: 0 0 24px rgba(106, 76, 147, 0.6); background: rgba(106, 76, 147, 0.18); }
      .emotion-btn.romantic.selected { box-shadow: 0 0 24px rgba(255, 107, 157, 0.6); background: rgba(255, 107, 157, 0.18); }
      .emotion-btn.serene.selected { box-shadow: 0 0 24px rgba(0, 184, 148, 0.6); background: rgba(0, 184, 148, 0.18); }

      .emotion-btn .icon {
        font-size: 28px;
        line-height: 1;
      }

      .emotion-btn .label {
        font-size: 11px;
        letter-spacing: 0.5px;
        opacity: 0.85;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.06); }
      }

      .refresh-area {
        pointer-events: auto;
        text-align: center;
      }

      .refresh-btn {
        background: none;
        border: none;
        color: var(--text-dim);
        font-family: 'Noto Sans SC', sans-serif;
        font-size: 13px;
        letter-spacing: 2px;
        cursor: pointer;
        padding: 8px 16px;
        border-radius: 4px;
        transition: color 0.3s ease, opacity 0.3s ease;
        opacity: 0.6;
        outline: none;
      }

      .refresh-btn:hover {
        color: var(--text);
        opacity: 1;
      }

      .refresh-btn.hidden {
        opacity: 0;
        pointer-events: none;
      }

      @media (max-width: 600px) {
        .ui-layer {
          padding: 32px 16px;
        }
        .emotion-selector {
          gap: 16px;
        }
        .emotion-btn {
          width: 72px;
          height: 72px;
        }
        .emotion-btn .icon {
          font-size: 24px;
        }
        .emotion-btn .label {
          font-size: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="wallpaper-canvas"></canvas>
      <div class="ui-layer">
        <div class="emotion-selector">
          <button class="emotion-btn happy" data-emotion="happy" aria-label="快乐">
            <span class="icon">☀️</span>
            <span class="label">快乐</span>
          </button>
          <button class="emotion-btn melancholy" data-emotion="melancholy" aria-label="忧郁">
            <span class="icon">🌧️</span>
            <span class="label">忧郁</span>
          </button>
          <button class="emotion-btn romantic" data-emotion="romantic" aria-label="浪漫">
            <span class="icon">🌹</span>
            <span class="label">浪漫</span>
          </button>
          <button class="emotion-btn serene" data-emotion="serene" aria-label="宁静">
            <span class="icon">🍃</span>
            <span class="label">宁静</span>
          </button>
        </div>
        <div class="refresh-area">
          <button class="refresh-btn hidden" id="refresh-btn">点 击 再 试</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
