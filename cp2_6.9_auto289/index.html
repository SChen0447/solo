<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>回响编织者</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0B0E1A;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #ffffff;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    #canvas-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0B0E1A;
    }

    #main-canvas {
      display: block;
      background: #0B0E1A;
      cursor: crosshair;
    }

    #control-panel {
      height: 80px;
      background: #15152B;
      border-top: 2px solid #2A2A4C;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      gap: 24px;
      flex-shrink: 0;
    }

    .panel-left,
    .panel-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .panel-center {
      flex: 1;
      display: flex;
      justify-content: center;
    }

    .btn-reset {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid #FF6B6B;
      background: transparent;
      color: #FF6B6B;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .btn-reset:hover {
      background: rgba(255, 107, 107, 0.2);
      transform: rotate(180deg);
    }

    .slider-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .slider-label {
      font-size: 12px;
      color: #A0A0C0;
      min-width: 56px;
    }

    .slider-value {
      font-size: 12px;
      color: #E0E0FF;
      min-width: 32px;
      text-align: right;
      font-family: 'Courier New', monospace;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 150px;
      height: 6px;
      background: #2A2A4C;
      border-radius: 3px;
      outline: none;
      transition: background 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    #speed-slider::-webkit-slider-thumb {
      background: #6C63FF;
      box-shadow: 0 0 8px rgba(108, 99, 255, 0.6);
    }

    #echo-slider::-webkit-slider-thumb {
      background: #4ECDC4;
      box-shadow: 0 0 8px rgba(78, 205, 196, 0.6);
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .btn-generate {
      width: 180px;
      height: 40px;
      border-radius: 8px;
      border: none;
      background: #2A2A4C;
      color: #ffffff;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 500;
      letter-spacing: 1px;
    }

    .btn-generate:hover {
      background: #3A3A7C;
      box-shadow: 0 0 20px rgba(108, 99, 255, 0.4);
      transform: translateY(-1px);
    }

    .btn-generate:active {
      transform: translateY(0);
    }

    .status-text {
      font-size: 14px;
      color: #ffffff;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-wrapper">
      <canvas id="main-canvas"></canvas>
    </div>
    <div id="control-panel">
      <div class="panel-left">
        <button id="btn-reset" class="btn-reset" title="重置">↻</button>
        <div class="slider-group">
          <span class="slider-label">速度</span>
          <input type="range" id="speed-slider" min="0.5" max="2.0" step="0.1" value="1.0" />
          <span class="slider-value" id="speed-value">1.0x</span>
        </div>
        <div class="slider-group">
          <span class="slider-label">回响</span>
          <input type="range" id="echo-slider" min="0" max="1.0" step="0.05" value="0.5" />
          <span class="slider-value" id="echo-value">0.50</span>
        </div>
      </div>
      <div class="panel-center">
        <button id="btn-generate" class="btn-generate">生成视听序列</button>
      </div>
      <div class="panel-right">
        <span class="status-text" id="status-text">节拍: 00 | 激活: 00</span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
