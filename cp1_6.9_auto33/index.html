<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>虚拟雕塑园</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #ffffff;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    .sculpture-name {
      position: absolute;
      top: 24px;
      left: 24px;
      font-size: 18px;
      font-weight: 500;
      color: #ffffff;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      letter-spacing: 1px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      padding: 12px 20px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .control-panel {
      position: absolute;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .ctrl-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      color: #ffffff;
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.15);
      position: relative;
    }

    .ctrl-btn:hover {
      background: rgba(255, 255, 255, 0.4);
      transform: scale(1.1);
    }

    .ctrl-btn.active {
      background: rgba(231, 76, 60, 0.6);
    }

    .ctrl-btn.selected-active {
      background: rgba(52, 152, 219, 0.6);
    }

    .ctrl-btn .key-hint {
      position: absolute;
      bottom: -22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
      white-space: nowrap;
    }

    .ctrl-btn svg {
      width: 24px;
      height: 24px;
    }

    @media (max-width: 768px) {
      .sculpture-name {
        top: 12px;
        left: 12px;
        font-size: 14px;
        padding: 8px 14px;
      }

      .control-panel {
        bottom: 12px;
        right: 12px;
        flex-direction: row;
      }

      .ctrl-btn {
        width: 40px;
        height: 40px;
        font-size: 14px;
      }

      .ctrl-btn svg {
        width: 18px;
        height: 18px;
      }

      .ctrl-btn .key-hint {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="sculpture-name" id="sculptureName">虚拟雕塑园</div>
    <div class="control-panel">
      <button class="ctrl-btn" id="btnDisassemble" title="拆解">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span class="key-hint">空格</span>
      </button>
      <button class="ctrl-btn" id="btnAssemble" title="重组">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span class="key-hint">回车</span>
      </button>
      <button class="ctrl-btn" id="btnReset" title="重置视角">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        <span class="key-hint">R</span>
      </button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
