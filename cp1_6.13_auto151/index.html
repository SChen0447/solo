<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1024" />
  <title>风语·经幡阵</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a1628;
    }
    #app {
      width: 100%;
      height: 100vh;
      min-width: 1024px;
    }
    canvas {
      display: block;
    }
    .hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.7);
      font-family: 'Microsoft YaHei', sans-serif;
      font-size: 14px;
      pointer-events: none;
      z-index: 100;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="hint">拖拽鼠标旋转视角 · 点击画面聆听风铃声</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
