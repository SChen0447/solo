<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>交互式乐谱创作工具</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <div class="main-container">
      <div class="score-area">
        <div class="score-header">
          <div class="time-signature">
            <select id="timeSigSelect">
              <option value="4/4">4/4</option>
              <option value="3/4">3/4</option>
              <option value="6/8">6/8</option>
            </select>
          </div>
          <div class="note-types">
            <button class="note-btn" data-type="whole" title="全音符">𝅝</button>
            <button class="note-btn" data-type="half" title="二分音符">𝅗𝅥</button>
            <button class="note-btn active" data-type="quarter" title="四分音符">♩</button>
            <button class="note-btn" data-type="eighth" title="八分音符">♪</button>
            <button class="note-btn" data-type="sixteenth" title="十六分音符">𝅘𝅥𝅯</button>
          </div>
        </div>
        <div class="score-scroll">
          <canvas id="scoreCanvas"></canvas>
        </div>
        <div class="piano-roll">
          <canvas id="pianoRollCanvas"></canvas>
        </div>
      </div>
      <div class="control-panel">
        <button class="toggle-panel-btn" id="togglePanelBtn">
          <span class="arrow-icon">▼</span>
        </button>
        <div class="panel-content">
          <div class="panel-section">
            <h3>音色</h3>
            <div class="timbre-buttons">
              <button class="timbre-btn active" data-timbre="piano">钢琴</button>
              <button class="timbre-btn" data-timbre="guitar">吉他</button>
              <button class="timbre-btn" data-timbre="organ">管风琴</button>
              <button class="timbre-btn" data-timbre="xylophone">木琴</button>
            </div>
          </div>
          <div class="panel-section">
            <h3>音量</h3>
            <div class="slider-container">
              <input type="range" id="volumeSlider" min="0" max="100" value="70" />
              <span id="volumeValue">70%</span>
            </div>
          </div>
          <div class="panel-section">
            <h3>混响</h3>
            <div class="slider-container">
              <input type="range" id="reverbSlider" min="0" max="100" value="30" />
              <span id="reverbValue">30%</span>
            </div>
          </div>
          <div class="panel-section">
            <h3>播放速度</h3>
            <div class="slider-container">
              <input type="range" id="speedSlider" min="0.5" max="2" step="0.1" value="1" />
              <span id="speedValue">1.0x</span>
            </div>
          </div>
          <div class="panel-section play-controls">
            <button class="play-btn" id="playBtn">▶</button>
            <button class="play-btn" id="stopBtn">■</button>
            <label class="loop-label">
              <input type="checkbox" id="loopCheckbox" />
              <span>循环</span>
            </label>
          </div>
          <div class="panel-section">
            <button class="clear-btn" id="clearBtn">清空乐谱</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
