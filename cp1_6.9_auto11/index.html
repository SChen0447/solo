<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Black Hole Accretion Visualization</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #000000 0%, #0a0a1a 100%);
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #stats {
      position: absolute;
      top: 12px;
      left: 12px;
      font-family: monospace;
      font-size: 14px;
      color: #ffffff;
      opacity: 0.5;
      z-index: 10;
      pointer-events: none;
      line-height: 1.6;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="stats"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
