<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 磁力线可视化工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #FFFFFF;
      background: #0A0E27;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 280px;
      bottom: 40px;
      overflow: hidden;
    }

    #canvas-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    #control-panel {
      position: absolute;
      top: 0;
      right: 0;
      width: 280px;
      bottom: 40px;
      background: rgba(30, 30, 46, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 12px 0 0 12px;
      padding: 20px;
      overflow-y: auto;
      z-index: 10;
    }

    #control-panel::-webkit-scrollbar {
      width: 6px;
    }
    #control-panel::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
    }
    #control-panel::-webkit-scrollbar-thumb {
      background: rgba(79, 195, 247, 0.5);
      border-radius: 3px;
    }

    .panel-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #4FC3F7;
      letter-spacing: 1px;
      border-bottom: 1px solid rgba(79, 195, 247, 0.3);
      padding-bottom: 10px;
    }

    .control-card {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 16px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: all 0.3s ease;
    }

    .control-card:hover {
      border-color: rgba(79, 195, 247, 0.3);
      background: rgba(79, 195, 247, 0.05);
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 10px;
      color: rgba(255, 255, 255, 0.85);
    }

    .control-value {
      background: rgba(79, 195, 247, 0.15);
      color: #4FC3F7;
      padding: 2px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: linear-gradient(90deg, #4A90D9, #4FC3F7);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #FFFFFF;
      cursor: pointer;
      box-shadow: 0 0 0 rgba(79, 195, 247, 0);
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 12px rgba(79, 195, 247, 0.8);
      transform: scale(1.1);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #FFFFFF;
      cursor: pointer;
      border: none;
    }

    .mode-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .mode-btn {
      flex: 1;
      min-width: 70px;
      padding: 8px 10px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.03);
      color: rgba(255, 255, 255, 0.7);
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.3s ease;
    }

    .mode-btn:hover {
      border-color: rgba(79, 195, 247, 0.5);
      color: #4FC3F7;
    }

    .mode-btn.active {
      background: rgba(79, 195, 247, 0.2);
      border-color: #4FC3F7;
      color: #4FC3F7;
      font-weight: 600;
    }

    .select-wrapper {
      position: relative;
    }

    select {
      width: 100%;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
      transition: all 0.3s ease;
    }

    select:hover, select:focus {
      border-color: #4FC3F7;
      background: rgba(79, 195, 247, 0.1);
    }

    select option {
      background: #1E1E2E;
      color: #FFFFFF;
    }

    .add-btn {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #4ECDC4, #4FC3F7);
      color: #0A0E27;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
    }

    .add-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(78, 205, 196, 0.4);
    }

    .add-btn:active {
      transform: translateY(0);
    }

    .hint-text {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.45);
      margin-top: 8px;
      line-height: 1.5;
    }

    #status-bar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 40px;
      background: #0D1117;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 32px;
      z-index: 10;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.65);
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-dot.green { background: #4ECDC4; box-shadow: 0 0 8px #4ECDC4; }
    .status-dot.blue { background: #4FC3F7; box-shadow: 0 0 8px #4FC3F7; }
    .status-dot.yellow { background: #FFD700; box-shadow: 0 0 8px #FFD700; }

    .status-value {
      color: rgba(255, 255, 255, 0.9);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div id="control-panel">
      <div class="panel-title">⚡ 磁场控制面板</div>

      <div class="control-card">
        <div class="control-label">
          <span>磁力线条数</span>
          <span class="control-value" id="lineCountValue">200</span>
        </div>
        <input type="range" id="lineCountSlider" min="50" max="500" value="200" step="10" />
      </div>

      <div class="control-card">
        <div class="control-label">
          <span>磁场强度</span>
          <span class="control-value" id="strengthValue">1.00</span>
        </div>
        <input type="range" id="strengthSlider" min="0.5" max="3.0" value="1.0" step="0.1" />
      </div>

      <div class="control-card">
        <div class="control-label">
          <span>显示模式</span>
        </div>
        <div class="mode-group" id="modeGroup">
          <button class="mode-btn" data-mode="static">静态线框</button>
          <button class="mode-btn active" data-mode="flow">动态流动</button>
          <button class="mode-btn" data-mode="particles">粒子轨迹</button>
        </div>
      </div>

      <div class="control-card">
        <div class="control-label">
          <span>添加磁铁</span>
        </div>
        <div class="select-wrapper" style="margin-bottom: 10px;">
          <select id="magnetTypeSelect">
            <option value="bar">条形磁铁</option>
            <option value="horseshoe">马蹄形磁铁</option>
          </select>
        </div>
        <button class="add-btn" id="addMagnetBtn">+ 点击场景放置</button>
        <p class="hint-text">选中后在场景中点击放置，支持拖拽移动。网格吸附已启用。</p>
      </div>

      <div class="hint-text" style="margin-top: 20px; padding: 10px; background: rgba(79, 195, 247, 0.05); border-radius: 6px; border-left: 2px solid #4FC3F7;">
        💡 操作提示：<br />
        · 鼠标左键拖拽旋转视角<br />
        · 滚轮缩放场景<br />
        · 右键平移视图
      </div>
    </div>

    <div id="status-bar">
      <div class="status-item">
        <div class="status-dot blue"></div>
        <span>磁力线：</span><span class="status-value" id="statusLines">0</span>
      </div>
      <div class="status-item">
        <div class="status-dot green"></div>
        <span>FPS：</span><span class="status-value" id="statusFps">60</span>
      </div>
      <div class="status-item">
        <div class="status-dot yellow"></div>
        <span>模式：</span><span class="status-value" id="statusMode">动态流动</span>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
