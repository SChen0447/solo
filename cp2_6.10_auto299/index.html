<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>粒子沙盘</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <canvas id="canvas"></canvas>

    <h1 id="title">粒子沙盘</h1>

    <div id="fps-counter">FPS: 0</div>

    <div id="control-panel">
      <div class="panel-header">控制面板</div>
      
      <div class="control-group">
        <label>粒子数量: <span id="particle-count-value">500</span></label>
        <input type="range" id="particle-count" min="100" max="2000" step="100" value="500" />
      </div>

      <div class="control-group">
        <label>发射速率: <span id="emit-rate-value">2</span> 个/帧</label>
        <input type="range" id="emit-rate" min="0" max="5" step="1" value="2" />
      </div>

      <div class="control-group">
        <label>重力场强度: <span id="gravity-value">1.0</span></label>
        <input type="range" id="gravity" min="-10" max="10" step="0.1" value="1" />
      </div>

      <div class="control-group">
        <label>粒子尺寸缩放: <span id="particle-scale-value">1.0</span></label>
        <input type="range" id="particle-scale" min="0.5" max="2" step="0.1" value="1" />
      </div>

      <div class="control-group">
        <label>连接阈值: <span id="connection-threshold-value">2.0</span></label>
        <input type="range" id="connection-threshold" min="1" max="4" step="0.1" value="2" />
      </div>

      <div class="control-group toggle-group">
        <label>显示力场范围</label>
        <label class="switch">
          <input type="checkbox" id="show-forcefields" checked />
          <span class="slider"></span>
        </label>
      </div>

      <div class="control-group toggle-group">
        <label>显示轨迹 (T键)</label>
        <label class="switch">
          <input type="checkbox" id="show-trails" />
          <span class="slider"></span>
        </label>
      </div>

      <button id="reset-btn" class="reset-btn">重置场景</button>

      <div class="panel-hint">
        <p>左键: 放置吸引力场</p>
        <p>右键: 放置排斥力场</p>
        <p>空格键: 显示粒子连接</p>
        <p>T键: 切换轨迹 | C键: 清除轨迹</p>
        <p>拖拽: 移动力场</p>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
