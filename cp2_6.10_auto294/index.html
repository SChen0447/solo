<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>活字排印</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #3e2723;
        font-family: 'KaiTi', '楷体', 'STKaiti', serif;
      }

      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }

      #canvas-container {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #canvas-container canvas {
        display: block;
      }

      .title {
        position: absolute;
        top: 40px;
        left: 50%;
        transform: translateX(-50%);
        color: #ffffff;
        font-size: 48px;
        font-weight: bold;
        letter-spacing: 12px;
        text-shadow:
          2px 2px 4px rgba(0, 0, 0, 0.8),
          -1px -1px 2px rgba(255, 179, 0, 0.3),
          0 0 20px rgba(0, 0, 0, 0.5);
        z-index: 10;
        user-select: none;
        padding: 10px 30px;
        border: 3px solid rgba(255, 179, 0, 0.4);
        background: rgba(62, 39, 35, 0.6);
        border-radius: 4px;
      }

      .title::before {
        content: '';
        position: absolute;
        top: 4px;
        left: 4px;
        right: 4px;
        bottom: 4px;
        border: 1px solid rgba(255, 179, 0, 0.2);
        pointer-events: none;
      }

      #ui-container {
        position: absolute;
        right: 30px;
        bottom: 30px;
        z-index: 100;
      }

      .control-panel {
        background: rgba(141, 110, 99, 0.35);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        padding: 24px;
        width: 340px;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
      }

      .panel-section {
        margin-bottom: 20px;
      }

      .panel-section:last-child {
        margin-bottom: 0;
      }

      .panel-label {
        color: #faebd2;
        font-size: 16px;
        margin-bottom: 10px;
        display: block;
        letter-spacing: 2px;
      }

      .text-input {
        width: 100%;
        padding: 12px 16px;
        background: rgba(62, 39, 35, 0.6);
        border: 2px solid rgba(141, 110, 99, 0.6);
        border-radius: 6px;
        color: #faebd2;
        font-size: 18px;
        font-family: 'KaiTi', '楷体', 'STKaiti', serif;
        outline: none;
        transition: all 0.3s ease;
        letter-spacing: 2px;
      }

      .text-input:focus {
        border-color: #ffb300;
        box-shadow: 0 0 12px rgba(255, 179, 0, 0.3);
      }

      .text-input::placeholder {
        color: rgba(250, 235, 210, 0.4);
      }

      .char-count {
        text-align: right;
        color: rgba(250, 235, 210, 0.5);
        font-size: 12px;
        margin-top: 6px;
      }

      .slider-container {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .slider {
        flex: 1;
        -webkit-appearance: none;
        appearance: none;
        height: 8px;
        background: linear-gradient(to right, rgba(78, 52, 46, 0.8), rgba(141, 110, 99, 0.8));
        border-radius: 4px;
        outline: none;
        cursor: pointer;
      }

      .slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 20px;
        height: 20px;
        background: linear-gradient(135deg, #ffb300, #e6a000);
        border-radius: 50%;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(255, 179, 0, 0.5);
        transition: transform 0.2s ease;
      }

      .slider::-webkit-slider-thumb:hover {
        transform: scale(1.15);
      }

      .slider-value {
        color: #ffb300;
        font-size: 14px;
        min-width: 60px;
        text-align: right;
        font-weight: bold;
      }

      .button-group {
        display: flex;
        gap: 12px;
      }

      .action-btn {
        flex: 1;
        padding: 14px 20px;
        background: rgba(78, 52, 46, 0.8);
        border: 2px solid rgba(141, 110, 99, 0.6);
        border-radius: 6px;
        color: rgba(250, 235, 210, 0.5);
        font-size: 16px;
        font-family: 'KaiTi', '楷体', 'STKaiti', serif;
        cursor: not-allowed;
        transition: all 0.4s ease;
        position: relative;
        overflow: hidden;
        letter-spacing: 4px;
      }

      .action-btn.active {
        background: linear-gradient(135deg, #ffb300, #e6a000);
        border-color: #ffb300;
        color: #3e2723;
        cursor: pointer;
        box-shadow: 0 4px 16px rgba(255, 179, 0, 0.4);
      }

      .action-btn.active:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(255, 179, 0, 0.5);
      }

      .action-btn.active:active {
        transform: translateY(0);
      }

      .ripple {
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.6);
        transform: scale(0);
        animation: ripple-animation 0.6s ease-out;
        pointer-events: none;
      }

      @keyframes ripple-animation {
        to {
          transform: scale(4);
          opacity: 0;
        }
      }

      .status-indicator {
        margin-top: 16px;
        padding: 10px 14px;
        background: rgba(62, 39, 35, 0.5);
        border-radius: 6px;
        border-left: 3px solid #ffb300;
      }

      .status-text {
        color: #faebd2;
        font-size: 13px;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="title">活字排印</div>
      <div id="canvas-container"></div>
      <div id="ui-container"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
