<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>微观粒子碰撞模拟沙盒</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0D1B2A;
      color: #E0E0E0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    .app-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .canvas-wrapper {
      position: relative;
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5);
      border-radius: 8px;
      overflow: hidden;
    }

    #particleCanvas {
      display: block;
      background-color: #0D1B2A;
      cursor: crosshair;
    }

    .info-panel {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(13, 27, 42, 0.7);
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      line-height: 1.8;
      min-width: 180px;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .info-panel:hover {
      background: rgba(13, 27, 42, 0.9);
      border-color: rgba(255, 255, 255, 0.1);
    }

    .info-panel .label {
      color: #888;
      display: inline-block;
      min-width: 80px;
    }

    .info-panel .value {
      color: #E0E0E0;
      font-family: monospace;
    }

    .info-panel .warning {
      color: #FF6B6B;
      font-weight: bold;
      margin-top: 8px;
      display: none;
    }

    .info-panel .warning.show {
      display: block;
    }

    .control-panel {
      background: rgba(27, 40, 56, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      min-width: 320px;
      max-width: 600px;
      width: 100%;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .control-panel:hover {
      background: rgba(27, 40, 56, 0.8);
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .slider-label {
      font-size: 13px;
      color: #E0E0E0;
      display: flex;
      justify-content: space-between;
    }

    .slider-value {
      color: #00E5FF;
      font-family: monospace;
      font-weight: bold;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right, #00E5FF, #B388FF);
      outline: none;
      transition: all 0.3s ease;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
      transition: all 0.3s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.8);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
      transition: all 0.3s ease;
    }

    input[type="range"]::-moz-range-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.8);
    }

    .particle-counter {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-family: monospace;
      font-size: 14px;
      color: #fff;
    }

    .particle-counter .a {
      color: #00E5FF;
    }

    .particle-counter .b {
      color: #B388FF;
    }

    .reset-btn {
      background: linear-gradient(135deg, #00E5FF, #B388FF);
      color: #0D1B2A;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .reset-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0, 229, 255, 0.4);
    }

    .reset-btn:active {
      transform: translateY(0);
    }

    @media (max-width: 600px) {
      .control-panel {
        flex-direction: column;
        align-items: stretch;
      }

      .particle-counter {
        flex-direction: row;
        justify-content: space-around;
      }

      #particleCanvas {
        width: 100%;
        height: auto;
        max-width: 800px;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="canvas-wrapper">
      <canvas id="particleCanvas" width="800" height="600"></canvas>
      <div class="info-panel" id="infoPanel">
        <div><span class="label">动量 X:</span><span class="value" id="momentumX">0.00</span></div>
        <div><span class="label">动量 Y:</span><span class="value" id="momentumY">0.00</span></div>
        <div><span class="label">总动能:</span><span class="value" id="kineticEnergy">0.00</span></div>
        <div><span class="label">粒子数:</span><span class="value" id="totalParticles">0</span></div>
        <div><span class="label">碰撞次数:</span><span class="value" id="collisionCount">0</span></div>
        <div class="warning" id="warningText">⚠ 粒子数量已达上限</div>
      </div>
    </div>
    <div class="control-panel" id="controlPanel">
      <div class="slider-group">
        <div class="slider-label">
          <span>发射粒子质量</span>
          <span class="slider-value" id="massValue">2.0</span>
        </div>
        <input type="range" id="massSlider" min="0.5" max="5" step="0.5" value="2" />
      </div>
      <div class="particle-counter">
        <div class="a">粒子A: <span id="countA">0</span></div>
        <div class="b">粒子B: <span id="countB">0</span></div>
      </div>
      <button class="reset-btn" id="resetBtn">重置粒子</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
