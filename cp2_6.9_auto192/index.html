<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 社交媒体连接网络图</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0a0a1a;
      color: #eeeeee;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: relative;
      cursor: grab;
    }

    #canvas-container:active {
      cursor: grabbing;
    }

    #control-panel {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 240px;
      height: 280px;
      background: rgba(26, 26, 46, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 12px;
      padding: 20px;
      opacity: 0.6;
      transition: opacity 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 100;
    }

    #control-panel:hover {
      opacity: 0.9;
    }

    .panel-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #4ecdc4;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
    }

    .panel-section {
      margin-bottom: 18px;
    }

    .panel-label {
      font-size: 12px;
      color: #eeeeee;
      margin-bottom: 8px;
      display: block;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
    }

    .btn-relayout {
      width: 100%;
      padding: 10px 16px;
      background: linear-gradient(135deg, #4ecdc4 0%, #45b7d1 100%);
      border: none;
      border-radius: 8px;
      color: #0a0a1a;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-shadow: none;
    }

    .btn-relayout:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(78, 205, 196, 0.4);
    }

    .btn-relayout:active {
      transform: translateY(0);
    }

    .slider-density {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
      outline: none;
    }

    .slider-density::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #ff6b6b;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(255, 107, 107, 0.6);
      transition: transform 0.2s ease;
    }

    .slider-density::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .slider-density::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #ff6b6b;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 10px rgba(255, 107, 107, 0.6);
    }

    .select-category {
      width: 100%;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #eeeeee;
      font-size: 12px;
      cursor: pointer;
      outline: none;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
    }

    .select-category option {
      background: #1a1a2e;
      color: #eeeeee;
    }

    #tooltip {
      position: fixed;
      width: 150px;
      height: 50px;
      background: rgba(26, 26, 46, 0.9);
      border: 2px solid #1a1a2e;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      color: #eeeeee;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 200;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    #tooltip.visible {
      opacity: 1;
    }

    .tooltip-name {
      font-weight: 600;
      color: #4ecdc4;
      margin-bottom: 2px;
    }

    .tooltip-meta {
      font-size: 11px;
      color: #aaaaaa;
    }

    @media (max-width: 768px) {
      #control-panel {
        opacity: 0.85;
        width: 220px;
        height: auto;
        right: 10px;
        bottom: 10px;
        padding: 14px;
      }

      .btn-relayout,
      .panel-label,
      .select-category {
        font-size: 11px;
      }

      #tooltip {
        width: 120px;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="control-panel">
    <div class="panel-title">控制面板</div>

    <div class="panel-section">
      <button id="btn-relayout" class="btn-relayout">重新布局</button>
    </div>

    <div class="panel-section">
      <label class="panel-label" for="slider-density">连接线密度: <span id="density-value">0.5</span></label>
      <input id="slider-density" class="slider-density" type="range" min="0.1" max="1.0" step="0.1" value="0.5" />
    </div>

    <div class="panel-section">
      <label class="panel-label" for="select-category">节点类别筛选</label>
      <select id="select-category" class="select-category">
        <option value="all">所有类别</option>
        <option value="friend">好友</option>
        <option value="group">群组</option>
        <option value="tag">标签</option>
      </select>
    </div>
  </div>

  <div id="tooltip">
    <div class="tooltip-name" id="tooltip-name"></div>
    <div class="tooltip-meta" id="tooltip-meta"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
