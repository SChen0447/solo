<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>晶格调色盘 - 3D色彩空间探索</title>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
    }

    body {
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #0d0d1a 100%);
      color: #e0e0e0;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #ui-container {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 220px;
      padding: 20px;
      background: rgba(13, 13, 26, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 10;
    }

    #ui-container h2 {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    .slider-group {
      margin-bottom: 14px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: #e0e0e0;
      margin-bottom: 6px;
    }

    .slider-value {
      font-size: 12px;
      color: #aaa;
    }

    input[type='range'] {
      -webkit-appearance: none;
      appearance: none;
      width: 180px;
      height: 8px;
      border-radius: 4px;
      outline: none;
      cursor: pointer;
    }

    input[type='range']#h-slider {
      background: linear-gradient(
        to right,
        #ff0000 0%,
        #ffff00 17%,
        #00ff00 33%,
        #00ffff 50%,
        #0000ff 67%,
        #ff00ff 83%,
        #ff0000 100%
      );
    }

    input[type='range']#s-slider {
      background: linear-gradient(to right, #808080 0%, #00aaff 100%);
    }

    input[type='range']#v-slider {
      background: linear-gradient(to right, #000000 0%, #ffffff 100%);
    }

    input[type='range']::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid rgba(255, 255, 255, 0.5);
      cursor: pointer;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
      transition: transform 0.15s ease;
    }

    input[type='range']::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    input[type='range']::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid rgba(255, 255, 255, 0.5);
      cursor: pointer;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
    }

    .value-display {
      margin: 18px 0 14px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.8;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .value-line {
      display: flex;
      justify-content: space-between;
    }

    .color-preview {
      width: 100%;
      height: 24px;
      border-radius: 6px;
      margin-bottom: 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: #e0e0e0;
      background: rgba(255, 255, 255, 0.08);
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.14);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-primary {
      background: rgba(100, 150, 255, 0.2);
      border-color: rgba(100, 150, 255, 0.3);
    }

    .btn-primary:hover {
      background: rgba(100, 150, 255, 0.3);
    }

    .toggle-btn.active {
      background: rgba(100, 255, 150, 0.2);
      border-color: rgba(100, 255, 150, 0.3);
    }

    #footer-tip {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #666;
      text-align: center;
      white-space: nowrap;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards 0.3s;
      z-index: 10;
    }

    #footer-tip .version {
      display: block;
      margin-top: 4px;
      font-size: 11px;
      color: #555;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    @media (max-width: 768px) {
      #ui-container {
        top: auto;
        left: 0;
        bottom: 0;
        width: 100%;
        padding: 14px 16px;
        border-radius: 16px 16px 0 0;
      }

      #ui-container h2 {
        display: none;
      }

      .slider-group {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
      }

      .slider-label {
        margin-bottom: 0;
        min-width: 60px;
      }

      input[type='range'] {
        flex: 1;
        width: auto;
      }

      .value-display {
        margin: 10px 0;
        display: flex;
        justify-content: space-around;
        padding: 8px 12px;
      }

      .color-preview {
        height: 18px;
      }

      .btn-group {
        flex-direction: row;
      }

      .btn {
        flex: 1;
      }

      #footer-tip {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="ui-container"></div>
    <div id="footer-tip">
      拖拽旋转 · 滚轮缩放 · 滑块调色
      <span class="version">Crystal Color Palette v1.0.0</span>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
