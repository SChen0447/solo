<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>动态水墨画模拟器</title>
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
  <div id="app">
    <canvas id="canvas"></canvas>
    <div id="ui-overlay">
      <div id="ink-indicator">
        <svg width="60" height="60" viewBox="0 0 60 60">
          <circle id="ink-bg" cx="30" cy="30" r="24" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="6"/>
          <circle id="ink-progress" cx="30" cy="30" r="24" fill="none" stroke="#000" stroke-width="6"
                  stroke-linecap="round" stroke-dasharray="150.8" stroke-dashoffset="0"
                  transform="rotate(-90 30 30)"/>
        </svg>
        <span id="ink-text">100%</span>
      </div>
      <div id="toolbar">
        <div class="toolbar-section">
          <div class="section-title">墨色浓淡</div>
          <div id="ink-shades">
            <button class="shade-btn active" data-color="#0A0A0A" data-name="焦墨">
              <span class="shade-preview" style="background:#0A0A0A"></span>
              <span class="shade-label">焦墨</span>
            </button>
            <button class="shade-btn" data-color="#333333" data-name="浓墨">
              <span class="shade-preview" style="background:#333333"></span>
              <span class="shade-label">浓墨</span>
            </button>
            <button class="shade-btn" data-color="#555555" data-name="重墨">
              <span class="shade-preview" style="background:#555555"></span>
              <span class="shade-label">重墨</span>
            </button>
            <button class="shade-btn" data-color="#888888" data-name="淡墨">
              <span class="shade-preview" style="background:#888888"></span>
              <span class="shade-label">淡墨</span>
            </button>
            <button class="shade-btn" data-color="#BBBBBB" data-name="清墨">
              <span class="shade-preview" style="background:#BBBBBB"></span>
              <span class="shade-label">清墨</span>
            </button>
          </div>
        </div>
        <div class="toolbar-section">
          <div class="section-title">颜料</div>
          <div id="pigments">
            <button class="pigment-btn" data-color="#CC3333" style="background:#CC3333" title="朱砂红"></button>
            <button class="pigment-btn" data-color="#E6A817" style="background:#E6A817" title="藤黄"></button>
            <button class="pigment-btn" data-color="#2E8B57" style="background:#2E8B57" title="石绿"></button>
            <button class="pigment-btn active-reset" data-color="#0A0A0A" data-reset="true" title="回到墨色">
              <span>墨</span>
            </button>
          </div>
        </div>
        <div class="toolbar-section">
          <div class="section-title">
            <span>笔触大小</span>
            <span id="size-value">20px</span>
          </div>
          <input type="range" id="size-slider" min="5" max="40" step="1" value="20">
        </div>
        <div class="toolbar-section">
          <button id="clear-btn">清空画布</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
