<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>植物生态系统模拟沙盒</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1A2E1A;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #A8E6A3;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    #main-area {
      flex: 1;
      display: flex;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }

    #canvas-wrapper {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px 10px 0;
      min-width: 0;
      transition: opacity 1s ease;
    }

    #canvas-wrapper.fading {
      opacity: 0;
    }

    #game-canvas {
      display: block;
      background: #3A5F40;
      cursor: crosshair;
      border-radius: 4px;
    }

    #control-panel {
      width: 220px;
      background: rgba(28, 45, 28, 0.92);
      border-radius: 8px;
      padding: 16px;
      margin: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-shrink: 0;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .panel-title {
      font-size: 15px;
      font-weight: 600;
      color: #A8E6A3;
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #C5E8C5;
    }

    .slider-value {
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
      min-width: 42px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 8px;
      border-radius: 4px;
      background: linear-gradient(to right, #4A90D9, #4CAF50, #FFC107);
      outline: none;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    input[type="range"]:hover {
      transform: scale(1.05);
      box-shadow: 0 2px 10px rgba(76, 175, 80, 0.4);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
      border: 3px solid #4CAF50;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
      transition: all 0.15s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      box-shadow: 0 3px 12px rgba(76, 175, 80, 0.6);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
      border: 3px solid #4CAF50;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    #stats-panel {
      position: absolute;
      right: 20px;
      bottom: 80px;
      background: rgba(26, 26, 46, 0.88);
      border-radius: 10px;
      padding: 14px 18px;
      min-width: 180px;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(168, 230, 163, 0.15);
      z-index: 10;
    }

    .stats-title {
      font-size: 12px;
      color: #88BB88;
      margin-bottom: 10px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .stats-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 0;
      font-size: 13px;
    }

    .stats-label {
      color: #A8E6A3;
    }

    .stats-value {
      color: #ffffff;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      transition: color 0.3s ease, transform 0.3s ease;
    }

    .stats-value.updating {
      color: #FFD54F;
      transform: scale(1.08);
    }

    .stats-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    #control-bar {
      height: 60px;
      background: #0F1A0F;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 0 20px;
      border-top: 1px solid rgba(168, 230, 163, 0.1);
      flex-shrink: 0;
    }

    .ctrl-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: #555;
      color: #ffffff;
      font-size: 24px;
      transition: all 0.15s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      user-select: none;
    }

    .ctrl-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.5);
    }

    .ctrl-btn:active {
      transform: translateY(2px) scale(1.02);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
    }

    .ctrl-btn.playing {
      background: #4CAF50;
    }

    .ctrl-btn.playing:hover {
      background: #66BB6A;
    }

    .ctrl-btn.paused {
      background: #555;
    }

    #selection-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-left: 12px;
      padding-left: 12px;
      border-left: 1px solid rgba(168, 230, 163, 0.2);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    #selection-actions.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .action-btn {
      padding: 6px 14px;
      font-size: 12px;
      background: rgba(45, 74, 51, 0.8);
      border: 1px solid rgba(168, 230, 163, 0.3);
      color: #A8E6A3;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .action-btn:hover {
      background: rgba(76, 175, 80, 0.6);
      border-color: #A8E6A3;
      transform: scale(1.05);
    }

    .action-btn:active {
      transform: translateY(2px);
    }

    .action-btn.danger:hover {
      background: rgba(255, 68, 68, 0.5);
      border-color: #FF8888;
    }

    #seed-select {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-right: 12px;
    }

    .seed-option {
      padding: 6px 10px;
      font-size: 12px;
      background: rgba(45, 74, 51, 0.5);
      border: 1px solid transparent;
      color: #A8E6A3;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .seed-option:hover {
      transform: scale(1.05);
    }

    .seed-option.active {
      background: rgba(76, 175, 80, 0.4);
      border-color: #A8E6A3;
    }

    .seed-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }

    @media (max-width: 768px) {
      #main-area {
        flex-direction: column;
      }

      #control-panel {
        width: 100%;
        height: 80px;
        margin: 8px;
        flex-direction: row;
        flex-wrap: wrap;
        padding: 10px 14px;
        gap: 8px 16px;
      }

      .panel-title {
        width: 100%;
        margin-bottom: 0;
      }

      .slider-group {
        flex: 1;
        min-width: 140px;
      }

      #stats-panel {
        right: 10px;
        bottom: 70px;
        padding: 10px 14px;
        min-width: 150px;
      }

      .stats-title {
        font-size: 10px;
      }

      .stats-row {
        font-size: 11px;
        padding: 2px 0;
      }

      #stats-panel .stats-value {
        font-size: 11px;
      }

      #control-bar {
        height: 56px;
        gap: 10px;
        padding: 0 10px;
      }

      .ctrl-btn {
        width: 42px;
        height: 42px;
        font-size: 20px;
      }

      #canvas-wrapper {
        padding: 0 6px 6px 0;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="main-area">
      <div id="control-panel">
        <div class="panel-title">🌿 环境参数</div>
        <div class="slider-group">
          <div class="slider-label">
            <span>☀️ 光照系数</span>
            <span class="slider-value" id="light-value">1.00</span>
          </div>
          <input type="range" id="light-slider" min="0.5" max="1.5" step="0.01" value="1.0" />
        </div>
        <div class="slider-group">
          <div class="slider-label">
            <span>💧 水分系数</span>
            <span class="slider-value" id="water-value">1.00</span>
          </div>
          <input type="range" id="water-slider" min="0.5" max="1.5" step="0.01" value="1.0" />
        </div>
        <div class="slider-group">
          <div class="slider-label">
            <span>⚔️ 竞争强度</span>
            <span class="slider-value" id="comp-value">0.50</span>
          </div>
          <input type="range" id="comp-slider" min="0.1" max="1.0" step="0.01" value="0.5" />
        </div>
      </div>

      <div id="canvas-wrapper">
        <canvas id="game-canvas"></canvas>
        <div id="stats-panel">
          <div class="stats-title">生态统计</div>
          <div class="stats-row">
            <span class="stats-label">总植物数</span>
            <span class="stats-value" id="stat-total">0</span>
          </div>
          <div class="stats-row">
            <span class="stats-label"><span class="stats-dot" style="background:#8BC34A"></span>草</span>
            <span class="stats-value" id="stat-grass">0</span>
          </div>
          <div class="stats-row">
            <span class="stats-label"><span class="stats-dot" style="background:#4CAF50"></span>灌木</span>
            <span class="stats-value" id="stat-shrub">0</span>
          </div>
          <div class="stats-row">
            <span class="stats-label"><span class="stats-dot" style="background:#2E7D32"></span>乔木</span>
            <span class="stats-value" id="stat-tree">0</span>
          </div>
          <div class="stats-row">
            <span class="stats-label">多样性</span>
            <span class="stats-value" id="stat-shannon">0.00</span>
          </div>
          <div class="stats-row">
            <span class="stats-label">运行时长</span>
            <span class="stats-value" id="stat-time">0s</span>
          </div>
        </div>
      </div>
    </div>

    <div id="control-bar">
      <div id="seed-select">
        <div class="seed-option active" data-seed="grass">
          <span class="seed-dot" style="background:#8BC34A"></span>草
        </div>
        <div class="seed-option" data-seed="shrub">
          <span class="seed-dot" style="background:#4CAF50"></span>灌木
        </div>
        <div class="seed-option" data-seed="tree">
          <span class="seed-dot" style="background:#2E7D32"></span>乔木
        </div>
      </div>

      <button class="ctrl-btn playing" id="play-btn" title="播放/暂停">
        <span id="play-icon">⏸</span>
      </button>
      <button class="ctrl-btn" id="reset-btn" title="重置">
        🔄
      </button>
      <button class="ctrl-btn" id="export-btn" title="导出截图">
        📷
      </button>

      <div id="selection-actions">
        <button class="action-btn" id="sow-selection">选区播种</button>
        <button class="action-btn danger" id="clear-selection">清除选区</button>
        <button class="action-btn" id="cancel-selection">取消</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
