<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOGO 设计工具</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div class="app-container">
    <aside class="toolbar-panel" id="toolbarPanel">
      <div class="panel-header">
        <h3>图形库</h3>
      </div>
      <div class="shapes-grid" id="shapesGrid"></div>
      <div class="panel-divider"></div>
      <div class="panel-header">
        <h3>文字</h3>
      </div>
      <div class="text-tool" id="textTool">
        <span class="text-icon">T</span>
        <span>添加文字</span>
      </div>
    </aside>

    <main class="canvas-container" id="canvasContainer">
      <div class="canvas-wrapper">
        <canvas id="canvas"></canvas>
      </div>
    </main>

    <aside class="property-panel" id="propertyPanel">
      <div class="panel-header">
        <h3>属性面板</h3>
      </div>
      <div class="property-content" id="propertyContent">
        <p class="empty-tip">选择一个形状或文字以编辑属性</p>
      </div>
    </aside>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
