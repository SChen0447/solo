<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>极光星空 · Aurora Starlit Sky</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000005;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #control-panel {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 16px 20px;
      box-shadow: 0 4px 24px rgba(0, 255, 136, 0.15),
                  0 0 40px rgba(136, 0, 255, 0.08);
      min-width: 220px;
      z-index: 100;
    }
    #control-panel h3 {
      color: #ffffff;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 14px;
      letter-spacing: 0.5px;
      opacity: 0.9;
    }
    .slider-group {
      margin-bottom: 14px;
    }
    .slider-group:last-child {
      margin-bottom: 0;
    }
    .slider-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .slider-label span:first-child {
      color: rgba(255, 255, 255, 0.7);
      font-size: 11px;
      letter-spacing: 0.3px;
    }
    .slider-label span:last-child {
      color: #00ff88;
      font-size: 11px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.15);
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #00ff88;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(0, 255, 136, 0.8),
                  0 0 16px rgba(0, 255, 136, 0.4);
      transition: box-shadow 0.2s ease;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 12px rgba(0, 255, 136, 1),
                  0 0 24px rgba(0, 255, 136, 0.6);
    }
    input[type="range"]::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #00ff88;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 8px rgba(0, 255, 136, 0.8),
                  0 0 16px rgba(0, 255, 136, 0.4);
    }
    #fps-counter {
      position: fixed;
      top: 16px;
      left: 16px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      z-index: 100;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="fps-counter">FPS: --</div>
  <div id="control-panel">
    <h3>✨ 极光控制</h3>
    <div class="slider-group">
      <div class="slider-label">
        <span>强度</span>
        <span id="intensity-value">5</span>
      </div>
      <input type="range" id="intensity-slider" min="1" max="10" value="5" step="0.1" />
    </div>
    <div class="slider-group">
      <div class="slider-label">
        <span>色相</span>
        <span id="hue-value">120°</span>
      </div>
      <input type="range" id="hue-slider" min="0" max="360" value="120" step="1" />
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
