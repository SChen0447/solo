<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>碎星·陨落挑战</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f0c29;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    #gameCanvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: none;
    }
    #gameOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 10;
      backdrop-filter: blur(8px);
    }
    #finalScore {
      font-size: 64px;
      color: #feca57;
      text-shadow: 0 0 12px #feca57, 0 0 24px #feca57;
      margin-bottom: 40px;
      font-weight: bold;
    }
    #restartBtn {
      padding: 16px 48px;
      font-size: 20px;
      border: none;
      border-radius: 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    #restartBtn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 25px rgba(102, 126, 234, 0.6);
    }
    #restartBtn:active {
      transform: scale(0.95);
    }
    #startScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(15, 12, 41, 0.95);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 20;
      backdrop-filter: blur(4px);
    }
    #startScreen h1 {
      font-size: 56px;
      color: #fff;
      text-shadow: 0 0 20px #48dbfb, 0 0 40px #48dbfb;
      margin-bottom: 20px;
      font-weight: 300;
      letter-spacing: 8px;
    }
    #startScreen p {
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 40px;
      font-size: 18px;
    }
    #startBtn {
      padding: 16px 56px;
      font-size: 22px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
      color: white;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 20px rgba(254, 202, 87, 0.4);
    }
    #startBtn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 30px rgba(254, 202, 87, 0.6);
    }
    #startBtn:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="startScreen">
    <h1>碎星 · 陨落挑战</h1>
    <p>移动鼠标控制挡板，反弹陨落的星辰</p>
    <button id="startBtn">开始游戏</button>
  </div>
  <div id="gameOverlay">
    <div id="finalScore">0</div>
    <button id="restartBtn">重新开始</button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
