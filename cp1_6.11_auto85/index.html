<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>灯笼迷局 - 日式机关解谜</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Ma Shan Zheng", "KaiTi", "STKaiti", "楷体", serif;
      background: #2d1f1a;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }

    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    #top-bar {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 30px;
      background: rgba(62, 39, 35, 0.85);
      padding: 12px 30px;
      border-radius: 8px;
      border: 2px solid #8d6e63;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #f5f5dc;
      font-size: 14px;
      letter-spacing: 2px;
    }

    .stat-value {
      font-size: 24px;
      color: #ffd54f;
      margin-top: 4px;
      text-shadow: 0 0 8px rgba(255, 213, 79, 0.5);
    }

    #bottom-bar {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: auto;
    }

    #reset-btn {
      background: rgba(62, 39, 35, 0.9);
      color: #f5f5dc;
      border: 2px solid #8d6e63;
      padding: 12px 32px;
      font-size: 16px;
      font-family: inherit;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 3px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
    }

    #reset-btn:hover {
      background: #5d4037;
      border-color: #ffd54f;
      color: #ffd54f;
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.5);
    }

    #reset-btn:active {
      transform: translateY(0);
    }

    #victory-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(45, 31, 26, 0.7);
      opacity: 0;
      transition: opacity 0.5s ease-in;
      pointer-events: none;
    }

    #victory-screen.show {
      opacity: 1;
    }

    #victory-text {
      font-size: 120px;
      color: #ffd54f;
      letter-spacing: 20px;
      text-shadow: 
        0 0 20px rgba(255, 213, 79, 0.8),
        0 0 40px rgba(255, 213, 79, 0.6),
        0 0 60px rgba(255, 213, 79, 0.4),
        2px 2px 4px rgba(0, 0, 0, 0.8);
      animation: glow-pulse 3s ease-in-out infinite;
    }

    @keyframes glow-pulse {
      0%, 100% {
        text-shadow: 
          0 0 20px rgba(255, 213, 79, 0.8),
          0 0 40px rgba(255, 213, 79, 0.6),
          0 0 60px rgba(255, 213, 79, 0.4),
          2px 2px 4px rgba(0, 0, 0, 0.8);
      }
      50% {
        text-shadow: 
          0 0 30px rgba(255, 213, 79, 1),
          0 0 60px rgba(255, 213, 79, 0.8),
          0 0 90px rgba(255, 213, 79, 0.6),
          2px 2px 4px rgba(0, 0, 0, 0.8);
      }
    }

    @media (max-width: 768px) {
      #top-bar {
        gap: 15px;
        padding: 10px 20px;
        top: 10px;
      }

      .stat-item {
        font-size: 12px;
      }

      .stat-value {
        font-size: 18px;
      }

      #victory-text {
        font-size: 60px;
        letter-spacing: 10px;
      }

      #bottom-bar {
        bottom: 20px;
      }

      #reset-btn {
        padding: 10px 24px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="game-canvas"></canvas>
    <div id="ui-overlay">
      <div id="top-bar">
        <div class="stat-item">
          <span>关卡</span>
          <span class="stat-value" id="level-num">1</span>
        </div>
        <div class="stat-item">
          <span>翻转次数</span>
          <span class="stat-value" id="flip-count">0</span>
        </div>
        <div class="stat-item">
          <span>用时</span>
          <span class="stat-value" id="timer">0.0</span>
        </div>
      </div>
      <div id="bottom-bar">
        <button id="reset-btn">重置关卡</button>
      </div>
      <div id="victory-screen">
        <div id="victory-text">通关</div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
