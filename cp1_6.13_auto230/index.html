<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>融壳·深渊回声</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-width: 800px;
      min-height: 600px;
      overflow: hidden;
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .score-display {
      position: absolute;
      top: 24px;
      left: 32px;
      color: #48dbfb;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 2px;
      text-shadow:
        0 0 4px #48dbfb,
        0 0 8px #48dbfb,
        0 0 16px rgba(72, 219, 251, 0.5);
      transition: transform 0.2s ease;
    }
    .score-display.pulse {
      transform: scale(1.3);
    }
    .score-label {
      font-size: 12px;
      opacity: 0.6;
      letter-spacing: 3px;
      font-weight: 400;
      display: block;
      margin-bottom: 4px;
      text-shadow: 0 0 4px #48dbfb;
    }
    .lives-display {
      position: absolute;
      top: 24px;
      right: 32px;
      display: flex;
      gap: 8px;
    }
    .heart {
      width: 24px;
      height: 24px;
      filter: drop-shadow(0 0 4px #ff6b6b) drop-shadow(0 0 8px rgba(255, 107, 107, 0.6));
    }
    .heart.lost {
      opacity: 0.15;
      filter: none;
    }
    .burst-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 48px;
      font-weight: 900;
      color: #feca57;
      letter-spacing: 6px;
      opacity: 0;
      text-shadow:
        0 0 8px #feca57,
        0 0 16px #ff6b6b,
        0 0 32px rgba(254, 202, 87, 0.6);
      pointer-events: none;
    }
    .game-over {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: auto;
    }
    .game-over.visible {
      opacity: 1;
    }
    .game-over h1 {
      font-size: 64px;
      color: #ff6b6b;
      margin-bottom: 16px;
      text-shadow:
        0 0 8px #ff6b6b,
        0 0 16px #ff6b6b,
        0 0 32px rgba(255, 107, 107, 0.5);
      letter-spacing: 8px;
    }
    .game-over p {
      font-size: 20px;
      color: #a29bfe;
      margin-bottom: 32px;
      text-shadow: 0 0 8px rgba(162, 155, 254, 0.6);
    }
    .restart-btn {
      padding: 16px 48px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 4px;
      color: #fff;
      background: transparent;
      border: 2px solid #48dbfb;
      border-radius: 4px;
      cursor: pointer;
      text-shadow: 0 0 8px #48dbfb;
      box-shadow:
        0 0 8px rgba(72, 219, 251, 0.4),
        inset 0 0 8px rgba(72, 219, 251, 0.1);
      transition: all 0.2s ease;
    }
    .restart-btn:hover {
      background: rgba(72, 219, 251, 0.15);
      box-shadow:
        0 0 16px rgba(72, 219, 251, 0.6),
        inset 0 0 16px rgba(72, 219, 251, 0.2);
      transform: scale(1.05);
    }
    .hint {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: rgba(162, 155, 254, 0.5);
      letter-spacing: 3px;
      text-shadow: 0 0 4px rgba(162, 155, 254, 0.3);
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="ui-overlay">
      <div class="score-display" id="score-display">
        <span class="score-label">击碎方块</span>
        <span id="score-value">0</span>
      </div>
      <div class="lives-display" id="lives-display"></div>
      <div class="burst-indicator" id="burst-indicator">共鸣爆发</div>
      <div class="game-over" id="game-over">
        <h1>深渊回响</h1>
        <p id="final-score">共击碎 0 个方块</p>
        <button class="restart-btn" id="restart-btn">重新探索</button>
      </div>
      <div class="hint">鼠标移动控制方向 · 点击加速下落</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
