<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星轨棋局</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111827;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #E0E7FF;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: calc(100% - 60px);
      cursor: crosshair;
    }

    .toolbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: #1E2433;
      border-top-left-radius: 12px;
      border-top-right-radius: 12px;
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 0 40px;
      z-index: 10;
      transition: opacity 0.3s ease-out;
    }

    .toolbar.fade {
      opacity: 0;
      pointer-events: none;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .control-group label {
      font-size: 13px;
      color: #94A3B8;
      min-width: 72px;
      white-space: nowrap;
    }

    .control-group input[type="range"] {
      width: 140px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: #2A3A5C;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    .control-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: linear-gradient(135deg, #6366F1, #8B5CF6);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.5);
      transition: transform 0.15s ease-out;
    }

    .control-group input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    .control-group .value {
      font-size: 12px;
      color: #6366F1;
      min-width: 36px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .reset-btn {
      padding: 8px 20px;
      background: linear-gradient(135deg, #EF4444, #F59E0B);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(239, 68, 68, 0.3);
      transition: all 0.2s ease-out;
    }

    .reset-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(239, 68, 68, 0.45);
    }

    .reset-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="game-canvas"></canvas>
    <div class="toolbar" id="toolbar">
      <div class="control-group">
        <label for="gravity">引力强度</label>
        <input type="range" id="gravity" min="0" max="5" step="0.1" value="1.0" />
        <span class="value" id="gravity-val">1.0</span>
      </div>
      <div class="control-group">
        <label for="repulsion">斥力强度</label>
        <input type="range" id="repulsion" min="0" max="5" step="0.1" value="1.5" />
        <span class="value" id="repulsion-val">1.5</span>
      </div>
      <div class="control-group">
        <label for="damping">阻尼系数</label>
        <input type="range" id="damping" min="0.9" max="1.0" step="0.005" value="0.98" />
        <span class="value" id="damping-val">0.98</span>
      </div>
      <button class="reset-btn" id="reset-btn">重置棋盘</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
