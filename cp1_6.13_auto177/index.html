<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>气雾·壁绘 - 交互式涂鸦创作</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: #1a1a1a;
    }

    #app {
      position: relative;
      width: 100%;
      height: 95vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #canvas-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #wall-canvas {
      z-index: 1;
    }

    #paint-canvas {
      z-index: 2;
      cursor: crosshair;
    }

    #toolbar {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .color-palette {
      display: flex;
      gap: 6px;
    }

    .color-swatch {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.3s ease-out;
    }

    .color-swatch:hover {
      transform: scale(1.1);
      background-color: #333333;
    }

    .color-swatch.active {
      border-color: transparent;
      box-shadow: 0 0 3px 2px rgba(255, 255, 255, 0.9),
                  0 0 6px 4px rgba(255, 255, 255, 0.4);
    }

    .mode-buttons {
      display: flex;
      gap: 8px;
    }

    .mode-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.15);
      color: #ffffff;
      font-size: 14px;
      transition: all 0.3s ease-out;
    }

    .mode-btn:hover {
      transform: scale(1.1);
      background: #333333;
    }

    .mode-btn.active {
      transform: scale(1.2);
      background: rgba(255, 255, 255, 0.3);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4); }
      50% { box-shadow: 0 0 0 6px rgba(255, 255, 255, 0); }
    }

    .action-buttons {
      display: flex;
      gap: 8px;
    }

    .action-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.15);
      color: #ffffff;
      font-size: 13px;
      font-weight: bold;
      transition: all 0.3s ease-out;
    }

    .action-btn:hover {
      transform: scale(1.1);
      background: #333333;
    }

    .status-panel {
      position: absolute;
      top: 80px;
      right: 20px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #ffffff;
      font-size: 12px;
      min-width: 140px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-label {
      color: rgba(255, 255, 255, 0.6);
      width: 54px;
    }

    .status-color-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .status-value {
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .hint-panel {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.75);
      font-size: 11px;
      line-height: 1.6;
    }

    .divider {
      width: 1px;
      height: 28px;
      background: rgba(255, 255, 255, 0.15);
    }

    #fade-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1a1a1a;
      opacity: 0;
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container">
      <canvas id="wall-canvas"></canvas>
      <canvas id="paint-canvas"></canvas>
      <div id="fade-overlay"></div>
    </div>

    <div id="toolbar">
      <div class="color-palette" id="color-palette"></div>
      <div class="divider"></div>
      <div class="mode-buttons" id="mode-buttons">
        <button class="mode-btn" data-mode="1" title="标准喷 (1)">
          <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5" fill="currentColor"/></svg>
        </button>
        <button class="mode-btn" data-mode="2" title="渐晕喷 (2)">
          <svg width="14" height="14" viewBox="0 0 14 14">
            <defs><radialGradient id="vg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="currentColor" stop-opacity="1"/><stop offset="100%" stop-color="currentColor" stop-opacity="0"/></radialGradient></defs>
            <circle cx="7" cy="7" r="6" fill="url(#vg)"/>
          </svg>
        </button>
        <button class="mode-btn" data-mode="3" title="闪光喷 (3)">
          <svg width="14" height="14" viewBox="0 0 14 14"><polygon points="7,1 8.5,5.5 13,7 8.5,8.5 7,13 5.5,8.5 1,7 5.5,5.5" fill="currentColor"/></svg>
        </button>
        <button class="mode-btn" data-mode="4" title="水雾喷 (4)">
          <svg width="14" height="14" viewBox="0 0 14 14"><path d="M7 1 C 10 6 11 8.5 11 10 A4 4 0 1 1 3 10 C 3 8.5 4 6 7 1 Z" fill="currentColor"/></svg>
        </button>
      </div>
      <div class="divider"></div>
      <div class="action-buttons">
        <button class="action-btn" id="btn-clear" title="清空 (C)">C</button>
        <button class="action-btn" id="btn-save" title="保存 (S)">S</button>
      </div>
    </div>

    <div class="status-panel">
      <div class="status-row">
        <span class="status-label">颜色</span>
        <span class="status-color-dot" id="status-color"></span>
        <span class="status-value" id="status-color-name">红色</span>
      </div>
      <div class="status-row">
        <span class="status-label">模式</span>
        <span class="status-value" id="status-mode">标准喷</span>
      </div>
      <div class="status-row">
        <span class="status-label">粒子</span>
        <span class="status-value" id="status-count">0</span>
      </div>
      <div class="status-row">
        <span class="status-label">密度</span>
        <span class="status-value" id="status-density">0</span>
      </div>
    </div>

    <div class="hint-panel">
      <span>🖱  按住鼠标左键喷射</span>
      <span>⌨  数字键 1-4 切换模式</span>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
