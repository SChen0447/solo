<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>蒲公英种子飘散模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: radial-gradient(ellipse at center, #FFB347 0%, #FF7B54 100%);
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    #canvas-container canvas:active {
      cursor: grabbing;
    }

    #canvas-container canvas.crosshair {
      cursor: crosshair;
    }

    .control-panel {
      position: fixed;
      left: 20px;
      bottom: 20px;
      width: 260px;
      background: rgba(30, 30, 40, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 18px;
      color: #eee;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 100;
    }

    .panel-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 14px;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .control-group {
      margin-bottom: 14px;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #bbb;
      margin-bottom: 6px;
    }

    .control-value {
      color: #FFB347;
      font-weight: 500;
    }

    .slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: #FFB347;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #FFB347;
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }

    .btn {
      width: 100%;
      padding: 10px 16px;
      background: linear-gradient(135deg, #FFB347 0%, #FF7B54 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      margin-top: 4px;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(255, 123, 84, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .fps-counter {
      position: fixed;
      top: 16px;
      right: 20px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.8);
      background: rgba(0, 0, 0, 0.3);
      padding: 6px 12px;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      z-index: 100;
    }

    .shockwave {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.8);
      pointer-events: none;
      opacity: 0;
      z-index: 50;
    }

    .shockwave.active {
      animation: shockwave-anim 0.3s ease-out forwards;
    }

    @keyframes shockwave-anim {
      0% {
        width: 20px;
        height: 20px;
        opacity: 0.8;
      }
      100% {
        width: 100px;
        height: 100px;
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div class="fps-counter" id="fps">FPS: --</div>
  <div class="shockwave" id="shockwave"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
