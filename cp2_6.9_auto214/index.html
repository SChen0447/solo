<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>流体力学交互式画板</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-main: #121220;
      --bg-canvas: #1E1E2E;
      --bg-panel: rgba(42, 42, 60, 0.85);
      --bg-toolbar: #1A1A2E;
      --border: #3A3A5C;
      --text: #E0E0E0;
      --text-dim: #8888AA;
      --slider-track: #3A3A5C;
      --slider-thumb: #7C4DFF;
      --color-danger: #E53935;
      --color-success: #4CAF50;
      --color-warning: #FFC107;
      --color-export: #7E57C2;
      --radius: 8px;
      --transition: 0.2s ease-in-out;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-main);
      color: var(--text);
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 14px;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* Toolbar */
    .toolbar {
      width: 100%;
      height: 50px;
      min-height: 50px;
      background: var(--bg-toolbar);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }

    .toolbar-left,
    .toolbar-center,
    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .toolbar-center {
      flex: 1;
      justify-content: center;
      font-family: 'Consolas', 'Monaco', monospace;
      color: var(--color-success);
      font-size: 16px;
      letter-spacing: 1px;
    }

    .stat-label {
      color: var(--text-dim);
      margin-right: 4px;
    }

    .stat-value {
      min-width: 2ch;
      text-align: right;
    }

    /* Buttons */
    .btn {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      padding: 6px 14px;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: inherit;
      font-size: inherit;
      transition: all var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-clear {
      border-color: var(--color-danger);
      color: #fff;
    }

    .btn-clear:hover {
      background: rgba(229, 57, 53, 0.2);
    }

    .btn-play {
      font-size: 16px;
      min-width: 40px;
      justify-content: center;
    }

    .btn-play.is-paused {
      color: var(--color-warning);
      border-color: var(--color-warning);
    }

    .btn-play.is-playing {
      color: var(--color-success);
      border-color: var(--color-success);
    }

    .btn-play.is-playing:hover {
      background: rgba(76, 175, 80, 0.2);
    }

    .btn-play.is-paused:hover {
      background: rgba(255, 193, 7, 0.2);
    }

    .btn-export {
      background: var(--color-export);
      border-color: var(--color-export);
      color: #fff;
    }

    .btn-export:hover {
      background: #9575CD;
      border-color: #9575CD;
      box-shadow: 0 2px 12px rgba(126, 87, 194, 0.4);
    }

    /* Main layout */
    .main-container {
      flex: 1;
      display: flex;
      position: relative;
      min-height: 0;
      overflow: hidden;
    }

    .canvas-wrapper {
      flex: 1;
      position: relative;
      background: var(--bg-canvas);
      min-width: 0;
      min-height: 600px;
    }

    #main-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair;
      touch-action: none;
    }

    /* Control Panel (desktop - right side) */
    .control-panel {
      width: 220px;
      min-width: 220px;
      background: var(--bg-panel);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-left: 1px solid var(--border);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      overflow-y: auto;
      z-index: 50;
    }

    .panel-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .panel-title {
      font-size: 12px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .slider-label {
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
    }

    .slider-value {
      font-size: 14px;
      color: var(--text);
      min-width: 48px;
      text-align: right;
      font-family: 'Consolas', 'Monaco', monospace;
    }

    /* Custom Slider */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: var(--slider-track);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--slider-thumb);
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition);
      box-shadow: 0 0 0 0 rgba(124, 77, 255, 0);
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      box-shadow: 0 0 8px rgba(124, 77, 255, 0.6);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--slider-thumb);
      cursor: pointer;
      border: none;
      transition: transform var(--transition);
    }

    input[type="range"]::-moz-range-thumb:hover {
      transform: scale(1.15);
    }

    /* Color Picker */
    .color-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .color-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
      transition: all var(--transition);
      padding: 0;
    }

    .color-swatch:hover {
      transform: scale(1.15);
      border-color: #fff;
    }

    .color-swatch.selected {
      transform: scale(1.1);
    }

    /* Legend Box */
    .legend-box {
      position: absolute;
      right: 16px;
      bottom: 16px;
      width: 200px;
      height: 120px;
      background: var(--bg-panel);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 80;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    .legend-handle {
      height: 20px;
      background: #555;
      cursor: move;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #ccc;
      letter-spacing: 2px;
      user-select: none;
      flex-shrink: 0;
    }

    .legend-content {
      flex: 1;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
    }

    .legend-color {
      width: 20px;
      height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* Mobile collapse button */
    .btn-collapse {
      display: none;
    }

    /* ========== Responsive: Mobile ========== */
    @media (max-width: 767px) {
      body, html {
        font-size: 12px;
      }

      .main-container {
        flex-direction: column;
      }

      .canvas-wrapper {
        height: 60vh;
        min-height: 0;
        width: 100%;
      }

      .control-panel {
        width: 100%;
        min-width: 0;
        height: auto;
        max-height: 40vh;
        border-left: none;
        border-top: 1px solid var(--border);
        padding: 12px 16px;
        gap: 16px;
        flex-direction: column;
        transition: max-height var(--transition), padding var(--transition);
      }

      .control-panel.collapsed {
        max-height: 36px;
        padding: 8px 16px;
        overflow: hidden;
      }

      .control-panel.collapsed > *:not(.mobile-header) {
        display: none;
      }

      .mobile-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .btn-collapse {
        display: inline-flex;
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text);
        width: 28px;
        height: 28px;
        border-radius: var(--radius);
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 16px;
        transition: all var(--transition);
      }

      .btn-collapse:hover {
        background: rgba(124, 77, 255, 0.2);
      }

      .panel-title {
        font-size: 11px;
      }

      .slider-label {
        font-size: 12px;
      }

      .slider-value {
        font-size: 12px;
      }

      .toolbar {
        padding: 0 10px;
        gap: 6px;
      }

      .toolbar-center {
        font-size: 13px;
      }

      .btn {
        padding: 5px 10px;
        font-size: 12px;
      }

      .legend-box {
        width: 160px;
        height: 100px;
        right: 8px;
        bottom: 8px;
      }

      .legend-content {
        padding: 6px 10px;
      }

      .legend-item {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="toolbar-left">
      <button id="btn-clear" class="btn btn-clear">清除 / 重置</button>
    </div>
    <div class="toolbar-center">
      <span class="stat-label">FPS:</span><span id="fps-value" class="stat-value">60</span>
      <span style="margin: 0 8px; color: #555;">|</span>
      <span class="stat-label">粒子:</span><span id="particle-value" class="stat-value">0</span>
    </div>
    <div class="toolbar-right">
      <button id="btn-play-pause" class="btn btn-play is-paused" title="播放/暂停">
        <span class="icon-pause">&#9208;</span>
      </button>
      <button id="btn-export" class="btn btn-export">导出截图</button>
    </div>
  </div>

  <div class="main-container">
    <div class="canvas-wrapper">
      <canvas id="main-canvas"></canvas>

      <div id="legend-box" class="legend-box">
        <div id="legend-handle" class="legend-handle">≡ 图例</div>
        <div class="legend-content">
          <div class="legend-item">
            <span class="legend-color" style="background: #64B5F6;"></span>
            <span>低流速 (0-1 格/帧)</span>
          </div>
          <div class="legend-item">
            <span class="legend-color" style="background: #AED581;"></span>
            <span>中流速 (1-3 格/帧)</span>
          </div>
          <div class="legend-item">
            <span class="legend-color" style="background: #FF7043;"></span>
            <span>高流速 (3-5 格/帧)</span>
          </div>
        </div>
      </div>
    </div>

    <aside id="control-panel" class="control-panel">
      <div class="mobile-header">
        <div class="panel-title">控制面板</div>
        <button id="btn-collapse-panel" class="btn-collapse" title="折叠/展开">▾</button>
      </div>

      <div class="panel-section">
        <div class="panel-title">模拟参数</div>

        <div class="slider-row">
          <span class="slider-label">网格密度</span>
          <span id="value-grid" class="slider-value">40x40</span>
        </div>
        <input type="range" id="slider-grid" min="20" max="80" step="1" value="40" />

        <div class="slider-row">
          <span class="slider-label">黏度</span>
          <span id="value-viscosity" class="slider-value">0.10</span>
        </div>
        <input type="range" id="slider-viscosity" min="0.01" max="0.5" step="0.01" value="0.1" />

        <div class="slider-row">
          <span class="slider-label">密度</span>
          <span id="value-density" class="slider-value">1.0</span>
        </div>
        <input type="range" id="slider-density" min="0.5" max="2.0" step="0.1" value="1.0" />

        <div class="slider-row">
          <span class="slider-label">外力强度</span>
          <span id="value-force" class="slider-value">2.0</span>
        </div>
        <input type="range" id="slider-force" min="0" max="10" step="0.5" value="2.0" />
      </div>

      <div class="panel-section">
        <div class="panel-title">流体颜色</div>
        <div id="color-picker" class="color-picker"></div>
      </div>
    </aside>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
