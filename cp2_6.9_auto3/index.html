<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>节奏跳跃 · Rhythm Jump</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      color: #00ffcc;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a1a;
    }

    #game-canvas {
      display: block;
      background: #0a0a1a;
      border: 1px solid rgba(0, 255, 204, 0.3);
      box-shadow: 0 0 40px rgba(0, 255, 204, 0.15);
    }

    #hud {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 16px 20px;
      background: rgba(10, 10, 26, 0.7);
      border: 1px solid rgba(0, 255, 204, 0.4);
      border-radius: 8px;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 20px rgba(0, 255, 204, 0.1);
      min-width: 180px;
      font-size: 14px;
      z-index: 10;
    }

    #hud .hud-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    #hud .hud-label {
      color: rgba(0, 255, 204, 0.7);
      letter-spacing: 1px;
    }

    #hud .hud-value {
      font-weight: bold;
      font-size: 16px;
      text-shadow: 0 0 8px rgba(0, 255, 204, 0.5);
      transition: color 0.2s, transform 0.1s;
    }

    #hud .hud-value.shake {
      color: #ff3366 !important;
      text-shadow: 0 0 12px rgba(255, 51, 102, 0.8);
    }

    #start-screen, #game-over-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 26, 0.85);
      backdrop-filter: blur(12px);
      z-index: 20;
    }

    #start-screen h1, #game-over-screen h1 {
      font-size: 56px;
      letter-spacing: 6px;
      color: #00ffcc;
      text-shadow: 0 0 20px rgba(0, 255, 204, 0.8), 0 0 40px rgba(0, 255, 204, 0.4);
      margin-bottom: 20px;
    }

    #start-screen .subtitle, #game-over-screen .subtitle {
      font-size: 18px;
      color: rgba(0, 255, 204, 0.7);
      margin-bottom: 40px;
      letter-spacing: 2px;
    }

    .btn {
      padding: 14px 40px;
      font-size: 18px;
      font-family: inherit;
      font-weight: bold;
      letter-spacing: 3px;
      color: #fff;
      background: rgba(255, 102, 204, 0.2);
      border: 2px solid #ff66cc;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-shadow: 0 0 8px rgba(255, 102, 204, 0.5);
      box-shadow: 0 0 15px rgba(255, 102, 204, 0.3);
    }

    .btn:hover {
      background: rgba(255, 102, 204, 0.4);
      box-shadow: 0 0 25px rgba(255, 102, 204, 0.6);
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0);
    }

    #instructions {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 24px;
      background: rgba(10, 10, 26, 0.7);
      border: 1px solid rgba(0, 255, 204, 0.3);
      border-radius: 6px;
      font-size: 13px;
      color: rgba(0, 255, 204, 0.8);
      letter-spacing: 1px;
      backdrop-filter: blur(6px);
      z-index: 10;
    }

    #instructions kbd {
      display: inline-block;
      padding: 2px 8px;
      margin: 0 4px;
      background: rgba(0, 255, 204, 0.15);
      border: 1px solid rgba(0, 255, 204, 0.5);
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      color: #00ffcc;
    }

    #final-score {
      font-size: 32px;
      color: #ff66cc;
      text-shadow: 0 0 15px rgba(255, 102, 204, 0.6);
      margin: 20px 0 40px;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>

    <div id="hud">
      <div class="hud-row">
        <span class="hud-label">得分</span>
        <span class="hud-value" id="score">0</span>
      </div>
      <div class="hud-row">
        <span class="hud-label">跳跃</span>
        <span class="hud-value" id="jumps">0</span>
      </div>
      <div class="hud-row">
        <span class="hud-label">速度</span>
        <span class="hud-value" id="speed">1.0x</span>
      </div>
    </div>

    <div id="instructions">
      按 <kbd>空格</kbd> 跳跃（支持二段跳）
    </div>

    <div id="start-screen">
      <h1>节奏跳跃</h1>
      <p class="subtitle">RHYTHM JUMP</p>
      <button class="btn" id="start-btn">开始游戏</button>
    </div>

    <div id="game-over-screen" class="hidden">
      <h1>游戏结束</h1>
      <p class="subtitle">GAME OVER</p>
      <div id="final-score">最终得分: 0</div>
      <button class="btn" id="restart-btn">重新开始</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
