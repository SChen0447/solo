<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>息壤 - 3D动态地貌生长</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: monospace;
      background: #0D0F1C;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #camera-info {
      position: fixed;
      left: 20px;
      bottom: 20px;
      width: 160px;
      height: 60px;
      background: rgba(26, 26, 46, 0.8);
      border-radius: 12px;
      padding: 12px 16px;
      color: #ffffff;
      font-size: 14px;
      font-family: monospace;
      line-height: 1.6;
      pointer-events: none;
      z-index: 10;
      backdrop-filter: blur(8px);
    }

    #control-panel {
      position: fixed;
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      width: 240px;
      background: rgba(22, 24, 45, 0.8);
      border-radius: 16px;
      padding: 20px;
      color: #ffffff;
      z-index: 10;
      backdrop-filter: blur(8px);
      font-family: monospace;
    }

    #control-panel h3 {
      font-size: 16px;
      margin-bottom: 16px;
      color: #FFD700;
      letter-spacing: 1px;
    }

    .control-group {
      margin-bottom: 18px;
    }

    .control-group label {
      display: block;
      font-size: 13px;
      margin-bottom: 8px;
      color: #cccccc;
    }

    .control-group .value-display {
      float: right;
      color: #FFD700;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: #2D2F4A;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #FF6B6B;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      background: #FF8585;
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #FF6B6B;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
    }

    input[type="range"]::-moz-range-thumb:hover {
      transform: scale(1.2);
      background: #FF8585;
    }

    .color-toggles {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .color-toggle {
      flex: 1;
      height: 36px;
      border: 2px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      font-family: monospace;
      font-size: 12px;
      font-weight: bold;
      color: #ffffff;
      transition: all 0.2s ease;
      opacity: 0.5;
    }

    .color-toggle.active {
      opacity: 1;
      transform: scale(1.05);
      box-shadow: 0 0 12px currentColor;
    }

    .color-toggle:hover {
      transform: scale(1.05);
    }

    .color-toggle.red {
      background: #FF4444;
    }

    .color-toggle.green {
      background: #44FF44;
    }

    .color-toggle.blue {
      background: #4444FF;
    }

    #earthquake-btn {
      width: 100%;
      height: 44px;
      background: #D32F2F;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-family: monospace;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 2px;
    }

    #earthquake-btn:hover {
      background: #F44336;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(211, 47, 47, 0.4);
    }

    #earthquake-btn:active {
      transform: translateY(0);
    }

    #toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.75);
      color: #ffffff;
      padding: 12px 20px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 14px;
      z-index: 20;
      transform: translateX(400px);
      opacity: 0;
      pointer-events: none;
    }

    #toast.show {
      animation: slideIn 0.5s ease forwards;
    }

    #toast.hide {
      animation: fadeOut 0.5s ease forwards;
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes fadeOut {
      from {
        transform: translateX(0);
        opacity: 1;
      }
      to {
        transform: translateX(0);
        opacity: 0;
      }
    }

    @media (max-width: 768px) {
      #control-panel {
        width: 85%;
        right: 50%;
        top: auto;
        bottom: 20px;
        transform: translateX(50%);
        max-height: 50vh;
        overflow-y: auto;
      }

      #camera-info {
        left: 10px;
        bottom: calc(50vh + 30px);
        width: 140px;
        height: 54px;
        font-size: 12px;
        padding: 10px 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div id="camera-info">
      <div>X: 0.00</div>
      <div>Y: 0.00</div>
      <div>Z: 0.00</div>
    </div>

    <div id="control-panel">
      <h3>控制面板</h3>

      <div class="control-group">
        <label>
          生长速度
          <span class="value-display" id="speed-value">0.8s</span>
        </label>
        <input type="range" id="speed-slider" min="0.3" max="2.0" step="0.1" value="0.8" />
      </div>

      <div class="control-group">
        <label>
          最大方块数
          <span class="value-display" id="max-value">200</span>
        </label>
        <input type="range" id="max-slider" min="50" max="500" step="10" value="200" />
      </div>

      <div class="control-group">
        <label>颜色倾向</label>
        <div class="color-toggles">
          <button class="color-toggle red" data-color="red">R</button>
          <button class="color-toggle green" data-color="green">G</button>
          <button class="color-toggle blue" data-color="blue">B</button>
        </div>
      </div>

      <button id="earthquake-btn">地 震</button>
    </div>

    <div id="toast"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
