<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发光粒子绘画 - Glowing Particle Painter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0b16;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    .ui-container {
      position: fixed;
      z-index: 10;
      pointer-events: none;
    }

    .ui-container > * {
      pointer-events: auto;
    }

    #color-palette {
      position: fixed;
      left: 24px;
      bottom: 24px;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(20, 25, 40, 0.8);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-content: center;
      gap: 5px;
      padding: 10px;
      z-index: 10;
    }

    .color-dot {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease;
      position: relative;
    }

    .color-dot:hover {
      transform: scale(1.2);
    }

    .color-dot.active::after {
      content: '';
      position: absolute;
      top: -3px;
      left: -3px;
      right: -3px;
      bottom: -3px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.7);
    }

    #clear-btn {
      position: fixed;
      right: 24px;
      bottom: 24px;
      width: 80px;
      height: 30px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      color: #ffffff;
      border: none;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s ease, opacity 0.1s ease;
      z-index: 10;
    }

    #clear-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    #clear-btn:active {
      opacity: 0.5;
    }

    @media (max-width: 768px) {
      #color-palette {
        width: 80px;
        height: 80px;
        left: 16px;
        bottom: 16px;
        padding: 8px;
        gap: 4px;
      }

      .color-dot {
        width: 12px;
        height: 12px;
      }

      .color-dot.active::after {
        top: -2px;
        left: -2px;
        right: -2px;
        bottom: -2px;
        border-width: 1.5px;
      }

      #clear-btn {
        width: 64px;
        height: 24px;
        right: 16px;
        bottom: 16px;
        font-size: 11px;
        border-radius: 8px;
      }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="color-palette"></div>
  <button id="clear-btn">清除</button>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
