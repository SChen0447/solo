<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生态食物链模拟</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      background-color: #121212;
      font-family: 'Courier New', monospace;
      color: #ffffff;
      overflow: auto;
    }
    #game-container {
      width: 1500px;
      height: 750px;
      margin: 20px auto;
      position: relative;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 20px;
    }
    #canvas-wrapper {
      position: relative;
      margin-top: 20px;
    }
    #game-canvas {
      display: block;
      border-radius: 8px;
    }
    #reset-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 8px 16px;
      background-color: #546e7a;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.15s;
      z-index: 10;
    }
    #reset-btn:hover {
      background-color: #688997;
    }
    #stats-panel {
      width: 280px;
      height: 700px;
      margin-top: 20px;
      background-color: #1e1e1e;
      border: 1px solid #333333;
      border-radius: 8px;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="canvas-wrapper">
      <canvas id="game-canvas" width="900" height="700"></canvas>
      <button id="reset-btn">重置</button>
    </div>
    <div id="stats-panel"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
