<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 魔方自动还原</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #1a1a1e;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #e0e0e0;
      user-select: none;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #loading-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #1a1a1e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.6s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader {
      width: 60px;
      height: 60px;
      perspective: 200px;
    }

    .loader-cube {
      width: 60px;
      height: 60px;
      position: relative;
      transform-style: preserve-3d;
      animation: loaderSpin 2s infinite ease-in-out;
    }

    .loader-cube div {
      position: absolute;
      width: 60px;
      height: 60px;
      border: 2px solid rgba(100, 200, 255, 0.3);
      background: rgba(100, 200, 255, 0.05);
      border-radius: 4px;
    }

    .loader-cube .front  { transform: translateZ(30px); }
    .loader-cube .back   { transform: rotateY(180deg) translateZ(30px); }
    .loader-cube .right  { transform: rotateY(90deg) translateZ(30px); }
    .loader-cube .left   { transform: rotateY(-90deg) translateZ(30px); }
    .loader-cube .top    { transform: rotateX(90deg) translateZ(30px); }
    .loader-cube .bottom { transform: rotateX(-90deg) translateZ(30px); }

    @keyframes loaderSpin {
      0%   { transform: rotateX(0deg) rotateY(0deg); }
      50%  { transform: rotateX(180deg) rotateY(180deg); }
      100% { transform: rotateX(360deg) rotateY(360deg); }
    }

    #loading-text {
      margin-top: 24px;
      font-size: 14px;
      color: rgba(100, 200, 255, 0.7);
      letter-spacing: 2px;
    }

    #ui-panel {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      z-index: 10;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn {
      padding: 10px 28px;
      border: 1px solid rgba(100, 200, 255, 0.25);
      border-radius: 10px;
      background: rgba(40, 40, 50, 0.85);
      backdrop-filter: blur(10px);
      color: #ffffff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
      outline: none;
      letter-spacing: 1px;
    }

    .btn:hover {
      color: #5bcfff;
      border-color: rgba(91, 207, 255, 0.5);
      box-shadow: 0 0 16px rgba(91, 207, 255, 0.15);
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      color: #666;
      border-color: rgba(100, 100, 100, 0.25);
      box-shadow: none;
    }

    .btn:disabled:hover {
      color: #666;
      border-color: rgba(100, 100, 100, 0.25);
    }

    .btn-small {
      padding: 8px 18px;
      font-size: 13px;
    }

    #progress-container {
      width: 320px;
      height: 6px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 3px;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #progress-container.visible {
      opacity: 1;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      border-radius: 3px;
      background: linear-gradient(90deg, #ff4444, #ffaa00, #44ff44);
      transition: width 0.15s ease;
    }

    .speed-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: rgba(200, 200, 210, 0.7);
    }

    #speed-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 140px;
      height: 4px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    #speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #5bcfff;
      border: 2px solid rgba(91, 207, 255, 0.3);
      cursor: pointer;
      transition: transform 0.2s;
    }

    #speed-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    #speed-label {
      min-width: 36px;
      text-align: center;
      color: #5bcfff;
      font-weight: 600;
    }

    #step-list-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      max-height: 70vh;
      overflow-y: auto;
      z-index: 10;
      background: rgba(30, 30, 38, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(100, 200, 255, 0.1);
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 13px;
      min-width: 120px;
      max-width: 200px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    #step-list-panel.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #step-list-panel h3 {
      font-size: 12px;
      color: rgba(100, 200, 255, 0.6);
      margin-bottom: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .step-item {
      padding: 3px 8px;
      margin: 2px 0;
      border-radius: 4px;
      color: rgba(200, 200, 210, 0.6);
      transition: all 0.25s;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 12px;
    }

    .step-item.active {
      color: #5bcfff;
      background: rgba(91, 207, 255, 0.12);
      font-weight: 700;
    }

    .step-item.done {
      color: rgba(100, 200, 100, 0.5);
    }

    #step-list-panel::-webkit-scrollbar {
      width: 4px;
    }

    #step-list-panel::-webkit-scrollbar-thumb {
      background: rgba(91, 207, 255, 0.2);
      border-radius: 2px;
    }

    #step-counter {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 13px;
      color: rgba(200, 200, 210, 0.5);
      z-index: 10;
      background: rgba(30, 30, 38, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 8px;
      padding: 10px 16px;
      border: 1px solid rgba(100, 200, 255, 0.08);
    }

    #step-counter span {
      color: #5bcfff;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="loading-overlay">
    <div class="loader">
      <div class="loader-cube">
        <div class="front"></div>
        <div class="back"></div>
        <div class="right"></div>
        <div class="left"></div>
        <div class="top"></div>
        <div class="bottom"></div>
      </div>
    </div>
    <div id="loading-text">正在加载魔方...</div>
  </div>

  <div id="canvas-container"></div>

  <div id="step-counter">
    步骤: <span id="current-step">0</span> / <span id="total-steps">0</span>
  </div>

  <div id="step-list-panel">
    <h3>步骤序列</h3>
    <div id="step-list"></div>
  </div>

  <div id="ui-panel">
    <div class="btn-row">
      <button class="btn" id="btn-scramble">打乱</button>
      <button class="btn" id="btn-solve" disabled>自动还原</button>
      <button class="btn btn-small" id="btn-step-back" disabled>◀ 单步后退</button>
      <button class="btn btn-small" id="btn-step-forward" disabled>单步前进 ▶</button>
    </div>
    <div id="progress-container">
      <div id="progress-bar"></div>
    </div>
    <div class="speed-row">
      <span>速度</span>
      <input type="range" id="speed-slider" min="0.5" max="3" step="0.1" value="1" />
      <span id="speed-label">1.0x</span>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
