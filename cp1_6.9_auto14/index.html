<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全球极光观测站</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0a0a1a;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: rgba(255, 255, 255, 0.9);
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #canvas-container canvas {
      display: block;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    #app-title {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 14px 24px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    #filter-container {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 10px 16px;
    }

    #filter-select {
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.9);
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      outline: none;
      padding: 6px 8px;
    }

    #filter-select option {
      background-color: #1a1a2e;
      color: rgba(255, 255, 255, 0.9);
    }

    .filter-option-level1-2 {
      color: #4ade80;
    }

    .filter-option-level3-4 {
      color: #60a5fa;
    }

    .filter-option-level5 {
      color: #c084fc;
    }

    #time-controls {
      position: absolute;
      bottom: 20px;
      right: 20px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #time-display {
      font-size: 14px;
      min-width: 60px;
      font-variant-numeric: tabular-nums;
    }

    #time-slider {
      width: 180px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    #time-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      cursor: pointer;
    }

    #time-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }

    #play-pause-btn {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: rgba(255, 255, 255, 0.9);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    #play-pause-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    #coord-tooltip {
      position: absolute;
      pointer-events: none;
      padding: 8px 14px;
      font-size: 13px;
      display: none;
      z-index: 100;
    }

    #aurora-info-card {
      position: absolute;
      padding: 16px 20px;
      min-width: 220px;
      display: none;
      z-index: 100;
    }

    #aurora-info-card h3 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    #aurora-info-card .info-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 4px 0;
    }

    #aurora-info-card .level-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
    }

    .level-1-2 {
      background: rgba(74, 222, 128, 0.2);
      color: #4ade80;
    }

    .level-3-4 {
      background: rgba(96, 165, 250, 0.2);
      color: #60a5fa;
    }

    .level-5 {
      background: rgba(192, 132, 252, 0.2);
      color: #c084fc;
    }

    .mobile-icon-btn {
      display: none;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: rgba(255, 255, 255, 0.9);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      align-items: center;
      justify-content: center;
    }

    @media (max-width: 768px) {
      #app-title {
        font-size: 16px;
        padding: 10px 16px;
      }

      #filter-container {
        display: none;
      }

      #filter-container.mobile-expanded {
        display: block;
      }

      #time-controls {
        display: none;
      }

      #time-controls.mobile-expanded {
        display: flex;
        flex-direction: column;
        width: calc(100% - 40px);
      }

      #time-slider {
        width: 100%;
      }

      .mobile-icon-btn {
        display: flex;
        position: absolute;
        z-index: 10;
      }

      #mobile-filter-btn {
        top: 20px;
        right: 20px;
      }

      #mobile-time-btn {
        bottom: 20px;
        right: 20px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div id="app-title" class="glass-panel">全球极光观测站</div>

    <button id="mobile-filter-btn" class="mobile-icon-btn glass-panel">🔍</button>
    <button id="mobile-time-btn" class="mobile-icon-btn glass-panel">⏱</button>

    <div id="filter-container" class="glass-panel">
      <select id="filter-select">
        <option value="all">全部分级</option>
        <option value="1-2" class="filter-option-level1-2">1-2级 (绿色)</option>
        <option value="3-4" class="filter-option-level3-4">3-4级 (蓝色)</option>
        <option value="5" class="filter-option-level5">5级 (紫色)</option>
      </select>
    </div>

    <div id="time-controls" class="glass-panel">
      <span id="time-display">00:00</span>
      <input type="range" id="time-slider" min="0" max="23" step="0.1" value="0">
      <button id="play-pause-btn">▶</button>
    </div>

    <div id="coord-tooltip" class="glass-panel"></div>

    <div id="aurora-info-card" class="glass-panel">
      <h3>极光信息</h3>
      <div class="info-row">
        <span>强度等级:</span>
        <span><span id="info-level" class="level-badge"></span></span>
      </div>
      <div class="info-row">
        <span>坐标:</span>
        <span id="info-coords"></span>
      </div>
      <div class="info-row">
        <span>活动预测:</span>
        <span id="info-prediction"></span>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
