<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>绳结物理模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #1E1E2E;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
      min-width: 1024px;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: default;
    }

    .panel {
      position: absolute;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    #dataPanel {
      top: 20px;
      right: 20px;
      width: 220px;
    }

    #dataPanel h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #FFD700;
      letter-spacing: 0.5px;
    }

    .data-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 13px;
    }

    .data-row:last-of-type {
      border-bottom: none;
    }

    .data-label {
      color: rgba(255, 255, 255, 0.6);
    }

    .data-value {
      color: #fff;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    #toolbar {
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 180px;
    }

    .tool-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: left;
    }

    .tool-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    .tool-btn.active {
      background: rgba(255, 140, 0, 0.25);
      border-color: #FF8C00;
      color: #FFD700;
    }

    .tool-btn.reset {
      background: rgba(255, 80, 80, 0.15);
      border-color: rgba(255, 80, 80, 0.3);
    }

    .tool-btn.reset:hover {
      background: rgba(255, 80, 80, 0.25);
    }

    .tip {
      position: absolute;
      bottom: 20px;
      left: 20px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      line-height: 1.8;
    }

    @media (max-width: 1024px) and (min-width: 768px) {
      html, body {
        min-width: 768px;
      }

      #toolbar {
        top: auto;
        bottom: 20px;
        right: 50%;
        transform: translateX(50%);
        flex-direction: row;
        width: auto;
        gap: 8px;
      }

      .tool-btn {
        padding: 10px 14px;
        font-size: 12px;
      }

      #dataPanel {
        width: 180px;
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="canvas"></canvas>
    <div id="dataPanel" class="panel">
      <h3>实时数据</h3>
      <div class="data-row">
        <span class="data-label">节点总数</span>
        <span class="data-value" id="nodeCount">0</span>
      </div>
      <div class="data-row">
        <span class="data-label">打结数量</span>
        <span class="data-value" id="knotCount">0</span>
      </div>
      <div class="data-row">
        <span class="data-label">绳索长度</span>
        <span class="data-value" id="ropeLength">0 px</span>
      </div>
    </div>
    <div id="toolbar" class="panel">
      <button class="tool-btn" data-knot="single">单结</button>
      <button class="tool-btn" data-knot="figure8">八字结</button>
      <button class="tool-btn" data-knot="bowline">蝴蝶结</button>
      <button class="tool-btn reset" id="resetBtn">重置绳索</button>
    </div>
    <div class="tip">
      🖱️ 拖拽节点弯曲绳索<br/>
      🔒 点击两端固定/解除<br/>
      ✨ 悬停节点可放大发光
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
