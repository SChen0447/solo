<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音乐节拍粒子梦幻球</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #upload-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 26, 0.85);
      z-index: 10;
      transition: opacity 0.5s ease;
    }

    #upload-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .upload-title {
      color: #fff;
      font-size: 32px;
      margin-bottom: 20px;
      font-weight: 300;
    }

    .upload-subtitle {
      color: #aaa;
      font-size: 16px;
      margin-bottom: 40px;
    }

    .upload-btn {
      padding: 16px 48px;
      font-size: 18px;
      color: #fff;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
    }

    .upload-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(102, 126, 234, 0.6);
    }

    .upload-drag-hint {
      margin-top: 20px;
      color: #666;
      font-size: 14px;
    }

    #upload-overlay.dragover {
      background: rgba(102, 126, 234, 0.2);
    }

    #control-panel {
      position: absolute;
      bottom: 24px;
      right: 24px;
      width: 320px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 5;
      transition: all 0.3s ease;
    }

    .panel-section {
      margin-bottom: 16px;
    }

    .panel-section:last-child {
      margin-bottom: 0;
    }

    .panel-label {
      color: rgba(255, 255, 255, 0.8);
      font-size: 12px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .play-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .play-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }

    .play-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(102, 126, 234, 0.5);
    }

    .progress-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      cursor: pointer;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 3px;
      width: 0%;
      transition: width 0.1s linear;
    }

    .time-display {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
    }

    .theme-buttons {
      display: flex;
      gap: 8px;
    }

    .theme-btn {
      flex: 1;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.8);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .theme-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    .theme-btn.active {
      border-color: #667eea;
      background: rgba(102, 126, 234, 0.2);
    }

    .slider-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
      outline: none;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #667eea;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 10px rgba(102, 126, 234, 0.6);
    }

    .slider-value {
      min-width: 36px;
      text-align: right;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
    }

    @media (max-width: 600px) {
      #control-panel {
        width: 80px;
        bottom: 16px;
        right: 16px;
        padding: 12px 8px;
      }

      .panel-label {
        display: none;
      }

      .theme-buttons {
        flex-direction: column;
      }

      .theme-btn {
        font-size: 10px;
        padding: 6px 4px;
      }

      .time-display {
        display: none;
      }

      .slider-value {
        display: none;
      }

      .play-controls {
        flex-direction: column;
        gap: 8px;
      }

      .upload-title {
        font-size: 24px;
      }

      .upload-subtitle {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="canvas"></canvas>
    
    <div id="upload-overlay">
      <h1 class="upload-title">音乐节拍粒子梦幻球</h1>
      <p class="upload-subtitle">上传音频文件，开启梦幻灯光秀</p>
      <button class="upload-btn" id="upload-btn">选择音频文件</button>
      <p class="upload-drag-hint">或将 MP3 / WAV 文件拖到此区域</p>
      <input type="file" id="file-input" accept="audio/*" style="display: none;">
    </div>

    <div id="control-panel" style="display: none;">
      <div class="panel-section">
        <div class="play-controls">
          <button class="play-btn" id="play-btn">▶</button>
          <div class="progress-container">
            <div class="progress-bar" id="progress-bar">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="time-display">
              <span id="current-time">0:00</span>
              <span id="total-time">0:00</span>
            </div>
          </div>
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-label">颜色主题</div>
        <div class="theme-buttons">
          <button class="theme-btn active" data-theme="aurora">极光蓝紫</button>
          <button class="theme-btn" data-theme="fire">火焰红橙</button>
          <button class="theme-btn" data-theme="cyber">赛博粉青</button>
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-label">粒子大小</div>
        <div class="slider-container">
          <input type="range" class="slider" id="size-slider" min="1" max="5" step="0.5" value="2">
          <span class="slider-value" id="size-value">2px</span>
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-label">灵敏度</div>
        <div class="slider-container">
          <input type="range" class="slider" id="sensitivity-slider" min="0.5" max="2" step="0.1" value="1">
          <span class="slider-value" id="sensitivity-value">1.0</span>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
