<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>织色时序</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    canvas:active {
      cursor: grabbing;
    }

    .controls-panel {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 10;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 16px 20px;
      min-width: 240px;
      color: #e2e8f0;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .controls-panel.collapsed {
      transform: translateX(calc(-100% + 48px));
      padding: 16px 12px;
    }

    .controls-panel.collapsed .controls-content {
      opacity: 0;
      pointer-events: none;
      height: 0;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      cursor: pointer;
      user-select: none;
    }

    .panel-title {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: #e2e8f0;
    }

    .collapse-btn {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.05);
      transition: background 0.2s;
    }

    .collapse-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .collapse-btn svg {
      transition: transform 0.3s ease;
    }

    .controls-panel.collapsed .collapse-btn svg {
      transform: rotate(180deg);
    }

    .controls-content {
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: opacity 0.3s ease;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #94a3b8;
    }

    .control-value {
      font-family: "SF Mono", "Consolas", monospace;
      color: #e2e8f0;
      font-size: 12px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.1);
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #e2e8f0;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(226, 232, 240, 0.4);
      transition: transform 0.15s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #e2e8f0;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 8px rgba(226, 232, 240, 0.4);
    }

    .reset-btn {
      margin-top: 4px;
      padding: 10px 16px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.03);
      color: #e2e8f0;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .reset-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.25);
    }

    .reset-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="main-canvas"></canvas>

    <div class="controls-panel" id="controls-panel">
      <div class="panel-header" id="panel-header">
        <span class="panel-title">控制面板</span>
        <span class="collapse-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </span>
      </div>
      <div class="controls-content">
        <div class="control-group">
          <div class="control-label">
            <span>光晕强度</span>
            <span class="control-value" id="halo-value">5</span>
          </div>
          <input type="range" id="halo-slider" min="1" max="10" value="5" step="1" />
        </div>
        <div class="control-group">
          <div class="control-label">
            <span>色带流动速度</span>
            <span class="control-value" id="speed-value">1.0x</span>
          </div>
          <input type="range" id="speed-slider" min="0.5" max="3" value="1" step="0.1" />
        </div>
        <div class="control-group">
          <div class="control-label">
            <span>颗粒密度</span>
            <span class="control-value" id="density-value">50%</span>
          </div>
          <input type="range" id="density-slider" min="0" max="100" value="50" step="1" />
        </div>
        <button class="reset-btn" id="reset-btn">重置到当前时间</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
