<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>家庭食谱管家</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
    <style>
      .loading-overlay {
        position: fixed;
        inset: 0;
        background: #FAF5EF;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      .loading-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(224, 122, 95, 0.2);
        border-top-color: #E07A5F;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .loading-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="loading-overlay" class="loading-overlay">
      <div class="loading-spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/client/main.tsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const overlay = document.getElementById('loading-overlay');
          if (overlay) overlay.classList.add('hidden');
        }, 300);
      });
    </script>
  </body>
</html>
