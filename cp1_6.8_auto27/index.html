<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>3D 植物生长模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, #faf8f0 0%, #e8f5e9 100%);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, #faf8f0 0%, #e8f5e9 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      position: relative;
      width: 60px;
      height: 60px;
      margin-bottom: 20px;
    }

    .loading-spinner::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 20px;
      background: #66bb6a;
      border-radius: 2px;
      transform-origin: center 30px;
      animation: spin 1s linear infinite;
    }

    .loading-leaf {
      position: absolute;
      top: 8px;
      left: 50%;
      width: 18px;
      height: 12px;
      background: #81c784;
      border-radius: 50% 50% 50% 50% / 70% 70% 30% 30%;
      transform-origin: left center;
    }

    .loading-leaf.left {
      transform: translateX(-100%) rotate(-30deg);
      animation: leafSway 1s ease-in-out infinite;
    }

    .loading-leaf.right {
      animation: leafSway 1s ease-in-out infinite reverse;
    }

    @keyframes spin {
      from { transform: translateX(-50%) rotate(0deg); }
      to { transform: translateX(-50%) rotate(360deg); }
    }

    @keyframes leafSway {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .loading-text {
      color: #4caf50;
      font-size: 16px;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loading-spinner">
      <div class="loading-leaf left"></div>
      <div class="loading-leaf right"></div>
    </div>
    <div class="loading-text">加载中...</div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
