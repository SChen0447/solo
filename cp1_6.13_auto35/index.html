<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>语言练习小组</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
      }
      #root {
        min-height: 100vh;
      }
      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        z-index: 9999;
      }
      .puzzle-logo {
        width: 80px;
        height: 80px;
        position: relative;
        animation: spin 3s ease-in-out infinite;
      }
      .puzzle-piece {
        position: absolute;
        width: 36px;
        height: 36px;
        border-radius: 8px;
      }
      .puzzle-piece:nth-child(1) {
        top: 0;
        left: 0;
        background: #f6d365;
      }
      .puzzle-piece:nth-child(2) {
        top: 0;
        right: 0;
        background: #a8edea;
      }
      .puzzle-piece:nth-child(3) {
        bottom: 0;
        left: 0;
        background: #fed6e3;
      }
      .puzzle-piece:nth-child(4) {
        bottom: 0;
        right: 0;
        background: #d299c2;
      }
      .loading-text {
        margin-top: 20px;
        color: white;
        font-size: 16px;
        opacity: 0.9;
      }
      @keyframes spin {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(90deg); }
        50% { transform: rotate(180deg); }
        75% { transform: rotate(270deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-screen">
        <div class="puzzle-logo">
          <div class="puzzle-piece"></div>
          <div class="puzzle-piece"></div>
          <div class="puzzle-piece"></div>
          <div class="puzzle-piece"></div>
        </div>
        <div class="loading-text">加载中...</div>
      </div>
    </div>
    <script type="module" src="/src/frontend/main.tsx"></script>
  </body>
</html>
