<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 弹珠台竞技场</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a23;
      font-family: Arial, sans-serif;
    }
    #app {
      width: 100vw;
      height: 100vh;
      background: linear-gradient(180deg, #0a0a23 0%, #1a0533 100%);
    }
    #hud {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      opacity: 1;
      transition: opacity 0.2s ease-out;
      pointer-events: none;
      z-index: 10;
    }
    #hud.hidden {
      opacity: 0;
    }
    #hud.gameover {
      filter: grayscale(1);
    }
    #score {
      font-family: Impact, sans-serif;
      font-size: 32px;
      color: #ffd700;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.8), 0 0 20px rgba(255, 215, 0, 0.5);
    }
    #lives {
      display: flex;
      gap: 8px;
    }
    .heart {
      width: 24px;
      height: 24px;
      position: relative;
      animation: heartbeat 1s ease-in-out infinite;
    }
    .heart::before,
    .heart::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 20px;
      background: #ff5252;
      border-radius: 12px 12px 0 0;
      box-shadow: 0 0 8px rgba(255, 82, 82, 0.6);
    }
    .heart::before {
      left: 12px;
      transform: rotate(-45deg);
      transform-origin: 0 100%;
    }
    .heart::after {
      left: 0;
      transform: rotate(45deg);
      transform-origin: 100% 100%;
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
    #status {
      position: fixed;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      color: #ffffff;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
      opacity: 0;
      animation: fadeInStatus 0.5s ease-out forwards;
      z-index: 10;
      pointer-events: none;
    }
    @keyframes fadeInStatus {
      from { opacity: 0; transform: translate(-50%, -10px); }
      to { opacity: 1; transform: translate(-50%, 0); }
    }
    #gameover-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, 100vh);
      background: rgba(0, 0, 0, 0.75);
      border-radius: 16px;
      padding: 40px 60px;
      text-align: center;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    #gameover-panel.show {
      transform: translate(-50%, -50%);
      opacity: 1;
    }
    #gameover-panel h2 {
      color: #ffffff;
      font-size: 36px;
      margin-bottom: 20px;
    }
    #final-score {
      font-family: Impact, sans-serif;
      font-size: 48px;
      color: #ffd700;
      text-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
    }
    #restart-btn {
      margin-top: 24px;
      padding: 12px 36px;
      font-size: 18px;
      background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
      border: none;
      border-radius: 8px;
      color: #1a237e;
      font-weight: bold;
      cursor: pointer;
      pointer-events: auto;
      transition: transform 0.2s;
    }
    #restart-btn:hover {
      transform: scale(1.05);
    }
    #combo-display {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 15;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="hud">
    <div id="score">得分: 0</div>
    <div id="lives"></div>
  </div>
  <div id="status">准备中</div>
  <div id="gameover-panel">
    <h2>游戏结束</h2>
    <div id="final-score">0</div>
    <button id="restart-btn">重新开始</button>
  </div>
  <div id="combo-display"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
