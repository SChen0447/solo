<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>卫星轨道3D可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #0a1628 0%, #000000 100%);
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      color: #ffffff;
      user-select: none;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #hud {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(10, 30, 60, 0.75);
      border: 1px solid rgba(100, 180, 255, 0.3);
      border-radius: 8px;
      padding: 10px 16px;
      min-width: 160px;
      backdrop-filter: blur(8px);
      font-size: 12px;
      line-height: 1.6;
      z-index: 10;
    }

    #hud .hud-label {
      color: #6ec1ff;
      font-weight: 600;
    }

    #hud .hud-value {
      color: #ffffff;
      float: right;
    }

    #hud .hud-fps {
      color: #6effa0;
      float: right;
    }

    #status-panel {
      position: absolute;
      bottom: 16px;
      right: 16px;
      background: rgba(10, 30, 60, 0.8);
      border: 1px solid rgba(100, 180, 255, 0.3);
      border-radius: 10px;
      padding: 14px 18px;
      min-width: 320px;
      max-width: 420px;
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    #status-panel .panel-title {
      font-size: 13px;
      font-weight: 700;
      color: #8ec9ff;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(100, 180, 255, 0.2);
      letter-spacing: 1px;
    }

    .satellite-row {
      display: grid;
      grid-template-columns: 14px 1fr auto;
      gap: 10px;
      padding: 8px 4px;
      margin-bottom: 4px;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s ease;
      align-items: center;
    }

    .satellite-row:hover {
      background: rgba(100, 180, 255, 0.08);
    }

    .satellite-row.active {
      background: rgba(100, 180, 255, 0.15);
      border: 1px solid rgba(100, 180, 255, 0.3);
    }

    .orbit-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      box-shadow: 0 0 8px currentColor;
    }

    .satellite-info {
      font-size: 11px;
      line-height: 1.7;
    }

    .satellite-name {
      font-size: 12px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 2px;
    }

    .satellite-data {
      display: flex;
      gap: 12px;
      color: #b0d0f0;
    }

    .data-item {
      display: flex;
      flex-direction: column;
    }

    .data-label {
      font-size: 9px;
      color: #6a8fb0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .data-value {
      font-size: 12px;
      color: #e0f0ff;
      font-variant-numeric: tabular-nums;
      position: relative;
    }

    .data-value.updated {
      animation: fadeUp 0.6s ease;
      color: #ffffff;
    }

    @keyframes fadeUp {
      0% {
        opacity: 0;
        transform: translateY(6px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .focus-btn {
      background: rgba(100, 180, 255, 0.2);
      border: 1px solid rgba(100, 180, 255, 0.4);
      color: #8ec9ff;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .focus-btn:hover {
      background: rgba(100, 180, 255, 0.35);
      color: #ffffff;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="hud">
      <div><span class="hud-label">FPS</span><span class="hud-fps" id="hud-fps">60</span></div>
      <div><span class="hud-label">时间</span><span class="hud-value" id="hud-time">--:--:--</span></div>
    </div>
    <div id="status-panel">
      <div class="panel-title">卫星轨道状态</div>
      <div id="satellite-list"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
