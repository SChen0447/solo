<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 记忆匹配卡片游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0a0a1a;
      font-family: sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
      display: block;
    }
    #hud {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 16px 40px;
      border-radius: 12px;
      display: flex;
      gap: 48px;
      align-items: center;
      color: white;
      font-size: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .hud-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .hud-label {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 1px;
    }
    .hud-value {
      font-size: 28px;
      font-weight: bold;
      transition: transform 0.3s ease-out;
    }
    #score-value {
      color: #FFD700;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    }
    #time-value {
      color: #ffffff;
    }
    .score-pop {
      transform: scale(1.2);
    }
    #victory-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    #victory-overlay.show {
      display: flex;
    }
    .victory-card {
      background: linear-gradient(135deg, rgba(30, 30, 60, 0.95), rgba(20, 20, 40, 0.95));
      border: 2px solid rgba(255, 215, 0, 0.4);
      border-radius: 20px;
      padding: 48px 64px;
      text-align: center;
      box-shadow: 0 0 60px rgba(255, 215, 0, 0.2);
    }
    .victory-title {
      font-size: 48px;
      font-weight: bold;
      color: #FFD700;
      margin-bottom: 32px;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
      letter-spacing: 4px;
    }
    .victory-stats {
      display: flex;
      gap: 48px;
      justify-content: center;
      margin-bottom: 32px;
    }
    .victory-stat {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .victory-stat-label {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 1px;
    }
    .victory-stat-value {
      font-size: 36px;
      font-weight: bold;
      color: #ffffff;
    }
    .victory-stat-value.gold {
      color: #FFD700;
    }
    #restart-btn {
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #1a1a2e;
      border: none;
      padding: 16px 48px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 30px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
    }
    #restart-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(255, 215, 0, 0.5);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="hud">
      <div class="hud-item">
        <span class="hud-label">得分</span>
        <span id="score-value" class="hud-value">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">用时</span>
        <span id="time-value" class="hud-value">0.0s</span>
      </div>
    </div>
    <div id="victory-overlay">
      <div class="victory-card">
        <div class="victory-title">🎉 胜利 🎉</div>
        <div class="victory-stats">
          <div class="victory-stat">
            <span class="victory-stat-label">总得分</span>
            <span class="victory-stat-value gold" id="final-score">0</span>
          </div>
          <div class="victory-stat">
            <span class="victory-stat-label">总用时</span>
            <span class="victory-stat-value" id="final-time">0.0s</span>
          </div>
        </div>
        <button id="restart-btn">再来一局</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
