<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>动态万花筒生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
        'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      color: #fff;
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 24px;
      gap: 20px;
    }

    .header {
      background: #0f3460;
      border-radius: 12px;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
      background: linear-gradient(135deg, #e94560, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
    }

    .main-content {
      display: flex;
      flex: 1;
      gap: 24px;
      align-items: flex-start;
      justify-content: center;
    }

    .canvas-wrapper {
      position: relative;
      display: inline-block;
    }

    #kaleidoscope-canvas {
      display: block;
      background: #000;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(233, 69, 96, 0.3);
    }

    .save-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #e94560;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 2px 10px rgba(233, 69, 96, 0.5);
    }

    .save-btn:hover {
      background: #ff6b6b;
      width: 45px;
      height: 45px;
      top: 9px;
      right: 9px;
      transform: rotate(180deg);
      box-shadow: 0 4px 20px rgba(255, 107, 107, 0.6);
    }

    .save-btn svg {
      width: 20px;
      height: 20px;
      fill: #fff;
    }

    .control-panel {
      width: 280px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .control-label {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.9);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .control-value {
      font-size: 13px;
      color: #e94560;
      font-weight: 600;
      background: rgba(233, 69, 96, 0.15);
      padding: 2px 10px;
      border-radius: 12px;
    }

    input[type='range'] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #16213e;
      outline: none;
      cursor: pointer;
    }

    input[type='range']::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #e94560;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 6px rgba(233, 69, 96, 0.4);
    }

    input[type='range']::-webkit-slider-thumb:hover {
      background: #ff6b6b;
      transform: scale(1.15);
      box-shadow: 0 3px 10px rgba(255, 107, 107, 0.6);
    }

    input[type='range']::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #e94560;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
    }

    input[type='range']::-moz-range-thumb:hover {
      background: #ff6b6b;
      transform: scale(1.15);
    }

    .palette-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .palette-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      background: rgba(22, 33, 62, 0.6);
      transition: all 0.2s ease;
    }

    .palette-option:hover {
      border-color: rgba(233, 69, 96, 0.5);
      background: rgba(22, 33, 62, 0.9);
    }

    .palette-option.active {
      border-color: #e94560;
      background: rgba(233, 69, 96, 0.15);
    }

    .palette-colors {
      display: flex;
      gap: 4px;
      flex: 1;
    }

    .palette-color-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
    }

    .palette-name {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.85);
      min-width: 70px;
    }

    .fps-counter {
      position: absolute;
      bottom: 12px;
      left: 12px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      background: rgba(0, 0, 0, 0.5);
      padding: 4px 10px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>✦ 动态万花筒生成器 ✦</h1>
    </div>
    <div class="main-content">
      <div class="canvas-wrapper">
        <canvas id="kaleidoscope-canvas" width="800" height="600"></canvas>
        <button class="save-btn" id="save-btn" title="保存图片">
          <svg viewBox="0 0 24 24">
            <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
          </svg>
        </button>
        <div class="fps-counter" id="fps-counter">-- FPS</div>
      </div>
      <aside class="control-panel" id="control-panel">
      </aside>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
