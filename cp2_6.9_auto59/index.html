<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>火山熔岩模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1A1A2E;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #E0E0E0;
    }

    #app {
      display: flex;
      width: 100%;
      height: 100%;
      padding: 16px;
      gap: 16px;
    }

    .control-panel {
      width: 280px;
      flex-shrink: 0;
      background: #16213E;
      border: 1px solid #E94560;
      border-radius: 8px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }

    .control-panel h2 {
      color: #FF6B35;
      font-size: 20px;
      margin-bottom: 8px;
      border-bottom: 1px solid #E94560;
      padding-bottom: 8px;
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .slider-group label {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #B0B0B0;
    }

    .slider-group label span.value {
      color: #00E5FF;
      font-weight: bold;
    }

    .slider-group input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 8px;
      background: #1E293B;
      border-radius: 4px;
      outline: none;
      cursor: pointer;
    }

    .slider-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      background: #FF6B35;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 6px #FF6B35;
    }

    .slider-group input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      background: #FF6B35;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 6px #FF6B35;
    }

    .slider-group input[type="range"]::-webkit-slider-runnable-track {
      background: linear-gradient(to right, #FF6B35 0%, #FF6B35 var(--progress, 50%), #1E293B var(--progress, 50%), #1E293B 100%);
      height: 8px;
      border-radius: 4px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      min-width: 100px;
      padding: 10px 16px;
      background: #1E293B;
      border: 1px solid #E94560;
      border-radius: 4px;
      color: #FF6B35;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn:hover {
      background: #E94560;
      color: #1A1A2E;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .info-text {
      font-size: 12px;
      color: #888;
      line-height: 1.6;
      padding: 10px;
      background: #0F1626;
      border-radius: 4px;
      border-left: 3px solid #FF6B35;
    }

    .main-area {
      flex: 1;
      min-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .canvas-card {
      flex: 1;
      background: #16213E;
      border: 1px solid #E94560;
      border-radius: 8px;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    #gameCanvas {
      display: block;
      background: #0A0A14;
      border-radius: 4px;
      cursor: crosshair;
    }

    .stats-bar {
      background: #1E293BCC;
      border: 1px solid #E94560;
      border-radius: 8px;
      padding: 14px 20px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      backdrop-filter: blur(4px);
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .stat-item .stat-label {
      font-size: 12px;
      color: #888;
    }

    .stat-item .stat-value {
      font-size: 22px;
      font-weight: bold;
      color: #00E5FF;
      font-family: 'Consolas', 'Courier New', monospace;
      text-shadow: 0 0 8px #00E5FF40;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="control-panel">
      <h2>🌋 控制台</h2>

      <div class="slider-group">
        <label>
          岩浆黏度
          <span class="value" id="viscosityValue">5</span>
        </label>
        <input type="range" id="viscositySlider" min="1" max="10" value="5" />
      </div>

      <div class="slider-group">
        <label>
          喷发压力
          <span class="value" id="pressureValue">5</span>
        </label>
        <input type="range" id="pressureSlider" min="1" max="10" value="5" />
      </div>

      <div class="slider-group">
        <label>
          冷却速率
          <span class="value" id="coolingValue">5</span>
        </label>
        <input type="range" id="coolingSlider" min="1" max="10" value="5" />
      </div>

      <div class="button-group">
        <button class="btn" id="resetBtn">🔄 重置</button>
        <button class="btn" id="saveBtn">💾 保存快照</button>
      </div>

      <div class="info-text">
        <strong>操作说明：</strong><br />
        • 点击地图任意位置放置火山口<br />
        • 鼠标滚轮缩放（0.5x~3x）<br />
        • 按住鼠标拖动平移视图<br />
        • 观察熔岩如何受地形影响流动并塑造新地形
      </div>
    </div>

    <div class="main-area">
      <div class="canvas-card">
        <canvas id="gameCanvas"></canvas>
      </div>
      <div class="stats-bar">
        <div class="stat-item">
          <span class="stat-label">活跃熔岩</span>
          <span class="stat-value" id="activeLava">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">已凝固</span>
          <span class="stat-value" id="solidified">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">喷发帧数</span>
          <span class="stat-value" id="frameCount">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">平均温度</span>
          <span class="stat-value" id="avgTemp">0°C</span>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
