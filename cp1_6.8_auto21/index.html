<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D音乐粒子喷泉</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #0a1628 0%, #050a12 100%);
      color: white;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #upload-zone {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 400px;
      height: 200px;
      border: 2px dashed rgba(255, 255, 255, 0.3);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    #upload-zone:hover,
    #upload-zone.drag-over {
      border-color: rgba(100, 200, 255, 0.8);
      box-shadow: 0 0 30px rgba(100, 200, 255, 0.4);
      background: rgba(100, 200, 255, 0.08);
    }

    #upload-zone.hidden {
      display: none;
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .upload-text {
      font-size: 16px;
      opacity: 0.9;
    }

    .upload-hint {
      font-size: 12px;
      opacity: 0.5;
      margin-top: 8px;
    }

    #file-input {
      display: none;
    }

    #audio-info {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 50;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      padding: 16px 20px;
      border-radius: 12px;
      pointer-events: none;
    }

    #audio-name {
      font-size: 14px;
      font-weight: 500;
      opacity: 0.9;
      margin-bottom: 6px;
    }

    #audio-progress {
      font-size: 12px;
      opacity: 0.6;
    }

    #control-panel {
      position: absolute;
      bottom: 100px;
      right: 24px;
      z-index: 50;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transform: translateX(calc(100% + 30px));
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      min-width: 180px;
    }

    #control-panel.open {
      transform: translateX(0);
      opacity: 1;
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .control-btn {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .control-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
    }

    .control-btn:active {
      transform: scale(0.95);
    }

    .control-btn.style-btn {
      width: auto;
      padding: 0 16px;
      font-size: 13px;
      gap: 6px;
    }

    .style-label {
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 4px;
    }

    .style-buttons {
      display: flex;
      gap: 8px;
    }

    .style-btn {
      flex: 1;
      padding: 8px 10px;
      font-size: 11px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .style-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: scale(1.05);
    }

    .style-btn.active {
      background: rgba(100, 200, 255, 0.3);
      border-color: rgba(100, 200, 255, 0.5);
      box-shadow: 0 0 10px rgba(100, 200, 255, 0.3);
    }

    .volume-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .volume-icon {
      font-size: 16px;
      opacity: 0.7;
    }

    #volume-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.2);
      outline: none;
    }

    #volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #64c8ff;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(100, 200, 255, 0.6);
      transition: transform 0.2s;
    }

    #volume-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    #panel-toggle {
      position: absolute;
      bottom: 40px;
      right: 24px;
      z-index: 51;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      color: white;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #panel-toggle:hover {
      background: rgba(255, 255, 255, 0.25);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
      transform: scale(1.1);
    }

    #waveform-container {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60px;
      z-index: 40;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.5), transparent);
    }

    #waveform-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, #64c8ff, #a855f7);
      width: 0%;
      transition: width 0.1s linear;
      z-index: 41;
    }

    @media (max-width: 768px) {
      #upload-zone {
        width: 90%;
        max-width: 320px;
        height: 160px;
      }

      #control-panel {
        right: 16px;
        bottom: 80px;
        padding: 16px;
      }

      #panel-toggle {
        right: 16px;
        bottom: 24px;
        width: 48px;
        height: 48px;
        font-size: 20px;
      }

      #audio-info {
        top: 16px;
        left: 16px;
        padding: 12px 16px;
      }

      #waveform-container {
        height: 50px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div id="upload-zone">
      <div class="upload-icon">🎵</div>
      <div class="upload-text">点击或拖拽上传音频文件</div>
      <div class="upload-hint">支持 MP3、WAV 格式</div>
      <input type="file" id="file-input" accept="audio/*">
    </div>

    <div id="audio-info" style="display: none;">
      <div id="audio-name">未选择文件</div>
      <div id="audio-progress">00:00 / 00:00</div>
    </div>

    <div id="control-panel">
      <div class="control-row">
        <button class="control-btn" id="play-btn" title="播放/暂停">▶</button>
        <div class="volume-container">
          <span class="volume-icon">🔊</span>
          <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.7">
        </div>
      </div>
      <div>
        <div class="style-label">粒子样式</div>
        <div class="style-buttons">
          <button class="style-btn active" data-style="fire">🔥 火焰</button>
          <button class="style-btn" data-style="ice">❄️ 冰晶</button>
          <button class="style-btn" data-style="star">✨ 星空</button>
        </div>
      </div>
    </div>

    <button id="panel-toggle" title="控制面板">⚙️</button>

    <div id="waveform-container">
      <canvas id="waveform-canvas"></canvas>
      <div id="progress-bar"></div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
