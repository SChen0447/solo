<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>手势控制3D粒子星图探索</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(to bottom, #050510, #0a0a1e);
      font-family: monospace;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #canvas-container {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 100vw;
      max-height: 100vh;
      aspect-ratio: 16 / 9;
      overflow: hidden;
    }

    #canvas-container canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #ui-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 8px;
      color: #88ccff;
      font-size: 14px;
      line-height: 1.6;
      text-shadow: 0 0 8px rgba(136, 204, 255, 0.5);
      z-index: 10;
      min-width: 200px;
    }

    #ui-panel .title {
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 8px;
      border-bottom: 1px solid rgba(136, 204, 255, 0.3);
      padding-bottom: 4px;
    }

    #ui-panel .label {
      color: rgba(136, 204, 255, 0.7);
      display: inline-block;
      min-width: 70px;
    }

    #fps.low {
      color: #ff6666;
      text-shadow: 0 0 8px rgba(255, 102, 102, 0.5);
    }

    #gesture {
      color: #aaffaa;
      text-shadow: 0 0 8px rgba(170, 255, 170, 0.5);
    }

    #video-container {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 200px;
      height: 150px;
      border-radius: 8px;
      overflow: hidden;
      border: 2px solid rgba(136, 204, 255, 0.5);
      z-index: 10;
    }

    #video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #video-container canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container">
      <div id="ui-panel">
        <div class="title">🌌 星图导航</div>
        <div><span class="label">操作：</span></div>
        <div>&nbsp;&nbsp;握拳：前进</div>
        <div>&nbsp;&nbsp;张开：后退</div>
        <div>&nbsp;&nbsp;左右挥：旋转</div>
        <div style="margin-top: 8px;"><span class="label">FPS:</span> <span id="fps">--</span></div>
        <div><span class="label">手势:</span> <span id="gesture">无</span></div>
      </div>
      <div id="video-container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
