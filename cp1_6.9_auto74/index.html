<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>虚拟时光胶囊工坊</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a0a0a;
    }
    #root {
      width: 100%;
      height: 100%;
    }
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .loading-gear {
      width: 80px;
      height: 80px;
      animation: spin 3s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .loading-text {
      margin-top: 24px;
      color: #d4a017;
      font-family: serif;
      font-size: 18px;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-screen">
      <svg class="loading-gear" viewBox="0 0 100 100">
        <g fill="#b8860b" stroke="#d4a017" stroke-width="2">
          <circle cx="50" cy="50" r="25"/>
          <circle cx="50" cy="50" r="10" fill="#1a0a0a"/>
          <rect x="46" y="10" width="8" height="15" rx="2"/>
          <rect x="46" y="75" width="8" height="15" rx="2"/>
          <rect x="10" y="46" width="15" height="8" rx="2"/>
          <rect x="75" y="46" width="15" height="8" rx="2"/>
          <rect x="20" y="20" width="8" height="12" rx="2" transform="rotate(45 24 26)"/>
          <rect x="72" y="72" width="8" height="12" rx="2" transform="rotate(45 76 78)"/>
          <rect x="72" y="18" width="12" height="8" rx="2" transform="rotate(45 78 22)"/>
          <rect x="16" y="72" width="12" height="8" rx="2" transform="rotate(45 22 76)"/>
        </g>
      </svg>
      <div class="loading-text">时光胶囊工坊加载中...</div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
