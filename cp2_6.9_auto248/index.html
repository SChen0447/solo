<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>像素地牢迷宫</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    #game-container {
      width: 800px;
      height: 600px;
      position: relative;
      border: 1px solid #3A3A3A;
    }
    #game-canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
    }
    #hud {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background-color: #1A1A2E;
      border-top: 1px solid #3A3A3A;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 30px;
    }
    .hud-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #FFFFFF;
      font-size: 16px;
    }
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: rgba(0, 0, 0, 0.85);
      z-index: 10;
    }
    #overlay.show {
      display: flex;
    }
    #overlay-title {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }
    #overlay-steps {
      font-size: 24px;
      color: #FFFFFF;
      margin-bottom: 30px;
    }
    #restart-btn {
      padding: 12px 32px;
      font-size: 20px;
      background-color: #4A4A4A;
      color: #FFFFFF;
      border: 2px solid #3A3A3A;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      transition: all 0.2s;
    }
    #restart-btn:hover {
      background-color: #5A5A5A;
      border-color: #FFD700;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="800" height="540"></canvas>
    <div id="hud">
      <div class="hud-item" id="health-display">
        <span id="hearts"></span>
        <span>生命值</span>
      </div>
      <div class="hud-item" id="keys-display">
        <span id="keys-icon" style="color: #FFD700;">🔑</span>
        <span id="keys-count">0 / 3</span>
      </div>
      <div class="hud-item" id="steps-display">
        <span>步数：</span>
        <span id="steps-count">0</span>
      </div>
    </div>
    <div id="overlay">
      <div id="overlay-title"></div>
      <div id="overlay-steps"></div>
      <button id="restart-btn">重新开始</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
