<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>镜界回声</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #status-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 48px;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(8px);
      border-top: 1px solid rgba(52, 152, 219, 0.3);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 32px;
      color: #ffffff;
      font-size: 14px;
      letter-spacing: 1px;
    }
    .status-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-label {
      color: rgba(255, 255, 255, 0.6);
    }
    .status-value {
      color: #3498db;
      font-weight: 600;
      font-size: 16px;
    }
    .crystal-icon {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: linear-gradient(135deg, #ff6347, #ff4500);
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    }
    .energy-bar {
      display: flex;
      gap: 4px;
    }
    .energy-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid rgba(52, 152, 219, 0.4);
    }
    .energy-dot.active {
      background: #3498db;
      box-shadow: 0 0 8px #3498db;
      border-color: #3498db;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="status-bar">
      <div class="status-item">
        <span class="status-label">层数</span>
        <span class="status-value" id="level-display">1</span>
      </div>
      <div class="status-item">
        <span class="status-label">晶石</span>
        <span class="crystal-icon"></span>
        <span class="status-value"><span id="crystal-count">0</span>/8</span>
      </div>
      <div class="status-item">
        <span class="status-label">回声能量</span>
        <div class="energy-bar" id="energy-bar">
          <div class="energy-dot"></div>
          <div class="energy-dot"></div>
          <div class="energy-dot"></div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
