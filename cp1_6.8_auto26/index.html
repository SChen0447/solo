<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>烟花编辑器 - Fireworks Editor</title>
  <link rel="stylesheet" href="./src/styles.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar" class="sidebar expanded">
      <div class="sidebar-toggle" id="sidebarToggle">
        <span class="toggle-icon">≡</span>
      </div>
      
      <div class="sidebar-content">
        <h1 class="app-title">烟花编辑器</h1>
        
        <div class="history-section">
          <div class="section-header" data-section="history">
            <span class="section-title">历史记录</span>
            <span class="section-arrow">▼</span>
          </div>
          <div class="section-content" id="historyContent">
            <div class="history-list" id="historyList"></div>
          </div>
        </div>
        
        <div class="control-section">
          <div class="section-header" data-section="launch">
            <span class="section-title">发射参数</span>
            <span class="section-arrow">▼</span>
          </div>
          <div class="section-content" id="launchContent">
            <div class="control-group">
              <label for="launchAngle">发射角度</label>
              <div class="slider-container">
                <input type="range" id="launchAngle" min="0" max="360" value="90">
                <span class="slider-value" id="launchAngleValue">90°</span>
              </div>
            </div>
            <div class="control-group">
              <label for="explosionRadius">爆炸半径</label>
              <div class="slider-container">
                <input type="range" id="explosionRadius" min="50" max="300" value="150">
                <span class="slider-value" id="explosionRadiusValue">150px</span>
              </div>
            </div>
          </div>
        </div>
        
        <div class="control-section">
          <div class="section-header" data-section="particle">
            <span class="section-title">粒子参数</span>
            <span class="section-arrow">▼</span>
          </div>
          <div class="section-content" id="particleContent">
            <div class="control-group">
              <label for="particleCount">粒子数量</label>
              <div class="slider-container">
                <input type="range" id="particleCount" min="50" max="500" value="200">
                <span class="slider-value" id="particleCountValue">200</span>
              </div>
            </div>
            <div class="control-group">
              <label for="particleLifetime">粒子寿命</label>
              <div class="slider-container">
                <input type="range" id="particleLifetime" min="1" max="5" step="0.1" value="2.5">
                <span class="slider-value" id="particleLifetimeValue">2.5s</span>
              </div>
            </div>
          </div>
        </div>
        
        <div class="control-section">
          <div class="section-header" data-section="color">
            <span class="section-title">颜色参数</span>
            <span class="section-arrow">▼</span>
          </div>
          <div class="section-content" id="colorContent">
            <div class="control-group">
              <label for="startColor">起始颜色</label>
              <div class="color-picker-container">
                <input type="color" id="startColor" value="#00ff9d">
                <span class="color-preview" id="startColorPreview"></span>
              </div>
            </div>
            <div class="control-group">
              <label for="endColor">结束颜色</label>
              <div class="color-picker-container">
                <input type="color" id="endColor" value="#ff00aa">
                <span class="color-preview" id="endColorPreview"></span>
              </div>
            </div>
          </div>
        </div>
        
        <div class="control-section">
          <div class="section-header" data-section="action">
            <span class="section-title">操作区</span>
            <span class="section-arrow">▼</span>
          </div>
          <div class="section-content" id="actionContent">
            <div class="button-group">
              <button class="btn btn-primary" id="launchBtn">
                <span class="btn-icon">🎆</span>
                <span class="btn-text">发射</span>
              </button>
              <button class="btn btn-secondary" id="previewBtn">
                <span class="btn-icon">▶</span>
                <span class="btn-text">预览</span>
              </button>
            </div>
            <div class="button-group">
              <button class="btn btn-outline" id="saveBtn">
                <span class="btn-icon">💾</span>
                <span class="btn-text">保存样式</span>
              </button>
              <button class="btn btn-outline" id="replayBtn">
                <span class="btn-icon">🔄</span>
                <span class="btn-text">回放</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </aside>
    
    <main class="main-content">
      <canvas id="canvas"></canvas>
      
      <div class="flash-effect" id="flashEffect"></div>
      
      <div class="warning-toast" id="warningToast">
        <span class="warning-icon">⚠</span>
        <span class="warning-text">样式数量已达上限（10个），请先删除旧样式</span>
      </div>
      
      <div class="status-bar">
        <div class="status-item">
          <span class="status-label">FPS</span>
          <span class="status-value" id="fpsValue">60</span>
        </div>
        <div class="status-divider"></div>
        <div class="status-item">
          <span class="status-label">粒子数</span>
          <span class="status-value" id="particleCountStatus">0</span>
        </div>
        <div class="status-divider"></div>
        <div class="status-item">
          <span class="status-label">火花数</span>
          <span class="status-value" id="sparkCountStatus">0</span>
        </div>
      </div>
    </main>
  </div>
  
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
