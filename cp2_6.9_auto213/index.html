<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>深海热泉生态系统可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #app {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #gui-container {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
    }

    .dg.ac {
      z-index: 100 !important;
    }

    .dg.main {
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      background: rgba(0, 20, 40, 0.7) !important;
      border-radius: 8px;
      overflow: hidden;
    }

    .dg.main .close-button {
      background: rgba(0, 51, 102, 0.8) !important;
      color: #88CCFF !important;
    }

    .dg li.title {
      background: rgba(0, 51, 102, 0.6) !important;
      color: #88CCFF !important;
    }

    .dg .cr {
      color: #88CCFF !important;
    }

    .dg .c .slider {
      background: #003366 !important;
    }

    .dg .c .slider-fg {
      background: #00CCFF !important;
    }

    .dg .c input[type="text"] {
      background: rgba(0, 51, 102, 0.5) !important;
      color: #88CCFF !important;
      border: 1px solid #003366 !important;
    }

    .dg .c select {
      background: rgba(0, 51, 102, 0.5) !important;
      color: #88CCFF !important;
      border: 1px solid #003366 !important;
    }

    #tooltip {
      position: fixed;
      pointer-events: none;
      background: rgba(0, 0, 0, 0.7);
      color: #FFFFFF;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-family: 'Segoe UI', sans-serif;
      z-index: 200;
      display: none;
      white-space: nowrap;
    }

    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #88CCFF;
      font-size: 18px;
      z-index: 300;
    }
  </style>
</head>
<body>
  <div id="loading">正在加载深海热泉生态系统...</div>
  <div id="app"></div>
  <div id="gui-container"></div>
  <div id="tooltip"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
