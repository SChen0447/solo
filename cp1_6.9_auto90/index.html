<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>魔力宝石矿洞</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
      font-family: 'Georgia', 'Times New Roman', serif;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .scoreboard {
      position: fixed;
      top: 20px;
      left: 20px;
      background: linear-gradient(145deg, #4a3520, #5a4530);
      border: 3px solid #ffcc44;
      border-radius: 8px;
      padding: 12px 20px;
      color: #ffcc44;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8), 0 0 10px rgba(255,204,68,0.3);
      box-shadow: 0 4px 15px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
      transition: transform 0.3s ease, opacity 0.2s ease;
      z-index: 10;
    }

    .scoreboard:hover {
      transform: scale(1.05);
    }

    .scoreboard .label {
      font-size: 14px;
      color: #ddaa66;
      margin-bottom: 4px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }

    .guide {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(26, 26, 42, 0.85);
      border-radius: 10px;
      padding: 12px 18px;
      color: #aabbcc;
      font-size: 14px;
      line-height: 1.6;
      max-width: 220px;
      backdrop-filter: blur(5px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      transition: transform 0.3s ease, opacity 0.2s ease;
      z-index: 10;
    }

    .guide-title {
      color: #ffddaa;
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 6px;
    }

    .status-bar {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px 28px;
      color: #aabbcc;
      font-size: 15px;
      display: flex;
      gap: 30px;
      align-items: center;
      z-index: 10;
      transition: transform 0.3s ease, opacity 0.2s ease;
    }

    .status-bar .stat {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-bar .stat-value {
      color: #ffdd88;
      font-weight: bold;
      font-size: 18px;
    }

    .control-hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 10px 20px;
      color: #aabbcc;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 10;
      transition: transform 0.3s ease, opacity 0.2s ease;
    }

    .color-preview {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      box-shadow: 0 0 10px currentColor;
      transition: transform 0.3s ease, opacity 0.2s ease;
    }

    .color-preview.hidden {
      opacity: 0;
      transform: scale(0);
    }

    .info-card {
      position: fixed;
      background: rgba(26, 26, 42, 0.7);
      border: 1px solid rgba(255, 221, 170, 0.3);
      border-radius: 12px;
      padding: 10px 16px;
      color: #ffddaa;
      font-size: 13px;
      line-height: 1.5;
      pointer-events: none;
      z-index: 20;
      transform: translate(-50%, -120%);
      transition: transform 0.3s ease, opacity 0.2s ease;
      opacity: 0;
      min-width: 140px;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    .info-card.visible {
      opacity: 1;
    }

    .info-card .gem-name {
      font-weight: bold;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .info-card .gem-rarity {
      font-size: 12px;
      opacity: 0.8;
    }

    .shelf-glow {
      position: fixed;
      pointer-events: none;
      z-index: 5;
      transition: opacity 1s ease;
      opacity: 0;
    }

    .shelf-glow.active {
      opacity: 1;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div class="scoreboard">
    <div class="label">积分</div>
    <div id="score">0</div>
  </div>

  <div class="guide">
    <div class="guide-title">⛏️ 挖掘指南</div>
    点击闪烁光点挖掘宝石<br />
    连续3颗同色触发共鸣<br />
    点击展示架宝石查看属性
  </div>

  <div class="status-bar">
    <div class="stat">
      <span>挖掘次数:</span>
      <span class="stat-value" id="dig-count">0</span>
    </div>
    <div class="stat">
      <span>剩余点数:</span>
      <span class="stat-value" id="points-left">30</span>
    </div>
  </div>

  <div class="control-hint">
    <span>当前宝石颜色:</span>
    <div class="color-preview hidden" id="color-preview"></div>
    <span id="hint-text">移动鼠标到光点上查看</span>
  </div>

  <div class="info-card" id="info-card">
    <div class="gem-name" id="gem-name"></div>
    <div class="gem-rarity" id="gem-rarity"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
