<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>呼吸花园 — Breath Garden</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a2e; }
    body { font-family: 'Courier New', monospace; color: #fff; }
    #canvas-container { position: fixed; inset: 0; z-index: 0; }
    canvas { display: block; width: 100%; height: 100%; }

    .glass {
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
    }

    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      padding: 14px 18px;
      min-width: 200px;
      font-size: 13px;
      line-height: 1.7;
      pointer-events: none;
    }
    #hud .label { color: rgba(255,255,255,0.5); }
    #hud .value { color: #fff; font-weight: bold; }

    #control-panel {
      position: fixed;
      top: 50%;
      left: 16px;
      transform: translateY(-50%);
      z-index: 10;
      width: 240px;
      padding: 20px;
      transition: transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.4s;
    }
    #control-panel h3 {
      font-size: 14px;
      margin-bottom: 16px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .slider-group {
      margin-bottom: 16px;
    }
    .slider-group label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 6px;
    }
    .slider-group label span.val {
      color: #7ec850;
      font-weight: bold;
    }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      transition: box-shadow 0.2s;
    }
    input[type="range"]:hover {
      box-shadow: 0 0 8px rgba(126,200,80,0.4);
      transform: scale(1.02);
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #7ec850;
      cursor: pointer;
      transition: transform 0.15s;
    }
    input[type="range"]:active::-webkit-slider-thumb {
      transform: scale(0.9);
    }

    .btn-icon {
      position: fixed;
      z-index: 10;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: rgba(255,255,255,0.7);
      transition: transform 0.15s, box-shadow 0.2s;
    }
    .btn-icon:hover {
      transform: scale(1.05);
      box-shadow: 0 0 12px rgba(126,200,80,0.3);
    }
    .btn-icon:active {
      transform: scale(0.95);
    }
    #btn-fullscreen { bottom: 16px; right: 16px; }
    #btn-mic { bottom: 16px; right: 64px; }
    #btn-mic.active { background: rgba(126,200,80,0.3); }

    #panel-toggle {
      display: none;
      position: fixed;
      bottom: 16px;
      left: 16px;
      z-index: 11;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
    }

    @media (max-width: 767px) {
      #control-panel {
        top: auto;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        transform: translateY(0);
        border-radius: 16px 16px 0 0;
        transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
      }
      #control-panel.collapsed {
        transform: translateY(calc(100% - 40px));
      }
      #panel-toggle {
        display: block;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="hud" class="glass">
    <div><span class="label">手势距离</span> <span class="value" id="hud-distance">—</span><span class="label"> px</span></div>
    <div><span class="label">呼吸强度</span> <span class="value" id="hud-breath">0.00</span></div>
    <div><span class="label">生命力</span> <span class="value" id="hud-vitality">0%</span></div>
  </div>

  <div id="control-panel" class="glass">
    <h3>控制面板</h3>
    <div class="slider-group">
      <label>生长速度 <span class="val" id="val-growth">1.0</span></label>
      <input type="range" id="slider-growth" min="0.1" max="2.0" step="0.1" value="1.0" />
    </div>
    <div class="slider-group">
      <label>呼吸灵敏度 <span class="val" id="val-breath">0.5</span></label>
      <input type="range" id="slider-breath" min="0.1" max="1.0" step="0.05" value="0.5" />
    </div>
    <div class="slider-group">
      <label>粒子密度 <span class="val" id="val-density">5</span></label>
      <input type="range" id="slider-density" min="1" max="10" step="1" value="5" />
    </div>
  </div>

  <button id="panel-toggle" class="glass">⚙ 控制面板</button>
  <button id="btn-mic" class="btn-icon glass" title="麦克风">🎤</button>
  <button id="btn-fullscreen" class="btn-icon glass" title="全屏">⛶</button>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
