<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>鸣虫·幻光夜</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #0a0a2e 0%, #1a1a3e 100%);
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: default;
    }

    #canvas.dragging {
      cursor: crosshair;
    }

    #control-panel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 220px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      color: #fff;
      opacity: 0;
      animation: fadeIn 0.2s ease forwards;
      z-index: 10;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    #control-panel .control-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 4px;
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
    }

    #control-panel .control-label:first-child {
      margin-top: 0;
    }

    #control-panel .control-label span {
      color: rgba(255, 255, 255, 0.9);
      font-weight: 600;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: #333;
      border-radius: 3px;
      outline: none;
      transition: 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff 0%, #888 100%);
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 14px rgba(255, 255, 255, 0.7);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff 0%, #888 100%);
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
      cursor: pointer;
      border: none;
    }

    #mode-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      padding: 6px 14px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: linear-gradient(135deg, #1a1a2e, #2a2a4e);
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      z-index: 10;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      user-select: none;
    }

    #mode-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(100, 100, 255, 0.3);
    }

    @media (max-width: 767px) {
      #control-panel {
        bottom: 0;
        right: 0;
        width: 100%;
        border-radius: 12px 12px 0 0;
        background: rgba(20, 20, 50, 0.95);
        padding: 14px 20px;
      }

      #mode-btn {
        top: 10px;
        left: 10px;
        font-size: 11px;
        padding: 5px 10px;
      }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <button id="mode-btn">音色模式: 自然</button>

  <div id="control-panel">
    <div class="control-label">主音量 <span id="vol-val">70%</span></div>
    <input type="range" id="volume-slider" min="0" max="100" value="70" />

    <div class="control-label">节奏速度 <span id="tempo-val">1.0x</span></div>
    <input type="range" id="tempo-slider" min="50" max="200" value="100" />

    <div class="control-label">昆虫大小 <span id="size-val">12px</span></div>
    <input type="range" id="size-slider" min="8" max="20" value="12" />
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
