<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>时间之环</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1A1A2E;
      font-family: monospace;
    }
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-width: 800px;
      min-height: 600px;
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #timeline-panel {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: rgba(26, 26, 46, 0.9);
      border: 1px solid #6A6A8A;
      border-radius: 4px;
    }
    .timeline-label {
      color: #E0E0E0;
      font-size: 12px;
      letter-spacing: 1px;
    }
    #timeline-slider {
      width: 150px;
      height: 20px;
      background: #333;
      border: 1px solid #6A6A8A;
      border-radius: 2px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow 0.2s;
    }
    #timeline-slider:hover {
      box-shadow: 0 0 8px #4ECDC4;
    }
    #timeline-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: linear-gradient(90deg, #FF6B6B, #4ECDC4);
      transition: width 0.05s linear;
    }
    #timeline-handle {
      position: absolute;
      top: -2px;
      width: 4px;
      height: 24px;
      background: #E0E0E0;
      border: 1px solid #6A6A8A;
      transform: translateX(-50%);
      pointer-events: none;
    }
    #hint {
      position: absolute;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      color: #8A8AAA;
      font-size: 11px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="hint">WASD 移动 · 空格 时间倒流 · 收集所有碎片解开机关</div>
    <div id="timeline-panel">
      <span class="timeline-label">时间线</span>
      <div id="timeline-slider">
        <div id="timeline-fill"></div>
        <div id="timeline-handle"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
