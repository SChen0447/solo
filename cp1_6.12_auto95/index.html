<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rain Window Art · 雨天窗景数字艺术</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #1A1A2E 0%, #16213E 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #E0E0E0;
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #rainCanvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
    }
    #rainCanvas:active {
      cursor: grabbing;
    }
    .control-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 180px;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 8px;
      padding: 16px;
      z-index: 100;
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: background 0.2s ease;
    }
    .control-panel:hover {
      background: rgba(0, 0, 0, 0.5);
    }
    .panel-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      color: #90E0EF;
      margin-bottom: 14px;
      text-transform: uppercase;
      text-align: center;
    }
    .control-group {
      margin-bottom: 14px;
    }
    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #B0B0C0;
      margin-bottom: 6px;
    }
    .control-value {
      color: #00E5FF;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(90deg, #00B4D8, #90E0EF);
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #FFFFFF;
      border: 2px solid #00E5FF;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
      transition: transform 0.15s ease;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }
    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #FFFFFF;
      border: 2px solid #00E5FF;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
    }
    .photo-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }
    .photo-btn {
      height: 32px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      color: #C0C0D0;
      font-size: 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .photo-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      color: #FFFFFF;
      border-color: rgba(0, 229, 255, 0.4);
    }
    .photo-btn.active {
      background: rgba(0, 229, 255, 0.15);
      color: #00E5FF;
      border-color: #00E5FF;
    }
    .reset-btn {
      width: 100%;
      height: 32px;
      border: 1px solid rgba(255, 100, 100, 0.3);
      background: rgba(255, 80, 80, 0.08);
      color: #FF8A8A;
      font-size: 11px;
      font-weight: 500;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.5px;
    }
    .reset-btn:hover {
      background: rgba(255, 80, 80, 0.2);
      color: #FFB0B0;
      border-color: rgba(255, 120, 120, 0.5);
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="rainCanvas"></canvas>
    <div class="control-panel" id="controlPanel">
      <div class="panel-title">Rain Control</div>
      
      <div class="control-group">
        <div class="control-label">
          <span>雨量</span>
          <span class="control-value" id="rainCountValue">200</span>
        </div>
        <input type="range" id="rainCount" min="0" max="500" value="200" step="10" />
      </div>
      
      <div class="control-group">
        <div class="control-label">
          <span>重力强度</span>
          <span class="control-value" id="gravityValue">1.0x</span>
        </div>
        <input type="range" id="gravityScale" min="0.5" max="2.0" value="1.0" step="0.1" />
      </div>
      
      <div class="control-group">
        <div class="control-label">
          <span>照片切换</span>
        </div>
        <div class="photo-buttons" id="photoButtons">
          <button class="photo-btn active" data-index="0">No.1</button>
          <button class="photo-btn" data-index="1">No.2</button>
          <button class="photo-btn" data-index="2">No.3</button>
        </div>
      </div>
      
      <button class="reset-btn" id="resetBtn">清空 & 重置</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
