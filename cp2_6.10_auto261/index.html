<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>铁轨铺排与调度</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e0e0e0;
      user-select: none;
    }

    #game {
      width: 100vw;
      height: 100vh;
      display: flex;
      position: relative;
    }

    .toolbar {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 100px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 10;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .toolbar-title {
      font-size: 11px;
      text-align: center;
      color: #888;
      margin-bottom: 4px;
      letter-spacing: 1px;
    }

    .tool-item {
      width: 100%;
      aspect-ratio: 1;
      background: rgba(255, 255, 255, 0.04);
      border: 2px solid transparent;
      border-radius: 12px;
      cursor: grab;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .tool-item:hover {
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
    }

    .tool-item:active {
      cursor: grabbing;
      transform: translateY(-1px) scale(0.97);
    }

    .tool-item.selected {
      border-color: #00ff88;
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.4), inset 0 0 10px rgba(0, 255, 136, 0.1);
      background: rgba(0, 255, 136, 0.08);
    }

    .tool-item canvas {
      width: 75%;
      height: 75%;
    }

    .tool-label {
      font-size: 9px;
      text-align: center;
      color: #aaa;
      margin-top: 2px;
    }

    .info-panel {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 220px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 10;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .panel-title {
      font-size: 13px;
      color: #00ff88;
      letter-spacing: 1px;
      font-weight: bold;
    }

    .panel-buttons {
      display: flex;
      gap: 6px;
    }

    .btn-icon {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: #e0e0e0;
      cursor: pointer;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-icon:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }

    .btn-icon:active {
      transform: scale(0.9);
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
    }

    .info-label {
      color: #888;
    }

    .info-value {
      color: #e0e0e0;
      font-weight: bold;
    }

    .timer-value {
      color: #ff4466;
      font-size: 24px;
      font-weight: bold;
      font-family: 'Courier New', monospace;
    }

    .score-value {
      color: #00ff88;
      font-size: 18px;
      font-weight: bold;
    }

    .signals-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .signal-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      transition: all 0.3s;
    }

    .signal-dot.green {
      background: #00ff88;
      box-shadow: 0 0 8px #00ff88;
    }

    .signal-dot.red {
      background: #ff4466;
      box-shadow: 0 0 8px #ff4466;
      animation: pulse-red 1s infinite;
    }

    @keyframes pulse-red {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .log-container {
      height: 80px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      padding: 6px 8px;
      position: relative;
    }

    .log-list {
      display: flex;
      flex-direction: column-reverse;
      gap: 2px;
    }

    .log-item {
      font-size: 10px;
      color: #00ff88;
      opacity: 0.9;
      animation: log-slide 0.3s ease-out;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @keyframes log-slide {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 0.9;
        transform: translateY(0);
      }
    }

    .speed-control {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .speed-slider {
      width: 100%;
      accent-color: #00ff88;
    }

    .start-button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
      color: #0a1a12;
      font-size: 14px;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
    }

    .start-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0, 255, 136, 0.4);
    }

    .start-button:active {
      transform: scale(0.97);
    }

    .start-button:disabled {
      background: linear-gradient(135deg, #555 0%, #444 100%);
      color: #888;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .game-canvas {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 12px;
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
    }

    .collision-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 50;
      animation: collision-flash 0.15s 6;
    }

    @keyframes collision-flash {
      0%, 100% { background: transparent; }
      50% { background: rgba(255, 68, 102, 0.4); }
    }

    .level-complete {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: rgba(26, 26, 46, 0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 255, 136, 0.3);
      border-radius: 20px;
      padding: 32px 48px;
      text-align: center;
      z-index: 100;
      box-shadow: 0 0 50px rgba(0, 255, 136, 0.2);
      animation: popup 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes popup {
      from {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.5);
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    .level-complete h2 {
      color: #00ff88;
      font-size: 24px;
      margin-bottom: 12px;
    }

    .level-complete p {
      color: #aaa;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .level-complete .score-big {
      color: #00ff88;
      font-size: 36px;
      font-weight: bold;
      margin: 16px 0;
    }

    .level-complete .btn-next {
      margin-top: 16px;
      padding: 10px 28px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
      color: #0a1a12;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }

    .level-complete .btn-next:hover {
      transform: translateY(-2px);
    }

    .leaderboard {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .leaderboard h3 {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }

    .leaderboard ol {
      text-align: left;
      padding-left: 20px;
    }

    .leaderboard li {
      font-size: 11px;
      color: #ccc;
      margin-bottom: 3px;
    }

    .leaderboard li:nth-child(1) { color: #ffd700; }
    .leaderboard li:nth-child(2) { color: #c0c0c0; }
    .leaderboard li:nth-child(3) { color: #cd7f32; }

    @media (max-width: 768px) {
      .toolbar {
        left: 0;
        right: 0;
        top: auto;
        bottom: 0;
        transform: none;
        width: 100%;
        height: 90px;
        flex-direction: row;
        justify-content: center;
        border-radius: 16px 16px 0 0;
        padding: 10px;
        gap: 8px;
      }

      .toolbar-title { display: none; }

      .tool-item {
        width: 65px;
        aspect-ratio: 1;
      }

      .tool-label { display: none; }

      .info-panel {
        right: 0;
        left: 0;
        top: 0;
        transform: none;
        width: 100%;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 8px;
        border-radius: 0 0 16px 16px;
        padding: 10px 12px;
      }

      .panel-header { flex: 1 1 100%; margin-bottom: 0; }
      .log-container { flex: 1 1 100%; height: 50px; }
      .info-row { flex: 0 0 auto; }
      .timer-value { font-size: 18px; }
      .start-button { flex: 1 1 100%; padding: 10px; }
      .speed-control { display: none; }

      .game-canvas {
        top: calc(50% + 20px);
      }
    }
  </style>
</head>
<body>
  <div id="game">
    <canvas id="canvas" class="game-canvas"></canvas>
  </div>
  <script type="module" src="/src/GameEngine.ts"></script>
</body>
</html>
