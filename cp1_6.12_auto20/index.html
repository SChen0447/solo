<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音律跑酷 - Rhythm Runner</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a1a;
    }
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 120px;
      pointer-events: none;
      z-index: 10;
    }
    #hud-left {
      position: absolute;
      top: 20px;
      left: 30px;
      color: #fff;
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
    }
    #hud-right {
      position: absolute;
      top: 20px;
      right: 30px;
      color: #fff;
      text-shadow: 0 0 10px rgba(255, 0, 255, 0.8);
    }
    #mode-selector {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      z-index: 20;
    }
    .mode-btn {
      padding: 10px 25px;
      border: 2px solid rgba(0, 255, 255, 0.5);
      background: rgba(0, 0, 0, 0.6);
      color: #0ff;
      font-size: 14px;
      cursor: pointer;
      border-radius: 5px;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .mode-btn:hover {
      background: rgba(0, 255, 255, 0.2);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
    }
    .mode-btn.active {
      background: rgba(0, 255, 255, 0.3);
      border-color: #0ff;
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.7);
    }
    #game-over {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(10, 10, 30, 0.95);
      border: 2px solid rgba(255, 0, 100, 0.8);
      border-radius: 15px;
      padding: 40px 60px;
      text-align: center;
      z-index: 30;
      box-shadow: 0 0 40px rgba(255, 0, 100, 0.5);
      display: none;
    }
    #game-over h2 {
      color: #ff0066;
      font-size: 36px;
      margin-bottom: 20px;
      text-shadow: 0 0 15px rgba(255, 0, 100, 0.8);
      letter-spacing: 3px;
    }
    #game-over p {
      color: #0ff;
      font-size: 20px;
      margin: 10px 0;
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.6);
    }
    #restart-btn {
      margin-top: 25px;
      padding: 15px 40px;
      font-size: 18px;
      border: 2px solid #0ff;
      background: rgba(0, 255, 255, 0.2);
      color: #0ff;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s ease;
      letter-spacing: 2px;
    }
    #restart-btn:hover {
      background: rgba(0, 255, 255, 0.4);
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.7);
      transform: scale(1.05);
    }
    #start-screen {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 25;
    }
    #start-screen h1 {
      color: #0ff;
      font-size: 48px;
      margin-bottom: 15px;
      text-shadow: 0 0 20px rgba(0, 255, 255, 0.8), 0 0 40px rgba(255, 0, 255, 0.5);
      letter-spacing: 5px;
    }
    #start-screen p {
      color: #f0f;
      font-size: 18px;
      margin-bottom: 30px;
      text-shadow: 0 0 10px rgba(255, 0, 255, 0.6);
    }
    #start-btn {
      padding: 18px 50px;
      font-size: 22px;
      border: 2px solid #f0f;
      background: rgba(255, 0, 255, 0.2);
      color: #f0f;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s ease;
      letter-spacing: 3px;
    }
    #start-btn:hover {
      background: rgba(255, 0, 255, 0.4);
      box-shadow: 0 0 35px rgba(255, 0, 255, 0.7);
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="hud">
      <div id="hud-left">
        <div id="score" style="font-size: 28px; font-weight: bold;">得分: 0</div>
        <div id="mode-name" style="font-size: 16px; margin-top: 5px; opacity: 0.8;">模式: 普通</div>
        <div id="time-display" style="font-size: 16px; margin-top: 5px; opacity: 0.8;">时间: 0.0s</div>
      </div>
      <div id="hud-right">
        <div style="font-size: 14px; margin-bottom: 5px; opacity: 0.7;">频率分布</div>
        <div style="display: flex; gap: 8px;">
          <div id="low-bar" style="width: 30px; height: 40px; background: linear-gradient(to top, #ff3366, #ff6699); border-radius: 3px; box-shadow: 0 0 10px #ff3366;"></div>
          <div id="mid-bar" style="width: 30px; height: 40px; background: linear-gradient(to top, #33ff66, #66ff99); border-radius: 3px; box-shadow: 0 0 10px #33ff66;"></div>
          <div id="high-bar" style="width: 30px; height: 40px; background: linear-gradient(to top, #3366ff, #6699ff); border-radius: 3px; box-shadow: 0 0 10px #3366ff;"></div>
        </div>
      </div>
    </div>
    <div id="mode-selector">
      <button class="mode-btn" data-mode="easy">简单</button>
      <button class="mode-btn active" data-mode="normal">普通</button>
      <button class="mode-btn" data-mode="hard">困难</button>
    </div>
    <div id="start-screen">
      <h1>音律跑酷</h1>
      <p>按 空格键 或 点击 跳跃 · 跟随节拍越过障碍</p>
      <button id="start-btn">开始游戏</button>
    </div>
    <div id="game-over">
      <h2>游戏结束</h2>
      <p id="final-score">最终得分: 0</p>
      <p id="final-time">存活时间: 0.0秒</p>
      <button id="restart-btn">重新开始</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
