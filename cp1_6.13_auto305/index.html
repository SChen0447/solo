<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>光痕·星脉织机</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #1a0f2e 0%, #0a0a0a 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    .info-panel {
      position: fixed;
      right: 16px;
      bottom: 16px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 16px;
      color: #ffffff;
      opacity: 0.7;
      font-size: 14px;
      line-height: 1.8;
      z-index: 100;
    }
    @media (max-width: 768px) {
      .info-panel {
        right: auto;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        bottom: 12px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="info-panel">
    点击添加节点，拖拽连接节点<br/>
    悬停激发光波，Delete删除选中
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
