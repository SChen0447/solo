<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>贪吃蛇对战</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: #1A1A1A;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .score-bar {
      width: 100%;
      max-width: 600px;
      height: 30px;
      background: #1A1A1A;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
      color: white;
      font-size: 18px;
      font-weight: bold;
    }

    .player1-score {
      color: #4A90D9;
    }

    .player2-score {
      color: #D94A4A;
    }

    .ai-mode-indicator {
      color: #9C9C9C;
      font-size: 14px;
      font-weight: normal;
    }

    #gameCanvas {
      display: block;
      max-width: 600px;
      width: 100%;
      height: auto;
      image-rendering: pixelated;
    }

    .hint-bar {
      width: 100%;
      max-width: 600px;
      height: 30px;
      background: #1A1A1A;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #9C9C9C;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="score-bar">
      <span class="player1-score">玩家1: 0</span>
      <span class="ai-mode-indicator"></span>
      <span class="player2-score">玩家2: 0</span>
    </div>
    <canvas id="gameCanvas" width="450" height="450"></canvas>
    <div class="hint-bar">WASD / 方向键 移动 | TAB 切换AI | 空格 重新开始</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
