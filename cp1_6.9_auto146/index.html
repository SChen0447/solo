<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>虚拟声波雕塑 | Sonic Sculpture</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #05070f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      color: #e0e6ff;
      overflow: hidden;
    }

    #header {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(102, 153, 255, 0.8), 0 0 20px rgba(255, 102, 136, 0.4);
      z-index: 100;
      transition: all 200ms ease-out;
    }

    #app-container {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      position: relative;
    }

    #canvas-wrapper {
      position: relative;
      width: 960px;
      height: 640px;
      border: 2px solid #6699ff;
      border-radius: 4px;
      box-shadow: 0 0 15px rgba(102, 153, 255, 0.5), 0 0 30px rgba(255, 102, 136, 0.2), inset 0 0 20px rgba(10, 15, 42, 0.5);
      transition: border-color 1500ms ease-out, box-shadow 1500ms ease-out;
    }

    #canvas-wrapper canvas {
      display: block;
      border-radius: 2px;
    }

    #control-panel {
      width: 220px;
      background: rgba(26, 26, 46, 0.85);
      border-radius: 8px;
      padding: 16px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(102, 153, 255, 0.3);
      box-shadow: 0 0 20px rgba(102, 153, 255, 0.2);
    }

    .control-group {
      margin-bottom: 18px;
    }

    .control-label {
      font-size: 12px;
      color: #a0b0ff;
      margin-bottom: 6px;
      display: block;
      letter-spacing: 1px;
    }

    .control-value {
      float: right;
      color: #ff88aa;
      font-weight: bold;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 6px;
      background: linear-gradient(90deg, #6699ff, #ff88aa);
      border-radius: 3px;
      box-shadow: 0 0 6px rgba(102, 153, 255, 0.4);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ff88aa;
      margin-top: -5px;
      box-shadow: 0 0 8px #ff88aa, 0 0 16px rgba(255, 136, 170, 0.6);
      transition: all 200ms ease-out;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: #ffaacc;
      box-shadow: 0 0 12px #ffaacc, 0 0 24px rgba(255, 170, 204, 0.8);
      transform: scale(1.1);
    }

    input[type="range"]::-moz-range-track {
      height: 6px;
      background: linear-gradient(90deg, #6699ff, #ff88aa);
      border-radius: 3px;
      box-shadow: 0 0 6px rgba(102, 153, 255, 0.4);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ff88aa;
      border: none;
      box-shadow: 0 0 8px #ff88aa, 0 0 16px rgba(255, 136, 170, 0.6);
      transition: all 200ms ease-out;
      cursor: pointer;
    }

    select {
      width: 100%;
      padding: 8px 12px;
      background: rgba(40, 40, 70, 0.9);
      border: 1px solid rgba(102, 153, 255, 0.4);
      border-radius: 6px;
      color: #e0e6ff;
      font-size: 13px;
      cursor: pointer;
      transition: all 200ms ease-out;
      outline: none;
    }

    select:hover {
      border-color: #ff88aa;
      box-shadow: 0 0 10px rgba(255, 136, 170, 0.3);
    }

    select:focus {
      border-color: #ff88aa;
      box-shadow: 0 0 12px rgba(255, 136, 170, 0.5);
    }

    .btn {
      width: 100%;
      padding: 10px 16px;
      background: #ff6688;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 200ms ease-out;
      box-shadow: 0 0 8px rgba(255, 102, 136, 0.5);
      margin-bottom: 10px;
    }

    .btn:hover {
      background: #ff88aa;
      box-shadow: 0 0 14px rgba(255, 136, 170, 0.7);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: scale(0.95);
      box-shadow: 0 0 6px rgba(255, 102, 136, 0.4);
    }

    .btn-secondary {
      background: #6677aa;
      box-shadow: 0 0 8px rgba(102, 119, 170, 0.5);
    }

    .btn-secondary:hover {
      background: #8899cc;
      box-shadow: 0 0 14px rgba(136, 153, 204, 0.7);
    }

    #hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(160, 176, 255, 0.6);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div id="header">活跃轨迹: 0 | 干涉次数: 0</div>
  <div id="app-container">
    <div id="canvas-wrapper"></div>
    <div id="control-panel">
      <div class="control-group">
        <label class="control-label">
          频率 (Hz)
          <span class="control-value" id="freq-value">440</span>
        </label>
        <input type="range" id="freq-slider" min="20" max="2000" value="440" step="1" />
      </div>
      <div class="control-group">
        <label class="control-label">
          振幅
          <span class="control-value" id="amp-value">0.50</span>
        </label>
        <input type="range" id="amp-slider" min="0" max="1" value="0.5" step="0.01" />
      </div>
      <div class="control-group">
        <label class="control-label">波形</label>
        <select id="waveform-select">
          <option value="sine">正弦波</option>
          <option value="square">方波</option>
          <option value="sawtooth">锯齿波</option>
        </select>
      </div>
      <div class="control-group">
        <button class="btn" id="generate-btn">生成新轨迹</button>
        <button class="btn btn-secondary" id="clear-btn">清除所有</button>
      </div>
    </div>
  </div>
  <div id="hint">在画布上按下鼠标左键拖拽绘制声波轨迹 · 多条轨迹交织时产生干涉和声</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
