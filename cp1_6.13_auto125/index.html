<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>地脉·层析 - 交互式地质剖面挖掘</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      color: #e0e0e0;
    }

    body {
      background: radial-gradient(ellipse at center, #1A1A2E 0%, #0F0F1A 100%);
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, #1A1A2E 0%, #0F0F1A 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 1s ease;
    }

    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loading-circle {
      width: 30vw;
      height: 30vw;
      min-width: 200px;
      min-height: 200px;
      border-radius: 50%;
      border: 3px solid rgba(255, 200, 100, 0.3);
      position: relative;
      animation: pulseFade 2s ease-in-out infinite;
    }

    .loading-circle::before {
      content: '';
      position: absolute;
      top: -6px;
      left: -6px;
      right: -6px;
      bottom: -6px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: rgba(255, 200, 100, 0.6);
      animation: rotate 1.5s linear infinite;
    }

    .loading-text {
      position: absolute;
      color: rgba(255, 200, 100, 0.9);
      font-size: 18px;
      letter-spacing: 8px;
      animation: textGlow 2s ease-in-out infinite;
    }

    @keyframes pulseFade {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.05); }
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes textGlow {
      0%, 100% { text-shadow: 0 0 10px rgba(255, 200, 100, 0.5); }
      50% { text-shadow: 0 0 25px rgba(255, 200, 100, 0.9); }
    }

    #ui-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    .info-panel {
      position: absolute;
      background: rgba(30, 30, 30, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 200, 100, 0.3);
      border-radius: 12px;
      padding: 16px 20px;
      min-width: 220px;
      pointer-events: none;
      opacity: 0;
      transform: translateY(-10px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .info-panel.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .info-panel h3 {
      font-size: 16px;
      color: #FFD54F;
      margin-bottom: 10px;
      border-bottom: 1px solid rgba(255, 200, 100, 0.2);
      padding-bottom: 8px;
    }

    .info-panel .info-row {
      font-size: 13px;
      line-height: 1.8;
      color: #cccccc;
    }

    .info-panel .info-label {
      color: rgba(255, 200, 100, 0.7);
      margin-right: 8px;
    }

    .info-panel .minerals {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }

    .info-panel .mineral-tag {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 12px;
      background: rgba(255, 200, 100, 0.15);
      border: 1px solid rgba(255, 200, 100, 0.3);
      color: #e8d4a8;
    }

    .reset-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 10px 20px;
      background: rgba(30, 30, 30, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 200, 100, 0.4);
      border-radius: 8px;
      color: #FFD54F;
      font-size: 13px;
      cursor: pointer;
      pointer-events: auto;
      transition: all 0.3s ease;
      z-index: 20;
    }

    .reset-btn:hover {
      background: rgba(255, 200, 100, 0.2);
      border-color: rgba(255, 200, 100, 0.8);
      transform: translateY(-2px);
    }

    #control-panel {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 30%;
      min-width: 350px;
      height: 60px;
      background: rgba(30, 30, 30, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 20px;
      pointer-events: auto;
      z-index: 15;
      gap: 12px;
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }

    .slider-group label {
      font-size: 11px;
      color: rgba(255, 200, 100, 0.8);
      margin-bottom: 4px;
    }

    .slider-group input[type="range"] {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 200, 100, 0.2);
      border-radius: 2px;
      outline: none;
    }

    .slider-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #FFD54F;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(255, 200, 100, 0.6);
    }

    .slider-group input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #FFD54F;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 8px rgba(255, 200, 100, 0.6);
    }

    .panel-reset-btn {
      padding: 8px 16px;
      background: rgba(255, 200, 100, 0.15);
      border: 1px solid rgba(255, 200, 100, 0.4);
      border-radius: 10px;
      color: #FFD54F;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .panel-reset-btn:hover {
      background: rgba(255, 200, 100, 0.3);
    }

    .mineral-label {
      position: absolute;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      color: white;
      pointer-events: none;
      transition: all 0.3s ease;
      overflow: hidden;
      white-space: nowrap;
    }

    .mineral-label:hover {
      width: auto;
      height: auto;
      min-width: 20px;
      min-height: 20px;
      padding: 4px 10px;
      border-radius: 10px;
      font-size: 12px;
      z-index: 100;
    }

    @media (max-width: 1280px) and (min-width: 768px) {
      #control-panel {
        width: 50%;
      }
    }

    @media (max-width: 768px) {
      #control-panel {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading-screen">
      <div class="loading-circle"></div>
      <span class="loading-text">地 脉 · 层 析</span>
    </div>
    <div id="ui-overlay">
      <button class="reset-btn" id="top-reset-btn">重置挖深</button>
      <div class="info-panel" id="info-panel"></div>
    </div>
    <div id="control-panel">
      <div class="slider-group">
        <label>深度</label>
        <input type="range" id="depth-slider" min="0" max="10" step="0.5" value="0" />
      </div>
      <div class="slider-group">
        <label>透明度</label>
        <input type="range" id="opacity-slider" min="0" max="1" step="0.1" value="1" />
      </div>
      <div class="slider-group">
        <label>亮度</label>
        <input type="range" id="brightness-slider" min="0.5" max="2" step="0.1" value="1" />
      </div>
      <button class="panel-reset-btn" id="panel-reset-btn">重置</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
