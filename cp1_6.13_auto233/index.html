<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星辉·折射罗盘</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #0a0b16 0%, #12142b 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
    }
    #fps-counter {
      position: fixed;
      left: 16px;
      bottom: 16px;
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      border-radius: 6px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 12px;
      font-family: 'Consolas', 'Monaco', monospace;
      letter-spacing: 0.5px;
      z-index: 100;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="fps-counter">FPS: --</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
