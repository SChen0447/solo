<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宇宙星云粒子系统 | Cosmic Nebula</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000000;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      display: block;
      cursor: grab;
    }

    canvas:active {
      cursor: grabbing;
    }

    .tp-dfwv {
      background: rgba(255, 255, 255, 0.1) !important;
      backdrop-filter: blur(10px) !important;
      -webkit-backdrop-filter: blur(10px) !important;
      border: 1px solid rgba(255, 255, 255, 0.3) !important;
      border-radius: 8px !important;
    }

    #info {
      position: fixed;
      top: 20px;
      left: 20px;
      color: rgba(255, 255, 255, 0.7);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 13px;
      pointer-events: none;
      z-index: 100;
      line-height: 1.6;
    }

    #info h1 {
      font-size: 18px;
      font-weight: 300;
      margin-bottom: 8px;
      color: rgba(255, 255, 255, 0.9);
      letter-spacing: 2px;
    }

    #info .hint {
      color: rgba(255, 255, 255, 0.5);
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="info">
      <h1>COSMIC NEBULA</h1>
      <div>拖拽旋转视角 · 滚轮缩放距离</div>
      <div class="hint">调整右侧控制面板实时改变色彩效果</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
