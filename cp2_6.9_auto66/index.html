<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Origami Crease - Japanese Letter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cedarville+Cursive&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      min-height: 100vh;
    }

    body {
      background-color: #F8F4EC;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(200, 180, 150, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(180, 160, 130, 0.06) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(220, 200, 170, 0.04) 0%, transparent 70%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Cedarville Cursive', cursive;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
    }

    .letter-container {
      width: 600px;
      height: 848px;
      max-width: 100%;
      background-color: #FFFDF8;
      border: 0.8px solid #2C2C2C;
      position: relative;
      box-shadow: 
        0 2px 8px rgba(0, 0, 0, 0.08),
        0 8px 32px rgba(0, 0, 0, 0.06);
      overflow: hidden;
      touch-action: none;
      user-select: none;
      cursor: crosshair;
    }

    .letter-container::before {
      content: '';
      position: absolute;
      top: 40px;
      left: 40px;
      width: 180px;
      height: 180px;
      background: radial-gradient(
        ellipse at center,
        rgba(180, 140, 90, 0.12) 0%,
        rgba(180, 140, 90, 0.06) 40%,
        transparent 70%
      );
      pointer-events: none;
      z-index: 1;
    }

    .letter-container::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/><feColorMatrix type="matrix" values="0 0 0 0 0.6  0 0 0 0 0.5  0 0 0 0 0.35  0 0 0 0.04 0"/></filter><rect width="100%" height="100%" filter="url(%23noise)"/></svg>');
      pointer-events: none;
      opacity: 0.6;
      z-index: 1;
    }

    .letter-paint-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: paint(crease);
      z-index: 2;
      pointer-events: none;
    }

    .letter-content {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      padding: 80px 70px;
      z-index: 3;
      pointer-events: none;
    }

    .letter-content p {
      font-family: 'Cedarville Cursive', cursive;
      color: #3A3A3A;
      font-size: 18px;
      line-height: 1.8em;
      margin-bottom: 0.6em;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .reset-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      color: #999;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 8px 12px;
      transition: color 0.2s ease;
      z-index: 100;
    }

    .reset-btn:hover {
      color: #555;
    }

    @media (max-width: 768px) {
      .letter-container {
        width: 480px;
        height: 678px;
      }

      .letter-content {
        padding: 64px 56px;
      }

      .letter-content p {
        font-size: 14.4px;
      }

      .letter-container::before {
        top: 32px;
        left: 32px;
        width: 144px;
        height: 144px;
      }

      .reset-btn {
        font-size: 11.2px;
        bottom: 19.2px;
        right: 19.2px;
      }
    }

    @media (max-width: 520px) {
      .letter-container {
        width: 360px;
        height: 509px;
      }

      .letter-content {
        padding: 48px 42px;
      }

      .letter-content p {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="letter-container" id="letter">
    <div class="letter-content">
      <p>In the quiet hush of morning light,</p>
      <p>Folds of paper hold our memories tight,</p>
      <p>Each crease a story, soft and bright.</p>
    </div>
    <div class="letter-paint-layer" id="paintLayer"></div>
  </div>
  <button class="reset-btn" id="resetBtn">重置</button>

  <script>
    (async function initWorklet() {
      const paintLayer = document.getElementById('paintLayer');
      if ('paintWorklet' in CSS) {
        try {
          await CSS.paintWorklet.addModule('./src/crease-worklet.js');
        } catch (e) {
          console.warn('Paint worklet failed to load:', e);
        }
      }
    })();
  </script>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
