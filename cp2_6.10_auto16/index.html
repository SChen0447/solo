<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 材质对比实验室</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --accent: #e94560;
      --accent-hover: #ff5975;
      --text-primary: #ffffff;
      --text-secondary: #a0a0b8;
      --border: rgba(255, 255, 255, 0.1);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    #app {
      display: flex;
      width: 100%;
      height: 100vh;
      position: relative;
    }

    #scene-container {
      flex: 0 0 70%;
      position: relative;
      background: radial-gradient(ellipse at center, #1e1e3a 0%, #0f0f1a 100%);
    }

    #canvas-wrapper {
      width: 100%;
      height: 100%;
    }

    .scene-overlay {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 10;
      pointer-events: none;
    }

    .scene-title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .scene-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .fps-counter {
      position: absolute;
      bottom: 16px;
      left: 16px;
      font-size: 12px;
      color: var(--text-secondary);
      background: rgba(0, 0, 0, 0.4);
      padding: 4px 10px;
      border-radius: 4px;
      font-family: "SF Mono", Consolas, monospace;
      z-index: 10;
    }

    #controls-panel {
      flex: 0 0 30%;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform 0.3s ease;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      font-size: 16px;
      font-weight: 600;
    }

    .toggle-btn {
      display: none;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 20px;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .toggle-btn:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.05);
    }

    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }

    .panel-content::-webkit-scrollbar {
      width: 6px;
    }

    .panel-content::-webkit-scrollbar-track {
      background: transparent;
    }

    .panel-content::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
    }

    .section {
      margin-bottom: 28px;
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-secondary);
      margin-bottom: 14px;
    }

    .material-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 6px;
    }

    .material-thumb {
      position: relative;
      aspect-ratio: 1;
      border-radius: 10px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.3s ease;
      overflow: hidden;
      opacity: 0;
      animation: fadeIn 0.3s ease forwards;
    }

    .material-thumb:hover {
      transform: scale(1.05);
      border-color: var(--accent);
    }

    .material-thumb.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.2);
    }

    .material-thumb-preview {
      width: 100%;
      height: 100%;
      border-radius: 8px;
    }

    .material-thumb-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 6px 8px;
      font-size: 11px;
      text-align: center;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .control-group {
      margin-bottom: 18px;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .control-value {
      font-family: "SF Mono", Consolas, monospace;
      font-size: 12px;
      color: var(--accent);
      background: rgba(233, 69, 96, 0.1);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .slider-wrapper {
      position: relative;
      transition: transform 0.2s ease;
    }

    .slider-wrapper:hover {
      transform: scale(1.05);
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.1);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(233, 69, 96, 0.4);
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      background: var(--accent-hover);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(233, 69, 96, 0.4);
    }

    input[type="range"]::-moz-range-thumb:hover {
      transform: scale(1.2);
      background: var(--accent-hover);
    }

    .color-picker-wrapper {
      position: relative;
      transition: transform 0.2s ease;
    }

    .color-picker-wrapper:hover {
      transform: scale(1.05);
    }

    input[type="color"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 36px;
      border: none;
      border-radius: 8px;
      background: transparent;
      cursor: pointer;
      padding: 0;
    }

    input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    input[type="color"]::-webkit-color-swatch {
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
    }

    .lighting-buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .lighting-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .lighting-btn:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(233, 69, 96, 0.4);
      transform: scale(1.05);
    }

    .lighting-btn.active {
      background: rgba(233, 69, 96, 0.15);
      border-color: var(--accent);
    }

    .lighting-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .lighting-info {
      display: flex;
      flex-direction: column;
    }

    .lighting-name {
      font-weight: 500;
    }

    .lighting-desc {
      font-size: 11px;
      color: var(--text-secondary);
    }

    @media (max-width: 768px) {
      #app {
        flex-direction: column;
      }

      #scene-container {
        flex: 1;
        width: 100%;
      }

      #controls-panel {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        height: 60vh;
        max-height: 60vh;
        border-left: none;
        border-top: 1px solid var(--border);
        border-radius: 20px 20px 0 0;
        transform: translateY(calc(100% - 52px));
        z-index: 100;
        box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.4);
      }

      #controls-panel.open {
        transform: translateY(0);
      }

      .toggle-btn {
        display: block;
      }

      .material-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="scene-container">
      <div class="scene-overlay">
        <div class="scene-title">材质对比实验室</div>
        <div class="scene-subtitle">拖拽旋转 · 滚轮缩放 · 实时参数调校</div>
      </div>
      <div id="canvas-wrapper"></div>
      <div class="fps-counter" id="fps">FPS: --</div>
    </div>
    <aside id="controls-panel">
      <div class="panel-header">
        <span class="panel-title">参数控制面板</span>
        <button class="toggle-btn" id="toggle-panel">☰</button>
      </div>
      <div class="panel-content" id="panel-content"></div>
    </aside>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
