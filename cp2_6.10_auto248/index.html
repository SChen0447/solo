<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星际矿机</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b0f2a;
      font-family: 'Courier New', monospace;
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }
    #game-title {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffffff;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 4px;
      text-shadow: 0 0 8px rgba(0, 255, 255, 0.6), 0 0 16px rgba(0, 255, 255, 0.3);
      pointer-events: none;
      z-index: 10;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>
  <div id="app">
    <h1 id="game-title">星 际 矿 机</h1>
    <canvas id="game-canvas"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
