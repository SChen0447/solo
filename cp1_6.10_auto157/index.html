<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>磁力迷宫</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: 'Courier New', Consolas, monospace;
      color: #e0e0e0;
    }
    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
    }
    #game-container {
      position: relative;
      width: 450px;
      height: 450px;
      border: 4px solid #6a4c93;
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(106, 76, 147, 0.5),
                  inset 0 0 20px rgba(0, 0, 0, 0.5);
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: default;
    }
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
    }
    #timer {
      position: absolute;
      top: 12px;
      left: 16px;
      font-size: 18px;
      font-weight: bold;
      color: #ffd700;
      text-shadow: 0 0 8px rgba(255, 215, 0, 0.6);
      letter-spacing: 2px;
    }
    #steps {
      position: absolute;
      top: 12px;
      right: 16px;
      font-size: 18px;
      font-weight: bold;
      color: #7fff7f;
      text-shadow: 0 0 8px rgba(127, 255, 127, 0.6);
      letter-spacing: 1px;
    }
    #controls {
      position: absolute;
      bottom: -56px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: auto;
    }
    #replay-btn {
      padding: 10px 24px;
      font-family: inherit;
      font-size: 14px;
      font-weight: bold;
      color: #e0e0e0;
      background: linear-gradient(135deg, #6a4c93, #4a3470);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(106, 76, 147, 0.4);
    }
    #replay-btn:hover {
      background: linear-gradient(135deg, #7d5da8, #5a3f85);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(106, 76, 147, 0.6);
    }
    #replay-btn:active {
      transform: translateY(0);
    }
    #level-select {
      padding: 10px 16px;
      font-family: inherit;
      font-size: 14px;
      font-weight: bold;
      color: #e0e0e0;
      background: linear-gradient(135deg, #6a4c93, #4a3470);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      outline: none;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(106, 76, 147, 0.4);
    }
    #level-select:hover {
      background: linear-gradient(135deg, #7d5da8, #5a3f85);
      box-shadow: 0 6px 16px rgba(106, 76, 147, 0.6);
    }
    #level-select option {
      background: #2d2d44;
      color: #e0e0e0;
    }
    #title {
      position: absolute;
      top: -48px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      font-weight: bold;
      color: #6a4c93;
      text-shadow: 0 0 15px rgba(106, 76, 147, 0.8);
      letter-spacing: 4px;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="game-container">
      <div id="title">磁 力 迷 宫</div>
      <canvas id="game-canvas" width="450" height="450"></canvas>
      <div id="hud">
        <div id="timer">00:00</div>
        <div id="steps">步数: 0</div>
      </div>
      <div id="controls">
        <button id="replay-btn">↻ 重玩</button>
        <select id="level-select">
          <option value="0">关卡 1</option>
          <option value="1">关卡 2</option>
          <option value="2">关卡 3</option>
        </select>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
