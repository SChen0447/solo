<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>光涡·混沌织机</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      background: radial-gradient(ellipse at center, #0d0f1a 0%, #0a0a0a 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #title {
      position: absolute;
      top: 20px;
      right: 30px;
      color: rgba(200, 180, 255, 0.85);
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 4px;
      text-shadow: 0 0 20px rgba(140, 100, 255, 0.5);
      z-index: 10;
      pointer-events: none;
    }
    #fps {
      position: absolute;
      bottom: 20px;
      left: 30px;
      color: rgba(180, 200, 255, 0.6);
      font-size: 12px;
      font-family: monospace;
      z-index: 10;
      pointer-events: none;
    }
    #hint {
      position: absolute;
      bottom: 20px;
      right: 30px;
      color: rgba(180, 200, 255, 0.5);
      font-size: 11px;
      line-height: 1.8;
      z-index: 10;
      pointer-events: none;
      text-align: right;
    }
    .dg.ac {
      top: 20px !important;
      left: 20px !important;
      right: auto !important;
    }
    .dg.main {
      width: 280px !important;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      background: rgba(10, 10, 20, 0.75) !important;
      border: 1px solid rgba(200, 200, 255, 0.15);
      border-radius: 8px;
      overflow: hidden;
    }
    .dg.main .close-button {
      background: rgba(60, 50, 100, 0.5) !important;
    }
    .dg li:not(.folder) {
      background: transparent !important;
      border-bottom: 1px solid rgba(200, 200, 255, 0.06) !important;
    }
    .dg li.title {
      background: rgba(80, 60, 140, 0.35) !important;
    }
    .dg .c select,
    .dg .c input[type=text] {
      background: rgba(30, 25, 50, 0.7) !important;
      color: #c8c8ff !important;
      border: 1px solid rgba(200, 200, 255, 0.15);
    }
    .dg .slider {
      background: rgba(60, 50, 100, 0.4) !important;
    }
    .dg .slider-fg {
      background: linear-gradient(90deg, #8b5cf6, #f97316) !important;
    }
    .dg .property-name {
      color: rgba(200, 200, 255, 0.85) !important;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="title">光涡 · 混沌织机</div>
    <div id="fps">FPS: --</div>
    <div id="hint">
      鼠标左键拖拽：旋转视角<br/>
      鼠标滚轮：缩放<br/>
      空格键：自动环绕旋转
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
