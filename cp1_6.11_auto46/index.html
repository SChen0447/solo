<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>奇幻森林萤火虫</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
      cursor: crosshair;
    }

    .control-panel {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      align-items: center;
      padding: 16px 24px;
      background: rgba(0, 30, 15, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 12px;
      border: 1px solid rgba(0, 255, 100, 0.2);
      z-index: 100;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 90vw;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 140px;
    }

    .control-group label {
      color: rgba(200, 255, 200, 0.9);
      font-size: 12px;
      letter-spacing: 1px;
    }

    .control-group input[type="range"] {
      width: 140px;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(0, 50, 30, 0.8);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    .control-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #00ff64;
      box-shadow: 0 0 10px rgba(0, 255, 100, 0.6);
      cursor: pointer;
      transition: box-shadow 0.2s ease;
    }

    .control-group input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 20px rgba(0, 255, 100, 0.9);
    }

    .control-group input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #00ff64;
      box-shadow: 0 0 10px rgba(0, 255, 100, 0.6);
      cursor: pointer;
      border: none;
    }

    .value-display {
      color: #00ff64;
      font-size: 11px;
      font-family: monospace;
    }

    .btn {
      padding: 10px 20px;
      background: rgba(0, 60, 30, 0.8);
      color: #00ff64;
      border: 1px solid #00ff64;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      box-shadow: 0 0 8px rgba(0, 255, 100, 0.3);
    }

    .btn:hover {
      background: rgba(0, 100, 50, 0.9);
      box-shadow: 0 0 15px rgba(0, 255, 100, 0.6);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .fps-counter {
      color: rgba(200, 255, 200, 0.7);
      font-size: 11px;
      font-family: monospace;
      min-width: 50px;
      text-align: right;
    }

    @media (max-width: 768px) {
      .control-panel {
        top: 10px;
        gap: 12px;
        padding: 12px 16px;
      }

      .control-group {
        min-width: 100px;
      }

      .control-group input[type="range"] {
        width: 100px;
      }

      .btn {
        padding: 8px 14px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <canvas id="canvas"></canvas>
  </div>

  <div class="control-panel">
    <div class="control-group">
      <label>群体密度</label>
      <input type="range" id="density-slider" min="20" max="200" value="100">
      <span class="value-display" id="density-value">100</span>
    </div>
    <div class="control-group">
      <label>凝聚力强度</label>
      <input type="range" id="cohesion-slider" min="10" max="100" value="50">
      <span class="value-display" id="cohesion-value">0.5</span>
    </div>
    <div class="control-group">
      <label>尾迹长度</label>
      <input type="range" id="trail-slider" min="0" max="100" value="50">
      <span class="value-display" id="trail-value">50px</span>
    </div>
    <button class="btn" id="reset-btn">重置</button>
    <div class="fps-counter" id="fps-counter">-- FPS</div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
