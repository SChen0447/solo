<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文化符号演化沙盘</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #2a1f14 0%, #1a0f0a 100%);
      font-family: monospace;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    #canvas-container canvas {
      display: block;
      max-width: 1200px;
      width: 100%;
      aspect-ratio: 16 / 9;
      height: auto;
    }

    #control-panel {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      background: rgba(20, 20, 30, 0.8);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      backdrop-filter: blur(8px);
      z-index: 10;
    }

    .stats {
      display: flex;
      flex: 1;
      gap: 12px;
      align-items: center;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }

    .stat-label {
      color: #888;
      font-size: 11px;
      margin-bottom: 4px;
    }

    .stat-value {
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      font-family: monospace;
    }

    .divider {
      width: 1px;
      height: 36px;
      background: #444;
    }

    .buttons {
      display: flex;
      gap: 8px;
    }

    .ctrl-btn {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      border: none;
      background: #4a3a2a;
      color: #fff;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s ease;
      font-family: monospace;
    }

    .ctrl-btn:hover {
      background: #6a5a4a;
    }

    .ctrl-btn.speed-1x { background: #3a6b3a; }
    .ctrl-btn.speed-2x { background: #6b6b3a; }
    .ctrl-btn.speed-5x { background: #6b3a3a; }

    @media (max-width: 768px) {
      #control-panel {
        width: 90%;
        padding: 12px 16px;
      }

      .stat-label {
        font-size: 10px;
      }

      .stat-value {
        font-size: 14px;
      }

      .ctrl-btn {
        width: 36px;
        height: 36px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <div id="control-panel">
      <div class="stats">
        <div class="stat-item">
          <span class="stat-label">符号总数</span>
          <span class="stat-value" id="stat-count">0</span>
        </div>
        <div class="divider"></div>
        <div class="stat-item">
          <span class="stat-label">变异次数</span>
          <span class="stat-value" id="stat-mutate">0</span>
        </div>
        <div class="divider"></div>
        <div class="stat-item">
          <span class="stat-label">融合次数</span>
          <span class="stat-value" id="stat-fuse">0</span>
        </div>
        <div class="divider"></div>
        <div class="stat-item">
          <span class="stat-label">演化代数</span>
          <span class="stat-value" id="stat-gen">1</span>
        </div>
      </div>
      <div class="buttons">
        <button class="ctrl-btn" id="btn-reset" title="重置">⟳</button>
        <button class="ctrl-btn speed-1x" id="btn-speed" title="速度">1x</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/sketch.ts"></script>
</body>
</html>
