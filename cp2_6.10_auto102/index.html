<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Doc Previewer - 接口文档预览与测试</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f7fa;
      color: #2c3e50;
      min-height: 100vh;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
    }

    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
      background: #1e3a5f;
      color: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      z-index: 100;
    }

    .app-title {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .app-title svg {
      width: 24px;
      height: 24px;
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .upload-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border: 1.5px solid #74b9ff;
      background: transparent;
      color: #74b9ff;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .upload-btn:hover {
      background: #74b9ff;
      color: white;
    }

    .upload-btn svg {
      width: 16px;
      height: 16px;
    }

    .hamburger-btn {
      display: none;
      background: transparent;
      border: none;
      color: white;
      cursor: pointer;
      padding: 8px;
      transition: transform 0.2s ease;
    }

    .hamburger-btn:hover {
      transform: scale(1.1);
    }

    .hamburger-btn svg {
      width: 24px;
      height: 24px;
    }

    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .sidebar {
      width: 280px;
      min-width: 280px;
      background: #1e3a5f;
      color: white;
      overflow-y: auto;
      overflow-x: hidden;
      transition: transform 0.2s linear;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.7);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tree-container {
      flex: 1;
      padding: 8px 0;
    }

    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      background: #f5f7fa;
    }

    .content-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #95a5a6;
      text-align: center;
    }

    .content-empty svg {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      opacity: 0.5;
    }

    .content-empty p {
      font-size: 16px;
    }

    .history-bar {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: white;
      border-top: 1px solid #e1e8ed;
      min-height: 64px;
      align-items: center;
      overflow-x: auto;
    }

    .history-label {
      font-size: 12px;
      color: #7f8c8d;
      margin-right: 8px;
      white-space: nowrap;
    }

    .history-card {
      min-width: 80px;
      height: 40px;
      padding: 4px 8px;
      border: 1px solid #dfe6e9;
      border-radius: 4px;
      background: white;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: all 0.2s ease;
      overflow: hidden;
    }

    .history-card:hover {
      border-color: #74b9ff;
      background: #f8fbff;
    }

    .history-card.active {
      border: 2px solid #3498db;
      background: #eaf4fc;
    }

    .history-card-name {
      font-size: 11px;
      font-weight: 600;
      color: #2c3e50;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-card-time {
      font-size: 9px;
      color: #95a5a6;
      white-space: nowrap;
    }

    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.44);
      z-index: 999;
    }

    .overlay.active {
      display: block;
    }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 1001;
        transform: translateX(-100%);
        box-shadow: 2px 0 12px rgba(0, 0, 0, 0.15);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .hamburger-btn {
        display: block;
      }

      .content-area {
        padding: 16px;
      }

      .app-header {
        padding: 12px 16px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div style="display: flex; align-items: center; gap: 12px;">
        <button class="hamburger-btn" id="hamburgerBtn" title="菜单">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="app-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          API Doc Previewer
        </div>
      </div>
      <div class="header-actions">
        <button class="upload-btn" id="uploadBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          上传文档
        </button>
        <input type="file" id="fileInput" accept=".yaml,.yml,.json" style="display: none;" />
      </div>
    </header>

    <div class="main-container">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">API 端点列表</div>
        <div class="tree-container" id="treeContainer">
          <div style="padding: 16px; text-align: center; color: rgba(255,255,255,0.5); font-size: 13px;">
            请上传 OpenAPI/Swagger 文档
          </div>
        </div>
      </aside>

      <div class="overlay" id="overlay"></div>

      <main class="content-area" id="contentArea">
        <div class="content-empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/>
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          <p>从左侧选择一个 API 端点查看详情</p>
          <p style="font-size: 13px; margin-top: 8px;">或点击右上角"上传文档"按钮导入 OpenAPI/Swagger 文档</p>
        </div>
      </main>
    </div>

    <div class="history-bar" id="historyBar">
      <span class="history-label">文档历史:</span>
      <div id="historyCards" style="display: flex; gap: 8px;"></div>
    </div>
  </div>

  <div id="modalRoot"></div>

  <script type="module" src="/src/app.ts"></script>
</body>
</html>
