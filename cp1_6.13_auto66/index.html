<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>符文书架 - Rune Bookshelf</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a0f08;
      font-family: 'Georgia', serif;
    }

    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse at center, rgba(60, 40, 20, 0.4) 0%, rgba(10, 5, 2, 1) 100%),
        repeating-linear-gradient(
          90deg,
          #1a0f08 0px,
          #2a1a0e 2px,
          #1a0f08 4px
        );
    }

    #game-canvas {
      display: block;
      cursor: default;
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0502;
      z-index: 100;
      animation: fadeOut 1.5s ease-out 1s forwards;
    }

    .loading-book {
      width: 300px;
      height: 400px;
      filter: blur(8px);
      opacity: 0.3;
      animation: bookReveal 1.5s ease-out forwards;
    }

    .loading-book svg {
      width: 100%;
      height: 100%;
    }

    @keyframes bookReveal {
      0% {
        filter: blur(12px);
        opacity: 0.2;
        transform: scale(0.9);
      }
      100% {
        filter: blur(0px);
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes fadeOut {
      0% {
        opacity: 1;
        pointer-events: all;
      }
      100% {
        opacity: 0;
        pointer-events: none;
      }
    }
  </style>
</head>
<body>
  <div class="loading-overlay">
    <div class="loading-book">
      <svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#3d2817" />
            <stop offset="50%" style="stop-color:#5a3a22" />
            <stop offset="100%" style="stop-color:#3d2817" />
          </linearGradient>
        </defs>
        <path d="M20 20 Q150 10 280 20 L280 380 Q150 390 20 380 Z" fill="url(#bookGrad)" stroke="#8b6914" stroke-width="3"/>
        <line x1="150" y1="15" x2="150" y2="385" stroke="#8b6914" stroke-width="2"/>
        <path d="M30 25 Q150 18 270 25" fill="none" stroke="#c9a227" stroke-width="1"/>
        <path d="M30 375 Q150 382 270 375" fill="none" stroke="#c9a227" stroke-width="1"/>
        <circle cx="150" cy="200" r="60" fill="none" stroke="#c9a227" stroke-width="2" opacity="0.6"/>
        <circle cx="150" cy="200" r="40" fill="none" stroke="#c9a227" stroke-width="1" opacity="0.4"/>
      </svg>
    </div>
  </div>

  <div id="game-container">
    <canvas id="game-canvas"></canvas>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
