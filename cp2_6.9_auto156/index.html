<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>街机空中格斗</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0B0B2B;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #game-canvas {
      display: block;
      background: linear-gradient(180deg, #0B0B2B 0%, #1A1A4A 100%);
      image-rendering: pixelated;
    }
    #hud {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 180px;
      padding: 12px;
      background: rgba(10, 10, 30, 0.6);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 10px;
      color: white;
      font-size: 14px;
      pointer-events: none;
      user-select: none;
    }
    #hud .hud-row {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
    }
    #hud .hud-row:last-child {
      margin-bottom: 0;
    }
    #hud .hud-label {
      flex: 1;
    }
    #hud .hud-value {
      font-weight: bold;
    }
    #hud .hearts {
      color: #FF4444;
      letter-spacing: 2px;
    }
    #hud .score {
      font-size: 20px;
    }
    #hud .timer {
      color: #FFD700;
      font-weight: bold;
    }
    #game-over {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 10;
    }
    #game-over.visible {
      display: flex;
    }
    #game-over h1 {
      color: white;
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 20px;
    }
    #game-over .final-score {
      color: #FFD700;
      font-size: 24px;
      margin-bottom: 30px;
    }
    #restart-btn {
      padding: 12px 32px;
      font-size: 20px;
      color: white;
      background: #FF6B6B;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    #restart-btn:hover {
      background: #FF4757;
    }
    #start-tip {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 20px;
      text-align: center;
      pointer-events: none;
      user-select: none;
      opacity: 0;
      transition: opacity 0.5s ease;
      z-index: 5;
    }
    #start-tip.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="hud">
      <div class="hud-row">
        <span class="hud-label">生命值</span>
        <span class="hud-value hearts" id="hud-hearts">♥♥♥♥♥</span>
      </div>
      <div class="hud-row">
        <span class="hud-label">分数</span>
        <span class="hud-value score" id="hud-score">0</span>
      </div>
      <div class="hud-row">
        <span class="hud-label">武器</span>
        <span class="hud-value" id="hud-weapon">普通</span>
      </div>
      <div class="hud-row" id="hud-shield-row" style="display:none;">
        <span class="hud-label">护盾</span>
        <span class="hud-value timer" id="hud-shield">3.0s</span>
      </div>
      <div class="hud-row" id="hud-speed-row" style="display:none;">
        <span class="hud-label">加速</span>
        <span class="hud-value timer" id="hud-speed">4.0s</span>
      </div>
      <div class="hud-row" id="hud-weapon-up-row" style="display:none;">
        <span class="hud-label">双发</span>
        <span class="hud-value timer" id="hud-weapon-up">5.0s</span>
      </div>
    </div>
    <div id="start-tip">
      方向键移动 · 空格键射击
    </div>
    <div id="game-over">
      <h1>游戏结束</h1>
      <div class="final-score">最终分数：<span id="final-score">0</span></div>
      <button id="restart-btn">点击重新开始</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
