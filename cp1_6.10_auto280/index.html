<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>霓虹签章 - 电子签名与文档水印管理</title>
  <style>
    :root {
      --bg-primary: #1a1a2e;
      --bg-panel: #16213e;
      --bg-paper: #f5f0e1;
      --neon-start: #0f3460;
      --neon-end: #e94560;
      --text-primary: #ffffff;
      --text-secondary: #a0aec0;
      --text-muted: #718096;
      --border-glow: rgba(233, 69, 96, 0.5);
      --success: #48bb78;
      --warning: #ed8936;
      --danger: #f56565;
      --canvas-max-w: 800px;
      --canvas-max-h: 1200px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* ========== 顶部工具栏 ========== */
    .toolbar {
      height: 60px;
      min-height: 60px;
      background: linear-gradient(135deg, var(--neon-start) 0%, var(--neon-end) 100%);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 8px;
      box-shadow: 0 2px 20px rgba(233, 69, 96, 0.3);
      position: relative;
      z-index: 100;
    }

    .toolbar-logo {
      font-size: 20px;
      font-weight: 700;
      margin-right: 20px;
      background: linear-gradient(90deg, #fff, #ffd6e0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
      white-space: nowrap;
    }

    .toolbar-divider {
      width: 1px;
      height: 30px;
      background: rgba(255, 255, 255, 0.2);
      margin: 0 10px;
    }

    .toolbar-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: var(--text-primary);
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .toolbar-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.5);
      animation: neonPulse 1.5s ease-in-out infinite;
    }

    .toolbar-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      animation: none;
    }

    .toolbar-btn .icon {
      font-size: 16px;
    }

    .toolbar-spacer {
      flex: 1;
    }

    .hamburger-btn {
      display: none;
      background: rgba(255, 255, 255, 0.15);
      border: none;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 6px;
      font-size: 20px;
      cursor: pointer;
    }

    @keyframes neonPulse {
      0%, 100% {
        box-shadow: 0 0 5px rgba(233, 69, 96, 0.3), 0 0 10px rgba(233, 69, 96, 0.2);
      }
      50% {
        box-shadow: 0 0 15px rgba(233, 69, 96, 0.6), 0 0 25px rgba(233, 69, 96, 0.4);
      }
    }

    /* ========== 主内容区 ========== */
    .main-content {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    .canvas-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      overflow: auto;
      position: relative;
    }

    .canvas-container {
      position: relative;
      display: inline-block;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      border-radius: 4px;
      background: #fff;
    }

    #mainCanvas {
      display: block;
      border-radius: 4px;
      cursor: default;
      max-width: 100%;
      height: auto;
    }

    #mainCanvas.signature-mode {
      cursor: pointer;
    }

    /* ========== 上传区域 ========== */
    .upload-area {
      width: 100%;
      max-width: 600px;
      height: 300px;
      border: 3px dashed rgba(233, 69, 96, 0.4);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      background: var(--bg-panel);
    }

    .upload-area:hover,
    .upload-area.dragover {
      border-color: var(--neon-end);
      background: rgba(233, 69, 96, 0.05);
      box-shadow: 0 0 30px rgba(233, 69, 96, 0.2);
    }

    .upload-icon {
      font-size: 64px;
      opacity: 0.7;
    }

    .upload-text {
      font-size: 18px;
      color: var(--text-secondary);
    }

    .upload-hint {
      font-size: 13px;
      color: var(--text-muted);
    }

    #fileInput {
      display: none;
    }

    /* ========== 签名绘制面板 ========== */
    .signature-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }

    .signature-modal.active {
      display: flex;
    }

    .signature-panel {
      background: var(--bg-panel);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      max-width: 90vw;
    }

    .signature-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .signature-panel-title {
      font-size: 20px;
      font-weight: 600;
    }

    .signature-canvas-wrapper {
      background: var(--bg-paper);
      border-radius: 8px;
      padding: 10px;
      position: relative;
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    #signatureCanvas {
      display: block;
      border-radius: 4px;
      cursor: crosshair;
      touch-action: none;
    }

    .signature-panel-actions {
      display: flex;
      justify-content: space-between;
      margin-top: 16px;
      gap: 12px;
    }

    .signature-panel-left,
    .signature-panel-right {
      display: flex;
      gap: 8px;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--neon-start), var(--neon-end));
      color: white;
    }

    .btn-primary:hover {
      animation: neonPulse 1.5s ease-in-out infinite;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      animation: none;
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    /* ========== 水印侧边栏 ========== */
    .watermark-drawer {
      position: fixed;
      top: 60px;
      right: 0;
      width: 360px;
      height: calc(100vh - 60px);
      background: var(--bg-panel);
      transform: translateX(100%);
      transition: transform 0.3s ease;
      z-index: 500;
      box-shadow: -5px 0 20px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
    }

    .watermark-drawer.active {
      transform: translateX(0);
    }

    .drawer-header {
      padding: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .drawer-title {
      font-size: 18px;
      font-weight: 600;
    }

    .drawer-close {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 24px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }

    .drawer-close:hover {
      color: var(--text-primary);
    }

    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .form-input,
    .form-select {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus,
    .form-select:focus {
      border-color: var(--neon-end);
    }

    .form-range {
      width: 100%;
    }

    .range-value {
      display: inline-block;
      min-width: 40px;
      text-align: right;
      color: var(--neon-end);
      font-weight: 600;
      font-size: 13px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, var(--neon-start), var(--neon-end));
      color: white;
      border-color: transparent;
    }

    .mode-toggle {
      display: flex;
      gap: 8px;
    }

    .color-picker-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .color-picker {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: none;
      padding: 0;
    }

    .drawer-footer {
      padding: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      gap: 8px;
    }

    .drawer-footer .btn {
      flex: 1;
    }

    .preview-thumbnail {
      width: 100%;
      height: 120px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      margin-top: 12px;
      overflow: hidden;
    }

    /* ========== 全屏预览 ========== */
    .fullscreen-preview {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .fullscreen-preview.active {
      display: flex;
    }

    .preview-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
      z-index: 2001;
    }

    .preview-close:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .preview-controls {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px 16px;
      border-radius: 30px;
      backdrop-filter: blur(10px);
    }

    .preview-controls button {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      border: none;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    .preview-controls button:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    .preview-scale-label {
      display: flex;
      align-items: center;
      padding: 0 10px;
      color: white;
      font-size: 14px;
      min-width: 60px;
      justify-content: center;
    }

    #previewCanvas {
      max-width: 90vw;
      max-height: 85vh;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      transition: transform 0.2s ease;
    }

    /* ========== 选中签名的控制框 ========== */
    .selection-handle {
      position: absolute;
      width: 10px;
      height: 10px;
      background: white;
      border: 2px solid var(--neon-end);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: auto;
    }

    .selection-handle.nw { top: 0; left: 0; cursor: nw-resize; }
    .selection-handle.ne { top: 0; right: 0; cursor: ne-resize; }
    .selection-handle.sw { bottom: 0; left: 0; cursor: sw-resize; }
    .selection-handle.se { bottom: 0; right: 0; cursor: se-resize; }
    .selection-handle.rotate {
      top: -25px;
      left: 50%;
      background: var(--neon-end);
      cursor: grab;
    }

    .signature-controls {
      position: fixed;
      background: var(--bg-panel);
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      z-index: 400;
      display: none;
      gap: 8px;
      align-items: center;
    }

    .signature-controls.active {
      display: flex;
    }

    .signature-controls label {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .signature-controls input[type="range"] {
      width: 80px;
    }

    /* ========== 提示消息 ========== */
    .toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      padding: 12px 24px;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      z-index: 3000;
      transition: transform 0.3s ease;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .toast.success { background: var(--success); }
    .toast.warning { background: var(--warning); }
    .toast.error { background: var(--danger); }
    .toast.info { background: linear-gradient(135deg, var(--neon-start), var(--neon-end)); }

    /* ========== 响应式 ========== */
    @media (max-width: 768px) {
      .toolbar-logo {
        font-size: 16px;
        margin-right: 10px;
      }

      .toolbar-btn {
        display: none;
      }

      .hamburger-btn {
        display: block;
      }

      .toolbar-menu-mobile {
        position: absolute;
        top: 60px;
        left: 0;
        right: 0;
        background: var(--bg-panel);
        flex-direction: column;
        padding: 10px;
        gap: 6px;
        display: none;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      }

      .toolbar-menu-mobile.active {
        display: flex;
      }

      .toolbar-menu-mobile .toolbar-btn {
        display: flex;
        justify-content: flex-start;
        width: 100%;
      }

      .watermark-drawer {
        width: 100%;
        top: 0;
        height: 100%;
      }

      .canvas-wrapper {
        padding: 15px;
      }

      .upload-area {
        height: 240px;
      }
    }

    /* 滚动条样式 */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <!-- 顶部工具栏 -->
  <header class="toolbar">
    <div class="toolbar-logo">✦ 霓虹签章</div>
    <button class="hamburger-btn" id="hamburgerBtn">☰</button>
    <div class="toolbar-divider"></div>
    
    <div id="toolbarMenu">
      <button class="toolbar-btn" id="uploadBtn">
        <span class="icon">📁</span> 上传文件
      </button>
      <button class="toolbar-btn" id="signatureBtn" disabled>
        <span class="icon">✍️</span> 手写签名
      </button>
      <button class="toolbar-btn" id="watermarkBtn" disabled>
        <span class="icon">💧</span> 水印设置
      </button>
      <button class="toolbar-btn" id="previewBtn" disabled>
        <span class="icon">👁️</span> 全屏预览
      </button>
      <button class="toolbar-btn" id="exportBtn" disabled>
        <span class="icon">⬇️</span> 导出PNG
      </button>
    </div>

    <div class="toolbar-menu-mobile" id="mobileMenu">
      <button class="toolbar-btn" id="uploadBtnMobile">
        <span class="icon">📁</span> 上传文件
      </button>
      <button class="toolbar-btn" id="signatureBtnMobile" disabled>
        <span class="icon">✍️</span> 手写签名
      </button>
      <button class="toolbar-btn" id="watermarkBtnMobile" disabled>
        <span class="icon">💧</span> 水印设置
      </button>
      <button class="toolbar-btn" id="previewBtnMobile" disabled>
        <span class="icon">👁️</span> 全屏预览
      </button>
      <button class="toolbar-btn" id="exportBtnMobile" disabled>
        <span class="icon">⬇️</span> 导出PNG
      </button>
    </div>
  </header>

  <!-- 主内容区 -->
  <main class="main-content">
    <div class="canvas-wrapper" id="canvasWrapper">
      <!-- 上传区域（初始显示） -->
      <div class="upload-area" id="uploadArea">
        <div class="upload-icon">📄</div>
        <div class="upload-text">点击或拖拽文件到此处上传</div>
        <div class="upload-hint">支持 PDF、PNG、JPG 格式</div>
      </div>

      <!-- 画布容器（上传后显示） -->
      <div class="canvas-container" id="canvasContainer" style="display:none;">
        <canvas id="mainCanvas" width="800" height="600"></canvas>
      </div>
    </div>
  </main>

  <!-- 签名控制面板 -->
  <div class="signature-controls" id="signatureControls">
    <label>缩放:</label>
    <input type="range" id="scaleRange" min="0.5" max="3" step="0.1" value="1">
    <span class="range-value" id="scaleValue">1.0x</span>
    <label>旋转:</label>
    <input type="range" id="rotationRange" min="-45" max="45" step="1" value="0">
    <span class="range-value" id="rotationValue">0°</span>
    <button class="btn btn-danger" id="deleteSignatureBtn" style="padding: 6px 12px; font-size: 12px;">删除</button>
  </div>

  <!-- 签名绘制模态框 -->
  <div class="signature-modal" id="signatureModal">
    <div class="signature-panel">
      <div class="signature-panel-header">
        <div class="signature-panel-title">✍️ 绘制签名</div>
        <button class="drawer-close" id="closeSignatureModal">×</button>
      </div>
      <div class="signature-canvas-wrapper">
        <canvas id="signatureCanvas" width="600" height="250"></canvas>
      </div>
      <div class="signature-panel-actions">
        <div class="signature-panel-left">
          <button class="btn btn-secondary" id="undoSignatureBtn">↩ 撤销</button>
          <button class="btn btn-secondary" id="clearSignatureBtn">🗑 清空</button>
        </div>
        <div class="signature-panel-right">
          <button class="btn btn-secondary" id="cancelSignatureBtn">取消</button>
          <button class="btn btn-primary" id="confirmSignatureBtn" disabled>确认添加</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 水印设置侧边栏 -->
  <aside class="watermark-drawer" id="watermarkDrawer">
    <div class="drawer-header">
      <div class="drawer-title">💧 水印设置</div>
      <button class="drawer-close" id="closeWatermarkDrawer">×</button>
    </div>
    <div class="drawer-body">
      <div class="tabs">
        <button class="tab-btn active" data-tab="text">文字水印</button>
        <button class="tab-btn" data-tab="image">图片水印</button>
      </div>

      <!-- 文字水印 -->
      <div id="textWatermarkPanel">
        <div class="form-group">
          <label class="form-label">水印文字</label>
          <input type="text" class="form-input" id="watermarkText" placeholder="请输入水印文字" value="霓虹签章">
        </div>
        <div class="form-group">
          <label class="form-label">字体大小: <span class="range-value" id="fontSizeValue">24px</span></label>
          <input type="range" class="form-range" id="fontSizeRange" min="12" max="72" value="24">
        </div>
        <div class="form-group">
          <label class="form-label">文字颜色</label>
          <div class="color-picker-wrapper">
            <input type="color" class="color-picker" id="watermarkColor" value="#e94560">
            <span id="colorValue">#e94560</span>
          </div>
        </div>
      </div>

      <!-- 图片水印 -->
      <div id="imageWatermarkPanel" style="display:none;">
        <div class="form-group">
          <label class="form-label">上传水印图片 (PNG)</label>
          <input type="file" class="form-input" id="watermarkImageInput" accept="image/png">
          <div class="preview-thumbnail" id="imagePreview"></div>
        </div>
        <div class="form-group">
          <label class="form-label">图片宽度: <span class="range-value" id="imageWidthValue">100px</span></label>
          <input type="range" class="form-range" id="imageWidthRange" min="50" max="200" value="100">
        </div>
      </div>

      <!-- 通用设置 -->
      <div class="form-group">
        <label class="form-label">显示模式</label>
        <div class="mode-toggle">
          <button class="tab-btn active" id="tileModeBtn" data-mode="tile">密铺模式</button>
          <button class="tab-btn" id="singleModeBtn" data-mode="single">单例模式</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">透明度: <span class="range-value" id="opacityValue">0.3</span></label>
        <input type="range" class="form-range" id="opacityRange" min="0.1" max="1.0" step="0.05" value="0.3">
      </div>

      <div class="form-group">
        <label class="form-label">旋转角度: <span class="range-value" id="wmRotationValue">-30°</span></label>
        <input type="range" class="form-range" id="wmRotationRange" min="-90" max="90" value="-30">
      </div>

      <div class="form-group" id="densityGroup">
        <label class="form-label">密铺密度: <span class="range-value" id="densityValue">2</span></label>
        <input type="range" class="form-range" id="densityRange" min="1" max="5" value="2">
      </div>
    </div>
    <div class="drawer-footer">
      <button class="btn btn-secondary" id="removeWatermarkBtn">移除水印</button>
      <button class="btn btn-primary" id="applyWatermarkBtn">应用水印</button>
    </div>
  </aside>

  <!-- 全屏预览 -->
  <div class="fullscreen-preview" id="fullscreenPreview">
    <button class="preview-close" id="closePreviewBtn">×</button>
    <canvas id="previewCanvas"></canvas>
    <div class="preview-controls">
      <button id="zoomOutBtn">−</button>
      <span class="preview-scale-label" id="scaleLabel">100%</span>
      <button id="zoomInBtn">+</button>
      <button id="zoomResetBtn">⟲</button>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div class="toast" id="toast"></div>

  <!-- 隐藏的文件输入 -->
  <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg">

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
