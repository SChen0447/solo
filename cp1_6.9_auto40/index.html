<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>符文精灵图书馆</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000510;
      font-family: 'Georgia', serif;
    }
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #title {
      position: fixed;
      top: 24px;
      left: 28px;
      color: #ffaa55;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 0 0 10px #ffaa55, 0 0 20px #ff8800, 0 0 30px #ff6600;
      letter-spacing: 3px;
      z-index: 10;
      user-select: none;
    }
    #counter {
      position: fixed;
      bottom: 24px;
      right: 28px;
      color: #ffffff;
      font-size: 18px;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.5), 0 0 15px rgba(170, 180, 255, 0.3);
      z-index: 10;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="title">遗忘的云端图书馆</div>
  <div id="counter">精灵苏醒: 0/20</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
