<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>魔法符文连线</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #0D0221 0%, #1A0A3E 100%);
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      user-select: none;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-canvas {
      display: block;
      max-width: 500px;
      width: 90vw;
      height: auto;
      aspect-ratio: 1 / 1;
      cursor: pointer;
    }

    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .mana-bar {
      position: absolute;
      top: 3vh;
      left: 3vw;
      display: flex;
      flex-direction: column;
      gap: 6px;
      pointer-events: none;
    }

    .mana-label {
      color: #FFD700;
      font-size: 14px;
      font-weight: bold;
      text-shadow: 0 0 8px rgba(255, 215, 0, 0.6);
      letter-spacing: 2px;
    }

    .mana-hearts {
      display: flex;
      gap: 8px;
    }

    .heart {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #FF6B9D 0%, #FF1744 100%);
      clip-path: polygon(50% 0%, 100% 35%, 80% 100%, 50% 75%, 20% 100%, 0% 35%);
      filter: drop-shadow(0 0 6px rgba(255, 23, 68, 0.8));
      transition: all 0.3s ease;
    }

    .heart.empty {
      background: linear-gradient(135deg, #3A3A3A 0%, #1A1A1A 100%);
      filter: none;
      opacity: 0.4;
    }

    .error-flash {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      box-shadow: inset 0 0 120px 40px rgba(255, 0, 0, 0.8);
      opacity: 0;
      pointer-events: none;
    }

    .error-flash.active {
      animation: errorFlash 0.3s ease-out;
    }

    @keyframes errorFlash {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    .victory-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }

    .victory-screen.show {
      opacity: 1;
      pointer-events: auto;
    }

    .victory-title {
      font-size: clamp(28px, 6vw, 52px);
      font-weight: bold;
      background: linear-gradient(90deg, #FFD700, #FF6B9D, #00E5FF, #FFD700);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientFlow 3s linear infinite, titleGlow 2s ease-in-out infinite;
      letter-spacing: 6px;
      margin-bottom: 20px;
    }

    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }

    @keyframes titleGlow {
      0%, 100% { filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.6)); }
      50% { filter: drop-shadow(0 0 30px rgba(255, 215, 0, 1)); }
    }

    .victory-stats {
      font-size: clamp(16px, 3vw, 24px);
      color: #E0E0E0;
      letter-spacing: 3px;
    }

    .victory-stats span {
      color: #FFD700;
      font-weight: bold;
    }

    .restart-btn {
      margin-top: 40px;
      padding: 14px 40px;
      font-size: 18px;
      font-weight: bold;
      color: #0D0221;
      background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
      border: none;
      border-radius: 30px;
      cursor: pointer;
      letter-spacing: 3px;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
      transition: all 0.3s ease;
      pointer-events: auto;
    }

    .restart-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 40px rgba(255, 215, 0, 0.8);
    }

    .rune-tooltip {
      position: absolute;
      padding: 6px 14px;
      background: rgba(0, 0, 0, 0.85);
      color: #FFFFFF;
      font-size: 13px;
      border-radius: 6px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      white-space: nowrap;
      z-index: 100;
      border: 1px solid rgba(255, 215, 0, 0.4);
    }

    .rune-tooltip.show {
      opacity: 1;
    }

    .game-over-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
      background: rgba(0, 0, 0, 0.6);
    }

    .game-over-screen.show {
      opacity: 1;
      pointer-events: auto;
    }

    .game-over-title {
      font-size: clamp(32px, 7vw, 56px);
      font-weight: bold;
      color: #FF1744;
      text-shadow: 0 0 20px rgba(255, 23, 68, 0.8);
      letter-spacing: 8px;
      margin-bottom: 20px;
    }

    .game-over-subtitle {
      font-size: clamp(14px, 2.5vw, 20px);
      color: #AAAAAA;
      letter-spacing: 2px;
      margin-bottom: 40px;
    }

    .step-counter {
      position: absolute;
      top: 3vh;
      right: 3vw;
      color: #FFD700;
      font-size: 16px;
      font-weight: bold;
      text-shadow: 0 0 8px rgba(255, 215, 0, 0.6);
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="ui-overlay">
      <div class="mana-bar">
        <div class="mana-label">魔力值</div>
        <div class="mana-hearts" id="mana-hearts"></div>
      </div>
      <div class="step-counter" id="step-counter">步数: 0</div>
      <div class="error-flash" id="error-flash"></div>
      <div class="rune-tooltip" id="rune-tooltip"></div>
      <div class="victory-screen" id="victory-screen">
        <div class="victory-title">元素契约完成</div>
        <div class="victory-stats">总步数: <span id="final-steps">0</span></div>
        <button class="restart-btn" id="restart-btn-victory">重新开始</button>
      </div>
      <div class="game-over-screen" id="game-over-screen">
        <div class="game-over-title">魔力耗尽</div>
        <div class="game-over-subtitle">符文契约失败，请重新尝试</div>
        <button class="restart-btn" id="restart-btn-over">重新开始</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
