<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三维风暴云微观结构模拟器</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Fira Code', monospace;
      background: linear-gradient(135deg, #0D0D1A 0%, #1A1A2E 100%);
      color: #E0E0E0;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #hud {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.6);
      padding: 16px 20px;
      border-radius: 6px;
      font-size: 14px;
      line-height: 1.8;
      min-width: 240px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 100;
      pointer-events: none;
    }

    #hud .hud-title {
      font-size: 15px;
      font-weight: 600;
      color: #87CEEB;
      margin-bottom: 10px;
      border-bottom: 1px solid rgba(135, 206, 235, 0.3);
      padding-bottom: 6px;
    }

    #hud .hud-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #hud .hud-label {
      color: #A0A0B0;
    }

    #hud .hud-value {
      color: #FFFFFF;
      font-weight: 500;
    }

    #hud .flow-mode {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 12px;
      margin-left: 4px;
    }

    #hud .flow-updraft {
      background: rgba(74, 144, 217, 0.3);
      color: #4A90D9;
    }

    #hud .flow-turbulence {
      background: rgba(255, 165, 0, 0.3);
      color: #FFA500;
    }

    #hud .flow-shear {
      background: rgba(147, 112, 219, 0.3);
      color: #9370DB;
    }

    #controls-hint {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.6);
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.8;
      z-index: 100;
      pointer-events: none;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    #controls-hint .hint-title {
      color: #87CEEB;
      font-weight: 600;
      margin-bottom: 6px;
    }

    #controls-hint kbd {
      display: inline-block;
      padding: 1px 6px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      margin: 0 2px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="hud">
      <div class="hud-title">⚡ 风暴云微观结构监控</div>
      <div class="hud-row">
        <span class="hud-label">当前高度:</span>
        <span class="hud-value" id="hud-height">0.00 u</span>
      </div>
      <div class="hud-row">
        <span class="hud-label">粒子总数:</span>
        <span class="hud-value" id="hud-particles">40,000</span>
      </div>
      <div class="hud-row">
        <span class="hud-label">帧率:</span>
        <span class="hud-value" id="hud-fps">60 FPS</span>
      </div>
      <div class="hud-row">
        <span class="hud-label">气流模式:</span>
        <span class="hud-value" id="hud-flow">
          <span class="flow-mode flow-updraft">上升</span>
          <span class="flow-mode flow-turbulence">湍流</span>
          <span class="flow-mode flow-shear">切变</span>
        </span>
      </div>
    </div>
    <div id="controls-hint">
      <div class="hint-title">操作说明</div>
      <div><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 移动视角</div>
      <div><kbd>Space</kbd> 上升 <kbd>Shift</kbd> 下降</div>
      <div><kbd>鼠标拖拽</kbd> 调整视角</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
