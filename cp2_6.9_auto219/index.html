<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D城市天际线生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #1A1A2E;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: #ffffff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #canvas-container canvas {
      display: block;
    }

    .toolbar {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 10px 24px;
      background: rgba(26, 26, 46, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(100, 100, 200, 0.2);
      border-radius: 12px;
      z-index: 100;
      transition: all 0.3s ease-in-out;
    }

    .toolbar:hover {
      box-shadow: 0 0 8px rgba(100, 100, 200, 0.4);
    }

    .toolbar-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
      letter-spacing: 0.5px;
    }

    .toolbar-label {
      color: rgba(255, 255, 255, 0.6);
    }

    .toolbar-value {
      color: #ffffff;
      font-weight: 600;
    }

    .preset-buttons {
      display: flex;
      gap: 8px;
    }

    .preset-btn {
      padding: 6px 14px;
      font-size: 11px;
      background: rgba(100, 100, 200, 0.15);
      border: 1px solid rgba(100, 100, 200, 0.3);
      border-radius: 6px;
      color: #ffffff;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
      letter-spacing: 0.5px;
    }

    .preset-btn:hover {
      background: rgba(100, 100, 200, 0.35);
      box-shadow: 0 0 8px rgba(100, 100, 200, 0.4);
    }

    .preset-btn.active {
      background: rgba(124, 124, 186, 0.5);
      border-color: #7C7CBA;
    }

    .mobile-drawer-toggle {
      display: none;
      position: fixed;
      bottom: 16px;
      right: 16px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(26, 26, 46, 0.85);
      backdrop-filter: blur(8px);
      border: 1px solid #3A3A5C;
      color: #ffffff;
      font-size: 20px;
      cursor: pointer;
      z-index: 101;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease-in-out;
    }

    .mobile-drawer-toggle:hover {
      box-shadow: 0 0 8px rgba(100, 100, 200, 0.4);
    }

    .dg.ac {
      position: fixed !important;
      right: 16px !important;
      bottom: 16px !important;
      top: auto !important;
      left: auto !important;
      z-index: 100 !important;
      width: 260px;
    }

    .dg.ac .dg.main {
      background: rgba(20, 20, 40, 0.9) !important;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid #3A3A5C;
      border-radius: 10px;
      overflow: hidden;
      transition: all 0.3s ease-in-out;
    }

    .dg.ac .dg.main:hover {
      box-shadow: 0 0 8px rgba(100, 100, 200, 0.4);
    }

    .dg .title {
      background: rgba(60, 60, 100, 0.6) !important;
      color: #ffffff !important;
      font-weight: 600 !important;
      letter-spacing: 0.5px;
    }

    .dg .c {
      background: transparent !important;
    }

    .dg .slider {
      background: #2E2E4E !important;
    }

    .dg .slider-fg {
      background: #7C7CBA !important;
    }

    .dg .c input[type="text"] {
      background: rgba(40, 40, 70, 0.8) !important;
      color: #ffffff !important;
      border: 1px solid #3A3A5C !important;
      border-radius: 4px;
    }

    .dg li:not(.folder) {
      background: transparent !important;
      border-bottom: 1px solid rgba(60, 60, 100, 0.3) !important;
    }

    .dg li.title {
      background: rgba(50, 50, 85, 0.4) !important;
    }

    @media (max-width: 768px) {
      .toolbar {
        top: 8px;
        padding: 8px 16px;
        gap: 12px;
        flex-wrap: wrap;
        max-width: calc(100% - 16px);
      }

      .toolbar-item {
        font-size: 10px;
      }

      .preset-btn {
        padding: 5px 10px;
        font-size: 10px;
      }

      .mobile-drawer-toggle {
        display: flex;
      }

      .dg.ac {
        position: fixed !important;
        right: 0 !important;
        left: 0 !important;
        bottom: 0 !important;
        top: auto !important;
        width: 100% !important;
        transform: translateY(100%);
        transition: transform 0.3s ease-in-out;
      }

      .dg.ac.open {
        transform: translateY(0);
      }

      .dg.ac .dg.main {
        height: 150px;
        border-radius: 10px 10px 0 0;
        border: none;
        border-top: 1px solid #3A3A5C;
      }

      .dg.ac .dg.main ul {
        overflow-y: auto;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div class="toolbar">
      <div class="toolbar-item">
        <span class="toolbar-label">预设：</span>
        <span class="toolbar-value" id="preset-name">夜晚</span>
      </div>
      <div class="toolbar-item">
        <span class="toolbar-label">密度：</span>
        <span class="toolbar-value" id="param-density">60%</span>
      </div>
      <div class="toolbar-item">
        <span class="toolbar-label">最大高度：</span>
        <span class="toolbar-value" id="param-height">15</span>
      </div>
      <div class="toolbar-item">
        <span class="toolbar-label">聚程度：</span>
        <span class="toolbar-value" id="param-clustering">0.3</span>
      </div>
      <div class="preset-buttons">
        <button class="preset-btn" data-preset="dawn">清晨</button>
        <button class="preset-btn" data-preset="noon">正午</button>
        <button class="preset-btn" data-preset="dusk">黄昏</button>
        <button class="preset-btn active" data-preset="night">夜晚</button>
      </div>
    </div>

    <button class="mobile-drawer-toggle" id="drawer-toggle">⚙</button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
