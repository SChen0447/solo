<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>书香流转 - 二手书交换平台</title>
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100vh;
        background-color: #F9F6F0;
      }
      
      .loading-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #F9F6F0;
        z-index: 9999;
      }
      
      .book-loader {
        position: relative;
        width: 80px;
        height: 100px;
        perspective: 1000px;
      }
      
      .book-page {
        position: absolute;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #F5A623 0%, #FFB84D 100%);
        border-radius: 4px 12px 12px 4px;
        transform-origin: left center;
        animation: pageFlip 1.5s ease-in-out infinite;
        box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
      }
      
      .book-page::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        width: 8px;
        height: 100%;
        background: linear-gradient(90deg, #E6951E, #F5A623);
        border-radius: 4px 0 0 4px;
      }
      
      .book-page:nth-child(2) {
        animation-delay: 0.2s;
        opacity: 0.8;
      }
      
      .book-page:nth-child(3) {
        animation-delay: 0.4s;
        opacity: 0.6;
      }
      
      @keyframes pageFlip {
        0%, 100% {
          transform: rotateY(0deg);
        }
        50% {
          transform: rotateY(-30deg);
        }
      }
      
      .loading-text {
        margin-top: 24px;
        font-size: 18px;
        color: #333333;
        font-weight: 500;
        animation: fadeInOut 1.5s ease-in-out infinite;
      }
      
      @keyframes fadeInOut {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-container">
        <div class="book-loader">
          <div class="book-page"></div>
          <div class="book-page"></div>
          <div class="book-page"></div>
        </div>
        <div class="loading-text">书香流转中...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
