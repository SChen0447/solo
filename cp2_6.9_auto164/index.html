<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>记忆节拍 - Memory Beat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #0D1117;
      color: #E6EDF3;
      font-family: 'Inter', 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
    }

    #app {
      display: flex;
      width: 100%;
      height: 100%;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      gap: 32px;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #00BCD4, #3F51B5);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 14px;
      color: #8B949E;
      margin-top: -24px;
    }

    .disc-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      padding: 24px;
    }

    @media (max-width: 600px) {
      .disc-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
      }
    }

    .disc-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .disc {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      position: relative;
      transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
      box-shadow: 0 4px 16px #00000040;
    }

    .disc::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.2s ease-out;
    }

    .disc:hover {
      transform: scale(1.2);
    }

    .disc:hover::after {
      opacity: 1;
    }

    .disc.pressed {
      animation: press 0.15s ease-out;
    }

    @keyframes press {
      0% { transform: scale(1.2); }
      50% { transform: scale(0.85); }
      100% { transform: scale(1); }
    }

    .disc[data-color="E91E63"] {
      background: #E91E63;
    }
    .disc[data-color="E91E63"]::after {
      background: radial-gradient(circle, #E91E6380 0%, transparent 70%);
    }
    .disc[data-color="E91E63"]:hover {
      box-shadow: 0 0 32px #E91E6380, 0 4px 16px #00000040;
    }

    .disc[data-color="9C27B0"] {
      background: #9C27B0;
    }
    .disc[data-color="9C27B0"]::after {
      background: radial-gradient(circle, #9C27B080 0%, transparent 70%);
    }
    .disc[data-color="9C27B0"]:hover {
      box-shadow: 0 0 32px #9C27B080, 0 4px 16px #00000040;
    }

    .disc[data-color="3F51B5"] {
      background: #3F51B5;
    }
    .disc[data-color="3F51B5"]::after {
      background: radial-gradient(circle, #3F51B580 0%, transparent 70%);
    }
    .disc[data-color="3F51B5"]:hover {
      box-shadow: 0 0 32px #3F51B580, 0 4px 16px #00000040;
    }

    .disc[data-color="4CAF50"] {
      background: #4CAF50;
    }
    .disc[data-color="4CAF50"]::after {
      background: radial-gradient(circle, #4CAF5080 0%, transparent 70%);
    }
    .disc[data-color="4CAF50"]:hover {
      box-shadow: 0 0 32px #4CAF5080, 0 4px 16px #00000040;
    }

    .disc[data-color="FF9800"] {
      background: #FF9800;
    }
    .disc[data-color="FF9800"]::after {
      background: radial-gradient(circle, #FF980080 0%, transparent 70%);
    }
    .disc[data-color="FF9800"]:hover {
      box-shadow: 0 0 32px #FF980080, 0 4px 16px #00000040;
    }

    .disc[data-color="F44336"] {
      background: #F44336;
    }
    .disc[data-color="F44336"]::after {
      background: radial-gradient(circle, #F4433680 0%, transparent 70%);
    }
    .disc[data-color="F44336"]:hover {
      box-shadow: 0 0 32px #F4433680, 0 4px 16px #00000040;
    }

    .disc-label {
      font-size: 11px;
      color: #8B949E;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .waveform-canvas {
      width: 80px;
      height: 60px;
      display: block;
    }

    .sequence-panel {
      width: 240px;
      height: 100%;
      background: rgba(22, 27, 34, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-left: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
    }

    .sequence-header {
      padding: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sequence-title {
      font-size: 14px;
      font-weight: 600;
      color: #E6EDF3;
    }

    .clear-btn {
      padding: 6px 14px;
      background: #F44336;
      color: #FFFFFF;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s ease-out, transform 0.2s ease-out;
    }

    .clear-btn:hover {
      background: #D32F2F;
      transform: translateY(-1px);
    }

    .clear-btn:active {
      transform: translateY(0);
    }

    .sequence-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .sequence-list::-webkit-scrollbar {
      width: 6px;
    }

    .sequence-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .sequence-list::-webkit-scrollbar-thumb {
      background: rgba(63, 81, 181, 0.5);
      border-radius: 3px;
    }

    .sequence-list::-webkit-scrollbar-thumb:hover {
      background: rgba(63, 81, 181, 0.8);
    }

    .sequence-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      margin-bottom: 8px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 8px;
      transition: background 0.2s ease-out, transform 0.2s ease-out;
      gap: 10px;
    }

    .sequence-item:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .sequence-item.highlight {
      animation: highlight 0.1s ease-out;
    }

    @keyframes highlight {
      0%, 100% { background: rgba(255, 255, 255, 0.04); }
      50% { background: rgba(0, 188, 212, 0.3); transform: scale(1.02); }
    }

    .sequence-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .sequence-color-tag {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .sequence-info {
      flex: 1;
      min-width: 0;
    }

    .sequence-name {
      font-size: 12px;
      font-weight: 500;
      color: #E6EDF3;
    }

    .sequence-time {
      font-size: 10px;
      color: #8B949E;
      margin-top: 2px;
    }

    .delete-btn {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid #F44336;
      background: transparent;
      color: #F44336;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      transition: all 0.2s ease-out;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      background: #F44336;
      color: #FFFFFF;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #8B949E;
      font-size: 12px;
      text-align: center;
      padding: 20px;
      gap: 8px;
    }

    .control-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: rgba(13, 17, 23, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 100;
    }

    .play-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #00BCD4, #3F51B5);
      color: #FFFFFF;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
      box-shadow: 0 4px 20px rgba(0, 188, 212, 0.3);
    }

    .play-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 28px rgba(0, 188, 212, 0.45);
    }

    .play-btn:active {
      transform: scale(0.95);
    }

    .play-icon {
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 10px 0 10px 18px;
      border-color: transparent transparent transparent #FFFFFF;
      margin-left: 4px;
    }

    .stop-icon {
      width: 18px;
      height: 18px;
      background: #FFFFFF;
      border-radius: 2px;
    }

    .status-text {
      font-size: 12px;
      color: #8B949E;
      min-width: 100px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="main-area">
      <h1 class="title">记忆节拍</h1>
      <p class="subtitle">点击圆盘，创造你的旋律</p>
      <div class="disc-grid" id="discGrid"></div>
    </div>

    <aside class="sequence-panel">
      <div class="sequence-header">
        <span class="sequence-title">序列记录</span>
        <button class="clear-btn" id="clearBtn">清空</button>
      </div>
      <div class="sequence-list" id="sequenceList">
        <div class="empty-state" id="emptyState">
          <span>🎵</span>
          <span>点击圆盘开始记录</span>
        </div>
      </div>
    </aside>

    <div class="control-bar">
      <button class="play-btn" id="playBtn" title="播放序列">
        <div class="play-icon" id="playIcon"></div>
      </button>
      <span class="status-text" id="statusText">准备就绪</span>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
