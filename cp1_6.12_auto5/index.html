<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 星图探索</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #0a0a2e 0%, #1a1a3e 100%);
      font-family: 'Noto Sans SC', sans-serif;
      color: #fff;
      -webkit-font-smoothing: antialiased;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    #canvas-container canvas {
      display: block;
    }

    #css2d-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .constellation-label {
      color: rgba(255, 255, 255, 0.85);
      font-size: 13px;
      font-weight: 300;
      font-family: 'Orbitron', 'Noto Sans SC', sans-serif;
      letter-spacing: 1px;
      text-shadow: 0 0 8px rgba(128, 191, 255, 0.6), 0 0 20px rgba(128, 191, 255, 0.3);
      pointer-events: none;
      white-space: nowrap;
      transition: opacity 0.3s ease;
    }

    #control-panel {
      position: fixed;
      top: 50%;
      left: 20px;
      transform: translateY(-50%);
      z-index: 10;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 24px 20px;
      width: 260px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    #control-panel h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.9);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control-group label {
      font-size: 12px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 0.5px;
    }

    .control-group .value-display {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      color: #80bfff;
      float: right;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      transition: background 0.3s;
    }

    input[type="range"]:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #80bfff;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(128, 191, 255, 0.5);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 14px rgba(128, 191, 255, 0.8);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #80bfff;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 8px rgba(128, 191, 255, 0.5);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    input[type="range"]::-moz-range-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 14px rgba(128, 191, 255, 0.8);
    }

    .toggle-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.7);
      padding: 8px 14px;
      font-size: 12px;
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: 400;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
    }

    .toggle-btn:hover {
      background: rgba(128, 191, 255, 0.15);
      border-color: rgba(128, 191, 255, 0.4);
      color: #80bfff;
      transform: scale(1.03);
    }

    .toggle-btn.active {
      background: rgba(128, 191, 255, 0.2);
      border-color: rgba(128, 191, 255, 0.5);
      color: #80bfff;
      box-shadow: 0 0 12px rgba(128, 191, 255, 0.2);
    }

    #deepsky-popup {
      position: fixed;
      z-index: 20;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 16px 20px;
      max-width: 280px;
      pointer-events: auto;
      display: none;
      transition: opacity 0.3s ease;
    }

    #deepsky-popup h3 {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #80bfff;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    #deepsky-popup .type-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 400;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(128, 191, 255, 0.15);
      color: #80bfff;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    #deepsky-popup p {
      font-size: 12px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.8);
      line-height: 1.6;
    }

    #deepsky-popup .close-btn {
      position: absolute;
      top: 8px;
      right: 10px;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      font-size: 16px;
      cursor: pointer;
      transition: color 0.2s;
      line-height: 1;
    }

    #deepsky-popup .close-btn:hover {
      color: #80bfff;
    }

    #star-info {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 12px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 0.5px;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    #star-info.visible {
      opacity: 1;
    }

    #star-info span {
      color: #80bfff;
      font-family: 'Orbitron', monospace;
    }

    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #0a0a2e 0%, #1a1a3e 100%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease;
    }

    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #loading-screen h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 6px;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 24px;
    }

    .loading-bar {
      width: 200px;
      height: 2px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 1px;
      overflow: hidden;
    }

    .loading-bar-inner {
      width: 0%;
      height: 100%;
      background: #80bfff;
      border-radius: 1px;
      transition: width 0.3s ease;
    }

    #panel-toggle {
      display: none;
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 15;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.8);
      padding: 8px 12px;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    #panel-toggle:hover {
      background: rgba(128, 191, 255, 0.15);
      color: #80bfff;
    }

    @media (max-width: 1024px) {
      #control-panel {
        width: 220px;
        padding: 18px 16px;
        gap: 14px;
      }

      #control-panel h2 {
        font-size: 12px;
      }

      .control-group label {
        font-size: 11px;
      }
    }

    @media (max-width: 768px) {
      #panel-toggle {
        display: block;
      }

      #control-panel {
        top: auto;
        bottom: 0;
        left: 0;
        transform: none;
        width: 100%;
        border-radius: 12px 12px 0 0;
        padding: 20px 24px;
        gap: 16px;
        max-height: 60vh;
        overflow-y: auto;
        transition: transform 0.4s ease;
      }

      #control-panel.collapsed {
        transform: translateY(100%);
      }

      .constellation-label {
        font-size: 11px;
      }
    }

    @media (max-width: 480px) {
      #control-panel {
        padding: 16px 20px;
        gap: 14px;
      }

      .control-group label {
        font-size: 13px;
      }

      .toggle-btn {
        padding: 10px 16px;
        font-size: 13px;
      }

      input[type="range"]::-webkit-slider-thumb {
        width: 20px;
        height: 20px;
      }

      input[type="range"]::-moz-range-thumb {
        width: 20px;
        height: 20px;
      }
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <h1>STARMAP</h1>
    <div class="loading-bar">
      <div class="loading-bar-inner" id="loading-progress"></div>
    </div>
  </div>

  <div id="canvas-container"></div>
  <div id="css2d-container"></div>

  <button id="panel-toggle">&#9776;</button>

  <div id="control-panel">
    <h2>Star Map Controls</h2>

    <div class="control-group">
      <label>视场角 <span class="value-display" id="fov-value">60°</span></label>
      <input type="range" id="fov-slider" min="40" max="120" value="60" step="1" />
    </div>

    <div class="control-group">
      <label>视星等筛选 <span class="value-display" id="mag-value">≤ 6.0</span></label>
      <input type="range" id="mag-slider" min="1" max="8" value="6" step="0.5" />
    </div>

    <div class="control-group">
      <label>旋转速度 <span class="value-display" id="speed-value">1.0x</span></label>
      <input type="range" id="speed-slider" min="0" max="5" value="1" step="0.1" />
    </div>

    <div class="control-group">
      <label>星座连线</label>
      <button class="toggle-btn active" id="constellation-toggle">显示星座</button>
    </div>

    <div class="control-group">
      <label>深空天体</label>
      <button class="toggle-btn active" id="deepsky-toggle">显示标识</button>
    </div>

    <div class="control-group">
      <label>自动旋转</label>
      <button class="toggle-btn active" id="rotate-toggle">开启旋转</button>
    </div>
  </div>

  <div id="deepsky-popup">
    <button class="close-btn" id="popup-close">&times;</button>
    <h3 id="popup-name"></h3>
    <span class="type-badge" id="popup-type"></span>
    <p id="popup-desc"></p>
  </div>

  <div id="star-info">
    双击恒星聚焦 · 滚轮缩放 · 拖拽旋转
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
