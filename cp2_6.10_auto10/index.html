<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ColorPalette Studio - 交互式调色板工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" src="/src/main.ts"></script>
</head>
<body>
  <div class="app-container">
    <button id="btn-menu" class="menu-toggle" aria-label="菜单">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h1 class="app-title">
          <span class="title-accent">Color</span>Palette
        </h1>
        <p class="app-subtitle">交互式调色板工作室</p>
      </div>

      <div class="sidebar-section">
        <div class="color-wheel-wrapper">
          <canvas id="color-wheel" width="300" height="300"></canvas>
        </div>

        <div id="color-info" class="color-info">
          <div class="color-value-row">
            <span class="color-label">HEX</span>
            <span id="hex-value" class="color-value clickable">#3B82F6</span>
          </div>
          <div class="color-value-row">
            <span class="color-label">HSL</span>
            <span id="hsl-value" class="color-value clickable">hsl(210, 80%, 50%)</span>
          </div>
        </div>

        <div class="toolbar">
          <button id="btn-back" class="tool-btn" title="撤销 (Ctrl+Z)" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
          </button>
          <button id="btn-forward" class="tool-btn" title="重做 (Ctrl+Shift+Z)" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
          </button>
          <button id="btn-favorite" class="tool-btn" title="收藏此方案">☆</button>
          <button id="btn-export" class="tool-btn" title="导出CSS变量">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          </button>
        </div>
      </div>

      <div class="sidebar-section">
        <h2 class="section-title">配色方案</h2>
        <div id="schemes-container" class="schemes-container"></div>
      </div>

      <div class="sidebar-section favorites-section">
        <h2 class="section-title">
          我的收藏
          <span class="section-badge" id="favorites-count">0</span>
        </h2>
        <div id="favorites-empty" class="favorites-empty">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
          <p>暂无收藏方案</p>
          <span>点击 ☆ 按钮收藏喜欢的配色</span>
        </div>
        <div id="favorites-list" class="favorites-list"></div>
      </div>
    </aside>

    <main class="main-content">
      <div class="main-header">
        <div>
          <h2 class="main-title">实时预览</h2>
          <p class="main-subtitle">探索配色方案在真实UI组件中的表现</p>
        </div>
      </div>
      <div id="preview-container" class="preview-container"></div>
    </main>
  </div>
</body>
</html>
