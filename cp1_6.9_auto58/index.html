<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>符文精灵图书馆</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #0a0a24 0%, #020210 100%);
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #counter {
      position: fixed;
      left: 20px;
      bottom: 20px;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      font-size: 18px;
      color: #ffffff;
      background: rgba(0, 0, 0, 0.47);
      padding: 12px 20px;
      border-radius: 8px;
      letter-spacing: 1px;
      z-index: 100;
      user-select: none;
      pointer-events: none;
      transition: color 0.3s ease;
    }
    #counter.golden {
      color: #ffcc00;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="counter">已唤醒精灵: 0 / 30</div>
  </div>
  <script type="module" src="/src/game.ts"></script>
</body>
</html>
