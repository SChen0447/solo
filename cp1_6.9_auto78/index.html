<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>元素共振竖琴</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #app { width: 100vw; height: 100vh; display: block; }
    #ui-container {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 120px;
      height: 120px;
      pointer-events: none;
      user-select: none;
    }
    #energy-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }
    #energy-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-family: 'Arial', sans-serif;
      font-size: 18px;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(102, 204, 255, 0.8);
    }
  </style>
</head>
<body>
  <canvas id="app"></canvas>
  <div id="ui-container">
    <canvas id="energy-ring" width="120" height="120"></canvas>
    <div id="energy-label">0</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
