<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>古埃及神殿激光解谜</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #d4b68a 0%, #8b5a2b 100%);
      font-family: 'Georgia', serif;
    }

    body {
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(circle at 20% 30%, rgba(139, 90, 43, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(139, 90, 43, 0.12) 0%, transparent 50%),
                        radial-gradient(circle at 50% 50%, rgba(212, 182, 138, 0.1) 0%, transparent 60%);
      background-size: 100px 100px;
      pointer-events: none;
      z-index: 0;
    }

    .corner-decoration {
      position: absolute;
      width: 80px;
      height: 80px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 1;
    }

    .corner-decoration.top-left {
      top: 20px;
      left: 20px;
    }

    .corner-decoration.top-right {
      top: 20px;
      right: 20px;
    }

    .corner-decoration.bottom-left {
      bottom: 20px;
      left: 20px;
    }

    .corner-decoration.bottom-right {
      bottom: 20px;
      right: 20px;
    }

    .scarab-icon {
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #16213e 50%, transparent 70%);
      border-radius: 50%;
      position: relative;
    }

    .scarab-icon::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60%;
      height: 40%;
      background: #0f3460;
      border-radius: 50%;
    }

    .ankh-icon {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .ankh-icon::before {
      content: '';
      position: absolute;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      width: 30px;
      height: 30px;
      border: 4px solid #1a1a2e;
      border-radius: 50%;
    }

    .ankh-icon::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 40px;
      background: #1a1a2e;
      border-radius: 2px;
    }

    #game-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
    }

    @media (max-width: 1200px) {
      .corner-decoration {
        width: 60px;
        height: 60px;
      }
    }

    @media (max-width: 768px) {
      .corner-decoration {
        width: 40px;
        height: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="corner-decoration top-left">
    <div class="scarab-icon"></div>
  </div>
  <div class="corner-decoration top-right">
    <div class="ankh-icon"></div>
  </div>
  <div class="corner-decoration bottom-left">
    <div class="ankh-icon"></div>
  </div>
  <div class="corner-decoration bottom-right">
    <div class="scarab-icon"></div>
  </div>
  
  <div id="game-container"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
