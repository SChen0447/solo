<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>咖啡豆溯源与风味评测社区</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; }
      body {
        background: #1a120b;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .loader-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      .coffee-cup {
        width: 80px;
        height: 80px;
        animation: spin 1.5s linear infinite;
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .loader-text {
        color: #d7ccc8;
        font-size: 16px;
        letter-spacing: 2px;
      }
      #root:not(:empty) ~ .loader-container {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div class="loader-container" id="loader">
      <svg class="coffee-cup" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 30h55v35c0 11-9 20-20 20H40c-11 0-20-9-20-20V30z" fill="#6d4c41"/>
        <path d="M75 35h8c5.5 0 10 4.5 10 10s-4.5 10-10 10h-8" stroke="#8d6e63" stroke-width="4" stroke-linecap="round"/>
        <ellipse cx="47.5" cy="30" rx="27.5" ry="6" fill="#3e2723"/>
        <path d="M30 15c0 4 4 6 4 10M45 10c0 5 4 7 4 12M60 15c0 4 4 6 4 10" stroke="#a1887f" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
      </svg>
      <div class="loader-text">正在加载...</div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', () => {
        const checkRoot = setInterval(() => {
          const root = document.getElementById('root');
          if (root && root.children.length > 0) {
            const loader = document.getElementById('loader');
            if (loader) loader.style.display = 'none';
            clearInterval(checkRoot);
          }
        }, 100);
        setTimeout(() => clearInterval(checkRoot), 5000);
      });
    </script>
  </body>
</html>
