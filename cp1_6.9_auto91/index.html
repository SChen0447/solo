<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>海洋洋流与浮游生物迁徙模拟</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #0a0a1a 0%, #0f1a2a 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    canvas {
      display: block;
    }

    #tips-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(26, 26, 42, 0.7);
      padding: 16px 20px;
      border-radius: 10px;
      color: #ccaa66;
      font-size: 14px;
      line-height: 1.8;
      z-index: 10;
      backdrop-filter: blur(4px);
    }

    #tips-panel h3 {
      color: #ddbb77;
      margin-bottom: 8px;
      font-size: 16px;
    }

    #data-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(26, 26, 42, 0.7);
      padding: 16px 20px;
      border-radius: 10px;
      color: #aaddff;
      font-size: 14px;
      line-height: 1.8;
      z-index: 10;
      backdrop-filter: blur(4px);
      min-width: 220px;
    }

    #data-panel h3 {
      color: #bbeeff;
      margin-bottom: 10px;
      font-size: 16px;
      border-bottom: 1px solid rgba(170, 221, 255, 0.2);
      padding-bottom: 6px;
    }

    .data-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
    }

    .data-label {
      opacity: 0.8;
    }

    .data-value {
      font-weight: 600;
    }

    @media (max-width: 768px) {
      #data-panel {
        top: auto;
        right: auto;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        min-width: 280px;
      }

      #tips-panel {
        font-size: 12px;
        padding: 12px 16px;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="tips-panel">
    <h3>操作说明</h3>
    <div>鼠标拖拽：旋转视角</div>
    <div>滚轮：缩放视图</div>
    <div>W A S D：水平移动</div>
  </div>

  <div id="data-panel">
    <h3>海洋数据监测</h3>
    <div class="data-row">
      <span class="data-label">洋流速度:</span>
      <span class="data-value" id="current-speed">--</span>
    </div>
    <div class="data-row">
      <span class="data-label">方向角度:</span>
      <span class="data-value" id="current-angle">--</span>
    </div>
    <div class="data-row">
      <span class="data-label">浮游生物密度:</span>
      <span class="data-value" id="plankton-density">--</span>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
