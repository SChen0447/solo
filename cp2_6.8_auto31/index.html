<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D 抽象雕塑生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #canvas-container {
      width: 85%;
      height: 100%;
      position: relative;
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    .left-margin {
      width: 20px;
      height: 100%;
      flex-shrink: 0;
    }

    .control-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 260px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      z-index: 100;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .panel-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      background: linear-gradient(90deg, #00d2ff, #3a7bd5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .panel-section {
      margin-bottom: 18px;
    }

    .section-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.1s ease;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border: 1px solid transparent;
      margin-bottom: 8px;
    }

    .btn:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.15);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(0, 210, 255, 0.2), rgba(58, 123, 213, 0.2));
      border-image: linear-gradient(135deg, #00d2ff, #3a7bd5) 1;
      border-image-slice: 1;
      border-width: 1px;
      border-style: solid;
      position: relative;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, rgba(0, 210, 255, 0.3), rgba(58, 123, 213, 0.3));
      box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
    }

    .btn-danger {
      background: rgba(255, 80, 80, 0.15);
      border: 1px solid rgba(255, 80, 80, 0.3);
    }

    .btn-danger:hover {
      background: rgba(255, 80, 80, 0.25);
    }

    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .toggle-label {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
    }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .toggle-switch.active {
      background: linear-gradient(135deg, #00d2ff, #3a7bd5);
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: all 0.3s ease;
    }

    .toggle-switch.active::after {
      left: 23px;
    }

    .slider-container {
      margin-bottom: 14px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 6px;
    }

    .slider-value {
      color: #00d2ff;
      font-weight: 500;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.15);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00d2ff, #3a7bd5);
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
      transition: all 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 15px rgba(0, 210, 255, 0.7);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00d2ff, #3a7bd5);
      cursor: pointer;
      border: none;
      box-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
    }

    .selected-info {
      padding: 10px;
      background: rgba(0, 210, 255, 0.1);
      border-radius: 8px;
      border: 1px solid rgba(0, 210, 255, 0.2);
      margin-bottom: 12px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.8);
    }

    .selected-info.hidden {
      display: none;
    }

    .status-bar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 20px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      z-index: 50;
    }

    .file-drop-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 210, 255, 0.1);
      border: 3px dashed #00d2ff;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      pointer-events: none;
    }

    .file-drop-overlay.active {
      display: flex;
    }

    .file-drop-text {
      font-size: 24px;
      color: #00d2ff;
      font-weight: 600;
      text-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
    }

    @media (max-width: 768px) {
      .control-panel {
        top: auto;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        border-radius: 16px 16px 0 0;
        padding: 12px 16px;
        max-height: 45vh;
        overflow-y: auto;
      }

      .panel-title {
        margin-bottom: 10px;
        font-size: 14px;
      }

      .panel-section {
        margin-bottom: 12px;
      }

      .btn {
        padding: 8px 12px;
        font-size: 12px;
        margin-bottom: 6px;
      }

      #canvas-container {
        width: 100%;
        height: calc(100% - 45vh);
        padding-bottom: 0;
      }

      .left-margin {
        display: none;
      }

      .status-bar {
        bottom: calc(45vh + 10px);
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="left-margin"></div>
    <div id="canvas-container"></div>
  </div>

  <div class="file-drop-overlay" id="fileDropOverlay">
    <div class="file-drop-text">释放以加载 JSON 文件</div>
  </div>

  <div class="status-bar" id="statusBar">
    模式: 绘制 | 轨迹数: 0
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
