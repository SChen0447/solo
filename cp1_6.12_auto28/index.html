<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emoji Canvas 创意画布</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      user-select: none;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #toolbar {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 100;
    }

    #emoji-count {
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 14px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      min-width: 80px;
      text-align: center;
    }

    .toolbar-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease;
    }

    .toolbar-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .toolbar-btn:active {
      transform: scale(0.95);
    }

    .toolbar-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #palette {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      padding: 14px 20px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      z-index: 100;
      max-width: 90vw;
    }

    .emoji-btn {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      border: none;
      border-radius: 12px;
      background: transparent;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
      padding: 0;
      line-height: 1;
    }

    .emoji-btn:hover {
      transform: scale(1.2) translateY(-4px);
    }

    .emoji-btn.active {
      box-shadow: 0 0 15px 3px rgba(255, 215, 0, 0.6);
      background: rgba(255, 215, 0, 0.1);
    }

    #clear-flash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 999;
      transition: opacity 0.2s ease;
    }

    #clear-flash.flashing {
      opacity: 1;
      transition: opacity 0.05s ease;
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <canvas id="canvas"></canvas>
  </div>

  <div id="toolbar">
    <div id="emoji-count">0 个</div>
    <button class="toolbar-btn" id="undo-btn" title="撤销 (Ctrl+Z)">↶</button>
    <button class="toolbar-btn" id="clear-btn" title="清空画布">🗑</button>
  </div>

  <div id="palette"></div>

  <div id="clear-flash"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
