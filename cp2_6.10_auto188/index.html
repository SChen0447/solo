<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>动态云雾景观编辑器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #app {
      width: 100%;
      height: 100%;
    }
    #title {
      position: absolute;
      top: 20px;
      left: 20px;
      color: rgba(255, 255, 255, 0.85);
      font-size: 20px;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      font-weight: 500;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="title">动态云雾景观编辑器</div>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
