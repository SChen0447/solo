<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>疫情模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1B1B2F;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #ffffff;
    }

    #app {
      width: 100vw;
      height: 100vh;
      display: flex;
      position: relative;
    }

    #canvas-container {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #main-canvas {
      display: block;
      background: #1B1B2F;
    }

    #tooltip {
      position: fixed;
      pointer-events: none;
      background: #333333;
      color: #ffffff;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 12px;
      z-index: 9999;
      display: none;
      white-space: nowrap;
    }

    #tooltip.visible {
      display: block;
    }

    @media (max-width: 900px) {
      #app {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container">
      <canvas id="main-canvas"></canvas>
    </div>
    <div id="control-panel-anchor"></div>
  </div>
  <div id="tooltip"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
