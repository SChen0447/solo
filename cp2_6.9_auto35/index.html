<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gravity Breakout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(180deg, #0A0A2E 0%, #000011 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Press Start 2P', cursive;
      overflow: hidden;
    }

    #game-container {
      position: relative;
      width: 800px;
      height: 600px;
    }

    #game-canvas {
      display: block;
      background: linear-gradient(180deg, #0A0A2E 0%, #000011 100%);
      border: 2px solid #00BFFF;
      border-radius: 4px;
      box-shadow: 0 0 30px rgba(0, 191, 255, 0.3);
    }

    #info-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 140px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid #00BFFF;
      border-radius: 8px;
      color: #FFFFFF;
      font-size: 8px;
      line-height: 1.8;
    }

    #info-panel .panel-title {
      color: #00BFFF;
      font-size: 9px;
      margin-bottom: 8px;
      text-align: center;
    }

    #info-panel .panel-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    #info-panel .speed-value {
      color: #00FF88;
    }

    #info-panel .boost-status {
      color: #FFD700;
    }

    #info-panel .boost-status.inactive {
      color: #666666;
    }

    #score-display {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #FFFFFF;
      font-size: 12px;
      text-align: center;
    }

    #score-display .score {
      color: #FFD700;
      font-size: 16px;
      margin-bottom: 6px;
    }

    #score-display .bricks {
      color: #00BFFF;
      font-size: 9px;
    }

    #lives-display {
      position: absolute;
      top: 20px;
      left: 20px;
      display: flex;
      gap: 8px;
    }

    .life-icon {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #FF6666, #CC0000);
      box-shadow: 0 0 8px rgba(255, 0, 0, 0.6);
    }

    #game-over-screen,
    #victory-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 10;
    }

    #game-over-screen.show,
    #victory-screen.show {
      display: flex;
    }

    .game-title {
      color: #FF4444;
      font-size: 28px;
      margin-bottom: 30px;
      text-shadow: 0 0 20px rgba(255, 68, 68, 0.8);
    }

    .victory-title {
      color: #FFD700;
      font-size: 28px;
      margin-bottom: 30px;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
    }

    .final-score {
      color: #FFFFFF;
      font-size: 14px;
      margin-bottom: 40px;
    }

    .final-score span {
      color: #FFD700;
      font-size: 20px;
    }

    #restart-btn,
    #victory-restart-btn {
      font-family: 'Press Start 2P', cursive;
      font-size: 12px;
      padding: 14px 28px;
      background: linear-gradient(180deg, #00BFFF 0%, #0088CC 100%);
      color: #FFFFFF;
      border: 2px solid #00FFFF;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 0 15px rgba(0, 191, 255, 0.5);
    }

    #restart-btn:hover,
    #victory-restart-btn:hover {
      background: linear-gradient(180deg, #00CCFF 0%, #0099DD 100%);
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(0, 191, 255, 0.8);
    }

    #restart-btn:active,
    #victory-restart-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="800" height="600"></canvas>
    
    <div id="lives-display"></div>
    
    <div id="score-display">
      <div class="score" id="score-value">0</div>
      <div class="bricks">BRICKS: <span id="bricks-count">0</span></div>
    </div>
    
    <div id="info-panel">
      <div class="panel-title">STATUS</div>
      <div class="panel-row">
        <span>SPEED:</span>
        <span class="speed-value" id="speed-value">1.0x</span>
      </div>
      <div class="panel-row">
        <span>BOOST:</span>
        <span class="boost-status inactive" id="boost-status">OFF</span>
      </div>
      <div class="panel-row">
        <span>TIME:</span>
        <span class="boost-status inactive" id="boost-time">0.0s</span>
      </div>
    </div>

    <div id="game-over-screen">
      <div class="game-title">GAME OVER</div>
      <div class="final-score">FINAL SCORE: <span id="final-score">0</span></div>
      <button id="restart-btn">REPLAY</button>
    </div>

    <div id="victory-screen">
      <div class="victory-title" id="victory-title">VICTORY!</div>
      <div class="final-score">FINAL SCORE: <span id="victory-score">0</span></div>
      <button id="victory-restart-btn">REPLAY</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
