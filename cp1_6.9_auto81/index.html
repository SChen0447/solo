<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>动态交通流模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    .title {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #ffffff;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5), 0 0 20px rgba(100, 150, 255, 0.3);
      letter-spacing: 2px;
    }

    .info-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      background-color: #00000080;
      border-radius: 10px;
      padding: 12px;
      color: #ffffff;
      font-size: 14px;
      min-width: 200px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .info-item {
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .info-item:last-child {
      margin-bottom: 0;
    }

    .info-label {
      opacity: 0.8;
    }

    .info-value {
      font-weight: bold;
    }

    .lights-section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .lights-title {
      margin-bottom: 8px;
      opacity: 0.9;
      font-weight: bold;
    }

    .light-item {
      display: flex;
      align-items: center;
      margin-bottom: 6px;
    }

    .light-item:last-child {
      margin-bottom: 0;
    }

    .light-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 8px;
      box-shadow: 0 0 8px currentColor;
    }

    .light-dot.red {
      background-color: #ff3333;
      color: #ff3333;
    }

    .light-dot.yellow {
      background-color: #ffcc00;
      color: #ffcc00;
    }

    .light-dot.green {
      background-color: #33cc33;
      color: #33cc33;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <h1 class="title">动态交通流模拟器</h1>
    <div class="info-panel">
      <div class="info-item">
        <span class="info-label">总车辆数：</span>
        <span class="info-value" id="total-cars">0</span>
      </div>
      <div class="info-item">
        <span class="info-label">平均速度：</span>
        <span class="info-value" id="avg-speed">0 km/h</span>
      </div>
      <div class="lights-section">
        <div class="lights-title">信号灯状态</div>
        <div class="light-item">
          <span class="light-dot" id="light-north-dot"></span>
          <span id="light-north-text">北向</span>
        </div>
        <div class="light-item">
          <span class="light-dot" id="light-south-dot"></span>
          <span id="light-south-text">南向</span>
        </div>
        <div class="light-item">
          <span class="light-dot" id="light-east-dot"></span>
          <span id="light-east-text">东向</span>
        </div>
        <div class="light-item">
          <span class="light-dot" id="light-west-dot"></span>
          <span id="light-west-text">西向</span>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
