<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>萤火虫夜空魔法场景</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', Courier, monospace;
    }

    #scene-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .stats-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 8px;
      padding: 14px 18px;
      color: #aaddff;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      line-height: 1.8;
      min-width: 200px;
      opacity: 0;
      animation: fadeIn 0.5s ease-out 0.3s forwards;
      z-index: 10;
    }

    .stats-panel .stat-row {
      display: flex;
      justify-content: space-between;
    }

    .stats-panel .stat-label {
      opacity: 0.8;
    }

    .stats-panel .stat-value {
      font-weight: bold;
      color: #cceeff;
    }

    .brightness-slider-wrapper {
      position: fixed;
      left: 20px;
      top: 20%;
      height: 60vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      opacity: 0;
      animation: fadeIn 0.5s ease-out 0.1s forwards;
      z-index: 10;
    }

    .brightness-slider-wrapper .slider-label {
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
      writing-mode: vertical-rl;
      text-orientation: mixed;
    }

    .brightness-slider {
      -webkit-appearance: slider-vertical;
      appearance: slider-vertical;
      width: 8px;
      height: 100%;
      background: transparent;
      cursor: pointer;
    }

    .brightness-slider::-webkit-slider-runnable-track {
      width: 4px;
      background: rgba(100, 150, 255, 0.2);
      border-radius: 2px;
    }

    .brightness-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      margin-left: -7px;
      background: radial-gradient(circle, #aaddff 0%, rgba(100, 180, 255, 0.6) 60%, transparent 100%);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(150, 200, 255, 0.8);
    }

    .brightness-slider::-moz-range-track {
      width: 4px;
      background: rgba(100, 150, 255, 0.2);
      border-radius: 2px;
    }

    .brightness-slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      background: radial-gradient(circle, #aaddff 0%, rgba(100, 180, 255, 0.6) 60%, transparent 100%);
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 12px rgba(150, 200, 255, 0.8);
    }

    .wind-slider-wrapper {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 50vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0;
      animation: fadeIn 0.5s ease-out 0.2s forwards;
      z-index: 10;
    }

    .wind-slider-wrapper .slider-label {
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
    }

    .wind-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: transparent;
      cursor: pointer;
    }

    .wind-slider::-webkit-slider-runnable-track {
      height: 4px;
      background: rgba(100, 150, 255, 0.2);
      border-radius: 2px;
    }

    .wind-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      margin-top: -7px;
      background: radial-gradient(circle, #aaddff 0%, rgba(100, 180, 255, 0.6) 60%, transparent 100%);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(150, 200, 255, 0.8);
    }

    .wind-slider::-moz-range-track {
      height: 4px;
      background: rgba(100, 150, 255, 0.2);
      border-radius: 2px;
    }

    .wind-slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      background: radial-gradient(circle, #aaddff 0%, rgba(100, 180, 255, 0.6) 60%, transparent 100%);
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 12px rgba(150, 200, 255, 0.8);
    }

    .hint-text {
      position: fixed;
      left: 20px;
      bottom: 20px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      opacity: 0;
      animation: fadeIn 0.5s ease-out 0.4s forwards;
      z-index: 10;
      user-select: none;
      pointer-events: none;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(5px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .brightness-slider-wrapper,
    .wind-slider-wrapper {
      animation-name: fadeIn;
    }

    .stats-panel {
      animation-name: fadeIn;
    }

    .hint-text {
      animation-name: fadeIn;
    }
  </style>
</head>
<body>
  <div id="scene-container"></div>

  <div class="brightness-slider-wrapper">
    <span class="slider-label">亮度</span>
    <input type="range" class="brightness-slider" id="brightness-slider" min="0" max="100" value="50" orient="vertical" />
    <span class="slider-label" id="brightness-value">50</span>
  </div>

  <div class="wind-slider-wrapper">
    <span class="slider-label">风速 <span id="wind-value">1.0</span></span>
    <input type="range" class="wind-slider" id="wind-slider" min="0" max="5" step="0.1" value="1" />
  </div>

  <div class="stats-panel" id="stats-panel">
    <div class="stat-row">
      <span class="stat-label">萤火虫总数</span>
      <span class="stat-value" id="stat-total">200</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">平均速度</span>
      <span class="stat-value" id="stat-speed">1.00</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">活跃闪烁</span>
      <span class="stat-value" id="stat-active">0</span>
    </div>
  </div>

  <div class="hint-text">拖拽旋转视角，滚轮缩放</div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
