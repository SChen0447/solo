<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>地壳板块运动模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
      display: block;
    }
    #control-panel {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: rgba(30, 30, 30, 0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px 20px;
      color: #ffffff;
      min-width: 280px;
      z-index: 10;
      transition: all 0.3s ease-out;
    }
    #plate-info {
      margin-bottom: 12px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      font-size: 12px;
      display: none;
    }
    #plate-info.visible {
      display: block;
    }
    #plate-info h4 {
      font-size: 13px;
      margin-bottom: 6px;
      color: #f0f0f0;
    }
    #plate-info p {
      margin: 3px 0;
      color: #cccccc;
    }
    .slider-group {
      margin-bottom: 14px;
    }
    .slider-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 6px;
      color: #dddddd;
    }
    .slider-label span:last-child {
      color: #5bc0de;
      font-weight: 600;
    }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5bc0de, #428bca);
      cursor: pointer;
      transition: all 0.3s ease-out;
      box-shadow: 0 0 6px rgba(91, 192, 222, 0.4);
    }
    input[type="range"]::-webkit-slider-thumb:hover,
    input[type="range"]:active::-webkit-slider-thumb {
      width: 24px;
      height: 24px;
      box-shadow: 0 0 12px rgba(91, 192, 222, 0.8), 0 0 20px rgba(91, 192, 222, 0.4);
    }
    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5bc0de, #428bca);
      cursor: pointer;
      border: none;
      transition: all 0.3s ease-out;
    }
    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .btn {
      flex: 1;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      color: #ffffff;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease-out;
    }
    .btn:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    .btn:active {
      transform: scale(0.95);
    }
    .btn.active {
      background: linear-gradient(135deg, #f0ad4e, #f5a623);
      border-color: #f5a623;
      color: #000;
      font-weight: 600;
    }
    #simulation-stats {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(30, 30, 30, 0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px 16px;
      color: #ffffff;
      font-size: 13px;
      z-index: 10;
    }
    #simulation-stats p {
      margin: 4px 0;
    }
    #simulation-stats span {
      color: #5bc0de;
      font-weight: 600;
    }
    @media (max-width: 768px) {
      #control-panel {
        bottom: 10px;
        right: 50%;
        transform: translateX(50%);
        min-width: 90%;
        padding: 12px 14px;
      }
      .button-group {
        flex-direction: row;
      }
      #simulation-stats {
        top: 10px;
        left: 10px;
        font-size: 11px;
        padding: 8px 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="simulation-stats">
      <p>模拟时间：<span id="stat-time">0</span> 百万年</p>
      <p>总碰撞次数：<span id="stat-collisions">0</span></p>
    </div>
    <div id="control-panel">
      <div id="plate-info">
        <h4 id="plate-name">—</h4>
        <p>当前速度：<span id="plate-speed">0</span> 单位/帧</p>
        <p>碰撞次数：<span id="plate-collisions">0</span></p>
      </div>
      <div class="slider-group">
        <div class="slider-label">
          <span>漂移速度</span>
          <span id="val-speed">0.020</span>
        </div>
        <input type="range" id="slider-speed" min="0" max="0.05" step="0.001" value="0.02" />
      </div>
      <div class="slider-group">
        <div class="slider-label">
          <span>碰撞隆起幅度</span>
          <span id="val-uplift">0.20</span>
        </div>
        <input type="range" id="slider-uplift" min="0" max="0.5" step="0.01" value="0.2" />
      </div>
      <div class="slider-group">
        <div class="slider-label">
          <span>板块透明度</span>
          <span id="val-opacity">0.80</span>
        </div>
        <input type="range" id="slider-opacity" min="0.2" max="1.0" step="0.01" value="0.8" />
      </div>
      <div class="button-group">
        <button class="btn" id="btn-speed-2">加速 (2x)</button>
        <button class="btn" id="btn-speed-5">加速 (5x)</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
