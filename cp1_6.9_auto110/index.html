<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>梦境光织者</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #app {
      width: 100vw;
      height: 100vh;
    }
    #hud {
      position: fixed;
      top: 20px;
      left: 20px;
      color: rgba(200, 180, 255, 0.85);
      font-size: 14px;
      line-height: 1.8;
      pointer-events: none;
      text-shadow: 0 0 8px rgba(170, 100, 255, 0.6);
      z-index: 10;
    }
    #hud .mode {
      font-size: 18px;
      font-weight: 600;
      color: #ffcc66;
      text-shadow: 0 0 12px rgba(255, 204, 102, 0.8);
    }
    #hud .hint {
      opacity: 0.7;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="hud">
    <div>当前模式：<span class="mode" id="modeText">线性编织</span></div>
    <div class="hint">按住鼠标左键拖拽绘制光线</div>
    <div class="hint">点击色环切换颜色</div>
    <div class="hint">按 空格键 切换织布模式</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
