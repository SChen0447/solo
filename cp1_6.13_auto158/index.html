<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星骸·回声</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    .hint-panel {
      position: fixed;
      right: 20px;
      bottom: 20px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 12px;
      color: #c0c0c0;
      line-height: 1.8;
      user-select: none;
      pointer-events: none;
      backdrop-filter: blur(4px);
    }
    .hint-panel .title {
      font-weight: 600;
      color: #e0e0e0;
      margin-bottom: 4px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="hint-panel">
      <div class="title">星骸·回声</div>
      拖拽旋转 / 滚轮缩放<br/>
      点击爆炸 / Shift拖拽引力井
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
