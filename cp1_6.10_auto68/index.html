<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>城市建筑日照阴影模拟分析</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }
    body {
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ffffff;
      font-size: 18px;
      z-index: 100;
      background: rgba(255, 255, 255, 0.1);
      padding: 16px 32px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    #info-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #ffffff;
      font-size: 13px;
      min-width: 200px;
      z-index: 10;
      display: none;
      line-height: 1.8;
    }
    #info-panel h3 {
      margin-bottom: 8px;
      font-size: 14px;
      color: #ffcc00;
      border-bottom: 1px solid rgba(255, 204, 0, 0.3);
      padding-bottom: 4px;
    }
    #info-panel .param-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }
    #info-panel .param-label {
      color: #aaaacc;
    }
    #info-panel .param-value {
      color: #ffffff;
      font-weight: 500;
    }
    #timeline-controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 10;
      color: #ffffff;
    }
    #play-btn {
      background: #4488ff;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }
    #play-btn:hover {
      background: #3366dd;
    }
    #play-btn:active {
      background: #2255cc;
    }
    #time-display {
      font-family: 'Courier New', monospace;
      font-size: 16px;
      min-width: 60px;
      text-align: center;
    }
    #progress-bar {
      width: 200px;
      height: 6px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
      overflow: hidden;
      cursor: pointer;
    }
    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ffdd44, #ff9900);
      width: 0%;
      transition: width 0.1s linear;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading">正在加载场景...</div>
    <div id="info-panel"></div>
    <div id="timeline-controls">
      <button id="play-btn">▶ 播放</button>
      <span id="time-display">08:30</span>
      <div id="progress-bar">
        <div id="progress-fill"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
