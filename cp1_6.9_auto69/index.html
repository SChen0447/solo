<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>地牢逃脱 - 3D迷宫游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #ffffff;
    }

    body {
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0a 70%, #000000 100%);
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #game-canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
    }

    #ui-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    #info-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 200px;
      height: 80px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 8px;
      padding: 10px 15px;
      font-size: 14px;
      color: #ffffff;
      line-height: 1.6;
    }

    #minimap {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 160px;
      height: 160px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 50%;
      overflow: hidden;
    }

    #minimap-canvas {
      width: 100%;
      height: 100%;
    }

    #center-message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 64px;
      font-weight: bold;
      color: #ffffff;
      text-align: center;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
      pointer-events: none;
    }

    #center-message.win {
      text-shadow: 0 0 20px #ffd700, 0 0 40px #ffd700, 0 0 60px #ffd700;
    }

    #center-message.lose {
      color: #ff4444;
      text-shadow: 0 0 20px #ff0000;
    }

    #center-message.show {
      opacity: 1;
    }

    #controls-hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 13px;
      color: #cccccc;
      text-align: center;
    }

    #controls-hint kbd {
      display: inline-block;
      padding: 2px 8px;
      margin: 0 2px;
      background: #333;
      border: 1px solid #555;
      border-radius: 4px;
      font-family: monospace;
      color: #fff;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="ui-container">
      <div id="info-panel">
        <div id="fps">FPS: --</div>
        <div id="timer">时间: 00:00</div>
        <div id="steps">步数: 0</div>
      </div>
      <div id="minimap">
        <canvas id="minimap-canvas" width="160" height="160"></canvas>
      </div>
      <div id="center-message"></div>
      <div id="controls-hint">
        <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 移动 &nbsp;|&nbsp; 鼠标拖动 旋转视角
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
