<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>味觉星球 - 探索中国美食口味地图</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #FFF8F0 0%, #FFE8D6 100%);
      min-height: 100vh;
    }
    #root {
      min-height: 100vh;
    }
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #FFF8F0 0%, #FFE8D6 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    .loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loading-planet {
      width: 120px;
      height: 120px;
      animation: spin 3s linear infinite;
    }
    .loading-text {
      margin-top: 24px;
      font-size: 20px;
      font-weight: 600;
      color: #E88540;
      letter-spacing: 2px;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading-screen" class="loading-screen">
    <svg class="loading-planet" viewBox="0 0 100 100">
      <defs>
        <linearGradient id="planetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#F4D03F;stop-opacity:1" />
          <stop offset="50%" style="stop-color:#E88540;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#C0392B;stop-opacity:1" />
        </linearGradient>
      </defs>
      <circle cx="50" cy="50" r="40" fill="url(#planetGrad)" />
      <ellipse cx="50" cy="50" rx="42" ry="12" fill="none" stroke="#F4D03F" stroke-width="2" opacity="0.6" transform="rotate(-20 50 50)" />
      <ellipse cx="50" cy="50" rx="38" ry="8" fill="none" stroke="#E88540" stroke-width="1.5" opacity="0.4" transform="rotate(15 50 50)" />
    </svg>
    <div class="loading-text">味觉星球加载中...</div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/client/main.tsx"></script>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
          loadingScreen.classList.add('hidden');
          setTimeout(() => loadingScreen.remove(), 500);
        }
      }, 800);
    });
  </script>
</body>
</html>
