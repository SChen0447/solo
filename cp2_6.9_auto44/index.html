<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 虚拟艺术画廊</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #1A1A1A;
      font-family: Georgia, 'Times New Roman', serif;
      color: #F5F0E8;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      display: block;
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      letter-spacing: 2px;
      color: #F5F0E8;
      z-index: 100;
    }

    #hint {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      letter-spacing: 1px;
      color: rgba(245, 240, 232, 0.7);
      z-index: 10;
      pointer-events: none;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading">画廊加载中...</div>
    <div id="hint">鼠标拖拽旋转视角 · 滚轮前后移动 · 点击画作查看详情</div>
    <div id="canvas-container"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
