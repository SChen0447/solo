<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐋</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>深海生物图鉴 - Deep Sea Bio Atlas</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0a1628;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      #loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loading-title {
        color: #c8e6f5;
        font-size: 24px;
        margin-bottom: 24px;
        font-family: system-ui, -apple-system, sans-serif;
        letter-spacing: 4px;
      }
      .loading-bar-container {
        width: 300px;
        height: 6px;
        background: rgba(0, 60, 100, 0.4);
        border-radius: 3px;
        overflow: hidden;
      }
      .loading-bar {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #00d4ff, #0099cc, #00d4ff);
        border-radius: 3px;
        animation: loading 2s ease-in-out forwards;
        background-size: 200% 100%;
      }
      @keyframes loading {
        0% { width: 0%; background-position: 200% 0; }
        100% { width: 100%; background-position: -200% 0; }
      }
      .loading-text {
        color: #6ea8c4;
        margin-top: 16px;
        font-size: 14px;
        font-family: system-ui, -apple-system, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <div class="loading-title">🌊 深海生物图鉴</div>
      <div class="loading-bar-container">
        <div class="loading-bar"></div>
      </div>
      <div class="loading-text">正在潜入深海...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loading = document.getElementById('loading-screen');
          if (loading) loading.classList.add('hidden');
        }, 2000);
      });
    </script>
  </body>
</html>
