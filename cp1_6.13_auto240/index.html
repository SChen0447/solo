<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日晷·流光时序</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(180deg, #0a0b16 0%, #1e1b4b 50%, #0f0c29 100%);
      color: #ffffff;
      min-width: 900px;
      min-height: 700px;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
    }
    #canvas:active {
      cursor: grabbing;
    }
    #title {
      position: absolute;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      font-weight: 300;
      letter-spacing: 8px;
      color: rgba(210, 200, 255, 0.85);
      text-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
      pointer-events: none;
      user-select: none;
    }
    #subtitle {
      position: absolute;
      top: 72px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 4px;
      color: rgba(162, 155, 254, 0.6);
      pointer-events: none;
      user-select: none;
    }
    #time-display {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 3px;
      color: rgba(210, 200, 255, 0.7);
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="title">日晷 · 流 光 时 序</div>
    <div id="subtitle">S U N D I A L &nbsp; · &nbsp; L U M I N O U S &nbsp; S E Q U E N C E</div>
    <canvas id="canvas"></canvas>
    <div id="time-display">拖 拽 指 针 &nbsp;·&nbsp; 感 受 光 与 时 的 流 转</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
