<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>无限镜屋</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #control-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      z-index: 10;
      border-top: 1px solid rgba(255, 255, 255, 0.15);
    }

    .arrow-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.5);
      background: transparent;
      color: #ffffff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      outline: none;
    }

    .arrow-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.05);
    }

    .arrow-btn:active {
      transform: scale(0.95);
    }

    #palette-name {
      color: #ffffff;
      font-size: 16px;
      letter-spacing: 2px;
      min-width: 120px;
      text-align: center;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    }

    @media (max-width: 768px) {
      #control-bar {
        height: 40px;
        gap: 20px;
      }

      .arrow-btn {
        width: 32px;
        height: 32px;
        font-size: 14px;
      }

      #palette-name {
        font-size: 12px;
        min-width: 80px;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="control-bar">
    <button class="arrow-btn" id="prev-palette" aria-label="上一个配色">
      &#10094;
    </button>
    <span id="palette-name">极光</span>
    <button class="arrow-btn" id="next-palette" aria-label="下一个配色">
      &#10095;
    </button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
