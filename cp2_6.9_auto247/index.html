<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 拓扑变换可视化工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: #E0E0E0;
      background: #0A0E27;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
      background: radial-gradient(ellipse at center, #1A1A2E 0%, #0A0E27 100%);
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    #control-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 260px;
      background: rgba(30, 30, 46, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 20px;
      z-index: 10;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(79, 195, 247, 0.15);
    }

    #control-panel h2 {
      font-size: 16px;
      font-weight: 600;
      color: #4FC3F7;
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }

    .control-group {
      margin-bottom: 18px;
    }

    .control-group label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      font-weight: 500;
      color: #B0B0C0;
      margin-bottom: 8px;
    }

    .control-group .value-label {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: #E0E0E0;
      background: rgba(79, 195, 247, 0.1);
      padding: 2px 8px;
      border-radius: 4px;
      min-width: 48px;
      text-align: center;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: #3A3A5C;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    input[type="range"]:hover {
      background: #4A4A6C;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #4FC3F7;
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
      box-shadow: 0 2px 6px rgba(79, 195, 247, 0.4);
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: #6FD3FF;
    }

    input[type="range"]::-webkit-slider-thumb:active {
      transform: scale(0.9);
      background: #3FB3E7;
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #4FC3F7;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      transition: background 0.15s ease, transform 0.1s ease;
      box-shadow: 0 2px 6px rgba(79, 195, 247, 0.4);
    }

    input[type="range"]::-moz-range-thumb:hover {
      background: #6FD3FF;
    }

    input[type="range"]::-moz-range-thumb:active {
      transform: scale(0.9);
      background: #3FB3E7;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
    }

    .btn {
      padding: 10px 12px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
      color: #FFFFFF;
      white-space: nowrap;
      text-align: center;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn-reset {
      background: #FF5722;
    }

    .btn-reset:hover {
      background: #E64A19;
    }

    .btn-wireframe {
      background: #3A3A5C;
      color: #00E5FF;
      border: 1px solid rgba(0, 229, 255, 0.3);
    }

    .btn-wireframe:hover {
      background: #4A4A6C;
      border-color: rgba(0, 229, 255, 0.5);
    }

    .btn-wireframe.active {
      background: #00E5FF;
      color: #0A0E27;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="control-panel">
      <h2>拓扑变换控制</h2>
      <div id="slider-container"></div>
      <div class="button-group" id="button-container"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
