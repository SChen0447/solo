<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>手绘动物识别</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #2c3e50;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Comic Sans MS', cursive, sans-serif;
    }

    #app {
      display: flex;
      gap: 20px;
      padding: 20px;
      align-items: flex-start;
    }

    .main-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 800px;
      gap: 20px;
    }

    .animal-name {
      font-family: 'Comic Sans MS', cursive;
      font-size: 32px;
      font-weight: bold;
      color: #e74c3c;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
    }

    .clear-btn {
      background-color: #c0392b;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      font-family: inherit;
      transition: background-color 0.2s;
    }

    .clear-btn:hover {
      background-color: #a93226;
    }

    .canvas-wrapper {
      position: relative;
      padding: 20px;
    }

    #drawCanvas {
      background-color: white;
      border: 1px dashed white;
      cursor: crosshair;
      display: block;
    }

    .emoji-container {
      position: absolute;
      pointer-events: none;
      font-size: 48px;
      z-index: 10;
    }

    .counter-wrapper {
      display: flex;
      justify-content: center;
      margin-top: 10px;
    }

    .counter {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background-color: #2ecc71;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 22px;
      font-weight: bold;
    }

    .correct-btn {
      background-color: #f39c12;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      margin-left: 10px;
    }

    .correct-btn:hover {
      background-color: #d68910;
    }

    .audio-panel {
      width: 180px;
      background-color: #f0f3bd;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .slider-label {
      font-size: 12px;
      color: #2c3e50;
      font-weight: bold;
    }

    .slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: #2c3e50;
      border-radius: 3px;
      outline: none;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #e74c3c;
      border-radius: 50%;
      cursor: pointer;
    }

    .slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #e74c3c;
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }

    .play-btn {
      background-color: #2ecc71;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 16px;
      cursor: pointer;
      font-family: inherit;
      font-weight: bold;
      transition: background-color 0.2s;
    }

    .play-btn:hover {
      background-color: #27ae60;
    }

    @media (max-width: 900px) {
      #app {
        flex-direction: column;
        align-items: center;
      }

      .main-container {
        width: 100%;
      }

      .top-bar {
        width: 100%;
        max-width: 800px;
      }

      #drawCanvas {
        max-width: 100%;
        height: auto;
      }

      .audio-panel {
        width: 100%;
        max-width: 800px;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
      }

      .slider-group {
        flex: 1 1 150px;
        min-width: 150px;
      }

      .play-btn {
        flex: 1 1 100%;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="main-container">
      <div class="top-bar">
        <button class="clear-btn" id="clearBtn">清空</button>
        <div class="animal-name" id="animalName"></div>
        <button class="correct-btn" id="correctBtn">纠正</button>
      </div>
      <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="drawCanvas" width="800" height="600"></canvas>
      </div>
      <div class="counter-wrapper">
        <div class="counter" id="counter">0</div>
      </div>
    </div>
    <div class="audio-panel">
      <div class="slider-group">
        <span class="slider-label">频率</span>
        <input type="range" class="slider" id="freqSlider" min="0" max="100" step="1" value="50" />
      </div>
      <div class="slider-group">
        <span class="slider-label">响度</span>
        <input type="range" class="slider" id="volSlider" min="0" max="100" step="1" value="50" />
      </div>
      <div class="slider-group">
        <span class="slider-label">节奏速度</span>
        <input type="range" class="slider" id="tempoSlider" min="0" max="100" step="1" value="50" />
      </div>
      <button class="play-btn" id="playBtn">播放音效</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
