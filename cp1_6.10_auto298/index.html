<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>双旋缠绕 - 量子纠缠可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a1a 100%);
      color: #ffffff;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    #status-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
    }

    #status-bar .title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #4cc9f0, #4895ef, #b5179e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #status-bar .counter {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 1px;
    }

    #status-bar .counter span {
      color: #4cc9f0;
      font-weight: 600;
    }

    #chart-panel {
      position: fixed;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      background: rgba(16, 16, 32, 0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      min-width: 200px;
    }

    #chart-panel h3 {
      font-size: 13px;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 16px;
      text-align: center;
      text-transform: uppercase;
    }

    .chart-container {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 8px;
      height: 140px;
      margin-bottom: 12px;
    }

    .bar-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .bar {
      width: 25px;
      border-radius: 4px 4px 0 0;
      position: relative;
      transition: height 0.4s ease-out, opacity 0.3s ease;
      overflow: hidden;
      min-height: 2px;
    }

    .bar::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 100%);
      transition: height 0.5s ease-out;
    }

    .bar.flash::after {
      animation: barHighlight 0.6s ease-out;
    }

    @keyframes barHighlight {
      0% { height: 0; opacity: 1; }
      50% { height: 100%; opacity: 1; }
      100% { height: 0; opacity: 0; }
    }

    .bar-up-up { background: linear-gradient(180deg, #f72585, #d61f70); }
    .bar-up-down { background: linear-gradient(180deg, #b5179e, #951485); }
    .bar-down-up { background: linear-gradient(180deg, #7209b7, #5e0898); }
    .bar-down-down { background: linear-gradient(180deg, #560bad, #460992); }

    .bar-value {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.9);
      font-weight: 600;
      min-height: 14px;
    }

    .bar-label {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 1px;
    }

    #control-panel {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 16px;
      padding: 16px 24px;
      background: rgba(16, 16, 32, 0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
    }

    .btn {
      position: relative;
      padding: 12px 28px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      background: linear-gradient(135deg, #4cc9f0 0%, #4895ef 100%);
      box-shadow: 0 4px 15px rgba(76, 201, 240, 0.3);
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(76, 201, 240, 0.5);
    }

    .btn:active {
      transform: scale(1.02);
    }

    .btn-reset {
      background: linear-gradient(135deg, #7209b7 0%, #560bad 100%);
      box-shadow: 0 4px 15px rgba(114, 9, 183, 0.3);
    }

    .btn-reset:hover {
      box-shadow: 0 6px 20px rgba(114, 9, 183, 0.5);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      transform: scale(0);
      animation: rippleEffect 0.6s ease-out;
      pointer-events: none;
    }

    @keyframes rippleEffect {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    #legend {
      position: fixed;
      left: 24px;
      bottom: 24px;
      z-index: 10;
      padding: 12px 16px;
      background: rgba(16, 16, 32, 0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    #legend .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      margin: 4px 0;
    }

    #legend .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    #legend .dot-a { background: #3a86ff; box-shadow: 0 0 8px #3a86ff; }
    #legend .dot-b { background: #ff006e; box-shadow: 0 0 8px #ff006e; }

    @media (orientation: portrait) {
      #control-panel {
        flex-direction: column;
        width: calc(100% - 48px);
        max-width: 320px;
      }

      #chart-panel {
        right: 50%;
        top: auto;
        bottom: 180px;
        transform: translateX(50%);
        width: calc(100% - 48px);
        max-width: 320px;
      }

      #legend {
        left: 24px;
        bottom: auto;
        top: 60px;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="status-bar">
    <div class="title">双旋缠绕 · Quantum Entanglement</div>
    <div class="counter">测量次数：<span id="measure-count">0</span> / 50</div>
  </div>

  <div id="chart-panel">
    <h3>测量统计分布</h3>
    <div class="chart-container" id="chart-container">
    </div>
  </div>

  <div id="legend">
    <div class="legend-item"><div class="legend-dot dot-a"></div>粒子 A (蓝)</div>
    <div class="legend-item"><div class="legend-dot dot-b"></div>粒子 B (红)</div>
  </div>

  <div id="control-panel"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
