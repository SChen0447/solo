<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>虚拟粒子星云交互展览</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000011;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    canvas {
      display: block;
    }
    #fps-counter {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 8px 16px;
      color: #ffffff;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 1px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      z-index: 100;
      user-select: none;
    }
    #hint-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 16px 20px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 13px;
      line-height: 1.8;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      z-index: 100;
      user-select: none;
      transition: opacity 1s ease;
    }
    #hint-panel.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    #hint-panel .title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: rgba(180, 200, 255, 0.95);
    }
    #hint-panel .item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #hint-panel .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(150, 180, 255, 0.8);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="fps-counter">FPS: --</div>
    <div id="hint-panel">
      <div class="title">操作指南</div>
      <div class="item"><span class="dot"></span>鼠标移动：引力扰动</div>
      <div class="item"><span class="dot"></span>滚轮：缩放视野</div>
      <div class="item"><span class="dot"></span>右键拖拽：旋转视角</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
