<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>纹理迷宫</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      background: #121224;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      line-height: 1.6;
    }

    #app {
      min-height: 600px;
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 24px;
    }

    .canvas-wrapper {
      flex-shrink: 0;
      background: #121224;
      border-radius: 12px;
    }

    #maze-canvas {
      display: block;
      background: transparent;
      border-radius: 8px;
    }

    .panel {
      width: 220px;
      background: #1e1e2e;
      border-radius: 12px;
      padding: 20px;
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #e0e0e0;
    }

    .stat-row {
      margin-bottom: 16px;
    }

    .stat-label {
      font-size: 13px;
      color: #8888aa;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 600;
      color: #ff8a65;
      transition: color 0.2s ease-out;
    }

    .stat-value.animating {
      color: #ffab91;
    }

    .heatmap-container {
      margin-top: 20px;
    }

    .heatmap-label {
      font-size: 13px;
      color: #8888aa;
      margin-bottom: 8px;
    }

    #heatmap-canvas {
      display: block;
      background: #121224;
      border-radius: 4px;
      transition: opacity 0.2s ease-out;
    }

    .btn-group {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #6a1b9a, #4a148c);
      color: #e0e0e0;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease-out;
      font-family: inherit;
    }

    .btn:hover {
      background: #8e24aa;
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .tip {
      margin-top: 20px;
      padding: 12px;
      background: #1c1c38;
      border-radius: 8px;
      font-size: 12px;
      color: #8888aa;
    }

    @media (max-width: 720px) {
      #app {
        flex-direction: column;
        align-items: center;
        padding: 16px;
      }

      .panel {
        width: 100%;
        max-width: 500px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="canvas-wrapper">
      <canvas id="maze-canvas"></canvas>
    </div>
    <div class="panel">
      <div class="panel-title">纹理迷宫</div>
      
      <div class="stat-row">
        <div class="stat-label">已走步数</div>
        <div class="stat-value" id="steps-value">0</div>
      </div>
      
      <div class="stat-row">
        <div class="stat-label">探索进度</div>
        <div class="stat-value" id="progress-value">0%</div>
      </div>
      
      <div class="heatmap-container">
        <div class="heatmap-label">路径缩略图</div>
        <canvas id="heatmap-canvas" width="100" height="100"></canvas>
      </div>
      
      <div class="btn-group">
        <button class="btn" id="btn-reset">重新开始</button>
        <button class="btn" id="btn-new">生成新迷宫</button>
      </div>
      
      <div class="tip">
        左键点击/拖拽移动路径<br>
        右键点击撤销上一步
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
