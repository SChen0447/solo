<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>动态彩色烟雾粒子</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #1A1A2E;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    #canvas-wrapper {
      position: relative;
      width: 100%;
      max-width: 1400px;
      min-width: 400px;
      height: 600px;
      background: #000000;
      border: 1px solid #3A3A5A;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      box-shadow: 0 0 20px rgba(58, 58, 90, 0.3), 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    #smoke-canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    #fps-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 30px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
    }

    #fps-text {
      color: #00FF00;
      font-size: 14px;
      font-family: 'Consolas', 'Monaco', monospace;
      transition: color 0.3s;
    }

    #fps-text.warning {
      color: #FF4D4D;
      animation: blink 0.5s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #particle-count {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #AAAAAA;
      font-size: 12px;
      font-family: 'Consolas', 'Monaco', monospace;
    }

    #control-panel {
      position: absolute;
      bottom: 12px;
      right: 12px;
      width: 180px;
      height: auto;
      min-height: 80px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 12px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .control-label {
      color: #CCCCCC;
      font-size: 11px;
      display: flex;
      justify-content: space-between;
    }

    .control-label span:last-child {
      color: #E94560;
      font-family: 'Consolas', monospace;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: #3A3A5A;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: #E94560;
      border-radius: 50%;
      cursor: pointer;
      transition: width 0.2s ease, height 0.2s ease, transform 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      width: 18px;
      height: 18px;
      transform: translate(-2px, -2px);
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #E94560;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      transition: width 0.2s ease, height 0.2s ease;
    }

    input[type="range"]::-moz-range-thumb:hover {
      width: 18px;
      height: 18px;
    }

    #theme-switcher {
      display: flex;
      gap: 6px;
      justify-content: center;
      padding-top: 4px;
    }

    .theme-option {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      overflow: hidden;
      border: 2px solid transparent;
      transition: transform 0.1s ease, border-color 0.1s ease;
    }

    .theme-option:hover {
      border-color: rgba(255, 255, 255, 0.3);
    }

    .theme-option.active {
      transform: scale(1);
      animation: themeSelect 0.1s ease;
      border-color: #E94560;
    }

    @keyframes themeSelect {
      0% { transform: scale(0.9); }
      100% { transform: scale(1); }
    }

    .theme-option div {
      flex: 1;
      height: 100%;
    }

    #theme-warm div:nth-child(1) { background: #FF6B35; }
    #theme-warm div:nth-child(2) { background: #FFD166; }
    #theme-warm div:nth-child(3) { background: #E94560; }

    #theme-cool div:nth-child(1) { background: #118AB2; }
    #theme-cool div:nth-child(2) { background: #06D6A0; }
    #theme-cool div:nth-child(3) { background: #073B4C; }

    #theme-random div:nth-child(1) { background: #FFFFFF; }
    #theme-random div:nth-child(2) { background: #888888; }
    #theme-random div:nth-child(3) { background: #444444; }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-wrapper">
      <canvas id="smoke-canvas" width="1000" height="600"></canvas>
      <div id="fps-bar">
        <span id="particle-count">粒子: 0</span>
        <span id="fps-text">FPS: 60</span>
      </div>
      <div id="control-panel">
        <div class="control-group">
          <div class="control-label">
            <span>烟雾密度</span>
            <span id="density-value">300</span>
          </div>
          <input type="range" id="density-slider" min="50" max="500" value="300" step="10" />
        </div>
        <div class="control-group">
          <div class="control-label">
            <span>粒子寿命</span>
            <span id="lifetime-value">12</span>
          </div>
          <input type="range" id="lifetime-slider" min="5" max="20" value="12" step="1" />
        </div>
        <div class="control-group">
          <div class="control-label">
            <span>颜色主题</span>
          </div>
          <div id="theme-switcher">
            <div class="theme-option active" id="theme-warm" data-theme="warm">
              <div></div><div></div><div></div>
            </div>
            <div class="theme-option" id="theme-cool" data-theme="cool">
              <div></div><div></div><div></div>
            </div>
            <div class="theme-option" id="theme-random" data-theme="random">
              <div></div><div></div><div></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
