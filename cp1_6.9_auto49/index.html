<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>时间旅行解谜</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a2e;
      font-family: 'Courier New', monospace;
    }

    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to bottom, #0a0a2e 0%, #1a1a4e 100%);
      position: relative;
    }

    #game-container.glow-active {
      animation: glowPulse 0.5s ease-out;
    }

    @keyframes glowPulse {
      0% {
        box-shadow: inset 0 0 20px 10px rgba(100, 50, 200, 0.6);
      }
      50% {
        box-shadow: inset 0 0 40px 20px rgba(138, 43, 226, 0.8);
      }
      100% {
        box-shadow: inset 0 0 20px 10px rgba(100, 50, 200, 0.3);
      }
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
