<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>时光·矢量织梭</title>
  <link rel="stylesheet" href="./src/styles.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1 class="app-title">时光·矢量织梭</h1>
      <p class="app-subtitle">交互式矢量图形动画编织</p>
    </header>

    <main class="main-container">
      <div class="canvas-wrapper">
        <canvas id="mainCanvas"></canvas>
        <canvas id="overlayCanvas"></canvas>
      </div>

      <aside class="control-panel">
        <div class="panel-section">
          <h3 class="section-title">绘制工具</h3>
          <div class="tool-buttons">
            <button class="tool-btn active" data-tool="free" title="自由曲线">
              <svg viewBox="0 0 24 24" width="20" height="20"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" fill="currentColor"/></svg>
            </button>
            <button class="tool-btn" data-tool="circle" title="圆形">
              <svg viewBox="0 0 24 24" width="20" height="20"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/></svg>
            </button>
            <button class="tool-btn" data-tool="triangle" title="三角形">
              <svg viewBox="0 0 24 24" width="20" height="20"><polygon points="12,3 22,21 2,21" fill="none" stroke="currentColor" stroke-width="2"/></svg>
            </button>
            <button class="tool-btn" data-tool="rectangle" title="矩形">
              <svg viewBox="0 0 24 24" width="20" height="20"><rect x="3" y="5" width="18" height="14" fill="none" stroke="currentColor" stroke-width="2"/></svg>
            </button>
          </div>
        </div>

        <div class="panel-section">
          <h3 class="section-title">颜色选择</h3>
          <div class="color-picker-container">
            <canvas id="colorWheel" width="200" height="200"></canvas>
            <input type="range" id="lightnessSlider" min="0" max="100" value="60">
            <div class="color-preview-wrapper">
              <div class="color-preview" id="colorPreview"></div>
              <input type="text" id="colorValue" value="#6366f1" readonly>
            </div>
          </div>
          <div class="palette-section">
            <h4 class="subsection-title">动画调色板（3色）</h4>
            <div class="palette-slots">
              <div class="palette-slot active" data-slot="0">
                <div class="slot-color" style="background:#6366f1"></div>
              </div>
              <div class="palette-slot" data-slot="1">
                <div class="slot-color" style="background:#f472b6"></div>
              </div>
              <div class="palette-slot" data-slot="2">
                <div class="slot-color" style="background:#34d399"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="panel-section">
          <h3 class="section-title">线宽设置</h3>
          <div class="slider-row">
            <input type="range" id="lineWidthSlider" min="1" max="10" value="2" step="1">
            <span class="slider-value" id="lineWidthValue">2px</span>
          </div>
        </div>

        <div class="panel-section">
          <h3 class="section-title">对称轴数量</h3>
          <div class="slider-row">
            <input type="range" id="symmetrySlider" min="1" max="12" value="6" step="1">
            <span class="slider-value" id="symmetryValue">6</span>
          </div>
        </div>

        <div class="panel-section">
          <h3 class="section-title">编织模式</h3>
          <select id="weaveMode" class="mode-select">
            <option value="mirror">镜像模式</option>
            <option value="rotation">旋转模式</option>
            <option value="kaleidoscope">万花筒模式</option>
          </select>
        </div>

        <div class="panel-section">
          <h3 class="section-title">操作控制</h3>
          <div class="action-buttons">
            <button class="action-btn" id="undoBtn" title="撤销 (Ctrl+Z)">
              <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z" fill="currentColor"/></svg>
              <span>撤销</span>
            </button>
            <button class="action-btn" id="redoBtn" title="重做 (Ctrl+Shift+Z)">
              <svg viewBox="0 0 24 24" width="18" height="18"><path d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16c1.05-3.19 4.05-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z" fill="currentColor"/></svg>
              <span>重做</span>
            </button>
          </div>
          <div class="action-buttons">
            <button class="action-btn primary" id="playBtn" title="播放动画">
              <svg id="playIcon" viewBox="0 0 24 24" width="18" height="18"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
              <span id="playText">播放</span>
            </button>
            <button class="action-btn" id="clearBtn" title="清空画布">
              <svg viewBox="0 0 24 24" width="18" height="18"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" fill="currentColor"/></svg>
              <span>清空</span>
            </button>
          </div>
        </div>
      </aside>
    </main>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
