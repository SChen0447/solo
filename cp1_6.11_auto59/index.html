<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D 分子结构查看器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, #0a1628 0%, #000000 100%);
    }
    #control-panel {
      position: fixed;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 220px;
      padding: 20px;
      background: rgba(20, 25, 40, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 100;
    }
    #control-panel h3 {
      color: #fff;
      font-size: 16px;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    }
    .control-item {
      margin-bottom: 14px;
    }
    .control-btn {
      width: 100%;
      padding: 10px 16px;
      background: rgba(70, 130, 220, 0.4);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
    }
    .control-btn:hover {
      background: rgba(70, 130, 220, 0.95);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(70, 130, 220, 0.4);
    }
    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }
    .toggle-label {
      color: #e0e0e0;
      font-size: 14px;
    }
    .toggle-switch {
      position: relative;
      width: 48px;
      height: 26px;
      background: rgba(100, 100, 120, 0.5);
      border-radius: 13px;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .toggle-switch.active {
      background: rgba(80, 200, 120, 0.9);
    }
    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.3s ease;
    }
    .toggle-switch.active::after {
      transform: translateX(22px);
    }
    #fps-counter {
      position: fixed;
      right: 24px;
      bottom: 24px;
      color: #4ade80;
      font-size: 16px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-weight: bold;
      text-shadow: 0 0 8px rgba(74, 222, 128, 0.5);
      z-index: 100;
      pointer-events: none;
    }
    #atom-info-card {
      position: fixed;
      display: none;
      padding: 14px 18px;
      background: rgba(20, 25, 40, 0.92);
      backdrop-filter: blur(12px);
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      font-size: 13px;
      z-index: 200;
      min-width: 200px;
      pointer-events: none;
    }
    #atom-info-card .info-title {
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      color: #7dd3fc;
    }
    #atom-info-card .info-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      color: #d0d0d0;
    }
    #atom-info-card .info-row span:last-child {
      color: #fbbf24;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="control-panel">
      <h3>控制面板</h3>
      <div class="control-item">
        <button class="control-btn" id="btn-reset">重置视角</button>
      </div>
      <div class="control-item">
        <div class="toggle-container">
          <span class="toggle-label">显示氢原子</span>
          <div class="toggle-switch active" id="toggle-hydrogen"></div>
        </div>
      </div>
      <div class="control-item">
        <button class="control-btn" id="btn-export-svg">导出 SVG</button>
      </div>
    </div>
    <div id="fps-counter">FPS: --</div>
    <div id="atom-info-card"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
