<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="交互式三维太阳系模拟器 - 探索行星轨道、相对大小和自转轴倾角" />
  <meta name="theme-color" content="#000000" />
  <title>太阳系 3D 模拟器 | Solar System Explorer</title>
  <style>
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 9999;
      font-family: 'Courier New', Consolas, monospace;
      color: #00d4ff;
      transition: opacity 0.5s ease-out;
    }
    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #loading-title {
      font-size: 24px;
      letter-spacing: 4px;
      color: #fdb813;
      text-shadow: 0 0 20px rgba(253, 184, 19, 0.6);
      margin-bottom: 20px;
    }
    #loading-ring {
      width: 50px;
      height: 50px;
      border: 2px solid rgba(0, 212, 255, 0.2);
      border-top: 2px solid #00d4ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div id="loading-title">SOLAR SYSTEM</div>
    <div id="loading-ring"></div>
  </div>

  <div id="app"></div>
  <div id="ui-overlay">
    <button id="mobile-toggle" class="mobile-toggle">⚙ 控制面板</button>
  </div>

  <script type="module" src="/src/main.ts"></script>

  <script>
    window.addEventListener('load', function () {
      setTimeout(function () {
        var loading = document.getElementById('loading');
        if (loading) loading.classList.add('hidden');
      }, 500);
    });

    (function () {
      var toggle = document.getElementById('mobile-toggle');
      if (!toggle) return;
      toggle.addEventListener('click', function () {
        var guis = document.querySelectorAll('.solar-gui');
        var isOpen = false;
        guis.forEach(function (g) {
          g.classList.toggle('open');
          if (g.classList.contains('open')) isOpen = true;
        });
        toggle.textContent = isOpen ? '✕ 收起' : '⚙ 控制面板';
      });
    })();
  </script>
</body>
</html>
