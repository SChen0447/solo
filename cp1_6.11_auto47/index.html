<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏳</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>时间胶囊 · 匿名心情共享</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body, #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family: 'Ma Shan Zheng', 'ZCOOL KuaiLe', cursive, system-ui, sans-serif;
      }
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at 50% 50%, #ff6b6b 0%, #8B0000 35%, #283593 75%, #1a237e 100%);
        z-index: 9999;
      }
      .splash-logo {
        font-size: 96px;
        animation: logoGlow 2.5s ease-in-out infinite, logoFloat 3s ease-in-out infinite;
        filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.8));
      }
      @keyframes logoGlow {
        0%, 100% { filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.6)); }
        50% { filter: drop-shadow(0 0 50px rgba(255, 215, 0, 1)) drop-shadow(0 0 80px rgba(255, 107, 107, 0.6)); }
      }
      @keyframes logoFloat {
        0%, 100% { transform: translateY(0px) rotate(-5deg); }
        50% { transform: translateY(-20px) rotate(5deg); }
      }
      .splash-text {
        margin-top: 48px;
        font-size: 24px;
        color: #FFD700;
        letter-spacing: 4px;
        text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        animation: textPulse 1.5s ease-in-out infinite;
        font-family: 'Ma Shan Zheng', cursive;
      }
      @keyframes textPulse {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
      }
      .splash-ripple {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100px;
        height: 100px;
        border: 2px solid rgba(255, 215, 0, 0.4);
        border-radius: 50%;
        animation: rippleExpand 2s ease-out infinite;
      }
      .splash-ripple:nth-child(2) { animation-delay: 0.5s; }
      .splash-ripple:nth-child(3) { animation-delay: 1s; }
      .splash-ripple:nth-child(4) { animation-delay: 1.5s; }
      @keyframes rippleExpand {
        0% { width: 50px; height: 50px; opacity: 1; }
        100% { width: 500px; height: 500px; opacity: 0; }
      }
      .splash-hide {
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.5s ease, visibility 0.5s;
      }
    </style>
  </head>
  <body>
    <div id="splash-screen">
      <div class="splash-ripple"></div>
      <div class="splash-ripple"></div>
      <div class="splash-ripple"></div>
      <div class="splash-ripple"></div>
      <div class="splash-logo">⏳</div>
      <div class="splash-text">正在定位时空坐标...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
