<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>记忆修复师 - Memory Mender</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      color: #e0e0ff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Loading overlay */
    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease-out;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-ring {
      width: 80px;
      height: 80px;
      border: 4px solid transparent;
      border-top: 4px solid #a8d8ea;
      border-right: 4px solid #aa96da;
      border-bottom: 4px solid #fcbad3;
      border-left: 4px solid #ffffd2;
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
      box-shadow: 0 0 30px rgba(168, 216, 234, 0.4);
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loader-text {
      margin-top: 24px;
      font-size: 16px;
      letter-spacing: 4px;
      color: #a8d8ea;
      opacity: 0.85;
    }

    /* Progress bar */
    #progress-container {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      width: 50%;
      min-width: 400px;
      z-index: 100;
    }

    #progress-bar {
      position: relative;
      width: 100%;
      height: 6px;
      background: rgba(60, 60, 90, 0.6);
      border-radius: 3px;
      overflow: hidden;
      backdrop-filter: blur(4px);
    }

    #progress-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6b6b8a 0%, #7eb8da 50%, #a8d8ea 100%);
      border-radius: 3px;
      transition: width 0.5s ease-out;
      box-shadow: 0 0 10px rgba(168, 216, 234, 0.5);
    }

    #progress-markers {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 0;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .progress-marker {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(168, 216, 234, 0.25);
      transform: translate(-50%, -50%);
      transition: all 0.4s ease;
      box-shadow: 0 0 4px rgba(168, 216, 234, 0.3);
    }

    .progress-marker.lit {
      background: #d4af37;
      box-shadow: 0 0 10px rgba(212, 175, 55, 0.8), 0 0 20px rgba(212, 175, 55, 0.4);
    }

    /* Reset button */
    #reset-btn {
      position: fixed;
      right: calc(50% - 30vw + 50px);
      bottom: calc(50% - 20vh + 20px);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #a8d8ea;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      z-index: 100;
    }

    #reset-btn:hover {
      width: 50px;
      height: 50px;
      border-color: rgba(212, 175, 55, 0.8);
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
      color: #d4af37;
    }

    #reset-btn svg {
      width: 20px;
      height: 20px;
      transition: transform 0.3s ease;
    }

    #reset-btn:hover svg {
      transform: rotate(-180deg);
    }

    /* Screen size warning */
    #size-warning {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(26, 26, 46, 0.98);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      text-align: center;
      padding: 20px;
    }

    #size-warning h2 {
      font-size: 24px;
      color: #fcbad3;
      margin-bottom: 12px;
    }

    #size-warning p {
      font-size: 14px;
      color: #a8d8ea;
      opacity: 0.8;
    }

    @media (max-width: 800px), (max-height: 600px) {
      #size-warning {
        display: flex;
      }
    }

    /* Instructions */
    #instructions {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: 12px;
      color: rgba(168, 216, 234, 0.6);
      letter-spacing: 1px;
      z-index: 50;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="size-warning">
    <div>
      <h2>请使用更大的屏幕</h2>
      <p>本应用需要至少 800 × 600 像素的显示区域</p>
    </div>
  </div>

  <div id="app">
    <div id="canvas-container"></div>

    <div id="progress-container">
      <div id="progress-bar">
        <div id="progress-fill"></div>
        <div id="progress-markers"></div>
      </div>
    </div>

    <button id="reset-btn" title="重置">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
    </button>

    <div id="instructions">将记忆碎片拖入镜框 · 修复完成后可滚轮缩放、拖拽旋转</div>
  </div>

  <div id="loading-overlay">
    <div class="loader-ring"></div>
    <div class="loader-text">唤 醒 记 忆</div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
