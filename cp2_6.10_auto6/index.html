<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowBoard - 生产力看板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="app">
    <nav class="navbar">
      <div class="nav-brand">
        <span class="brand-dot"></span>
        <span class="brand-name">FlowBoard</span>
      </div>
      <div class="nav-tabs" role="tablist">
        <button class="nav-tab active" data-view="board" role="tab" aria-selected="true">
          <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
          <span>看板</span>
        </button>
        <button class="nav-tab" data-view="calendar" role="tab" aria-selected="false">
          <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          <span>日历</span>
        </button>
      </div>
      <button class="notes-toggle" id="notesToggle" aria-label="切换笔记面板">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      </button>
    </nav>

    <main class="main-content">
      <section id="boardView" class="view active">
        <div class="stats-panel" id="statsPanel"></div>
        <div class="board-container">
          <div class="quadrant quadrant-q1" data-quadrant="Q1">
            <div class="quadrant-header">
              <span class="quadrant-dot"></span>
              <h3 class="quadrant-title">紧急且重要</h3>
              <span class="quadrant-count" id="countQ1">0</span>
            </div>
            <div class="quadrant-items" data-quadrant="Q1"></div>
            <button class="add-item-btn" data-quadrant="Q1" aria-label="添加任务">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              添加任务
            </button>
          </div>
          <div class="quadrant quadrant-q2" data-quadrant="Q2">
            <div class="quadrant-header">
              <span class="quadrant-dot"></span>
              <h3 class="quadrant-title">重要不紧急</h3>
              <span class="quadrant-count" id="countQ2">0</span>
            </div>
            <div class="quadrant-items" data-quadrant="Q2"></div>
            <button class="add-item-btn" data-quadrant="Q2" aria-label="添加任务">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              添加任务
            </button>
          </div>
          <div class="quadrant quadrant-q3" data-quadrant="Q3">
            <div class="quadrant-header">
              <span class="quadrant-dot"></span>
              <h3 class="quadrant-title">紧急不重要</h3>
              <span class="quadrant-count" id="countQ3">0</span>
            </div>
            <div class="quadrant-items" data-quadrant="Q3"></div>
            <button class="add-item-btn" data-quadrant="Q3" aria-label="添加任务">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              添加任务
            </button>
          </div>
          <div class="quadrant quadrant-q4" data-quadrant="Q4">
            <div class="quadrant-header">
              <span class="quadrant-dot"></span>
              <h3 class="quadrant-title">不重要不紧急</h3>
              <span class="quadrant-count" id="countQ4">0</span>
            </div>
            <div class="quadrant-items" data-quadrant="Q4"></div>
            <button class="add-item-btn" data-quadrant="Q4" aria-label="添加任务">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              添加任务
            </button>
          </div>
        </div>
      </section>

      <section id="calendarView" class="view">
        <div class="calendar-header">
          <button class="cal-nav-btn" id="prevMonth" aria-label="上个月">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <h2 class="cal-title" id="calTitle">2025年1月</h2>
          <button class="cal-nav-btn" id="nextMonth" aria-label="下个月">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
          <button class="cal-today-btn" id="todayBtn">今天</button>
        </div>
        <div class="calendar-weekdays">
          <div>周日</div><div>周一</div><div>周二</div><div>周三</div><div>周四</div><div>周五</div><div>周六</div>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </section>
    </main>

    <aside class="notes-panel" id="notesPanel">
      <div class="notes-header">
        <h3>速记笔记</h3>
        <button class="notes-close" id="notesClose" aria-label="关闭笔记">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="notes-search">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="noteSearch" placeholder="搜索笔记..." />
      </div>
      <div class="notes-list" id="notesList"></div>
      <div class="note-editor">
        <div class="editor-toolbar">
          <button type="button" data-action="bold" title="加粗"><strong>B</strong></button>
          <button type="button" data-action="italic" title="斜体"><em>I</em></button>
          <button type="button" data-action="strikethrough" title="删除线"><s>S</s></button>
          <span class="tb-sep"></span>
          <button type="button" data-action="h1" title="标题1">H1</button>
          <button type="button" data-action="h2" title="标题2">H2</button>
          <span class="tb-sep"></span>
          <button type="button" data-action="ul" title="无序列表">• 列表</button>
          <button type="button" data-action="ol" title="有序列表">1. 列表</button>
          <button type="button" data-action="todo" title="待办事项">☐ 待办</button>
          <span class="tb-sep"></span>
          <button type="button" data-action="code" title="代码行">&lt;/&gt;</button>
          <button type="button" data-action="quote" title="引用">&ldquo;</button>
        </div>
        <input type="text" id="noteTitle" placeholder="笔记标题..." class="note-title-input" />
        <textarea id="noteContent" placeholder="在此输入笔记内容，支持 Markdown..." class="note-content-input"></textarea>
        <div class="editor-actions">
          <button class="btn-primary" id="saveNoteBtn">保存笔记</button>
          <button class="btn-ghost" id="newNoteBtn">新建</button>
        </div>
      </div>
    </aside>

    <div class="modal-backdrop" id="modalBackdrop" hidden>
      <div class="modal" id="taskModal" role="dialog" aria-modal="true">
        <div class="modal-header">
          <h3 id="modalTitle">新建任务</h3>
          <button class="modal-close" id="modalClose" aria-label="关闭">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="form-field">
            <label for="taskTitleInput">标题</label>
            <input type="text" id="taskTitleInput" placeholder="任务标题..." />
          </div>
          <div class="form-field">
            <label for="taskDescInput">描述</label>
            <textarea id="taskDescInput" placeholder="任务描述（可选）..." rows="3"></textarea>
          </div>
          <div class="form-row">
            <div class="form-field">
              <label for="taskPriority">优先级</label>
              <select id="taskPriority">
                <option value="high">高优先级</option>
                <option value="medium" selected>中优先级</option>
                <option value="low">低优先级</option>
              </select>
            </div>
            <div class="form-field">
              <label for="taskQuadrant">象限</label>
              <select id="taskQuadrant">
                <option value="Q1">紧急且重要</option>
                <option value="Q2">重要不紧急</option>
                <option value="Q3">紧急不重要</option>
                <option value="Q4">不重要不紧急</option>
              </select>
            </div>
          </div>
          <div class="form-field">
            <label for="taskDueDate">截止日期</label>
            <input type="date" id="taskDueDate" />
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-ghost" id="modalCancel">取消</button>
          <button class="btn-primary" id="modalSave">保存</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
