<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>探寻失落的亚特兰蒂斯</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
      font-family: 'Georgia', serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #intro-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }
    #intro-overlay.show {
      opacity: 1;
    }
    #intro-overlay.hide {
      opacity: 0;
      pointer-events: none;
    }
    #intro-text {
      color: #ffffff;
      font-size: 48px;
      font-family: 'Georgia', serif;
      font-style: italic;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
      transform: scale(0.5);
      opacity: 0;
      transition: transform 1.5s cubic-bezier(0.22, 1, 0.36, 1), opacity 1s ease-in-out;
    }
    #intro-text.show {
      transform: scale(1);
      opacity: 1;
    }
    #intro-text.fade-out {
      opacity: 0;
    }
    #info-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 200px;
      background: rgba(10, 42, 58, 0.5);
      border-radius: 10px;
      padding: 15px;
      color: #ffffff;
      font-size: 14px;
      font-family: 'Georgia', serif;
      z-index: 100;
      backdrop-filter: blur(5px);
      line-height: 1.8;
    }
    #info-panel .label {
      color: rgba(255, 255, 255, 0.6);
    }
    #info-panel .value {
      color: #ffeebb;
    }
    #reset-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #ffddbb;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      font-size: 18px;
      color: #5a3a1a;
      transition: transform 0.3s ease, background-color 0.3s ease;
      z-index: 100;
      box-shadow: 0 4px 15px rgba(255, 221, 187, 0.4);
    }
    #reset-btn:hover {
      transform: scale(1.2);
      background: #ffccaa;
    }
    #reset-btn svg {
      width: 20px;
      height: 20px;
    }
  </style>
</head>
<body>
  <div id="intro-overlay" class="show">
    <div id="intro-text">探寻失落的亚特兰蒂斯</div>
  </div>
  <div id="app"></div>
  <div id="info-panel" style="display: none;">
    <div><span class="label">视角 X:</span> <span class="value" id="camera-x">0.0</span></div>
    <div><span class="label">视角 Y:</span> <span class="value" id="camera-y">5.0</span></div>
    <div><span class="label">视角 Z:</span> <span class="value" id="camera-z">20.0</span></div>
    <div><span class="label">光束强度:</span> <span class="value" id="beam-intensity">50%</span></div>
  </div>
  <button id="reset-btn" style="display: none;" title="重置视角">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
      <path d="M3 3v5h5"/>
    </svg>
  </button>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
