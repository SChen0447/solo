<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>虚拟化石挖掘与拼合</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0D0D1A;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      color: #ffffff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      box-shadow: inset 0 0 120px 40px rgba(0, 0, 0, 0.6);
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #canvas-container canvas {
      display: block;
    }

    .hint-panel {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(20, 20, 20, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      padding: 12px 16px;
      color: #ffffff;
      font-size: 15px;
      min-width: 240px;
      opacity: 1;
      transition: opacity 0.3s ease-out;
      pointer-events: none;
      z-index: 10;
    }

    .hint-panel .hint-title {
      font-weight: 600;
      margin-bottom: 6px;
      color: #FFD700;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .hint-panel .hint-text {
      line-height: 1.5;
    }

    .hint-panel .hint-count {
      margin-top: 8px;
      font-size: 13px;
      color: #aaa;
    }

    .hint-panel.fade {
      opacity: 0;
    }

    .info-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 200px;
      background: rgba(30, 30, 30, 0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 16px;
      z-index: 10;
    }

    .info-panel .panel-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 14px;
      color: #FFD700;
      text-align: center;
    }

    .info-panel .stats-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 6px;
      color: #ccc;
    }

    .info-panel .stats-row span:last-child {
      color: #fff;
      font-weight: 600;
    }

    .info-panel .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
      margin: 12px 0;
    }

    .info-panel .group-progress {
      margin-bottom: 10px;
    }

    .info-panel .group-label {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
    }

    .info-panel .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .info-panel .progress-fill {
      height: 100%;
      border-radius: 3px;
      width: 0%;
      transition: width 0.4s ease-out;
    }

    .info-panel .progress-fill.skull { background: #FF6B6B; }
    .info-panel .progress-fill.torso { background: #4ECDC4; }
    .info-panel .progress-fill.limbs { background: #45B7D1; }

    .info-panel .reset-btn {
      width: 100%;
      margin-top: 14px;
      padding: 10px;
      background: #FF6B6B;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease-out, transform 0.2s ease-out;
    }

    .info-panel .reset-btn:hover {
      background: #FF8585;
      transform: translateY(-1px);
    }

    .info-panel .reset-btn:active {
      transform: translateY(0);
    }

    .controls-hint {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: rgba(20, 20, 20, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      color: #ccc;
      z-index: 10;
      pointer-events: none;
    }

    .controls-hint div {
      margin: 3px 0;
    }

    .controls-hint .key {
      display: inline-block;
      background: rgba(255, 255, 255, 0.15);
      padding: 1px 6px;
      border-radius: 4px;
      margin-right: 6px;
      color: #FFD700;
      font-weight: 600;
    }

    .glow-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      box-shadow: inset 0 0 0 0 rgba(255, 215, 0, 0);
      z-index: 5;
    }

    .glow-overlay.active {
      animation: edgeGlow 1s ease-out;
    }

    @keyframes edgeGlow {
      0% { box-shadow: inset 0 0 0 0 rgba(255, 215, 0, 0); }
      30% { box-shadow: inset 0 0 80px 20px rgba(255, 215, 0, 0.4); }
      100% { box-shadow: inset 0 0 0 0 rgba(255, 215, 0, 0); }
    }

    @media (max-width: 768px) {
      .info-panel {
        top: auto;
        bottom: 100px;
        right: 0;
        left: 0;
        width: 100%;
        height: 80px;
        border-radius: 0;
        padding: 10px 16px;
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .info-panel .panel-title {
        margin-bottom: 0;
        font-size: 14px;
        white-space: nowrap;
      }

      .info-panel .stats-row {
        margin-bottom: 0;
        white-space: nowrap;
      }

      .info-panel .divider {
        width: 1px;
        height: 40px;
        margin: 0;
      }

      .info-panel .group-progress {
        flex: 1;
        margin-bottom: 0;
        min-width: 60px;
      }

      .info-panel .reset-btn {
        margin-top: 0;
        width: auto;
        padding: 6px 14px;
        font-size: 12px;
      }

      .hint-panel {
        font-size: 13px;
        bottom: 190px;
      }

      .controls-hint {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="glow-overlay" class="glow-overlay"></div>
    <div id="hint-panel" class="hint-panel">
      <div class="hint-title">操作提示</div>
      <div class="hint-text">点击沙地挖掘化石碎片</div>
      <div class="hint-count">碎片: 0/10 已拼合: 0/10</div>
    </div>
    <div id="info-panel" class="info-panel">
      <div class="panel-title">🦴 挖掘进度</div>
      <div class="stats-row"><span>碎片总数</span><span id="stat-total">10</span></div>
      <div class="stats-row"><span>已挖掘</span><span id="stat-dug">0</span></div>
      <div class="stats-row"><span>已拼合</span><span id="stat-assembled">0</span></div>
      <div class="divider"></div>
      <div class="group-progress">
        <div class="group-label"><span>头骨组</span><span id="skull-count">0/3</span></div>
        <div class="progress-bar"><div id="skull-progress" class="progress-fill skull"></div></div>
      </div>
      <div class="group-progress">
        <div class="group-label"><span>躯干组</span><span id="torso-count">0/4</span></div>
        <div class="progress-bar"><div id="torso-progress" class="progress-fill torso"></div></div>
      </div>
      <div class="group-progress">
        <div class="group-label"><span>四肢组</span><span id="limbs-count">0/3</span></div>
        <div class="progress-bar"><div id="limbs-progress" class="progress-fill limbs"></div></div>
      </div>
      <button id="reset-btn" class="reset-btn">重新开始</button>
    </div>
    <div class="controls-hint">
      <div><span class="key">点击</span>挖掘沙地</div>
      <div><span class="key">按住拖拽</span>移动碎片</div>
      <div><span class="key">滚轮</span>旋转碎片</div>
      <div><span class="key">松开</span>放置碎片</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
