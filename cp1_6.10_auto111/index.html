<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23bb86fc' width='100' height='100' rx='20'/%3E%3Cpath fill='white' d='M20 20h15v15H20zm25 0h15v15H45zm25 0h10v15H70zM20 45h15v15H20zm50 45h15V70H70zM45 45h15v15H45z'/%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>艺术门票 · Artistic QR Ticket</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { height: 100%; }
      body {
        background: #121212;
        color: #e0e0e0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      }
      .skeleton {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 1.5rem;
      }
      .skeleton-logo {
        width: 64px;
        height: 64px;
        background: linear-gradient(135deg, #bb86fc, #3f8efc);
        border-radius: 16px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      .skeleton-text {
        width: 200px;
        height: 16px;
        background: #1e1e1e;
        border-radius: 8px;
        animation: pulse 1.5s ease-in-out infinite 0.2s;
      }
      .skeleton-sub {
        width: 140px;
        height: 12px;
        background: #1e1e1e;
        border-radius: 6px;
        animation: pulse 1.5s ease-in-out infinite 0.4s;
      }
      .loader-ring {
        width: 40px;
        height: 40px;
        border: 3px solid #1e1e1e;
        border-top-color: #bb86fc;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.8; }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="skeleton">
        <div class="skeleton-logo"></div>
        <div class="loader-ring"></div>
        <div class="skeleton-text"></div>
        <div class="skeleton-sub"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
