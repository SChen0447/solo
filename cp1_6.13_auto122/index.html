<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>律动·声痕 | Rhythm Sound Trace</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
        font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        color: #ffffff;
        user-select: none;
        -webkit-user-select: none;
      }
      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }
      .welcome-halo {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 0;
        height: 0;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.1) 40%, transparent 70%);
        pointer-events: none;
        z-index: 9999;
        animation: haloExpand 1.8s ease-out forwards;
      }
      @keyframes haloExpand {
        0% {
          width: 0;
          height: 0;
          opacity: 1;
        }
        60% {
          opacity: 0.8;
        }
        100% {
          width: 600px;
          height: 600px;
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="welcome-halo"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
