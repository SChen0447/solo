<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>几何画板 - Geometry Canvas</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f0f1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #main-canvas {
      display: block;
      cursor: crosshair;
    }

    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #00d4ff;
      font-size: 18px;
      letter-spacing: 2px;
      z-index: 9999;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    .hidden {
      display: none !important;
    }

    #toolbar {
      position: fixed;
      left: 24px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 100;
      transition: transform 0.3s ease-out, opacity 0.3s ease-out;
    }

    .toolbar-btn {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: rgba(255, 255, 255, 0.75);
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s ease-out, transform 0.3s ease-out, box-shadow 0.3s ease-out;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .toolbar-btn:hover {
      background: rgba(0, 212, 255, 0.2);
      transform: scale(1.08);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
      color: #fff;
    }

    .toolbar-btn:active {
      transform: scale(0.95);
    }

    #stats-panel {
      position: fixed;
      right: 24px;
      top: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 16px 20px;
      background: rgba(15, 15, 26, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 100;
      min-width: 160px;
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
    }

    .stat-label {
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-weight: 600;
      color: #00d4ff;
      font-size: 16px;
      font-variant-numeric: tabular-nums;
      display: inline-block;
      min-width: 50px;
      text-align: right;
    }

    .stat-value.animate {
      animation: statPop 0.4s ease-out;
    }

    @keyframes statPop {
      0% {
        opacity: 0;
        transform: translateY(8px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #menu-toggle {
      display: none;
      position: fixed;
      left: 16px;
      top: 16px;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.8);
      font-size: 20px;
      cursor: pointer;
      z-index: 101;
      align-items: center;
      justify-content: center;
      transition: background 0.3s ease-out;
    }

    #menu-toggle:hover {
      background: rgba(0, 212, 255, 0.2);
    }

    @media (max-width: 768px) {
      #menu-toggle {
        display: flex;
      }

      #toolbar {
        left: 16px;
        top: 70px;
        transform: translateY(0);
        transform-origin: top left;
        opacity: 0;
        pointer-events: none;
        transform: translateY(-10px) scale(0.95);
      }

      #toolbar.visible {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0) scale(1);
      }

      #stats-panel {
        right: 12px;
        top: 12px;
        padding: 12px 16px;
        min-width: 140px;
      }

      .toolbar-btn {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="loading">加载中...</div>

  <div id="canvas-container">
    <canvas id="main-canvas"></canvas>
  </div>

  <button id="menu-toggle" aria-label="菜单">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="3" y1="6" x2="21" y2="6"></line>
      <line x1="3" y1="12" x2="21" y2="12"></line>
      <line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
  </button>

  <div id="toolbar">
    <button class="toolbar-btn" id="btn-reset" title="重置画布">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
        <path d="M3 3v5h5"></path>
      </svg>
    </button>
    <button class="toolbar-btn" id="btn-undo" title="撤销">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7v6h6"></path>
        <path d="M21 17a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 13"></path>
      </svg>
    </button>
    <button class="toolbar-btn" id="btn-export" title="导出PNG">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="7 10 12 15 17 10"></polyline>
        <line x1="12" y1="15" x2="12" y2="3"></line>
      </svg>
    </button>
  </div>

  <div id="stats-panel">
    <div class="stat-item">
      <span class="stat-label">节点数</span>
      <span class="stat-value" id="stat-nodes">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">连线数</span>
      <span class="stat-value" id="stat-connections">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">缩放</span>
      <span class="stat-value" id="stat-zoom">100%</span>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
