<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2D Pool Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #1E1E1E;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }

    #app {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #gameContainer {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #scorePanel {
      width: 100%;
      height: 50px;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      color: #ffffff;
      font-size: 20px;
      font-family: 'Courier New', monospace;
    }

    #scorePanel .item {
      display: flex;
      gap: 40px;
    }

    #canvas {
      display: block;
      background: #35654D;
      box-shadow: 8px 8px 6px rgba(0, 0, 0, 0.5);
    }

    #resetBtn {
      position: absolute;
      top: 60px;
      right: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #F0A500;
      color: #ffffff;
      border: none;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #resetBtn:hover {
      transform: scale(1.08);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="gameContainer">
      <div id="scorePanel">
        <div class="item">
          <span>得分: <span id="scoreValue">0</span></span>
          <span>剩余球: <span id="remainingValue">15</span></span>
          <span>白球重置: <span id="resetValue">0</span></span>
        </div>
      </div>
      <button id="resetBtn" title="重置游戏">↺</button>
      <canvas id="canvas" width="1000" height="500"></canvas>
    </div>
  </div>
  <script type="module" src="/src/GameEngine.ts"></script>
</body>
</html>
