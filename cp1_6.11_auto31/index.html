<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D植物生长模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #0a3d2e 0%, #0a1628 100%);
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #0a3d2e 0%, #0a1628 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.5s ease;
    }

    .loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .plant-icon {
      width: 80px;
      height: 80px;
      animation: spin 2s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: #2ecc71;
      margin-top: 20px;
      font-size: 16px;
      letter-spacing: 2px;
    }

    .control-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 240px;
      background: rgba(10, 61, 46, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid rgba(46, 204, 113, 0.2);
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .panel-title {
      color: #2ecc71;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      text-shadow: 0 0 10px rgba(46, 204, 113, 0.5);
    }

    .sow-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
      box-shadow: 0 0 15px rgba(46, 204, 113, 0.4);
      margin-bottom: 20px;
    }

    .sow-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 25px rgba(46, 204, 113, 0.6);
    }

    .sow-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .preset-buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .preset-btn {
      flex: 1;
      padding: 8px 6px;
      background: rgba(46, 204, 113, 0.15);
      border: 1px solid rgba(46, 204, 113, 0.3);
      border-radius: 6px;
      color: #2ecc71;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    .preset-btn:hover {
      background: rgba(46, 204, 113, 0.3);
      box-shadow: 0 0 10px rgba(46, 204, 113, 0.3);
    }

    .param-display {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(46, 204, 113, 0.2);
    }

    .param-item {
      display: flex;
      justify-content: space-between;
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .param-value {
      color: #2ecc71;
      font-weight: 600;
    }

    :root {
      --tp-base-background-color: transparent;
      --tp-base-shadow-color: transparent;
      --tp-button-background-color: rgba(46, 204, 113, 0.2);
      --tp-button-background-color-active: rgba(46, 204, 113, 0.4);
      --tp-button-background-color-focus: rgba(46, 204, 113, 0.4);
      --tp-button-background-color-hover: rgba(46, 204, 113, 0.3);
      --tp-button-foreground-color: #2ecc71;
      --tp-container-background-color: rgba(0, 0, 0, 0.2);
      --tp-container-background-color-active: rgba(0, 0, 0, 0.3);
      --tp-container-background-color-focus: rgba(0, 0, 0, 0.3);
      --tp-container-background-color-hover: rgba(0, 0, 0, 0.25);
      --tp-container-foreground-color: rgba(255, 255, 255, 0.7);
      --tp-groove-foreground-color: rgba(255, 255, 255, 0.1);
      --tp-input-background-color: rgba(0, 0, 0, 0.3);
      --tp-input-background-color-active: rgba(0, 0, 0, 0.4);
      --tp-input-background-color-focus: rgba(0, 0, 0, 0.4);
      --tp-input-background-color-hover: rgba(0, 0, 0, 0.35);
      --tp-input-foreground-color: white;
      --tp-label-foreground-color: rgba(255, 255, 255, 0.8);
      --tp-monitor-background-color: rgba(0, 0, 0, 0.3);
      --tp-monitor-foreground-color: #2ecc71;
    }

    .tp-dfwv {
      width: 100% !important;
    }

    @media (max-width: 768px) {
      .control-panel {
        top: auto;
        left: 10px;
        right: 10px;
        bottom: 10px;
        width: auto;
        padding: 12px;
      }

      .panel-title {
        font-size: 14px;
        margin-bottom: 10px;
      }

      .sow-btn {
        padding: 10px;
        font-size: 12px;
        margin-bottom: 12px;
      }

      .preset-buttons {
        margin-bottom: 12px;
      }

      .param-display {
        margin-top: 10px;
        padding-top: 10px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading-screen" id="loading-screen">
      <svg class="plant-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 90 L50 50" stroke="#2ecc71" stroke-width="4" stroke-linecap="round"/>
        <path d="M50 70 Q30 65 25 50 Q35 55 50 60" stroke="#2ecc71" stroke-width="3" stroke-linecap="round" fill="rgba(46, 204, 113, 0.3)"/>
        <path d="M50 55 Q70 50 75 35 Q65 40 50 45" stroke="#2ecc71" stroke-width="3" stroke-linecap="round" fill="rgba(46, 204, 113, 0.3)"/>
        <path d="M50 40 Q35 35 30 20 Q42 27 50 32" stroke="#2ecc71" stroke-width="3" stroke-linecap="round" fill="rgba(46, 204, 113, 0.3)"/>
        <circle cx="50" cy="50" r="45" stroke="#2ecc71" stroke-width="2" opacity="0.3"/>
      </svg>
      <div class="loading-text">加载中...</div>
    </div>
    <div id="canvas-container"></div>
    <div class="control-panel" id="control-panel">
      <div class="panel-title">🌱 植物生长控制</div>
      <button class="sow-btn" id="sow-btn">播种</button>
      <div class="preset-buttons">
        <button class="preset-btn" data-preset="drought">干旱</button>
        <button class="preset-btn" data-preset="temperate">温带</button>
        <button class="preset-btn" data-preset="rainforest">雨林</button>
      </div>
      <div id="tweakpane-container"></div>
      <div class="param-display">
        <div class="param-item"><span>光照强度</span><span class="param-value" id="light-value">50</span></div>
        <div class="param-item"><span>水分含量</span><span class="param-value" id="water-value">60</span></div>
        <div class="param-item"><span>环境温度</span><span class="param-value" id="temp-value">22°C</span></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
