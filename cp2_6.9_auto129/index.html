<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>像素赛车游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000000;
      font-family: 'Courier New', monospace;
    }

    #game-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #000000;
    }

    #game-canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
    }

    #score-panel {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 60px;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      pointer-events: none;
    }

    #score-display {
      color: #FFFFFF;
      font-size: 18px;
      font-family: 'Courier New', monospace;
      text-shadow: 2px 2px 0 #000000;
      transition: transform 0.2s ease-out;
    }

    #score-display.pop {
      transform: scale(1.2);
    }

    #speed-display {
      color: #F1C40F;
      font-size: 14px;
      font-family: 'Courier New', monospace;
      text-shadow: 1px 1px 0 #000000;
    }

    #hint-text {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      color: #95A5A6;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      opacity: 0.7;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="1280" height="720"></canvas>
  </div>
  <div id="score-panel">
    <span id="score-display">分数: 0</span>
    <span id="speed-display">速度: 4.0</span>
  </div>
  <div id="hint-text">箭头键移动 · 上下加速减速</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
