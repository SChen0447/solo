<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>像素海岛建造</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a2a1a;
      font-family: 'Courier New', monospace;
      image-rendering: pixelated;
    }
    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #resource-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 48px;
      background: rgba(40, 40, 40, 0.4);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 0 20px;
      z-index: 10;
      border-bottom: 2px solid rgba(255, 255, 255, 0.1);
    }
    .resource-item {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #e0e0e0;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .resource-icon {
      width: 20px;
      height: 20px;
      image-rendering: pixelated;
    }
    .resource-value {
      display: inline-block;
      min-width: 36px;
      text-align: right;
      transition: transform 0.15s ease, color 0.3s ease;
    }
    .resource-value.bounce {
      transform: scale(1.3);
    }
    .resource-value.flash-green {
      color: #66ff66;
    }
    .resource-value.flash-red {
      color: #ff6666;
    }
    #action-panel {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
    }
    .action-btn {
      background: rgba(40, 40, 40, 0.6);
      backdrop-filter: blur(6px);
      color: #e0e0e0;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      padding: 8px 14px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
      transition: transform 0.1s ease, background 0.15s ease, border-color 0.15s ease;
      user-select: none;
    }
    .action-btn:hover {
      background: rgba(80, 80, 80, 0.7);
      border-color: rgba(255, 255, 255, 0.4);
    }
    .action-btn:active {
      transform: scale(0.9);
      background: rgba(120, 120, 120, 0.7);
    }
    .action-btn.selected {
      background: rgba(100, 140, 80, 0.7);
      border-color: #88cc66;
      color: #ffffff;
    }
    .action-btn .cost {
      font-size: 10px;
      color: #aaaaaa;
      display: block;
      margin-top: 2px;
    }
    #alert-bar {
      position: absolute;
      top: 52px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(180, 40, 40, 0.85);
      color: #ffffff;
      padding: 6px 20px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 1px;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    #alert-bar.visible {
      opacity: 1;
    }
    #info-panel {
      position: absolute;
      top: 52px;
      right: 12px;
      background: rgba(40, 40, 40, 0.5);
      backdrop-filter: blur(6px);
      color: #cccccc;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 12px;
      z-index: 10;
      min-width: 140px;
      display: none;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    #info-panel .info-title {
      color: #88cc66;
      font-weight: bold;
      margin-bottom: 4px;
    }
    #lighthouse-panel {
      position: absolute;
      bottom: 64px;
      right: 12px;
      background: rgba(40, 40, 40, 0.5);
      backdrop-filter: blur(6px);
      color: #cccccc;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 12px;
      z-index: 10;
      min-width: 160px;
      display: none;
      border: 1px solid rgba(255, 200, 100, 0.3);
    }
    #lighthouse-panel .lh-title {
      color: #ffcc44;
      font-weight: bold;
      margin-bottom: 4px;
    }
    #lighthouse-panel .lh-level {
      font-size: 16px;
      color: #ffffff;
      margin: 4px 0;
    }
    #lighthouse-panel .upgrade-btn {
      margin-top: 6px;
      background: rgba(200, 160, 40, 0.4);
      border: 1px solid rgba(255, 200, 100, 0.5);
      border-radius: 4px;
      color: #ffcc44;
      padding: 4px 10px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      font-weight: bold;
      transition: transform 0.1s ease, background 0.15s ease;
    }
    #lighthouse-panel .upgrade-btn:hover {
      background: rgba(200, 160, 40, 0.6);
    }
    #lighthouse-panel .upgrade-btn:active {
      transform: scale(0.9);
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="resource-bar">
      <div class="resource-item">
        <canvas class="resource-icon" id="icon-food" width="20" height="20"></canvas>
        <span class="resource-value" id="res-food">50</span>
      </div>
      <div class="resource-item">
        <canvas class="resource-icon" id="icon-wood" width="20" height="20"></canvas>
        <span class="resource-value" id="res-wood">30</span>
      </div>
      <div class="resource-item">
        <canvas class="resource-icon" id="icon-stone" width="20" height="20"></canvas>
        <span class="resource-value" id="res-stone">20</span>
      </div>
      <div class="resource-item">
        <canvas class="resource-icon" id="icon-gold" width="20" height="20"></canvas>
        <span class="resource-value" id="res-gold">50</span>
      </div>
    </div>
    <div id="alert-bar"></div>
    <div id="action-panel">
      <button class="action-btn" data-action="house">民居<span class="cost">10木 5石</span></button>
      <button class="action-btn" data-action="farm">农场<span class="cost">15木 10石</span></button>
      <button class="action-btn" data-action="mine">矿场<span class="cost">20木 15石</span></button>
      <button class="action-btn" data-action="warehouse">仓库<span class="cost">25木 20石</span></button>
      <button class="action-btn" data-action="demolish">拆除</button>
    </div>
    <div id="info-panel">
      <div class="info-title" id="info-title-text"></div>
      <div id="info-body-text"></div>
    </div>
    <div id="lighthouse-panel">
      <div class="lh-title">灯塔</div>
      <div class="lh-level" id="lh-level">等级: 1</div>
      <div id="lh-cost">升级: 100金 50木</div>
      <button class="upgrade-btn" id="lh-upgrade-btn">升级灯塔</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
