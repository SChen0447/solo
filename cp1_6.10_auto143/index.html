<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>化学反应三维可视化 - O₃ + Cl</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0e27;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #e0e1dd;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    #canvas-container canvas {
      display: block;
    }

    #state-label {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      color: #81b29a;
      letter-spacing: 2px;
      font-weight: 500;
      z-index: 10;
      transition: opacity 0.3s ease;
      text-shadow: 0 0 20px rgba(129, 178, 154, 0.3);
    }

    #energy-panel {
      position: fixed;
      top: 80px;
      right: 20px;
      width: 280px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 16px;
      z-index: 10;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    #energy-panel .panel-title {
      font-size: 14px;
      color: #e0e1dd;
      margin-bottom: 8px;
      opacity: 0.8;
    }

    #energy-chart {
      display: block;
    }

    #start-btn {
      position: fixed;
      left: 24px;
      bottom: 160px;
      padding: 12px 28px;
      font-size: 16px;
      color: #ffffff;
      background: linear-gradient(135deg, #2d6a4f 0%, #40916c 100%);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      z-index: 10;
      font-weight: 600;
      letter-spacing: 1px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 15px rgba(45, 106, 79, 0.3);
    }

    #start-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 25px rgba(45, 106, 79, 0.5);
    }

    #start-btn:active {
      transform: scale(1.02);
    }

    #controls {
      position: fixed;
      left: 24px;
      bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      z-index: 10;
    }

    .slider-control {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .slider-label {
      font-size: 14px;
      color: #e0e1dd;
      min-width: 110px;
      opacity: 0.85;
    }

    .slider-wrapper {
      position: relative;
      width: 200px;
      height: 24px;
      display: flex;
      align-items: center;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 200px;
      height: 4px;
      background: #3d405b;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      background: #81b29a;
      border-radius: 50%;
      cursor: pointer;
      transition: box-shadow 0.2s ease;
      border: none;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 12px rgba(129, 178, 154, 0.5);
    }

    input[type="range"]:active::-webkit-slider-thumb {
      box-shadow: 0 0 12px rgba(129, 178, 154, 0.8);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      background: #81b29a;
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }

    .slider-value {
      font-size: 14px;
      color: #ffffff;
      min-width: 36px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 800px) {
      #state-label {
        font-size: 14.4px;
        top: 16px;
      }

      #energy-panel {
        top: auto;
        right: 50%;
        bottom: 280px;
        transform: translateX(50%) scale(0.8);
        transform-origin: center bottom;
        width: 280px;
      }

      #start-btn {
        left: 50%;
        bottom: 260px;
        transform: translateX(-50%) scale(0.8);
        transform-origin: center;
        font-size: 12.8px;
        padding: 9.6px 22.4px;
      }

      #start-btn:hover {
        transform: translateX(-50%) scale(0.84);
      }

      #controls {
        left: 50%;
        bottom: 16px;
        transform: translateX(-50%) scale(0.8);
        transform-origin: center bottom;
        gap: 12.8px;
      }

      .slider-control {
        gap: 9.6px;
      }

      .slider-label {
        font-size: 11.2px;
        min-width: 88px;
      }

      .slider-wrapper,
      input[type="range"] {
        width: 160px;
      }

      .slider-value {
        font-size: 11.2px;
        min-width: 28.8px;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="state-label">初始状态</div>

  <div id="energy-panel">
    <canvas id="energy-chart"></canvas>
  </div>

  <button id="start-btn">开始反应</button>

  <div id="controls">
    <div class="slider-control">
      <span class="slider-label">反应物初始间距</span>
      <div class="slider-wrapper">
        <input type="range" id="distance-slider" min="2" max="8" step="0.1" value="4" />
      </div>
      <span class="slider-value" id="distance-value">4.0</span>
    </div>
    <div class="slider-control">
      <span class="slider-label">反应速率</span>
      <div class="slider-wrapper">
        <input type="range" id="speed-slider" min="0.5" max="2.0" step="0.1" value="1.0" />
      </div>
      <span class="slider-value" id="speed-value">1.0</span>
    </div>
    <div class="slider-control">
      <span class="slider-label">分子大小缩放</span>
      <div class="slider-wrapper">
        <input type="range" id="scale-slider" min="0.5" max="1.5" step="0.1" value="1.0" />
      </div>
      <span class="slider-value" id="scale-value">1.0</span>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
