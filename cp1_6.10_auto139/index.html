<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>符文激活谜题</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0f;
        touch-action: none;
        overscroll-behavior: none;
      }
      #game-container {
        width: 100vw;
        height: 100vh;
        background: #0a0a0f;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas {
        display: block;
        cursor: crosshair;
        background: #0a0a0f;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <canvas id="game-canvas"></canvas>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
