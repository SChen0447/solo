<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>像素飞行射击 - 关卡编辑器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a23;
      font-family: 'Press Start 2P', monospace;
      color: #ffffff;
      user-select: none;
      -webkit-user-select: none;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 50px;
      background: #1a1a3e;
      border-bottom: 2px solid #2a2a5e;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      flex-shrink: 0;
    }

    .topbar .title {
      font-size: 12px;
      color: #e94560;
      letter-spacing: 2px;
      margin-right: 20px;
    }

    .btn {
      background: #0f3460;
      color: #ffffff;
      border: 2px solid #2a2a5e;
      padding: 8px 14px;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn:hover {
      background: #16213e;
      border-color: #00ffff;
    }

    .btn.primary {
      background: #e94560;
      border-color: #e94560;
    }

    .btn.primary:hover {
      background: #ff6b8a;
      border-color: #ff6b8a;
    }

    .btn.success {
      background: #2d6a4f;
      border-color: #2d6a4f;
    }

    .btn.success:hover {
      background: #40916c;
      border-color: #40916c;
    }

    .btn.flash-green {
      animation: flashGreen 0.3s ease;
    }

    @keyframes flashGreen {
      0%, 100% { background: #2d6a4f; }
      50% { background: #52b788; box-shadow: 0 0 10px #52b788; }
    }

    .main-container {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .sidebar-left {
      width: 100px;
      background: #1a1a3e;
      border-right: 2px solid #2a2a5e;
      display: flex;
      flex-direction: column;
      padding: 10px 0;
      flex-shrink: 0;
      gap: 0;
    }

    .tool-btn {
      background: #0f3460;
      color: #ffffff;
      border: 2px solid transparent;
      padding: 14px 6px;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      cursor: pointer;
      text-align: center;
      border-bottom: 1px solid #00ffff;
      transition: all 0.15s ease;
      line-height: 1.4;
    }

    .tool-btn:first-child {
      border-top: 1px solid #00ffff;
    }

    .tool-btn:hover {
      background: #0f3460;
    }

    .tool-btn.active {
      border: 2px solid #e94560;
      background: #16213e;
    }

    .canvas-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: #0a0a23;
    }

    #editorCanvas {
      background: #1a1a2e;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: crosshair;
    }

    #editorCanvas.mode-select { cursor: default; }
    #editorCanvas.mode-move { cursor: move; }
    #editorCanvas.mode-place { cursor: copy; }
    #editorCanvas.mode-erase { cursor: not-allowed; }

    .sidebar-right {
      width: 200px;
      background: #1a1a3e;
      border-left: 2px solid #2a2a5e;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }

    .panel-title {
      font-size: 10px;
      color: #00ffff;
      padding: 12px 10px;
      border-bottom: 2px solid #2a2a5e;
      letter-spacing: 1px;
    }

    .element-library {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px;
      border-bottom: 2px solid #2a2a5e;
    }

    .element-item {
      background: #0f3460;
      border: 2px solid #2a2a5e;
      padding: 8px;
      cursor: grab;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.15s ease;
    }

    .element-item:hover {
      border-color: #00ffff;
      background: #16213e;
    }

    .element-item:active {
      cursor: grabbing;
    }

    .element-item.selected {
      border-color: #e94560;
      background: #16213e;
    }

    .element-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      image-rendering: pixelated;
    }

    .element-name {
      font-size: 8px;
      line-height: 1.3;
    }

    .property-panel {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .property-empty {
      font-size: 8px;
      color: #666;
      text-align: center;
      padding: 20px 0;
    }

    .property-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .property-label {
      font-size: 8px;
      color: #aaa;
    }

    .property-input,
    .property-select {
      background: #0a0a23;
      border: 2px solid #2a2a5e;
      color: #fff;
      padding: 6px 8px;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      width: 100%;
      transition: all 0.2s ease;
    }

    .property-input:focus,
    .property-select:focus {
      outline: none;
      border-color: #00ffff;
    }

    .status-bar {
      font-size: 8px;
      padding: 8px 10px;
      border-top: 2px solid #2a2a5e;
      min-height: 30px;
    }

    .status-bar.success { color: #52b788; }
    .status-bar.error { color: #e94560; }
    .status-bar.info { color: #aaa; }

    .bottombar {
      height: 44px;
      background: #1a1a3e;
      border-top: 2px solid #2a2a5e;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;
      flex-shrink: 0;
    }

    .bottombar .hint {
      font-size: 8px;
      color: #666;
      margin-left: 12px;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal {
      background: #1a1a3e;
      border: 2px solid #2a2a5e;
      border-radius: 8px;
      padding: 24px;
      min-width: 420px;
      max-width: 600px;
    }

    .modal-title {
      font-size: 12px;
      color: #e94560;
      margin-bottom: 16px;
    }

    .modal textarea {
      width: 100%;
      height: 160px;
      background: #0a0a23;
      border: 2px solid #2a2a5e;
      color: #fff;
      padding: 10px;
      font-family: monospace;
      font-size: 11px;
      resize: vertical;
      margin-bottom: 16px;
    }

    .modal textarea:focus {
      outline: none;
      border-color: #00ffff;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    /* Preview HUD */
    .preview-hud {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(26, 26, 62, 0.85);
      border: 2px solid #2a2a5e;
      padding: 10px 14px;
      font-size: 10px;
      display: none;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
    }

    .preview-hud.active { display: flex; }

    .hud-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hud-label {
      color: #00ffff;
      font-size: 8px;
    }

    .hud-value {
      color: #fff;
    }

    .hud-lives {
      display: flex;
      gap: 3px;
    }

    .hud-life {
      width: 10px;
      height: 10px;
      background: #e94560;
      clip-path: polygon(50% 0%, 100% 35%, 80% 100%, 20% 100%, 0% 35%);
    }

    .victory-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 20;
    }

    .victory-overlay.active {
      display: flex;
    }

    .victory-text {
      font-size: 36px;
      color: #ffd700;
      text-shadow: 0 0 20px #ffd700, 0 0 40px #ff8c00;
      animation: victoryBlink 0.8s infinite;
      letter-spacing: 6px;
    }

    @keyframes victoryBlink {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.05); }
    }

    .victory-btn {
      margin-top: 24px;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .main-container {
        flex-direction: column;
      }

      .sidebar-left {
        width: 100%;
        height: auto;
        flex-direction: row;
        border-right: none;
        border-bottom: 2px solid #2a2a5e;
        padding: 0;
      }

      .tool-btn {
        flex: 1;
        border-bottom: none;
        border-right: 1px solid #00ffff;
        padding: 10px 4px;
        font-size: 8px;
      }

      .tool-btn:first-child { border-top: none; }
      .tool-btn:last-child { border-right: none; }

      .sidebar-right {
        width: 100%;
        border-left: none;
        border-top: 2px solid #2a2a5e;
        max-height: 200px;
        flex-direction: row;
        overflow-x: auto;
      }

      .sidebar-right > * {
        min-width: 180px;
      }

      .element-library {
        flex-direction: row;
        overflow-x: auto;
        border-bottom: none;
        border-right: 2px solid #2a2a5e;
      }

      .element-item {
        flex-shrink: 0;
        width: 100px;
      }

      .property-panel {
        max-height: 180px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Top Bar -->
    <div class="topbar">
      <span class="title">PIXEL SHOOTER EDITOR</span>
      <button class="btn success" id="btnExport">导出JSON</button>
      <button class="btn" id="btnImport">导入JSON</button>
      <button class="btn primary" id="btnPreview">预览</button>
      <button class="btn" id="btnExitPreview" style="display:none;">退出预览</button>
    </div>

    <!-- Main Container -->
    <div class="main-container">
      <!-- Left Toolbar -->
      <div class="sidebar-left" id="toolbar">
        <button class="tool-btn active" data-tool="select">选择</button>
        <button class="tool-btn" data-tool="move">移动</button>
        <button class="tool-btn" data-tool="place">放置</button>
        <button class="tool-btn" data-tool="erase">橡皮擦</button>
      </div>

      <!-- Canvas Container -->
      <div class="canvas-container" id="canvasContainer">
        <canvas id="editorCanvas"></canvas>

        <!-- Preview HUD -->
        <div class="preview-hud" id="previewHud">
          <div class="hud-row">
            <span class="hud-label">分数</span>
            <span class="hud-value" id="hudScore">0</span>
          </div>
          <div class="hud-row">
            <span class="hud-label">生命</span>
            <div class="hud-lives" id="hudLives"></div>
          </div>
        </div>

        <!-- Victory Overlay -->
        <div class="victory-overlay" id="victoryOverlay">
          <div class="victory-text">VICTORY</div>
          <button class="btn primary victory-btn" id="btnVictoryExit">返回编辑器</button>
        </div>
      </div>

      <!-- Right Sidebar -->
      <div class="sidebar-right">
        <div class="panel-title">元素库</div>
        <div class="element-library" id="elementLibrary">
          <div class="element-item" draggable="true" data-element-type="enemy">
            <canvas class="element-icon" width="20" height="20" data-icon="enemy"></canvas>
            <span class="element-name">红色敌机</span>
          </div>
          <div class="element-item" draggable="true" data-element-type="obstacle">
            <canvas class="element-icon" width="20" height="20" data-icon="obstacle"></canvas>
            <span class="element-name">蓝色障碍</span>
          </div>
          <div class="element-item" draggable="true" data-element-type="item">
            <canvas class="element-icon" width="20" height="20" data-icon="item"></canvas>
            <span class="element-name">金色道具</span>
          </div>
          <div class="element-item" draggable="true" data-element-type="player">
            <canvas class="element-icon" width="20" height="20" data-icon="player"></canvas>
            <span class="element-name">玩家起点</span>
          </div>
        </div>

        <div class="panel-title">属性面板</div>
        <div class="property-panel" id="propertyPanel">
          <div class="property-empty">请选择一个元素</div>
        </div>

        <div class="status-bar info" id="statusBar">就绪</div>
      </div>
    </div>

    <!-- Bottom Bar -->
    <div class="bottombar">
      <button class="btn" id="btnUndo" title="撤销 (Ctrl+Z)">◀ 撤销</button>
      <button class="btn" id="btnRedo" title="重做 (Ctrl+Y)">重做 ▶</button>
      <span class="hint">Ctrl+Z 撤销 | Ctrl+Y 重做 | 滚轮缩放 | 拖拽移动视口</span>
    </div>
  </div>

  <!-- Import Modal -->
  <div class="modal-overlay" id="importModal" style="display:none;">
    <div class="modal">
      <div class="modal-title">导入关卡 JSON</div>
      <textarea id="importTextarea" placeholder="粘贴 JSON 数据..."></textarea>
      <div class="modal-actions">
        <button class="btn" id="btnCancelImport">取消</button>
        <button class="btn primary" id="btnConfirmImport">确认导入</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
