<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>时空回溯解谜</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #0F0F1A;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      overflow: hidden;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      position: relative;
    }

    #game-container {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #1A1A2E 0%, #16213E 100%);
      box-shadow: inset 0 0 20px #00E5FF33;
    }

    #game-canvas {
      display: block;
      background: linear-gradient(180deg, #1A1A2E 0%, #16213E 100%);
      cursor: crosshair;
    }

    #replay-bar {
      position: absolute;
      top: 20px;
      left: 20px;
      height: 40px;
      background: rgba(15, 15, 26, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px dashed rgba(0, 229, 255, 0.3);
      border-radius: 8px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      z-index: 10;
    }

    #replay-canvas {
      cursor: pointer;
    }

    #info-panel {
      width: 240px;
      background: rgba(15, 15, 26, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-left: 1px dashed rgba(0, 229, 255, 0.3);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
      z-index: 20;
    }

    .panel-section {
      background: rgba(22, 33, 62, 0.6);
      border: 1px dashed rgba(0, 229, 255, 0.3);
      border-radius: 8px;
      padding: 14px;
    }

    .section-title {
      color: #00E5FF;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .energy-bar {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .energy-orb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #00E5FF;
      background: radial-gradient(circle, rgba(0, 229, 255, 0.6) 0%, transparent 70%);
      transition: all 0.3s ease;
    }

    .energy-orb.empty {
      border-color: rgba(0, 229, 255, 0.3);
      background: transparent;
    }

    .timer {
      font-size: 28px;
      font-weight: bold;
      color: #FF6B6B;
      text-align: center;
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
    }

    .timer.warning {
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .goal-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
      font-size: 13px;
      line-height: 1.5;
    }

    .goal-item:last-child {
      border-bottom: none;
    }

    .goal-check {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 4px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
    }

    .goal-check.completed {
      border-color: #00FF88;
      background: rgba(0, 255, 136, 0.1);
      animation: slideIn 0.3s ease-out;
    }

    .goal-check.completed::after {
      content: '✓';
      color: #00FF88;
      font-size: 14px;
      font-weight: bold;
    }

    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .goal-text {
      flex: 1;
      color: rgba(255, 255, 255, 0.85);
    }

    .goal-text.completed {
      color: #00FF88;
    }

    .markers-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .marker-btn {
      background: rgba(0, 229, 255, 0.1);
      border: 1px dashed rgba(0, 229, 255, 0.4);
      border-radius: 6px;
      padding: 8px 12px;
      color: #00E5FF;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
    }

    .marker-btn:hover:not(:disabled) {
      background: rgba(0, 229, 255, 0.2);
      border-color: #00E5FF;
    }

    .marker-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .hint-text {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      line-height: 1.6;
    }

    #context-menu {
      position: fixed;
      display: none;
      background: rgba(15, 15, 26, 0.95);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px dashed rgba(0, 229, 255, 0.5);
      border-radius: 8px;
      padding: 6px;
      z-index: 100;
      min-width: 160px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    .menu-item {
      padding: 10px 14px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 13px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .menu-item:hover {
      background: rgba(0, 229, 255, 0.15);
      color: #00E5FF;
    }

    .menu-item:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .menu-icon {
      font-size: 14px;
    }

    #game-message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 36px;
      font-weight: bold;
      text-align: center;
      z-index: 50;
      display: none;
      animation: fadeInScale 0.5s ease-out;
    }

    #game-message.win {
      color: #00FF88;
      text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
    }

    #game-message.lose {
      color: #FF6B6B;
      text-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
    }

    @keyframes fadeInScale {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    @media (max-width: 900px) {
      #app {
        flex-direction: column;
      }

      #game-container {
        flex: 1;
        width: 100%;
      }

      #info-panel {
        width: 100%;
        height: auto;
        max-height: 40vh;
        border-left: none;
        border-top: 1px dashed rgba(0, 229, 255, 0.3);
        flex-direction: row;
        flex-wrap: wrap;
        overflow-x: auto;
        padding: 12px;
        gap: 12px;
      }

      .panel-section {
        min-width: 200px;
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="game-container">
      <canvas id="game-canvas"></canvas>
      <div id="replay-bar">
        <canvas id="replay-canvas" width="400" height="24"></canvas>
      </div>
      <div id="game-message"></div>
    </div>
    <div id="info-panel">
      <div class="panel-section">
        <div class="section-title">⏱ 倒计时</div>
        <div class="timer" id="timer-display">10:00</div>
      </div>
      <div class="panel-section">
        <div class="section-title">⚡ 时间能量</div>
        <div class="energy-bar" id="energy-display"></div>
      </div>
      <div class="panel-section">
        <div class="section-title">🎯 谜题目标</div>
        <div id="goals-list"></div>
      </div>
      <div class="panel-section">
        <div class="section-title">🔵 时间标记</div>
        <div class="markers-list" id="markers-list"></div>
      </div>
      <div class="panel-section">
        <div class="section-title">💡 操作提示</div>
        <div class="hint-text">
          • 移动鼠标控制光标<br/>
          • 点击物体打开时间菜单<br/>
          • 收集绿色能量球回复能量<br/>
          • 记录状态后可随时回溯
        </div>
      </div>
    </div>
  </div>
  <div id="context-menu"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
