<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星球地形演化可视化</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000011;
      font-family: 'Courier New', 'Consolas', monospace;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    canvas { display: block; }

    #control-panel {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 8px;
      padding: 12px;
      z-index: 100;
      min-width: 240px;
      border: 1px solid rgba(0, 206, 209, 0.2);
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    #panel-toggle {
      display: none;
      position: fixed;
      top: 16px;
      right: 16px;
      width: 44px;
      height: 44px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 206, 209, 0.4);
      border-radius: 8px;
      color: #00CED1;
      font-size: 20px;
      cursor: pointer;
      z-index: 101;
      transition: transform 0.3s ease;
    }
    #panel-toggle:hover { transform: scale(1.05); }

    .label-overlay {
      position: absolute;
      pointer-events: none;
      z-index: 50;
    }

    .planet-label {
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 206, 209, 0.4);
      border-radius: 6px;
      padding: 8px 12px;
      color: #e0e0e0;
      font-size: 12px;
      line-height: 1.6;
      pointer-events: auto;
      white-space: nowrap;
    }

    .planet-label .label-title {
      color: #00CED1;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .planet-label .label-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .planet-label .label-key {
      color: #87CEEB;
    }

    .planet-label .label-value {
      color: #fff;
    }

    @media (max-width: 768px) {
      #control-panel {
        top: auto;
        bottom: 0;
        left: 0;
        right: 0;
        border-radius: 8px 8px 0 0;
        transform: translateY(100%);
        opacity: 0;
        min-width: unset;
      }
      #control-panel.open {
        transform: translateY(0);
        opacity: 1;
      }
      #panel-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="control-panel"></div>
  <button id="panel-toggle">&#9881;</button>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
