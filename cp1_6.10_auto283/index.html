<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>熔岩迷宫</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #ffffff;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    #canvas-container {
      width: 90%;
      height: 90%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-canvas {
      display: block;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(255, 69, 0, 0.4);
    }

    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .glass-panel {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      pointer-events: auto;
    }

    #top-panel {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 32px;
      display: flex;
      gap: 40px;
      align-items: center;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .stat-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #ff6b35;
      text-shadow: 0 0 10px rgba(255, 107, 53, 0.5);
    }

    #side-panel {
      position: absolute;
      left: 30px;
      top: 50%;
      transform: translateY(-50%);
      padding: 20px;
      width: 200px;
    }

    #side-panel h3 {
      font-size: 14px;
      color: #ff6b35;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-bottom: 1px solid rgba(255, 107, 53, 0.3);
      padding-bottom: 8px;
    }

    .key-hint {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.85);
    }

    .key-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      height: 28px;
      padding: 0 8px;
      background: rgba(255, 107, 53, 0.2);
      border: 1px solid rgba(255, 107, 53, 0.5);
      border-radius: 6px;
      font-family: 'Consolas', monospace;
      font-size: 12px;
      font-weight: bold;
      color: #ff6b35;
    }

    #win-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 40px 60px;
      text-align: center;
      display: none;
    }

    #win-overlay.visible {
      display: block;
      animation: popIn 0.4s ease-out;
    }

    #win-overlay h2 {
      font-size: 36px;
      color: #ffff00;
      margin-bottom: 16px;
      text-shadow: 0 0 20px rgba(255, 255, 0, 0.6);
    }

    #win-overlay p {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 24px;
    }

    #win-overlay button {
      padding: 12px 32px;
      font-size: 14px;
      font-weight: bold;
      color: #000;
      background: linear-gradient(135deg, #ffff00, #ff6b35);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    #win-overlay button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(255, 255, 0, 0.5);
    }

    @keyframes popIn {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container">
      <canvas id="game-canvas"></canvas>
    </div>
    <div id="ui-layer">
      <div id="top-panel" class="glass-panel">
        <div class="stat-item">
          <span class="stat-label">时间</span>
          <span class="stat-value" id="timer">00:00</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">步数</span>
          <span class="stat-value" id="step-count">0</span>
        </div>
      </div>
      <div id="side-panel" class="glass-panel">
        <h3>操作说明</h3>
        <div class="key-hint">
          <span class="key-badge">W A S D</span>
          <span>方向移动</span>
        </div>
        <div class="key-hint">
          <span class="key-badge">↑ ← ↓ →</span>
          <span>方向移动</span>
        </div>
        <div class="key-hint">
          <span class="key-badge">R</span>
          <span>重新开始</span>
        </div>
      </div>
      <div id="win-overlay" class="glass-panel">
        <h2>🎉 恭喜通关！</h2>
        <p id="win-stats"></p>
        <button id="restart-btn">再来一局</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
