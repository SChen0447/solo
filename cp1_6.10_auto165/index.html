<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>色彩混合小课堂</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Comic Sans MS', 'Microsoft YaHei', sans-serif;
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
      background: #FFFFFF;
    }
    #canvas-container {
      width: 100%;
      height: calc(100% - 60px);
      display: block;
    }
    #main-canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #FFFFFF;
      cursor: pointer;
    }
    @media (max-width: 600px) {
      #canvas-container {
        height: calc(100% - 50px);
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container">
      <canvas id="main-canvas"></canvas>
    </div>
    <div id="ui-bar"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
