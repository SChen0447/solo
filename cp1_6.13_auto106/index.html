<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星轨·时光邮差</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #1a1a4e 0%, #2d1b4e 50%, #1a0a2e 100%);
      font-family: 'Courier New', monospace;
    }

    #gameCanvas {
      display: block;
      cursor: grab;
    }

    #gameCanvas:active {
      cursor: grabbing;
    }

    #loadingScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #1a1a4e 0%, #2d1b4e 50%, #1a0a2e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.8s ease-out;
    }

    #loadingScreen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-star {
      width: 8px;
      height: 8px;
      background: #ffd700;
      border-radius: 50%;
      box-shadow: 0 0 20px #ffd700, 0 0 40px #ffd700, 0 0 60px #ffa500;
      animation: spin 2s linear infinite, pulse 1.5s ease-in-out infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg) translateX(30px) rotate(0deg); }
      to { transform: rotate(360deg) translateX(30px) rotate(-360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.3); }
    }

    .loading-text {
      margin-top: 40px;
      color: #ffd700;
      font-size: 18px;
      letter-spacing: 4px;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    }

    .game-title {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 48px;
      color: #ffd700;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.8), 0 0 40px rgba(255, 165, 0, 0.4);
      letter-spacing: 8px;
      opacity: 0;
      animation: titleFade 1.5s ease-out forwards;
      animation-delay: 0.3s;
    }

    @keyframes titleFade {
      from {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.5);
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }
  </style>
</head>
<body>
  <div id="loadingScreen">
    <div class="loading-star"></div>
    <div class="loading-text">星轨导航中...</div>
    <div class="game-title">星轨·时光邮差</div>
  </div>
  <canvas id="gameCanvas"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
