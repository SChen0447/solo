<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户行为热力图分析工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #2d3436;
      color: #b2bec3;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #app {
      width: 100%;
      min-height: 100vh;
    }

    .app-layout {
      display: flex;
      gap: 16px;
      padding: 16px;
      min-height: 100vh;
    }

    .control-panel {
      width: 260px;
      flex-shrink: 0;
      background: #1e3a5f;
      border-radius: 8px;
      padding: 20px;
      color: #ffffff;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      height: fit-content;
    }

    .panel-header h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .panel-section {
      margin-bottom: 20px;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 10px;
      color: #ffffff;
      cursor: default;
    }

    .event-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .event-option {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 4px;
      transition: background 0.2s ease;
      font-size: 13px;
    }

    .event-option:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .event-option input[type="checkbox"] {
      cursor: pointer;
      accent-color: #0984e3;
      width: 16px;
      height: 16px;
    }

    .color-box {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .slider {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #0984e3;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    .slider::-webkit-slider-thumb:hover {
      background: #74b9ff;
      transform: scale(1.1);
    }

    .slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #0984e3;
      cursor: pointer;
      border: none;
      transition: background 0.2s ease;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .action-btn {
      width: 100%;
      padding: 10px 16px;
      background: #0984e3;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    .action-btn:hover {
      background: #74b9ff;
    }

    .action-btn:active {
      transform: scale(0.98);
    }

    .action-btn.secondary {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .action-btn.secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: #74b9ff;
    }

    .stats {
      padding: 12px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 6px;
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stat-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #0984e3;
    }

    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 0;
    }

    .viewport {
      flex: 0 0 70%;
      min-height: 500px;
      background: #2d3436;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .mock-page {
      width: 800px;
      height: 600px;
      background: #2d3436;
      position: relative;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .mock-page-header {
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .mock-page-header h3 {
      font-size: 16px;
      color: #b2bec3;
      font-weight: 600;
    }

    .scroll-list {
      width: 100%;
      height: 280px;
      overflow-y: auto;
      background: #1e272e;
      border-radius: 6px;
    }

    .scroll-list::-webkit-scrollbar {
      width: 8px;
    }

    .scroll-list::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
    }

    .scroll-list::-webkit-scrollbar-thumb {
      background: #0984e3;
      border-radius: 4px;
    }

    .list-row {
      height: 40px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      font-size: 13px;
      color: #b2bec3;
      transition: background 0.15s ease;
      cursor: pointer;
    }

    .list-row.even {
      background: #2d3436;
    }

    .list-row.odd {
      background: #353b48;
    }

    .list-row:hover {
      background: #0984e3;
      color: #ffffff;
    }

    .row-index {
      width: 30px;
      color: #636e72;
      font-weight: 600;
      flex-shrink: 0;
    }

    .list-row:hover .row-index {
      color: rgba(255, 255, 255, 0.8);
    }

    .row-text {
      flex: 1;
    }

    .row-status {
      color: #00b894;
      font-size: 10px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .mock-btn {
      padding: 10px 24px;
      background: #636e72;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    .mock-btn:hover {
      background: #0984e3;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(9, 132, 227, 0.4);
    }

    .mock-btn:active {
      transform: translateY(0);
    }

    .hover-area {
      width: 300px;
      height: 200px;
      background: #dfe6e9;
      border: 2px dashed #636e72;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition: background 0.2s ease, border-color 0.2s ease;
      cursor: crosshair;
    }

    .hover-area:hover {
      background: #ffffff;
      border-color: #0984e3;
    }

    .hover-text {
      color: #2d3436;
      font-size: 16px;
      font-weight: 500;
      line-height: 1.6;
    }

    .hover-text small {
      font-size: 12px;
      color: #636e72;
      font-weight: 400;
    }

    .heatmap-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 800px;
      height: 600px;
      z-index: 10;
      pointer-events: none;
    }

    .log-panel {
      flex: 1;
      background: #1e272e;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
    }

    .log-header {
      padding: 12px 16px;
      background: #1e3a5f;
      color: #ffffff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: background 0.2s ease;
      font-size: 14px;
      font-weight: 500;
    }

    .log-header:hover {
      background: #2c5282;
    }

    .toggle-icon {
      font-size: 10px;
      transition: transform 0.2s ease;
    }

    .log-content {
      flex: 1;
      overflow: auto;
      max-height: 250px;
    }

    .log-content::-webkit-scrollbar {
      width: 6px;
    }

    .log-content::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.03);
    }

    .log-content::-webkit-scrollbar-thumb {
      background: #636e72;
      border-radius: 3px;
    }

    .log-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .log-table thead th {
      position: sticky;
      top: 0;
      background: #353b48;
      color: #b2bec3;
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 1;
    }

    .log-row {
      transition: opacity 0.2s ease;
    }

    .log-row.fade-in {
      animation: fadeInRow 0.2s ease-out;
    }

    @keyframes fadeInRow {
      from {
        opacity: 0;
        background: #0984e3 !important;
      }
      to {
        opacity: 1;
      }
    }

    .log-row td {
      padding: 8px 12px;
      color: #dfe6e9;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .event-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      color: #ffffff;
    }

    .selector-cell {
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: #74b9ff;
    }

    @media (max-width: 768px) {
      .app-layout {
        flex-direction: column;
        padding: 8px;
      }

      .app-layout.mobile-layout {
        flex-direction: column;
      }

      .control-panel {
        width: 100%;
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        padding: 12px;
      }

      .panel-header {
        width: 100%;
      }

      .panel-section {
        flex: 1;
        min-width: 150px;
        margin-bottom: 0;
      }

      .panel-section.buttons {
        flex-direction: row;
        display: flex;
      }

      .panel-section.buttons .action-btn {
        flex: 1;
      }

      .mock-page {
        width: 100%;
        height: 500px;
      }

      .heatmap-canvas {
        width: 100%;
        height: 500px;
      }

      .viewport {
        min-height: 400px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
