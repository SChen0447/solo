<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>风弦·光之织机</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;

    html, body {

      height: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #0b0e14 0%, #1a0b2e 100%);

    body:active {
      cursor: grabbing;

      height: 100%;
      display: block;
    }
  </style>
