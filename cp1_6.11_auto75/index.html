<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博物馆数字展柜</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      background: linear-gradient(180deg, #1a2530 0%, #2a3b4c 50%, #1f2d3a 100%);
      color: #c8a96e;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    .glass-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: 
        linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 50%, rgba(200,169,110,0.02) 100%),
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 80px,
          rgba(255,255,255,0.015) 80px,
          rgba(255,255,255,0.015) 82px
        );
      z-index: 10;
    }

    .spotlight {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(200,169,110,0.08) 0%, rgba(200,169,110,0.03) 30%, transparent 70%);
      pointer-events: none;
      z-index: 5;
    }

    .info-panel {
      position: absolute;
      left: 30px;
      bottom: 80px;
      background: rgba(26, 37, 48, 0.85);
      border: 1px solid rgba(200, 169, 110, 0.4);
      border-radius: 8px;
      padding: 20px 24px;
      min-width: 220px;
      z-index: 20;
      backdrop-filter: blur(10px);
    }

    .info-panel .title {
      font-size: 18px;
      font-weight: 600;
      color: #d4b87a;
      margin-bottom: 14px;
      letter-spacing: 1px;
    }

    .info-item {
      padding: 10px 0;
      border-bottom: 1px solid rgba(200, 169, 110, 0.2);
      font-size: 13px;
      color: #c8a96e;
      line-height: 1.6;
    }

    .info-item:last-child {
      border-bottom: none;
    }

    .info-item .label {
      color: rgba(200, 169, 110, 0.6);
      font-size: 12px;
      margin-bottom: 2px;
    }

    .nav-dots {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      z-index: 20;
    }

    .nav-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
      padding: 0;
    }

    .nav-dot:hover {
      background: rgba(200, 169, 110, 0.6);
      transform: scale(1.2);
    }

    .nav-dot.active {
      background: #c8a96e;
      box-shadow: 0 0 12px rgba(200, 169, 110, 0.6);
    }

    .info-card {
      position: absolute;
      top: 30px;
      right: -380px;
      width: 340px;
      background: rgba(26, 37, 48, 0.92);
      border: 1px solid rgba(200, 169, 110, 0.5);
      border-radius: 10px;
      padding: 24px;
      z-index: 30;
      transition: right 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      backdrop-filter: blur(12px);
      box-shadow: -4px 4px 20px rgba(0, 0, 0, 0.4);
    }

    .info-card.visible {
      right: 30px;
    }

    .info-card .hotspot-name {
      font-size: 20px;
      font-weight: 600;
      color: #d4b87a;
      margin-bottom: 6px;
    }

    .info-card .period {
      font-size: 13px;
      color: rgba(200, 169, 110, 0.7);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(200, 169, 110, 0.2);
    }

    .info-card .description {
      font-size: 14px;
      line-height: 1.8;
      color: #c8a96e;
      margin-bottom: 20px;
    }

    .audio-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: rgba(200, 169, 110, 0.15);
      border: 1px solid rgba(200, 169, 110, 0.4);
      border-radius: 6px;
      color: #c8a96e;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
      width: fit-content;
    }

    .audio-btn:hover {
      background: rgba(200, 169, 110, 0.25);
      box-shadow: 0 0 10px rgba(200, 169, 110, 0.3);
    }

    .audio-btn .icon {
      width: 20px;
      height: 20px;
      position: relative;
    }

    .audio-btn .icon::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 2px;
      transform: translateY(-50%);
      width: 0;
      height: 0;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-left: 8px solid #c8a96e;
    }

    .audio-btn .icon::after {
      content: '';
      position: absolute;
      top: 50%;
      right: 2px;
      transform: translateY(-50%);
      width: 6px;
      height: 12px;
      border: 2px solid #c8a96e;
      border-left: none;
      border-radius: 0 6px 6px 0;
    }

    .hint-text {
      position: absolute;
      bottom: 70px;
      right: 30px;
      font-size: 12px;
      color: rgba(200, 169, 110, 0.5);
      z-index: 20;
      text-align: right;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div class="spotlight"></div>
    <div class="glass-overlay"></div>
    
    <div class="info-panel">
      <div class="title" id="artifact-name">青铜鼎</div>
      <div class="info-item">
        <div class="label">材质</div>
        <div id="artifact-material">青铜</div>
      </div>
      <div class="info-item">
        <div class="label">出土年代</div>
        <div id="artifact-era">商代晚期</div>
      </div>
      <div class="info-item">
        <div class="label">尺寸</div>
        <div id="artifact-size">高45cm / 口径38cm</div>
      </div>
    </div>

    <div class="info-card" id="info-card">
      <div class="hotspot-name" id="hotspot-name">腹部饕餮纹饰</div>
      <div class="period" id="hotspot-period">商代晚期</div>
      <div class="description" id="hotspot-desc">
        饕餮纹是商周青铜器上最具代表性的纹饰，以神秘威严的兽面形象展现古人对天地神灵的敬畏。
      </div>
      <button class="audio-btn" id="audio-btn">
        <span class="icon"></span>
        <span>语音导览</span>
      </button>
    </div>

    <div class="nav-dots">
      <button class="nav-dot active" data-index="0" title="青铜鼎"></button>
      <button class="nav-dot" data-index="1" title="青花瓷瓶"></button>
      <button class="nav-dot" data-index="2" title="玉琮"></button>
    </div>

    <div class="hint-text">
      拖拽旋转 · 滚轮缩放 · 右键重置
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
