<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>霓虹都市数据流</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #0a0515 0%, #040b1a 100%);
      font-family: 'Consolas', 'Monaco', monospace;
    }
    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #hud-stats {
      position: absolute;
      top: 16px;
      right: 20px;
      color: #88aacc;
      font-size: 10px;
      line-height: 1.7;
      text-align: right;
      pointer-events: none;
      text-shadow: 0 0 6px rgba(136, 170, 204, 0.4);
      z-index: 10;
    }
    #hud-stats .label {
      opacity: 0.7;
    }
    #hud-stats .value {
      color: #aaddff;
      font-weight: bold;
    }
    .beacon-hud {
      position: absolute;
      background: rgba(17, 26, 42, 0.92);
      border: 1px solid #4466aa;
      border-radius: 6px;
      padding: 12px 14px;
      min-width: 220px;
      z-index: 20;
      box-shadow: 0 0 20px rgba(68, 102, 170, 0.35);
      pointer-events: auto;
    }
    .beacon-hud-title {
      color: #88aaff;
      font-size: 11px;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }
    .beacon-hud-row {
      margin-bottom: 10px;
    }
    .beacon-hud-row:last-child {
      margin-bottom: 0;
    }
    .beacon-hud-label {
      color: #88aacc;
      font-size: 9px;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
    }
    .beacon-hud-label .num {
      color: #aaddff;
      font-weight: bold;
    }
    .slider-track {
      position: relative;
      width: 100%;
      height: 5px;
      background: rgba(68, 102, 170, 0.25);
      border-radius: 3px;
      cursor: pointer;
    }
    .slider-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: linear-gradient(90deg, #ff88aa 0%, #88aaff 100%);
      border-radius: 3px;
    }
    .slider-fill.attract {
      background: linear-gradient(90deg, #66ccff 0%, #88aaff 100%);
    }
    .slider-fill.repel {
      background: linear-gradient(90deg, #ff88aa 0%, #ff6677 100%);
    }
    .slider-thumb {
      position: absolute;
      top: 50%;
      width: 12px;
      height: 12px;
      background: #aaddff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      cursor: grab;
      box-shadow: 0 0 8px rgba(170, 221, 255, 0.7);
    }
    .slider-thumb:active {
      cursor: grabbing;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud-stats">
      <div><span class="label">粒子总量: </span><span class="value" id="stat-particles">0</span></div>
      <div><span class="label">平均速度: </span><span class="value" id="stat-speed">0.00</span> <span class="label">u/fr</span></div>
      <div><span class="label">活跃信标: </span><span class="value" id="stat-beacons">0</span></div>
      <div><span class="label">FPS: </span><span class="value" id="stat-fps">0</span></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
