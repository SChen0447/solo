<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>幽影收集者</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #0d0221 0%, #1a0a2e 100%);
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    }
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .title {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      color: #e8e8ff;
      text-shadow: 0 0 8px rgba(120, 255, 150, 0.6), 0 0 2px #88ff99;
      font-weight: bold;
      letter-spacing: 4px;
      pointer-events: none;
      z-index: 10;
    }
    @media (max-width: 768px) {
      .title {
        font-size: 20px;
        letter-spacing: 2px;
      }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <h1 class="title">幽影收集者</h1>
    <canvas id="game-canvas"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
