<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>液态金属镜面</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #0d0d1a 100%);
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
    }
    #ui-container {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="ui-container"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
