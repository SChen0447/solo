<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurora Particles VFX</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    #aurora-canvas {
      display: block;
      background: #0a0a1a;
      image-rendering: pixelated;
      box-shadow: 0 0 60px rgba(0, 255, 170, 0.08);
    }

    .control-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 10;
      padding: 16px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      min-width: 260px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      user-select: none;
    }

    .control-panel:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0, 255, 170, 0.15), 0 6px 24px rgba(0, 0, 0, 0.5);
    }

    .panel-title {
      font-size: 14px;
      font-weight: 600;
      background: linear-gradient(90deg, #cccccc, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 14px;
      letter-spacing: 0.5px;
    }

    .control-row {
      margin-bottom: 12px;
      transition: transform 0.15s ease;
    }

    .control-row:hover {
      transform: translateY(-2px);
    }

    .control-row:last-child {
      margin-bottom: 0;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #bbbbbb;
      margin-bottom: 6px;
    }

    .control-value {
      color: #00ffaa;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: #333333;
      outline: none;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #00ffaa;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(0, 255, 170, 0.6);
      transition: box-shadow 0.15s ease, transform 0.15s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      box-shadow: 0 0 14px rgba(0, 255, 170, 0.9);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #00ffaa;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 8px rgba(0, 255, 170, 0.6);
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 4px 0;
    }

    .checkbox-row:hover .checkbox-box {
      transform: translateY(-2px);
    }

    .checkbox-box {
      width: 12px;
      height: 12px;
      border: 1px solid #555555;
      border-radius: 2px;
      background: transparent;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
      position: relative;
      flex-shrink: 0;
    }

    .checkbox-box.checked {
      background: #00ffaa;
      border-color: #00ffaa;
    }

    .checkbox-box.checked::after {
      content: "";
      position: absolute;
      top: 1px;
      left: 3px;
      width: 4px;
      height: 7px;
      border: solid #0a0a1a;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .checkbox-label {
      font-size: 12px;
      color: #cccccc;
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <canvas id="aurora-canvas" width="1280" height="720"></canvas>
  </div>

  <div class="control-panel" id="control-panel">
    <div class="panel-title">极光粒子控制台</div>

    <div class="control-row">
      <div class="control-label">
        <span>极光速度</span>
        <span class="control-value" id="aurora-speed-value">1.0x</span>
      </div>
      <input type="range" id="aurora-speed" min="0.5" max="3" step="0.1" value="1" />
    </div>

    <div class="control-row">
      <div class="control-label">
        <span>粒子密度</span>
        <span class="control-value" id="particle-density-value">200</span>
      </div>
      <input type="range" id="particle-density" min="50" max="400" step="10" value="200" />
    </div>

    <div class="control-row">
      <div class="control-label">
        <span>色温偏移</span>
        <span class="control-value" id="color-temp-value">0</span>
      </div>
      <input type="range" id="color-temp" min="-30" max="30" step="1" value="0" />
    </div>

    <div class="control-row">
      <div class="checkbox-row" id="smooth-aurora-row">
        <div class="checkbox-box checked" id="smooth-aurora-box"></div>
        <span class="checkbox-label">极光平滑模式</span>
      </div>
    </div>

    <div class="control-row">
      <div class="checkbox-row" id="particle-trail-row">
        <div class="checkbox-box" id="particle-trail-box"></div>
        <span class="checkbox-label">粒子尾迹模式</span>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
