<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D声波干涉可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0a0a1a;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
      background: radial-gradient(ellipse at center, #1a1a3a 0%, #0a0a1a 70%, #050510 100%);
    }
    #stats {
      position: absolute;
      left: 16px;
      bottom: 16px;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.5);
      color: #ffffff;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.6;
      border-radius: 6px;
      backdrop-filter: blur(4px);
      z-index: 100;
      min-width: 200px;
    }
    #stats .label {
      opacity: 0.7;
    }
    #stats .value {
      color: #00d4aa;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="stats">
    <div><span class="label">FPS:</span> <span id="fps" class="value">60</span></div>
    <div><span class="label">干涉类型:</span> <span id="interference" class="value">混合</span></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
