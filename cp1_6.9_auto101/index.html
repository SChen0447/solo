<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>光影音乐树</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #0a0a2a 0%, #1a0a2a 100%);
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .title {
      position: fixed;
      top: 20px;
      right: 30px;
      color: rgba(255, 255, 255, 0.6);
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 4px;
      text-shadow: 0 0 20px rgba(136, 170, 255, 0.5);
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="title">光影音乐树</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
