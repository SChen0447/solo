<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D建筑日照阴影分析</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="canvas-container"></div>

  <div id="fps-monitor">
    <span class="fps-label">FPS</span>
    <span class="fps-value" id="fps-value">60</span>
    <span class="fps-quality" id="fps-quality">高精度</span>
  </div>

  <button id="panel-toggle" class="panel-toggle" aria-label="展开控制面板">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="12" x2="21" y2="12"></line>
      <line x1="3" y1="6" x2="21" y2="6"></line>
      <line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
  </button>

  <div id="control-panel" class="control-panel">
    <div class="panel-header">
      <h3>日照控制</h3>
      <button id="panel-close" class="panel-close" aria-label="关闭">×</button>
    </div>

    <div class="control-group">
      <div class="control-label">
        <span>方位角</span>
        <span id="azimuth-value">45°</span>
      </div>
      <input type="range" id="azimuth-slider" min="0" max="360" value="45" step="1" />
    </div>

    <div class="control-group">
      <div class="control-label">
        <span>高度角</span>
        <span id="altitude-value">45°</span>
      </div>
      <input type="range" id="altitude-slider" min="0" max="90" value="45" step="1" />
    </div>

    <button id="animate-btn" class="animate-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 3 19 12 5 21 5 3"></polygon>
      </svg>
      <span>日照动画</span>
    </button>

    <div id="quality-warning" class="quality-warning hidden">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
        <line x1="12" y1="9" x2="12" y2="13"></line>
        <line x1="12" y1="17" x2="12.01" y2="17"></line>
      </svg>
      <span>性能受限，已降低阴影精度</span>
    </div>
  </div>

  <div id="building-tooltip" class="building-tooltip hidden">
    <div class="tooltip-title" id="tooltip-title">建筑 #1</div>
    <div class="tooltip-content">高度: <span id="tooltip-height">50</span> m</div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
