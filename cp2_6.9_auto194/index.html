<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>可视化音乐节奏生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1A1A2E;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
      color: #FFFFFF;
      user-select: none;
      -webkit-user-select: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    #canvas-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    #main-canvas {
      display: block;
    }

    #toolbar {
      position: absolute;
      left: 24px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 16px;
      z-index: 10;
    }

    .tool-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      cursor: grab;
      transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: #FFFFFF;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .tool-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
    }

    .tool-btn:active {
      cursor: grabbing;
      transform: scale(0.95);
    }

    .tool-btn.drum { background: #E94560; }
    .tool-btn.bass { background: #0F3460; }
    .tool-btn.chord { background: #533483; }
    .tool-btn.melody { background: #E6B333; color: #1A1A2E; }

    #row-controls {
      position: absolute;
      display: flex;
      flex-direction: column;
      gap: 2px;
      z-index: 10;
    }

    .row-btn {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: none;
      background: #533483;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.2s ease-in-out;
    }

    .row-btn:hover {
      transform: scale(1.1);
    }

    .row-btn.muted {
      background: #E94560;
    }

    .row-btn.solo {
      background: #4E9F3D;
    }

    #edit-panel {
      position: absolute;
      padding: 20px;
      border-radius: 16px;
      background: rgba(22, 33, 62, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 100;
      display: none;
      min-width: 240px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    #edit-panel.visible {
      display: block;
      animation: panelFadeIn 0.2s ease-out;
    }

    @keyframes panelFadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .panel-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 6px;
    }

    .panel-section {
      margin-bottom: 16px;
    }

    .panel-section:last-child {
      margin-bottom: 0;
    }

    #volume-slider {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: #16213E;
      border-radius: 2px;
      outline: none;
    }

    #volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #E94560;
      cursor: pointer;
      transition: transform 0.2s ease-in-out;
    }

    #volume-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    #pitch-select {
      width: 100%;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #533483;
      background: #16213E;
      color: #FFFFFF;
      font-size: 14px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s ease-in-out;
    }

    #pitch-select:hover,
    #pitch-select:focus {
      border-color: #E94560;
    }

    .duration-control {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .dur-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: #533483;
      color: #FFFFFF;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.15s ease-in-out, background 0.2s ease-in-out;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dur-btn:hover {
      background: #E94560;
      transform: scale(1.1);
    }

    .dur-btn:active {
      transform: scale(0.9);
    }

    #dur-value {
      flex: 1;
      text-align: center;
      font-size: 16px;
      font-weight: 600;
      color: #E6B333;
    }

    #panel-close {
      position: absolute;
      top: 8px;
      right: 12px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: rgba(255, 255, 255, 0.6);
      font-size: 18px;
      cursor: pointer;
      transition: color 0.2s ease, background 0.2s ease;
    }

    #panel-close:hover {
      color: #FFFFFF;
      background: rgba(255, 255, 255, 0.1);
    }

    #controls {
      height: 80px;
      background: #0F3460;
      border-top: 0.5px solid #533483;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 20px;
      flex-shrink: 0;
    }

    #play-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      background: #E94560;
      color: #FFFFFF;
      cursor: pointer;
      transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(233, 69, 96, 0.4);
    }

    #play-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 4px 20px rgba(233, 69, 96, 0.6);
    }

    #play-btn:active {
      transform: scale(0.95);
    }

    .play-icon {
      width: 0;
      height: 0;
      border-left: 12px solid #FFFFFF;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      margin-left: 3px;
    }

    .pause-icon {
      display: flex;
      gap: 4px;
    }

    .pause-icon span {
      width: 4px;
      height: 16px;
      background: #FFFFFF;
      border-radius: 2px;
    }

    .bpm-wrapper {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex-shrink: 0;
    }

    .bpm-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
    }

    #bpm-slider {
      width: 200px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: #16213E;
      border-radius: 2px;
      outline: none;
    }

    #bpm-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #533483;
      cursor: pointer;
      transition: transform 0.2s ease-in-out, background 0.2s ease-in-out;
    }

    #bpm-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      background: #E94560;
    }

    #bpm-value {
      font-size: 12px;
      color: #E6B333;
      font-weight: 600;
    }

    #progress-wrapper {
      flex: 1;
      height: 8px;
      background: #16213E;
      border-radius: 4px;
      overflow: hidden;
      min-width: 80px;
    }

    #progress-fill {
      height: 100%;
      width: 0%;
      background: #E6B333;
      border-radius: 4px;
      transition: width 0.08s linear;
    }

    #reset-btn {
      width: 60px;
      height: 36px;
      border-radius: 8px;
      border: none;
      background: #E94560;
      color: #FFFFFF;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease-in-out, background 0.2s ease-in-out;
      flex-shrink: 0;
    }

    #reset-btn:hover {
      background: #ff5a75;
    }

    #reset-btn:active {
      transform: scale(0.95);
    }

    #export-btn {
      width: 80px;
      height: 36px;
      border-radius: 8px;
      border: none;
      background: #533483;
      color: #FFFFFF;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease-in-out, background 0.2s ease-in-out;
      flex-shrink: 0;
    }

    #export-btn:hover {
      background: #6b45a6;
      transform: scale(1.05);
    }

    #export-btn:active {
      transform: scale(0.95);
    }

    #toast {
      position: fixed;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      background: #4E9F3D;
      color: #FFFFFF;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(78, 159, 61, 0.4);
      opacity: 0;
      pointer-events: none;
      z-index: 1000;
    }

    #toast.show {
      animation: toastFade 3s ease-in-out forwards;
    }

    @keyframes toastFade {
      0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
      15%, 85% { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
    }

    @media (max-width: 768px) {
      #controls {
        height: auto;
        padding: 12px 16px;
        flex-wrap: wrap;
        gap: 12px;
      }

      #controls > * {
        flex-shrink: 1;
      }

      .tool-btn {
        width: 32px;
        height: 32px;
        font-size: 12px;
      }

      #toolbar {
        left: 12px;
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-wrapper">
      <canvas id="main-canvas"></canvas>

      <div id="toolbar">
        <button class="tool-btn drum" data-instrument="drum" title="鼓">鼓</button>
        <button class="tool-btn bass" data-instrument="bass" title="贝斯">贝</button>
        <button class="tool-btn chord" data-instrument="chord" title="和弦">和</button>
        <button class="tool-btn melody" data-instrument="melody" title="旋律">旋</button>
      </div>

      <div id="row-controls"></div>

      <div id="edit-panel">
        <button id="panel-close" title="关闭">×</button>
        <div class="panel-section">
          <div class="panel-label">音量 (<span id="vol-value">80</span>)</div>
          <input type="range" id="volume-slider" min="0" max="100" value="80" step="1" />
        </div>
        <div class="panel-section">
          <div class="panel-label">音高</div>
          <select id="pitch-select"></select>
        </div>
        <div class="panel-section">
          <div class="panel-label">时长（拍）</div>
          <div class="duration-control">
            <button class="dur-btn" id="dur-minus">−</button>
            <span id="dur-value">1.00</span>
            <button class="dur-btn" id="dur-plus">+</button>
          </div>
        </div>
      </div>
    </div>

    <div id="controls">
      <button id="play-btn" title="播放/暂停">
        <div class="play-icon" id="play-icon"></div>
      </button>
      <div class="bpm-wrapper">
        <span class="bpm-label">BPM <span id="bpm-value">120</span></span>
        <input type="range" id="bpm-slider" min="60" max="180" value="120" step="1" />
      </div>
      <div id="progress-wrapper">
        <div id="progress-fill"></div>
      </div>
      <button id="reset-btn" title="重置">重置</button>
      <button id="export-btn" title="导出JSON">导出</button>
    </div>

    <div id="toast"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
