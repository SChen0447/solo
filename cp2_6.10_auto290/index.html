<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>暗影蜡烛</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      background-color: #000000;
      overflow: hidden;
      cursor: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', monospace;
    }
    #game-title {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffffff;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 8px;
      text-shadow: 0 0 10px #ffdd66, 0 0 20px #ffaa00;
      z-index: 100;
      animation: flame-flicker 1.5s ease-in-out infinite;
      font-family: 'Courier New', monospace;
    }
    @keyframes flame-flicker {
      0%, 100% {
        text-shadow: 0 0 10px #ffdd66, 0 0 20px #ffaa00, 0 0 30px #ff6600;
        opacity: 1;
      }
      25% {
        text-shadow: 0 0 8px #ffdd66, 0 0 15px #ffaa00, 0 0 25px #ff6600;
        opacity: 0.92;
      }
      50% {
        text-shadow: 0 0 12px #ffdd66, 0 0 22px #ffaa00, 0 0 35px #ff6600;
        opacity: 1;
      }
      75% {
        text-shadow: 0 0 9px #ffdd66, 0 0 18px #ffaa00, 0 0 28px #ff6600;
        opacity: 0.95;
      }
    }
    #game-canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #2a2a2a;
    }
  </style>
</head>
<body>
  <div id="game-title">暗 影 蜡 烛</div>
  <canvas id="game-canvas"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
