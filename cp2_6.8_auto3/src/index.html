<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Particle Text Storm</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="canvas-container"></div>
  
  <div class="ui-panel">
    <div class="control-group">
      <label for="text-input">Text</label>
      <input type="text" id="text-input" value="FLOW" maxlength="20" />
    </div>
    
    <div class="control-group">
      <label>Mode</label>
      <div class="mode-buttons">
        <button class="mode-btn active" data-mode="vortex">Vortex</button>
        <button class="mode-btn" data-mode="explode">Explode</button>
        <button class="mode-btn" data-mode="wave">Wave</button>
      </div>
    </div>
    
    <div class="control-group">
      <label for="size-slider">
        Particle Size
        <span class="value-display" id="size-value">1.0</span>
      </label>
      <input type="range" id="size-slider" min="0.3" max="3" step="0.1" value="1" />
    </div>
    
    <div class="control-group">
      <label for="speed-slider">
        Speed
        <span class="value-display" id="speed-value">1.0x</span>
      </label>
      <input type="range" id="speed-slider" min="0.5" max="3" step="0.1" value="1" />
    </div>
    
    <div class="control-group">
      <label for="intensity-slider">
        Color Intensity
        <span class="value-display" id="intensity-value">1.0</span>
      </label>
      <input type="range" id="intensity-slider" min="0.2" max="2" step="0.1" value="1" />
    </div>
    
    <div class="control-group audio-group">
      <label>Audio Level</label>
      <div class="audio-bar">
        <div class="audio-fill" id="audio-fill"></div>
      </div>
    </div>
  </div>

  <div class="stars"></div>
  
  <script type="module" src="./main.ts"></script>
</body>
</html>
