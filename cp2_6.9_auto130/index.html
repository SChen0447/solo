<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>陶艺拉坯模拟器</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0A0A0A;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #fff;
        user-select: none;
      }
      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }
      #scene-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      .version-label {
        position: fixed;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 11px;
        color: rgba(255, 255, 255, 0.3);
        letter-spacing: 0.5px;
        pointer-events: none;
        z-index: 5;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="scene-canvas"></canvas>
      <div class="version-label">v1.0.0 · Pottery Wheel Simulator</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
