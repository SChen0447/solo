<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>动态极光投影</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(180deg, #0a0a2e 0%, #1a1a4e 100%);
      color: rgba(255, 255, 255, 0.8);
    }

    #aurora-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      filter: blur(8px) drop-shadow(0 0 20px rgba(0, 255, 136, 0.3));
    }

    .control-panel {
      position: fixed;
      right: 1.5rem;
      bottom: 1.5rem;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 8px;
      padding: 1.25rem;
      min-width: 260px;
      z-index: 100;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .control-panel.collapsed {
      transform: translateY(calc(100% - 3rem));
    }

    .control-section {
      margin-bottom: 1rem;
    }

    .control-section:last-of-type {
      margin-bottom: 1.25rem;
    }

    .control-section label {
      display: block;
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
      color: rgba(255, 255, 255, 0.8);
    }

    .color-presets {
      display: flex;
      gap: 0.5rem;
    }

    .color-btn {
      width: 2rem;
      height: 2rem;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease, background-color 0.5s ease;
      background: rgba(255, 255, 255, 0.1);
    }

    .color-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.1);
    }

    .color-btn.active {
      border-color: rgba(255, 255, 255, 0.9);
      box-shadow: 0 0 12px currentColor;
    }

    .color-btn[data-color="#00ff88"] { background: #00ff88; color: #00ff88; }
    .color-btn[data-color="#8a2be2"] { background: #8a2be2; color: #8a2be2; }
    .color-btn[data-color="#ff69b4"] { background: #ff69b4; color: #ff69b4; }
    .color-btn[data-color="#00bfff"] { background: #00bfff; color: #00bfff; }

    input[type="range"] {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 0 8px rgba(0, 255, 191, 0.5);
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      width: 16px;
      height: 16px;
    }

    input[type="range"]::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
      box-shadow: 0 0 8px rgba(0, 255, 191, 0.5);
    }

    input[type="range"]::-moz-range-thumb:hover {
      width: 16px;
      height: 16px;
    }

    .reset-btn {
      width: 100%;
      padding: 0.625rem 1rem;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #00ff88, #00bfff);
      color: #0a0a2e;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .reset-btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0, 255, 136, 0.3);
    }

    .toggle-btn {
      position: absolute;
      top: 0.5rem;
      left: 50%;
      transform: translateX(-50%);
      width: 2rem;
      height: 1.5rem;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.6);
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.75rem;
      display: none;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .toggle-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .control-panel.collapsed .toggle-btn {
      transform: translateX(-50%) rotate(180deg);
    }

    @media (max-width: 768px) {
      .control-panel {
        right: 0;
        left: 0;
        bottom: 0;
        border-radius: 16px 16px 0 0;
        min-width: 100%;
      }

      .toggle-btn {
        display: block;
      }
    }
  </style>
</head>
<body>
  <canvas id="aurora-canvas"></canvas>

  <div id="control-panel" class="control-panel">
    <button id="toggle-btn" class="toggle-btn">▼</button>

    <div class="control-section">
      <label>极光颜色</label>
      <div class="color-presets">
        <button class="color-btn active" data-color="#00ff88" title="极光绿"></button>
        <button class="color-btn" data-color="#8a2be2" title="梦幻紫"></button>
        <button class="color-btn" data-color="#ff69b4" title="浪漫粉"></button>
        <button class="color-btn" data-color="#00bfff" title="天空蓝"></button>
      </div>
    </div>

    <div class="control-section">
      <label>流动速度 <span id="speed-value">1.0</span>x</label>
      <input type="range" id="speed-slider" min="0.5" max="3.0" step="0.1" value="1.0">
    </div>

    <div class="control-section">
      <label>光带数量 <span id="count-value">4</span></label>
      <input type="range" id="count-slider" min="3" max="5" step="1" value="4">
    </div>

    <button id="reset-btn" class="reset-btn">重置</button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
