<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>森林旋律石碑</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000000;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-container {
      position: relative;
      aspect-ratio: 16 / 9;
      height: 100vh;
      max-width: 100vw;
      background: #000000;
    }

    @media (min-aspect-ratio: 16/9) {
      #game-container {
        height: 100vh;
        width: calc(100vh * 16 / 9);
      }
    }

    @media (max-aspect-ratio: 16/9) {
      #game-container {
        width: 100vw;
        height: calc(100vw * 9 / 16);
      }
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #000000;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
