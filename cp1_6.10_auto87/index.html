<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <title>3D Audio Visualizer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050510;
      font-family: Arial, sans-serif;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #050510;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #hint {
      position: absolute;
      top: 20px;
      left: 20px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      text-shadow: 0 0 4px #00ffff, 0 0 8px rgba(0, 255, 255, 0.3);
      line-height: 1.8;
      pointer-events: none;
      user-select: none;
      z-index: 10;
    }

    #spectrum-container {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 80px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 0;
      padding: 10px 20px;
      z-index: 10;
      pointer-events: none;
    }

    #spectrum-canvas {
      width: 100%;
      height: 100%;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.15), inset 0 -10px 30px rgba(0, 255, 255, 0.05);
      border-radius: 4px 4px 0 0;
    }

    #audio-modal {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 5, 16, 0.9);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #audio-modal.hidden {
      display: none;
    }

    .modal-content {
      background: rgba(10, 10, 30, 0.8);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.2), 0 0 60px rgba(255, 107, 107, 0.1);
      text-align: center;
      max-width: 480px;
      width: 90%;
    }

    .modal-title {
      font-size: 24px;
      color: #fff;
      margin-bottom: 8px;
      text-shadow: 0 0 8px #00ffff;
      letter-spacing: 2px;
    }

    .modal-subtitle {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 32px;
      text-shadow: 0 0 4px rgba(0, 255, 255, 0.3);
    }

    .modal-buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .modal-btn {
      padding: 14px 28px;
      font-size: 15px;
      font-family: Arial, sans-serif;
      background: rgba(0, 255, 255, 0.08);
      border: 1px solid rgba(0, 255, 255, 0.4);
      color: #00ffff;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.25s ease;
      text-shadow: 0 0 4px rgba(0, 255, 255, 0.5);
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.1);
      letter-spacing: 1px;
    }

    .modal-btn:hover {
      background: rgba(0, 255, 255, 0.15);
      border-color: #00ffff;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
      transform: translateY(-1px);
    }

    .modal-btn.primary {
      background: rgba(255, 107, 107, 0.12);
      border-color: rgba(255, 107, 107, 0.5);
      color: #ff6b6b;
      text-shadow: 0 0 4px rgba(255, 107, 107, 0.5);
      box-shadow: 0 0 10px rgba(255, 107, 107, 0.1);
    }

    .modal-btn.primary:hover {
      background: rgba(255, 107, 107, 0.2);
      border-color: #ff6b6b;
      box-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
    }

    #file-input {
      display: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    
    <div id="hint">
      按键 1: 星云模式<br />
      按键 2: 爆炸模式<br />
      按键 3: 球壳模式 (默认)
    </div>

    <div id="spectrum-container">
      <canvas id="spectrum-canvas"></canvas>
    </div>

    <div id="audio-modal">
      <div class="modal-content">
        <div class="modal-title">音频可视化</div>
        <div class="modal-subtitle">请选择音频输入源开始体验</div>
        <div class="modal-buttons">
          <button class="modal-btn primary" id="btn-mic">🎤 使用麦克风</button>
          <button class="modal-btn" id="btn-file">🎵 上传音频文件</button>
          <button class="modal-btn" id="btn-test">🎹 播放测试音</button>
        </div>
        <input type="file" id="file-input" accept="audio/mp3,audio/wav,audio/ogg,audio/mpeg" />
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
