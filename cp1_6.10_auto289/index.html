<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>音乐流派节奏可视化对比</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #0f0f1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #e0e0e0;
      overflow-x: hidden;
    }

    #app {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 16px;
      background: linear-gradient(90deg, #4ecdc4, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .controls-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 24px;
      background: rgba(26, 26, 46, 0.8);
      border: 2px solid #2a2a4e;
      border-radius: 16px;
      box-shadow: #4ecdc4 0 0 6px;
      margin-bottom: 20px;
    }

    .control-btn {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 50%;
      background: #2a2a4e;
      color: #e0e0e0;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease, transform 0.3s ease;
    }

    .control-btn:hover {
      background: #3a3a5e;
    }

    .control-btn:active {
      transform: scale(0.95);
    }

    .play-btn.playing svg {
      transition: transform 0.3s ease;
    }

    .speed-selector {
      display: flex;
      gap: 8px;
      margin-left: 8px;
    }

    .speed-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: #2a2a4e;
      color: #e0e0e0;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .speed-btn:hover {
      background: #3a3a5e;
    }

    .speed-btn.active {
      background: #4ecdc4;
      color: #0f0f1a;
    }

    .speed-btn:active {
      transform: scale(0.95);
    }

    .main-container {
      display: flex;
      width: 100%;
      max-width: 1400px;
      height: 520px;
      gap: 0;
      position: relative;
      align-items: stretch;
    }

    .canvas-panel {
      width: 45%;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .visualizer-wrapper {
      position: relative;
      width: 100%;
      flex: 1;
      min-height: 380px;
    }

    .canvas-container {
      width: 100%;
      height: 100%;
      position: relative;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      border: 2px solid #2a2a4e;
      border-radius: 12px;
      box-shadow: #4ecdc4 0 0 6px;
      overflow: hidden;
    }

    .waveform-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .info-panel {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
      z-index: 5;
    }

    .info-block {
      background: rgba(0, 0, 0, 0.7);
      color: #ffffff;
      border-radius: 8px;
      padding: 10px 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      backdrop-filter: blur(4px);
      max-width: 48%;
    }

    .info-genre {
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .info-bpm {
      font-size: 20px;
      font-weight: 700;
      color: #4ecdc4;
    }

    .info-bpm-original {
      font-size: 12px;
      color: #888;
      text-decoration: line-through;
      margin-left: 6px;
    }

    .info-time-sig {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #ff6b6b;
    }

    .info-groove {
      font-size: 12px;
      line-height: 1.4;
      color: #ccc;
    }

    .lock-icon {
      width: 16px;
      height: 16px;
      color: #ffd93d;
    }

    .fingerprint-container {
      width: 100%;
      height: 40px;
      margin-top: 8px;
      position: relative;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      border: 2px solid #2a2a4e;
      border-radius: 8px;
      box-shadow: #4ecdc4 0 0 4px;
      overflow: hidden;
    }

    .fingerprint-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .fingerprint-dot {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #fff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.8);
      transition: left 0.05s linear, top 0.05s linear;
    }

    .bottom-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 12px;
    }

    .genre-select-wrapper {
      position: relative;
    }

    .genre-select {
      height: 40px;
      padding: 0 20px;
      border: none;
      border-radius: 20px;
      background: #2a2a4e;
      color: #e0e0e0;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      appearance: none;
      padding-right: 44px;
      min-width: 160px;
    }

    .genre-select:hover {
      background: #3a3a5e;
    }

    .genre-select:active {
      transform: scale(0.98);
    }

    .select-arrow {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: #e0e0e0;
      font-size: 12px;
    }

    .lock-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: #2a2a4e;
      color: #e0e0e0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .lock-btn:hover {
      background: #3a3a5e;
    }

    .lock-btn.locked {
      color: #ffd93d;
    }

    .lock-btn:active {
      transform: scale(0.95);
    }

    .lock-btn svg {
      width: 20px;
      height: 20px;
      transition: all 0.3s ease;
    }

    .comparison-rail {
      width: 10%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 380px;
    }

    .rail-line {
      width: 4px;
      height: 100%;
      background: #4a4a6e;
      border-radius: 2px;
      position: relative;
    }

    .rail-slider {
      width: 24px;
      height: 24px;
      background: #ff6b6b;
      border-radius: 50%;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      cursor: grab;
      box-shadow: 0 0 12px rgba(255, 107, 107, 0.6);
      transition: box-shadow 0.2s ease;
      z-index: 10;
    }

    .rail-slider:hover {
      box-shadow: 0 0 18px rgba(255, 107, 107, 0.9);
    }

    .rail-slider:active {
      cursor: grabbing;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .rail-slider.dragging {
      transition: none;
    }

    @media (max-width: 768px) {
      .title {
        font-size: 18px;
        margin-bottom: 12px;
      }

      .controls-bar {
        padding: 8px 16px;
        gap: 10px;
        margin-bottom: 14px;
      }

      .control-btn {
        width: 36px;
        height: 36px;
        font-size: 16px;
      }

      .speed-btn {
        width: 34px;
        height: 34px;
        font-size: 12px;
      }

      .main-container {
        flex-direction: column;
        height: auto;
        gap: 0;
      }

      .canvas-panel {
        width: 96%;
        margin: 0 auto;
      }

      .visualizer-wrapper {
        min-height: 260px;
      }

      .comparison-rail {
        width: 96%;
        margin: 0 auto;
        min-height: 0;
        height: 40px;
      }

      .rail-line {
        width: 100%;
        height: 4px;
      }

      .rail-slider {
        top: 50%;
        left: 50%;
      }

      .bottom-controls {
        gap: 8px;
      }

      .genre-select {
        height: 32px;
        font-size: 14px;
        padding: 0 16px;
        padding-right: 36px;
        min-width: 130px;
      }

      .lock-btn {
        width: 32px;
        height: 32px;
      }

      .lock-btn svg {
        width: 16px;
        height: 16px;
      }

      .info-genre {
        font-size: 14px;
      }

      .info-bpm {
        font-size: 16px;
      }

      .info-time-sig {
        font-size: 12px;
      }

      .info-groove {
        font-size: 11px;
      }

      .info-block {
        padding: 8px 10px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <h1 class="title">🎵 音乐流派节奏可视化对比</h1>

    <div class="controls-bar">
      <button class="control-btn play-btn" id="playBtn" title="播放/暂停">
        <svg id="playIcon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </button>
      <button class="control-btn reset-btn" id="resetBtn" title="重置">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
      </button>
      <div class="speed-selector" id="speedSelector">
        <button class="speed-btn" data-speed="0.5">0.5x</button>
        <button class="speed-btn active" data-speed="1">1x</button>
        <button class="speed-btn" data-speed="1.5">1.5x</button>
        <button class="speed-btn" data-speed="2">2x</button>
      </div>
    </div>

    <div class="main-container" id="mainContainer">
      <div class="canvas-panel" id="leftPanel">
        <div class="visualizer-wrapper">
          <div class="canvas-container">
            <canvas class="waveform-canvas" id="leftCanvas"></canvas>
            <div class="info-panel">
              <div class="info-block" id="leftInfoLeft">
                <div class="info-genre" id="leftGenreName">
                  <span>爵士</span>
                </div>
                <div class="info-bpm" id="leftBpm">110 <span class="info-bpm-original" id="leftBpmOriginal"></span></div>
              </div>
              <div class="info-block" id="leftInfoRight">
                <div class="info-time-sig" id="leftTimeSig">4/4拍</div>
                <div class="info-groove" id="leftGroove">摇摆切分节奏，鼓点轻盈即兴</div>
              </div>
            </div>
          </div>
        </div>
        <div class="fingerprint-container" id="leftFingerprint">
          <canvas class="fingerprint-canvas" id="leftFingerprintCanvas"></canvas>
          <div class="fingerprint-dot" id="leftFingerprintDot"></div>
        </div>
        <div class="bottom-controls">
          <div class="genre-select-wrapper">
            <select class="genre-select" id="leftGenreSelect"></select>
            <span class="select-arrow">▼</span>
          </div>
          <button class="lock-btn" id="leftLockBtn" title="锁定流派">
            <svg id="leftLockIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="comparison-rail" id="comparisonRail">
        <div class="rail-line">
          <div class="rail-slider" id="railSlider"></div>
        </div>
      </div>

      <div class="canvas-panel" id="rightPanel">
        <div class="visualizer-wrapper">
          <div class="canvas-container">
            <canvas class="waveform-canvas" id="rightCanvas"></canvas>
            <div class="info-panel">
              <div class="info-block" id="rightInfoLeft">
                <div class="info-genre" id="rightGenreName">
                  <span>电子</span>
                </div>
                <div class="info-bpm" id="rightBpm">128 <span class="info-bpm-original" id="rightBpmOriginal"></span></div>
              </div>
              <div class="info-block" id="rightInfoRight">
                <div class="info-time-sig" id="rightTimeSig">4/4拍</div>
                <div class="info-groove" id="rightGroove">强劲四四拍，底鼓每拍重击</div>
              </div>
            </div>
          </div>
        </div>
        <div class="fingerprint-container" id="rightFingerprint">
          <canvas class="fingerprint-canvas" id="rightFingerprintCanvas"></canvas>
          <div class="fingerprint-dot" id="rightFingerprintDot"></div>
        </div>
        <div class="bottom-controls">
          <div class="genre-select-wrapper">
            <select class="genre-select" id="rightGenreSelect"></select>
            <span class="select-arrow">▼</span>
          </div>
          <button class="lock-btn" id="rightLockBtn" title="锁定流派">
            <svg id="rightLockIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
