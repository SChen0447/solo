<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>熔核·舞械</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    #combo-display {
      position: absolute;
      top: 30px;
      left: 40px;
      color: #ffffff;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
      transition: color 0.2s, font-size 0.2s;
    }
    #combo-display.gold {
      color: #ffd700;
      font-size: 36px;
      animation: shake 0.3s infinite;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-3px); }
      75% { transform: translateX(3px); }
    }
    #energy-bar-container {
      position: absolute;
      top: 30px;
      right: 40px;
      width: 150px;
      height: 20px;
      background: rgba(50, 50, 50, 0.8);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(102, 51, 255, 0.5);
      box-shadow: 0 0 10px rgba(102, 51, 255, 0.3);
    }
    #energy-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ffff99 0%, #ff8800 100%);
      transition: width 0.3s ease;
      box-shadow: 0 0 10px rgba(255, 200, 0, 0.5);
    }
    #energy-label {
      position: absolute;
      top: 55px;
      right: 40px;
      color: #ffffff;
      font-size: 12px;
      opacity: 0.8;
    }
    #beat-progress-container {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 60vw;
      height: 6px;
      background: rgba(10, 10, 46, 0.6);
      border-radius: 3px;
      overflow: visible;
    }
    #beat-indicator {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 12px;
      height: 12px;
      background: #00ffff;
      border-radius: 50%;
      box-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff;
      left: 0%;
    }
    #start-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 16px 48px;
      font-size: 20px;
      color: #ffffff;
      background: linear-gradient(135deg, #6633ff 0%, #00ffff 100%);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      pointer-events: auto;
      font-weight: bold;
      letter-spacing: 2px;
      box-shadow: 0 0 20px rgba(102, 51, 255, 0.5);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    #start-btn:hover {
      transform: translate(-50%, -50%) scale(1.05);
      box-shadow: 0 0 40px rgba(102, 51, 255, 0.8), 0 0 60px rgba(0, 255, 255, 0.4);
    }
    #controls-hint {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      text-align: center;
      line-height: 1.8;
    }
    #controls-hint span {
      display: inline-block;
      padding: 4px 10px;
      margin: 0 4px;
      background: rgba(102, 51, 255, 0.3);
      border-radius: 4px;
      border: 1px solid rgba(102, 51, 255, 0.5);
      color: #ffffff;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="ui-overlay">
      <div id="combo-display">COMBO: 0</div>
      <div id="energy-bar-container">
        <div id="energy-bar"></div>
      </div>
      <div id="energy-label">能量 (8层释放必杀)</div>
      <div id="beat-progress-container">
        <div id="beat-indicator"></div>
      </div>
      <button id="start-btn">开始游戏</button>
      <div id="controls-hint">
        <span>←→↑↓</span> 移动 &nbsp; <span>空格</span> 攻击(踢/旋转/闪烁循环) &nbsp; <span>空格+↑</span> 必杀技
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
