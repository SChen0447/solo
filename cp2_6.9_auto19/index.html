<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D骑行路线回放与地形分析</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #canvas-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    #ui-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 340px;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 20px;
      z-index: 10;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    #ui-panel::-webkit-scrollbar {
      width: 6px;
    }

    #ui-panel::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
    }

    #ui-panel::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    .panel-section {
      margin-bottom: 20px;
    }

    .panel-section:last-child {
      margin-bottom: 0;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #00d2ff;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .upload-area {
      border: 2px dashed rgba(0, 210, 255, 0.4);
      border-radius: 8px;
      padding: 30px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      background: rgba(0, 210, 255, 0.03);
    }

    .upload-area:hover {
      border-color: #00d2ff;
      background: rgba(0, 210, 255, 0.08);
      transform: scale(1.02);
    }

    .upload-area.dragover {
      border-color: #00d2ff;
      background: rgba(0, 210, 255, 0.15);
      transform: scale(1.02);
    }

    .upload-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .upload-text {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
    }

    .upload-hint {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 4px;
    }

    .file-name {
      margin-top: 10px;
      font-size: 12px;
      color: #00d2ff;
      word-break: break-all;
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .control-row:last-child {
      margin-bottom: 0;
    }

    .control-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      min-width: 50px;
    }

    .btn {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      background: linear-gradient(135deg, #00d2ff, #3a7bd5);
      color: #fff;
    }

    .btn:hover {
      transform: scale(1.03);
      box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn.secondary {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.9);
    }

    .btn.secondary:hover {
      background: rgba(255, 255, 255, 0.2);
      box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
    }

    .btn.pause {
      background: linear-gradient(135deg, #ff6b35, #ff8c42);
    }

    .btn.pause:hover {
      box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
    }

    .slider-container {
      flex: 1;
      position: relative;
    }

    .slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right, rgba(0, 210, 255, 0.2), rgba(255, 107, 53, 0.2));
      outline: none;
      cursor: pointer;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #00d2ff;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 210, 255, 0.5);
      transition: transform 0.15s ease;
    }

    .slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #00d2ff;
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 8px rgba(0, 210, 255, 0.5);
    }

    .slider-value {
      position: absolute;
      top: -20px;
      font-size: 11px;
      color: #00d2ff;
      pointer-events: none;
      white-space: nowrap;
    }

    .speed-value {
      font-size: 12px;
      color: #ff6b35;
      min-width: 36px;
      text-align: right;
      font-weight: 600;
    }

    #elevation-chart {
      width: 100%;
      height: 120px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.4);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .stat-item {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: #00d2ff;
    }

    .stat-label {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 2px;
    }

    .terrain-control {
      margin-top: 10px;
    }

    @media (max-width: 768px) {
      #ui-panel {
        top: auto;
        right: 0;
        left: 0;
        bottom: 0;
        width: 100%;
        max-height: 45vh;
        border-radius: 16px 16px 0 0;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div id="ui-panel">
      <div class="panel-section">
        <div class="section-title">上传骑行记录</div>
        <div class="upload-area" id="upload-area">
          <div class="upload-icon">📁</div>
          <div class="upload-text">点击或拖拽上传</div>
          <div class="upload-hint">支持 GPX / CSV 格式，最多1000个轨迹点</div>
          <div class="file-name" id="file-name"></div>
        </div>
        <input type="file" id="file-input" accept=".gpx,.csv" style="display:none" />
      </div>

      <div class="panel-section">
        <div class="section-title">播放控制</div>
        <div class="control-row">
          <button class="btn" id="play-btn">▶ 开始播放</button>
          <button class="btn secondary" id="reset-btn">↺ 重置</button>
        </div>
        <div class="control-row">
          <span class="control-label">进度</span>
          <div class="slider-container">
            <span class="slider-value" id="progress-value">0%</span>
            <input type="range" class="slider" id="progress-slider" min="0" max="100" value="0" />
          </div>
        </div>
        <div class="control-row">
          <span class="control-label">速度</span>
          <div class="slider-container">
            <input type="range" class="slider" id="speed-slider" min="0.5" max="5" step="0.1" value="1" />
          </div>
          <span class="speed-value" id="speed-value">1.0x</span>
        </div>
      </div>

      <div class="panel-section">
        <div class="section-title">地形设置</div>
        <div class="control-row terrain-control">
          <span class="control-label">起伏</span>
          <div class="slider-container">
            <input type="range" class="slider" id="terrain-slider" min="0" max="100" value="50" />
          </div>
          <span class="speed-value" id="terrain-value">50%</span>
        </div>
      </div>

      <div class="panel-section">
        <div class="section-title">海拔曲线</div>
        <canvas id="elevation-chart"></canvas>
      </div>

      <div class="panel-section">
        <div class="section-title">骑行统计</div>
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-value" id="stat-distance">0.00</div>
            <div class="stat-label">总距离 (km)</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="stat-elevation">0</div>
            <div class="stat-label">平均海拔 (m)</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="stat-speed">0.0</div>
            <div class="stat-label">平均速度 (km/h)</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="stat-duration">0:00</div>
            <div class="stat-label">总时长</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
