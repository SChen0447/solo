<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>音律共鸣 - 解谜原型</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0d1f0d;
      font-family: 'Segoe UI', sans-serif;
    }
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    canvas {
      display: block;
      width: 100%;
      height: calc(100% - 40px);
      cursor: pointer;
    }
    #status-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 40px;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    #status-text {
      font-size: 16px;
      color: #f0e68c;
      text-shadow:
        -1px -1px 0 #000,
        1px -1px 0 #000,
        -1px 1px 0 #000,
        1px 1px 0 #000;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="status-bar">
      <span id="status-text">藤蔓：0/0</span>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
