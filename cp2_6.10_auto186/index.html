<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Combo Tree Editor - 连招树编辑器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: 'Courier New', monospace;
      color: #e2e8f0;
      user-select: none;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    .title {
      position: fixed;
      top: 12px;
      left: 16px;
      font-size: 14px;
      color: rgba(226, 232, 240, 0.6);
      z-index: 1000;
      letter-spacing: 1px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="title">Combo Tree Editor - 连招树编辑器</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
