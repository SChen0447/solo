<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HACKER TERMINAL - Rhythm Game</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: 'Consolas', 'Courier New', monospace;
      }

      #game-container {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #000;
      }

      #game-canvas {
        display: block;
        image-rendering: pixelated;
      }

      #ui-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
      }

      .glass-panel {
        position: absolute;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(0, 255, 0, 0.3);
        border-radius: 4px;
      }

      #start-screen {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: #00ff00;
        pointer-events: auto;
      }

      #start-screen h1 {
        font-size: 48px;
        margin-bottom: 20px;
        text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
        letter-spacing: 4px;
      }

      #start-screen p {
        font-size: 18px;
        margin-bottom: 30px;
        color: #00cc00;
      }

      #start-btn {
        font-family: 'Consolas', 'Courier New', monospace;
        font-size: 20px;
        padding: 15px 40px;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(8px);
        color: #00ff00;
        border: 2px solid #00ff00;
        cursor: pointer;
        letter-spacing: 2px;
        text-shadow: 0 0 5px #00ff00;
        transition: all 0.3s;
      }

      #start-btn:hover {
        background: rgba(0, 255, 0, 0.2);
        box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="ui-overlay"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
