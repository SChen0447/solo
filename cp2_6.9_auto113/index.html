<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全球气温变化三维可视化 | 地球气候探索</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #0B0E2A 0%, #1C1F3F 100%);
      color: #ffffff;
    }

    #app {
      width: 100%;
      height: calc(100vh - 60px);
      position: relative;
    }

    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: calc(100vh - 60px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #0B0E2A 0%, #1C1F3F 100%);
      z-index: 1000;
      transition: opacity 0.5s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-ring {
      width: 48px;
      height: 48px;
      border: 2px solid transparent;
      border-top-color: #4A90D9;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loading-text {
      margin-top: 16px;
      font-size: 14px;
      color: #94a3b8;
      letter-spacing: 1px;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    #tooltip {
      position: fixed;
      background: rgba(0, 0, 0, 0.7);
      color: #ffffff;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 13px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 100;
      white-space: nowrap;
    }

    #tooltip.visible {
      opacity: 1;
    }

    #detail-panel {
      position: fixed;
      right: -360px;
      top: 0;
      width: 320px;
      height: 100vh;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-left: 2px solid rgba(255, 255, 255, 0.3);
      padding: 24px 20px;
      z-index: 90;
      transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      overflow-y: auto;
    }

    #detail-panel.open {
      right: 0;
    }

    #detail-panel .panel-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    #detail-panel .panel-close:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    #detail-panel .country-name {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 4px;
      padding-right: 40px;
    }

    #detail-panel .country-subtitle {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 24px;
    }

    #detail-panel .chart-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 12px;
      color: #cbd5e1;
    }

    #detail-panel #temp-chart {
      width: 100%;
      height: 160px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      margin-bottom: 20px;
    }

    #detail-panel .analysis-box {
      background: rgba(74, 144, 217, 0.1);
      border-left: 3px solid #4A90D9;
      padding: 14px 16px;
      border-radius: 6px;
    }

    #detail-panel .analysis-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #4A90D9;
      margin-bottom: 8px;
      font-weight: 600;
    }

    #detail-panel .analysis-text {
      font-size: 13px;
      line-height: 1.6;
      color: #e2e8f0;
    }

    #bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 80;
    }

    #bottom-bar .current-country {
      font-size: 15px;
      font-weight: 500;
      min-width: 160px;
    }

    #bottom-bar .mode-buttons {
      display: flex;
      gap: 4px;
      background: rgba(255, 255, 255, 0.05);
      padding: 4px;
      border-radius: 10px;
    }

    #bottom-bar .mode-btn {
      padding: 8px 18px;
      border: none;
      background: transparent;
      color: #94a3b8;
      font-size: 13px;
      cursor: pointer;
      border-radius: 7px;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    #bottom-bar .mode-btn:hover {
      color: #e2e8f0;
    }

    #bottom-bar .mode-btn.active {
      background: rgba(255, 255, 255, 0.2);
      color: #ffffff;
    }

    #bottom-bar .reset-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease, background 0.2s;
    }

    #bottom-bar .reset-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: rotate(180deg);
    }

    #bottom-bar .reset-btn svg {
      width: 18px;
      height: 18px;
    }

    @media (max-width: 768px) {
      #detail-panel {
        right: 0;
        bottom: -60vh;
        top: auto;
        width: 100%;
        height: 50vh;
        border-left: none;
        border-top: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 12px 12px 0 0;
        transition: bottom 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }

      #detail-panel.open {
        bottom: 60px;
        right: 0;
      }

      #bottom-bar {
        padding: 0 12px;
      }

      #bottom-bar .current-country {
        font-size: 13px;
        min-width: 100px;
      }

      #bottom-bar .mode-btn {
        padding: 6px 10px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loading-ring"></div>
    <div class="loading-text">正在加载气候数据...</div>
  </div>

  <div id="app"></div>

  <div id="tooltip"></div>

  <div id="detail-panel">
    <button class="panel-close" id="panel-close">&times;</button>
    <div class="country-name" id="panel-country">-</div>
    <div class="country-subtitle" id="panel-subtitle">温度变化趋势分析</div>
    <div class="chart-title">1960 - 2024 年均温度变化</div>
    <canvas id="temp-chart" width="280" height="160"></canvas>
    <div class="analysis-box">
      <div class="analysis-label">AI 气候分析</div>
      <div class="analysis-text" id="panel-analysis">-</div>
    </div>
  </div>

  <div id="bottom-bar">
    <div class="current-country" id="current-country">地球气候探索</div>
    <div class="mode-buttons">
      <button class="mode-btn active" data-mode="bars">柱状图</button>
      <button class="mode-btn" data-mode="heatmap">热力图</button>
      <button class="mode-btn" data-mode="both">叠加模式</button>
    </div>
    <button class="reset-btn" id="reset-view" title="重置视角">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
        <path d="M3 3v5h5"></path>
      </svg>
    </button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
