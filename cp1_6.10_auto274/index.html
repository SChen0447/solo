<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>弦音织梦</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #game-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .hud {
      position: absolute;
      pointer-events: none;
      color: #fff;
    }

    #hud-panel {
      top: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 8px;
      padding: 12px 16px;
      pointer-events: auto;
    }

    #score {
      font-size: 48px;
      font-weight: bold;
      line-height: 1.1;
      background: linear-gradient(180deg, #ffffff, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #score.gold {
      background: linear-gradient(180deg, #ffd700, #ff8c00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #combo {
      font-size: 20px;
      margin-top: 4px;
      opacity: 0.85;
    }

    #phase-progress {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 120px;
      height: 6px;
      background: #333;
      border-radius: 3px;
      overflow: hidden;
    }

    #phase-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4488ff, #aa66ff);
      transition: width 0.1s linear;
    }

    #phase-label {
      position: absolute;
      top: 32px;
      right: 20px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
    }

    #key-hints {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
    }

    .key-box {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      color: rgba(255, 255, 255, 0.7);
      transition: all 0.08s ease;
      user-select: none;
    }

    .key-box.active-a {
      background: #4488ff;
      color: #fff;
      transform: scale(0.95);
    }

    .key-box.active-s {
      background: #4488ff;
      color: #fff;
      transform: scale(0.95);
    }

    .key-box.active-d {
      background: #4488ff;
      color: #fff;
      transform: scale(0.95);
    }

    .key-box.active-f {
      background: #4488ff;
      color: #fff;
      transform: scale(0.95);
    }

    #game-over {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.7);
      z-index: 10;
    }

    #game-over.visible {
      display: flex;
    }

    #game-over-title {
      font-size: 72px;
      font-weight: bold;
      color: #ff2244;
      text-shadow: 0 0 10px rgba(255, 34, 68, 0.8),
                   0 0 20px rgba(255, 34, 68, 0.5),
                   0 0 40px rgba(255, 34, 68, 0.3);
      margin-bottom: 20px;
    }

    #final-score {
      font-size: 32px;
      color: #fff;
      margin-bottom: 40px;
    }

    #restart-btn {
      padding: 14px 40px;
      font-size: 20px;
      font-weight: bold;
      color: #fff;
      background: #4488ff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
      pointer-events: auto;
    }

    #restart-btn:hover {
      background: #5a99ff;
    }

    #restart-btn:active {
      transform: scale(0.97);
    }

    @media (max-width: 768px) {
      #score { font-size: 36px; }
      #combo { font-size: 16px; }
      #game-over-title { font-size: 48px; }
      #final-score { font-size: 24px; }
      .key-box { width: 36px; height: 36px; font-size: 16px; }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>

    <div id="hud-panel" class="hud">
      <div id="score">0</div>
      <div id="combo">Combo: 0</div>
    </div>

    <div id="phase-progress">
      <div id="phase-bar"></div>
    </div>
    <div id="phase-label">阶段 1</div>

    <div id="key-hints">
      <div class="key-box" data-key="a">A</div>
      <div class="key-box" data-key="s">S</div>
      <div class="key-box" data-key="d">D</div>
      <div class="key-box" data-key="f">F</div>
    </div>

    <div id="game-over">
      <div id="game-over-title">Game Over</div>
      <div id="final-score">最终分数: 0</div>
      <button id="restart-btn">重新开始</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
