<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星辉·符咒解谜</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(180deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
    }

    .game-title {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      font-weight: 600;
      color: #f1c40f;
      text-shadow: 0 0 10px #f1c40f, 0 0 20px rgba(241, 196, 15, 0.5);
      z-index: 10;
      letter-spacing: 8px;
    }

    .progress-panel {
      position: fixed;
      right: 0;
      top: 0;
      width: 80px;
      height: 100%;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 20;
      border-left: 1px solid rgba(255, 255, 255, 0.05);
    }

    .progress-dots {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .progress-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transition: all 0.5s ease-out;
    }

    .progress-dot.completed {
      background: #2ecc71;
      animation: breathe 1.5s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% {
        box-shadow: 0 0 4px #2ecc71, 0 0 8px rgba(46, 204, 113, 0.4);
        transform: scale(1);
      }
      50% {
        box-shadow: 0 0 12px #2ecc71, 0 0 24px rgba(46, 204, 113, 0.6);
        transform: scale(1.3);
      }
    }

    .level-label {
      position: absolute;
      bottom: 24px;
      font-size: 14px;
      color: #f1c40f;
      text-shadow: 0 0 10px #f1c40f;
      font-weight: 600;
      letter-spacing: 2px;
    }

    .spell-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 32px;
      color: #f1c40f;
      text-shadow: 0 0 4px #f1c40f, 0 0 8px #f1c40f, 0 0 16px rgba(241, 196, 15, 0.6);
      z-index: 50;
      pointer-events: none;
      opacity: 0;
      font-weight: 700;
      letter-spacing: 12px;
    }

    .screen-flash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(241, 196, 15, 0.2);
      z-index: 100;
      pointer-events: none;
      opacity: 0;
    }

    .error-mark {
      position: absolute;
      width: 24px;
      height: 24px;
      pointer-events: none;
      z-index: 30;
      opacity: 0;
      font-size: 24px;
      color: rgba(255, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
    }

    .hints {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      text-shadow: 0 0 6px rgba(255, 255, 255, 0.3);
      z-index: 10;
      letter-spacing: 2px;
    }

    @media (max-width: 1024px) and (min-width: 768px) {
      .game-title { font-size: 20px; letter-spacing: 6px; }
    }

    @media (max-width: 768px) {
      .game-title { font-size: 18px; letter-spacing: 4px; top: 12px; }
      .progress-panel { width: 50px; gap: 10px; }
      .progress-dots { gap: 10px; }
      .level-label { font-size: 12px; bottom: 16px; }
      .spell-text { font-size: 24px; letter-spacing: 8px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="game-title">星 辉 · 符 咒 解 谜</div>
    <canvas id="gameCanvas"></canvas>
    <div class="progress-panel">
      <div class="progress-dots" id="progressDots"></div>
      <div class="level-label" id="levelLabel">关卡 I</div>
    </div>
    <div class="spell-text" id="spellText"></div>
    <div class="screen-flash" id="screenFlash"></div>
    <div class="hints">点击最多 3 个相邻符文 · 组合成特定形状触发咒语</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
