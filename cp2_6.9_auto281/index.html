<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>引力剧场 - Gravity Theater</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #0B0D20 0%, #1A1D3A 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #E0E0FF;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #stars-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    #ui-panel {
      position: absolute;
      top: 80px;
      left: 20px;
      width: 260px;
      background: rgba(26, 29, 43, 0.85);
      border-radius: 12px;
      padding: 20px;
      z-index: 10;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    #reset-btn {
      position: absolute;
      bottom: 30px;
      left: 30px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #FF6B6B;
      border: none;
      cursor: pointer;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease-out;
    }

    #reset-btn:hover {
      transform: scale(1.1);
    }

    #reset-btn svg {
      width: 20px;
      height: 20px;
      stroke: #FFFFFF;
      stroke-width: 3;
      stroke-linecap: round;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="stars-layer"></canvas>
    <div id="canvas-container"></div>
    <div id="ui-panel"></div>
    <button id="reset-btn" title="重置">
      <svg viewBox="0 0 24 24" fill="none">
        <line x1="6" y1="6" x2="18" y2="18" />
        <line x1="18" y1="6" x2="6" y2="18" />
      </svg>
    </button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
