<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>元素战队竞技场</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a0a2e;
        font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      }
      #root {
        width: 100vw;
        height: 100vh;
        position: relative;
      }
      #game-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }
      #ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        pointer-events: none;
      }
      #ui-layer > * {
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="game-container"></div>
      <div id="ui-layer"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
