<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星尘轨迹 - Stardust Trajectory</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(180deg, #050510 0%, #0a0a2e 100%);
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #canvas-container canvas {
      display: block;
    }

    #fps-counter {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #00ff88;
      font-size: 14px;
      font-family: "Consolas", "Monaco", monospace;
      text-shadow: 0 0 8px rgba(0, 255, 136, 0.5);
      z-index: 10;
      user-select: none;
    }

    #control-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 240px;
      padding: 20px;
      background: rgba(10, 10, 30, 0.75);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      border: 1px solid rgba(107, 203, 255, 0.15);
      z-index: 10;
      user-select: none;
    }

    #control-panel h2 {
      color: #6bcbff;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(107, 203, 255, 0.4);
    }

    .control-group {
      margin-bottom: 22px;
    }

    .control-group:last-child {
      margin-bottom: 0;
    }

    .control-group label {
      display: block;
      color: #ccc;
      font-size: 13px;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    .slider-wrapper {
      position: relative;
      width: 100%;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 180px;
      height: 6px;
      background: #334;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
      transition: background 0.2s;
    }

    input[type="range"]:hover {
      background: #445;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #6bcbff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(107, 203, 255, 0.6);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 16px rgba(107, 203, 255, 0.9);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #6bcbff;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 10px rgba(107, 203, 255, 0.6);
    }

    .slider-value {
      display: inline-block;
      margin-left: 12px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      min-width: 48px;
      text-align: right;
      font-family: "Consolas", "Monaco", monospace;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(107, 203, 255, 0.3), transparent);
      margin: 16px 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="fps-counter">FPS: 60</div>
    <div id="control-panel">
      <h2>星尘轨迹</h2>
      <div class="divider"></div>
      <div class="control-group">
        <label>粒子数量</label>
        <div class="slider-wrapper">
          <input type="range" id="particle-count" min="500" max="5000" step="100" value="2000" />
          <span class="slider-value" id="particle-count-value">2000</span>
        </div>
      </div>
      <div class="control-group">
        <label>引力场强</label>
        <div class="slider-wrapper">
          <input type="range" id="gravity-strength" min="0.5" max="5.0" step="0.1" value="2.0" />
          <span class="slider-value" id="gravity-strength-value">2.0</span>
        </div>
      </div>
      <div class="control-group">
        <label>轨道速度倍率</label>
        <div class="slider-wrapper">
          <input type="range" id="orbit-speed" min="0.1" max="3.0" step="0.1" value="1.0" />
          <span class="slider-value" id="orbit-speed-value">1.0</span>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
