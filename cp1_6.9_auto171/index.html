<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>虚界数据流呼吸灯</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #0f0518 0%, #050510 100%);
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #status-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      background-color: rgba(17, 17, 34, 0.7);
      color: #aabbcc;
      font-size: 14px;
      padding: 16px 20px;
      border-radius: 12px;
      line-height: 1.8;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: opacity 0.3s ease;
      z-index: 100;
      min-width: 200px;
    }

    #status-panel:hover {
      opacity: 0.9;
    }

    #status-panel .panel-title {
      font-size: 16px;
      font-weight: 600;
      color: #ccddee;
      margin-bottom: 8px;
      border-bottom: 1px solid rgba(170, 187, 204, 0.2);
      padding-bottom: 6px;
    }

    #status-panel .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #status-panel .stat-label {
      opacity: 0.8;
    }

    #status-panel .stat-value {
      font-weight: 500;
      color: #88eecc;
    }

    #status-panel .breathing-expanding {
      color: #ff9966;
    }

    #status-panel .breathing-contracting {
      color: #66aaff;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="status-panel">
      <div class="panel-title">虚界数据流</div>
      <div class="stat-row">
        <span class="stat-label">粒子总数:</span>
        <span class="stat-value" id="stat-particles">3000</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">呼吸状态:</span>
        <span class="stat-value" id="stat-breathing">膨胀</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">视角距离:</span>
        <span class="stat-value" id="stat-distance">15.0</span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
