<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>烛影·棋盘</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(to top, #0a1128, #1a1a2e);
      font-family: "KaiTi", "STKaiti", "Microsoft YaHei", serif;
    }
    #game-container {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
      cursor: pointer;
    }
    #info-panel {
      position: absolute;
      right: 20px;
      bottom: 20px;
      width: 200px;
      height: 100px;
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid rgba(212, 175, 55, 0.6);
      border-radius: 8px;
      padding: 12px 16px;
      color: #d4af37;
      font-size: 14px;
      line-height: 1.8;
      z-index: 10;
      backdrop-filter: blur(4px);
    }
    #info-panel .title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 6px;
      color: #ffdd66;
      text-shadow: 0 0 8px rgba(255, 221, 102, 0.5);
    }
    #info-panel .row {
      display: flex;
      justify-content: space-between;
      color: #c9b896;
    }
    #info-panel .value {
      color: #ffdd66;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="info-panel">
      <div class="title">烛影·棋盘</div>
      <div class="row"><span>回合：</span><span class="value" id="turn-display">黑方</span></div>
      <div class="row"><span>落子数：</span><span class="value" id="move-count">0</span></div>
      <div class="row"><span>用时：</span><span class="value" id="timer">00:00</span></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
