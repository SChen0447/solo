<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D 数据降维可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #1a1a2e;
      color: #e0e0e0;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #ui-hint {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 14px;
      color: #e0e0e0;
      background: rgba(30, 30, 50, 0.7);
      padding: 12px 16px;
      border-radius: 8px;
      backdrop-filter: blur(8px);
      line-height: 1.6;
      z-index: 10;
    }

    #ui-hint b {
      color: #64b5f6;
    }

    #stats-panel {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(30, 30, 50, 0.85);
      padding: 16px 20px;
      border-radius: 8px;
      backdrop-filter: blur(8px);
      font-size: 13px;
      line-height: 1.8;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
      z-index: 10;
      min-width: 240px;
    }

    #stats-panel.visible {
      opacity: 1;
      transform: translateY(0);
    }

    #stats-panel h3 {
      font-size: 14px;
      margin-bottom: 8px;
      color: #64b5f6;
      font-weight: 600;
    }

    #stats-panel .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
    }

    #stats-panel .stat-label {
      color: #a0a0a0;
    }

    #stats-panel .stat-value {
      color: #e0e0e0;
      font-weight: 500;
    }

    #tooltip {
      position: absolute;
      background: rgba(30, 30, 50, 0.95);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.6;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -120%);
      transition: opacity 0.15s ease;
      z-index: 100;
      min-width: 200px;
      border: 1px solid rgba(100, 181, 246, 0.3);
    }

    #tooltip.visible {
      opacity: 1;
    }

    #tooltip .tooltip-title {
      font-weight: 600;
      color: #64b5f6;
      margin-bottom: 6px;
      font-size: 13px;
    }

    #tooltip .tooltip-row {
      display: flex;
      justify-content: space-between;
      padding: 1px 0;
    }

    #tooltip .tooltip-label {
      color: #a0a0a0;
    }

    #tooltip .tooltip-value {
      color: #e0e0e0;
    }

    #selection-box {
      position: absolute;
      border: 2px solid #64b5f6;
      background: rgba(100, 181, 246, 0.1);
      pointer-events: none;
      display: none;
      z-index: 50;
    }

    .lil-gui {
      --width: 240px;
      --background-color: rgba(30, 30, 50, 0.85);
      --widget-color: rgba(60, 60, 90, 0.8);
      --focus-color: rgba(100, 181, 246, 0.4);
      --hover-color: rgba(80, 80, 120, 0.8);
      --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-size: 12px;
      --input-font-size: 12px;
      backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 8px;
    }

    .lil-gui .controller {
      transition: background-color 0.2s ease;
    }

    .lil-gui .controller:hover {
      background-color: rgba(100, 181, 246, 0.1);
    }

    .lil-gui .name {
      color: #e0e0e0 !important;
    }

    .lil-gui .title {
      color: #64b5f6 !important;
      font-weight: 600 !important;
    }

    .lil-gui .boolean input[type="checkbox"] {
      accent-color: #64b5f6;
    }

    .lil-gui .select select {
      background-color: rgba(60, 60, 90, 0.8);
      color: #e0e0e0;
      border: none;
      border-radius: 4px;
    }

    .lil-gui .button {
      transition: background-color 0.2s ease;
    }

    .lil-gui .button:hover {
      background-color: rgba(100, 181, 246, 0.3) !important;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    
    <div id="ui-hint">
      <b>操作提示：</b><br>
      🖱️ 左键：旋转视角 | 右键：平移 | 滚轮：缩放<br>
      🏷️ 悬停：查看详情 | 拖拽：框选数据点
    </div>

    <div id="stats-panel"></div>
    <div id="tooltip"></div>
    <div id="selection-box"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
