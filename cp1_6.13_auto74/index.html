<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星尘织机 · Stardust Loom</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0014;
      font-family: 'Georgia', 'Times New Roman', serif;
      min-width: 1024px;
      min-height: 768px;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0014;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 1s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      position: relative;
      width: 80px;
      height: 80px;
    }

    .loading-star {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 6px #fff, 0 0 12px #aaddff;
      animation: orbit 2s linear infinite;
    }

    .loading-star:nth-child(1) { animation-delay: 0s; }
    .loading-star:nth-child(2) { animation-delay: 0.4s; }
    .loading-star:nth-child(3) { animation-delay: 0.8s; }
    .loading-star:nth-child(4) { animation-delay: 1.2s; }
    .loading-star:nth-child(5) { animation-delay: 1.6s; }

    @keyframes orbit {
      0% {
        transform: rotate(0deg) translateX(35px);
        opacity: 1;
      }
      100% {
        transform: rotate(360deg) translateX(35px);
        opacity: 0.3;
      }
    }

    .loading-text {
      margin-top: 30px;
      color: #c0a0ff;
      font-size: 18px;
      letter-spacing: 4px;
      text-shadow: 0 0 10px rgba(192, 160, 255, 0.5);
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #ui-controls {
      position: fixed;
      left: 24px;
      bottom: 24px;
      z-index: 100;
    }

    .control-panel {
      background: rgba(20, 10, 40, 0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(180, 140, 255, 0.25);
      border-radius: 12px;
      padding: 18px 20px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3),
                  inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .control-title {
      color: #d8c0ff;
      font-size: 14px;
      letter-spacing: 2px;
      margin-bottom: 14px;
      text-shadow: 0 0 8px rgba(180, 140, 255, 0.4);
    }

    .control-btn {
      display: block;
      width: 100%;
      padding: 10px 18px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, rgba(80, 40, 140, 0.6), rgba(40, 20, 80, 0.6));
      border: 1px solid rgba(180, 140, 255, 0.4);
      border-radius: 8px;
      color: #e8d8ff;
      font-size: 13px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .control-btn:last-child {
      margin-bottom: 0;
    }

    .control-btn:hover {
      background: linear-gradient(135deg, rgba(120, 70, 180, 0.7), rgba(60, 30, 100, 0.7));
      border-color: rgba(200, 170, 255, 0.6);
      box-shadow: 0 0 16px rgba(180, 140, 255, 0.3);
      transform: translateY(-1px);
    }

    .control-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading">
      <div class="loading-spinner">
        <div class="loading-star"></div>
        <div class="loading-star"></div>
        <div class="loading-star"></div>
        <div class="loading-star"></div>
        <div class="loading-star"></div>
      </div>
      <div class="loading-text">星尘织机 · 启动中</div>
    </div>
    <div id="canvas-container"></div>
    <div id="ui-controls">
      <div class="control-panel">
        <div class="control-title">星尘织机</div>
        <button class="control-btn" id="btn-reset">重置织机</button>
        <button class="control-btn" id="btn-export">导出 SVG 星图</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
