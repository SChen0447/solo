<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>食光·旬味 - 时令美食探索</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <div class="welcome-overlay" id="welcomeOverlay">
      <div class="welcome-content">
        <div class="food-icons">
          <span class="icon icon-veggie">🥬</span>
          <span class="icon icon-fruit">🍎</span>
          <span class="icon icon-grain">🌾</span>
          <span class="icon icon-carrot">🥕</span>
          <span class="icon icon-tomato">🍅</span>
        </div>
        <h1 class="welcome-title">食光·旬味</h1>
        <p class="welcome-subtitle">探索四季的味道</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Inter', sans-serif;
        background: #FDF8F0;
      }
      
      .welcome-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #FDF8F0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        animation: fadeOut 1s ease-in-out 2.5s forwards;
      }
      
      .welcome-content {
        text-align: center;
      }
      
      .food-icons {
        position: relative;
        width: 140px;
        height: 140px;
        margin: 0 auto 30px;
      }
      
      .food-icons .icon {
        position: absolute;
        font-size: 32px;
        animation: rotate 3s linear infinite;
      }
      
      .icon-veggie { top: 0; left: 50%; transform: translateX(-50%); animation-duration: 2.5s !important; }
      .icon-fruit { top: 20%; right: 0; animation-duration: 3s !important; }
      .icon-grain { bottom: 20%; right: 0; animation-duration: 2s !important; }
      .icon-carrot { bottom: 0; left: 50%; transform: translateX(-50%); animation-duration: 3.5s !important; }
      .icon-tomato { bottom: 20%; left: 0; animation-duration: 2.8s !important; }
      
      @keyframes rotate {
        from { transform: rotate(0deg) translateX(60px) rotate(0deg); }
        to { transform: rotate(360deg) translateX(60px) rotate(-360deg); }
      }
      
      .welcome-title {
        font-family: 'Playfair Display', serif;
        font-size: 42px;
        color: #6B8E23;
        margin-bottom: 12px;
        animation: scaleIn 0.8s ease-out;
        letter-spacing: 2px;
      }
      
      .welcome-subtitle {
        font-size: 18px;
        color: #D2691E;
        animation: fadeInUp 1s ease-out 0.5s both;
        font-weight: 300;
      }
      
      @keyframes scaleIn {
        from { transform: scale(0.5); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
      
      @keyframes fadeInUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      
      @keyframes fadeOut {
        to { opacity: 0; visibility: hidden; }
      }
    </style>
    <script>
      setTimeout(() => {
        const overlay = document.getElementById('welcomeOverlay');
        if (overlay) {
          overlay.style.display = 'none';
        }
      }, 3000);
    </script>
  </body>
</html>
