<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>粒子星系 · Particle Galaxy</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0B0E14;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      color: #e0e6f0;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    canvas {
      display: block;
    }

    #fps-counter {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 8px 14px;
      background: rgba(15, 20, 30, 0.85);
      border: 1px solid rgba(120, 150, 200, 0.2);
      border-radius: 8px;
      font-size: 13px;
      font-family: 'SF Mono', 'Consolas', monospace;
      letter-spacing: 0.5px;
      color: #7dd3fc;
      backdrop-filter: blur(8px);
      z-index: 10;
      transition: color 0.3s ease;
    }

    #fps-counter.low {
      color: #f87171;
    }

    #fps-warning {
      position: absolute;
      top: 60px;
      left: 16px;
      padding: 6px 12px;
      background: rgba(248, 113, 113, 0.15);
      border: 1px solid rgba(248, 113, 113, 0.4);
      border-radius: 6px;
      font-size: 12px;
      color: #f87171;
      z-index: 10;
      display: none;
      backdrop-filter: blur(8px);
    }

    #fps-warning.visible {
      display: block;
    }

    #ui-panel {
      position: absolute;
      top: 0;
      left: 0;
      width: 280px;
      height: 100%;
      padding: 80px 20px 20px;
      background: rgba(15, 20, 30, 0.85);
      border-right: 1px solid rgba(120, 150, 200, 0.15);
      backdrop-filter: blur(12px);
      overflow-y: auto;
      z-index: 5;
    }

    #ui-panel::-webkit-scrollbar {
      width: 4px;
    }

    #ui-panel::-webkit-scrollbar-track {
      background: transparent;
    }

    #ui-panel::-webkit-scrollbar-thumb {
      background: rgba(120, 150, 200, 0.3);
      border-radius: 2px;
    }

    .ui-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
      color: #fff;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, #a78bfa 0%, #22d3ee 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .control-group {
      margin-bottom: 22px;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #9fb0c9;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .control-value {
      color: #7dd3fc;
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 12px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: rgba(120, 150, 200, 0.15);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    input[type="range"]:hover {
      background: rgba(120, 150, 200, 0.25);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: linear-gradient(135deg, #a78bfa 0%, #22d3ee 100%);
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 0 8px rgba(167, 139, 250, 0.4);
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      box-shadow: 0 0 12px rgba(167, 139, 250, 0.6);
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: linear-gradient(135deg, #a78bfa 0%, #22d3ee 100%);
      border-radius: 50%;
      cursor: pointer;
      border: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 0 8px rgba(167, 139, 250, 0.4);
    }

    input[type="range"]::-moz-range-thumb:hover {
      transform: scale(1.15);
      box-shadow: 0 0 12px rgba(167, 139, 250, 0.6);
    }

    .color-preview {
      display: inline-block;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      vertical-align: middle;
      margin-left: 6px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.2s ease;
    }

    .hint {
      font-size: 11px;
      color: #5a6a82;
      margin-top: 6px;
      line-height: 1.5;
    }

    @media (max-width: 768px) {
      #ui-panel {
        width: 220px;
        padding: 70px 14px 14px;
      }

      .ui-title {
        font-size: 15px;
      }

      .control-label .label-text {
        display: none;
      }

      .control-label {
        margin-bottom: 6px;
      }

      .control-group {
        margin-bottom: 16px;
      }

      .hint {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="fps-counter">FPS: 60</div>
    <div id="fps-warning">性能提示：粒子数量较多，建议减少粒子数以获得更流畅体验</div>
    <div id="ui-panel">
      <div class="ui-title">✨ 粒子星系控制台</div>
      <div class="control-group">
        <label class="control-label">
          <span class="label-text">旋转速度</span>
          <span class="control-value" id="rotation-value">0.15</span>
        </label>
        <input type="range" id="rotation-speed" min="0" max="1" step="0.01" value="0.15" />
        <div class="hint">控制星系整体自转角速度</div>
      </div>
      <div class="control-group">
        <label class="control-label">
          <span class="label-text">粒子数量</span>
          <span class="control-value" id="particle-count-value">4000</span>
        </label>
        <input type="range" id="particle-count" min="1000" max="8000" step="500" value="4000" />
        <div class="hint">调整粒子总数，数量越多视觉效果越丰富</div>
      </div>
      <div class="control-group">
        <label class="control-label">
          <span class="label-text">起始色相 <span class="color-preview" id="start-color-preview"></span></span>
          <span class="control-value" id="start-hue-value">260°</span>
        </label>
        <input type="range" id="start-hue" min="0" max="360" step="1" value="260" />
        <div class="hint">颜色渐变起始色（蓝紫色调）</div>
      </div>
      <div class="control-group">
        <label class="control-label">
          <span class="label-text">终止色相 <span class="color-preview" id="end-color-preview"></span></span>
          <span class="control-value" id="end-hue-value">180°</span>
        </label>
        <input type="range" id="end-hue" min="0" max="360" step="1" value="180" />
        <div class="hint">颜色渐变终止色（青绿色调）</div>
      </div>
      <div class="hint" style="margin-top: 30px; color: #6b7a94;">
        🖱️ 拖拽旋转视角 · 滚轮缩放 · 双击重置视角
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
