<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>时砂·编年史</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f5e6c8;
      font-family: 'SimSun', 'STSong', serif;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(139, 109, 63, 0.03) 2px,
          rgba(139, 109, 63, 0.03) 4px
        ),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 3px,
          rgba(139, 109, 63, 0.02) 3px,
          rgba(139, 109, 63, 0.02) 6px
        ),
        radial-gradient(ellipse at 30% 20%, rgba(218, 190, 140, 0.8) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(218, 190, 140, 0.6) 0%, transparent 50%),
        linear-gradient(135deg, #f5e6c8 0%, #e8d5a8 30%, #f0dcb0 60%, #f5e6c8 100%);
      z-index: 0;
      pointer-events: none;
    }

    #gameCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      cursor: default;
    }

    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      padding: 12px 24px;
      pointer-events: none;
    }

    .hud-item {
      background: rgba(101, 67, 33, 0.85);
      color: #f5e6c8;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 16px;
      letter-spacing: 1px;
      border: 1px solid rgba(218, 165, 32, 0.4);
      min-width: 120px;
      text-align: center;
    }

    #tutorial-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 100;
      background: rgba(30, 20, 10, 0.82);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease;
    }

    #tutorial-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .tutorial-panel {
      background: linear-gradient(145deg, #f5e6c8 0%, #e8d5a8 100%);
      border: 3px solid #8b4513;
      border-radius: 12px;
      padding: 40px 48px;
      max-width: 520px;
      text-align: center;
      box-shadow: 0 0 40px rgba(218, 165, 32, 0.3), inset 0 0 20px rgba(139, 109, 63, 0.1);
    }

    .tutorial-panel h1 {
      font-size: 32px;
      color: #5c3a1e;
      margin-bottom: 8px;
      letter-spacing: 6px;
    }

    .tutorial-panel h2 {
      font-size: 14px;
      color: #8b6914;
      margin-bottom: 24px;
      letter-spacing: 2px;
      font-weight: normal;
    }

    .tutorial-panel .desc {
      font-size: 15px;
      color: #5c3a1e;
      line-height: 1.8;
      margin-bottom: 24px;
    }

    .tutorial-panel .demo-area {
      width: 200px;
      height: 80px;
      margin: 0 auto 24px;
      border: 2px dashed rgba(139, 69, 19, 0.4);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      position: relative;
    }

    .demo-fragment {
      width: 36px;
      height: 36px;
      background: rgba(218, 165, 32, 0.5);
      border: 2px solid #daa520;
      border-radius: 4px;
      animation: demoDrag 2s ease-in-out infinite;
    }

    .demo-target {
      width: 36px;
      height: 36px;
      border: 2px solid #8b4513;
      border-radius: 50%;
      background: rgba(218, 165, 32, 0.2);
    }

    @keyframes demoDrag {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(24px); }
    }

    .tutorial-panel .arrow-hint {
      font-size: 24px;
      color: #8b4513;
      animation: arrowPulse 1s ease-in-out infinite;
    }

    @keyframes arrowPulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    #startBtn {
      background: linear-gradient(135deg, #daa520, #b8860b);
      color: #3c1e00;
      border: 2px solid #8b6914;
      padding: 12px 48px;
      font-size: 20px;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 4px;
      font-family: 'SimSun', 'STSong', serif;
      transition: all 0.3s ease;
      pointer-events: auto;
    }

    #startBtn:hover {
      background: linear-gradient(135deg, #ffd700, #daa520);
      box-shadow: 0 0 20px rgba(218, 165, 32, 0.5);
      transform: scale(1.05);
    }

    #result-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 100;
      background: rgba(30, 20, 10, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    #result-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .result-panel {
      background: linear-gradient(145deg, #f5e6c8 0%, #e8d5a8 100%);
      border: 3px solid #8b4513;
      border-radius: 12px;
      padding: 40px 48px;
      max-width: 440px;
      text-align: center;
      box-shadow: 0 0 60px rgba(218, 165, 32, 0.4), inset 0 0 20px rgba(139, 109, 63, 0.1);
    }

    .result-panel h2 {
      font-size: 28px;
      color: #5c3a1e;
      margin-bottom: 20px;
      letter-spacing: 4px;
    }

    .result-panel .result-info {
      font-size: 16px;
      color: #5c3a1e;
      line-height: 2;
      margin-bottom: 24px;
    }

    .result-panel .final-msg {
      font-size: 20px;
      color: #8b6914;
      margin-bottom: 24px;
      letter-spacing: 2px;
    }

    #resetBtn {
      background: linear-gradient(135deg, #8b4513, #654321);
      color: #f5e6c8;
      border: 2px solid #daa520;
      padding: 10px 36px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 3px;
      font-family: 'SimSun', 'STSong', serif;
      transition: all 0.3s ease;
    }

    #resetBtn:hover {
      background: linear-gradient(135deg, #a0522d, #8b4513);
      box-shadow: 0 0 15px rgba(218, 165, 32, 0.4);
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="hud" style="display:none;">
    <div class="hud-item" id="scoreDisplay">0/100 0/20</div>
    <div class="hud-item" id="timerDisplay">00:00</div>
  </div>

  <div id="tutorial-overlay">
    <div class="tutorial-panel">
      <h1>时砂·编年史</h1>
      <h2>记忆的碎片散落时空，等待你来重组</h2>
      <div class="desc">
        将散落的文明碎片拖拽至时间线上正确的时代位置，<br/>
        每次匹配成功将唤醒该时代的记忆之光。<br/>
        集齐所有碎片，编织完整的文明之路。
      </div>
      <div class="demo-area">
        <div class="demo-fragment"></div>
        <span class="arrow-hint">→</span>
        <div class="demo-target"></div>
      </div>
      <button id="startBtn">开 始</button>
    </div>
  </div>

  <div id="result-overlay">
    <div class="result-panel">
      <h2>编年完成</h2>
      <div class="final-msg" id="finalMsg">文明之路已然编织</div>
      <div class="result-info">
        <div id="resultScore">得分：0/100</div>
        <div id="resultTime">用时：00:00</div>
        <div id="resultMatched">匹配：0/20</div>
      </div>
      <button id="resetBtn">重新开始</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
