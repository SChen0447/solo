<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>虚拟星云调色盘 - 粒子形态合成器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app">
    <header class="nebula-header">
      <h1 id="nebula-name" class="nebula-name">玫瑰星云</h1>
    </header>
    
    <main class="main-container">
      <div class="canvas-wrapper">
        <div class="canvas-container">
          <canvas id="main-canvas"></canvas>
          <button id="capture-btn" class="capture-btn">
            <span class="btn-icon">📷</span>
            <span class="btn-text">拍照</span>
          </button>
        </div>
      </div>
      
      <aside id="control-panel" class="control-panel">
        <div class="panel-section">
          <h3 class="section-title">星云调色盘</h3>
          <div id="color-palette" class="color-palette"></div>
        </div>
        
        <div class="panel-section">
          <h3 class="section-title">混合权重</h3>
          <div class="slider-group">
            <input type="range" id="mix-weight" min="0" max="100" value="50" class="slider">
            <span class="slider-value" id="mix-weight-value">50%</span>
          </div>
        </div>
        
        <div class="panel-section">
          <h3 class="section-title">物理参数</h3>
          
          <div class="param-group">
            <label class="param-label">星风强度</label>
            <div class="slider-group">
              <input type="range" id="star-wind" min="0" max="100" value="20" class="slider">
              <span class="slider-value" id="star-wind-value">20</span>
            </div>
          </div>
          
          <div class="param-group">
            <label class="param-label">引力扰动</label>
            <div class="slider-group">
              <input type="range" id="gravity" min="0" max="100" value="10" class="slider">
              <span class="slider-value" id="gravity-value">10</span>
            </div>
          </div>
          
          <div class="param-group">
            <label class="param-label">粒子寿命</label>
            <div class="slider-group">
              <input type="range" id="lifetime" min="1" max="10" value="5" step="0.5" class="slider">
              <span class="slider-value" id="lifetime-value">5s</span>
            </div>
          </div>
        </div>
        
        <button id="reset-btn" class="reset-btn">
          <span class="btn-icon">🔄</span>
          <span class="btn-text">重置</span>
        </button>
      </aside>
    </main>
    
    <div id="preset-switcher" class="preset-switcher">
      <button class="preset-btn" data-preset="rose">
        <span class="preset-color" style="background: #ff6b9d;"></span>
        <span class="preset-name">玫瑰星云</span>
      </button>
      <button class="preset-btn" data-preset="eagle">
        <span class="preset-color" style="background: #9b59b6;"></span>
        <span class="preset-name">鹰状星云</span>
      </button>
      <button class="preset-btn" data-preset="catseye">
        <span class="preset-color" style="background: #4fc3f7;"></span>
        <span class="preset-name">猫眼星云</span>
      </button>
      <button class="preset-btn" data-preset="orion">
        <span class="preset-color" style="background: #ff7043;"></span>
        <span class="preset-name">猎户星云</span>
      </button>
      <button class="preset-btn" data-preset="dark">
        <span class="preset-color" style="background: #37474f;"></span>
        <span class="preset-name">暗星云</span>
      </button>
    </div>
    
    <div id="preview-modal" class="preview-modal hidden">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3>星云快照</h3>
          <button id="close-modal" class="close-btn">✕</button>
        </div>
        <div class="modal-body">
          <img id="preview-image" alt="星云预览">
        </div>
        <div class="modal-footer">
          <a id="download-link" class="download-btn" download="nebula-art.png">
            <span class="btn-icon">💾</span>
            <span class="btn-text">保存 PNG</span>
          </a>
        </div>
      </div>
    </div>
  </div>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
