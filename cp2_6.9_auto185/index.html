<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D医学CT扫描体数据可视化</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="app">
    <canvas id="three-canvas"></canvas>

    <div id="dataset-selector">
      <label for="dataset-select">数据集：</label>
      <select id="dataset-select">
        <option value="heart">心脏</option>
        <option value="lungs">肺部</option>
        <option value="skeleton">骨骼</option>
      </select>
    </div>

    <div id="slice-controls">
      <div class="slice-control-group">
        <label for="sagittal-slider">矢状面 (X)</label>
        <input type="range" id="sagittal-slider" min="0" max="127" value="64" step="1" />
        <span id="sagittal-value">64</span>
      </div>
      <div class="slice-control-group">
        <label for="coronal-slider">冠状面 (Y)</label>
        <input type="range" id="coronal-slider" min="0" max="127" value="64" step="1" />
        <span id="coronal-value">64</span>
      </div>
      <div class="slice-control-group">
        <label for="axial-slider">横断面 (Z)</label>
        <input type="range" id="axial-slider" min="0" max="127" value="64" step="1" />
        <span id="axial-value">64</span>
      </div>
    </div>

    <div id="control-panel">
      <div class="panel-header">
        <span>控制面板</span>
        <button id="toggle-panel" class="toggle-btn">▼</button>
      </div>
      <div class="panel-content">
        <div class="control-group">
          <label for="threshold-slider">密度阈值</label>
          <input type="range" id="threshold-slider" min="0" max="255" value="100" step="1" />
          <span id="threshold-value">100</span>
        </div>
        <div class="control-group">
          <label for="scale-slider">体数据缩放</label>
          <input type="range" id="scale-slider" min="0.5" max="2.0" value="1.0" step="0.1" />
          <span id="scale-value">1.0</span>
        </div>
        <div class="control-group">
          <label>渲染模式</label>
          <div class="render-mode-btns">
            <button class="render-mode-btn active" data-mode="isosurface">等值面</button>
            <button class="render-mode-btn" data-mode="volumerender">体渲染</button>
            <button class="render-mode-btn" data-mode="overlay">半透明叠加</button>
          </div>
        </div>
        <div class="control-group">
          <button id="reset-view-btn" class="reset-btn">重置视角</button>
        </div>
        <div class="control-group">
          <button id="toggle-annotations-btn" class="annotation-btn">显示标注</button>
        </div>
      </div>
    </div>

    <div id="info-bubble" class="hidden">
      <button id="close-bubble" class="close-btn">×</button>
      <div id="bubble-content"></div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
