<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>星尘余烬 - Stardust Embers</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #ffffff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      display: block;
    }

    #status-bar {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 180px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 8px;
      padding: 12px 16px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 10;
    }

    #status-bar .status-item {
      font-size: 14px;
      line-height: 1.8;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #status-bar .status-label {
      opacity: 0.7;
    }

    #status-bar .status-value {
      font-weight: 600;
      transition: color 0.2s ease;
    }

    #status-bar .status-value.updating {
      color: #f39c12;
    }

    #controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      height: 70px;
      background: rgba(20, 20, 30, 0.8);
      border-radius: 12px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 24px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 10;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .control-label {
      font-size: 13px;
      white-space: nowrap;
      opacity: 0.8;
      min-width: 70px;
    }

    .slider-container {
      position: relative;
      width: 140px;
      height: 4px;
    }

    .slider-container input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(90deg, #ff6b6b 0%, #48dbfb 100%);
      outline: none;
      cursor: pointer;
    }

    .slider-container input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #f39c12;
      border: 2px solid #ffffff;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
      transition: transform 0.15s ease;
    }

    .slider-container input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.1);
    }

    .slider-container input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #f39c12;
      border: 2px solid #ffffff;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
    }

    .slider-value {
      font-size: 12px;
      min-width: 32px;
      text-align: right;
      opacity: 0.9;
    }

    #reset-btn {
      width: 60px;
      height: 32px;
      border: none;
      border-radius: 6px;
      background: #e74c3c;
      color: #ffffff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    #reset-btn:hover {
      background: #c0392b;
      transform: scale(0.95);
    }

    #reset-btn:active {
      transform: scale(0.9);
    }

    #flash-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0);
      pointer-events: none;
      z-index: 20;
      transition: background 0.3s ease;
    }

    #flash-overlay.active {
      background: rgba(255, 255, 255, 0.3);
    }

    @media (max-width: 768px) {
      #controls {
        height: 55px;
        gap: 12px;
        padding: 0 16px;
        bottom: 12px;
      }

      .control-group {
        gap: 6px;
      }

      .slider-container {
        width: 90px;
      }
    }

    @media (max-width: 480px) {
      #controls {
        font-size: 80%;
      }

      .control-label {
        display: none;
      }

      #status-bar {
        width: 140px;
        padding: 10px 12px;
        top: 12px;
        left: 12px;
      }

      #status-bar .status-item {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div id="status-bar">
      <div class="status-item">
        <span class="status-label">粒子数</span>
        <span class="status-value" id="particle-count">0</span>
      </div>
      <div class="status-item">
        <span class="status-label">FPS</span>
        <span class="status-value" id="fps-value">60</span>
      </div>
      <div class="status-item">
        <span class="status-label">吸引强度</span>
        <span class="status-value" id="attraction-value">2.0</span>
      </div>
    </div>

    <div id="controls">
      <div class="control-group">
        <span class="control-label">粒子大小</span>
        <div class="slider-container">
          <input type="range" id="size-slider" min="0.02" max="0.1" step="0.005" value="0.04" />
        </div>
        <span class="slider-value" id="size-value">0.04</span>
      </div>

      <div class="control-group">
        <span class="control-label">吸引强度</span>
        <div class="slider-container">
          <input type="range" id="attraction-slider" min="0.5" max="5.0" step="0.1" value="2.0" />
        </div>
        <span class="slider-value" id="attraction-slider-value">2.0</span>
      </div>

      <div class="control-group">
        <span class="control-label">旋转速度</span>
        <div class="slider-container">
          <input type="range" id="rotation-slider" min="0" max="0.05" step="0.002" value="0.02" />
        </div>
        <span class="slider-value" id="rotation-value">0.02</span>
      </div>

      <button id="reset-btn">重置</button>
    </div>

    <div id="flash-overlay"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
