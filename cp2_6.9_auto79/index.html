<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>城市风环境三维可视化分析工具</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1A1A2E;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #E0E0E0;
      font-size: 14px;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #control-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 280px;
      max-height: calc(100vh - 40px);
      background: rgba(22, 33, 62, 0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 20px;
      z-index: 10;
      transition: width 0.3s ease-in-out, padding 0.3s ease-in-out;
      overflow-y: auto;
      overflow-x: hidden;
    }

    #control-panel.collapsed {
      width: 20px;
      padding: 20px 0;
      overflow: hidden;
    }

    #control-panel.collapsed .panel-content {
      opacity: 0;
      pointer-events: none;
    }

    #collapse-btn {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 24px;
      height: 24px;
      background: transparent;
      border: none;
      color: #E94560;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: background 0.2s;
    }

    #collapse-btn:hover {
      background: rgba(233, 69, 96, 0.2);
    }

    #control-panel.collapsed #collapse-btn {
      left: 50%;
      transform: translateX(-50%);
    }

    .panel-content {
      opacity: 1;
      transition: opacity 0.2s ease-in-out;
    }

    .panel-title {
      font-size: 16px;
      font-weight: 600;
      color: #E94560;
      margin-bottom: 20px;
      margin-top: 10px;
      text-align: center;
      letter-spacing: 1px;
    }

    .control-group {
      margin-bottom: 20px;
    }

    .control-label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #E0E0E0;
    }

    .control-value {
      float: right;
      color: #A6E22E;
      font-family: 'Fira Code', monospace;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: #0F3460;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #E94560;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #E94560;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      transition: transform 0.2s ease;
    }

    input[type="range"]::-moz-range-thumb:hover {
      transform: scale(1.2);
    }

    .wind-direction-container {
      position: relative;
      width: 180px;
      height: 180px;
      margin: 0 auto;
    }

    .wind-direction-dial {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #0F3460;
      position: relative;
      border: 2px solid #16213E;
    }

    .wind-direction-marker {
      position: absolute;
      color: #E0E0E0;
      font-size: 11px;
      font-family: 'Fira Code', monospace;
    }

    .wind-direction-marker.n { top: 4px; left: 50%; transform: translateX(-50%); }
    .wind-direction-marker.s { bottom: 4px; left: 50%; transform: translateX(-50%); }
    .wind-direction-marker.e { right: 6px; top: 50%; transform: translateY(-50%); }
    .wind-direction-marker.w { left: 6px; top: 50%; transform: translateY(-50%); }

    .wind-direction-arrow {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 4px;
      height: 70px;
      background: linear-gradient(to bottom, #E94560, transparent);
      transform-origin: center top;
      transform: translate(-50%, 0) rotate(0deg);
      pointer-events: none;
      transition: transform 0.5s ease-out;
      border-radius: 2px;
    }

    .wind-direction-arrow::before {
      content: '';
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-bottom: 12px solid #E94560;
    }

    #wind-info-panel {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.31);
      border-radius: 8px;
      padding: 15px 20px;
      font-family: 'Fira Code', monospace;
      color: #A6E22E;
      font-size: 13px;
      line-height: 1.8;
      z-index: 10;
      min-width: 220px;
    }

    #wind-info-panel .info-title {
      color: #E94560;
      font-size: 14px;
      margin-bottom: 8px;
      font-weight: 500;
    }

    #wind-info-panel .info-row {
      display: flex;
      justify-content: space-between;
    }

    #wind-info-panel .info-label {
      color: #888;
    }

    #wind-info-panel .info-value {
      color: #A6E22E;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 6px;
      background: #0F3460;
      border-radius: 3px;
    }

    #control-panel::-webkit-scrollbar {
      width: 6px;
    }

    #control-panel::-webkit-scrollbar-track {
      background: transparent;
    }

    #control-panel::-webkit-scrollbar-thumb {
      background: #0F3460;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div id="control-panel">
      <button id="collapse-btn" title="折叠/展开面板">◀</button>
      <div class="panel-content">
        <div class="panel-title">风环境控制面板</div>

        <div class="control-group">
          <label class="control-label">
            风速
            <span class="control-value" id="wind-speed-value">5.0 m/s</span>
          </label>
          <input type="range" id="wind-speed" min="1" max="20" step="0.5" value="5" />
        </div>

        <div class="control-group">
          <label class="control-label">
            风向
            <span class="control-value" id="wind-direction-value">90° (东)</span>
          </label>
          <div class="wind-direction-container">
            <div class="wind-direction-dial" id="wind-dial">
              <span class="wind-direction-marker n">N</span>
              <span class="wind-direction-marker s">S</span>
              <span class="wind-direction-marker e">E</span>
              <span class="wind-direction-marker w">W</span>
              <div class="wind-direction-arrow" id="wind-arrow"></div>
            </div>
          </div>
          <input type="range" id="wind-direction" min="0" max="360" step="15" value="90" style="margin-top: 12px;" />
        </div>

        <div class="control-group">
          <label class="control-label">
            粒子密度
            <span class="control-value" id="particle-count-value">500</span>
          </label>
          <input type="range" id="particle-count" min="100" max="1000" step="50" value="500" />
        </div>
      </div>
    </div>

    <div id="wind-info-panel">
      <div class="info-title">实时风况数据</div>
      <div class="info-row">
        <span class="info-label">平均风速:</span>
        <span class="info-value" id="info-avg-speed">5.00 m/s</span>
      </div>
      <div class="info-row">
        <span class="info-label">最大风速:</span>
        <span class="info-value" id="info-max-speed">5.00 m/s</span>
      </div>
      <div class="info-row">
        <span class="info-label">风向角度:</span>
        <span class="info-value" id="info-direction">90°</span>
      </div>
      <div class="info-row">
        <span class="info-label">粒子总数:</span>
        <span class="info-value" id="info-particles">500</span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
