<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>星际电报员 - Stellar Telegraphist</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      min-height: 100vh;
      background: #12121a;
      font-family: 'Courier New', Courier, monospace;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      touch-action: manipulation;
    }

    .game-wrapper {
      min-width: 900px;
      max-width: 1200px;
      width: 100%;
    }

    .console-frame {
      background: #1E1E2E;
      border: 4px solid #2D2D3D;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 
        inset 0 0 40px rgba(0,0,0,0.5),
        0 10px 40px rgba(0,0,0,0.7);
      position: relative;
    }

    .console-frame::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.015) 2px,
        rgba(255,255,255,0.015) 4px
      );
      pointer-events: none;
      border-radius: 4px;
    }

    .console-title {
      text-align: center;
      color: #F59E0B;
      font-size: 20px;
      letter-spacing: 4px;
      margin-bottom: 16px;
      text-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
      padding-bottom: 12px;
      border-bottom: 2px solid #2D2D3D;
    }

    .main-layout {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .star-chart-panel {
      width: 200px;
      background: #0A0A0A;
      border: 2px solid #2D2D3D;
      border-radius: 4px;
      padding: 12px;
      flex-shrink: 0;
    }

    .star-chart-title {
      color: #F59E0B;
      font-size: 12px;
      letter-spacing: 2px;
      margin-bottom: 8px;
      text-align: center;
    }

    #starChartCanvas {
      width: 176px;
      height: 300px;
      background: #050508;
      border: 1px solid #2D2D3D;
      display: block;
      image-rendering: pixelated;
    }

    .planet-description {
      margin-top: 10px;
      padding: 8px;
      background: #12121a;
      border: 1px solid #2D2D3D;
      border-radius: 2px;
      font-size: 11px;
      line-height: 1.5;
      color: #a0a0b0;
      min-height: 60px;
    }

    .center-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .telegraph-area {
      background: #0A0A0A;
      border: 2px solid #2D2D3D;
      border-radius: 4px;
      padding: 12px;
      position: relative;
    }

    .telegraph-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .telegraph-label {
      color: #F59E0B;
      font-size: 11px;
      letter-spacing: 2px;
    }

    .signal-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: #a0a0b0;
    }

    .indicator-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #333;
      box-shadow: 0 0 4px currentColor;
    }

    .indicator-dot.green {
      background: #22C55E;
      color: #22C55E;
      animation: blink-green 1s infinite;
    }

    .indicator-dot.red {
      background: #EF4444;
      color: #EF4444;
    }

    @keyframes blink-green {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #telegraphCanvas {
      width: 100%;
      height: 180px;
      background: #050508;
      border: 1px solid #2D2D3D;
      display: block;
      image-rendering: pixelated;
    }

    .morse-display {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      padding: 8px;
      background: #12121a;
      border: 1px solid #2D2D3D;
      min-height: 32px;
      align-items: center;
      flex-wrap: wrap;
    }

    .morse-label {
      color: #a0a0b0;
      font-size: 10px;
      letter-spacing: 1px;
    }

    .morse-code {
      color: #F59E0B;
      font-size: 14px;
      letter-spacing: 4px;
      flex: 1;
    }

    .input-section {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    .input-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-label {
      color: #a0a0b0;
      font-size: 10px;
      letter-spacing: 2px;
    }

    #telegraphInput {
      background: #12121a;
      border: 2px solid #2D2D3D;
      color: #e0e0e0;
      padding: 10px 14px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 18px;
      letter-spacing: 4px;
      outline: none;
      border-radius: 2px;
      transition: border-color 0.2s;
      text-transform: uppercase;
    }

    #telegraphInput:focus {
      border-color: #F59E0B;
    }

    #telegraphInput.correct {
      border-color: #22C55E;
      color: #22C55E;
    }

    #telegraphInput.wrong {
      border-color: #EF4444;
      color: #EF4444;
      animation: shake 0.3s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .feedback-area {
      padding: 8px;
      background: #12121a;
      border: 1px solid #2D2D3D;
      font-size: 12px;
      min-height: 36px;
      display: flex;
      align-items: center;
      color: #a0a0b0;
    }

    .feedback-area.success {
      color: #22C55E;
      border-color: #22C55E;
    }

    .feedback-area.error {
      color: #EF4444;
      border-color: #EF4444;
    }

    .right-panel {
      width: 180px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .knob-panel {
      background: #0A0A0A;
      border: 2px solid #2D2D3D;
      border-radius: 4px;
      padding: 14px;
      text-align: center;
    }

    .knob-title {
      color: #F59E0B;
      font-size: 11px;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .frequency-display {
      color: #3B82F6;
      font-size: 18px;
      font-weight: bold;
      text-shadow: 0 0 8px rgba(59, 130, 246, 0.6);
      margin-bottom: 10px;
      font-family: 'Courier New', Courier, monospace;
    }

    .frequency-unit {
      font-size: 12px;
      color: #a0a0b0;
    }

    .knob-container {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 0 auto;
    }

    #knobCanvas {
      width: 100px;
      height: 100px;
      cursor: grab;
      touch-action: none;
    }

    #knobCanvas:active {
      cursor: grabbing;
    }

    .parts-assembly {
      background: #0A0A0A;
      border: 2px solid #2D2D3D;
      border-radius: 4px;
      padding: 12px;
    }

    .parts-title {
      color: #F59E0B;
      font-size: 11px;
      letter-spacing: 2px;
      margin-bottom: 10px;
      text-align: center;
    }

    .parts-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .part-slot {
      aspect-ratio: 1;
      background: #12121a;
      border: 1px solid #2D2D3D;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #606070;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }

    .part-slot:hover {
      border-color: #F59E0B;
      color: #F59E0B;
    }

    .part-slot.placed {
      background: #1a2a1a;
      border-color: #22C55E;
      color: #22C55E;
    }

    .status-bar {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 2px solid #2D2D3D;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #a0a0b0;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-led {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22C55E;
      box-shadow: 0 0 6px #22C55E;
    }

    .status-led.warn {
      background: #F59E0B;
      box-shadow: 0 0 6px #F59E0B;
    }

    @media (max-width: 960px) {
      .game-wrapper {
        min-width: unset;
        transform-origin: top left;
      }
      .main-layout {
        flex-direction: column;
      }
      .star-chart-panel,
      .right-panel {
        width: 100%;
      }
      #starChartCanvas {
        width: 100%;
        height: 250px;
      }
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="console-frame">
      <div class="console-title">★ STELLAR TELEGRAPH STATION ★</div>

      <div class="main-layout">
        <div class="star-chart-panel">
          <div class="star-chart-title">◆ STAR CHART ◆</div>
          <canvas id="starChartCanvas" width="176" height="300"></canvas>
          <div class="planet-description" id="planetDescription">
            等待接收来自星系的信号...
          </div>
        </div>

        <div class="center-panel">
          <div class="telegraph-area">
            <div class="telegraph-header">
              <span class="telegraph-label">▌ INCOMING TRANSMISSION ▐</span>
              <span class="signal-indicator">
                <span class="indicator-dot green" id="signalDot"></span>
                <span id="signalText">SIGNAL STRONG</span>
              </span>
            </div>
            <canvas id="telegraphCanvas" width="500" height="180"></canvas>
            <div class="morse-display">
              <span class="morse-label">MORSE:</span>
              <span class="morse-code" id="morseDisplay">-- --- .-. ... . / -.-. --- -.. .</span>
            </div>
          </div>

          <div class="input-section">
            <div class="input-wrapper">
              <span class="input-label">ENTER DECODED MESSAGE:</span>
              <input type="text" id="telegraphInput" maxlength="20" autocomplete="off" spellcheck="false" placeholder="TYPE HERE..." />
              <div class="feedback-area" id="feedbackArea">
                破译来自星系的电报...
              </div>
            </div>
          </div>
        </div>

        <div class="right-panel">
          <div class="knob-panel">
            <div class="knob-title">◆ FREQUENCY ◆</div>
            <div class="frequency-display">
              <span id="freqValue">100.0</span><span class="frequency-unit"> MHz</span>
            </div>
            <div class="knob-container">
              <canvas id="knobCanvas" width="100" height="100"></canvas>
            </div>
          </div>

          <div class="parts-assembly">
            <div class="parts-title">◆ SHIP PARTS ◆</div>
            <div class="parts-grid" id="partsGrid">
              <div class="part-slot" data-part="antenna">天线</div>
              <div class="part-slot" data-part="transmitter">发报</div>
              <div class="part-slot" data-part="power">电源</div>
              <div class="part-slot" data-part="encoder">编码</div>
              <div class="part-slot" data-part="decoder">解码</div>
              <div class="part-slot" data-part="cooler">散热</div>
            </div>
          </div>
        </div>
      </div>

      <div class="status-bar">
        <div class="status-item">
          <span class="status-led"></span>
          <span>SYSTEM ONLINE</span>
        </div>
        <div class="status-item">
          <span>MESSAGE #<span id="messageCount">0001</span></span>
        </div>
        <div class="status-item">
          <span>SCORE: <span id="scoreValue">0</span></span>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
