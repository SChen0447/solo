<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>霓虹·溶洞回响</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse at top, #0a1a3e 0%, #1a0a2e 50%, #0d0520 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    canvas {
      display: block;
    }
    .hint-panel {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 16px 28px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 12px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 1px;
      z-index: 10;
      opacity: 1;
      transition: opacity 2s ease-out;
      pointer-events: none;
    }
    .hint-panel.fade-out {
      opacity: 0;
    }
    .hint-panel .title {
      font-size: 16px;
      font-weight: 400;
      margin-bottom: 6px;
      text-align: center;
    }
    .hint-panel .desc {
      font-size: 12px;
      opacity: 0.8;
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <div class="hint-panel" id="hint-panel">
      <div class="title">霓虹·溶洞回响</div>
      <div class="desc">拖拽鼠标旋转视角 · 悬停石柱聆听回响</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
