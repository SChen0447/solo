<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>3D 乐高积木搭建</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      user-select: none;
      background: #87CEEB;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #toolbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 16px 20px 20px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-top: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.08);
    }

    .toolbar-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .toolbar-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .section-label {
      font-size: 12px;
      color: #666;
      font-weight: 500;
      min-width: 60px;
    }

    .brick-types {
      display: flex;
      gap: 8px;
      transition: transform 0.2s ease-out, opacity 0.2s ease-out;
    }

    .brick-btn {
      position: relative;
      width: 56px;
      height: 56px;
      border: 2px solid rgba(0, 0, 0, 0.1);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.6);
      cursor: pointer;
      transition: all 0.15s ease-out;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .brick-btn:hover {
      border-color: rgba(100, 149, 237, 0.5);
      background: rgba(255, 255, 255, 0.9);
      transform: translateY(-2px);
    }

    .brick-btn.active {
      border-color: #4A90D9;
      background: rgba(74, 144, 217, 0.15);
      box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.2);
    }

    .brick-preview {
      width: 70%;
      height: 70%;
      border-radius: 3px;
      box-shadow: inset 0 -2px 4px rgba(0,0,0,0.15);
    }

    .color-picker {
      display: flex;
      gap: 8px;
    }

    .color-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: all 0.15s ease-out;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
    }

    .color-btn:hover {
      transform: scale(1.1);
    }

    .color-btn.active {
      border-color: #333;
      box-shadow: 0 0 0 3px rgba(51, 51, 51, 0.2);
    }

    .color-btn.red { background: #E53935; }
    .color-btn.yellow { background: #FDD835; }
    .color-btn.blue { background: #1E88E5; }

    .action-buttons {
      display: flex;
      gap: 8px;
    }

    .action-btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #4A90D9;
      color: white;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease-out;
      box-shadow: 0 2px 8px rgba(74, 144, 217, 0.3);
    }

    .action-btn:hover {
      background: #3A7BC8;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(74, 144, 217, 0.4);
    }

    .action-btn.secondary {
      background: #6BBF59;
      box-shadow: 0 2px 8px rgba(107, 191, 89, 0.3);
    }

    .action-btn.secondary:hover {
      background: #5AA949;
      box-shadow: 0 4px 12px rgba(107, 191, 89, 0.4);
    }

    .action-btn.danger {
      background: #EF5350;
      box-shadow: 0 2px 8px rgba(239, 83, 80, 0.3);
    }

    .action-btn.danger:hover {
      background: #D94340;
    }

    .hints {
      text-align: center;
      font-size: 11px;
      color: #888;
      line-height: 1.6;
    }

    .hints kbd {
      display: inline-block;
      padding: 2px 6px;
      background: rgba(0, 0, 0, 0.08);
      border-radius: 4px;
      font-family: monospace;
      font-size: 10px;
      color: #555;
      margin: 0 2px;
    }

    #context-menu {
      position: fixed;
      z-index: 200;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      padding: 6px;
      display: none;
      min-width: 140px;
    }

    .context-item {
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: #333;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .context-item:hover {
      background: rgba(74, 144, 217, 0.1);
      color: #4A90D9;
    }

    .context-item.danger:hover {
      background: rgba(239, 83, 80, 0.1);
      color: #EF5350;
    }

    #loading {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #87CEEB;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.3s ease-out;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-text {
      color: white;
      font-size: 18px;
      font-weight: 500;
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    @media (max-width: 640px) {
      #toolbar {
        padding: 12px 12px 16px;
      }

      .toolbar-row {
        gap: 10px;
      }

      .brick-btn {
        width: 48px;
        height: 48px;
      }

      .color-btn {
        width: 30px;
        height: 30px;
      }

      .action-btn {
        padding: 8px 12px;
        font-size: 12px;
      }

      .section-label {
        display: none;
      }

      .hints {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loading-text">加载中...</div>
  </div>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="context-menu">
      <div class="context-item" data-action="rotate">🔄 旋转积木</div>
      <div class="context-item danger" data-action="delete">🗑️ 删除积木</div>
    </div>
    <div id="toolbar">
      <div class="toolbar-inner">
        <div class="toolbar-row">
          <span class="section-label">积木类型</span>
          <div class="brick-types" id="brick-types"></div>
          <span class="section-label">颜色</span>
          <div class="color-picker" id="color-picker"></div>
        </div>
        <div class="toolbar-row">
          <div class="action-buttons">
            <button class="action-btn" id="btn-save">💾 保存布局</button>
            <button class="action-btn secondary" id="btn-load">📂 加载布局</button>
            <button class="action-btn danger" id="btn-clear">🧹 清空场景</button>
          </div>
        </div>
        <div class="hints">
          <kbd>左键</kbd>放置积木 &nbsp;|&nbsp; <kbd>右键</kbd>菜单 &nbsp;|&nbsp; <kbd>R</kbd>旋转 &nbsp;|&nbsp; <kbd>Delete</kbd>删除 &nbsp;|&nbsp; <kbd>双击</kbd>聚焦积木 &nbsp;|&nbsp; <kbd>滚轮</kbd>缩放 &nbsp;|&nbsp; <kbd>拖拽</kbd>旋转视角 &nbsp;|&nbsp; <kbd>中键</kbd>平移
        </div>
      </div>
    </div>
  </div>
  <input type="file" id="file-input" accept=".json" style="display:none" />
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
