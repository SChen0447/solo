<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <title>叶脉织机 · 交互式叶片生成器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f2e8;
      color: #2c3e2a;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-width: 600px;
      min-height: 400px;
    }

    #leaf-canvas {
      position: absolute;
      top: 0;
      left: 0;
      display: block;
      background: #f5f2e8;
    }

    .app-title {
      position: absolute;
      top: 24px;
      left: 32px;
      z-index: 5;
      pointer-events: none;
      user-select: none;
    }

    .app-title h1 {
      font-family: 'Cormorant Garamond', 'Noto Sans SC', serif;
      font-weight: 600;
      font-size: 28px;
      letter-spacing: 0.08em;
      color: #1a3a15;
    }

    .app-title p {
      font-size: 13px;
      font-weight: 300;
      color: #5a7a54;
      margin-top: 4px;
      letter-spacing: 0.04em;
    }

    .leaf-control-panel {
      position: absolute;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      z-index: 10;
      padding: 20px 28px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 10px;
      box-shadow: 0 4px 24px rgba(26, 58, 21, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.6);
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: calc(100% - 48px);
      max-width: 860px;
    }

    .panel-title {
      font-family: 'Cormorant Garamond', 'Noto Sans SC', serif;
      font-weight: 500;
      font-size: 17px;
      color: #1a3a15;
      letter-spacing: 0.06em;
      border-bottom: 1px solid rgba(26, 58, 21, 0.1);
      padding-bottom: 10px;
    }

    .sliders-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
    }

    .slider-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .slider-label {
      font-size: 13px;
      font-weight: 400;
      color: #2c3e2a;
    }

    .slider-value {
      font-size: 12px;
      font-weight: 500;
      color: #1a3a15;
      font-variant-numeric: tabular-nums;
    }

    .slider-container {
      position: relative;
      width: 100%;
      height: 28px;
      display: flex;
      align-items: center;
    }

    .custom-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(to right, #2d5a27, #4a8c3f);
      outline: none;
      cursor: pointer;
      transition: filter 0.2s ease;
    }

    .custom-slider:hover {
      filter: brightness(1.08);
    }

    .custom-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ffffff;
      border: 2px solid #2d5a27;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(26, 58, 21, 0.2);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .custom-slider::-webkit-slider-thumb:hover,
    .custom-slider::-webkit-slider-thumb:active {
      transform: scale(1.15);
      box-shadow: 0 2px 8px rgba(26, 58, 21, 0.3);
    }

    .custom-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ffffff;
      border: 2px solid #2d5a27;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(26, 58, 21, 0.2);
    }

    .slider-bubble {
      position: absolute;
      bottom: 100%;
      transform: translateX(-50%) translateY(-30px);
      background: #1a3a15;
      color: #ffffff;
      font-size: 11px;
      font-weight: 500;
      padding: 4px 8px;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
      font-variant-numeric: tabular-nums;
    }

    .slider-bubble::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 4px solid transparent;
      border-top-color: #1a3a15;
    }

    .colors-row {
      display: flex;
      gap: 20px;
    }

    .color-picker-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }

    .color-label {
      font-size: 13px;
      font-weight: 400;
      color: #2c3e2a;
    }

    .color-picker-container {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(26, 58, 21, 0.1);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .color-picker-container:hover {
      background: rgba(230, 238, 228, 0.8);
      border-color: rgba(26, 58, 21, 0.2);
    }

    .color-swatch {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      border: 1px solid rgba(0, 0, 0, 0.1);
      flex-shrink: 0;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.2);
    }

    .color-hex {
      font-family: 'Cormorant Garamond', monospace;
      font-size: 14px;
      font-weight: 500;
      color: #1a3a15;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hidden-color-input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
      pointer-events: none;
    }

    .drawer-toggle {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: #1a3a15;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: background 0.2s ease;
    }

    .drawer-toggle:hover {
      background: rgba(230, 238, 228, 0.9);
    }

    .toggle-icon {
      font-size: 16px;
    }

    .drawer-content {
      display: none;
      flex-direction: column;
      gap: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(26, 58, 21, 0.1);
      margin-top: 4px;
    }

    .sliders-column {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    @media (max-width: 768px) {
      #app {
        min-width: 0;
      }

      .app-title {
        top: 16px;
        left: 20px;
      }

      .app-title h1 {
        font-size: 22px;
      }

      .app-title p {
        font-size: 11px;
      }

      .leaf-control-panel {
        bottom: 16px;
        left: 16px;
        right: 16px;
        transform: none;
        width: auto;
        padding: 14px 18px;
        gap: 0;
      }

      .drawer-toggle {
        display: flex;
      }

      .sliders-row {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .colors-row {
        flex-direction: column;
        gap: 12px;
      }

      .slider-container {
        height: 36px;
      }

      .custom-slider {
        height: 6px;
      }

      .custom-slider::-webkit-slider-thumb {
        width: 22px;
        height: 22px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="leaf-canvas"></canvas>
    <div class="app-title">
      <h1>叶脉织机</h1>
      <p>Leaf Loom · 参数化叶片生成器</p>
    </div>
    <div id="control-panel"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
