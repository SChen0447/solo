<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>粒子沙画</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0d0d0d;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      background: #0d0d0d;
    }

    #toolbar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 20px;
      z-index: 10;
    }

    .tool-btn {
      padding: 8px 16px;
      background: rgba(0, 0, 0, 0.3);
      color: #ffffff;
      font-size: 14px;
      font-family: inherit;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      white-space: nowrap;
    }

    .tool-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .tool-btn:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="canvas"></canvas>
    <div id="toolbar">
      <button class="tool-btn" id="btn-clear">清空画布</button>
      <button class="tool-btn" id="btn-pause">暂停</button>
      <button class="tool-btn" id="btn-color">随机颜色</button>
      <button class="tool-btn" id="btn-export">导出PNG</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
