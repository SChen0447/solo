<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>墨韵·流沙钟</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #f5e6c8;
      font-family: "Songti SC", "STSong", "SimSun", serif;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
      cursor: grab;
    }

    canvas:active {
      cursor: grabbing;
    }

    .paper-texture {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      opacity: 0.8;
      background-image: 
        radial-gradient(ellipse at 20% 30%, rgba(139, 119, 101, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(139, 119, 101, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(245, 230, 200, 0.3) 0%, transparent 70%);
    }

    .paper-noise {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
      opacity: 0.15;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    .torn-edge {
      position: fixed;
      pointer-events: none;
      z-index: 10;
    }

    .torn-edge.top {
      top: 0;
      left: 0;
      width: 100%;
      height: 30px;
      background: linear-gradient(to bottom, rgba(245, 230, 200, 1), transparent);
      clip-path: polygon(
        0% 0%, 5% 80%, 10% 40%, 15% 90%, 20% 30%, 25% 85%, 30% 50%, 35% 95%,
        40% 45%, 45% 80%, 50% 35%, 55% 90%, 60% 55%, 65% 85%, 70% 40%, 75% 95%,
        80% 50%, 85% 80%, 90% 35%, 95% 90%, 100% 0%, 100% 0%, 0% 0%
      );
    }

    .torn-edge.bottom {
      bottom: 0;
      left: 0;
      width: 100%;
      height: 30px;
      background: linear-gradient(to top, rgba(245, 230, 200, 1), transparent);
      clip-path: polygon(
        0% 100%, 5% 20%, 10% 60%, 15% 10%, 20% 70%, 25% 15%, 30% 50%, 35% 5%,
        40% 55%, 45% 20%, 50% 65%, 55% 10%, 60% 45%, 65% 15%, 70% 60%, 75% 5%,
        80% 50%, 85% 20%, 90% 65%, 95% 10%, 100% 100%, 100% 100%, 0% 100%
      );
    }

    .torn-edge.left {
      top: 0;
      left: 0;
      width: 30px;
      height: 100%;
      background: linear-gradient(to right, rgba(245, 230, 200, 1), transparent);
      clip-path: polygon(
        0% 0%, 80% 5%, 40% 10%, 90% 15%, 30% 20%, 85% 25%, 50% 30%, 95% 35%,
        45% 40%, 80% 45%, 35% 50%, 90% 55%, 55% 60%, 85% 65%, 40% 70%, 95% 75%,
        50% 80%, 80% 85%, 35% 90%, 90% 95%, 0% 100%, 0% 100%, 0% 0%
      );
    }

    .torn-edge.right {
      top: 0;
      right: 0;
      width: 30px;
      height: 100%;
      background: linear-gradient(to left, rgba(245, 230, 200, 1), transparent);
      clip-path: polygon(
        100% 0%, 20% 5%, 60% 10%, 10% 15%, 70% 20%, 15% 25%, 50% 30%, 5% 35%,
        55% 40%, 20% 45%, 65% 50%, 10% 55%, 45% 60%, 15% 65%, 60% 70%, 5% 75%,
        50% 80%, 20% 85%, 65% 90%, 10% 95%, 100% 100%, 100% 100%, 100% 0%
      );
    }

    .title {
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      color: #3d2914;
      font-size: 32px;
      font-weight: normal;
      letter-spacing: 12px;
      text-shadow: 2px 2px 4px rgba(61, 41, 20, 0.1);
      pointer-events: none;
    }

    .subtitle {
      position: fixed;
      top: 90px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      color: #6b5344;
      font-size: 14px;
      letter-spacing: 4px;
      pointer-events: none;
    }

    .hint {
      position: fixed;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      color: #6b5344;
      font-size: 13px;
      letter-spacing: 2px;
      pointer-events: none;
      opacity: 0.8;
    }

    .ripple {
      position: fixed;
      border: 2px solid rgba(255, 215, 0, 0.8);
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0);
      pointer-events: none;
      z-index: 100;
      animation: ripple 0.6s ease-out forwards;
    }

    @keyframes ripple {
      0% {
        transform: translate(-50%, -50%) scale(0);
        opacity: 0.8;
      }
      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="paper-texture"></div>
  <div class="paper-noise"></div>
  <div class="torn-edge top"></div>
  <div class="torn-edge bottom"></div>
  <div class="torn-edge left"></div>
  <div class="torn-edge right"></div>
  
  <h1 class="title">墨韵·流沙钟</h1>
  <p class="subtitle">Ink Sand Clock</p>
  <p class="hint">拖拽沙漏调整方向 · 点击触发爆散</p>
  
  <div id="app"></div>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
