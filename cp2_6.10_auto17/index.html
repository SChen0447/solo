<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>太空站逃亡 | Space Station Escape</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0514;
      font-family: 'Share Tech Mono', 'Consolas', monospace;
      color: #00ffd5;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse at center, #1a0a2e 0%, #0a0514 70%, #050210 100%),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 255, 213, 0.02) 2px,
          rgba(0, 255, 213, 0.02) 4px
        );
    }

    #game-title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(20px, 3vw, 36px);
      font-weight: 900;
      letter-spacing: 4px;
      color: #00ffd5;
      text-shadow:
        0 0 10px rgba(0, 255, 213, 0.8),
        0 0 20px rgba(0, 255, 213, 0.5),
        0 0 40px rgba(0, 255, 213, 0.3);
      margin-bottom: 20px;
      animation: titleGlow 2s ease-in-out infinite alternate;
    }

    @keyframes titleGlow {
      from { text-shadow: 0 0 10px rgba(0, 255, 213, 0.8), 0 0 20px rgba(0, 255, 213, 0.5), 0 0 40px rgba(0, 255, 213, 0.3); }
      to { text-shadow: 0 0 15px rgba(0, 255, 213, 1), 0 0 30px rgba(0, 255, 213, 0.7), 0 0 60px rgba(0, 255, 213, 0.5); }
    }

    #game-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-canvas {
      display: block;
      border-radius: 4px;
      box-shadow:
        0 0 0 2px rgba(0, 255, 213, 0.3),
        0 0 0 4px rgba(0, 255, 213, 0.1),
        0 0 30px rgba(0, 255, 213, 0.2),
        inset 0 0 60px rgba(26, 10, 46, 0.8);
      cursor: crosshair;
    }

    #game-canvas::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: 4px;
      box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.6);
    }

    #ui-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px;
    }

    #status-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px;
    }

    .status-item {
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      color: #00ffd5;
      text-shadow: 0 0 8px rgba(0, 255, 213, 0.6);
      letter-spacing: 2px;
      padding: 8px 16px;
      background: rgba(0, 255, 213, 0.05);
      border: 1px solid rgba(0, 255, 213, 0.3);
      border-radius: 2px;
    }

    .status-item .label {
      opacity: 0.7;
      margin-right: 8px;
    }

    .status-item .value {
      font-weight: 700;
      color: #ff2d55;
      text-shadow: 0 0 8px rgba(255, 45, 85, 0.6);
    }

    #repair-timer {
      display: none;
    }

    #repair-timer.active {
      display: block;
      animation: pulseWarning 0.5s ease-in-out infinite alternate;
    }

    @keyframes pulseWarning {
      from { box-shadow: 0 0 10px rgba(255, 45, 85, 0.5); }
      to { box-shadow: 0 0 25px rgba(255, 45, 85, 0.9); }
    }

    #controls-hint {
      position: absolute;
      bottom: -40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(0, 255, 213, 0.5);
      letter-spacing: 1px;
      white-space: nowrap;
    }

    #game-overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(10, 5, 20, 0.9);
      backdrop-filter: blur(4px);
      border-radius: 4px;
      z-index: 10;
    }

    #game-overlay.active {
      display: flex;
    }

    #overlay-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 48px;
      font-weight: 900;
      letter-spacing: 8px;
      margin-bottom: 20px;
    }

    #overlay-title.won {
      color: #00ffd5;
      text-shadow: 0 0 20px rgba(0, 255, 213, 0.8);
    }

    #overlay-title.lost {
      color: #ff2d55;
      text-shadow: 0 0 20px rgba(255, 45, 85, 0.8);
    }

    #overlay-message {
      font-size: 18px;
      color: rgba(0, 255, 213, 0.7);
      margin-bottom: 30px;
      letter-spacing: 2px;
    }

    #restart-btn {
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 3px;
      padding: 14px 40px;
      background: transparent;
      color: #00ffd5;
      border: 2px solid #00ffd5;
      cursor: pointer;
      pointer-events: auto;
      transition: all 0.3s ease;
      text-shadow: 0 0 8px rgba(0, 255, 213, 0.6);
      box-shadow: 0 0 15px rgba(0, 255, 213, 0.3);
    }

    #restart-btn:hover {
      background: rgba(0, 255, 213, 0.1);
      box-shadow: 0 0 30px rgba(0, 255, 213, 0.6);
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <h1 id="game-title">太空站逃亡</h1>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="ui-container">
      <div id="status-bar">
        <div class="status-item">
          <span class="label">核心零件</span>
          <span class="value" id="parts-count">0 / 3</span>
        </div>
        <div class="status-item" id="repair-timer">
          <span class="label">修复倒计时</span>
          <span class="value" id="timer-value">10.0</span>
        </div>
      </div>
    </div>
    <div id="game-overlay">
      <h2 id="overlay-title"></h2>
      <p id="overlay-message"></p>
      <button id="restart-btn">重新开始</button>
    </div>
    <div id="controls-hint">WASD 移动 &nbsp;|&nbsp; 鼠标点击 拾取/使用焊枪</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
