<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>极光幻境</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.5s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .aurora-icon {
      width: 80px;
      height: 80px;
      position: relative;
      animation: rotate 2s linear infinite;
    }

    .aurora-icon::before,
    .aurora-icon::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 3px solid transparent;
    }

    .aurora-icon::before {
      top: 0;
      left: 0;
      border-top-color: #00ff88;
      border-right-color: #00ff88;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .aurora-icon::after {
      bottom: 0;
      right: 0;
      border-bottom-color: #8a2be2;
      border-left-color: #8a2be2;
      animation: pulse 1.5s ease-in-out infinite 0.75s;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .loading-text {
      position: absolute;
      bottom: 35%;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 14px;
      letter-spacing: 2px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <div class="loading-overlay" id="loading-overlay">
      <div class="aurora-icon"></div>
      <div class="loading-text">正在加载极光幻境...</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
