<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>虚拟星轨引力场模拟</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #1a0a2e 0%, #050510 100%);
    }
    #app {
      width: 100%;
      height: 100%;
    }
    canvas {
      display: block;
      cursor: grab;
    }
    canvas:active {
      cursor: grabbing;
    }
    .tp-dfwv {
      background: rgba(10, 5, 25, 0.85) !important;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(123, 104, 238, 0.3) !important;
      border-radius: 8px !important;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
