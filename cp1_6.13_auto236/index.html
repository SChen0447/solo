<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>光轨·翎影速写</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(to bottom, #0b0c2a 0%, #1a1b4e 50%, #0e0f2a 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      cursor: none;
    }
    #gameCanvas {
      display: block;
      width: 100vw;
      height: 100vh;
      position: absolute;
      top: 0;
      left: 0;
    }
    #ui {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    #scorePanel {
      position: absolute;
      top: 30px;
      left: 30px;
      color: #ffffff;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
      user-select: none;
    }
    #scoreLabel {
      font-size: 16px;
      opacity: 0.8;
      letter-spacing: 2px;
    }
    #scoreValue {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: 3px;
      margin-top: 4px;
    }
    #comboPanel {
      position: absolute;
      top: 30px;
      right: 30px;
      color: #ffffff;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
      user-select: none;
      text-align: right;
    }
    #comboLabel {
      font-size: 14px;
      opacity: 0.7;
      letter-spacing: 2px;
    }
    #comboValue {
      font-size: 24px;
      font-weight: 600;
      margin-top: 4px;
    }
    #gameOverOverlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(11, 12, 42, 0.85);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      pointer-events: auto;
      opacity: 0;
    }
    #gameOverOverlay.visible {
      display: flex;
    }
    #gameOverTitle {
      font-size: 48px;
      font-weight: 700;
      color: #ffffff;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 0 40px rgba(102, 126, 234, 0.6);
      letter-spacing: 8px;
      margin-bottom: 20px;
    }
    #finalScore {
      font-size: 72px;
      font-weight: 700;
      color: #48dbfb;
      text-shadow: 0 0 15px rgba(72, 219, 251, 0.8);
      margin-bottom: 10px;
    }
    #finalScoreLabel {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 4px;
      margin-bottom: 40px;
    }
    #restartBtn {
      padding: 16px 48px;
      font-size: 20px;
      font-weight: 600;
      color: #ffffff;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 4px;
      box-shadow: 0 4px 20px rgba(102, 126, 234, 0.5);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }
    #restartBtn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 30px rgba(102, 126, 234, 0.8), 0 0 20px rgba(118, 75, 162, 0.6);
    }
    #hint {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      letter-spacing: 3px;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
      user-select: none;
      animation: hintPulse 2s ease-in-out infinite;
    }
    @keyframes hintPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="ui">
    <div id="scorePanel">
      <div id="scoreLabel">得 分</div>
      <div id="scoreValue">0</div>
    </div>
    <div id="comboPanel">
      <div id="comboLabel">连 续 碰 撞</div>
      <div id="comboValue">0 / 3</div>
    </div>
    <div id="hint">按住鼠标拖拽翎羽，躲避光点障碍</div>
    <div id="gameOverOverlay">
      <div id="gameOverTitle">游 戏 结 束</div>
      <div id="finalScore">0</div>
      <div id="finalScoreLabel">最 终 得 分</div>
      <button id="restartBtn">重 新 开 始</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
