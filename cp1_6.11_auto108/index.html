<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>光影粒子沙盒</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0a0a0f;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .control-panel {
      position: fixed;
      right: 24px;
      bottom: 24px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 20px;
      min-width: 280px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 10;
    }

    .preset-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .preset-btn {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.03);
      color: #c0c0d0;
      font-size: 13px;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .preset-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(247, 37, 133, 0.4);
      color: #ffffff;
      transform: translateY(-1px);
    }

    .preset-btn.active {
      background: linear-gradient(135deg, rgba(247, 37, 133, 0.25), rgba(181, 23, 158, 0.25));
      border-color: rgba(247, 37, 133, 0.6);
      color: #ffffff;
    }

    .slider-group {
      margin-bottom: 18px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .slider-label span:first-child {
      font-size: 12px;
      color: #8a8a9a;
    }

    .slider-label span:last-child {
      font-size: 12px;
      color: #f72585;
      font-weight: 600;
    }

    .slider-wrapper {
      position: relative;
      width: 100%;
      height: 24px;
      display: flex;
      align-items: center;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      background: linear-gradient(135deg, #f72585, #b5179e);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(247, 37, 133, 0.4);
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      box-shadow: 0 3px 12px rgba(247, 37, 133, 0.6);
    }

    input[type="range"]::-webkit-slider-thumb:active {
      transform: scale(0.95);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      background: linear-gradient(135deg, #f72585, #b5179e);
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 8px rgba(247, 37, 133, 0.4);
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
    }

    input[type="range"]::-moz-range-thumb:hover {
      transform: scale(1.15);
      box-shadow: 0 3px 12px rgba(247, 37, 133, 0.6);
    }

    input[type="range"]::-moz-range-thumb:active {
      transform: scale(0.95);
    }

    input[type="range"]::-moz-range-track {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 3px;
      border: none;
    }

    .perf-panel {
      position: fixed;
      left: 20px;
      bottom: 20px;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 8px;
      padding: 12px 16px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      z-index: 10;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .perf-row {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 4px;
    }

    .perf-row:last-child {
      margin-bottom: 0;
    }

    .perf-label {
      color: #6a6a7a;
    }

    .perf-value {
      color: #a0ffa0;
      font-weight: 600;
    }

    .perf-value.warning {
      color: #ffaa60;
    }

    .perf-value.danger {
      color: #ff6060;
    }

    .size-range-group {
      display: flex;
      gap: 10px;
    }

    .size-range-group .slider-group {
      flex: 1;
      margin-bottom: 0;
    }

    .section-title {
      font-size: 11px;
      color: #6a6a7a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .section-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
      margin: 16px 0;
    }

    @media (max-width: 768px) {
      .control-panel {
        right: 0;
        bottom: 0;
        left: 0;
        width: 100%;
        min-width: auto;
        border-radius: 16px 16px 0 0;
        padding: 16px;
      }

      .preset-buttons {
        margin-bottom: 16px;
      }

      .slider-group {
        margin-bottom: 14px;
      }

      .perf-panel {
        left: 16px;
        bottom: auto;
        top: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="canvas"></canvas>
    <div class="perf-panel">
      <div class="perf-row">
        <span class="perf-label">FPS</span>
        <span class="perf-value" id="fps-value">--</span>
      </div>
      <div class="perf-row">
        <span class="perf-label">PARTICLES</span>
        <span class="perf-value" id="particle-count">--</span>
      </div>
    </div>
    <div class="control-panel" id="control-panel">
      <div class="section-title">预设风格</div>
      <div class="preset-buttons">
        <button class="preset-btn" id="preset-twilight">暮光</button>
        <button class="preset-btn" id="preset-aurora">极光</button>
      </div>
      <div class="section-divider"></div>
      <div class="section-title">粒子参数</div>
      <div class="slider-group">
        <div class="slider-label">
          <span>粒子密度</span>
          <span id="density-value">1000</span>
        </div>
        <div class="slider-wrapper">
          <input type="range" id="density-slider" min="500" max="2000" step="100" value="1000" />
        </div>
      </div>
      <div class="size-range-group">
        <div class="slider-group">
          <div class="slider-label">
            <span>最小半径</span>
            <span id="min-radius-value">2</span>
          </div>
          <div class="slider-wrapper">
            <input type="range" id="min-radius-slider" min="1" max="4" step="0.5" value="2" />
          </div>
        </div>
        <div class="slider-group">
          <div class="slider-label">
            <span>最大半径</span>
            <span id="max-radius-value">6</span>
          </div>
          <div class="slider-wrapper">
            <input type="range" id="max-radius-slider" min="4" max="10" step="0.5" value="6" />
          </div>
        </div>
      </div>
      <div class="slider-group" style="margin-top: 18px;">
        <div class="slider-label">
          <span>运动速度</span>
          <span id="speed-value">1.25</span>
        </div>
        <div class="slider-wrapper">
          <input type="range" id="speed-slider" min="0.2" max="3.0" step="0.1" value="1.25" />
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
