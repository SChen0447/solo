<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>虚拟万花筒生成器</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body, #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #0d0d1a;
        font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      }

      body {
        position: relative;
      }

      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(ellipse at center, #0a0a1a 0%, #1a0a2e 70%, #0d0d1a 100%);
        z-index: 0;
      }

      body::after {
        content: '';
        position: fixed;
        top: 50%;
        left: 50%;
        width: 150%;
        height: 150%;
        transform: translate(-50%, -50%);
        background-image: 
          radial-gradient(circle at 20% 30%, rgba(123, 47, 252, 0.15) 0%, transparent 40%),
          radial-gradient(circle at 80% 70%, rgba(96, 239, 255, 0.1) 0%, transparent 40%),
          radial-gradient(circle at 50% 50%, rgba(217, 70, 239, 0.08) 0%, transparent 50%);
        animation: nebula-rotate 20s linear infinite;
        z-index: 0;
        pointer-events: none;
      }

      @keyframes nebula-rotate {
        from {
          transform: translate(-50%, -50%) rotate(0deg);
        }
        to {
          transform: translate(-50%, -50%) rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
