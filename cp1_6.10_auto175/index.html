<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>星语心愿</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background: #0b0e27;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      }
      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
      }
      #canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
      .ui-panel {
        position: absolute;
        color: #fff;
        user-select: none;
      }
      #stats-panel {
        top: 16px;
        left: 16px;
        width: 180px;
        background: rgba(10, 10, 30, 0.7);
        border-radius: 8px;
        padding: 12px 14px;
        font-size: 14px;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        border: 1px solid rgba(255, 215, 0, 0.15);
        animation: fadeIn 0.3s ease;
      }
      #stats-panel.collapsed {
        width: auto;
        padding: 8px;
      }
      #stats-panel.collapsed .stats-content {
        display: none;
      }
      #stats-panel .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }
      #stats-panel.collapsed .header {
        margin-bottom: 0;
      }
      #stats-panel .title {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.8);
      }
      #stats-panel .collapse-btn {
        width: 20px;
        height: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: rgba(255, 255, 255, 0.6);
        font-size: 14px;
        border-radius: 4px;
        transition: all 0.2s ease;
      }
      #stats-panel .collapse-btn:hover {
        color: #ffd700;
        background: rgba(255, 215, 0, 0.1);
      }
      #stats-panel .stat-icon {
        width: 24px;
        height: 24px;
        cursor: pointer;
        color: #ffd700;
      }
      #stats-panel .stat-row {
        display: flex;
        justify-content: space-between;
        padding: 3px 0;
      }
      #stats-panel .stat-label {
        color: rgba(255, 255, 255, 0.7);
      }
      #stats-panel .stat-value {
        color: #ffd700;
        font-weight: 600;
      }
      #wish-btn {
        bottom: 24px;
        right: 24px;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: rgba(255, 215, 0, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.25s ease;
        border: 1px solid rgba(255, 215, 0, 0.3);
        box-shadow: 0 0 20px rgba(255, 215, 0, 0.15),
          0 0 40px rgba(255, 215, 0, 0.08);
        color: #ffd700;
        font-size: 26px;
        font-weight: 300;
      }
      #wish-btn:hover {
        background: rgba(255, 215, 0, 0.4);
        transform: scale(1.1);
        box-shadow: 0 0 28px rgba(255, 215, 0, 0.3),
          0 0 60px rgba(255, 215, 0, 0.15);
      }
      #wish-btn:active {
        transform: scale(0.9);
      }
      #wish-btn.pulse {
        animation: btnPulse 0.4s ease;
      }
      #wish-input-wrap {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: none;
        align-items: center;
        gap: 8px;
        z-index: 10;
        animation: fadeIn 0.25s ease;
      }
      #wish-input-wrap.visible {
        display: flex;
      }
      #wish-input {
        width: 260px;
        height: 40px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 215, 0, 0.5);
        color: #fff;
        font-size: 16px;
        padding: 0 14px;
        outline: none;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
      }
      #wish-input::placeholder {
        color: rgba(255, 255, 255, 0.5);
      }
      #wish-input:focus {
        border-color: rgba(255, 215, 0, 0.8);
        box-shadow: 0 0 12px rgba(255, 215, 0, 0.2);
      }
      #send-btn {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        background: rgba(255, 215, 0, 0.2);
        border: 1px solid rgba(255, 215, 0, 0.4);
        color: #ffd700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
      }
      #send-btn:hover {
        background: rgba(255, 215, 0, 0.35);
      }
      #send-btn:active {
        transform: scale(0.92);
      }
      #send-btn.pulse {
        animation: btnPulse 0.3s ease;
      }
      #send-btn .triangle {
        width: 0;
        height: 0;
        border-left: 10px solid #ffd700;
        border-top: 7px solid transparent;
        border-bottom: 7px solid transparent;
        margin-left: 2px;
      }
      #bubble-dialog {
        position: absolute;
        display: none;
        min-width: 240px;
        max-width: 320px;
        background: rgba(10, 10, 30, 0.85);
        border: 1px solid rgba(255, 215, 0, 0.3);
        border-radius: 12px;
        padding: 16px 18px;
        color: #fff;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        z-index: 20;
        animation: fadeIn 0.2s ease;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      }
      #bubble-dialog.visible {
        display: block;
      }
      #bubble-dialog .close-x {
        position: absolute;
        top: 8px;
        right: 10px;
        width: 22px;
        height: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: rgba(255, 255, 255, 0.6);
        font-size: 16px;
        border-radius: 4px;
        transition: all 0.2s ease;
      }
      #bubble-dialog .close-x:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.1);
      }
      #bubble-dialog .wish-text {
        font-size: 16px;
        line-height: 1.6;
        margin-bottom: 12px;
        padding-right: 16px;
        word-break: break-all;
      }
      #bubble-dialog .actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      #bubble-dialog .collect-btn {
        padding: 6px 12px;
        border-radius: 6px;
        border: 1px solid rgba(255, 215, 0, 0.5);
        background: rgba(255, 215, 0, 0.15);
        color: #fff;
        cursor: pointer;
        font-size: 13px;
        transition: all 0.2s ease;
      }
      #bubble-dialog .collect-btn:hover {
        background: rgba(255, 215, 0, 0.3);
      }
      #bubble-dialog .collect-btn.collected {
        background: rgba(76, 175, 80, 0.2);
        border-color: rgba(76, 175, 80, 0.5);
      }
      #bubble-dialog .collected-tip {
        color: #4caf50;
        font-size: 12px;
        margin-left: 4px;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translate(-50%, -48%);
        }
        to {
          opacity: 1;
          transform: translate(-50%, -50%);
        }
      }
      #wish-input-wrap,
      #stats-panel,
      #wish-btn,
      #bubble-dialog {
        animation: none;
      }
      #stats-panel {
        animation: panelFade 0.3s ease;
      }
      @keyframes panelFade {
        from {
          opacity: 0;
          transform: translateY(-6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      #wish-btn {
        animation: btnFade 0.4s ease 0.1s both;
      }
      @keyframes btnFade {
        from {
          opacity: 0;
          transform: scale(0.8);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes btnPulse {
        0% {
          box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.6);
        }
        100% {
          box-shadow: 0 0 0 20px rgba(255, 215, 0, 0);
        }
      }
      @media (max-width: 767px) {
        #stats-panel {
          top: auto;
          left: 0;
          bottom: 0;
          width: 100%;
          height: 50px;
          border-radius: 0;
          padding: 0 16px;
          display: flex;
          align-items: center;
          gap: 18px;
          font-size: 13px;
        }
        #stats-panel.collapsed {
          padding: 8px 16px;
        }
        #stats-panel .header {
          margin-bottom: 0;
          margin-right: auto;
        }
        #stats-panel .stats-content {
          display: flex !important;
          gap: 18px;
          flex: 1;
        }
        #stats-panel.collapsed .stats-content {
          display: none !important;
        }
        #stats-panel .stat-row {
          padding: 0;
          gap: 4px;
        }
        #wish-btn {
          bottom: 70px;
          right: 16px;
          width: 50px;
          height: 50px;
          font-size: 22px;
        }
        #wish-input {
          width: calc(80vw - 56px);
        }
        #bubble-dialog {
          width: 80vw;
          max-width: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="canvas"></canvas>

      <div id="stats-panel" class="ui-panel">
        <div class="header">
          <span class="title">星语心愿</span>
          <span class="collapse-btn" id="collapse-btn">−</span>
          <svg
            class="stat-icon"
            id="expand-btn"
            style="display: none"
            viewBox="0 0 24 24"
            fill="currentColor"
          >
            <path
              d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
            />
          </svg>
        </div>
        <div class="stats-content">
          <div class="stat-row">
            <span class="stat-label">星星总数</span>
            <span class="stat-value" id="stat-total">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">我的收藏</span>
            <span class="stat-value" id="stat-collected">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">今日新增</span>
            <span class="stat-value" id="stat-today">0</span>
          </div>
        </div>
      </div>

      <div id="wish-btn" class="ui-panel" title="许个心愿">✦</div>

      <div id="wish-input-wrap">
        <input
          id="wish-input"
          type="text"
          maxlength="30"
          placeholder="写下你的心愿(最多30字)..."
        />
        <div id="send-btn" title="发送心愿">
          <div class="triangle"></div>
        </div>
      </div>

      <div id="bubble-dialog">
        <span class="close-x" id="bubble-close">✕</span>
        <div class="wish-text" id="bubble-text"></div>
        <div class="actions">
          <button class="collect-btn" id="bubble-collect">❤️ 收藏</button>
          <span class="collected-tip" id="bubble-tip" style="display: none"
            >已收藏</span
          >
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
