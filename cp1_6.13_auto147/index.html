<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>影舞·纸傀戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "KaiTi", "楷体", serif;
      background: #1a0f08;
    }

    #stage-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #wood-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    #smoke-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    #lanterns-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 120px;
      z-index: 2;
      pointer-events: none;
    }

    #candle-light {
      position: absolute;
      bottom: 180px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      pointer-events: none;
    }

    #puppets-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 4;
    }

    #curtain {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 5;
      pointer-events: none;
    }

    #audience-layer {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60px;
      z-index: 6;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="stage-container">
    <canvas id="wood-background"></canvas>
    <canvas id="smoke-layer"></canvas>
    <canvas id="lanterns-layer"></canvas>
    <canvas id="candle-light"></canvas>
    <canvas id="puppets-layer"></canvas>
    <canvas id="curtain"></canvas>
    <canvas id="audience-layer"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
