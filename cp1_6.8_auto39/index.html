<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D 分子结构探索器</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <div id="app">
    <canvas id="scene-canvas"></canvas>

    <div class="top-bar">
      <button id="decompose-btn" class="decompose-btn">分解</button>
    </div>

    <div id="info-card" class="info-card hidden">
      <div class="info-card-content">
        <h3 id="atom-name">碳原子</h3>
        <div class="info-row">
          <span class="info-label">原子序号:</span>
          <span id="atom-number">6</span>
        </div>
        <div class="info-row">
          <span class="info-label">化学符号:</span>
          <span id="atom-symbol">C</span>
        </div>
        <div class="info-row">
          <span class="info-label">杂化类型:</span>
          <span id="atom-hybrid">sp³</span>
        </div>
        <div class="info-row">
          <span class="info-label">相连原子:</span>
          <span id="atom-connected">-</span>
        </div>
        <button id="close-info-btn" class="close-btn">关闭</button>
      </div>
    </div>

    <div class="control-panel">
      <div class="control-item">
        <label class="control-label">旋转速度</label>
        <input type="range" id="rotation-speed" min="0" max="2" step="0.01" value="0.5" class="slider rotation-slider">
        <div class="tooltip">旋转速度: <span id="rotation-value">0.5</span>x</div>
      </div>
      <div class="control-item">
        <label class="control-label">键透明度</label>
        <input type="range" id="bond-opacity" min="0.1" max="1" step="0.01" value="0.6" class="slider opacity-slider">
        <div class="tooltip">透明度: <span id="opacity-value">60</span>%</div>
      </div>
      <div class="control-item">
        <label class="control-label">原子大小</label>
        <input type="range" id="atom-scale" min="0.5" max="2" step="0.01" value="1" class="slider scale-slider">
        <div class="tooltip">大小比例: <span id="scale-value">1.0</span>x</div>
      </div>
    </div>

    <div id="opacity-display" class="opacity-display">60%</div>

    <div class="molecule-list-container">
      <div class="molecule-list" id="molecule-list"></div>
    </div>

    <button class="drawer-toggle" id="drawer-toggle">控制面板</button>
    <div class="drawer" id="drawer">
      <div class="drawer-content">
        <div class="control-item">
          <label class="control-label">旋转速度</label>
          <input type="range" id="rotation-speed-mobile" min="0" max="2" step="0.01" value="0.5" class="slider rotation-slider">
        </div>
        <div class="control-item">
          <label class="control-label">键透明度</label>
          <input type="range" id="bond-opacity-mobile" min="0.1" max="1" step="0.01" value="0.6" class="slider opacity-slider">
        </div>
        <div class="control-item">
          <label class="control-label">原子大小</label>
          <input type="range" id="atom-scale-mobile" min="0.5" max="2" step="0.01" value="1" class="slider scale-slider">
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
