<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>情绪光谱 - Emotion Spectrum</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0b0d17;
      color: #e0e0e0;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #canvas-container canvas {
      display: block;
    }

    .control-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 280px;
      background: rgba(11, 13, 23, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 20px;
      z-index: 100;
      border: 1px solid rgba(74, 74, 106, 0.3);
    }

    .panel-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #e0e0e0;
      letter-spacing: 0.5px;
    }

    .input-section {
      margin-bottom: 20px;
    }

    .label {
      display: block;
      font-size: 12px;
      color: #a0a0b0;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    #emotion-input {
      width: 100%;
      height: 40px;
      border-radius: 8px;
      border: 1px solid #4a4a6a;
      background: transparent;
      color: #ffffff;
      padding: 0 12px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease-out;
    }

    #emotion-input:focus {
      border-color: #50e3c2;
    }

    #emotion-input::placeholder {
      color: #6a6a8a;
    }

    .preset-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }

    .preset-btn {
      width: 100%;
      height: 40px;
      border-radius: 8px;
      border: 2px solid transparent;
      background: rgba(255, 255, 255, 0.05);
      color: #e0e0e0;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      transition: transform 0.2s ease-out, background 0.2s ease-out, border-color 0.2s ease-out;
      padding: 4px;
    }

    .preset-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .preset-btn:active {
      transform: scale(0.95);
    }

    .preset-btn.selected {
      border-color: var(--emotion-color);
    }

    .preset-btn .color-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--emotion-color);
    }

    .preset-btn .btn-label {
      font-size: 10px;
      letter-spacing: 0.3px;
    }

    .slider-section {
      margin-bottom: 20px;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .slider-value {
      font-size: 12px;
      color: #50e3c2;
      font-weight: 600;
    }

    #intensity-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right, #4a90d9, #ff2a2a);
      outline: none;
      cursor: pointer;
    }

    #intensity-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
      transition: transform 0.15s ease-out;
    }

    #intensity-slider::-webkit-slider-thumb:hover {
      transform: scale(1.1);
    }

    #intensity-slider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    .bottom-bar {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 100;
    }

    #play-pause-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: #e0e0e0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease-out, transform 0.15s ease-out;
    }

    #play-pause-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    #play-pause-btn:active {
      transform: scale(0.95);
    }

    #play-pause-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .current-emotion {
      font-size: 14px;
      color: #a0a0b0;
      padding: 8px 16px;
      background: rgba(11, 13, 23, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid rgba(74, 74, 106, 0.3);
    }

    .current-emotion span {
      color: #e0e0e0;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div class="control-panel">
      <div class="panel-title">情绪光谱</div>

      <div class="input-section">
        <label class="label" for="emotion-input">输入情绪关键词</label>
        <input
          type="text"
          id="emotion-input"
          placeholder="如: joy, sadness, anger, calm..."
        />
      </div>

      <div class="label">预设情绪</div>
      <div class="preset-buttons" id="preset-buttons"></div>

      <div class="slider-section">
        <div class="slider-header">
          <label class="label" for="intensity-slider" style="margin-bottom: 0;">强度</label>
          <span class="slider-value" id="slider-value">50</span>
        </div>
        <input
          type="range"
          id="intensity-slider"
          min="0"
          max="100"
          value="50"
        />
      </div>
    </div>

    <div class="bottom-bar">
      <button id="play-pause-btn" title="播放/暂停">
        <svg id="pause-icon" viewBox="0 0 24 24" style="display: block;">
          <rect x="6" y="4" width="4" height="16" rx="1" />
          <rect x="14" y="4" width="4" height="16" rx="1" />
        </svg>
        <svg id="play-icon" viewBox="0 0 24 24" style="display: none;">
          <polygon points="6,4 20,12 6,20" />
        </svg>
      </button>
      <div class="current-emotion">当前情绪: <span id="current-emotion-label">Neutral</span></div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
