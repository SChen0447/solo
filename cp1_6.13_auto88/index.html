<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>茶境·墨影</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "STKaiti", "KaiTi", "SimSun", serif;
      background: #2c1e16;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
      opacity: 0;
      transition: opacity 2s ease-in-out;
    }

    #app.loaded {
      opacity: 1;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    .step-indicator {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 248, 235, 0.7);
      font-size: 18px;
      letter-spacing: 8px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      z-index: 10;
      pointer-events: none;
    }

    .title {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 248, 235, 0.9);
      font-size: 32px;
      letter-spacing: 12px;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
      z-index: 10;
      pointer-events: none;
    }

    .hint {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 248, 235, 0.5);
      font-size: 14px;
      letter-spacing: 4px;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="title">茶境·墨影</div>
    <div class="step-indicator" id="stepIndicator">温器</div>
    <canvas id="canvas"></canvas>
    <div class="hint">点击茶器交互 · 拖拽茶汤作画</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('app')?.classList.add('loaded');
      }, 100);
    });
  </script>
</body>
</html>
