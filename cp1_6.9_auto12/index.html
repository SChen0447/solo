<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <title>城市建筑能耗3D可视化看板</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0e1a;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      color: #e0e6ff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .glass-panel {
      position: absolute;
      background: rgba(16, 20, 40, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 16px 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    #top-panel {
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 32px;
    }

    #total-carbon {
      font-size: 14px;
      color: #8a9bd4;
    }

    #total-carbon .value {
      font-size: 28px;
      font-weight: bold;
      color: #00d4ff;
      letter-spacing: 1px;
      margin-left: 8px;
    }

    #total-carbon .trend {
      font-size: 16px;
      margin-left: 8px;
    }

    #total-carbon .trend.up {
      color: #ff6b6b;
    }

    #total-carbon .trend.down {
      color: #51cf66;
    }

    #control-panel {
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 180px;
    }

    .control-btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #00d4ff, #7b61ff);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .control-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
    }

    .control-btn.active {
      box-shadow: 0 0 16px rgba(123, 97, 255, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    #legend-panel {
      top: 50%;
      left: 20px;
      transform: translateY(-50%);
      min-width: 160px;
    }

    .legend-title {
      font-size: 13px;
      color: #8a9bd4;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .legend-color {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      box-shadow: 0 0 6px currentColor;
    }

    #slider-panel {
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      min-width: 400px;
      max-width: 800px;
    }

    .slider-container {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .slider-label {
      font-size: 13px;
      color: #8a9bd4;
      min-width: 50px;
    }

    .slider-label.year-display {
      font-size: 24px;
      font-weight: bold;
      color: #00d4ff;
      min-width: 60px;
      text-align: center;
    }

    #year-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, #1a2a4a, #7b61ff);
      outline: none;
    }

    #year-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #00d4ff;
      cursor: pointer;
      box-shadow: 0 0 12px #00d4ff;
      transition: all 0.2s ease;
    }

    #year-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 20px #00d4ff;
    }

    #year-slider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #00d4ff;
      cursor: pointer;
      box-shadow: 0 0 12px #00d4ff;
      border: none;
    }

    #info-card {
      position: absolute;
      display: none;
      min-width: 260px;
      z-index: 100;
    }

    #info-card .close-btn {
      position: absolute;
      top: 10px;
      right: 14px;
      background: none;
      border: none;
      color: #8a9bd4;
      font-size: 18px;
      cursor: pointer;
      transition: color 0.2s;
    }

    #info-card .close-btn:hover {
      color: #fff;
    }

    .info-title {
      font-size: 16px;
      font-weight: bold;
      color: #00d4ff;
      margin-bottom: 12px;
      padding-right: 24px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 13px;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      color: #8a9bd4;
    }

    .info-value {
      color: #e0e6ff;
      font-weight: 500;
    }

    .info-value.highlight {
      color: #ffd43b;
    }

    #tips-panel {
      bottom: 100px;
      left: 20px;
      font-size: 12px;
      color: #5a6a9a;
      max-width: 200px;
      line-height: 1.6;
    }

    #tips-panel .tips-title {
      color: #8a9bd4;
      font-weight: 600;
      margin-bottom: 6px;
    }

    #particle-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: particleFade 0.8s ease-out forwards;
    }

    @keyframes particleFade {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(var(--dx), var(--dy)) scale(0);
      }
    }

    @media (max-width: 1280px) {
      #top-panel { gap: 16px; padding: 12px 16px; }
      #total-carbon .value { font-size: 22px; }
      #slider-panel { width: 80%; min-width: 320px; }
      #legend-panel, #tips-panel { left: 10px; }
      #control-panel { right: 10px; min-width: 150px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="particle-container"></div>

    <div id="top-panel" class="glass-panel">
      <div id="total-carbon">
        <span>碳排放总量 (吨CO₂):</span>
        <span class="value" id="carbon-value">0</span>
        <span class="trend" id="carbon-trend">→</span>
      </div>
    </div>

    <div id="control-panel" class="glass-panel">
      <div style="font-size:13px; color:#8a9bd4; margin-bottom:8px; font-weight:600;">数据切换</div>
      <button class="control-btn active" data-mode="energy">能耗</button>
      <button class="control-btn" data-mode="carbon">碳排放</button>
      <button class="control-btn" data-mode="composite">综合指数</button>
    </div>

    <div id="legend-panel" class="glass-panel">
      <div class="legend-title">图例</div>
      <div id="legend-items"></div>
    </div>

    <div id="slider-panel" class="glass-panel">
      <div class="slider-container">
        <span class="slider-label">2020</span>
        <input type="range" id="year-slider" min="2020" max="2025" step="1" value="2025" />
        <span class="slider-label year-display" id="year-display">2025</span>
      </div>
    </div>

    <div id="tips-panel" class="glass-panel">
      <div class="tips-title">操作提示</div>
      <div>鼠标拖拽: 旋转视角</div>
      <div>滚轮: 缩放</div>
      <div>W/A/S/D: 第一人称漫游</div>
      <div>点击建筑: 查看详情</div>
    </div>

    <div id="info-card" class="glass-panel">
      <button class="close-btn" id="info-close">×</button>
      <div class="info-title" id="info-title">建筑名称</div>
      <div class="info-row"><span class="info-label">总面积</span><span class="info-value" id="info-area">0 m²</span></div>
      <div class="info-row"><span class="info-label">楼层数</span><span class="info-value" id="info-floors">0</span></div>
      <div class="info-row"><span class="info-label">月均能耗</span><span class="info-value highlight" id="info-energy">0 kWh</span></div>
      <div class="info-row"><span class="info-label">年碳排放</span><span class="info-value highlight" id="info-carbon">0 吨CO₂</span></div>
      <div class="info-row"><span class="info-label">光伏板面积</span><span class="info-value" id="info-pv">0 m²</span></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
