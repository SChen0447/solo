<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全球城市夜间灯光动态可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    }

    body {
      background: radial-gradient(ellipse at center, #0B1020 0%, #050810 100%);
      color: #ffffff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #canvas-container canvas {
      display: block;
    }

    .control-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(10, 10, 30, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 24px;
      min-width: 320px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 100;
    }

    .panel-title {
      font-size: 18px;
      font-weight: 600;
      color: #00BFFF;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-title::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 18px;
      background: linear-gradient(180deg, #00BFFF, #FF4500);
      border-radius: 2px;
    }

    .time-display {
      font-size: 36px;
      font-weight: 300;
      color: #ffffff;
      text-align: center;
      margin-bottom: 20px;
      letter-spacing: 4px;
      font-variant-numeric: tabular-nums;
    }

    .time-slider-container {
      margin-bottom: 20px;
    }

    .time-slider {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(90deg, #1a1a3a, #3a3a6a);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    .time-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      background: linear-gradient(135deg, #00BFFF, #0080FF);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(0, 191, 255, 0.6);
      transition: transform 0.2s ease;
    }

    .time-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .time-slider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      background: linear-gradient(135deg, #00BFFF, #0080FF);
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 12px rgba(0, 191, 255, 0.6);
    }

    .time-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
    }

    .button-group {
      display: flex;
      gap: 12px;
    }

    .control-btn {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid rgba(0, 191, 255, 0.3);
      background: rgba(0, 191, 255, 0.1);
      color: #ffffff;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .control-btn:hover {
      background: rgba(0, 191, 255, 0.25);
      border-color: rgba(0, 191, 255, 0.6);
      box-shadow: 0 0 16px rgba(0, 191, 255, 0.3);
    }

    .control-btn:active {
      transform: scale(0.97);
    }

    .control-btn.primary {
      background: linear-gradient(135deg, rgba(0, 191, 255, 0.4), rgba(0, 128, 255, 0.4));
      border-color: rgba(0, 191, 255, 0.6);
    }

    .control-btn.primary:hover {
      background: linear-gradient(135deg, rgba(0, 191, 255, 0.6), rgba(0, 128, 255, 0.6));
    }

    .hover-label {
      position: absolute;
      pointer-events: none;
      background: rgba(10, 10, 30, 0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      color: #ffffff;
      z-index: 200;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      white-space: nowrap;
    }

    .hover-label.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .hover-label .city-name {
      font-weight: 600;
      color: #00BFFF;
      margin-bottom: 4px;
    }

    .hover-label .label-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin: 2px 0;
      color: rgba(255, 255, 255, 0.85);
    }

    .hover-label .label-value {
      color: #FFD700;
      font-weight: 500;
    }

    .hover-label .brightness-bar {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }

    .hover-label .brightness-fill {
      height: 100%;
      background: linear-gradient(90deg, #FFD700, #FF4500);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .legend {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .legend-title {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 8px;
    }

    .legend-gradient {
      width: 100%;
      height: 8px;
      background: linear-gradient(90deg, #FFD700, #FF8C00, #FF4500);
      border-radius: 4px;
    }

    .legend-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
    }

    .info-text {
      position: absolute;
      bottom: 20px;
      right: 20px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.3);
      z-index: 50;
    }

    @media (max-width: 768px) {
      .control-panel {
        top: auto;
        left: 0;
        right: 0;
        bottom: 0;
        border-radius: 20px 20px 0 0;
        min-width: auto;
        padding: 16px 20px;
      }

      .panel-title {
        font-size: 14px;
        margin-bottom: 12px;
      }

      .time-display {
        font-size: 28px;
        margin-bottom: 12px;
      }

      .time-slider-container {
        margin-bottom: 12px;
      }

      .control-btn {
        padding: 10px 12px;
        font-size: 12px;
      }

      .info-text {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div class="control-panel" id="control-panel">
      <div class="panel-title">全球城市灯光动态</div>
      <div class="time-display" id="time-display">00:00</div>

      <div class="time-slider-container">
        <input type="range" class="time-slider" id="time-slider" min="0" max="1439" value="0" step="1">
        <div class="time-labels">
          <span>00:00</span>
          <span>06:00</span>
          <span>12:00</span>
          <span>18:00</span>
          <span>23:59</span>
        </div>
      </div>

      <div class="button-group">
        <button class="control-btn primary" id="play-btn">
          <span id="play-icon">▶</span>
          <span id="play-text">播放</span>
        </button>
        <button class="control-btn" id="reset-btn">
          <span>↺</span>
          <span>重置</span>
        </button>
      </div>

      <div class="legend">
        <div class="legend-title">灯光亮度</div>
        <div class="legend-gradient"></div>
        <div class="legend-labels">
          <span>低</span>
          <span>中</span>
          <span>高</span>
        </div>
      </div>
    </div>

    <div class="hover-label" id="hover-label">
      <div class="city-name" id="label-city"></div>
      <div class="label-row">
        <span>本地时间</span>
        <span class="label-value" id="label-time"></span>
      </div>
      <div class="label-row">
        <span>灯光亮度</span>
        <span class="label-value" id="label-brightness"></span>
      </div>
      <div class="brightness-bar">
        <div class="brightness-fill" id="brightness-fill"></div>
      </div>
    </div>

    <div class="info-text">拖拽旋转地球 · 滚轮缩放</div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
