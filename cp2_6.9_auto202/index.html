<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>水墨丹青 · 交互式水墨画绘制</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "KaiTi", "STKaiti", "楷体", "Noto Serif SC", serif;
      background: #E8E0D0;
      color: #3A2818;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      background: rgba(255, 255, 240, 0.85);
      border-bottom: 1px solid #5C3A1E;
      backdrop-filter: blur(4px);
      z-index: 100;
      flex-shrink: 0;
      min-height: 60px;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-right: 12px;
      border-right: 1px solid rgba(92, 58, 30, 0.3);
    }

    .toolbar-group:last-child {
      border-right: none;
    }

    .toolbar-label {
      font-size: 14px;
      color: #5C3A1E;
      margin-right: 4px;
    }

    .brush-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #F5F0E8;
      font-size: 13px;
      font-weight: bold;
    }

    .brush-btn[data-brush="thin"] {
      background: #D4C4A8;
      color: #5C3A1E;
    }

    .brush-btn[data-brush="medium"] {
      background: #A08060;
    }

    .brush-btn[data-brush="thick"] {
      background: #7A5C3E;
    }

    .brush-btn.active {
      border-color: #D4AF37;
      box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.3);
    }

    .action-btn {
      padding: 8px 16px;
      border: 1px solid #5C3A1E;
      background: rgba(255, 255, 255, 0.6);
      color: #5C3A1E;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      transition: all 0.2s ease;
      min-width: 64px;
    }

    .brush-btn:hover,
    .action-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 2px 8px rgba(212, 175, 55, 0.4);
    }

    .brush-btn:active,
    .action-btn:active {
      transform: scale(0.95);
    }

    .canvas-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: #E8E0D0;
      padding: 0;
    }

    #mainCanvas {
      display: block;
      background: #F5F0E8;
      cursor: crosshair;
      touch-action: none;
      box-shadow: 0 0 0 6px rgba(212, 196, 168, 0.6);
      border: 6px solid rgba(212, 196, 168, 0.6);
      position: relative;
    }

    #mainCanvas::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border: 6px solid rgba(212, 196, 168, 0.6);
      pointer-events: none;
      z-index: 10;
    }

    #clearMask {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #F5F0E8;
      pointer-events: none;
      opacity: 0;
      z-index: 50;
      -webkit-mask-image: radial-gradient(circle at center, transparent 0%, black 0%);
      mask-image: radial-gradient(circle at center, transparent 0%, black 0%);
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 20px;
      background: rgba(255, 255, 240, 0.85);
      border-top: 1px solid #5C3A1E;
      font-size: 13px;
      color: #5C3A1E;
      flex-shrink: 0;
      min-height: 32px;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-label {
      color: #8B7355;
    }

    .status-value {
      font-weight: bold;
      min-width: 40px;
    }

    .playback-controls {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      background: rgba(255, 255, 240, 0.9);
      border-top: 1px solid #5C3A1E;
      border-bottom: 1px solid #5C3A1E;
      flex-shrink: 0;
    }

    .playback-controls.active {
      display: flex;
    }

    .progress-bar {
      flex: 1;
      height: 6px;
      background: rgba(92, 58, 30, 0.15);
      border-radius: 3px;
      cursor: pointer;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #D4AF37, #B8960C);
      width: 0%;
      transition: width 0.1s linear;
      border-radius: 3px;
    }

    .playback-time {
      font-size: 12px;
      color: #5C3A1E;
      min-width: 90px;
      text-align: right;
    }

    @media (max-width: 768px) {
      .toolbar {
        padding: 8px 12px;
        gap: 8px;
        flex-wrap: wrap;
      }

      .toolbar-group {
        gap: 8px;
        padding-right: 8px;
      }

      .action-btn {
        padding: 6px 10px;
        font-size: 12px;
        min-width: auto;
      }

      .status-bar {
        padding: 4px 12px;
        font-size: 11px;
        flex-wrap: wrap;
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <header class="toolbar" id="toolbar">
      <div class="toolbar-group">
        <span class="toolbar-label">笔触：</span>
        <button class="brush-btn active" data-brush="thin" title="细笔">细</button>
        <button class="brush-btn" data-brush="medium" title="中笔">中</button>
        <button class="brush-btn" data-brush="thick" title="粗笔">粗</button>
      </div>
      <div class="toolbar-group">
        <button class="action-btn" id="undoBtn" title="撤销上一步">撤销</button>
        <button class="action-btn" id="clearBtn" title="清空画布">清空</button>
      </div>
      <div class="toolbar-group">
        <button class="action-btn" id="saveBtn" title="导出为PNG">保存</button>
        <button class="action-btn" id="playbackBtn" title="回放创作过程">回放</button>
      </div>
    </header>

    <div class="playback-controls" id="playbackControls">
      <button class="action-btn" id="playPauseBtn">暂停</button>
      <button class="action-btn" id="stopPlaybackBtn">停止</button>
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span class="playback-time" id="playbackTime">0.0s / 0.0s</span>
    </div>

    <main class="canvas-wrapper" id="canvasWrapper">
      <canvas id="mainCanvas"></canvas>
      <div id="clearMask"></div>
    </main>

    <footer class="status-bar" id="statusBar">
      <div class="status-item">
        <span class="status-label">工具：</span>
        <span class="status-value" id="statusTool">细笔</span>
      </div>
      <div class="status-item">
        <span class="status-label">位置：</span>
        <span class="status-value" id="statusPos">(0, 0)</span>
      </div>
      <div class="status-item">
        <span class="status-label">尺寸：</span>
        <span class="status-value" id="statusSize">0 × 0</span>
      </div>
    </footer>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
