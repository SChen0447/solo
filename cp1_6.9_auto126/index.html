<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>古树根系生长可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #0a1628 0%, #1a0e0a 100%);
      font-family: system-ui, -apple-system, sans-serif;
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
    #ui-panel {
      position: absolute;
      left: 16px;
      bottom: 16px;
      width: 220px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 12px;
      user-select: none;
    }
    #ui-panel h3 {
      font-size: 13px;
      margin-bottom: 12px;
      color: #f0f0f0;
      font-weight: 600;
    }
    .control-group {
      margin-bottom: 12px;
    }
    .control-group label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .control-group .value {
      color: #6b8e23;
      font-weight: 600;
    }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #2a2a2a;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #d0d0d0;
      cursor: pointer;
      transition: background 0.2s;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      background: #f0f0f0;
    }
    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #d0d0d0;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }
    input[type="range"]::-moz-range-thumb:hover {
      background: #f0f0f0;
    }
    input[type="range"]::-moz-range-track {
      height: 6px;
      border-radius: 3px;
      background: #2a2a2a;
    }
    .btn {
      width: 100%;
      padding: 8px;
      background: rgba(107, 142, 35, 0.6);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover {
      background: rgba(107, 142, 35, 0.9);
    }
    .tooltip {
      position: absolute;
      background: rgba(10, 22, 40, 0.95);
      border: 1px solid rgba(107, 142, 35, 0.5);
      border-radius: 6px;
      padding: 10px 12px;
      color: #e0e0e0;
      font-size: 12px;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
      backdrop-filter: blur(4px);
    }
    .tooltip-title {
      color: #6b8e23;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .tooltip-row {
      display: flex;
      gap: 8px;
      margin: 2px 0;
    }
    .tooltip-label {
      color: #a0a0a0;
    }
    .hover-halo {
      position: absolute;
      pointer-events: none;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      animation: halo-pulse 0.6s ease-out forwards;
    }
    @keyframes halo-pulse {
      0% {
        width: 0;
        height: 0;
        opacity: 0.8;
      }
      100% {
        width: 60px;
        height: 60px;
        opacity: 0;
      }
    }
    .soil-label {
      position: absolute;
      background: rgba(10, 22, 40, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      padding: 8px 10px;
      color: #e0e0e0;
      font-size: 11px;
      pointer-events: none;
      z-index: 50;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="ui-panel">
      <h3>🌱 根系控制面板</h3>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
