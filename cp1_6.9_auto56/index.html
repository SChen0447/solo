<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>时间轴历史地图</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --parchment-bg: #4A3728;
      --gold-accent: #D4AF37;
      --gold-glow: rgba(212, 175, 55, 0.6);
      --dark-panel: rgba(30, 20, 15, 0.85);
      --font-serif: Georgia, 'Times New Roman', serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: var(--font-serif);
      background-color: var(--parchment-bg);
      color: var(--gold-accent);
    }

    #map {
      width: 100%;
      height: 100%;
      background-color: var(--parchment-bg);
    }

    .leaflet-container {
      background: var(--parchment-bg);
      font-family: var(--font-serif);
    }

    #timeline-container {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      max-width: 900px;
      z-index: 1000;
      background: var(--dark-panel);
      border: 1px solid var(--gold-accent);
      border-radius: 12px;
      padding: 16px 24px;
      box-shadow: 0 0 20px var(--gold-glow), inset 0 0 10px rgba(0, 0, 0, 0.3);
    }

    #timeline-year {
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      color: var(--gold-accent);
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    #timeline-slider {
      width: 100%;
      height: 8px;
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(to right, #2a1f15, #6b4f35, #2a1f15);
      border-radius: 4px;
      outline: none;
      cursor: pointer;
    }

    #timeline-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f5d67a, var(--gold-accent), #b8941f);
      border: 2px solid #fff8dc;
      cursor: grab;
      box-shadow: 0 0 10px var(--gold-glow), 0 2px 6px rgba(0, 0, 0, 0.5);
      transition: transform 0.15s ease;
    }

    #timeline-slider::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    #timeline-slider::-webkit-slider-thumb:active {
      cursor: grabbing;
    }

    #timeline-slider::-moz-range-thumb {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f5d67a, var(--gold-accent), #b8941f);
      border: 2px solid #fff8dc;
      cursor: grab;
      box-shadow: 0 0 10px var(--gold-glow), 0 2px 6px rgba(0, 0, 0, 0.5);
    }

    #timeline-ticks {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 11px;
      color: rgba(212, 175, 55, 0.7);
    }

    #event-summary {
      margin-top: 12px;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.3);
      border-left: 3px solid var(--gold-accent);
      border-radius: 4px;
      font-size: 14px;
      line-height: 1.6;
      color: #e8d9b0;
      min-height: 24px;
    }

    #sidebar {
      position: absolute;
      top: 50%;
      right: 0;
      transform: translateY(-50%);
      width: 280px;
      max-height: 80vh;
      z-index: 1000;
      background: var(--dark-panel);
      border: 1px solid var(--gold-accent);
      border-right: none;
      border-radius: 12px 0 0 12px;
      box-shadow: -4px 0 20px var(--gold-glow), inset 0 0 10px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar.collapsed {
      transform: translate(280px, -50%);
    }

    #sidebar-toggle {
      position: absolute;
      left: -38px;
      top: 50%;
      transform: translateY(-50%);
      width: 38px;
      height: 80px;
      background: var(--dark-panel);
      border: 1px solid var(--gold-accent);
      border-right: none;
      border-radius: 10px 0 0 10px;
      color: var(--gold-accent);
      cursor: pointer;
      font-family: var(--font-serif);
      font-size: 18px;
      writing-mode: vertical-rl;
      text-orientation: upright;
      letter-spacing: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: -4px 0 10px rgba(0, 0, 0, 0.4);
      transition: background 0.2s ease;
    }

    #sidebar-toggle:hover {
      background: rgba(212, 175, 55, 0.15);
    }

    #sidebar-header {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(212, 175, 55, 0.3);
      text-align: center;
    }

    #sidebar-header h2 {
      font-size: 20px;
      color: var(--gold-accent);
      letter-spacing: 3px;
    }

    #sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    #sidebar-content::-webkit-scrollbar {
      width: 6px;
    }

    #sidebar-content::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.2);
    }

    #sidebar-content::-webkit-scrollbar-thumb {
      background: var(--gold-accent);
      border-radius: 3px;
    }

    .century-group {
      margin-bottom: 18px;
    }

    .century-title {
      font-size: 15px;
      color: var(--gold-accent);
      padding: 6px 10px;
      background: rgba(212, 175, 55, 0.1);
      border-left: 3px solid var(--gold-accent);
      border-radius: 0 4px 4px 0;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .work-item {
      padding: 10px 12px;
      margin-bottom: 8px;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .work-item:hover {
      background: rgba(212, 175, 55, 0.12);
      border-color: var(--gold-accent);
      transform: translateX(-4px);
      box-shadow: 0 2px 8px rgba(212, 175, 55, 0.2);
    }

    .work-name {
      font-size: 14px;
      color: #f0e2b8;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .work-meta {
      font-size: 12px;
      color: rgba(212, 175, 55, 0.8);
      margin-bottom: 4px;
    }

    .work-desc {
      font-size: 12px;
      color: #c9b88a;
      line-height: 1.5;
    }

    .work-category {
      display: inline-block;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      background: rgba(212, 175, 55, 0.2);
      color: var(--gold-accent);
      margin-right: 6px;
    }

    #event-card {
      position: absolute;
      z-index: 2000;
      width: 320px;
      max-width: 90vw;
      padding: 20px;
      background: rgba(30, 20, 15, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 2px solid var(--gold-accent);
      border-radius: 12px;
      box-shadow: 0 0 30px var(--gold-glow), inset 0 0 20px rgba(212, 175, 55, 0.05);
      color: #e8d9b0;
      transform: scale(0);
      transition: transform 0.3s ease-out;
      pointer-events: none;
    }

    #event-card.visible {
      transform: scale(1);
      pointer-events: auto;
    }

    #event-card-close {
      position: absolute;
      top: 8px;
      right: 12px;
      background: none;
      border: none;
      color: var(--gold-accent);
      font-size: 22px;
      cursor: pointer;
      font-family: var(--font-serif);
      line-height: 1;
      transition: transform 0.2s ease;
    }

    #event-card-close:hover {
      transform: rotate(90deg) scale(1.2);
    }

    #event-card-title {
      font-size: 18px;
      color: var(--gold-accent);
      margin-bottom: 6px;
      padding-right: 24px;
      letter-spacing: 1px;
    }

    #event-card-year {
      font-size: 13px;
      color: rgba(212, 175, 55, 0.7);
      margin-bottom: 12px;
    }

    #event-card-desc {
      font-size: 14px;
      line-height: 1.7;
      color: #d8c898;
      margin-bottom: 14px;
    }

    #event-card-image {
      width: 100%;
      height: 120px;
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(74, 55, 40, 0.5));
      border: 1px dashed rgba(212, 175, 55, 0.4);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(212, 175, 55, 0.6);
      font-size: 12px;
    }

    .event-marker {
      width: 12px !important;
      height: 12px !important;
      border-radius: 50%;
      background: radial-gradient(circle, #ffe58a 0%, var(--gold-accent) 50%, #8b6914 100%);
      border: 2px solid #fff8dc;
      box-shadow: 0 0 8px var(--gold-glow), 0 0 16px rgba(212, 175, 55, 0.4);
      cursor: pointer;
      transition: transform 0.2s ease;
      margin-left: -6px !important;
      margin-top: -6px !important;
    }

    .event-marker:hover {
      transform: scale(1.4);
    }

    @keyframes blinkHighlight {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.2); }
    }

    .civ-highlight {
      animation: blinkHighlight 1s ease-in-out infinite;
    }

    .civ-path {
      transition: opacity 0.5s ease;
    }

    @media (max-width: 768px) {
      #timeline-container {
        top: auto;
        bottom: 20px;
        left: 20px;
        transform: none;
        width: auto;
        right: 20px;
        padding: 12px 16px;
      }

      #timeline-year {
        font-size: 22px;
      }

      #sidebar {
        top: auto;
        bottom: 0;
        right: 0;
        left: 0;
        width: 100%;
        max-height: 50vh;
        transform: translateY(100%);
        border-radius: 16px 16px 0 0;
        border: 1px solid var(--gold-accent);
        border-bottom: none;
      }

      #sidebar.collapsed {
        transform: translateY(calc(100% - 50px));
      }

      #sidebar-toggle {
        position: absolute;
        left: 50%;
        top: -30px;
        transform: translateX(-50%);
        width: 80px;
        height: 30px;
        writing-mode: horizontal-tb;
        text-orientation: mixed;
        border-radius: 10px 10px 0 0;
        border: 1px solid var(--gold-accent);
        border-bottom: none;
        font-size: 14px;
        letter-spacing: 2px;
      }

      #event-card {
        width: calc(100% - 40px);
        left: 20px !important;
        top: auto !important;
        bottom: 160px !important;
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="timeline-container">
    <div id="timeline-year">公元 1000 年</div>
    <input type="range" id="timeline-slider" min="0" max="2000" step="50" value="1000" />
    <div id="timeline-ticks">
      <span>0</span>
      <span>500</span>
      <span>1000</span>
      <span>1500</span>
      <span>2000</span>
    </div>
    <div id="event-summary">正在加载历史事件...</div>
  </div>

  <div id="sidebar" class="collapsed">
    <button id="sidebar-toggle">文化</button>
    <div id="sidebar-header">
      <h2>文化代表作</h2>
    </div>
    <div id="sidebar-content"></div>
  </div>

  <div id="event-card" style="display: none;">
    <button id="event-card-close">&times;</button>
    <div id="event-card-title"></div>
    <div id="event-card-year"></div>
    <div id="event-card-desc"></div>
    <div id="event-card-image">插图占位</div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
