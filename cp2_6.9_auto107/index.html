<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brick Workshop</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
      background: linear-gradient(180deg, #E8E8E8 0%, #F5F5F5 100%);
    }

    .title-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 48px;
      background: rgba(240, 240, 240, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      padding: 0 24px;
      font-size: 16px;
      font-weight: 600;
      color: #333;
      z-index: 100;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    #scene-container {
      position: absolute;
      top: 48px;
      left: 0;
      right: 0;
      bottom: 0;
    }

    .tool-panel {
      position: absolute;
      top: 64px;
      left: 16px;
      width: 220px;
      min-height: 300px;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 12px;
      padding: 16px;
      z-index: 50;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }

    .panel-section {
      margin-bottom: 20px;
    }

    .panel-title {
      font-size: 12px;
      font-weight: 600;
      color: #555;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .brick-select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.7);
      font-size: 13px;
      color: #333;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }

    .brick-select:focus {
      border-color: #3366FF;
    }

    .brick-select option {
      background: white;
    }

    .color-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .color-swatch {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s ease;
      border: 2px solid transparent;
      position: relative;
    }

    .color-swatch:hover {
      transform: scale(1.1);
    }

    .color-swatch.selected {
      transform: scale(1.2);
      border-color: #333;
      box-shadow: 0 0 0 2px rgba(51, 102, 255, 0.4);
    }

    .color-swatch.white-swatch {
      border: 2px solid #ddd;
    }

    .color-swatch.white-swatch.selected {
      border-color: #333;
    }

    .hint-text {
      font-size: 11px;
      color: #888;
      margin-top: 8px;
      line-height: 1.5;
    }

    .brick-list-panel {
      position: absolute;
      top: 64px;
      right: 16px;
      width: 240px;
      max-height: calc(100vh - 96px);
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 12px;
      padding: 16px;
      z-index: 50;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
    }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .undo-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border: none;
      border-radius: 8px;
      background: rgba(51, 102, 255, 0.1);
      color: #3366FF;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .undo-btn:hover {
      background: rgba(51, 102, 255, 0.2);
    }

    .undo-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .brick-list {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .brick-item {
      display: flex;
      align-items: center;
      padding: 10px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 8px;
      margin-bottom: 8px;
      transition: background 0.2s;
    }

    .brick-item:hover {
      background: rgba(255, 255, 255, 0.8);
    }

    .brick-item-color {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      margin-right: 10px;
      flex-shrink: 0;
    }

    .brick-item-info {
      flex: 1;
      min-width: 0;
    }

    .brick-item-type {
      font-size: 12px;
      font-weight: 600;
      color: #333;
    }

    .brick-item-pos {
      font-size: 10px;
      color: #888;
      margin-top: 2px;
    }

    .delete-btn {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      background: rgba(255, 51, 51, 0.1);
      color: #FF3333;
    }

    .mini-panel {
      position: absolute;
      display: none;
      flex-direction: row;
      gap: 8px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 24px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
      z-index: 60;
      pointer-events: auto;
    }

    .mini-btn {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.2s;
      color: #333;
    }

    .mini-btn:hover {
      background: rgba(255, 255, 255, 1);
    }

    .empty-state {
      text-align: center;
      padding: 20px 0;
      color: #999;
      font-size: 12px;
    }

    @media (max-width: 768px) {
      .tool-panel {
        top: auto;
        left: 8px;
        right: 8px;
        bottom: 8px;
        width: auto;
        min-height: auto;
        top: auto;
      }

      .brick-list-panel {
        position: fixed;
        top: auto;
        right: -260px;
        transition: right 0.3s ease;
      }

      .brick-list-panel.open {
        right: 8px;
      }
    }

    .dragging {
      cursor: grabbing !important;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.15);
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="title-bar">Brick Workshop</div>
    <div id="scene-container"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
