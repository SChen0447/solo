<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D星云形态交互式生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0d0d2b;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #ffffff;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #0a0a2e 0%, #000000 100%);
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #stats {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      color: rgba(255, 255, 255, 0.75);
      font-size: 14px;
      line-height: 1.6;
      pointer-events: none;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
      font-variant-numeric: tabular-nums;
    }

    #ui-container {
      position: fixed;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 280px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 100;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
    }

    #ui-container::-webkit-scrollbar {
      width: 6px;
    }

    #ui-container::-webkit-scrollbar-track {
      background: transparent;
    }

    #ui-container::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    .control-group {
      margin-bottom: 18px;
    }

    .control-group:last-child {
      margin-bottom: 0;
    }

    .control-label {
      display: block;
      margin-bottom: 8px;
      color: #c0c0ff;
      font-size: 14px;
      font-weight: 500;
    }

    .control-value {
      float: right;
      color: rgba(255, 255, 255, 0.6);
      font-size: 13px;
    }

    input[type="range"] {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    input[type="range"]:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ffc864;
      cursor: pointer;
      border: 2px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 8px rgba(255, 200, 100, 0.5);
      transition: all 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      box-shadow: 0 0 14px rgba(255, 200, 100, 0.7);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ffc864;
      cursor: pointer;
      border: 2px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 8px rgba(255, 200, 100, 0.5);
      transition: all 0.2s ease;
    }

    input[type="range"]::-moz-range-thumb:hover {
      transform: scale(1.15);
      box-shadow: 0 0 14px rgba(255, 200, 100, 0.7);
    }

    input[type="color"] {
      width: 100%;
      height: 36px;
      padding: 2px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    input[type="color"]:hover {
      border-color: rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.1);
    }

    input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    input[type="color"]::-webkit-color-swatch {
      border: none;
      border-radius: 2px;
    }

    input[type="color"]::-moz-color-swatch {
      border: none;
      border-radius: 2px;
    }

    .btn {
      width: 100%;
      padding: 12px 16px;
      background: linear-gradient(135deg, rgba(255, 200, 100, 0.2), rgba(50, 100, 200, 0.2));
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn:hover {
      background: linear-gradient(135deg, rgba(255, 200, 100, 0.35), rgba(50, 100, 200, 0.35));
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .panel-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #ffffff;
      text-align: center;
      letter-spacing: 0.5px;
    }

    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
      margin: 20px 0;
    }

    @media (max-width: 768px) {
      #ui-container {
        position: fixed;
        right: 0;
        left: 0;
        bottom: 0;
        top: auto;
        transform: none;
        width: 100%;
        max-height: 45vh;
        border-radius: 16px 16px 0 0;
        padding: 16px;
        overflow-x: auto;
        overflow-y: hidden;
      }

      #ui-container::-webkit-scrollbar {
        height: 4px;
        width: 4px;
      }

      .control-wrap {
        display: flex;
        flex-direction: row;
        gap: 20px;
        white-space: nowrap;
      }

      .control-group {
        min-width: 200px;
        margin-bottom: 0;
        display: inline-block;
        vertical-align: top;
      }

      .panel-title {
        display: none;
      }

      .divider {
        display: none;
      }

      #stats {
        top: 12px;
        left: 12px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="stats">
    <div id="fps">FPS: --</div>
    <div id="particle-count">粒子: --</div>
  </div>
  <div id="ui-container">
    <div class="panel-title">✨ 星云控制面板</div>
    <div class="control-wrap">
      <div class="control-group">
        <label class="control-label" for="particle-count-slider">
          粒子数量
          <span class="control-value" id="particle-count-value">5000</span>
        </label>
        <input type="range" id="particle-count-slider" min="1000" max="10000" step="1000" value="5000" />
      </div>
      <div class="control-group">
        <label class="control-label" for="center-color">中心颜色</label>
        <input type="color" id="center-color" value="#ffc864" />
      </div>
      <div class="control-group">
        <label class="control-label" for="edge-color">边缘颜色</label>
        <input type="color" id="edge-color" value="#3264c8" />
      </div>
      <div class="divider"></div>
      <div class="control-group">
        <label class="control-label" for="rotation-speed">
          自转速度
          <span class="control-value" id="rotation-speed-value">0.010</span>
        </label>
        <input type="range" id="rotation-speed" min="0" max="0.05" step="0.001" value="0.01" />
      </div>
      <div class="control-group">
        <label class="control-label" for="radius">
          扩散半径
          <span class="control-value" id="radius-value">15</span>
        </label>
        <input type="range" id="radius" min="10" max="25" step="0.5" value="15" />
      </div>
      <div class="control-group">
        <label class="control-label">交互效果</label>
        <button class="btn" id="explode-btn">💥 星云爆裂</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
