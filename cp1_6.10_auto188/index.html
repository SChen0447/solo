<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>潮汐渔船</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #0d1b2a;
    }
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    .blur-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 60%;
      pointer-events: none;
      backdrop-filter: blur(1px);
      -webkit-backdrop-filter: blur(1px);
      opacity: 0.6;
      transition: opacity 2s ease-in-out;
    }
    .blur-overlay.hidden {
      opacity: 0;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div class="blur-overlay" id="blur-overlay"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
