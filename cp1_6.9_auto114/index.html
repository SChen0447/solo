<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>符文森林 · 能量连线</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a1a0a;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Microsoft YaHei", sans-serif;
      }
      #canvas-container {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
      }
      #ui-hint {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        color: rgba(255, 204, 102, 0.6);
        font-size: 16px;
        text-align: center;
        opacity: 1;
        transition: opacity 1s ease;
        z-index: 10;
        user-select: none;
      }
      #ui-hint.hidden {
        opacity: 0;
      }
      #ui-hint .title {
        font-size: 28px;
        margin-bottom: 12px;
        letter-spacing: 4px;
        color: rgba(255, 204, 102, 0.85);
        text-shadow: 0 0 20px rgba(255, 204, 102, 0.5);
      }
      #ui-hint .sub {
        line-height: 1.8;
        color: rgba(200, 200, 200, 0.6);
      }
    </style>
  </head>
  <body>
    <div id="canvas-container"></div>
    <div id="ui-hint">
      <div class="title">符文森林</div>
      <div class="sub">
        按住鼠标左键，在符文碎片之间绘制能量连线<br />
        连接出正确的图腾图案，解锁远古能量
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
