<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>光影纸灯 · 交互式折纸灯饰生成器</title>
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
  <div id="loading-screen">
    <div class="loading-lamp">
      <svg viewBox="0 0 200 200" width="120" height="120">
        <g class="lamp-sides">
          <rect x="60" y="40" width="80" height="80" fill="none" stroke="rgba(255,220,150,0.6)" stroke-width="1"/>
          <polygon points="100,20 140,40 60,40" fill="none" stroke="rgba(255,220,150,0.6)" stroke-width="1"/>
          <polygon points="100,180 140,160 60,160" fill="none" stroke="rgba(255,220,150,0.6)" stroke-width="1"/>
          <line x1="60" y1="40" x2="60" y2="160" stroke="rgba(255,220,150,0.6)" stroke-width="1"/>
          <line x1="140" y1="40" x2="140" y2="160" stroke="rgba(255,220,150,0.6)" stroke-width="1"/>
        </g>
        <circle cx="100" cy="100" r="12" fill="rgba(255,230,180,0.8)" class="loading-bulb"/>
      </svg>
    </div>
    <div class="loading-text">正在点亮纸灯...</div>
  </div>

  <div id="canvas-container"></div>
  <canvas id="gl-canvas"></canvas>

  <button id="lightshow-btn" class="lightshow-btn">
    <span class="btn-icon">✦</span>
    <span class="btn-text">灯光秀</span>
  </button>

  <div id="control-panel" class="control-panel">
    <div class="panel-header">
      <h3>光影控制</h3>
      <div class="panel-divider"></div>
    </div>

    <div class="control-section">
      <label class="control-label">
        <span>灯泡色温</span>
        <span id="kelvin-value" class="value-display">4500K</span>
      </label>
      <input type="range" id="color-temp-slider" min="2700" max="6500" value="4500" step="100" class="slider"/>
      <div class="slider-track">
        <span class="warm">暖黄</span>
        <span class="cold">冷白</span>
      </div>
    </div>

    <div class="control-section">
      <label class="control-label">
        <span>纸片颜色</span>
        <span id="selected-face" class="value-display">面 1</span>
      </label>
      <div class="face-selector">
        <button class="face-btn active" data-face="0">1</button>
        <button class="face-btn" data-face="1">2</button>
        <button class="face-btn" data-face="2">3</button>
        <button class="face-btn" data-face="3">4</button>
        <button class="face-btn" data-face="4">5</button>
        <button class="face-btn" data-face="5">6</button>
      </div>
      <div id="color-palette" class="color-palette"></div>
    </div>

    <div class="control-section">
      <button id="reset-btn" class="reset-btn">
        <span class="reset-icon">↺</span>
        <span>重置纸灯</span>
      </button>
    </div>

    <div class="tips-section">
      <p class="tip">💡 拖拽纸片边缘翻折</p>
      <p class="tip">🖱️ 右键拖拽旋转视角</p>
      <p class="tip">🔍 滚轮缩放画面</p>
      <p class="tip">👆 双击纸片聚焦查看</p>
    </div>
  </div>

  <div id="angle-display" class="angle-display hidden">
    <svg width="80" height="80" viewBox="0 0 80 80">
      <circle cx="40" cy="40" r="32" fill="none" stroke="rgba(100,180,255,0.3)" stroke-width="1" stroke-dasharray="4 4"/>
      <path id="angle-arc" d="" fill="none" stroke="rgba(100,180,255,0.9)" stroke-width="2"/>
    </svg>
    <span id="angle-value" class="angle-value">0°</span>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
