<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>记忆之树 - 3D知识图谱</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #050510 0%, #0a0a1a 100%);
      color: #ffffff;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #tooltip {
      position: fixed;
      pointer-events: none;
      z-index: 100;
      background: rgba(13, 27, 42, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 8px;
      padding: 10px 14px;
      border: 1px solid rgba(79, 195, 247, 0.3);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      max-width: 280px;
    }

    #tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }

    #tooltip .tooltip-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #4fc3f7;
    }

    #tooltip .tooltip-desc {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.8);
      line-height: 1.5;
    }

    #info-panel {
      position: fixed;
      z-index: 50;
      left: 0;
      top: 50%;
      transform: translate(-100%, -50%);
      width: 300px;
      max-height: 80vh;
      background: rgba(13, 27, 42, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      border: 1px solid rgba(79, 195, 247, 0.2);
      padding: 24px;
      overflow-y: auto;
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    #info-panel.visible {
      transform: translate(20px, -50%);
      opacity: 1;
    }

    #info-panel .panel-close {
      position: absolute;
      top: 12px;
      right: 16px;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.6);
      font-size: 20px;
      cursor: pointer;
      transition: color 0.3s ease;
    }

    #info-panel .panel-close:hover {
      color: #ffffff;
    }

    #info-panel .panel-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
      padding-right: 30px;
      color: #4fc3f7;
    }

    #info-panel .panel-theme {
      display: inline-block;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    #info-panel .panel-description {
      font-size: 14px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 20px;
    }

    #info-panel .panel-section-title {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    #info-panel .related-list {
      list-style: none;
      margin-bottom: 20px;
    }

    #info-panel .related-item {
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      margin-bottom: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.3s ease, transform 0.3s ease;
      border-left: 3px solid transparent;
    }

    #info-panel .related-item:hover {
      background: rgba(79, 195, 247, 0.15);
      transform: translateX(4px);
    }

    #info-panel .panel-source {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      line-height: 1.6;
      font-style: italic;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    #title-header {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      text-align: center;
      pointer-events: none;
    }

    #title-header h1 {
      font-size: 24px;
      font-weight: 300;
      letter-spacing: 8px;
      background: linear-gradient(90deg, #4fc3f7, #81c784, #ffd54f, #ce93d8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    #title-header p {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 2px;
    }

    @media (max-width: 768px) {
      #info-panel {
        width: 100%;
        left: 0;
        right: 0;
        top: auto;
        bottom: 0;
        transform: translateY(100%);
        max-height: 300px;
        border-radius: 16px 16px 0 0;
      }

      #info-panel.visible {
        transform: translateY(0);
      }

      #title-header h1 {
        font-size: 18px;
        letter-spacing: 4px;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="title-header">
    <h1>记忆之树</h1>
    <p>探索知识的星空</p>
  </div>

  <div id="tooltip">
    <div class="tooltip-title"></div>
    <div class="tooltip-desc"></div>
  </div>

  <div id="info-panel">
    <button class="panel-close">&times;</button>
    <div class="panel-title"></div>
    <span class="panel-theme"></span>
    <div class="panel-description"></div>
    <div class="panel-section-title">相关节点</div>
    <ul class="related-list"></ul>
    <div class="panel-section-title">引用来源</div>
    <div class="panel-source"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
