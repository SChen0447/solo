<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>交互式图标字体生成器</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div class="app">
    <header class="toolbar">
      <div class="toolbar-title">图标生成器</div>
      <div class="toolbar-templates">
        <button class="template-btn" data-template="circle" title="圆形">
          <svg width="20" height="20" viewBox="0 0 20 20"><circle cx="10" cy="10" r="7" fill="none" stroke="#E0E0E0" stroke-width="1.5"/></svg>
        </button>
        <button class="template-btn" data-template="square" title="方形">
          <svg width="20" height="20" viewBox="0 0 20 20"><rect x="3" y="3" width="14" height="14" fill="none" stroke="#E0E0E0" stroke-width="1.5"/></svg>
        </button>
        <button class="template-btn" data-template="trapezoid" title="梯形">
          <svg width="20" height="20" viewBox="0 0 20 20"><path d="M6 3 L14 3 L17 17 L3 17 Z" fill="none" stroke="#E0E0E0" stroke-width="1.5"/></svg>
        </button>
        <button class="template-btn" data-template="star" title="星形">
          <svg width="20" height="20" viewBox="0 0 20 20"><path d="M10 2 L12 7.5 L18 8 L13.5 12 L15 18 L10 14.5 L5 18 L6.5 12 L2 8 L8 7.5 Z" fill="none" stroke="#E0E0E0" stroke-width="1.2"/></svg>
        </button>
      </div>
    </header>

    <main class="main-content">
      <section class="editor-area">
        <canvas id="iconCanvas" width="400" height="400"></canvas>
      </section>

      <aside class="property-panel" id="propertyPanel">
        <div class="panel-handle" id="panelHandle"></div>
        <div class="panel-content">
          <h3 class="panel-title">属性设置</h3>

          <div class="control-group">
            <label class="group-label">形状参数</label>
            <div class="control-row">
              <span class="control-label">线条粗细</span>
              <div class="control-value">
                <input type="range" id="strokeWidth" min="1" max="8" step="0.5" value="3" />
                <span class="value-display" id="strokeWidthValue">3px</span>
              </div>
            </div>
            <div class="control-row">
              <span class="control-label">圆角大小</span>
              <div class="control-value">
                <input type="range" id="cornerRadius" min="0" max="24" step="1" value="8" />
                <span class="value-display" id="cornerRadiusValue">8px</span>
              </div>
            </div>
            <div class="control-row">
              <span class="control-label">填充透明度</span>
              <div class="control-value">
                <input type="range" id="fillOpacity" min="0" max="100" step="1" value="30" />
                <span class="value-display" id="fillOpacityValue">30%</span>
              </div>
            </div>
          </div>

          <div class="control-group">
            <label class="group-label">样式</label>
            <div class="control-row">
              <span class="control-label">描边颜色</span>
              <div class="control-value">
                <input type="color" id="strokeColor" value="#4FC3F7" />
              </div>
            </div>
            <div class="control-row">
              <span class="control-label">填充颜色</span>
              <div class="control-value">
                <input type="color" id="fillColor" value="#4FC3F7" />
              </div>
            </div>
          </div>

          <div class="control-group">
            <label class="group-label">操作</label>
            <button class="reset-btn" id="resetBtn">重置</button>
          </div>
        </div>
      </aside>
    </main>

    <footer class="export-bar">
      <span class="export-info">调整参数和锚点，实时预览图标</span>
      <div class="export-actions">
        <button class="export-btn" id="exportSvgBtn">导出SVG</button>
        <button class="export-btn" id="exportPngBtn">导出PNG</button>
      </div>
    </footer>

    <div class="toast" id="toast"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
