<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 地震波传播模拟</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #0b0b2b 0%, #1a1a3a 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    canvas {
      display: block;
      cursor: crosshair;
    }

    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #0b0b2b 0%, #1a1a3a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.5s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #ff3300;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loader-text {
      margin-top: 20px;
      color: #ffffff;
      font-size: 16px;
      letter-spacing: 2px;
    }

    #fps {
      position: fixed;
      top: 16px;
      left: 16px;
      background: rgba(0, 0, 0, 0.5);
      color: #ffffff;
      font-size: 14px;
      padding: 6px 12px;
      border-radius: 6px;
      font-family: 'Consolas', 'Monaco', monospace;
      z-index: 100;
      pointer-events: none;
    }

    #hint {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.5);
      color: #ffffff;
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 6px;
      z-index: 100;
      pointer-events: none;
    }

    .dg.ac {
      z-index: 100 !important;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading">
      <div class="loader"></div>
      <div class="loader-text">正在加载场景...</div>
    </div>
    <div id="fps">FPS: --</div>
    <div id="hint">点击地形表面设置震源 | 鼠标拖动旋转视角 | 滚轮缩放</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
