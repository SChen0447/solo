<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>噪感城市 - 3D噪声地图可视化</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      #canvas-container { width: 100vw; height: 100vh; display: block; }

      #control-panel {
        position: absolute;
        top: 24px;
        left: 24px;
        background: rgba(20, 20, 30, 0.75);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 16px;
        padding: 20px 24px;
        color: #fff;
        min-width: 320px;
        z-index: 10;
      }

      #control-panel h2 {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 16px;
        letter-spacing: 1px;
        color: #e0e0ff;
      }

      .slider-container { margin-bottom: 16px; }
      .slider-label {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        margin-bottom: 8px;
        color: #aaaacc;
      }
      .slider-label .time-value {
        color: #66ccff;
        font-weight: 600;
        font-size: 14px;
      }

      input[type="range"] {
        -webkit-appearance: none;
        width: 100%;
        height: 6px;
        border-radius: 3px;
        background: linear-gradient(to right, #3366ff, #ff3333);
        outline: none;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #ffffff;
        border: 2px solid #66ccff;
        cursor: pointer;
        box-shadow: 0 0 12px rgba(102, 204, 255, 0.8);
        transition: box-shadow 0.2s;
      }
      input[type="range"]::-webkit-slider-thumb:hover {
        box-shadow: 0 0 20px rgba(102, 204, 255, 1);
      }
      input[type="range"]::-moz-range-thumb {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #ffffff;
        border: 2px solid #66ccff;
        cursor: pointer;
        box-shadow: 0 0 12px rgba(102, 204, 255, 0.8);
      }

      #reset-btn {
        width: 100%;
        padding: 10px 16px;
        background: linear-gradient(135deg, rgba(102, 204, 255, 0.2), rgba(102, 102, 255, 0.2));
        border: 1px solid rgba(102, 204, 255, 0.4);
        color: #aaddff;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.5px;
        transition: all 0.2s;
      }
      #reset-btn:hover {
        background: linear-gradient(135deg, rgba(102, 204, 255, 0.35), rgba(102, 102, 255, 0.35));
        border-color: rgba(102, 204, 255, 0.7);
        color: #ffffff;
      }

      #info-panel {
        position: absolute;
        display: none;
        background: rgba(15, 15, 25, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        padding: 14px 18px;
        color: #fff;
        font-size: 13px;
        pointer-events: none;
        z-index: 20;
        min-width: 180px;
      }
      #info-panel .label { color: #8899aa; font-size: 11px; margin-bottom: 4px; }
      #info-panel .value { color: #ffffff; font-size: 16px; font-weight: 600; margin-bottom: 10px; }
      #info-panel .value.db { color: #ffaa66; }
      #info-panel .value.district { color: #66ccff; }

      .legend {
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid rgba(255,255,255,0.1);
      }
      .legend-title { font-size: 11px; color: #8899aa; margin-bottom: 8px; }
      .legend-bar {
        height: 8px;
        border-radius: 4px;
        background: linear-gradient(to right, #66cc66, #cccc33, #ff9933, #cc3333);
        margin-bottom: 4px;
      }
      .legend-labels {
        display: flex;
        justify-content: space-between;
        font-size: 10px;
        color: #8899aa;
      }

      #compass {
        position: absolute;
        bottom: 24px;
        right: 24px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: rgba(20, 20, 30, 0.7);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
      }
      #compass::before {
        content: 'N';
        position: absolute;
        top: 4px;
        color: #ff6666;
        font-size: 12px;
        font-weight: 700;
      }
      #compass-arrow {
        width: 0;
        height: 0;
        border-left: 8px solid transparent;
        border-right: 8px solid transparent;
        border-bottom: 24px solid #ff6666;
        margin-top: -4px;
        filter: drop-shadow(0 0 4px rgba(255,102,102,0.6));
      }
    </style>
  </head>
  <body>
    <div id="canvas-container"></div>

    <div id="control-panel">
      <h2>噪感城市 · 控制面板</h2>
      <div class="slider-container">
        <div class="slider-label">
          <span>时间</span>
          <span class="time-value" id="time-display">12:00</span>
        </div>
        <input type="range" id="time-slider" min="0" max="24" step="0.25" value="12" />
      </div>
      <button id="reset-btn">↻ 复位视角</button>
      <div class="legend">
        <div class="legend-title">噪声等级</div>
        <div class="legend-bar"></div>
        <div class="legend-labels">
          <span>安静 40dB</span>
          <span>嘈杂 100dB</span>
        </div>
      </div>
    </div>

    <div id="info-panel">
      <div class="label">街区编号</div>
      <div class="value district" id="info-district">--</div>
      <div class="label">噪声分贝</div>
      <div class="value db" id="info-db">-- dB</div>
    </div>

    <div id="compass">
      <div id="compass-arrow"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
