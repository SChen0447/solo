<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>桌游版图沙盘</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      background-color: #1e1e2e;
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
      color: #ffffff;
    }
    #app {
      width: 100%;
      height: 100%;
    }
    .app-title {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 3px;
      color: #ffffff;
      text-shadow:
        0 0 6px #6cb8ff,
        0 0 12px rgba(108, 184, 255, 0.6),
        0 0 20px rgba(108, 184, 255, 0.3);
      z-index: 100;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="app-title">桌游版图沙盘</div>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
