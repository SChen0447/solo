<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D地质分层钻探模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #1a1a2e;
      font-family: 'Courier New', 'Consolas', monospace;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-hammer {
      width: 120px;
      height: 120px;
      position: relative;
      animation: hammerRotate 2s ease-in-out infinite;
    }

    @keyframes hammerRotate {
      0% { transform: rotate(-30deg); }
      50% { transform: rotate(30deg); }
      100% { transform: rotate(-30deg); }
    }

    .loader-hammer svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 10px rgba(255, 200, 100, 0.6));
    }

    .loader-text {
      margin-top: 30px;
      color: #e0e0e0;
      font-size: 18px;
      letter-spacing: 3px;
      animation: pulseText 1.5s ease-in-out infinite;
    }

    @keyframes pulseText {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .loader-dots {
      display: inline-flex;
      gap: 5px;
    }

    .loader-dots span {
      animation: dotPulse 1.2s ease-in-out infinite;
    }

    .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loader-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotPulse {
      0%, 100% { opacity: 0.3; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(-3px); }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading-screen">
      <div class="loader-hammer">
        <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="headGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#d4a574;stop-opacity:1" />
              <stop offset="50%" style="stop-color:#c9956c;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#8b6914;stop-opacity:1" />
            </linearGradient>
            <linearGradient id="handleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" style="stop-color:#6b4423;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#3d2817;stop-opacity:1" />
            </linearGradient>
          </defs>
          <rect x="52" y="55" width="16" height="55" rx="3" fill="url(#handleGrad)" />
          <path d="M15 25 L105 25 L100 55 L20 55 Z" fill="url(#headGrad)" stroke="#5a4510" stroke-width="2" />
          <path d="M15 25 L20 55 L30 50 L25 30 Z" fill="#b8860b" />
          <path d="M105 25 L100 55 L90 50 L95 30 Z" fill="#b8860b" />
          <circle cx="35" cy="40" r="2" fill="#8b6914" />
          <circle cx="50" cy="38" r="1.5" fill="#8b6914" />
          <circle cx="65" cy="42" r="2" fill="#8b6914" />
          <circle cx="80" cy="40" r="1.5" fill="#8b6914" />
        </svg>
      </div>
      <div class="loader-text">
        加载地质数据中<span class="loader-dots"><span>.</span><span>.</span><span>.</span></span>
      </div>
    </div>
    <div id="canvas-container"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
