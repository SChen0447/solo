<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>无弦·光韵塔</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #app {
      width: 100vw;
      height: 100vh;
      display: block;
    }
    #status-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 40px;
      background: rgba(10, 10, 26, 0.7);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
      color: #ffffff;
      font-size: 16px;
      backdrop-filter: blur(4px);
      user-select: none;
    }
    #status-bar .left {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    #fps-counter {
      font-weight: 600;
    }
    #hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
      z-index: 100;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="status-bar">
    <div class="left">
      <span id="fragment-count">碎片：0/54</span>
    </div>
    <span id="fps-counter" style="color: #2ecc71;">FPS: 60</span>
  </div>
  <canvas id="app"></canvas>
  <div id="hint">拖拽旋转视角 · 滚轮缩放 · 点击玻璃板演奏音符</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
