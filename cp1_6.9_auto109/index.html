<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>螺旋星系查看器 - Spiral Galaxy Viewer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #control-panel {
      position: absolute;
      bottom: 24px;
      left: 24px;
      background: rgba(10, 10, 30, 0.8);
      border-radius: 12px;
      padding: 16px;
      color: #ffffff;
      min-width: 240px;
      backdrop-filter: blur(8px);
      z-index: 10;
      user-select: none;
    }

    #control-panel h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 14px;
      color: #aaccff;
      letter-spacing: 0.5px;
    }

    .control-group {
      margin-bottom: 14px;
    }

    .control-group:last-child {
      margin-bottom: 0;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: 12px;
      color: #cccccc;
    }

    .control-value {
      font-weight: 600;
      color: #66aaff;
      font-variant-numeric: tabular-nums;
      transition: opacity 0.1s ease;
    }

    .control-value.flash {
      animation: valueFlash 0.2s ease;
    }

    @keyframes valueFlash {
      0% { opacity: 1; }
      50% { opacity: 0.7; }
      100% { opacity: 1; }
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: #333333;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: #66aaff;
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: #ffffff;
      transform: scale(1.15);
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #66aaff;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    input[type="range"]::-moz-range-thumb:hover {
      background: #ffffff;
      transform: scale(1.15);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="control-panel"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
