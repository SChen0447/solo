<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>墨水扩散模拟器</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="canvas-container"></div>
  <div id="control-panel" class="glass-panel">
    <h2>控制面板</h2>
    <div class="control-group">
      <label>
        扩散速度
        <span id="diffusion-value" class="value">1.5</span>
      </label>
      <input type="range" id="diffusion-speed" min="0.5" max="2.5" step="0.1" value="1.5" />
    </div>
    <div class="control-group">
      <label>
        颜料密度
        <span id="density-value" class="value">0.5</span>
      </label>
      <input type="range" id="pigment-density" min="0.1" max="1.0" step="0.05" value="0.5" />
    </div>
    <div class="control-group">
      <label>
        液体粘度
        <span id="viscosity-value" class="value">0.5</span>
      </label>
      <input type="range" id="liquid-viscosity" min="0.1" max="1.0" step="0.05" value="0.5" />
    </div>
    <button id="clear-btn" class="clear-btn">清空容器</button>
  </div>
  <script type="module" src="/src/sketch.ts"></script>
</body>
</html>
