<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>数字沙画展台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #2C1810 0%, #1A0F0A 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 0 0;
    }

    #canvas-wrapper {
      position: relative;
      width: 90vw;
      height: 75vh;
      max-width: 100%;
      border: 10px solid #4A2A1A;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      background: radial-gradient(ellipse at center, #3A2418 0%, #1A0F0A 100%);
      overflow: hidden;
    }

    #sand-canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    #performance-indicator {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 6px 8px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 6px;
      font-size: 14px;
      color: #E0D0B0;
      pointer-events: none;
      font-variant-numeric: tabular-nums;
      z-index: 10;
    }

    #particle-count {
      white-space: nowrap;
    }

    #fps-display {
      white-space: nowrap;
    }

    #warning-message {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      color: #FFB08A;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
      z-index: 5;
      white-space: nowrap;
    }

    #toast-message {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      color: #E8C39E;
      background: rgba(0, 0, 0, 0.6);
      padding: 8px 16px;
      border-radius: 6px;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
      z-index: 10;
      white-space: nowrap;
    }

    #toolbar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: rgba(26, 14, 10, 0.8);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 20;
    }

    .tool-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: transform 0.2s ease;
    }

    .tool-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .tool-btn:hover .tool-icon,
    .tool-btn:active .tool-icon {
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.3);
    }

    .tool-btn:active {
      transform: scale(0.95);
    }

    .tool-btn svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: #E0D0B0;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .tool-label {
      font-size: 10px;
      color: #C0B090;
      margin-top: 2px;
    }

    @media (max-width: 768px) {
      #app {
        padding: 0;
      }

      #canvas-wrapper {
        width: 100vw;
        height: calc(100vh - 48px);
        border-width: 6px;
      }

      #toolbar {
        height: 48px;
        gap: 15px;
        overflow-x: auto;
        justify-content: flex-start;
        padding: 0 10px;
        -webkit-overflow-scrolling: touch;
      }

      .tool-icon {
        width: 32px;
        height: 32px;
      }

      .tool-btn:hover .tool-icon,
      .tool-btn:active .tool-icon {
        width: 35px;
        height: 35px;
      }

      .tool-btn svg {
        width: 16px;
        height: 16px;
      }

      .tool-label {
        font-size: 8px;
      }

      #performance-indicator {
        font-size: 11px;
        padding: 4px 6px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-wrapper">
      <canvas id="sand-canvas"></canvas>
      <div id="performance-indicator">
        <div id="particle-count">沙粒: 0</div>
        <div id="fps-display">FPS: <span id="fps-value">60</span></div>
      </div>
      <div id="warning-message"></div>
      <div id="toast-message"></div>
    </div>
    <div id="toolbar">
      <button class="tool-btn" id="clear-btn" title="清空">
        <div class="tool-icon">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path></svg>
        </div>
        <span class="tool-label">清空</span>
      </button>
      <button class="tool-btn" id="undo-btn" title="撤销">
        <div class="tool-icon">
          <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
        </div>
        <span class="tool-label">撤销</span>
      </button>
      <button class="tool-btn" id="save-btn" title="保存">
        <div class="tool-icon">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        </div>
        <span class="tool-label">保存</span>
      </button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
