<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>3D City Skyline Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(180deg, #0a0a2a 0%, #1a1a3a 100%);
      color: #ffffff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #fps-counter {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 8px 16px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      font-weight: bold;
      color: #00ff88;
      z-index: 100;
      transition: all 0.3s ease;
    }

    #fps-counter.low {
      color: #ff4444;
      animation: blink 0.5s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #control-panel {
      position: absolute;
      bottom: 20px;
      left: 20px;
      max-width: 320px;
      padding: 16px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border-radius: 8px;
      z-index: 100;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    #control-panel:hover {
      background: rgba(0, 0, 0, 0.8);
    }

    #control-panel .panel-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #ffffff;
      text-shadow: 0 0 8px rgba(100, 150, 255, 0.6);
      letter-spacing: 0.5px;
    }

    #io-buttons {
      position: absolute;
      bottom: 20px;
      right: 20px;
      display: flex;
      gap: 12px;
      z-index: 100;
    }

    .io-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #1a1a3a;
      font-weight: bold;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
    }

    .io-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    .io-btn:active {
      transform: scale(0.98);
    }

    #building-info {
      position: absolute;
      top: 60px;
      right: 20px;
      width: 260px;
      padding: 16px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border-radius: 8px;
      z-index: 100;
      display: none;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    #building-info.visible {
      display: block;
    }

    #building-info .info-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #ffffff;
      text-shadow: 0 0 8px rgba(100, 200, 255, 0.6);
    }

    #building-info .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 12px;
      color: #cccccc;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    #building-info .info-row:last-child {
      border-bottom: none;
    }

    #building-info .info-label {
      color: #999999;
    }

    #building-info .info-value {
      color: #ffffff;
      font-family: 'Courier New', monospace;
    }

    #building-info .info-input {
      width: 100px;
      padding: 4px 8px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      color: #ffffff;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      outline: none;
    }

    #building-info .info-input:focus {
      border-color: rgba(100, 150, 255, 0.6);
    }

    #building-info input[type="color"] {
      width: 40px;
      height: 24px;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      cursor: pointer;
      background: transparent;
    }

    #file-input {
      display: none;
    }

    #drawer-toggle {
      display: none;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border-top-left-radius: 12px;
      border-top-right-radius: 12px;
      z-index: 101;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    #drawer-toggle .drawer-handle {
      width: 40px;
      height: 4px;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 2px;
    }

    @media (max-width: 768px) {
      #control-panel {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        max-width: 100%;
        width: 100%;
        border-bottom-left-radius: 0;
        border-bottom-right-radius: 0;
        transform: translateY(100%);
        transition: transform 0.3s ease;
        max-height: 70vh;
        overflow-y: auto;
      }

      #control-panel.open {
        transform: translateY(0);
      }

      #drawer-toggle {
        display: flex;
      }

      #drawer-toggle.hidden {
        display: none;
      }

      #io-buttons {
        bottom: 60px;
        right: 12px;
        gap: 8px;
      }

      .io-btn {
        width: 44px;
        height: 44px;
        font-size: 16px;
      }

      #building-info {
        top: auto;
        bottom: 80px;
        right: 12px;
        left: 12px;
        width: auto;
      }

      #fps-counter {
        top: 12px;
        right: 12px;
        font-size: 12px;
        padding: 6px 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="fps-counter">FPS: 60</div>
    
    <div id="drawer-toggle">
      <div class="drawer-handle"></div>
    </div>
    
    <div id="control-panel">
      <div class="panel-title">🏙️ 城市参数控制</div>
      <div id="tweakpane-container"></div>
    </div>

    <div id="building-info">
      <div class="info-title">🏢 建筑信息</div>
      <div class="info-row">
        <span class="info-label">位置 X:</span>
        <span class="info-value" id="info-pos-x">0</span>
      </div>
      <div class="info-row">
        <span class="info-label">位置 Z:</span>
        <span class="info-value" id="info-pos-z">0</span>
      </div>
      <div class="info-row">
        <span class="info-label">高度:</span>
        <input type="number" class="info-input" id="info-height" min="20" max="200" step="1" />
      </div>
      <div class="info-row">
        <span class="info-label">底部颜色:</span>
        <input type="color" id="info-color-bottom" />
      </div>
      <div class="info-row">
        <span class="info-label">顶部颜色:</span>
        <input type="color" id="info-color-top" />
      </div>
    </div>

    <div id="io-buttons">
      <button class="io-btn" id="export-btn" title="导出配置">⬇</button>
      <button class="io-btn" id="import-btn" title="导入配置">⬆</button>
    </div>
    <input type="file" id="file-input" accept=".json" />
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
