<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>眼球追踪阅读控制器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    }

    body {
      background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f0c29);
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #camera-preview {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 160px;
      height: 120px;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid rgba(100, 108, 255, 0.6);
      box-shadow: 0 0 8px rgba(100, 108, 255, 0.5);
      z-index: 100;
      opacity: 0.8;
    }

    #camera-preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #action-bubble {
      position: fixed;
      top: 80px;
      right: 30px;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transform: translateY(-10px);
      pointer-events: none;
      z-index: 200;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 8px rgba(100, 108, 255, 0.4);
      text-shadow: 0 0 2px rgba(255, 255, 255, 0.5);
    }

    #action-bubble.visible {
      animation: bubbleFadeIn 0.5s ease forwards;
    }

    #action-bubble.hiding {
      animation: bubbleFadeOut 0.5s ease forwards;
    }

    @keyframes bubbleFadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes bubbleFadeOut {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-10px); }
    }

    #control-panel {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 24px;
      background: rgba(15, 12, 41, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 16px;
      border: 1px solid rgba(100, 108, 255, 0.3);
      box-shadow: 0 0 12px rgba(100, 108, 255, 0.3);
      z-index: 150;
      transition: transform 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    #control-panel:hover {
      transform: translateX(-50%) scale(1.02);
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-btn {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      box-shadow: 0 0 4px rgba(100, 108, 255, 0.3);
    }

    .control-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: scale(1.05);
    }

    #toggle-btn.playing {
      background: rgba(39, 174, 96, 0.4);
      color: #2ecc71;
      box-shadow: 0 0 6px rgba(46, 204, 113, 0.5);
    }

    #toggle-btn.paused {
      background: rgba(230, 126, 34, 0.4);
      color: #f39c12;
      box-shadow: 0 0 6px rgba(243, 156, 18, 0.5);
    }

    #speed-display {
      min-width: 60px;
      text-align: center;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      text-shadow: 0 0 2px rgba(100, 108, 255, 0.6);
    }

    #reset-btn {
      background: rgba(100, 108, 255, 0.3);
      color: #a29bfe;
    }

    #reset-btn:hover {
      background: rgba(100, 108, 255, 0.5);
    }

    #card-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      perspective: 1000px;
    }

    #card {
      width: 600px;
      min-height: 500px;
      padding: 40px 48px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-radius: 16px;
      color: #e0e0e0;
      line-height: 1.8;
      font-size: 14px;
      position: relative;
      box-shadow: 0 0 16px rgba(100, 108, 255, 0.3);
      transition: transform 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
      border: 1px solid rgba(100, 108, 255, 0.2);
    }

    #card:hover {
      transform: scale(1.02);
    }

    #card.slide-left {
      animation: slideLeft 300ms cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    #card.slide-right {
      animation: slideRight 300ms cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    #card.flip-reset {
      animation: flipReset 500ms ease;
    }

    @keyframes slideLeft {
      0% { transform: translateX(0); opacity: 1; }
      50% { transform: translateX(-30px); opacity: 0.5; }
      100% { transform: translateX(0); opacity: 1; }
    }

    @keyframes slideRight {
      0% { transform: translateX(0); opacity: 1; }
      50% { transform: translateX(30px); opacity: 0.5; }
      100% { transform: translateX(0); opacity: 1; }
    }

    @keyframes flipReset {
      0% { transform: rotateY(0deg); }
      50% { transform: rotateY(90deg); }
      100% { transform: rotateY(0deg); }
    }

    #page-content {
      height: 400px;
      overflow-y: auto;
      scroll-behavior: smooth;
      text-shadow: 0 0 1px rgba(224, 224, 224, 0.3);
    }

    #page-content::-webkit-scrollbar {
      width: 6px;
    }

    #page-content::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
    }

    #page-content::-webkit-scrollbar-thumb {
      background: rgba(100, 108, 255, 0.4);
      border-radius: 3px;
    }

    #page-content p {
      margin-bottom: 16px;
    }

    #page-index {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 12px;
      text-shadow: 0 0 0.5px rgba(0, 0, 0, 0.8);
    }

    #page-label {
      position: absolute;
      bottom: 16px;
      left: 24px;
      color: rgba(224, 224, 224, 0.7);
      font-size: 12px;
      cursor: grab;
      user-select: none;
      padding: 4px 10px;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    #page-label:hover {
      background: rgba(100, 108, 255, 0.2);
      color: #fff;
    }

    #page-label.dragging {
      cursor: grabbing;
      background: rgba(100, 108, 255, 0.4);
    }

    #modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 300;
    }

    #modal-overlay.active {
      display: flex;
    }

    #modal {
      background: #fff;
      border-radius: 12px;
      padding: 32px;
      min-width: 320px;
      box-shadow: 0 0 24px rgba(100, 108, 255, 0.4);
    }

    #modal h3 {
      color: #1a1a2e;
      margin-bottom: 20px;
      font-size: 18px;
    }

    #modal-input {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      outline: none;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    #modal-input:focus {
      border-color: #646cff;
      box-shadow: 0 0 8px rgba(100, 108, 255, 0.4);
    }

    #modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .modal-btn {
      padding: 8px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    #modal-cancel {
      background: #e0e0e0;
      color: #333;
    }

    #modal-cancel:hover {
      background: #d0d0d0;
    }

    #modal-confirm {
      background: #646cff;
      color: #fff;
    }

    #modal-confirm:hover {
      background: #534bf3;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="control-panel">
      <div class="control-group">
        <button id="toggle-btn" class="control-btn playing" title="暂停/恢复">
          ⏸
        </button>
      </div>
      <div class="control-group">
        <button id="speed-down" class="control-btn" title="减慢速度">−</button>
        <span id="speed-display">1.0秒/页</span>
        <button id="speed-up" class="control-btn" title="加快速度">+</button>
      </div>
      <div class="control-group">
        <button id="reset-btn" class="control-btn" title="重置到第一页">⟲</button>
      </div>
    </div>

    <div id="card-container">
      <div id="card">
        <div id="page-content"></div>
        <div id="page-label" draggable="true">第1/20页</div>
        <div id="page-index">— 1 —</div>
      </div>
    </div>

    <div id="action-bubble"></div>

    <div id="camera-preview">
      <video id="video" autoplay playsinline muted></video>
    </div>

    <div id="modal-overlay">
      <div id="modal">
        <h3>跳转到指定页</h3>
        <input type="number" id="modal-input" min="1" max="20" placeholder="请输入页码 (1-20)" />
        <div id="modal-buttons">
          <button id="modal-cancel" class="modal-btn">取消</button>
          <button id="modal-confirm" class="modal-btn">确认</button>
        </div>
      </div>
    </div>
  </div>

  <script crossorigin src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1635989137/camera_utils.js"></script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
