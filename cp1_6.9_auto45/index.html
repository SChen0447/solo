<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>虚拟熔岩灯设计师</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #1a1a2e 0%, #0a0a0a 100%);
      color: #ffffff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 70%;
      height: 100%;
    }

    #canvas-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    #info-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(42, 42, 62, 0.5);
      backdrop-filter: blur(10px);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      line-height: 1.8;
      color: #e0e0e0;
      min-width: 180px;
      z-index: 10;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    #info-panel .title {
      font-weight: 600;
      color: #ffaa00;
      margin-bottom: 6px;
      font-size: 14px;
    }

    #info-panel .value {
      font-family: 'Courier New', monospace;
      color: #cccccc;
    }

    #info-panel .hint {
      margin-top: 8px;
      font-size: 11px;
      color: #888;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 8px;
    }

    #control-panel {
      position: absolute;
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      width: 280px;
      background: linear-gradient(180deg, #2a2a3e 0%, #1a1a2e 100%);
      border-radius: 12px;
      padding: 24px 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      z-index: 10;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    #control-panel .panel-title {
      font-size: 16px;
      font-weight: 600;
      color: #ffaa00;
      text-align: center;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    .control-group {
      margin-bottom: 22px;
    }

    .control-group:last-child {
      margin-bottom: 0;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .control-label span:first-child {
      font-size: 14px;
      font-weight: 300;
      color: #ffffff;
      letter-spacing: 0.5px;
    }

    .control-label .value {
      font-family: 'Courier New', 'Consolas', monospace;
      font-size: 12px;
      color: #cccccc;
      background: rgba(0, 0, 0, 0.3);
      padding: 2px 8px;
      border-radius: 4px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: linear-gradient(90deg, #444 0%, #888 100%);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ffaa00;
      cursor: pointer;
      box-shadow: 0 0 0 rgba(255, 170, 0, 0);
      transition: box-shadow 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 12px rgba(255, 170, 0, 0.8);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ffaa00;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 0 rgba(255, 170, 0, 0);
      transition: box-shadow 0.2s ease;
    }

    input[type="range"]::-moz-range-thumb:hover {
      box-shadow: 0 0 12px rgba(255, 170, 0, 0.8);
    }

    #stats {
      position: absolute !important;
      top: 20px !important;
      right: 320px !important;
      z-index: 20;
    }

    @media (max-width: 768px) {
      #canvas-container {
        width: 100%;
        height: calc(100% - 170px);
        top: 0;
      }

      #control-panel {
        top: auto;
        bottom: 0;
        right: 0;
        left: 0;
        transform: none;
        width: 100%;
        height: 150px;
        border-radius: 12px 12px 0 0;
        padding: 14px 16px;
        display: flex;
        flex-direction: column;
      }

      #control-panel .panel-title {
        margin-bottom: 10px;
      }

      #control-panel .controls-wrapper {
        display: flex;
        gap: 16px;
        flex: 1;
      }

      .control-group {
        flex: 1;
        margin-bottom: 0;
      }

      #stats {
        right: 20px !important;
        top: 20px !important;
      }

      #info-panel {
        top: 60px;
        left: 10px;
        right: 80px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div id="info-panel">
      <div class="title">熔岩灯信息</div>
      <div>流体团块: <span class="value" id="blob-count">0</span></div>
      <div>气泡数量: <span class="value" id="bubble-count">0</span></div>
      <div id="selected-info" style="display:none; margin-top:6px; padding-top:6px; border-top:1px solid rgba(255,255,255,0.1);">
        选中团块色彩:<br/>
        <span class="value" id="selected-color">-</span>
      </div>
      <div class="hint">提示：拖拽旋转视角，滚轮缩放，点击团块查看色彩</div>
    </div>

    <div id="control-panel">
      <div class="panel-title">熔岩灯控制台</div>
      <div class="controls-wrapper">
        <div class="control-group">
          <div class="control-label">
            <span>🌡️ 温度</span>
            <span class="value" id="temp-value">50</span>
          </div>
          <input type="range" id="temperature" min="20" max="80" value="50" step="1" />
        </div>

        <div class="control-group">
          <div class="control-label">
            <span>💧 黏度</span>
            <span class="value" id="visc-value">5</span>
          </div>
          <input type="range" id="viscosity" min="1" max="10" value="5" step="1" />
        </div>

        <div class="control-group">
          <div class="control-label">
            <span>💡 光照角度</span>
            <span class="value" id="light-value">45</span>
          </div>
          <input type="range" id="light-angle" min="0" max="360" value="45" step="1" />
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
