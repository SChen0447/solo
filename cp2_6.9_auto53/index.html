<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>三维分形星球云图探索</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background-color: #0B0B1A;
      font-family: sans-serif;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    canvas {
      display: block;
    }

    #control-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 280px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      color: white;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 100;
      transition: transform 0.3s ease, width 0.3s ease, padding 0.3s ease;
    }

    #control-panel.collapsed {
      width: 40px;
      padding: 10px 5px;
      overflow: hidden;
    }

    #control-panel.collapsed .panel-content {
      display: none;
    }

    #toggle-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 24px;
      height: 24px;
      background: transparent;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: background 0.2s ease;
    }

    #toggle-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .panel-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #fff;
      padding-right: 30px;
    }

    .control-group {
      margin-bottom: 16px;
    }

    .control-label {
      font-size: 14px;
      font-family: sans-serif;
      margin-bottom: 8px;
      display: block;
      color: #fff;
    }

    .control-value {
      font-size: 12px;
      color: #94a3b8;
      float: right;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.1);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right, #3B82F6 var(--value, 50%), rgba(255, 255, 255, 0.1) var(--value, 50%));
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: white;
      cursor: pointer;
      margin-top: -5px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    input[type="range"]::-moz-range-track {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.1);
    }

    input[type="range"]::-moz-range-progress {
      height: 6px;
      border-radius: 3px;
      background: #3B82F6;
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: white;
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    select {
      width: 100%;
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 14px;
      font-family: sans-serif;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s ease;
    }

    select:hover {
      border-color: #3B82F6;
    }

    select option {
      background: #1e293b;
      color: white;
    }

    .btn {
      width: 100%;
      padding: 10px 16px;
      border-radius: 8px;
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 14px;
      font-family: sans-serif;
      cursor: pointer;
      transition: background 0.2s ease, box-shadow 0.1s ease;
      margin-bottom: 10px;
    }

    .btn:hover {
      background: #1E293B;
    }

    .btn:active {
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.4);
    }

    .btn-primary {
      background: linear-gradient(135deg, #3B82F6, #8B5CF6);
      border: none;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #2563EB, #7C3AED);
    }

    .btn-primary:active {
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    #fps-counter {
      position: absolute;
      top: 20px;
      right: 20px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
      font-family: monospace;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="control-panel">
      <button id="toggle-btn" title="折叠/展开">◀</button>
      <div class="panel-content">
        <h2 class="panel-title">分形星球控制</h2>
        
        <div class="control-group">
          <label class="control-label" for="iterations">
            迭代次数
            <span class="control-value" id="iterations-value">5</span>
          </label>
          <input type="range" id="iterations" min="3" max="10" step="1" value="5" />
        </div>

        <div class="control-group">
          <label class="control-label" for="scale">
            缩放因子
            <span class="control-value" id="scale-value">1.0</span>
          </label>
          <input type="range" id="scale" min="0.5" max="2.0" step="0.1" value="1.0" />
        </div>

        <div class="control-group">
          <label class="control-label" for="colorMap">颜色映射</label>
          <select id="colorMap">
            <option value="galaxy">星系紫-蓝渐变</option>
            <option value="lava">熔岩红-橙渐变</option>
            <option value="emerald">翡翠绿-青渐变</option>
          </select>
        </div>

        <button class="btn btn-primary" id="regenerate-btn">重新生成</button>
        <button class="btn" id="export-btn">导出PNG截图 (1920x1080)</button>
      </div>
    </div>

    <div id="fps-counter">FPS: --</div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
