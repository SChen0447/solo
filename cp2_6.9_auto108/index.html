<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>粒子音乐墙 | Particle Music Wall</title>
  <script type="module" src="/src/main.ts"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: #0D0D0D;
      color: #ffffff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      background:
        radial-gradient(ellipse at 20% 0%, rgba(138, 43, 226, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(0, 206, 209, 0.08) 0%, transparent 50%),
        #0D0D0D;
    }

    .control-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      background: rgba(30, 30, 30, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
      z-index: 100;
    }

    .perf-badge {
      display: none;
      font-size: 12px;
      color: #ff4444;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 4px 10px;
      border: 1px solid rgba(255, 68, 68, 0.5);
      border-radius: 4px;
      animation: blink-red 1s ease-in-out infinite;
      text-transform: uppercase;
      margin-right: auto;
    }

    @keyframes blink-red {
      0%, 100% { opacity: 1; text-shadow: 0 0 8px rgba(255, 68, 68, 0.8); }
      50% { opacity: 0.4; text-shadow: none; }
    }

    .ctrl-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 38px;
      padding: 0 18px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(180deg, #444444 0%, #333333 100%);
      color: #ffffff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: filter 0.15s ease, transform 0.1s ease, box-shadow 0.15s ease;
      white-space: nowrap;
      font-family: inherit;
      letter-spacing: 0.3px;
    }

    .ctrl-btn:hover {
      filter: brightness(1.2);
      box-shadow: 0 0 12px rgba(138, 43, 226, 0.3);
    }

    .ctrl-btn:active {
      transform: scale(0.95);
    }

    .ctrl-btn.active {
      background: linear-gradient(180deg, #8A2BE2 0%, #6A1BB2 100%);
      box-shadow: 0 0 16px rgba(138, 43, 226, 0.5);
    }

    .ctrl-btn .icon {
      font-size: 16px;
      line-height: 1;
    }

    .volume-control {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }

    .volume-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      min-width: 28px;
      text-align: right;
      letter-spacing: 0.5px;
    }

    .slider-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 120px;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(90deg,
        rgba(255, 255, 255, 0.9) 0%,
        rgba(255, 255, 255, 0.6) 50%,
        rgba(255, 255, 255, 0.3) 100%);
      box-shadow: 0 0 8px rgba(0, 206, 209, 0.3);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffffff 0%, #cccccc 100%);
      cursor: pointer;
      box-shadow:
        0 0 8px rgba(0, 206, 209, 0.8),
        0 0 16px rgba(138, 43, 226, 0.4);
      transition: box-shadow 0.15s ease, transform 0.1s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow:
        0 0 12px rgba(0, 206, 209, 1),
        0 0 24px rgba(138, 43, 226, 0.6);
    }

    input[type="range"]::-webkit-slider-thumb:active {
      transform: scale(1.15);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffffff 0%, #cccccc 100%);
      cursor: pointer;
      border: none;
      box-shadow:
        0 0 8px rgba(0, 206, 209, 0.8),
        0 0 16px rgba(138, 43, 226, 0.4);
    }

    .canvas-wrapper {
      position: relative;
      width: 1000px;
      height: 700px;
      margin-top: 20px;
      padding: 8px;
      border-radius: 4px;
      background: linear-gradient(135deg, #2A2A2A 0%, #555555 50%, #2A2A2A 100%);
      box-shadow:
        0 0 40px rgba(0, 206, 209, 0.08),
        0 0 80px rgba(138, 43, 226, 0.06),
        0 20px 60px rgba(0, 0, 0, 0.8);
    }

    #particle-canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #000000;
      cursor: crosshair;
      border-radius: 2px;
    }

    .hint-text {
      position: absolute;
      bottom: -36px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 1px;
      white-space: nowrap;
    }

    @media (max-width: 800px) {
      .control-bar {
        padding: 0 12px;
        gap: 8px;
      }

      .ctrl-btn {
        padding: 0 12px;
        min-width: 44px;
      }

      .ctrl-btn .btn-text {
        display: none;
      }

      .ctrl-btn .icon {
        font-size: 18px;
      }

      input[type="range"] {
        width: 80px;
      }

      .volume-label {
        display: none;
      }

      .perf-badge {
        font-size: 10px;
        padding: 3px 6px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="control-bar">
      <span id="perf-badge" class="perf-badge">性能模式</span>
      <button id="btn-reset" class="ctrl-btn" title="重置粒子位置">
        <span class="icon">⟲</span>
        <span class="btn-text">重置粒子位置</span>
      </button>
      <button id="btn-random" class="ctrl-btn" title="随机排列粒子">
        <span class="icon">✦</span>
        <span class="btn-text">随机排列粒子</span>
      </button>
      <button id="btn-autowave" class="ctrl-btn" title="启动自动波">
        <span class="icon">◎</span>
        <span class="btn-text">启动自动波</span>
      </button>
      <div class="volume-control">
        <div class="slider-wrapper">
          <input id="volume-slider" type="range" min="0" max="100" value="60" />
        </div>
        <span id="volume-label" class="volume-label">60</span>
      </div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="particle-canvas"></canvas>
      <div class="hint-text">点击画布任意位置触发音波脉冲</div>
    </div>
  </div>
</body>
</html>
