<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>焰语·风吟</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: 'Microsoft YaHei', sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    canvas {
      display: block;
    }
    .hint {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 215, 100, 0.7);
      font-size: 14px;
      letter-spacing: 2px;
      text-align: center;
      pointer-events: none;
      user-select: none;
      text-shadow: 0 0 10px rgba(255, 140, 50, 0.5);
    }
    .title {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 200, 100, 0.9);
      font-size: 28px;
      letter-spacing: 8px;
      pointer-events: none;
      user-select: none;
      text-shadow: 0 0 20px rgba(255, 140, 50, 0.6);
      font-weight: 300;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="title">焰 语 · 风 吟</div>
    <div class="hint">点击火焰 / 空格键 唤起风 · 滚轮缩放视角</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
