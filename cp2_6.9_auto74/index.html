<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>鸟群飞行编队模拟 - Boid算法</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #0B1D3A;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #app {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .canvas-wrapper {
      position: relative;
      min-width: 600px;
      width: 100%;
      max-width: 100vw;
    }

    canvas {
      display: block;
      width: 100%;
      height: 800px;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    .info-panel {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      padding: 12px 18px;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 160px;
    }

    .info-panel .label {
      font-size: 12px;
      opacity: 0.7;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .info-panel .efficiency {
      font-size: 28px;
      font-weight: 700;
      transition: color 0.3s ease;
    }

    .info-panel .hint {
      font-size: 11px;
      opacity: 0.6;
      margin-top: 4px;
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      padding-top: 6px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="canvas-wrapper">
      <canvas id="gameCanvas"></canvas>
      <div class="info-panel">
        <span class="label">编队效率</span>
        <span class="efficiency" id="efficiencyValue">0%</span>
        <span class="hint">点击/拖拽鼠标制造惊吓源</span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
