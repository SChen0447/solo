<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星轨弹珠</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
    }
    canvas {
      display: block;
      width: 100%; height: 100%;
    }
    #loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(180deg, #050520, #0a0025);
      z-index: 100;
      transition: opacity 0.6s;
    }
    #loading.fade-out { opacity: 0; pointer-events: none; }
    .orbit-icon {
      width: 60px; height: 60px;
      border: 2px solid rgba(100,140,255,0.6);
      border-top-color: rgba(140,180,255,0.9);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      position: relative;
    }
    .orbit-icon::after {
      content: '';
      position: absolute;
      width: 8px; height: 8px;
      background: rgba(160,200,255,0.9);
      border-radius: 50%;
      top: -4px; left: 50%; margin-left: -4px;
      box-shadow: 0 0 10px rgba(160,200,255,0.8);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading"><div class="orbit-icon"></div></div>
  <canvas id="gameCanvas"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
