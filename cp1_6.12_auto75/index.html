<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D植物生长模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #0B0B45 0%, #2D004D 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
    }
    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .lil-gui {
      --width: 300px;
      --font-size: 12px;
      --text-color: #ffffff;
      --number-color: #ffffff;
      --title-font-size: 13px;
    }
    .lil-gui .slider {
      height: 4px;
      border-radius: 2px;
    }
    .lil-gui .widget {
      height: 24px;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
