<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>霓虹灯牌设计工作台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #1a1a2e;
      font-family: 'JetBrains Mono', monospace;
      color: #e4e4f0;
      overflow: hidden;
    }

    :root {
      --panel-bg: rgba(255, 255, 255, 0.08);
      --panel-border: rgba(255, 255, 255, 0.12);
      --panel-blur: 16px;
      --accent: #00ffff;
    }

    .app {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
      padding: 20px;
      gap: 16px;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 8px;
    }

    .app-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(90deg, #FF1493, #00FFFF, #39FF14);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }

    .app-subtitle {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 1px;
    }

    .main-content {
      flex: 1;
      display: flex;
      gap: 16px;
      min-height: 0;
    }

    .panel {
      background: var(--panel-bg);
      backdrop-filter: blur(var(--panel-blur));
      -webkit-backdrop-filter: blur(var(--panel-blur));
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 20px;
      overflow-y: auto;
    }

    .panel::-webkit-scrollbar {
      width: 6px;
    }
    .panel::-webkit-scrollbar-track {
      background: transparent;
    }
    .panel::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
    }

    .left-panel {
      width: 280px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .canvas-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 0;
    }

    .canvas-container {
      flex: 1;
      position: relative;
      background: var(--panel-bg);
      backdrop-filter: blur(var(--panel-blur));
      -webkit-backdrop-filter: blur(var(--panel-blur));
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #neon-canvas {
      display: block;
      cursor: grab;
      touch-action: none;
    }

    #neon-canvas:active {
      cursor: grabbing;
    }

    .canvas-toolbar {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 10px;
      z-index: 10;
    }

    .btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #e4e4f0;
      padding: 10px 18px;
      border-radius: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      letter-spacing: 0.5px;
    }

    .btn:hover {
      transform: scale(1.02);
      border-color: rgba(255, 255, 255, 0.5);
      box-shadow: 0 0 16px rgba(255, 255, 255, 0.1);
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(0, 255, 255, 0.2), rgba(138, 43, 226, 0.2));
      border-color: rgba(0, 255, 255, 0.4);
    }

    .btn-primary:hover {
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
      border-color: rgba(0, 255, 255, 0.7);
    }

    .btn.active {
      background: rgba(0, 255, 255, 0.2);
      border-color: rgba(0, 255, 255, 0.6);
      box-shadow: 0 0 12px rgba(0, 255, 255, 0.25);
    }

    .right-panel {
      width: 280px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .panel-section-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 14px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-section-title::before {
      content: '';
      width: 4px;
      height: 16px;
      background: linear-gradient(180deg, #00FFFF, #8A2BE2);
      border-radius: 2px;
    }

    .scene-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .scene-card {
      position: relative;
      aspect-ratio: 4 / 3;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .scene-card:hover {
      transform: scale(1.02);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .scene-card.active {
      border-color: #00FFFF;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
    }

    .scene-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .scene-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 12px;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
      font-size: 12px;
      letter-spacing: 1px;
    }

    .color-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .color-swatch {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid rgba(255, 255, 255, 0.15);
      transition: transform 0.2s ease, border-color 0.2s ease;
      position: relative;
    }

    .color-swatch::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      opacity: 0.5;
      filter: blur(8px);
      z-index: -1;
    }

    .color-swatch:hover {
      transform: scale(1.1);
      border-color: rgba(255, 255, 255, 0.5);
    }

    .color-swatch.active {
      border-color: #ffffff;
      transform: scale(1.12);
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 0.5px;
    }

    .slider-value {
      color: #00FFFF;
      font-weight: 500;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00FFFF, #8A2BE2);
      border: 2px solid #ffffff;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      box-shadow: 0 0 18px rgba(0, 255, 255, 0.7);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00FFFF, #8A2BE2);
      border: 2px solid #ffffff;
      cursor: pointer;
    }

    .text-input-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .text-input {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      padding: 12px 14px;
      color: #e4e4f0;
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 2px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      text-align: center;
    }

    .text-input:focus {
      border-color: rgba(0, 255, 255, 0.6);
      box-shadow: 0 0 14px rgba(0, 255, 255, 0.25);
    }

    .text-hint {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      text-align: center;
    }

    .animation-bar {
      background: var(--panel-bg);
      backdrop-filter: blur(var(--panel-blur));
      -webkit-backdrop-filter: blur(var(--panel-blur));
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .anim-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.8);
      margin-right: 8px;
    }

    .download-link {
      display: none;
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      background: rgba(57, 255, 20, 0.15);
      border: 1px solid rgba(57, 255, 20, 0.5);
      border-radius: 10px;
      color: #39FF14;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 1px;
      animation: fadeIn 0.4s ease;
      z-index: 20;
    }

    .download-link.show {
      display: block;
    }

    .download-link:hover {
      background: rgba(57, 255, 20, 0.25);
      box-shadow: 0 0 18px rgba(57, 255, 20, 0.4);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translate(-50%, 10px); }
      to { opacity: 1; transform: translate(-50%, 0); }
    }

    @media (max-width: 900px) {
      .app {
        padding: 10px;
        gap: 10px;
      }
      .main-content {
        flex-direction: column;
      }
      .left-panel, .right-panel {
        width: 100%;
        max-height: 180px;
      }
      .scene-grid {
        grid-template-columns: repeat(3, 1fr);
      }
      .color-grid {
        grid-template-columns: repeat(6, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div>
        <div class="app-title">NEON SIGN DESIGNER</div>
        <div class="app-subtitle">动态霓虹灯牌设计工作台</div>
      </div>
      <div class="app-subtitle">v1.0 · Canvas 2D</div>
    </header>

    <div class="main-content">
      <aside class="panel left-panel" id="scene-panel">
        <div>
          <div class="panel-section-title">安装场景</div>
          <div class="scene-grid" id="scene-grid"></div>
        </div>
      </aside>

      <div class="canvas-wrapper">
        <div class="canvas-container" id="canvas-container">
          <canvas id="neon-canvas"></canvas>
          <div class="canvas-toolbar">
            <button class="btn" id="zoom-out" title="缩小">−</button>
            <button class="btn" id="zoom-reset" title="重置">⟳</button>
            <button class="btn" id="zoom-in" title="放大">+</button>
            <button class="btn btn-primary" id="export-btn">导出 PNG</button>
          </div>
          <a class="download-link" id="download-link" download="neon-sign.png">⬇ 点击下载 PNG</a>
        </div>

        <div class="animation-bar" id="animation-bar">
          <span class="anim-label">动画模式</span>
          <button class="btn anim-btn" data-mode="static">常亮</button>
          <button class="btn anim-btn" data-mode="breathing">呼吸</button>
          <button class="btn anim-btn" data-mode="chase">追逐</button>
          <button class="btn anim-btn" data-mode="blink">眨眼</button>
          <button class="btn anim-btn" data-mode="strobe">频闪</button>
        </div>
      </div>

      <aside class="panel right-panel" id="style-panel">
        <div>
          <div class="panel-section-title">霓虹文字</div>
          <div class="text-input-wrap">
            <input type="text" class="text-input" id="text-input" value="NEON" maxlength="8">
            <div class="text-hint">最多8个英文字母或4个中文字符</div>
          </div>
        </div>

        <div>
          <div class="panel-section-title">霓虹颜色</div>
          <div class="color-grid" id="color-grid"></div>
        </div>

        <div>
          <div class="panel-section-title">发光强度</div>
          <div class="slider-group">
            <div class="slider-label">
              <span>强度</span>
              <span class="slider-value" id="intensity-value">1.5x</span>
            </div>
            <input type="range" id="intensity-slider" min="0.5" max="3.0" step="0.1" value="1.5">
          </div>
        </div>

        <div>
          <div class="panel-section-title">灯管粗细</div>
          <div class="slider-group">
            <div class="slider-label">
              <span>管径</span>
              <span class="slider-value" id="tube-value">10px</span>
            </div>
            <input type="range" id="tube-slider" min="4" max="16" step="1" value="10">
          </div>
        </div>

        <div>
          <div class="panel-section-title">缩放比例</div>
          <div class="slider-group">
            <div class="slider-label">
              <span>缩放</span>
              <span class="slider-value" id="scale-value">1.0x</span>
            </div>
            <input type="range" id="scale-slider" min="0.5" max="2.0" step="0.05" value="1.0">
          </div>
        </div>
      </aside>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
