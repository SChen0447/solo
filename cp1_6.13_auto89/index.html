<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>冰晶光学模拟 - Crystal Optics Simulator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #0a1628 0%, #1a0a2e 50%, #0d1b2a 100%);
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      opacity: 0;
      animation: fadeIn 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .control-panel {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20, 25, 40, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      z-index: 100;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control-label {
      color: rgba(255, 255, 255, 0.8);
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-width: 120px;
    }

    .control-value {
      color: #64b5f6;
      font-weight: 600;
    }

    .slider {
      -webkit-appearance: none;
      appearance: none;
      width: 140px;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(to right, #1a237e, #7c4dff);
      outline: none;
      cursor: pointer;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fff 0%, #b3e5fc 100%);
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(100, 181, 246, 0.6);
      transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fff 0%, #b3e5fc 100%);
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 8px rgba(100, 181, 246, 0.6);
      transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .reset-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #c62828 0%, #ff6f00 100%);
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(198, 40, 40, 0.5);
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .reset-btn:hover {
      box-shadow: 0 6px 20px rgba(198, 40, 40, 0.7);
    }

    .reset-btn:active {
      transform: scale(0.95);
    }

    .title {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.9);
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 4px;
      text-shadow: 0 2px 10px rgba(100, 181, 246, 0.5);
      z-index: 100;
      pointer-events: none;
    }

    .hint {
      position: fixed;
      top: 56px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      z-index: 100;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="title">冰晶光学模拟</div>
    <div class="hint">在冰墙上拖拽切割冰晶 · 拖回冰墙生成彩色光圈 · 观察光的色散</div>
    <canvas id="canvas"></canvas>
    
    <div class="control-panel">
      <div class="control-group">
        <label class="control-label">
          <span>光束角度</span>
          <span class="control-value" id="angleValue">45°</span>
        </label>
        <input type="range" class="slider" id="angleSlider" min="0" max="90" value="45" step="1">
      </div>
      
      <div class="control-group">
        <label class="control-label">
          <span>光束亮度</span>
          <span class="control-value" id="brightnessValue">1.0</span>
        </label>
        <input type="range" class="slider" id="brightnessSlider" min="0.2" max="2.0" value="1.0" step="0.1">
      </div>
      
      <div class="control-group">
        <label class="control-label">
          <span>冰墙透明度</span>
          <span class="control-value" id="opacityValue">0.8</span>
        </label>
        <input type="range" class="slider" id="opacitySlider" min="0.3" max="1.0" value="0.8" step="0.1">
      </div>
      
      <div class="control-group">
        <label class="control-label">
          <span>生成速度</span>
          <span class="control-value" id="speedValue">2.0s</span>
        </label>
        <input type="range" class="slider" id="speedSlider" min="1" max="5" value="2" step="0.5">
      </div>
      
      <button class="reset-btn" id="resetBtn" title="重置">↻</button>
    </div>
  </div>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
