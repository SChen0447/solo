<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <title>城市风环境模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      min-width: 1024px;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #0b1a2e 0%, #1a2d4a 100%);
      color: #ffffff;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #scene-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
    #title {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 4px;
      color: #ffffff;
      text-shadow: 0 0 20px rgba(100, 180, 255, 0.5);
      z-index: 10;
      pointer-events: none;
    }
    #info-panel {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(11, 26, 46, 0.85);
      border: 1px solid rgba(100, 180, 255, 0.3);
      border-radius: 8px;
      padding: 12px 16px;
      backdrop-filter: blur(10px);
      z-index: 10;
      min-width: 160px;
    }
    #info-panel .label {
      font-size: 12px;
      color: rgba(180, 200, 220, 0.8);
      margin-bottom: 4px;
    }
    #info-panel .value {
      font-size: 28px;
      font-weight: 700;
      color: #88ccff;
    }
    #info-panel .unit {
      font-size: 14px;
      font-weight: 400;
      color: rgba(180, 200, 220, 0.8);
      margin-left: 4px;
    }
    #view-scale {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(11, 26, 46, 0.85);
      border: 1px solid rgba(100, 180, 255, 0.3);
      border-radius: 8px;
      padding: 10px 14px;
      backdrop-filter: blur(10px);
      z-index: 10;
      font-size: 12px;
      line-height: 1.8;
    }
    #view-scale .row {
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }
    #view-scale .label {
      color: rgba(180, 200, 220, 0.7);
    }
    #view-scale .val {
      color: #88ccff;
      font-weight: 600;
    }
    #snapshots-panel {
      position: absolute;
      top: 80px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 10;
    }
    .snapshot-card {
      background: rgba(11, 26, 46, 0.85);
      border: 1px solid rgba(100, 180, 255, 0.3);
      border-radius: 8px;
      padding: 8px;
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: all 0.2s ease;
      width: 140px;
    }
    .snapshot-card:hover {
      border-color: rgba(100, 180, 255, 0.7);
      transform: translateX(-4px);
    }
    .snapshot-card.active {
      border-color: #88ccff;
      box-shadow: 0 0 15px rgba(136, 204, 255, 0.3);
    }
    .snapshot-card .thumb {
      width: 100%;
      height: 80px;
      background: linear-gradient(135deg, #1a2d4a, #0b1a2e);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .snapshot-card .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .snapshot-card .meta {
      font-size: 11px;
      color: rgba(180, 200, 220, 0.8);
      display: flex;
      justify-content: space-between;
    }
    .snapshot-card .compare-btn {
      margin-top: 6px;
      width: 100%;
      padding: 4px 8px;
      background: rgba(100, 180, 255, 0.15);
      border: 1px solid rgba(100, 180, 255, 0.4);
      border-radius: 4px;
      color: #88ccff;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .snapshot-card .compare-btn:hover {
      background: rgba(100, 180, 255, 0.3);
    }
    #building-panel {
      position: absolute;
      background: rgba(11, 26, 46, 0.92);
      border: 1px solid rgba(100, 180, 255, 0.4);
      border-radius: 10px;
      padding: 16px;
      backdrop-filter: blur(12px);
      z-index: 20;
      min-width: 240px;
      display: none;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    #building-panel.visible {
      display: block;
    }
    #building-panel .panel-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #ffffff;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #building-panel .close-btn {
      width: 20px;
      height: 20px;
      background: none;
      border: none;
      color: rgba(180, 200, 220, 0.7);
      font-size: 16px;
      cursor: pointer;
      transition: color 0.2s;
    }
    #building-panel .close-btn:hover {
      color: #ff6666;
    }
    #building-panel .field {
      margin-bottom: 12px;
    }
    #building-panel .field-label {
      font-size: 12px;
      color: rgba(180, 200, 220, 0.8);
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }
    #building-panel .field-value {
      color: #88ccff;
      font-weight: 600;
    }
    #building-panel input[type="range"] {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      background: rgba(100, 180, 255, 0.2);
      border-radius: 2px;
      outline: none;
    }
    #building-panel input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: #88ccff;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    #building-panel input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }
    #building-panel .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    #building-panel .btn {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid rgba(100, 180, 255, 0.4);
      background: rgba(100, 180, 255, 0.1);
      color: #ffffff;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    #building-panel .btn:hover {
      background: rgba(100, 180, 255, 0.25);
    }
    #building-panel .btn.danger {
      border-color: rgba(255, 100, 100, 0.4);
      background: rgba(255, 100, 100, 0.1);
    }
    #building-panel .btn.danger:hover {
      background: rgba(255, 100, 100, 0.25);
    }
    #hint {
      position: absolute;
      bottom: 20px;
      right: 20px;
      font-size: 12px;
      color: rgba(180, 200, 220, 0.5);
      z-index: 10;
      line-height: 1.8;
      text-align: right;
    }
    #hint kbd {
      background: rgba(100, 180, 255, 0.15);
      border: 1px solid rgba(100, 180, 255, 0.3);
      padding: 2px 6px;
      border-radius: 3px;
      font-family: monospace;
      color: #88ccff;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="scene-container"></div>
    <div id="title">城市风环境模拟器</div>

    <div id="view-scale">
      <div class="row">
        <span class="label">视角高度</span>
        <span class="val" id="cam-height">-- m</span>
      </div>
      <div class="row">
        <span class="label">水平距离</span>
        <span class="val" id="cam-distance">-- m</span>
      </div>
    </div>

    <div id="info-panel">
      <div class="label">平均风速（行人层）</div>
      <div><span class="value" id="avg-wind-speed">0.00</span><span class="unit">m/s</span></div>
    </div>

    <div id="snapshots-panel"></div>

    <div id="building-panel">
      <div class="panel-title">
        <span>建筑参数编辑</span>
        <button class="close-btn" id="panel-close">&times;</button>
      </div>
      <div class="field">
        <div class="field-label">
          <span>建筑高度</span>
          <span class="field-value" id="height-value">50 m</span>
        </div>
        <input type="range" id="height-slider" min="15" max="120" step="5" value="50" />
      </div>
      <div class="field">
        <div class="field-label">
          <span>旋转角度</span>
          <span class="field-value" id="rotation-value">0°</span>
        </div>
        <input type="range" id="rotation-slider" min="0" max="360" step="1" value="0" />
      </div>
      <div class="btn-row">
        <button class="btn" id="btn-duplicate">复制</button>
        <button class="btn danger" id="btn-delete">删除</button>
      </div>
    </div>

    <div id="hint">
      <div>鼠标拖拽：旋转视角 · 滚轮：缩放 · 右键拖拽：平移</div>
      <div>点击建筑：编辑 · <kbd>S</kbd>：保存快照 · 拖拽顶部半球：调整风向</div>
    </div>
  </div>
  <script type="module" src="/src/Main.ts"></script>
</body>
</html>
