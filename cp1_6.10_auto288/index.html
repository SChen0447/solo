<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>地势争锋 - 地形策略对战</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      color: #ffffff;
    }
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      pointer-events: none;
      z-index: 10;
    }
    .player-info {
      display: flex;
      align-items: center;
      gap: 12px;
      pointer-events: auto;
    }
    .player-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      box-shadow: 0 0 15px currentColor;
    }
    .player-name {
      font-size: 16px;
      font-weight: bold;
    }
    .turn-indicator {
      font-size: 20px;
      font-weight: bold;
      color: #ffffff;
      text-align: center;
    }
    .turn-indicator .turn-text {
      font-size: 14px;
      opacity: 0.7;
      font-weight: normal;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="top-bar">
      <div class="player-info" id="player1-info">
        <div class="player-dot" style="background: #4d96ff; color: #4d96ff;"></div>
        <div class="player-name" style="color: #4d96ff;">玩家 1</div>
      </div>
      <div class="turn-indicator">
        <div id="turn-text" class="turn-text">第 1 回合</div>
        <div id="current-player-text">玩家 1 行动</div>
      </div>
      <div class="player-info" id="player2-info">
        <div class="player-name" style="color: #ff6b6b;">玩家 2 (AI)</div>
        <div class="player-dot" style="background: #ff6b6b; color: #ff6b6b;"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/game.ts"></script>
</body>
</html>
