<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2D无限跑酷关卡生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-width: 1024px;
      overflow-x: auto;
      height: 100vh;
    }
    #app {
      display: flex;
      width: 100%;
      height: 100vh;
      min-height: 600px;
    }
    #canvas-container {
      flex: 0 0 70%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #16213e;
      padding: 20px;
    }
    #level-canvas {
      border: 2px solid #3498DB;
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(52, 152, 219, 0.3);
      display: block;
    }
    #ui-container {
      flex: 0 0 30%;
      background: #2C3E50;
      padding: 20px;
      overflow-y: auto;
      transition: opacity 0.3s ease;
    }
    #ui-container.floating {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 360px;
      max-height: 90vh;
      background: rgba(51, 51, 51, 0.95);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      z-index: 1000;
      cursor: move;
      user-select: none;
    }
    #ui-container.floating.dragging {
      cursor: grabbing;
    }
    .panel-header {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #fff;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 10px;
    }
    .control-group {
      margin-bottom: 16px;
    }
    .control-group label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #ecf0f1;
      margin-bottom: 6px;
    }
    .control-group .value {
      font-family: 'Courier New', monospace;
      color: #3498DB;
      font-weight: 600;
    }
    .control-group input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #34495e;
      outline: none;
      -webkit-appearance: none;
      transition: transform 0.15s ease;
    }
    .control-group input[type="range"]:hover,
    .control-group input[type="range"]:active {
      transform: scale(1.05);
    }
    .control-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #3498DB;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(52, 152, 219, 0.5);
    }
    .control-group input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #3498DB;
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 6px rgba(52, 152, 219, 0.5);
    }
    .seed-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .seed-group label {
      font-size: 13px;
      color: #ecf0f1;
      margin-bottom: 6px;
      display: block;
    }
    .seed-group input[type="number"] {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #34495e;
      border-radius: 6px;
      background: #1a252f;
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .seed-group input[type="number"]:focus {
      border-color: #3498DB;
    }
    .presets-section {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .presets-label {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #ecf0f1;
    }
    .preset-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .preset-tab {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #34495e;
      border-radius: 6px;
      background: #1a252f;
      color: #bdc3c7;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.3s ease;
      opacity: 0;
      animation: fadeIn 0.3s ease forwards;
    }
    .preset-tab:hover {
      border-color: #3498DB;
      color: #fff;
    }
    .preset-tab.active {
      background: #3498DB;
      border-color: #3498DB;
      color: #fff;
    }
    .preset-tab.empty {
      border-style: dashed;
      color: #7f8c8d;
    }
    .save-preset-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: linear-gradient(135deg, #2ECC71, #27ae60);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .save-preset-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(46, 204, 113, 0.4);
    }
    .save-preset-btn:disabled {
      background: #7f8c8d;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .chart-section {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .chart-label {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #ecf0f1;
    }
    #chart-canvas {
      display: block;
      border-radius: 6px;
      background: #2C3E50;
      width: 100%;
      height: auto;
    }
    .chart-legend {
      display: flex;
      gap: 12px;
      margin-top: 8px;
      font-size: 11px;
      color: #bdc3c7;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container">
      <canvas id="level-canvas" width="800" height="400"></canvas>
    </div>
    <div id="ui-container"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
