<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='20' y='25' width='60' height='50' rx='4' fill='%238B5E3C'/%3E%3Crect x='25' y='30' width='50' height='40' fill='%23FFF8E7'/%3E%3Ctext x='50' y='58' text-anchor='middle' font-size='24' fill='%235B3A6B' font-family='serif'%3E盲%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>盲书奇遇 - 遇见一本未知的好书</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body, #root {
        width: 100%;
        min-height: 100vh;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background-color: #FFF8E7;
      }

      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #FFF8E7;
        z-index: 9999;
        transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }

      #initial-loader.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .book-logo {
        position: relative;
        width: 120px;
        height: 150px;
        perspective: 1000px;
      }

      .book-cover {
        position: absolute;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #8B5E3C 0%, #6B4423 100%);
        border-radius: 4px 8px 8px 4px;
        box-shadow: 
          inset -4px 0 8px rgba(0, 0, 0, 0.2),
          0 8px 32px rgba(0, 0, 0, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        transform-origin: left center;
        animation: bookOpen 2s ease-in-out infinite;
      }

      .book-cover::before {
        content: '';
        position: absolute;
        left: 6px;
        top: 8px;
        bottom: 8px;
        width: 2px;
        background: rgba(0, 0, 0, 0.2);
      }

      .book-title {
        color: #FFF8E7;
        font-family: 'Playfair Display', serif;
        font-size: 22px;
        font-weight: 600;
        writing-mode: vertical-rl;
        letter-spacing: 4px;
      }

      .book-pages {
        position: absolute;
        left: 8px;
        top: 6px;
        right: 4px;
        bottom: 6px;
        background: linear-gradient(to right, #FFF8E7, #F5E6D3);
        border-radius: 2px 4px 4px 2px;
        transform: scaleX(0);
        transform-origin: left center;
        animation: pagesAppear 2s ease-in-out infinite;
      }

      .book-pages::after {
        content: '';
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: 4px;
        background: repeating-linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.05) 0px,
          rgba(0, 0, 0, 0.05) 2px,
          transparent 2px,
          transparent 4px
        );
      }

      .lamp-glow {
        margin-top: 40px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: radial-gradient(circle, #FFD700 0%, #FFA500 50%, transparent 70%);
        animation: lampBreathe 2s ease-in-out infinite;
      }

      .loading-text {
        margin-top: 20px;
        color: #5B3A6B;
        font-family: 'Playfair Display', serif;
        font-size: 18px;
        letter-spacing: 2px;
      }

      @keyframes bookOpen {
        0%, 100% {
          transform: rotateY(0deg);
        }
        50% {
          transform: rotateY(-60deg);
        }
      }

      @keyframes pagesAppear {
        0%, 100% {
          transform: scaleX(0);
        }
        50% {
          transform: scaleX(1);
        }
      }

      @keyframes lampBreathe {
        0%, 100% {
          opacity: 0.6;
          transform: scale(0.9);
        }
        50% {
          opacity: 1;
          transform: scale(1.1);
        }
      }
    </style>
  </head>
  <body>
    <div id="initial-loader">
      <div class="book-logo">
        <div class="book-pages"></div>
        <div class="book-cover">
          <span class="book-title">盲书奇遇</span>
        </div>
      </div>
      <div class="lamp-glow"></div>
      <div class="loading-text">正在点亮书店的灯...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loader = document.getElementById('initial-loader');
          if (loader) {
            loader.classList.add('fade-out');
            setTimeout(function() {
              loader.remove();
            }, 600);
          }
        }, 1500);
      });
    </script>
  </body>
</html>
