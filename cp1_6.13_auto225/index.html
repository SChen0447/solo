<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>流光·记忆拼图</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #puzzle-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 85vw;
      height: 80vh;
      min-width: 800px;
      min-height: 600px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0, 0, 0, 0.5);
    }

    #puzzle-canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    #puzzle-canvas:active {
      cursor: grabbing;
    }

    #timer {
      position: fixed;
      top: 24px;
      left: 24px;
      color: white;
      font-size: 16px;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
      z-index: 10;
      letter-spacing: 2px;
    }

    #reset-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #76b3f7);
      cursor: pointer;
      z-index: 10;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      transition: transform 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #reset-btn:hover {
      transform: scale(1.1);
    }

    #reset-btn:active {
      transform: scale(0.8);
    }

    #reset-btn svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    #light-burst {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 0;
      height: 0;
      border-radius: 50%;
      background: white;
      pointer-events: none;
      opacity: 0;
      z-index: 5;
    }

    #completed-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0;
      z-index: 3;
    }
  </style>
</head>
<body>
  <div id="puzzle-container">
    <canvas id="puzzle-canvas"></canvas>
    <div id="light-burst"></div>
    <canvas id="completed-image"></canvas>
  </div>

  <div id="timer">00:00</div>
  <button id="reset-btn" title="重新开始">
    <svg viewBox="0 0 24 24">
      <path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
    </svg>
  </button>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
