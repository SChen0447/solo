<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>太阳系3D探索器</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 100%);
        color: #e8e8f0;
      }

      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }

      #canvas-container {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
      }

      #info-panel {
        position: absolute;
        top: 0;
        right: 0;
        width: 360px;
        height: 100%;
        background: rgba(20, 20, 40, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-left: 1px solid rgba(120, 140, 255, 0.25);
        box-shadow: -4px 0 30px rgba(80, 100, 200, 0.15);
        transform: translateX(100%);
        transition: transform 0.3s ease-out;
        padding: 28px 24px;
        overflow-y: auto;
        z-index: 10;
      }

      #info-panel.active {
        transform: translateX(0);
      }

      #info-panel h2 {
        font-size: 26px;
        margin-bottom: 18px;
        background: linear-gradient(90deg, #7eb8ff, #b8a8ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 1px;
      }

      #info-panel .close-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: none;
        background: rgba(255, 255, 255, 0.1);
        color: #e8e8f0;
        font-size: 18px;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #info-panel .close-btn:hover {
        background: rgba(255, 100, 100, 0.3);
        transform: scale(1.1);
      }

      #info-panel .texture-preview {
        width: 100%;
        height: 180px;
        border-radius: 12px;
        margin-bottom: 20px;
        overflow: hidden;
        border: 1px solid rgba(120, 140, 255, 0.3);
        box-shadow: 0 0 20px rgba(100, 120, 255, 0.2);
      }

      #info-panel .texture-preview canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      #info-panel .info-row {
        display: flex;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid rgba(120, 140, 255, 0.1);
        font-size: 14px;
      }

      #info-panel .info-row .label {
        color: #8a9bbf;
      }

      #info-panel .info-row .value {
        color: #d0d8f0;
        font-weight: 500;
      }

      #info-panel .description {
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid rgba(120, 140, 255, 0.15);
        line-height: 1.7;
        color: #b8c0d8;
        font-size: 13.5px;
      }

      #controls {
        position: absolute;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 14px 24px;
        background: rgba(20, 20, 40, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 16px;
        border: 1px solid rgba(120, 140, 255, 0.25);
        box-shadow: 0 4px 30px rgba(80, 100, 200, 0.15);
        z-index: 10;
      }

      #controls button {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        border: 1px solid rgba(120, 140, 255, 0.3);
        background: rgba(60, 80, 160, 0.25);
        color: #e8e8f0;
        font-size: 18px;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #controls button:hover {
        background: rgba(80, 110, 200, 0.45);
        transform: scale(1.08);
        box-shadow: 0 0 15px rgba(100, 140, 255, 0.4);
      }

      #controls button.active {
        background: rgba(120, 150, 255, 0.5);
        box-shadow: 0 0 18px rgba(120, 160, 255, 0.5);
      }

      #controls .speed-label {
        font-size: 13px;
        color: #8a9bbf;
        margin-right: 4px;
      }

      #controls .speed-value {
        font-size: 14px;
        color: #b8d0ff;
        font-weight: 600;
        min-width: 38px;
        text-align: center;
      }

      #controls input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 180px;
        height: 6px;
        border-radius: 3px;
        background: rgba(100, 120, 200, 0.3);
        outline: none;
        cursor: pointer;
      }

      #controls input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: linear-gradient(135deg, #7eb8ff, #b8a8ff);
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 0 10px rgba(120, 160, 255, 0.6);
      }

      #controls input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.2);
        box-shadow: 0 0 16px rgba(140, 180, 255, 0.8);
      }

      #controls input[type="range"]::-moz-range-thumb {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: linear-gradient(135deg, #7eb8ff, #b8a8ff);
        cursor: pointer;
        border: none;
      }

      #hint {
        position: absolute;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        padding: 10px 20px;
        background: rgba(20, 20, 40, 0.6);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-radius: 10px;
        border: 1px solid rgba(120, 140, 255, 0.2);
        font-size: 13px;
        color: #9ab0d8;
        z-index: 5;
        pointer-events: none;
      }

      @media (max-width: 768px) {
        #info-panel {
          width: 100%;
          padding: 20px 16px;
          font-size: 80%;
        }

        #info-panel h2 {
          font-size: 20.8px;
        }

        #info-panel .info-row {
          font-size: 11.2px;
          padding: 8px 0;
        }

        #info-panel .description {
          font-size: 10.8px;
        }

        #info-panel .texture-preview {
          height: 140px;
        }

        #controls {
          bottom: 16px;
          padding: 10px 14px;
          gap: 10px;
          font-size: 80%;
        }

        #controls button {
          width: 34px;
          height: 34px;
          font-size: 14.4px;
          border-radius: 10px;
        }

        #controls input[type="range"] {
          width: 110px;
        }

        #controls .speed-label {
          font-size: 10.4px;
        }

        #controls .speed-value {
          font-size: 11.2px;
          min-width: 30px;
        }

        #hint {
          top: 12px;
          padding: 6px 12px;
          font-size: 10.4px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="canvas-container"></div>

      <div id="hint">拖拽旋转视角 · 滚轮缩放 · 点击行星查看详情</div>

      <div id="info-panel">
        <button class="close-btn" id="close-panel">×</button>
        <h2 id="panel-title">行星名称</h2>
        <div class="texture-preview" id="texture-preview"></div>
        <div class="info-row">
          <span class="label">直径</span>
          <span class="value" id="panel-diameter">-</span>
        </div>
        <div class="info-row">
          <span class="label">质量</span>
          <span class="value" id="panel-mass">-</span>
        </div>
        <div class="info-row">
          <span class="label">公转周期</span>
          <span class="value" id="panel-orbit">-</span>
        </div>
        <div class="info-row">
          <span class="label">距太阳</span>
          <span class="value" id="panel-distance">-</span>
        </div>
        <div class="description" id="panel-description"></div>
      </div>

      <div id="controls">
        <button id="btn-pause" title="暂停/继续">▶</button>
        <span class="speed-label">速度</span>
        <input type="range" id="speed-slider" min="0" max="4" step="1" value="1" />
        <span class="speed-value" id="speed-value">1x</span>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
