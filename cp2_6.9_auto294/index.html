<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>声纹画布</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #0B0E1A 0%, #1A1F33 100%);
      color: #ffffff;
      overflow-x: hidden;
    }

    .app-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .app-title {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #6C63FF 0%, #E040FB 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .canvas-wrapper {
      position: relative;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    #visualizer {
      display: block;
      width: 100%;
      height: 550px;
      background: linear-gradient(180deg, #0B0E1A 0%, #1A1F33 100%);
    }

    .record-button {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background-color: #6C63FF;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.3s ease, transform 0.2s ease;
      box-shadow: 0 4px 16px rgba(108, 99, 255, 0.4);
      z-index: 10;
    }

    .record-button:hover {
      transform: scale(1.05);
    }

    .record-button.recording {
      background-color: #FF5252;
      box-shadow: 0 4px 16px rgba(255, 82, 82, 0.4);
      animation: pulse-ring 1.5s ease-in-out infinite;
    }

    .record-button svg {
      width: 24px;
      height: 24px;
      fill: #ffffff;
    }

    @keyframes pulse-ring {
      0% {
        box-shadow: 0 4px 16px rgba(255, 82, 82, 0.4), 0 0 0 0 rgba(255, 82, 82, 0.5);
      }
      70% {
        box-shadow: 0 4px 16px rgba(255, 82, 82, 0.4), 0 0 0 16px rgba(255, 82, 82, 0);
      }
      100% {
        box-shadow: 0 4px 16px rgba(255, 82, 82, 0.4), 0 0 0 0 rgba(255, 82, 82, 0);
      }
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 16px 20px;
      background: rgba(42, 45, 62, 0.6);
      backdrop-filter: blur(8px);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .volume-section {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .volume-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      white-space: nowrap;
    }

    .volume-bar-container {
      width: 100px;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .volume-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00C853 0%, #FFD600 50%, #FF1744 100%);
      border-radius: 3px;
      transition: width 0.05s linear;
    }

    .frequency-section {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 40px;
    }

    .freq-bar {
      width: 12px;
      height: 4px;
      border-radius: 2px;
      transition: height 0.08s ease-out;
    }

    .freq-bar:nth-child(1), .freq-bar:nth-child(2) {
      background: linear-gradient(180deg, #4A148C 0%, #1A237E 100%);
    }

    .freq-bar:nth-child(3), .freq-bar:nth-child(4), .freq-bar:nth-child(5) {
      background: linear-gradient(180deg, #FFD600 0%, #00C853 100%);
    }

    .freq-bar:nth-child(6), .freq-bar:nth-child(7), .freq-bar:nth-child(8) {
      background: linear-gradient(180deg, #E040FB 0%, #FF1744 100%);
    }

    .instructions {
      margin-top: 16px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      text-align: center;
      line-height: 1.6;
      max-width: 600px;
    }

    @media (max-width: 768px) {
      #visualizer {
        height: 350px;
      }

      .status-bar {
        flex-direction: row;
        gap: 12px;
        padding: 12px 16px;
        flex-wrap: wrap;
      }

      .volume-section {
        gap: 8px;
      }

      .volume-bar-container {
        width: 80px;
      }

      .frequency-section {
        height: 32px;
      }

      .freq-bar {
        width: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <h1 class="app-title">声纹画布</h1>

    <div class="canvas-wrapper">
      <canvas id="visualizer"></canvas>

      <button class="record-button" id="recordBtn" title="开始录音">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </button>

      <div class="status-bar">
        <div class="volume-section">
          <span class="volume-label">音量</span>
          <div class="volume-bar-container">
            <div class="volume-bar" id="volumeBar"></div>
          </div>
        </div>
        <div class="frequency-section" id="freqBars">
          <div class="freq-bar"></div>
          <div class="freq-bar"></div>
          <div class="freq-bar"></div>
          <div class="freq-bar"></div>
          <div class="freq-bar"></div>
          <div class="freq-bar"></div>
          <div class="freq-bar"></div>
          <div class="freq-bar"></div>
        </div>
      </div>
    </div>

    <p class="instructions">
      点击右上角麦克风按钮开始录音，对着麦克风说话或唱歌，画布将实时生成流动的彩色光带和粒子。
      高音呈现亮色尖锐线条，低音呈现深色缓慢波纹，音量决定粒子数量与大小。
    </p>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
