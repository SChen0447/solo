<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>化石探针 - Fossil Probe</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
      background: radial-gradient(ellipse at center, #2a1f33 0%, #1a1423 100%);
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }

    /* Loading Progress Ring */
    #loading-container {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 30px;
      height: 30px;
      z-index: 100;
      opacity: 1;
      transition: opacity 0.5s ease;
    }

    #loading-container.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .progress-ring {
      width: 30px;
      height: 30px;
      transform: rotate(-90deg);
    }

    .progress-ring-circle {
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 88;
      stroke-dashoffset: 88;
      animation: progress-fill 1.5s ease-in-out forwards;
    }

    @keyframes progress-fill {
      0% {
        stroke-dashoffset: 88;
        stroke: #d4af37;
      }
      100% {
        stroke-dashoffset: 0;
        stroke: #88ccff;
      }
    }

    /* Tooltip Bar */
    #tooltip-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: rgba(20, 20, 30, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      color: #e8dcc8;
      font-size: 13px;
      letter-spacing: 1px;
    }

    /* Info Card */
    #info-card {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 280px;
      background: #2a2744;
      border: 0.3px solid #d4af37;
      border-radius: 12px;
      padding: 18px 20px;
      color: #e8dcc8;
      z-index: 60;
      opacity: 0;
      transform: translateY(-10px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
    }

    #info-card.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    #info-card h2 {
      font-family: serif;
      font-size: 18px;
      color: #d4af37;
      margin-bottom: 10px;
      font-weight: 600;
    }

    #info-card .info-row {
      font-size: 14px;
      margin-bottom: 6px;
      line-height: 1.5;
    }

    #info-card .info-label {
      color: #a89b8a;
      margin-right: 6px;
    }

    #info-card .info-description {
      font-size: 14px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(212, 175, 55, 0.2);
      line-height: 1.6;
      color: #c8bcac;
    }

    /* Hotspot Tooltip */
    #hotspot-tooltip {
      position: absolute;
      width: 140px;
      height: 80px;
      background: rgba(42, 39, 68, 0.95);
      border: 1px solid rgba(212, 175, 55, 0.5);
      border-radius: 70px 70px 12px 12px;
      padding: 8px;
      color: #e8dcc8;
      z-index: 55;
      opacity: 0;
      transform: translate(-50%, -100%) translateY(-10px);
      transition: opacity 0.2s ease;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #hotspot-tooltip.visible {
      opacity: 1;
    }

    #hotspot-tooltip .tooltip-thumb {
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, #c4a77d 0%, #6e5c3e 100%);
      border-radius: 60px 60px 6px 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      text-align: center;
      color: #2a1f1a;
      padding: 4px;
    }

    /* X-Ray Mode Indicator */
    #xray-indicator {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(136, 204, 255, 0.2);
      border: 1px solid rgba(136, 204, 255, 0.6);
      border-radius: 20px;
      padding: 6px 16px;
      color: #88ccff;
      font-size: 12px;
      z-index: 50;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }

    #xray-indicator.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    
    <div id="loading-container">
      <svg class="progress-ring" viewBox="0 0 30 30">
        <circle class="progress-ring-circle" cx="15" cy="15" r="14"></circle>
      </svg>
    </div>

    <div id="xray-indicator">X射线模式</div>

    <div id="info-card">
      <h2 id="card-title"></h2>
      <div class="info-row">
        <span class="info-label">地质年代:</span>
        <span id="card-era"></span>
      </div>
      <div class="info-row">
        <span class="info-label">尺寸范围:</span>
        <span id="card-size"></span>
      </div>
      <div class="info-description" id="card-description"></div>
    </div>

    <div id="hotspot-tooltip">
      <div class="tooltip-thumb" id="tooltip-thumb-text"></div>
    </div>

    <div id="tooltip-bar">
      拖拽旋转 · 滚轮缩放 · 点击查看 · X键切换X射线
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
