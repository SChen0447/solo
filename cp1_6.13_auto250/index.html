<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幻彩·气泡灯塔</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(to bottom, #0b0e14 0%, #1a1a2e 100%);
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #canvas-container {
      position: relative;
      min-width: 800px;
      min-height: 600px;
      width: 90vw;
      height: 90vh;
      max-width: 100vw;
      max-height: 100vh;
      border: 5px solid rgba(72, 219, 251, 0.3);
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(72, 219, 251, 0.3),
                  inset 0 0 15px rgba(72, 219, 251, 0.1);
      overflow: hidden;
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    #canvas-container canvas:active {
      cursor: grabbing;
    }

    .stars {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle linear infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container">
      <div class="stars" id="stars-bg"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
