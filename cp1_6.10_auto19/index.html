<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sketch to 3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    #app {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 10;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 12px;
      background: transparent;
      cursor: pointer;
      transition: background-color 0.2s ease;
      color: #374151;
    }
    .btn:hover {
      background: rgba(107, 114, 128, 0.1);
    }
    .btn svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      stroke-width: 1.8;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    #count {
      position: fixed;
      bottom: 24px;
      right: 28px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #6B7280;
      opacity: 0;
      transition: opacity 0.35s ease;
      z-index: 10;
    }
    #count.visible {
      opacity: 1;
    }
    #count span {
      font-size: 20px;
      font-weight: 600;
      color: #1F2937;
      margin-left: 6px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="ui">
    <button class="btn" id="btn-extrude" title="挤成3D">
      <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
    </button>
    <button class="btn" id="btn-clear" title="清空">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
    </button>
    <button class="btn" id="btn-undo" title="撤销 (Ctrl+Z)">
      <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
    </button>
  </div>
  <div id="count">3D模型<span id="count-num">0</span></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
