<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matrix Rain Configurator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0A0A0A;
      font-family: 'Courier New', monospace;
    }

    #app {
      display: flex;
      width: 100%;
      height: 100%;
    }

    #canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #matrix-canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
    }

    #control-panel {
      width: 300px;
      height: 100%;
      background-color: #121212;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 85, 0, 0.03) 2px,
          rgba(0, 85, 0, 0.03) 4px
        ),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 2px,
          rgba(0, 85, 0, 0.03) 2px,
          rgba(0, 85, 0, 0.03) 4px
        );
      border-left: 1px solid #005500;
      padding: 20px 16px;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid #005500;
      background: linear-gradient(180deg, #00FF00 0%, #003300 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }

    .control-group {
      margin-bottom: 20px;
    }

    .control-label {
      display: block;
      color: #A0FFA0;
      font-size: 13px;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .control-input {
      width: 100%;
      padding: 8px 10px;
      background: #0A0A0A;
      border: 1px solid #005500;
      border-radius: 3px;
      color: #A0FFA0;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      outline: none;
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .control-input:focus {
      border-color: #00FF00;
      box-shadow: 0 0 8px #00FF0055;
    }

    .control-slider {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: #0A0A0A;
      border: 1px solid #005500;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    .control-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: #00FF00;
      border-radius: 2px;
      cursor: pointer;
      box-shadow: 0 0 6px #00FF0088;
      transition: box-shadow 0.2s ease;
    }

    .control-slider::-webkit-slider-thumb:hover {
      box-shadow: 0 0 12px #00FF00;
    }

    .control-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #00FF00;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      box-shadow: 0 0 6px #00FF0088;
    }

    .control-slider::-moz-range-thumb:hover {
      box-shadow: 0 0 12px #00FF00;
    }

    .slider-value {
      display: inline-block;
      float: right;
      color: #00FF00;
      font-size: 12px;
    }

    .radio-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .radio-option {
      flex: 1;
      min-width: 80px;
      padding: 6px 8px;
      background: #0A0A0A;
      border: 1px solid #005500;
      border-radius: 3px;
      color: #A0FFA0;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      user-select: none;
    }

    .radio-option:hover {
      box-shadow: 0 0 8px #00FF0055;
    }

    .radio-option.active {
      background: #003300;
      border-color: #00FF00;
      color: #00FF00;
      box-shadow: 0 0 8px #00FF0055;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 22px;
      background: #0A0A0A;
      border: 1px solid #005500;
      border-radius: 11px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: #005500;
      border-radius: 50%;
      transition: all 0.2s ease;
    }

    .toggle-switch.active {
      background: #003300;
      border-color: #00FF00;
      box-shadow: 0 0 8px #00FF0055;
    }

    .toggle-switch.active::after {
      left: 24px;
      background: #00FF00;
      box-shadow: 0 0 6px #00FF0088;
    }

    .btn-reset {
      width: 100%;
      padding: 10px;
      background: #0A0A0A;
      border: 1px solid #005500;
      border-radius: 3px;
      color: #A0FFA0;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-reset:hover {
      border-color: #00FF00;
      color: #00FF00;
      box-shadow: 0 0 8px #00FF0055;
    }

    #mobile-toggle {
      display: none;
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 100;
      width: 44px;
      height: 44px;
      background: #121212;
      border: 1px solid #00FF00;
      border-radius: 4px;
      color: #00FF00;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 0 8px #00FF0055;
      align-items: center;
      justify-content: center;
    }

    #panel-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 90;
    }

    #panel-overlay.active {
      display: block;
    }

    @media (max-width: 768px) {
      #control-panel {
        position: fixed;
        top: 0;
        right: -300px;
        height: 100%;
        z-index: 95;
        transition: right 0.3s ease;
      }

      #control-panel.active {
        right: 0;
      }

      #mobile-toggle {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container">
      <canvas id="matrix-canvas"></canvas>
    </div>

    <button id="mobile-toggle" aria-label="Toggle Controls">☰</button>
    <div id="panel-overlay"></div>

    <aside id="control-panel">
      <h1 class="panel-title">Matrix Rain Configurator</h1>

      <div class="control-group">
        <label class="control-label" for="charset-input">Character Set</label>
        <input type="text" id="charset-input" class="control-input" value="" />
      </div>

      <div class="control-group">
        <label class="control-label">
          Fall Speed
          <span class="slider-value" id="speed-value">1.0</span>
        </label>
        <input type="range" id="speed-slider" class="control-slider" min="0.2" max="3.0" step="0.1" value="1.0" />
      </div>

      <div class="control-group">
        <label class="control-label">
          Column Density
          <span class="slider-value" id="density-value">1.0</span>
        </label>
        <input type="range" id="density-slider" class="control-slider" min="0.3" max="2.0" step="0.1" value="1.0" />
      </div>

      <div class="control-group">
        <label class="control-label">Gradient Direction</label>
        <div class="radio-group" id="gradient-group">
          <div class="radio-option active" data-value="vertical">Vertical</div>
          <div class="radio-option" data-value="horizontal">Horizontal</div>
          <div class="radio-option" data-value="diagonal">Diagonal</div>
        </div>
      </div>

      <div class="control-group">
        <div class="toggle-row">
          <label class="control-label" style="margin-bottom: 0;">Background Glow</label>
          <div class="toggle-switch" id="glow-toggle"></div>
        </div>
      </div>

      <div class="control-group" id="glow-intensity-group" style="display: none;">
        <label class="control-label">
          Glow Intensity
          <span class="slider-value" id="glow-value">0.5</span>
        </label>
        <input type="range" id="glow-slider" class="control-slider" min="0.1" max="1.0" step="0.05" value="0.5" />
      </div>

      <div class="control-group">
        <button class="btn-reset" id="reset-btn">↻ Reset All</button>
      </div>
    </aside>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
