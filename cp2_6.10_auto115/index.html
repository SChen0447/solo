<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>中世纪城堡废墟漫游</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #app {
      width: 100vw;
      height: 100vh;
      display: block;
    }

    #control-panel {
      position: fixed;
      top: 24px;
      right: 24px;
      width: 200px;
      padding: 20px;
      background-color: rgba(51, 51, 51, 0.85);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      color: #ffffff;
      z-index: 100;
      user-select: none;
    }

    #control-panel h3 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
    }

    .control-group {
      margin-bottom: 18px;
    }

    .control-group label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
    }

    .control-group .value-display {
      float: right;
      font-size: 12px;
      opacity: 0.8;
    }

    .slider-container {
      position: relative;
      width: 100%;
      height: 20px;
      display: flex;
      align-items: center;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 140px;
      height: 20px;
      background: transparent;
      cursor: pointer;
      margin: 0;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(90deg, #FF8C00 0%, #87CEEB 50%, #2C003E 100%);
    }

    input[type="range"]::-moz-range-track {
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(90deg, #FF8C00 0%, #87CEEB 50%, #2C003E 100%);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ffffff;
      border: none;
      margin-top: -5px;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.8), 0 0 16px rgba(255, 255, 255, 0.4);
      transition: box-shadow 0.2s ease;
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ffffff;
      border: none;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.8), 0 0 16px rgba(255, 255, 255, 0.4);
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 12px rgba(255, 255, 255, 1), 0 0 24px rgba(255, 255, 255, 0.6);
    }

    #intensity-slider::-webkit-slider-runnable-track {
      background: linear-gradient(90deg, #1a1a1a 0%, #ffffff 100%);
    }

    #intensity-slider::-moz-range-track {
      background: linear-gradient(90deg, #1a1a1a 0%, #ffffff 100%);
    }

    #fps-counter {
      position: fixed;
      left: 16px;
      bottom: 16px;
      color: #00FF00;
      font-size: 12px;
      font-family: "Courier New", monospace;
      z-index: 100;
      text-shadow: 0 0 4px rgba(0, 255, 0, 0.5);
    }

    #instructions {
      position: fixed;
      left: 16px;
      top: 16px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
      z-index: 100;
      background-color: rgba(0, 0, 0, 0.4);
      padding: 10px 14px;
      border-radius: 8px;
      line-height: 1.6;
    }

    @media (max-width: 768px) {
      #control-panel,
      #instructions,
      #fps-counter {
        display: none;
      }
    }
  </style>
</head>
<body>
  <canvas id="app"></canvas>

  <div id="instructions">
    WASD 移动 | 鼠标拖拽旋转视角
  </div>

  <div id="control-panel">
    <h3>光照控制</h3>
    <div class="control-group">
      <label>
        时间
        <span class="value-display" id="time-value">0.50</span>
      </label>
      <div class="slider-container">
        <input type="range" id="time-slider" min="0" max="1" step="0.01" value="0.5" />
      </div>
    </div>
    <div class="control-group">
      <label>
        光照强度
        <span class="value-display" id="intensity-value">1.00</span>
      </label>
      <div class="slider-container">
        <input type="range" id="intensity-slider" min="0" max="2" step="0.01" value="1" />
      </div>
    </div>
  </div>

  <div id="fps-counter">--</div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
