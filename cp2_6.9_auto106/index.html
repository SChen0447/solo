<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eye-Tracking Racing Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0B0E14;
      font-family: monospace;
      min-width: 1280px;
      min-height: 720px;
    }

    #gameCanvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background-color: #0B0E14;
    }

    #cameraStream {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 320px;
      height: 240px;
    }

    #bottomHud {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 12px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 6px;
      overflow: hidden;
    }

    #progressFill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00E5FF, #00B4D8);
      border-radius: 6px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { filter: brightness(1.0); }
      50% { filter: brightness(0.7); }
    }

    #gameOverlay {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.8);
      border-radius: 16px;
      padding: 40px 60px;
      text-align: center;
      color: white;
      z-index: 10;
    }

    #gameOverlay h2 {
      font-size: 32px;
      margin-bottom: 20px;
      color: #00E5FF;
      text-shadow: 0 0 8px #00E5FF;
    }

    #finalScore {
      font-size: 24px;
      margin-bottom: 30px;
      color: #FFD700;
    }

    #restartBtn {
      padding: 12px 32px;
      font-size: 18px;
      font-family: monospace;
      background: #2A3B4C;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    #restartBtn:hover {
      background: #3A4B5C;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <video id="cameraStream" autoplay playsinline muted></video>
  <div id="bottomHud">
    <div id="progressFill"></div>
  </div>
  <div id="gameOverlay">
    <h2 id="overlayTitle">Game Over</h2>
    <div id="finalScore">Score: 0</div>
    <button id="restartBtn">重新开始</button>
  </div>
  <script type="module" src="/src/game.ts"></script>
</body>
</html>
