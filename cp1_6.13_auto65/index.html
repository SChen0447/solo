<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>浮光掠影 - 键盘音效可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0e27;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #1a1f4a 0%, #0a0e27 100%);
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-ring {
      width: 80px;
      height: 80px;
      border: 4px solid transparent;
      border-top: 4px solid #00e5ff;
      border-right: 4px solid #ff4081;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #mainCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    #waveformContainer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 40px;
      z-index: 10;
      opacity: 0.7;
      transition: opacity 0.2s ease-out, transform 0.2s ease-out;
    }

    #waveformContainer:hover {
      opacity: 1;
      transform: scaleY(1.05);
    }

    #waveformCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loading-ring"></div>
  </div>
  <div id="app">
    <canvas id="mainCanvas"></canvas>
    <div id="waveformContainer">
      <canvas id="waveformCanvas"></canvas>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
