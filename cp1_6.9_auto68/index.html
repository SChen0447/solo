<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>太空海盗 - Space Pirate</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      background: #0b0b2b;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .game-title {
      color: #ffd700;
      font-size: 32px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
      margin-bottom: 16px;
      letter-spacing: 4px;
      image-rendering: pixelated;
    }
    #game-container {
      border: 4px solid #3333aa;
      box-shadow: 0 0 30px rgba(100, 100, 255, 0.4);
    }
  </style>
</head>
<body>
  <h1 class="game-title">★ SPACE PIRATE ★</h1>
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
