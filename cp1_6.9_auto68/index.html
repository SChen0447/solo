<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>彩色玻璃百叶窗光影投射</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a1a;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    #ui-panel {
      position: fixed;
      top: 16px;
      left: 16px;
      padding: 14px 18px;
      background: rgba(26, 26, 26, 0.75);
      color: #ffffff;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.8;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 10;
      backdrop-filter: blur(6px);
    }
    #ui-panel .label {
      color: #88ccff;
    }
    #flash-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #ffffff;
      opacity: 0;
      pointer-events: none;
      z-index: 20;
      transition: opacity 0.08s ease-out;
    }
    #controls-hint {
      position: fixed;
      bottom: 16px;
      left: 16px;
      padding: 10px 14px;
      background: rgba(26, 26, 26, 0.75);
      color: #cccccc;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.7;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 10;
    }
    #controls-hint b {
      color: #ffcc33;
    }
  </style>
</head>
<body>
  <div id="ui-panel">
    <div><span class="label">光源位置 (X, Y, Z):</span> <span id="light-pos">0.00, 0.00, 4.00</span></div>
    <div><span class="label">窗叶平均角度:</span> <span id="blind-angle">0.0°</span></div>
    <div><span class="label">地面光斑数量:</span> <span id="spot-count">0</span></div>
    <div><span class="label">当前帧率:</span> <span id="fps">60</span> FPS</div>
  </div>
  <div id="controls-hint">
    <div><b>Q / E</b> 旋转窗叶角度</div>
    <div><b>鼠标拖拽</b> 移动光源位置 (X, Y)</div>
    <div><b>滚轮</b> 调整光源距离 (Z)</div>
    <div><b>R</b> 随机重置窗叶颜色</div>
  </div>
  <div id="flash-overlay"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
