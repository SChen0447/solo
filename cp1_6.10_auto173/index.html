<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>光之生物 - Light Creature</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Quicksand', sans-serif;
    }

    #game-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    #game-canvas {
      display: block;
      cursor: crosshair;
      box-shadow: 0 0 60px rgba(79, 195, 247, 0.15);
    }

    #ui-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    .control-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 200px;
      padding: 16px;
      background: rgba(20, 20, 40, 0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid #4fc3f7;
      border-radius: 12px;
      pointer-events: auto;
    }

    .panel-title {
      color: #4fc3f7;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .slider-group {
      margin-bottom: 14px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .slider-label span:first-child {
      color: rgba(255, 255, 255, 0.85);
      font-size: 12px;
    }

    .slider-label span:last-child {
      color: #fff;
      font-size: 12px;
      font-weight: 500;
      text-align: right;
      min-width: 32px;
    }

    .slider-group input[type="range"] {
      width: 150px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(79, 195, 247, 0.2);
      border-radius: 2px;
      outline: none;
    }

    .slider-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #4fc3f7;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(79, 195, 247, 0.6);
      transition: transform 0.15s ease;
    }

    .slider-group input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .slider-group input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #4fc3f7;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 8px rgba(79, 195, 247, 0.6);
    }

    .button-group {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      pointer-events: auto;
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 14px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .icon-btn:hover {
      background: rgba(79, 195, 247, 0.3);
      color: #fff;
    }

    .icon-btn:active {
      transform: scale(0.9);
    }

    .icon-btn.active {
      background: rgba(79, 195, 247, 0.5);
      color: #fff;
      box-shadow: 0 0 10px rgba(79, 195, 247, 0.4);
    }

    .icon-btn svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
  </div>
  <div id="ui-overlay"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
