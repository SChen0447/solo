<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>城市交通流量模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    .status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 36px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 20px;
      font-size: 13px;
      gap: 30px;
      z-index: 10;
    }

    .status-bar .item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-bar .label {
      color: #aaa;
    }

    .status-bar .value {
      color: #4fc3f7;
      font-weight: 600;
    }

    .control-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 260px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: 20px;
      color: #fff;
      z-index: 20;
      transition: all 0.3s ease;
    }

    .control-panel h2 {
      font-size: 16px;
      margin-bottom: 16px;
      font-weight: 600;
      color: #fff;
    }

    .panel-section {
      margin-bottom: 16px;
    }

    .panel-section:last-child {
      margin-bottom: 0;
    }

    .panel-label {
      font-size: 12px;
      color: #bbb;
      margin-bottom: 8px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .stat-value {
      font-weight: 600;
      color: #4fc3f7;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 6px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s ease, background 0.3s ease;
      background: linear-gradient(90deg, #4caf50, #ff9800, #f44336);
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      width: 100%;
      padding: 10px 16px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .btn:hover {
      background: rgba(33, 150, 243, 0.3);
      border-color: rgba(33, 150, 243, 0.6);
    }

    .btn.active {
      background: rgba(33, 150, 243, 0.4);
      border-color: #2196f3;
    }

    .hamburger {
      display: none;
      position: fixed;
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      cursor: pointer;
      z-index: 30;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 4px;
    }

    .hamburger span {
      width: 20px;
      height: 2px;
      background: #fff;
      border-radius: 1px;
      transition: all 0.3s ease;
    }

    .hamburger.active span:nth-child(1) {
      transform: translateY(6px) rotate(45deg);
    }

    .hamburger.active span:nth-child(2) {
      opacity: 0;
    }

    .hamburger.active span:nth-child(3) {
      transform: translateY(-6px) rotate(-45deg);
    }

    .signal-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .signal-red { background: #f44336; box-shadow: 0 0 8px #f44336; }
    .signal-yellow { background: #ffeb3b; box-shadow: 0 0 8px #ffeb3b; }
    .signal-green { background: #4caf50; box-shadow: 0 0 8px #4caf50; }

    @media (max-width: 1024px) {
      .control-panel {
        position: fixed;
        top: 70px;
        right: 20px;
        left: auto;
        width: 240px;
        transform: translateX(calc(100% + 30px));
        opacity: 0;
        pointer-events: none;
      }

      .control-panel.open {
        transform: translateX(0);
        opacity: 1;
        pointer-events: auto;
      }

      .hamburger {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    
    <div class="hamburger" id="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <div class="control-panel" id="control-panel">
      <h2>交通流量模拟器</h2>
      
      <div class="panel-section">
        <div class="panel-label">实时统计</div>
        <div class="stat-row">
          <span>车辆总数</span>
          <span class="stat-value" id="vehicle-count">0</span>
        </div>
        <div class="stat-row">
          <span>平均等待时间</span>
          <span class="stat-value" id="avg-wait">0s</span>
        </div>
        <div class="stat-row">
          <span>信号灯模式</span>
          <span class="stat-value" id="signal-mode">自动</span>
        </div>
        <div class="panel-label" style="margin-top: 10px;">拥堵程度</div>
        <div class="progress-bar">
          <div class="progress-fill" id="congestion-bar" style="width: 0%;"></div>
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-label">信号灯状态</div>
        <div class="stat-row">
          <span><span class="signal-indicator signal-green" id="h-signal-indicator"></span>横向道路</span>
          <span class="stat-value" id="h-signal-state">绿灯</span>
        </div>
        <div class="stat-row">
          <span><span class="signal-indicator signal-red" id="v-signal-indicator"></span>纵向道路</span>
          <span class="stat-value" id="v-signal-state">红灯</span>
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-label">控制</div>
        <div class="btn-group">
          <button class="btn" id="btn-toggle-mode">切换手动模式</button>
          <button class="btn" id="btn-reset">重置模拟</button>
        </div>
      </div>
    </div>

    <div class="status-bar">
      <div class="item">
        <span class="label">FPS:</span>
        <span class="value" id="fps-value">0</span>
      </div>
      <div class="item">
        <span class="label">车辆数:</span>
        <span class="value" id="vehicle-count-bottom">0</span>
      </div>
      <div class="item">
        <span class="label">提示:</span>
        <span>按住鼠标左键拖拽旋转视角 | 点击信号灯切换手动模式</span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
