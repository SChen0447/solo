<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0a0e27" />
    <meta name="description" content="星际争霸2智能复盘分析系统 - 对战进程可视化工具" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>SC2 Replay Analyzer | 星际争霸2智能复盘系统</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; background: #0a0e27; }
      body { font-family: 'Noto Sans SC', 'JetBrains Mono', sans-serif; color: #e0e7ff; overflow-x: hidden; }
      .initial-loader {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: radial-gradient(ellipse at center, #141a3a 0%, #0a0e27 100%);
        z-index: 9999; flex-direction: column; gap: 24px;
      }
      .initial-loader h1 {
        font-family: 'Orbitron', sans-serif; font-size: 32px; font-weight: 800;
        background: linear-gradient(135deg, #00d4aa, #00a3ff, #7c3aed);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        letter-spacing: 4px;
      }
      .loader-bar { width: 200px; height: 3px; background: rgba(0,212,170,0.15); border-radius: 2px; overflow: hidden; }
      .loader-bar::after {
        content: ''; display: block; width: 40%; height: 100%;
        background: linear-gradient(90deg, transparent, #00d4aa, transparent);
        animation: load 1.2s ease-in-out infinite;
      }
      @keyframes load { 0% { transform: translateX(-100%);} 100% { transform: translateX(350%);} }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader">
        <h1>SC2 REPLAY ANALYZER</h1>
        <div class="loader-bar"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
