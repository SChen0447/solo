<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>水舞·咖啡</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #1B0000;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-width: 800px;
      background: linear-gradient(180deg, #3E2723 0%, #1B0000 100%);
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      min-width: 800px;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .title {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 36px;
      font-weight: bold;
      color: #D7CCC8;
      letter-spacing: 8px;
      pointer-events: none;
      z-index: 10;
      background: linear-gradient(90deg, #D7CCC8 0%, #D7CCC8 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      transition: all 0.3s ease-out;
    }

    .title.shine {
      background: linear-gradient(90deg, #D7CCC8 0%, #FFD54F 30%, #FFD54F 50%, #D7CCC8 70%, #D7CCC8 100%);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 0.3s ease-out;
    }

    @keyframes shine {
      0% {
        background-position: 100% 0;
      }
      100% {
        background-position: -100% 0;
      }
    }

    .hint {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: rgba(215, 204, 200, 0.6);
      letter-spacing: 2px;
      pointer-events: none;
      z-index: 10;
    }

    .badge {
      position: absolute;
      top: 60px;
      left: 60px;
      width: 60px;
      height: 60px;
      opacity: 0;
      transition: opacity 0.5s ease-out;
      pointer-events: none;
      z-index: 20;
    }

    .badge.show {
      opacity: 1;
      animation: badge-spin 2s linear infinite;
    }

    @keyframes badge-spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="title" id="title">水舞·咖啡</div>
    <canvas id="canvas"></canvas>
    <div class="hint">按任意字母键注水 · 长按连续注水</div>
    <svg class="badge" id="badge" viewBox="0 0 60 60">
      <defs>
        <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#FFD54F"/>
          <stop offset="100%" stop-color="#FF8F00"/>
        </linearGradient>
      </defs>
      <path d="M15 18 h30 a2 2 0 0 1 2 2 v12 a15 15 0 0 1 -15 15 a15 15 0 0 1 -15 -15 v-12 a2 2 0 0 1 2 -2 z" 
            fill="none" stroke="url(#badgeGrad)" stroke-width="2.5"/>
      <ellipse cx="30" cy="18" rx="15" ry="4" fill="none" stroke="url(#badgeGrad)" stroke-width="2.5"/>
      <path d="M45 25 h6 a6 6 0 0 1 0 12 h-6" fill="none" stroke="url(#badgeGrad)" stroke-width="2.5"/>
      <ellipse cx="30" cy="30" rx="10" ry="2" fill="#5D4037" opacity="0.6"/>
      <path d="M22 14 q8 -6 16 0" fill="none" stroke="url(#badgeGrad)" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
