<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>氢原子分子轨道可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0A0A1A;
      color: #AABBCC;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .dg.ac {
      z-index: 100 !important;
    }

    .dg.main {
      background: rgba(34, 34, 51, 0.85) !important;
      backdrop-filter: blur(8px);
      border-radius: 8px;
      overflow: hidden;
    }

    .dg .c .slider {
      background: rgba(50, 50, 80, 0.6) !important;
      border-radius: 4px;
    }

    .dg .c .slider-fg {
      background: linear-gradient(90deg, #4488FF, #88AAFF) !important;
      border-radius: 4px;
    }

    .dg .c input[type=text] {
      background: rgba(40, 40, 65, 0.8) !important;
      border: 1px solid rgba(100, 100, 150, 0.3) !important;
      color: #AABBCC !important;
      border-radius: 4px;
    }

    .dg li.title {
      background: rgba(60, 60, 100, 0.6) !important;
      color: #CCDDEE !important;
      font-weight: 600;
    }

    .dg .cr.number,
    .dg .cr.string,
    .dg .cr.boolean,
    .dg .cr.function {
      border-left: 3px solid #4488FF !important;
    }

    .dg li:not(.folder) {
      background: rgba(34, 34, 51, 0.5) !important;
      border-bottom: 1px solid rgba(60, 60, 90, 0.3) !important;
    }

    .dg .property-name {
      color: #AABBCC !important;
    }

    #info-panel {
      position: absolute;
      bottom: 20px;
      left: 20px;
      padding: 12px 16px;
      background: rgba(34, 34, 51, 0.85);
      backdrop-filter: blur(8px);
      border-radius: 8px;
      border: 1px solid rgba(100, 120, 180, 0.3);
      font-size: 12px;
      line-height: 1.8;
      z-index: 50;
      max-width: 280px;
    }

    #info-panel h3 {
      color: #CCDDEE;
      margin-bottom: 6px;
      font-size: 13px;
    }

    #info-panel kbd {
      display: inline-block;
      padding: 1px 6px;
      background: rgba(68, 136, 255, 0.3);
      border: 1px solid rgba(68, 136, 255, 0.5);
      border-radius: 3px;
      color: #CCDDEE;
      font-family: monospace;
      font-size: 11px;
      margin: 0 2px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="info-panel">
      <h3>操作说明</h3>
      <div><kbd>鼠标拖拽</kbd> 旋转视角</div>
      <div><kbd>滚轮</kbd> 缩放</div>
      <div><kbd>W</kbd> 切换线框模式</div>
      <div><kbd>S</kbd> 切换旋转模式</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
