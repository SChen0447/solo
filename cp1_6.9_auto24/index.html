<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>声波水晶 · Sonic Crystal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #1a0030 0%, #000010 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #ffffff;
    }
    #game-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    #hud {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: none;
      user-select: none;
    }
    .energy-ring-wrap {
      position: relative;
      width: 60px;
      height: 60px;
    }
    .energy-ring-wrap svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }
    .energy-ring-bg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.1);
      stroke-width: 4;
    }
    .energy-ring-fg {
      fill: none;
      stroke: url(#energyGradient);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 169.65;
      stroke-dashoffset: 169.65;
      transition: stroke-dashoffset 0.1s linear;
    }
    .energy-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 13px;
      font-weight: 600;
      color: #ffffff;
      text-shadow: 0 0 6px rgba(255, 0, 255, 0.8);
    }
    .crystal-count {
      font-size: 16px;
      color: #ffffff;
      text-shadow: 0 0 8px rgba(142, 45, 226, 0.8);
      letter-spacing: 1px;
    }
    #hint {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 1.5pxpx;
      z-index: 10;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <div id="hud">
    <div class="energy-ring-wrap">
      <svg viewBox="0 0 60 60">
        <defs>
          <linearGradient id="energyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ff00ff" />
            <stop offset="100%" stop-color="#00ffff" />
          </linearGradient>
        </defs>
        <circle class="energy-ring-bg" cx="30" cy="30" r="27" />
        <circle id="energyRing" class="energy-ring-fg" cx="30" cy="30" r="27" />
      </svg>
      <span id="energyText" class="energy-text">0</span>
    </div>
    <div id="crystalCount" class="crystal-count">水晶 0/10</div>
  </div>

  <div id="hint">鼠标点击 或 按空格键 发射声波</div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
