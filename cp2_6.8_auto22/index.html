<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2D草图转3D地形生成器</title>
  <script type="module" src="/src/main.ts"></script>
  <style>
    :root {
      --primary-bg: #0d1b2a;
      --secondary-bg: rgba(255, 255, 255, 0.08);
      --accent-start: #415a77;
      --accent-end: #778da9;
      --text-primary: #e0e1dd;
      --text-secondary: #a0aec0;
      --border-color: rgba(255, 255, 255, 0.1);
      --glow-color: rgba(119, 141, 169, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--primary-bg);
      color: var(--text-primary);
      user-select: none;
    }

    #app {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      background: var(--secondary-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent-end), #a8dadc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.5px;
    }

    .header .subtitle {
      margin-left: 16px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    #main-container {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    #left-panel {
      flex: 0 0 40%;
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 20px;
      overflow: hidden;
    }

    .toolbar-panel {
      flex-shrink: 0;
      background: var(--secondary-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid var(--border-color);
    }

    .tool-panel {
      flex-shrink: 0;
      background: var(--secondary-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid var(--border-color);
    }

    .tool-panel h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tool-panel h3::before {
      content: '';
      width: 3px;
      height: 16px;
      background: linear-gradient(180deg, var(--accent-start), var(--accent-end));
      border-radius: 2px;
    }

    .control-group {
      margin-bottom: 16px;
    }

    .control-group {
      margin-bottom: 16px;
    }

    .control-group:last-child {
      margin-bottom: 0;
    }

    .control-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .control-label .value {
      color: var(--accent-end);
      font-weight: 500;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px var(--glow-color);
      transition: transform 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .color-picker {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .color-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }

    .color-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 2px 10px var(--glow-color);
    }

    .color-btn.active {
      border-color: var(--accent-end);
      box-shadow: 0 0 0 2px var(--primary-bg), 0 0 0 4px var(--accent-end);
    }

    .light-mode-buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .light-mode-btn {
      padding: 10px 14px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .light-mode-btn:hover {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
    }

    .light-mode-btn.active {
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      color: white;
      border-color: transparent;
    }

    .light-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 15px rgba(65, 90, 119, 0.3);
    }

    .btn:hover {
      filter: brightness(1.2);
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(65, 90, 119, 0.4);
    }

    .btn:active {
      transform: scale(0.98);
      box-shadow: 0 2px 8px rgba(65, 90, 119, 0.3);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      box-shadow: none;
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .canvas-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--secondary-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 12px;
      border: 1px solid var(--border-color);
      overflow: hidden;
      position: relative;
      min-height: 300px;
    }

    #drawing-canvas {
      background: white;
      cursor: crosshair;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      border-radius: 4px;
      max-width: 100%;
      max-height: 100%;
    }

    .canvas-label {
      position: absolute;
      top: 12px;
      left: 16px;
      font-size: 12px;
      color: var(--text-secondary);
      background: rgba(13, 27, 42, 0.8);
      padding: 4px 10px;
      border-radius: 4px;
      backdrop-filter: blur(8px);
    }

    #splitter {
      width: 4px;
      background: var(--border-color);
      cursor: col-resize;
      flex-shrink: 0;
      transition: background 0.2s ease;
      position: relative;
      z-index: 10;
    }

    #splitter:hover {
      background: var(--accent-end);
    }

    #splitter::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 2px;
      height: 40px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 1px;
    }

    #right-panel {
      flex: 0 0 60%;
      position: relative;
      overflow: hidden;
    }

    #viewport {
      width: 100%;
      height: 100%;
    }

    #viewport canvas {
      display: block;
    }

    .viewport-hint {
      position: absolute;
      bottom: 16px;
      right: 16px;
      font-size: 11px;
      color: var(--text-secondary);
      background: rgba(13, 27, 42, 0.7);
      padding: 6px 12px;
      border-radius: 6px;
      backdrop-filter: blur(8px);
      pointer-events: none;
    }

    .mobile-toolbar {
      display: none;
    }

    @media (max-width: 768px) {
      #main-container {
        flex-direction: column;
      }

      #left-panel {
        flex: none;
        height: auto;
        padding: 12px;
        gap: 12px;
      }

      .tool-panel {
        display: none;
      }

      .canvas-container {
        min-height: 200px;
        height: 40vh;
      }

      #splitter {
        display: none;
      }

      #right-panel {
        flex: 1;
        min-height: 0;
      }

      .mobile-toolbar {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--secondary-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 12px 16px;
        gap: 10px;
        border-top: 1px solid var(--border-color);
        z-index: 100;
        overflow-x: auto;
      }

      .mobile-toolbar .btn {
        flex-shrink: 0;
        padding: 10px 16px;
        font-size: 12px;
      }

      .header {
        padding: 0 16px;
        height: 50px;
      }

      .header h1 {
        font-size: 15px;
      }

      .header .subtitle {
        display: none;
      }

      body {
        padding-bottom: 60px;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .tool-panel, .canvas-container {
      animation: fadeIn 0.3s ease-out;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <h1>⛰️ 草图转地形</h1>
      <span class="subtitle">2D Sketch to 3D Terrain Generator</span>
    </div>

    <div id="main-container">
      <div id="left-panel">
        <div class="canvas-container">
          <span class="canvas-label">绘制区域 - 笔触颜色越深，地形越高</span>
          <canvas id="drawing-canvas"></canvas>
        </div>

        <div class="tool-panel">
          <h3>画笔设置</h3>
          <div class="control-group">
            <div class="control-label">
              <span>笔刷大小</span>
              <span class="value" id="brush-size-value">20px</span>
            </div>
            <input type="range" id="brush-size" min="5" max="60" value="20">
          </div>
          <div class="control-group">
            <div class="control-label">
              <span>笔触颜色（高度）</span>
            </div>
            <div class="color-picker">
              <button class="color-btn active" data-color="#000000" style="background: #000000;" title="最高"></button>
              <button class="color-btn" data-color="#333333" style="background: #333333;" title="高"></button>
              <button class="color-btn" data-color="#666666" style="background: #666666;" title="中高"></button>
              <button class="color-btn" data-color="#999999" style="background: #999999;" title="中"></button>
              <button class="color-btn" data-color="#cccccc" style="background: #cccccc;" title="低"></button>
              <button class="color-btn" data-color="#ffffff" style="background: #ffffff; border: 1px solid #ccc;" title="最低"></button>
            </div>
          </div>
        </div>

        <div class="tool-panel">
          <h3>光照模式</h3>
          <div class="light-mode-buttons">
            <button class="light-mode-btn active" data-mode="day">
              <span class="light-icon" style="background: radial-gradient(circle, #fff 0%, #87ceeb 100%;"></span>
              <span>☀️ 日光顶光</span>
            </button>
            <button class="light-mode-btn" data-mode="sunset">
              <span class="light-icon" style="background: radial-gradient(circle, #ffa500 0%, #ff6b35 100%;"></span>
              <span>🌅 黄昏侧光</span>
            </button>
            <button class="light-mode-btn" data-mode="night">
              <span class="light-icon" style="background: radial-gradient(circle, #6495ed 0%, #1a1a2e 100%;"></span>
              <span>🌙 夜间点光</span>
            </button>
          </div>
        </div>

        <div class="tool-panel">
          <h3>操作</h3>
          <div class="action-buttons">
            <button class="btn" id="export-btn">📦 导出 OBJ</button>
            <button class="btn btn-secondary" id="clear-btn">🗑️ 清除画布</button>
          </div>
        </div>
      </div>

      <div id="splitter"></div>

      <div id="right-panel">
        <div id="viewport"></div>
        <div class="viewport-hint">左键拖拽旋转 · 滚轮缩放</div>
      </div>
    </div>

    <div class="mobile-toolbar">
      <button class="btn" id="export-btn-mobile">📦 导出</button>
      <button class="btn btn-secondary" id="clear-btn-mobile">🗑️ 清除</button>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var exportMobile = document.getElementById('export-btn-mobile');
      var clearMobile = document.getElementById('clear-btn-mobile');
      var exportBtn = document.getElementById('export-btn');
      var clearBtn = document.getElementById('clear-btn');

      if (exportMobile && exportBtn) {
        exportMobile.addEventListener('click', function() {
          exportBtn.click();
        });
      }
      if (clearMobile && clearBtn) {
        clearMobile.addEventListener('click', function() {
          clearBtn.click();
        });
      }
    });
  </script>
</body>
</html>
