<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visual Piano - 可视化钢琴</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0F0F23;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #E0E0FF;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    #canvas {
      flex: 1;
      display: block;
      width: 100%;
      height: 100%;
    }

    #controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 30px;
      z-index: 10;
      pointer-events: none;
    }

    #scroll-slider {
      width: 80%;
      max-width: 800px;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: #2A2A4C;
      border-radius: 8px;
      outline: none;
      cursor: pointer;
      pointer-events: auto;
    }

    #scroll-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #6C63FF;
      cursor: pointer;
      box-shadow: 0 0 15px #6C63FF, 0 0 30px rgba(108, 99, 255, 0.5);
      border: none;
      transition: transform 0.15s ease;
    }

    #scroll-slider::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    #scroll-slider::-webkit-slider-thumb:active {
      transform: scale(0.95);
    }

    #scroll-slider::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #6C63FF;
      cursor: pointer;
      box-shadow: 0 0 15px #6C63FF, 0 0 30px rgba(108, 99, 255, 0.5);
      border: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="canvas"></canvas>
    <div id="controls">
      <input type="range" id="scroll-slider" min="0" max="100" value="0" />
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
