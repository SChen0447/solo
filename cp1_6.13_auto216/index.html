<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0e27" />
  <title>流韵·墨染 - 交互式数字流体画布</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #0a0e27 0%, #1a1a3e 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                   "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #fff;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #fluid-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      cursor: crosshair;
    }

    .toolbar {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tool-btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: rgba(255, 255, 255, 0.9);
      cursor: pointer;
      transition: none;
      overflow: hidden;
    }

    .tool-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%),
                  rgba(255, 255, 255, 0.25), transparent 60%);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .tool-btn:hover::before {
      opacity: 1;
    }

    .tool-btn svg {
      width: 22px;
      height: 22px;
      stroke-width: 1.8;
      pointer-events: none;
    }

    .title-tag {
      position: fixed;
      left: 24px;
      top: 24px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 4px;
      pointer-events: none;
    }

    .title-tag .main-title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #48dbfb, #ff9ff3, #feca57);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: 0.9;
    }

    .title-tag .sub-title {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 3px;
    }

    .hint-tag {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      pointer-events: none;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.25);
      letter-spacing: 4px;
      text-align: center;
      line-height: 2;
      transition: opacity 1s ease;
    }

    .hint-tag.fade {
      opacity: 0;
    }

    @media (max-width: 768px) {
      .toolbar {
        right: 16px;
        bottom: 16px;
        gap: 6px;
      }

      .tool-btn {
        width: 40px;
        height: 40px;
        border-radius: 10px;
      }

      .tool-btn svg {
        width: 18px;
        height: 18px;
      }

      .title-tag {
        left: 16px;
        top: 16px;
      }

      .title-tag .main-title {
        font-size: 16px;
        letter-spacing: 1.5px;
      }

      .title-tag .sub-title {
        font-size: 10px;
        letter-spacing: 2px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="fluid-canvas"></canvas>

    <div class="title-tag">
      <div class="main-title">流韵 · 墨染</div>
      <div class="sub-title">INK · FLUID · CANVAS</div>
    </div>

    <div class="hint-tag" id="hint">
      点击生成漩涡 · 拖拽留下光痕 · 长按注入粒子
    </div>

    <div class="toolbar">
      <button class="tool-btn" id="btn-clear" aria-label="清除画布" title="清除画布">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14z"/>
        </svg>
      </button>

      <button class="tool-btn" id="btn-save" aria-label="保存作品" title="保存作品">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
        </svg>
      </button>

      <button class="tool-btn" id="btn-pause" aria-label="暂停/继续" title="暂停/继续">
        <svg id="icon-pause" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <rect x="6" y="4" width="4" height="16" rx="1"/>
          <rect x="14" y="4" width="4" height="16" rx="1"/>
        </svg>
        <svg id="icon-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <polygon points="6 4 20 12 6 20 6 4"/>
        </svg>
      </button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
