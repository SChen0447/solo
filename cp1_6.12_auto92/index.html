<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=768px" />
    <title>Audio Particle Sculpture</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: linear-gradient(180deg, #0D1117 0%, #1A1A2E 100%);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }

      #canvas-container {
        width: 100%;
        height: 100%;
      }

      .control-panel {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-radius: 16px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        z-index: 100;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .waveform-canvas {
        width: 200px;
        height: 100px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.3);
      }

      .controls-row {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .record-button {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        background: #FF4444;
        transition: all 0.3s ease;
        box-shadow: 0 2px 10px rgba(255, 68, 68, 0.4);
        position: relative;
        flex-shrink: 0;
      }

      .record-button.recording {
        background: #44FF44;
        box-shadow: 0 2px 10px rgba(68, 255, 68, 0.4);
      }

      .record-button:hover {
        transform: scale(1.1);
        box-shadow: 0 4px 20px rgba(255, 68, 68, 0.6);
      }

      .record-button.recording:hover {
        box-shadow: 0 4px 20px rgba(68, 255, 68, 0.6);
      }

      .record-button::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 12px;
        height: 12px;
        background: white;
        border-radius: 2px;
        opacity: 0.8;
      }

      .record-button.recording::after {
        border-radius: 50%;
        width: 14px;
        height: 14px;
      }

      .volume-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .volume-label {
        color: rgba(255, 255, 255, 0.6);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .volume-bar {
        width: 200px;
        height: 6px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
        overflow: hidden;
      }

      .volume-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #00FF00 0%, #FFFF00 50%, #FF0000 100%);
        border-radius: 3px;
        transition: width 0.05s linear;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="canvas-container"></div>
      <div class="control-panel">
        <canvas class="waveform-canvas" id="waveform" width="200" height="100"></canvas>
        <div class="controls-row">
          <button class="record-button" id="recordBtn" title="开始/停止录制"></button>
          <div class="volume-container">
            <span class="volume-label">Volume</span>
            <div class="volume-bar">
              <div class="volume-fill" id="volumeFill"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
