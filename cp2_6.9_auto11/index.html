<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>虚拟3D艺术画廊</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #ffffff;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #canvas-container canvas {
      display: block;
    }

    .view-controls {
      position: fixed;
      top: 24px;
      right: 24px;
      display: flex;
      gap: 12px;
      z-index: 100;
    }

    .view-btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(26, 26, 46, 0.7);
      color: #ffffff;
      font-size: 14px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 12px rgba(184, 150, 79, 0.15);
      transition: opacity 0.3s ease, background 0.3s ease,
        box-shadow 0.3s ease;
      opacity: 0.85;
    }

    .view-btn:hover {
      opacity: 1;
      background: rgba(45, 45, 68, 0.9);
      box-shadow: 0 0 18px rgba(184, 150, 79, 0.35);
    }

    .speed-control {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 100;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(26, 26, 46, 0.7);
      backdrop-filter: blur(8px);
      opacity: 0.85;
      transition: opacity 0.3s ease;
    }

    .speed-control:hover {
      opacity: 1;
    }

    .speed-control label {
      display: block;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 6px;
    }

    .speed-control input[type="range"] {
      width: 140px;
      cursor: pointer;
      accent-color: #b8964f;
    }

    .speed-value {
      display: inline-block;
      margin-left: 8px;
      font-size: 13px;
      color: #b8964f;
      font-weight: 600;
      min-width: 20px;
      text-align: center;
    }

    .stats-panel {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 100;
      padding: 10px 14px;
      border-radius: 6px;
      background: rgba(26, 26, 46, 0.6);
      backdrop-filter: blur(6px);
      font-size: 12px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.75);
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
      opacity: 0.9;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .stats-panel:hover {
      opacity: 1;
    }

    .stats-fps {
      color: #7fff7f;
      font-weight: 600;
    }

    .stats-coord {
      color: #87ceeb;
      font-family: "Consolas", "Monaco", monospace;
    }

    .artwork-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .artwork-modal.active {
      display: flex;
    }

    .modal-panel {
      position: relative;
      width: 450px;
      max-height: 600px;
      padding: 32px 36px;
      border-radius: 14px;
      background: rgba(45, 45, 68, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5),
        0 0 30px rgba(184, 150, 79, 0.12);
      overflow-y: auto;
      transform: translateY(20px);
      opacity: 0;
      animation: fadeInUp 0.4s ease forwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 18px;
      width: 30px;
      height: 30px;
      border: none;
      background: transparent;
      color: rgba(255, 255, 255, 0.6);
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      border-radius: 50%;
      transition: background 0.3s ease, color 0.3s ease;
      opacity: 0.7;
    }

    .modal-close:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
      opacity: 1;
    }

    .modal-title {
      font-size: 24px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 8px;
      padding-right: 36px;
    }

    .modal-author {
      font-size: 14px;
      color: #b8964f;
      margin-bottom: 20px;
      font-style: italic;
    }

    .modal-divider {
      height: 1px;
      background: linear-gradient(
        to right,
        transparent,
        rgba(255, 255, 255, 0.2),
        transparent
      );
      margin-bottom: 20px;
    }

    .modal-description {
      font-size: 14px;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.8);
    }

    .hint-text {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 100;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      opacity: 0.7;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .hint-text:hover {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div class="speed-control">
    <label>移动速度 <span class="speed-value" id="speed-value">2.5</span></label>
    <input type="range" id="speed-slider" min="1" max="5" step="0.1" value="2.5" />
  </div>

  <div class="view-controls">
    <button class="view-btn" id="btn-overview">全景俯瞰</button>
    <button class="view-btn" id="btn-center">中央环视</button>
  </div>

  <div class="stats-panel">
    <div>FPS: <span class="stats-fps" id="fps-counter">60</span></div>
    <div>坐标: <span class="stats-coord" id="coord-display">X: 0.00 Y: 1.70 Z: 0.00</span></div>
  </div>

  <div class="hint-text">WASD 移动 · 鼠标拖拽旋转 · 点击画框查看详情 · ESC 关闭</div>

  <div class="artwork-modal" id="artwork-modal">
    <div class="modal-panel">
      <button class="modal-close" id="modal-close">&times;</button>
      <h2 class="modal-title" id="modal-title">作品名称</h2>
      <p class="modal-author" id="modal-author">作者</p>
      <div class="modal-divider"></div>
      <p class="modal-description" id="modal-description">作品描述...</p>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
