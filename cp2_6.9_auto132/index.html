<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星空粒子流场导航仪表盘</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #0a0a2e 0%, #1a1a3e 100%);
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #scene-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    #dashboard {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      height: 120px;
      background: rgba(10, 10, 30, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 16px;
      border: 1px solid rgba(224, 247, 250, 0.15);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #E0F7FA;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .gauge-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #heading-canvas {
      width: 180px;
      height: 80px;
    }

    .stats-section {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      min-width: 140px;
    }

    .stat-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-label {
      font-size: 12px;
      opacity: 0.7;
      letter-spacing: 1px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: bold;
      font-variant-numeric: tabular-nums;
    }

    #particle-count {
      color: #E0F7FA;
    }

    #fps-counter {
      color: #00FF88;
      transition: color 0.3s ease;
    }

    #fps-counter.low {
      color: #FF4444;
    }

    #warning-toast {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      background: rgba(10, 10, 30, 0.7);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 8px;
      border: 1px solid rgba(255, 215, 0, 0.3);
      color: #FFD700;
      font-size: 14px;
      letter-spacing: 0.5px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    #warning-toast.visible {
      opacity: 1;
    }

    @media (max-width: 1024px) and (min-width: 769px) {
      #dashboard {
        width: 300px;
        height: 100px;
        padding: 12px 16px;
      }

      #heading-canvas {
        width: 140px;
        height: 64px;
      }

      .stat-value {
        font-size: 15px;
      }
    }

    @media (max-width: 768px) {
      #dashboard {
        width: 200px;
        height: 80px;
        padding: 8px 12px;
        bottom: 12px;
        border-radius: 12px;
      }

      #heading-canvas {
        width: 100px;
        height: 48px;
      }

      .stats-section {
        min-width: 80px;
        gap: 4px;
      }

      .stat-label {
        font-size: 10px;
      }

      .stat-value {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="scene-canvas"></canvas>
    <div id="warning-toast"></div>
    <div id="dashboard">
      <div class="gauge-section">
        <canvas id="heading-canvas"></canvas>
      </div>
      <div class="stats-section">
        <div class="stat-row">
          <span class="stat-label">PARTICLES</span>
          <span id="particle-count" class="stat-value">0k</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">FPS</span>
          <span id="fps-counter" class="stat-value">0</span>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
