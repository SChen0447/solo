<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>幻光蝶群 · 月光森林</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="loading-overlay">
    <div class="loader">
      <div class="loader-ring"></div>
      <div class="loader-text">月光森林正在苏醒...</div>
    </div>
  </div>

  <div id="app">
    <canvas id="scene-canvas"></canvas>

    <div id="control-panel">
      <div class="panel-title">控制面板</div>

      <div class="control-item">
        <label>蝴蝶速度 <span id="speed-value">1.0</span>x</label>
        <input type="range" id="butterfly-speed" min="0.5" max="2.0" step="0.1" value="1.0" />
      </div>

      <div class="control-item">
        <label>花朵绽放延时 <span id="delay-value">1.5</span>s</label>
        <input type="range" id="bloom-delay" min="0.5" max="3.0" step="0.1" value="1.5" />
      </div>

      <div class="control-item">
        <label>月光亮度 <span id="moon-value">0.7</span>x</label>
        <input type="range" id="moon-brightness" min="0.3" max="1.0" step="0.05" value="0.7" />
      </div>

      <button id="reset-btn">重置花朵</button>

      <div class="butterfly-count">
        <span>蝴蝶数量：</span>
        <span id="butterfly-count">50</span>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
