<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>气泡艺术创作</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #16213e 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      touch-action: none;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #canvas {
      display: block;
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #16213e 100%);
      border-radius: 8px;
      box-shadow: 0 0 60px rgba(100, 100, 200, 0.15);
      cursor: crosshair;
    }

    .controls {
      position: absolute;
      bottom: 24px;
      right: 24px;
      display: flex;
      gap: 12px;
      z-index: 10;
    }

    .btn {
      padding: 12px 20px;
      background: rgba(20, 25, 45, 0.75);
      border: 1px solid rgba(120, 140, 200, 0.25);
      border-radius: 12px;
      color: rgba(220, 230, 255, 0.9);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: all 0.25s ease;
      box-shadow:
        0 0 0 1px rgba(120, 140, 200, 0.1) inset,
        0 0 12px rgba(100, 130, 220, 0.15),
        0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .btn:hover {
      background: rgba(40, 50, 80, 0.85);
      border-color: rgba(150, 170, 230, 0.5);
      box-shadow:
        0 0 0 1px rgba(150, 170, 230, 0.2) inset,
        0 0 20px rgba(120, 150, 240, 0.3),
        0 4px 16px rgba(0, 0, 0, 0.4);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .tip {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 16px;
      background: rgba(20, 25, 45, 0.6);
      border: 1px solid rgba(120, 140, 200, 0.2);
      border-radius: 20px;
      color: rgba(200, 215, 255, 0.75);
      font-size: 13px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      pointer-events: none;
      z-index: 5;
    }

    @media (max-width: 640px) {
      .controls {
        bottom: 16px;
        right: 16px;
        gap: 8px;
      }

      .btn {
        padding: 10px 14px;
        font-size: 12px;
        border-radius: 10px;
      }

      .tip {
        font-size: 11px;
        padding: 6px 12px;
        top: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="tip">点击并拖动生成气泡 · 双击气泡可分裂</div>
    <canvas id="canvas"></canvas>
    <div class="controls">
      <button class="btn" id="clearBtn">清空画布</button>
      <button class="btn" id="randomBtn">随机生成</button>
      <button class="btn" id="saveBtn">保存图片</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
