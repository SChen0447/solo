<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分子结构可视化工坊</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0A0E1A;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #app-title {
      position: fixed;
      top: 20px;
      left: 24px;
      font-weight: 300;
      font-size: 18px;
      color: #B0BEC5;
      letter-spacing: 1px;
      user-select: none;
      pointer-events: none;
    }

    #molecule-buttons {
      position: fixed;
      left: 24px;
      bottom: 24px;
      display: flex;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .molecule-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 600;
      font-size: 13px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .molecule-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
    }

    .molecule-btn.active {
      border: 2px solid #ffffff;
    }

    .molecule-btn.water { background: #2196F3; }
    .molecule-btn.co2 { background: #9E9E9E; }
    .molecule-btn.methane { background: #FF9800; }

    #info-panel {
      position: fixed;
      right: 24px;
      bottom: 24px;
      width: 220px;
      padding: 16px;
      background: rgba(30, 30, 46, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #ECEFF4;
    }

    #info-panel h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #FFFFFF;
    }

    #info-panel .formula {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #88C0D0;
      letter-spacing: 0.5px;
    }

    #info-panel .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 13px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    #info-panel .info-row:last-of-type {
      border-bottom: none;
    }

    #info-panel .info-label {
      color: #8FBCBB;
      opacity: 0.8;
    }

    #info-panel .info-value {
      color: #ECEFF4;
      font-weight: 500;
    }

    #fps-display {
      position: fixed;
      top: 20px;
      right: 24px;
      padding: 6px 12px;
      background: rgba(30, 30, 46, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    #fps-display.normal {
      color: #A3BE8C;
    }

    #fps-display.warning {
      color: #BF616A;
    }

    #atom-cards {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
    }

    .atom-card {
      position: absolute;
      pointer-events: auto;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 10px;
      min-width: 120px;
      color: #ECEFF4;
      transition: all 0.2s ease;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
      user-select: none;
    }

    .atom-card:hover {
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
    }

    .atom-card .element-name {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #FFFFFF;
    }

    .atom-card .card-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding: 2px 0;
    }

    .atom-card .card-label {
      color: #8FBCBB;
      opacity: 0.85;
    }

    .atom-card .card-value {
      color: #ECEFF4;
      font-weight: 500;
    }

    #context-menu {
      position: fixed;
      display: none;
      background: rgba(30, 30, 46, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 6px;
      z-index: 200;
      min-width: 130px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    #context-menu .menu-item {
      padding: 8px 14px;
      font-size: 13px;
      color: #ECEFF4;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    #context-menu .menu-item:hover {
      background: rgba(136, 192, 208, 0.2);
      color: #88C0D0;
    }

    @media (max-width: 768px) {
      #molecule-buttons {
        padding: 8px 12px;
        gap: 8px;
      }

      .molecule-btn {
        width: 30px;
        height: 30px;
        font-size: 10px;
      }

      #info-panel {
        width: 180px;
        padding: 12px;
      }

      #info-panel h3 {
        font-size: 14px;
      }

      #info-panel .formula {
        font-size: 16px;
      }

      #info-panel .info-row {
        font-size: 11px;
      }

      #app-title {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="app-title">分子结构可视化工坊</div>

  <div id="fps-display" class="normal">FPS: --</div>

  <div id="molecule-buttons">
    <button class="molecule-btn water active" data-molecule="water" title="水 (H₂O)">H₂O</button>
    <button class="molecule-btn co2" data-molecule="co2" title="二氧化碳 (CO₂)">CO₂</button>
    <button class="molecule-btn methane" data-molecule="methane" title="甲烷 (CH₄)">CH₄</button>
  </div>

  <div id="info-panel">
    <h3 id="molecule-name">水</h3>
    <div class="formula" id="molecule-formula">H₂O</div>
    <div class="info-row">
      <span class="info-label">原子个数</span>
      <span class="info-value" id="atom-count">3</span>
    </div>
    <div class="info-row">
      <span class="info-label">化学键数</span>
      <span class="info-value" id="bond-count">2</span>
    </div>
    <div class="info-row">
      <span class="info-label">帧率</span>
      <span class="info-value" id="panel-fps">--</span>
    </div>
  </div>

  <div id="atom-cards"></div>

  <div id="context-menu">
    <div class="menu-item" id="menu-toggle">分解视图</div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
