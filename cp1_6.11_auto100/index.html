<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>热带雨林生态分层可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0a1a0a;
      font-family: monospace;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    .layer-controls {
      position: fixed;
      left: 24px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 16px;
      z-index: 100;
    }

    .layer-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid transparent;
      background-color: #333333aa;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease-in-out;
      position: relative;
    }

    .layer-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 10px #7cfc00aa;
    }

    .layer-btn.active {
      background-color: #7cfc00;
      border-color: #9fff44;
    }

    .layer-btn svg {
      width: 24px;
      height: 24px;
      fill: #ffffff;
    }

    .layer-btn.active svg {
      fill: #0a1a0a;
    }

    .layer-btn::after {
      content: attr(data-key);
      position: absolute;
      top: -4px;
      right: -4px;
      width: 16px;
      height: 16px;
      background: #7cfc00;
      color: #0a1a0a;
      border-radius: 50%;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .info-label {
      position: fixed;
      background: #222222aa;
      color: #ffffff;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      pointer-events: none;
      z-index: 200;
      box-shadow: 0 2px 4px #000000;
      white-space: nowrap;
      transition: opacity 0.5s ease-in-out;
    }

    .info-label.fade-out {
      opacity: 0;
    }

    .hud {
      position: fixed;
      top: 20px;
      right: 20px;
      color: #7cfc00;
      font-size: 12px;
      text-align: right;
      z-index: 100;
    }

    .hud-item {
      margin-bottom: 8px;
    }

    .weather-indicator {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #222222aa;
      color: #ffffff;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      z-index: 100;
      transition: all 0.3s ease-in-out;
    }

    .instructions {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #7cfc00aa;
      font-size: 11px;
      text-align: center;
      z-index: 100;
    }

    @media (max-width: 768px) {
      .layer-btn {
        width: 36px;
        height: 36px;
      }

      .layer-btn svg {
        width: 18px;
        height: 18px;
      }

      .info-label {
        font-size: 10px;
      }

      .layer-controls {
        left: 12px;
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div class="layer-controls">
    <button class="layer-btn active" data-layer="0" data-key="1" title="地面层">
      <svg viewBox="0 0 24 24">
        <path d="M12 20L4 12V8h16v4l-8 8z"/>
      </svg>
    </button>
    <button class="layer-btn" data-layer="1" data-key="2" title="灌木层">
      <svg viewBox="0 0 24 24">
        <path d="M12 4l-4 8h3v8h2v-8h3l-4-8z"/>
      </svg>
    </button>
    <button class="layer-btn" data-layer="2" data-key="3" title="树冠层">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="10" r="6"/>
        <rect x="10" y="14" width="4" height="8"/>
      </svg>
    </button>
    <button class="layer-btn" data-layer="3" data-key="4" title="露生层">
      <svg viewBox="0 0 24 24">
        <path d="M12 2L8 10h8L12 2zM6 14l6-4 6 4-6 4-6-4z"/>
      </svg>
    </button>
  </div>

  <div class="weather-indicator" id="weatherIndicator">
    ☀️ 晴朗 | 按 G 切换天气
  </div>

  <div class="hud">
    <div class="hud-item" id="fpsDisplay">FPS: --</div>
    <div class="hud-item" id="layerDisplay">当前层: 地面层</div>
    <div class="hud-item" id="heightDisplay">高度: 0m</div>
  </div>

  <div class="instructions">
    1-4: 切换分层 | G: 天气 | 鼠标滚轮: 缩放 | 点击: 查看信息
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
