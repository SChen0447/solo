<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>镜影拼图 - 交互式对称画板</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a1a;
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    .app-container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .app-title {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 24px;
      background: linear-gradient(90deg, #e94560, #9c27b0, #4fc3f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .main-layout {
      display: flex;
      gap: 24px;
      justify-content: center;
      align-items: flex-start;
    }

    .panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .canvas-wrapper {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    #mainCanvas {
      display: block;
      cursor: crosshair;
    }

    .control-card {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 16px;
    }

    .control-title {
      font-size: 14px;
      font-weight: 600;
      color: #e94560;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .brush-size-group {
      display: flex;
      gap: 8px;
    }

    .brush-size-btn {
      flex: 1;
      padding: 10px 0;
      border: none;
      border-radius: 8px;
      background: #0f3460;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .brush-size-btn:hover {
      transform: translateY(-2px);
      background: #16437a;
    }

    .brush-size-btn.active {
      background: #e94560;
    }

    .color-palette {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .color-swatch {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s ease;
      justify-self: center;
    }

    .color-swatch:hover {
      transform: translateY(-2px);
    }

    .color-swatch.active {
      border-color: #fff;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-label {
      font-size: 13px;
      color: #aaa;
    }

    .toggle-switch {
      position: relative;
      width: 48px;
      height: 26px;
      background: #0f3460;
      border-radius: 13px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .toggle-switch.active {
      background: #e94560;
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s ease;
    }

    .toggle-switch.active::after {
      transform: translateX(22px);
    }

    .axis-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .axis-btn {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #0f3460;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s ease;
    }

    .axis-btn:hover {
      transform: translateY(-2px);
      background: #16437a;
    }

    .axis-btn.active {
      background: #e94560;
    }

    .slider-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #aaa;
    }

    .slider-value {
      color: #e94560;
      font-weight: 600;
    }

    .custom-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 8px;
      border-radius: 4px;
      background: #0f3460;
      outline: none;
      cursor: pointer;
    }

    .custom-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #e94560;
      cursor: pointer;
      box-shadow: 0 0 0 rgba(233, 69, 96, 0);
      transition: all 0.2s ease;
    }

    .custom-slider::-webkit-slider-thumb:hover {
      box-shadow: 0 0 15px rgba(233, 69, 96, 0.6);
      transform: scale(1.1);
    }

    .custom-slider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #e94560;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 0 rgba(233, 69, 96, 0);
      transition: all 0.2s ease;
    }

    .custom-slider::-moz-range-thumb:hover {
      box-shadow: 0 0 15px rgba(233, 69, 96, 0.6);
      transform: scale(1.1);
    }

    .clear-btn {
      width: 100%;
      padding: 12px 0;
      border: none;
      border-radius: 8px;
      background: #533483;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .clear-btn:hover {
      transform: translateY(-2px);
      background: #e94560;
    }

    .fade-out {
      animation: fadeOut 0.3s ease forwards;
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <h1 class="app-title">镜影拼图 · 交互式对称画板</h1>
    <div class="main-layout">
      <div class="panel">
        <div class="canvas-wrapper">
          <canvas id="mainCanvas" width="600" height="600"></canvas>
        </div>
        <div class="control-card">
          <div class="control-title">画笔粗细</div>
          <div class="brush-size-group" id="brushSizeGroup">
            <button class="brush-size-btn active" data-size="3">3px</button>
            <button class="brush-size-btn" data-size="6">6px</button>
            <button class="brush-size-btn" data-size="12">12px</button>
          </div>
        </div>
        <div class="control-card">
          <div class="control-title">调色板</div>
          <div class="color-palette" id="colorPalette">
            <div class="color-swatch active" data-color="#e94560" style="background:#e94560"></div>
            <div class="color-swatch" data-color="#f76c6c" style="background:#f76c6c"></div>
            <div class="color-swatch" data-color="#f8e71c" style="background:#f8e71c"></div>
            <div class="color-swatch" data-color="#7ed321" style="background:#7ed321"></div>
            <div class="color-swatch" data-color="#4fc3f7" style="background:#4fc3f7"></div>
            <div class="color-swatch" data-color="#3f51b5" style="background:#3f51b5"></div>
            <div class="color-swatch" data-color="#9c27b0" style="background:#9c27b0"></div>
            <div class="color-swatch" data-color="#ffffff" style="background:#ffffff"></div>
          </div>
        </div>
        <div class="control-card">
          <div class="toggle-row">
            <span class="toggle-label">颜色渐变模式</span>
            <div class="toggle-switch" id="gradientToggle"></div>
          </div>
        </div>
      </div>
      <div class="panel" style="width:260px">
        <div class="control-card">
          <div class="control-title">镜像轴</div>
          <div class="axis-group" id="axisGroup">
            <button class="axis-btn active" data-axis="vertical">垂直轴</button>
            <button class="axis-btn" data-axis="horizontal">水平轴</button>
            <button class="axis-btn" data-axis="diagonal">对角线</button>
          </div>
        </div>
        <div class="control-card">
          <div class="control-title">对称层数</div>
          <div class="slider-container">
            <div class="slider-label">
              <span>层数</span>
              <span class="slider-value" id="layerValue">1</span>
            </div>
            <input type="range" class="custom-slider" id="layerSlider" min="1" max="4" value="1" />
          </div>
        </div>
        <div class="control-card">
          <button class="clear-btn" id="clearBtn">清空画布</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
