<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>龙卷风模拟器 | Tornado Simulator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #1a1a2e;
      font-family: Arial, sans-serif;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #app canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #fps-counter {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 6px 12px;
      background-color: rgba(0, 0, 0, 0.4);
      color: #ffffff;
      font-size: 14px;
      font-family: Arial, sans-serif;
      border-radius: 4px;
      z-index: 100;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #fps-counter .optimization-mode {
      color: #ffaa00;
      font-weight: bold;
    }

    .lil-gui {
      --background-color: #2a2a2acc;
      --widget-color: #444444;
      --focus-color: #00d4aa;
      --hover-color: #555555;
      --font-size: 13px;
      font-family: Arial, sans-serif;
      border-radius: 8px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .lil-gui .title {
      background-color: rgba(42, 42, 42, 0.8) !important;
      border-radius: 8px 8px 0 0 !important;
    }

    .lil-gui .slider {
      border-radius: 4px;
    }

    .lil-gui .slider::-webkit-slider-thumb {
      background-color: #00d4aa;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(0, 212, 170, 0.6);
    }

    .lil-gui .slider::-webkit-slider-thumb:hover {
      box-shadow: 0 0 16px rgba(0, 212, 170, 0.9);
    }

    .lil-gui .slider::-moz-range-thumb {
      background-color: #00d4aa;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(0, 212, 170, 0.6);
      border: none;
    }

    .lil-gui .slider::-moz-range-thumb:hover {
      box-shadow: 0 0 16px rgba(0, 212, 170, 0.9);
    }

    @media (max-width: 800px) {
      .lil-gui {
        position: absolute !important;
        top: 16px !important;
        right: 16px !important;
        max-height: 60px;
        overflow: hidden;
        transition: max-height 0.3s ease;
      }

      .lil-gui.open {
        max-height: 80vh;
        overflow-y: auto;
      }

      .lil-gui .title::after {
        content: ' ▼';
        font-size: 10px;
        opacity: 0.7;
      }

      #fps-counter {
        font-size: 12px;
        padding: 4px 8px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="fps-counter">
      <span id="fps-value">FPS: 60</span>
      <span id="optimization-badge" class="optimization-mode" style="display:none;">优化模式</span>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
