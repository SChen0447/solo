<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>量子纠缠演示游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #0A0A2E 0%, #1A1A3E 100%);
      font-family: monospace;
    }
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #status-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: rgba(26, 26, 62, 0.9);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 10;
    }
    #status-left, #status-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .status-text {
      color: #ffffff;
      font-size: 14px;
      font-family: monospace;
    }
    #reset-btn {
      width: 80px;
      height: 25px;
      background: #FF6B6B;
      border: none;
      border-radius: 4px;
      color: white;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    #reset-btn:hover {
      background: #FF4444;
      transform: scale(1.05);
    }
    #settings-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 30px;
      height: 30px;
      background: rgba(26, 26, 62, 0.9);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      transition: transform 0.2s;
    }
    #settings-btn:hover {
      transform: scale(1.05);
    }
    #settings-panel {
      position: absolute;
      top: 55px;
      right: -220px;
      width: 200px;
      background: rgba(26, 26, 62, 0.95);
      border-radius: 8px;
      padding: 15px;
      z-index: 20;
      transition: right 0.3s ease;
    }
    #settings-panel.open {
      right: 15px;
    }
    .setting-item {
      margin-bottom: 15px;
    }
    .setting-label {
      color: #ffffff;
      font-size: 12px;
      font-family: monospace;
      margin-bottom: 6px;
      display: block;
    }
    #sensitivity-slider {
      width: 100%;
      accent-color: #00FF88;
    }
    #sound-toggle {
      width: 50px;
      height: 25px;
      background: #00FF8860;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
    }
    #sound-toggle.off {
      background: #FF6B6B60;
    }
    #sound-toggle::after {
      content: 'ON';
      color: white;
      font-size: 10px;
      font-family: monospace;
    }
    #sound-toggle.off::after {
      content: 'OFF';
    }
    #restart-btn {
      width: 100%;
      height: 30px;
      background: #FF6B6B;
      border: none;
      border-radius: 6px;
      color: white;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    #restart-btn:hover {
      background: #FF4444;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    
    <button id="settings-btn" title="设置">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>

    <div id="settings-panel">
      <div class="setting-item">
        <label class="setting-label">粒子灵敏度</label>
        <input type="range" id="sensitivity-slider" min="0.5" max="2.0" step="0.1" value="1.0">
      </div>
      <div class="setting-item">
        <label class="setting-label">音效</label>
        <button id="sound-toggle"></button>
      </div>
      <div class="setting-item">
        <button id="restart-btn">重新开始游戏</button>
      </div>
    </div>

    <div id="status-bar">
      <div id="status-left">
        <span class="status-text" id="puzzle-text">谜题 1/10</span>
        <span class="status-text" id="ops-text">操作: 0</span>
        <span class="status-text" id="time-text">时间: 00:00</span>
      </div>
      <div id="status-right">
        <button id="reset-btn">重置谜题</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
