<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>星尘沙漏 - Stardust Hourglass</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000000;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #ui-canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 10;
    }
    #reset-btn {
      position: fixed;
      left: 20px;
      bottom: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      background-color: #333333;
      color: #ffffff;
      font-size: 12px;
      cursor: pointer;
      z-index: 20;
      transition: background-color 0.2s;
      pointer-events: auto;
    }
    #reset-btn:hover {
      background-color: #555555;
    }
  </style>
</head>
<body>
  <button id="reset-btn">重置颜色</button>
  <canvas id="ui-canvas"></canvas>
  <script type="module" src="/src/app.ts"></script>
</body>
</html>
