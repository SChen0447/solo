<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 音流舞池可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: #FFFFFF;
      background: linear-gradient(180deg, #0A0A23 0%, #1A0033 100%);
    }

    #app {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #waveform-canvas {
      position: absolute;
      top: 16px;
      left: 16px;
      width: 200px;
      height: 60px;
      z-index: 10;
      pointer-events: none;
    }

    #control-panel {
      position: absolute;
      bottom: 16px;
      right: 16px;
      width: 260px;
      padding: 16px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 12px;
      z-index: 10;
      backdrop-filter: blur(8px);
    }

    .panel-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #FFFFFF;
    }

    .control-group {
      margin-bottom: 16px;
    }

    .control-group:last-child {
      margin-bottom: 0;
    }

    .control-label {
      display: block;
      margin-bottom: 6px;
      color: #B0BEC5;
      font-size: 12px;
    }

    .btn {
      display: inline-block;
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      background: #FF6F00;
      color: #FFFFFF;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .btn:hover {
      background: #E65100;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .file-input-wrapper {
      position: relative;
      display: inline-block;
      width: 100%;
    }

    .file-input-wrapper input[type="file"] {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .file-input-wrapper .btn {
      width: 100%;
      text-align: center;
    }

    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 48px;
      height: 24px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.2);
      transition: 0.3s;
      border-radius: 24px;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }

    input:checked + .toggle-slider {
      background-color: #4CAF50;
    }

    input:checked + .toggle-slider:before {
      transform: translateX(24px);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .theme-buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .theme-btn {
      padding: 8px;
      border: 2px solid transparent;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: #FFFFFF;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .theme-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .theme-btn.active {
      border-color: #FF6F00;
      background: rgba(255, 111, 0, 0.2);
    }

    #reset-camera-btn {
      width: 100%;
    }

    #now-playing {
      margin-top: 8px;
      font-size: 12px;
      color: #B0BEC5;
      word-break: break-all;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <canvas id="waveform-canvas" width="200" height="60"></canvas>

  <div id="control-panel">
    <div class="panel-title">控制面板</div>

    <div class="control-group">
      <label class="control-label">音频文件</label>
      <div class="file-input-wrapper">
        <button class="btn">选择音频文件 (MP3/WAV)</button>
        <input type="file" id="audio-file-input" accept="audio/mp3,audio/wav,audio/mpeg" />
      </div>
      <div id="now-playing"></div>
    </div>

    <div class="control-group">
      <div class="toggle-row">
        <label class="control-label" style="margin-bottom: 0;">麦克风输入</label>
        <label class="toggle-switch">
          <input type="checkbox" id="mic-toggle" />
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="control-group">
      <label class="control-label">粒子颜色主题</label>
      <div class="theme-buttons">
        <button class="theme-btn active" data-theme="neon">霓虹</button>
        <button class="theme-btn" data-theme="ocean">海洋</button>
        <button class="theme-btn" data-theme="flame">火焰</button>
        <button class="theme-btn" data-theme="aurora">极光</button>
      </div>
    </div>

    <div class="control-group">
      <button id="reset-camera-btn" class="btn btn-secondary">重置视角</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
