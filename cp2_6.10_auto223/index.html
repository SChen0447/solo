<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>海洋探索</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a1628;
      font-family: Arial, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }

    #title {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      color: #ffffff;
      font-family: Arial, sans-serif;
      text-shadow: 
        -1px -1px 0 #000,
        1px -1px 0 #000,
        -1px 1px 0 #000,
        1px 1px 0 #000,
        0 0 20px rgba(255, 255, 255, 0.3);
      z-index: 100;
      animation: breathe 2s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes breathe {
      0%, 100% {
        text-shadow: 
          -1px -1px 0 #000,
          1px -1px 0 #000,
          -1px 1px 0 #000,
          1px 1px 0 #000,
          0 0 20px rgba(255, 255, 255, 0.3);
      }
      50% {
        text-shadow: 
          -1px -1px 0 #000,
          1px -1px 0 #000,
          -1px 1px 0 #000,
          1px 1px 0 #000,
          0 0 40px rgba(255, 255, 255, 0.6);
      }
    }

    #depth-scale {
      position: fixed;
      left: 0;
      top: 80px;
      bottom: 20px;
      width: 60px;
      background: rgba(10, 22, 40, 0.6);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 90;
      overflow: hidden;
    }

    #depth-scale .scale-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #depth-scale .tick {
      position: absolute;
      left: 0;
      width: 100%;
      display: flex;
      align-items: center;
    }

    #depth-scale .tick-line {
      width: 15px;
      height: 1px;
      background: rgba(200, 200, 200, 0.5);
    }

    #depth-scale .tick-label {
      font-size: 12px;
      color: #ffffff;
      margin-left: 5px;
      white-space: nowrap;
    }

    #depth-scale .minor-tick .tick-line {
      width: 8px;
      background: rgba(150, 150, 150, 0.3);
    }

    #depth-scale .minor-tick .tick-label {
      display: none;
    }

    #data-display {
      position: fixed;
      top: 80px;
      left: 80px;
      background: rgba(10, 22, 40, 0.7);
      padding: 15px 20px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 90;
      min-width: 180px;
    }

    #data-display .data-item {
      margin-bottom: 8px;
    }

    #data-display .data-item:last-child {
      margin-bottom: 0;
    }

    #data-display .data-label {
      font-size: 12px;
      color: #88aacc;
      margin-bottom: 2px;
    }

    #data-display .data-value {
      font-size: 20px;
      color: #ffffff;
      font-weight: bold;
    }

    #tooltip {
      position: fixed;
      background: rgba(20, 30, 50, 0.8);
      border-radius: 8px;
      padding: 12px 15px;
      width: 200px;
      z-index: 200;
      pointer-events: none;
      display: none;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(0, 191, 255, 0.3);
    }

    #tooltip .species-icon {
      font-size: 32px;
      text-align: center;
      margin-bottom: 8px;
    }

    #tooltip .species-name {
      font-size: 16px;
      color: #00bfff;
      font-weight: bold;
      margin-bottom: 6px;
      text-align: center;
    }

    #tooltip .species-depth {
      font-size: 12px;
      color: #88aacc;
      margin-bottom: 4px;
    }

    #tooltip .species-size {
      font-size: 12px;
      color: #ffffff;
    }

    #controls-container {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: 300px;
      z-index: 95;
    }

    @media (max-width: 768px) {
      #depth-scale {
        width: 30px;
      }

      #depth-scale .tick-label {
        font-size: 10px;
      }

      #data-display {
        left: 40px;
        min-width: 140px;
        padding: 10px 12px;
      }

      #data-display .data-value {
        font-size: 16px;
      }

      #controls-container {
        right: 0;
        left: 0;
        top: auto;
        bottom: 0;
        width: 100%;
        height: 250px;
      }

      #title {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="title">海洋探索</div>
    
    <div id="depth-scale">
      <div class="scale-container" id="scale-container"></div>
    </div>

    <div id="data-display">
      <div class="data-item">
        <div class="data-label">当前深度</div>
        <div class="data-value" id="depth-value">0 米</div>
      </div>
      <div class="data-item">
        <div class="data-label">温度</div>
        <div class="data-value" id="temp-value">22.0 °C</div>
      </div>
      <div class="data-item">
        <div class="data-label">光照强度</div>
        <div class="data-value" id="light-value">100%</div>
      </div>
      <div class="data-item">
        <div class="data-label">声速</div>
        <div class="data-value" id="sound-value">1500 m/s</div>
      </div>
    </div>

    <div id="controls-container"></div>

    <div id="tooltip"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
