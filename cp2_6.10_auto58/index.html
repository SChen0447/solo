<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D 魔方模拟器</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      }

      body {
        background: radial-gradient(ellipse at center, #2a2a3a 0%, #0a0a12 70%, #050508 100%);
        color: #fff;
      }

      #canvas-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }

      #ui-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        pointer-events: none;
      }

      #timer {
        position: absolute;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 42px;
        font-weight: 700;
        letter-spacing: 2px;
        background: linear-gradient(135deg, #ff6b6b 0%, #feca57 50%, #48dbfb 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-shadow: 0 0 30px rgba(255, 107, 107, 0.3);
        font-variant-numeric: tabular-nums;
        transition: all 0.3s ease;
      }

      #timer.warning {
        animation: pulse 1s infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; transform: translateX(-50%) scale(1); }
        50% { opacity: 0.7; transform: translateX(-50%) scale(1.05); }
      }

      #control-panel {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 24px;
        padding: 18px 32px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 20px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4),
                    inset 0 1px 0 rgba(255, 255, 255, 0.1);
        pointer-events: auto;
      }

      .btn {
        padding: 12px 28px;
        font-size: 15px;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        letter-spacing: 0.5px;
      }

      .btn:hover {
        transform: translateY(-2px) scale(1.05);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
      }

      .btn:active {
        transform: translateY(0) scale(0.98);
        filter: brightness(0.9);
      }

      .btn.btn-reset {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        box-shadow: 0 4px 15px rgba(245, 87, 108, 0.3);
      }

      .btn.btn-reset:hover {
        box-shadow: 0 6px 20px rgba(245, 87, 108, 0.5);
      }

      #step-counter {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 20px;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      #step-counter .icon {
        font-size: 20px;
      }

      #step-counter .count {
        font-size: 22px;
        font-weight: 700;
        color: #48dbfb;
        font-variant-numeric: tabular-nums;
        min-width: 40px;
        text-align: center;
      }

      #step-counter .label {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.6);
      }

      #modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 100;
        pointer-events: auto;
      }

      #modal-overlay.active {
        display: flex;
        animation: fadeIn 0.3s ease;
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      #modal {
        background: linear-gradient(145deg, rgba(40, 40, 60, 0.95) 0%, rgba(20, 20, 35, 0.98) 100%);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: 40px 50px;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        animation: modalIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        max-width: 90%;
      }

      @keyframes modalIn {
        from { opacity: 0; transform: scale(0.8) translateY(20px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }

      #modal h2 {
        font-size: 32px;
        margin-bottom: 16px;
        background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      #modal p {
        font-size: 18px;
        color: rgba(255, 255, 255, 0.8);
        margin-bottom: 8px;
      }

      #modal .final-steps {
        font-size: 48px;
        font-weight: 800;
        color: #48dbfb;
        margin: 20px 0 30px;
        font-variant-numeric: tabular-nums;
      }

      #modal .btn {
        padding: 14px 36px;
        font-size: 16px;
      }

      #hint {
        position: absolute;
        bottom: 120px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 13px;
        color: rgba(255, 255, 255, 0.4);
        text-align: center;
        line-height: 1.6;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="canvas-container"></div>
    <div id="ui-layer">
      <div id="timer">10:00</div>
      <div id="hint">拖拽空白处旋转视角 · 点击魔方的面旋转对应层</div>
      <div id="control-panel">
        <button class="btn" id="scramble-btn">打 乱</button>
        <div id="step-counter">
          <span class="icon">🔄</span>
          <span class="count" id="step-count">0</span>
          <span class="label">步</span>
        </div>
        <button class="btn btn-reset" id="reset-btn">重 置</button>
      </div>
    </div>
    <div id="modal-overlay">
      <div id="modal">
        <h2>⏰ 时间到！</h2>
        <p>本次挑战最终步数</p>
        <div class="final-steps" id="final-steps">0</div>
        <button class="btn" id="modal-close">再来一次</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
