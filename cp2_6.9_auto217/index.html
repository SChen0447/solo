<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>沙堆自组织临界态模拟</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <div id="canvas-container">
      <canvas id="sandpile-canvas"></canvas>
      <div id="hover-info" class="hidden"></div>
    </div>
    <div id="control-panel">
      <div class="control-item">
        <label class="control-label">自动添加</label>
        <label class="toggle-switch">
          <input type="checkbox" id="auto-add-toggle" />
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="control-item">
        <label class="control-label" for="avalanche-speed">崩塌速度: <span id="speed-value">5</span></label>
        <input type="range" id="avalanche-speed" min="1" max="10" value="5" />
      </div>
      <div class="control-item">
        <button id="reset-btn">重置为初始状态</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
