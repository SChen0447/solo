<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>磁流体动力学模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0d0d14;
      font-family: 'Courier New', 'Consolas', monospace;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    canvas {
      display: block;
    }

    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      background: linear-gradient(180deg, rgba(13, 13, 20, 0.95) 0%, rgba(13, 13, 20, 0) 100%);
      z-index: 100;
      pointer-events: none;
    }

    .top-bar > * {
      pointer-events: auto;
    }

    .title {
      color: #00ff88;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(0, 255, 136, 0.5), 0 0 20px rgba(0, 255, 136, 0.3);
    }

    .controls {
      display: flex;
      gap: 40px;
      align-items: center;
    }

    .knob-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .knob-label {
      color: #88ff88;
      font-size: 12px;
      letter-spacing: 1px;
    }

    .knob {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      position: relative;
      cursor: pointer;
      background: radial-gradient(circle at 30% 30%, #2a2a3a, #0d0d14);
      box-shadow: 
        0 0 15px rgba(0, 150, 255, 0.3),
        inset 0 2px 4px rgba(255, 255, 255, 0.1);
      transition: box-shadow 0.2s ease;
      user-select: none;
    }

    .knob:hover,
    .knob:active {
      box-shadow: 
        0 0 25px rgba(0, 150, 255, 0.6),
        0 0 40px rgba(0, 150, 255, 0.3),
        inset 0 2px 4px rgba(255, 255, 255, 0.15);
    }

    .knob::before {
      content: '';
      position: absolute;
      top: -3px;
      left: -3px;
      right: -3px;
      bottom: -3px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #ff3366, #00aaff, #ff3366);
      opacity: 0.6;
      z-index: -1;
    }

    .knob-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 150, 255, 0.3) 0%, transparent 70%);
      transform: translate(-50%, -50%) scale(0);
      animation: none;
      pointer-events: none;
    }

    .knob-glow.active {
      animation: knobPulse 0.2s ease-out;
    }

    @keyframes knobPulse {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
    }

    .knob-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 2px;
      height: 22px;
      background: linear-gradient(180deg, #00aaff, transparent);
      transform-origin: center bottom;
      transform: translate(-50%, -100%) rotate(0deg);
      border-radius: 2px;
      transition: transform 0.1s ease;
    }

    .knob-value {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ffffff;
      font-size: 11px;
      font-weight: bold;
      text-align: center;
      text-shadow: 0 0 5px rgba(0, 150, 255, 0.8);
    }

    .polarity-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background: conic-gradient(from 0deg, #ff3366 0deg, #ff3366 180deg, #3366ff 180deg, #3366ff 360deg);
      box-shadow: 
        0 0 15px rgba(255, 51, 102, 0.4),
        0 0 15px rgba(51, 102, 255, 0.4);
      transition: transform 0.3s ease, box-shadow 0.2s ease;
      user-select: none;
    }

    .polarity-btn:hover {
      box-shadow: 
        0 0 25px rgba(255, 51, 102, 0.6),
        0 0 25px rgba(51, 102, 255, 0.6);
    }

    .polarity-btn.swapping {
      animation: polaritySwap 0.5s ease;
    }

    @keyframes polaritySwap {
      0%, 100% { transform: rotate(0deg) scale(1); }
      25% { transform: rotate(90deg) scale(1.1); }
      50% { transform: rotate(180deg) scale(1.15); box-shadow: 0 0 40px rgba(255,255,255,0.6); }
      75% { transform: rotate(270deg) scale(1.1); }
    }

    .polarity-btn::after {
      content: 'N/S';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ffffff;
      font-size: 10px;
      font-weight: bold;
      text-shadow: 0 0 3px rgba(0,0,0,0.8);
      z-index: 2;
      background: rgba(0,0,0,0.4);
      padding: 3px 6px;
      border-radius: 8px;
    }

    .fps-panel {
      position: fixed;
      top: 100px;
      right: 20px;
      padding: 10px 15px;
      background: rgba(13, 13, 20, 0.75);
      border: 1px solid rgba(136, 255, 136, 0.2);
      border-radius: 8px;
      color: #88ff88;
      font-size: 14px;
      font-family: 'Courier New', monospace;
      z-index: 99;
      backdrop-filter: blur(5px);
      min-width: 90px;
      text-align: center;
    }

    .fps-label {
      font-size: 10px;
      opacity: 0.7;
      letter-spacing: 1px;
    }

    .fps-value {
      font-size: 22px;
      font-weight: bold;
      text-shadow: 0 0 8px rgba(136, 255, 136, 0.5);
    }

    .instructions {
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: rgba(136, 255, 136, 0.6);
      font-size: 11px;
      line-height: 1.8;
      z-index: 99;
      pointer-events: none;
    }

    .pulse-ring {
      position: fixed;
      pointer-events: none;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.9);
      transform: translate(-50%, -50%) scale(0);
      animation: none;
      z-index: 999;
    }

    .pulse-ring.active {
      animation: pulseExpand 0.15s ease-out forwards;
    }

    @keyframes pulseExpand {
      0% { transform: translate(-50%, -50%) scale(0.3); opacity: 1; border-width: 3px; }
      100% { transform: translate(-50%, -50%) scale(3); opacity: 0; border-width: 0.5px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="top-bar">
      <div class="title">磁流体动力学模拟器</div>
      <div class="controls">
        <div class="knob-container">
          <div class="knob" id="strengthKnob" data-param="strength" data-min="0.1" data-max="2.0" data-step="0.05">
            <div class="knob-glow" id="strengthGlow"></div>
            <div class="knob-indicator" id="strengthIndicator"></div>
            <div class="knob-value" id="strengthValue">1.00</div>
          </div>
          <div class="knob-label">磁场强度</div>
        </div>
        <div class="knob-container">
          <div class="knob" id="viscosityKnob" data-param="viscosity" data-min="0.2" data-max="1.0" data-step="0.1">
            <div class="knob-glow" id="viscosityGlow"></div>
            <div class="knob-indicator" id="viscosityIndicator"></div>
            <div class="knob-value" id="viscosityValue">0.5</div>
          </div>
          <div class="knob-label">流体黏度</div>
        </div>
        <div class="knob-container">
          <button class="polarity-btn" id="polarityBtn"></button>
          <div class="knob-label">极性切换</div>
        </div>
      </div>
    </div>

    <div class="fps-panel">
      <div class="fps-label">FPS</div>
      <div class="fps-value" id="fpsValue">60</div>
    </div>

    <div class="instructions">
      • 鼠标左键拖拽移动虚拟磁铁<br>
      • 拖动旋钮调节参数<br>
      • 点击极性按钮切换磁场方向<br>
      • 观察流体的动态响应
    </div>

    <div class="pulse-ring" id="pulseRing"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
