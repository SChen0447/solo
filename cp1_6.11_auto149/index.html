<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>占星家 · 命运星盘</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0e1428;
      font-family: 'KaiTi', 'STKaiti', serif;
      cursor: grab;
    }
    body:active { cursor: grabbing; }
    #dome-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
    }
    #chart-canvas {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      display: none;
      z-index: 5;
    }
    #zodiac-ring {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 2;
    }
    .zodiac-icon {
      position: absolute;
      color: #c9a84c;
      font-size: 20px;
      cursor: pointer;
      pointer-events: all;
      transition: transform 0.3s ease-in-out;
      user-select: none;
    }
    .zodiac-icon:hover {
      transform: scale(1.3);
    }
    .zodiac-tooltip {
      position: absolute;
      background: rgba(201, 168, 76, 0.9);
      color: #0e1428;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
      z-index: 10;
    }
    .zodiac-icon:hover + .zodiac-tooltip,
    .zodiac-icon:hover ~ .zodiac-tooltip {
      opacity: 1;
    }
    #draw-chart-btn {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: transparent;
      border: 2px solid #c9a84c;
      color: #c9a84c;
      padding: 12px 36px;
      font-size: 18px;
      font-family: 'KaiTi', 'STKaiti', serif;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.3s ease-in-out;
      letter-spacing: 4px;
    }
    #draw-chart-btn:hover {
      background: rgba(201, 168, 76, 0.15);
      box-shadow: 0 0 20px rgba(201, 168, 76, 0.4);
      transform: translateX(-50%) scale(1.05);
    }
    #draw-chart-btn:active {
      transform: translateX(-50%) scale(0.98);
    }
    #info-panel {
      position: fixed;
      top: 0; right: -320px;
      width: 300px;
      height: 100%;
      background: rgba(245, 230, 200, 0.85);
      z-index: 20;
      padding: 24px 20px;
      transition: right 0.3s ease-in-out;
      overflow-y: auto;
      box-shadow: -4px 0 20px rgba(0,0,0,0.3);
    }
    #info-panel.open {
      right: 0;
    }
    #info-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(139, 109, 56, 0.05) 2px,
        rgba(139, 109, 56, 0.05) 4px
      );
      pointer-events: none;
    }
    #info-panel h3 {
      font-size: 22px;
      color: #3e2723;
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(62, 39, 35, 0.3);
      padding-bottom: 8px;
    }
    #info-panel .info-row {
      margin-bottom: 10px;
      color: #5d4037;
      font-size: 14px;
      line-height: 1.8;
    }
    #info-panel .info-label {
      font-weight: bold;
      color: #3e2723;
    }
    #info-panel #aspect-canvas {
      width: 100%;
      height: 80px;
      margin-top: 8px;
    }
    #info-panel .close-btn {
      position: absolute;
      top: 12px; right: 16px;
      background: none;
      border: none;
      color: #5d4037;
      font-size: 20px;
      cursor: pointer;
      transition: color 0.3s ease-in-out;
    }
    #info-panel .close-btn:hover {
      color: #8b0000;
    }
    #prophecy-scroll {
      position: fixed;
      bottom: 90px;
      left: 10%;
      width: 80%;
      height: 120px;
      background: #ead0a8;
      z-index: 15;
      border-radius: 4px;
      overflow-y: auto;
      padding: 16px 24px;
      display: none;
      box-shadow: 0 2px 16px rgba(0,0,0,0.4);
    }
    #prophecy-scroll::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 3px,
        rgba(139, 109, 56, 0.08) 3px,
        rgba(139, 109, 56, 0.08) 4px
      );
      pointer-events: none;
    }
    #prophecy-text {
      font-family: 'KaiTi', 'STKaiti', serif;
      font-size: 16px;
      color: #3e2723;
      line-height: 1.8;
      position: relative;
      z-index: 1;
    }
    #prophecy-seal {
      display: inline-block;
      margin-top: 10px;
      opacity: 0;
      transition: opacity 0.8s ease-in-out;
    }
    #prophecy-seal.visible {
      opacity: 1;
    }
    #star-trail-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    #instructions {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(201, 168, 76, 0.6);
      font-size: 13px;
      z-index: 10;
      text-align: center;
      pointer-events: none;
      transition: opacity 2s ease-in-out;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <canvas id="dome-canvas"></canvas>
  <canvas id="star-trail-canvas"></canvas>
  <canvas id="chart-canvas" width="400" height="400"></canvas>
  <div id="zodiac-ring"></div>
  <button id="draw-chart-btn">绘制星盘</button>
  <div id="info-panel">
    <button class="close-btn">&times;</button>
    <h3 id="info-name"></h3>
    <div class="info-row"><span class="info-label">神话关联：</span><span id="info-myth"></span></div>
    <div class="info-row"><span class="info-label">黄道位置：</span><span id="info-position"></span></div>
    <div class="info-row"><span class="info-label">相位影响：</span></div>
    <canvas id="aspect-canvas" width="260" height="80"></canvas>
  </div>
  <div id="prophecy-scroll">
    <div id="prophecy-text"></div>
    <div id="prophecy-seal">
      <svg width="60" height="60" viewBox="0 0 60 60">
        <rect x="2" y="2" width="56" height="56" rx="4" fill="#cc0000" stroke="#ff2222" stroke-width="1"/>
        <text x="30" y="24" text-anchor="middle" fill="#fff" font-size="12" font-family="KaiTi, STKaiti, serif" font-weight="bold">天命</text>
        <text x="30" y="42" text-anchor="middle" fill="#fff" font-size="12" font-family="KaiTi, STKaiti, serif" font-weight="bold">所归</text>
        <rect x="8" y="8" width="44" height="44" rx="2" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="0.5"/>
      </svg>
    </div>
  </div>
  <div id="instructions">拖拽旋转穹顶 · 滚轮缩放 · 点击星辰查看信息</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
