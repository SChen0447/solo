<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>虚拟星云调色盘 · 粒子雕塑工坊</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050510;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: rgba(255, 255, 255, 0.9);
      user-select: none;
    }

    #app {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, #050510 0%, #1a0a2e 100%);
    }

    canvas {
      display: block;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    #previewCanvas {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      overflow: hidden;
      background: rgba(5, 5, 16, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5),
                  inset 0 0 40px rgba(126, 200, 227, 0.08);
      z-index: 10;
    }

    #previewCanvas::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      pointer-events: none;
    }

    .preview-label {
      position: absolute;
      top: 152px;
      right: 24px;
      width: 120px;
      text-align: center;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
      z-index: 11;
    }

    #controlPanel {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      width: min(680px, calc(100% - 48px));
      padding: 24px 28px 20px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 10;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
    }

    .slider-row:last-child {
      margin-bottom: 0;
    }

    .slider-label {
      flex: 0 0 88px;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.75);
    }

    .slider-wrapper {
      flex: 1;
      position: relative;
      height: 24px;
      display: flex;
      align-items: center;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.15);
      outline: none;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid rgba(255, 255, 255, 0.8);
      cursor: grab;
      box-shadow: 0 0 12px var(--slider-accent, #7ec8e3);
      transition: transform 0.15s ease, box-shadow 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    input[type="range"]::-webkit-slider-thumb:active {
      cursor: grabbing;
      transform: scale(1.25);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid rgba(255, 255, 255, 0.8);
      cursor: grab;
      box-shadow: 0 0 12px var(--slider-accent, #7ec8e3);
    }

    .slider-value {
      flex: 0 0 60px;
      text-align: right;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      color: rgba(255, 255, 255, 0.9);
      background: rgba(255, 255, 255, 0.06);
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="mainCanvas"></canvas>
    <canvas id="previewCanvas"></canvas>
    <div class="preview-label">Top View</div>

    <div id="controlPanel">
      <div class="slider-row">
        <span class="slider-label">Hue Shift</span>
        <div class="slider-wrapper">
          <input type="range" id="hueShift" min="0" max="360" step="1" value="0" />
        </div>
        <span class="slider-value" id="hueShiftVal">0°</span>
      </div>

      <div class="slider-row">
        <span class="slider-label">Saturation</span>
        <div class="slider-wrapper">
          <input type="range" id="saturation" min="0" max="100" step="1" value="75" />
        </div>
        <span class="slider-value" id="saturationVal">75%</span>
      </div>

      <div class="slider-row">
        <span class="slider-label">Density</span>
        <div class="slider-wrapper">
          <input type="range" id="density" min="1000" max="8000" step="100" value="6000" />
        </div>
        <span class="slider-value" id="densityVal">6000</span>
      </div>

      <div class="slider-row">
        <span class="slider-label">Swirl</span>
        <div class="slider-wrapper">
          <input type="range" id="swirl" min="0" max="5" step="0.05" value="1.2" />
        </div>
        <span class="slider-value" id="swirlVal">1.20</span>
      </div>

      <div class="slider-row">
        <span class="slider-label">Diverge</span>
        <div class="slider-wrapper">
          <input type="range" id="diverge" min="0" max="3" step="0.05" value="0.4" />
        </div>
        <span class="slider-value" id="divergeVal">0.40</span>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
