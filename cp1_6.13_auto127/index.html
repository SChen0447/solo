<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>味觉·量子菜单</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        height: 100%;
        overflow-x: hidden;
      }
      
      body {
        background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a1a 100%);
        color: #e0e0ff;
        font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      }
      
      #root {
        min-height: 100vh;
      }
      
      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a1a 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      
      .loading-screen.hidden {
        opacity: 0;
        visibility: hidden;
      }
      
      .molecule-loader {
        position: relative;
        width: 120px;
        height: 120px;
      }
      
      .molecule-particle {
        position: absolute;
        border-radius: 50%;
        animation: moleculeOrbit 2s ease-in-out infinite;
      }
      
      .molecule-particle:nth-child(1) {
        width: 20px;
        height: 20px;
        background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        animation: moleculePulse 1.5s ease-in-out infinite;
        box-shadow: 0 0 20px #ff6b6b, 0 0 40px #ff6b6b80;
      }
      
      .molecule-particle:nth-child(2) {
        width: 12px;
        height: 12px;
        background: linear-gradient(135deg, #4ecdc4, #6ee7de);
        box-shadow: 0 0 15px #4ecdc4, 0 0 30px #4ecdc480;
        animation-delay: 0s;
      }
      
      .molecule-particle:nth-child(3) {
        width: 10px;
        height: 10px;
        background: linear-gradient(135deg, #ffe66d, #fff3a3);
        box-shadow: 0 0 12px #ffe66d, 0 0 25px #ffe66d80;
        animation-delay: 0.3s;
      }
      
      .molecule-particle:nth-child(4) {
        width: 14px;
        height: 14px;
        background: linear-gradient(135deg, #95e1a3, #b8f0c2);
        box-shadow: 0 0 18px #95e1a3, 0 0 35px #95e1a380;
        animation-delay: 0.6s;
      }
      
      .molecule-particle:nth-child(5) {
        width: 11px;
        height: 11px;
        background: linear-gradient(135deg, #54a0ff, #74b3ff);
        box-shadow: 0 0 14px #54a0ff, 0 0 28px #54a0ff80;
        animation-delay: 0.9s;
      }
      
      .molecule-particle:nth-child(6) {
        width: 9px;
        height: 9px;
        background: linear-gradient(135deg, #ff9ff3, #ffb8f7);
        box-shadow: 0 0 11px #ff9ff3, 0 0 22px #ff9ff380;
        animation-delay: 1.2s;
      }
      
      @keyframes moleculeOrbit {
        0%, 100% {
          transform: rotate(0deg) translateX(50px) rotate(0deg);
        }
        50% {
          transform: rotate(180deg) translateX(45px) rotate(-180deg);
        }
      }
      
      @keyframes moleculePulse {
        0%, 100% {
          transform: translate(-50%, -50%) scale(1);
          box-shadow: 0 0 20px #ff6b6b, 0 0 40px #ff6b6b80;
        }
        50% {
          transform: translate(-50%, -50%) scale(1.2);
          box-shadow: 0 0 30px #ff6b6b, 0 0 60px #ff6b6b80;
        }
      }
      
      .loading-text {
        position: absolute;
        bottom: -40px;
        left: 50%;
        transform: translateX(-50%);
        font-family: 'Orbitron', sans-serif;
        font-size: 14px;
        letter-spacing: 4px;
        color: #e0e0ff;
        opacity: 0.8;
        white-space: nowrap;
      }
      
      .loading-dots::after {
        content: '';
        animation: loadingDots 1.5s steps(4, end) infinite;
      }
      
      @keyframes loadingDots {
        0%, 100% { content: ''; }
        25% { content: '.'; }
        50% { content: '..'; }
        75% { content: '...'; }
      }
    </style>
  </head>
  <body>
    <div class="loading-screen" id="loadingScreen">
      <div class="molecule-loader">
        <div class="molecule-particle"></div>
        <div class="molecule-particle"></div>
        <div class="molecule-particle"></div>
        <div class="molecule-particle"></div>
        <div class="molecule-particle"></div>
        <div class="molecule-particle"></div>
        <div class="loading-text">
          量子初始化<span class="loading-dots"></span>
        </div>
      </div>
    </div>
    
    <div id="root"></div>
    
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      setTimeout(() => {
        const loadingScreen = document.getElementById('loadingScreen');
        if (loadingScreen) {
          loadingScreen.classList.add('hidden');
          setTimeout(() => {
            loadingScreen.remove();
          }, 500);
        }
      }, 2000);
    </script>
  </body>
</html>
