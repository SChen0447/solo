<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>3D 星云粒子沙盒</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000011;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #fff;
      user-select: none;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    canvas {
      display: block;
    }

    .tips {
      position: fixed;
      top: 16px;
      left: 16px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.75);
      pointer-events: none;
      z-index: 10;
    }

    .tips .title {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.95);
      margin-bottom: 6px;
    }

    .tips .key {
      display: inline-block;
      padding: 1px 6px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 4px;
      font-size: 11px;
      margin: 0 2px;
    }

    .control-panel {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 240px;
      padding: 18px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      z-index: 10;
    }

    .control-panel .panel-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: rgba(255, 255, 255, 0.95);
      letter-spacing: 0.5px;
    }

    .control-group {
      margin-bottom: 16px;
    }

    .control-group:last-child {
      margin-bottom: 0;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
    }

    .control-value {
      font-size: 12px;
      color: #ff66b2;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: #ff66b2;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(255, 102, 178, 0.6);
      transition: transform 0.1s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #ff66b2;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 8px rgba(255, 102, 178, 0.6);
    }

    .reset-btn {
      width: 100%;
      padding: 10px;
      margin-top: 4px;
      background: linear-gradient(135deg, #7b2d8e 0%, #ff66b2 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.2s ease;
      letter-spacing: 0.5px;
    }

    .reset-btn:hover {
      box-shadow: 0 4px 16px rgba(255, 102, 178, 0.35);
    }

    .reset-btn:active {
      transform: scale(0.96);
    }

    .footer-tip {
      position: fixed;
      bottom: 10px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.3);
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="tips">
      <div class="title">✨ 操作指引</div>
      <div><span class="key">左键点击</span> 创建引力源</div>
      <div><span class="key">左键拖拽</span> 移动引力源</div>
      <div><span class="key">右键点击</span> 删除引力源</div>
      <div><span class="key">右键拖拽</span> 旋转视角</div>
      <div><span class="key">滚轮</span> 缩放视图</div>
    </div>

    <div class="control-panel">
      <div class="panel-title">⚙ 参数控制</div>

      <div class="control-group">
        <div class="control-label">
          <span>引力常数 G</span>
          <span class="control-value" id="gValue">0.5</span>
        </div>
        <input type="range" id="gSlider" min="0.1" max="1.0" step="0.1" value="0.5" />
      </div>

      <div class="control-group">
        <div class="control-label">
          <span>粒子最大速度</span>
          <span class="control-value" id="velValue">2.0</span>
        </div>
        <input type="range" id="velSlider" min="1.0" max="5.0" step="0.5" value="2.0" />
      </div>

      <div class="control-group">
        <div class="control-label">
          <span>粒子大小乘数</span>
          <span class="control-value" id="sizeValue">1.0</span>
        </div>
        <input type="range" id="sizeSlider" min="0.5" max="2.0" step="0.1" value="1.0" />
      </div>

      <div class="control-group">
        <button class="reset-btn" id="resetBtn">重置场景</button>
      </div>
    </div>

    <div class="footer-tip">最多支持 10 个引力源 · 15,000 粒子实时 GPU 计算</div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
