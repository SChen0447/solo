<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>幻彩泡泡池</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0015;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #control-panel {
      position: fixed;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 200px;
      background: rgba(26, 0, 42, 0.5);
      border: 1px solid #8844ff;
      border-radius: 10px;
      padding: 20px;
      color: #fff;
      z-index: 100;
      transition: background 0.3s ease;
      box-shadow: 0 0 15px rgba(136, 68, 255, 0.3);
    }

    #control-panel:hover {
      background: rgba(26, 0, 42, 0.8);
      box-shadow: 0 0 25px rgba(136, 68, 255, 0.6);
    }

    .panel-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 15px;
      color: #cc99ff;
      text-align: center;
      text-shadow: 0 0 10px #8844ff;
    }

    .control-group {
      margin-bottom: 18px;
    }

    .control-label {
      font-size: 12px;
      color: #aa88ff;
      margin-bottom: 8px;
      display: block;
    }

    #frequency-slider {
      width: 100%;
      height: 4px;
      appearance: none;
      background: linear-gradient(to right, #442266, #8844ff);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    #frequency-slider::-webkit-slider-thumb {
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #cc99ff;
      border: 1px solid #8844ff;
      box-shadow: 0 0 8px #8844ff;
      cursor: pointer;
    }

    #frequency-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #cc99ff;
      border: 1px solid #8844ff;
      box-shadow: 0 0 8px #8844ff;
      cursor: pointer;
    }

    .color-options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .color-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid #8844ff;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 0 5px rgba(136, 68, 255, 0.3);
    }

    .color-btn:hover, .color-btn.active {
      transform: scale(1.15);
      box-shadow: 0 0 12px #8844ff;
    }

    #custom-color {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid #8844ff;
      cursor: pointer;
      overflow: hidden;
      padding: 0;
    }

    #custom-color input[type="color"] {
      width: 100%;
      height: 100%;
      border: none;
      cursor: pointer;
      background: transparent;
    }

    #clear-btn {
      width: 100%;
      padding: 10px;
      background: rgba(136, 68, 255, 0.2);
      color: #fff;
      border: 1px solid #8844ff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s ease;
      box-shadow: 0 0 8px rgba(136, 68, 255, 0.3);
    }

    #clear-btn:hover {
      background: rgba(136, 68, 255, 0.4);
      box-shadow: 0 0 15px rgba(136, 68, 255, 0.6);
    }

    #clear-btn:active {
      transform: scale(0.98);
    }

    .counter {
      text-align: center;
      font-size: 14px;
      color: #cc99ff;
    }

    #bubble-count {
      font-size: 22px;
      font-weight: bold;
      color: #ffffff;
      text-shadow: 0 0 10px #8844ff;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  
  <div id="control-panel">
    <div class="panel-title">✨ 泡泡魔术控制面板 ✨</div>
    
    <div class="control-group">
      <label class="control-label" for="frequency-slider">生成频率: <span id="freq-value">1.0</span>秒</label>
      <input type="range" id="frequency-slider" min="0.5" max="3" step="0.1" value="1">
    </div>
    
    <div class="control-group">
      <label class="control-label">泡泡颜色</label>
      <div class="color-options">
        <div class="color-btn active" data-color="#ff3366" style="background: #ff3366;"></div>
        <div class="color-btn" data-color="#ffcc33" style="background: #ffcc33;"></div>
        <div class="color-btn" data-color="#33ff66" style="background: #33ff66;"></div>
        <div class="color-btn" data-color="#3366ff" style="background: #3366ff;"></div>
        <div class="color-btn" data-color="#cc66ff" style="background: #cc66ff;"></div>
        <div class="color-btn" data-color="#66ffff" style="background: #66ffff;"></div>
        <div id="custom-color">
          <input type="color" id="color-picker" value="#ff3366">
        </div>
      </div>
    </div>
    
    <div class="control-group">
      <button id="clear-btn">🫧 清除所有泡泡</button>
    </div>
    
    <div class="control-group">
      <div class="counter">
        <span>当前泡泡数</span><br>
        <span id="bubble-count">20</span>
      </div>
    </div>
  </div>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
