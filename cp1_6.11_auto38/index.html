<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星系碰撞模拟器 - Galaxy Collision Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #0a0a1a 0%, #000008 70%, #000000 100%);
      font-family: 'Orbitron', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #e0e0ff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    #ui-panel {
      position: absolute;
      top: 24px;
      left: 24px;
      padding: 20px 24px;
      background: rgba(10, 10, 30, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(138, 100, 255, 0.35);
      border-radius: 14px;
      box-shadow:
        0 0 24px rgba(138, 100, 255, 0.15),
        inset 0 0 24px rgba(138, 100, 255, 0.06);
      z-index: 100;
      min-width: 280px;
      user-select: none;
    }

    #ui-panel h2 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1.5px;
      margin-bottom: 18px;
      color: #c4b5fd;
      text-shadow: 0 0 12px rgba(138, 100, 255, 0.6);
    }

    .control-group {
      margin-bottom: 16px;
    }

    .control-group label {
      display: block;
      font-size: 12px;
      margin-bottom: 8px;
      color: #a78bfa;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .control-group .value-display {
      float: right;
      color: #818cf8;
      font-weight: 400;
    }

    .slider-container {
      position: relative;
      width: 100%;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, rgba(138, 100, 255, 0.2), rgba(99, 102, 241, 0.2));
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      border: 2px solid rgba(196, 181, 253, 0.8);
      box-shadow: 0 0 12px rgba(138, 100, 255, 0.7);
      cursor: pointer;
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 20px rgba(138, 100, 255, 0.95);
      transform: scale(1.1);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      border: 2px solid rgba(196, 181, 253, 0.8);
      box-shadow: 0 0 12px rgba(138, 100, 255, 0.7);
      cursor: pointer;
    }

    .btn {
      width: 100%;
      padding: 10px 16px;
      margin-top: 8px;
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      color: #e0e0ff;
      background: linear-gradient(135deg, rgba(138, 100, 255, 0.2), rgba(99, 102, 241, 0.15));
      border: 1px solid rgba(138, 100, 255, 0.5);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      background: linear-gradient(135deg, rgba(138, 100, 255, 0.35), rgba(99, 102, 241, 0.3));
      border-color: rgba(196, 181, 253, 0.7);
      box-shadow: 0 0 18px rgba(138, 100, 255, 0.4);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn.pulse::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(196, 181, 253, 0.5);
      transform: translate(-50%, -50%);
      animation: pulse-ring 0.6s ease-out;
      pointer-events: none;
    }

    @keyframes pulse-ring {
      0% {
        width: 0;
        height: 0;
        opacity: 0.8;
      }
      100% {
        width: 300px;
        height: 300px;
        opacity: 0;
      }
    }

    #info {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(167, 139, 250, 0.7);
      letter-spacing: 0.5px;
      z-index: 100;
      text-align: center;
      pointer-events: none;
    }

    #fps {
      position: absolute;
      top: 24px;
      right: 24px;
      padding: 8px 14px;
      background: rgba(10, 10, 30, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(138, 100, 255, 0.35);
      border-radius: 8px;
      font-size: 12px;
      color: #a78bfa;
      z-index: 100;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="ui-panel">
    <h2>星系碰撞控制台</h2>
    <div class="control-group">
      <div style="overflow: hidden;">
        <label>星系间距 <span class="value-display" id="distance-value">1.0</span></label>
      </div>
      <div class="slider-container">
        <input type="range" id="distance-slider" min="0.5" max="3.0" step="0.1" value="1.0" />
      </div>
    </div>
    <div class="control-group">
      <div style="overflow: hidden;">
        <label>碰撞速度 <span class="value-display" id="speed-value">1.0</span></label>
      </div>
      <div class="slider-container">
        <input type="range" id="speed-slider" min="0.1" max="3.0" step="0.1" value="1.0" />
      </div>
    </div>
    <button class="btn" id="reset-btn">重置视角</button>
    <button class="btn" id="restart-btn">重新模拟</button>
  </div>

  <div id="fps">FPS: --</div>

  <div id="info">鼠标拖拽旋转视角 · 滚轮缩放 · 观察两个螺旋星系的引力共舞</div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
