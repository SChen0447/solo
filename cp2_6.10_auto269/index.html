<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>重力迷宫</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #1a0a2e 0%, #0d0d2b 100%);
      font-family: 'Press Start 2P', monospace;
    }

    #game-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    #game-canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      box-shadow: 0 0 40px rgba(138, 43, 226, 0.3);
    }

    #loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a0a2e 0%, #0d0d2b 100%);
      z-index: 100;
      transition: opacity 0.5s ease-out;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .game-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 32px;
      color: #ffffff;
      text-shadow:
        0 0 10px #8a2be2,
        0 0 20px #8a2be2,
        0 0 30px #8a2be2,
        0 0 40px #8a2be2,
        3px 3px 0 #4b0082;
      letter-spacing: 4px;
      margin-bottom: 40px;
      animation: titleGlow 2s ease-in-out infinite alternate;
    }

    @keyframes titleGlow {
      from {
        text-shadow:
          0 0 10px #8a2be2,
          0 0 20px #8a2be2,
          0 0 30px #8a2be2,
          3px 3px 0 #4b0082;
      }
      to {
        text-shadow:
          0 0 20px #9932cc,
          0 0 40px #9932cc,
          0 0 60px #9932cc,
          0 0 80px #9932cc,
          3px 3px 0 #4b0082;
      }
    }

    .loading-text {
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      color: #b388ff;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="loading-screen">
      <h1 class="game-title">重力迷宫</h1>
      <p class="loading-text">LOADING...</p>
    </div>
    <canvas id="game-canvas" width="640" height="480"></canvas>
  </div>
  <script type="module" src="/src/GameMain.ts"></script>
</body>
</html>
