<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CollabMindMap - 协同思维导图</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }
      #loading-screen {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        transition: opacity 0.5s ease;
      }
      #loading-screen.fade-out { opacity: 0; pointer-events: none; }
      .loading-icon {
        width: 80px; height: 80px; position: relative;
        animation: spin 2s linear infinite;
      }
      .loading-icon .node {
        position: absolute; width: 20px; height: 20px; border-radius: 50%;
        background: rgba(0, 212, 255, 0.8);
      }
      .loading-icon .node:nth-child(1) { top: 0; left: 30px; }
      .loading-icon .node:nth-child(2) { top: 30px; left: 0; background: rgba(74, 222, 128, 0.8); }
      .loading-icon .node:nth-child(3) { top: 30px; left: 60px; background: rgba(251, 191, 36, 0.8); }
      .loading-icon .node:nth-child(4) { top: 60px; left: 20px; background: rgba(244, 114, 182, 0.8); }
      .loading-icon .node:nth-child(5) { top: 60px; left: 40px; background: rgba(167, 139, 250, 0.8); }
      .loading-text {
        margin-top: 24px; color: #00d4ff; font-size: 14px; letter-spacing: 2px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <div style="text-align: center;">
        <div class="loading-icon">
          <div class="node"></div>
          <div class="node"></div>
          <div class="node"></div>
          <div class="node"></div>
          <div class="node"></div>
        </div>
        <div class="loading-text">连接协作空间...</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
