<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>蝴蝶园 - Butterfly Garden</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }
    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    #ui-overlay > * {
      pointer-events: auto;
    }
    .panel {
      background: rgba(42, 42, 78, 0.85);
      border-radius: 16px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(8px);
      color: #fff;
    }
    .btn {
      background: rgba(74, 74, 110, 0.7);
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      user-select: none;
    }
    .btn:hover {
      background: rgba(90, 90, 130, 0.9);
      transform: scale(1.05);
    }
    .btn:active {
      transform: scale(0.97);
    }
    .modal-backdrop {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-backdrop.active { display: flex; }
    .modal {
      background: rgba(26, 26, 46, 0.7);
      border-radius: 20px;
      padding: 28px 32px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(12px);
      color: #fff;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="ui-overlay">
      <div id="backpack-indicator" class="panel" style="position:absolute; top:20px; right:20px; width:60px; height:60px; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; cursor:pointer;">
        🦋 <span id="backpack-count" style="margin-left:4px;">0/8</span>
      </div>
      <div id="controls" class="panel" style="position:absolute; bottom:24px; right:24px; padding:16px; display:flex; gap:12px;">
        <button id="btn-shop" class="btn">🌱 种子商店</button>
        <button id="btn-backpack" class="btn">🎒 背包</button>
      </div>
      <div id="shop-modal" class="modal-backdrop">
        <div class="modal" style="min-width:360px;">
          <h2 style="margin-bottom:18px; font-size:22px;">🌱 选择花种</h2>
          <p id="shop-hint" style="margin-bottom:16px; color:#aaa; font-size:13px;">点击空花坛可打开此菜单</p>
          <div id="seed-list" style="display:flex; flex-direction:column; gap:12px;">
          </div>
          <div style="margin-top:20px; text-align:right;">
            <button id="shop-close" class="btn" style="background:rgba(120,60,60,0.7);">关闭</button>
          </div>
        </div>
      </div>
      <div id="backpack-modal" class="modal-backdrop">
        <div class="modal" style="min-width:520px; max-width:700px;">
          <h2 style="margin-bottom:18px; font-size:22px;">🎒 蝴蝶收集 <span id="backpack-title-count" style="font-size:14px; color:#aaa; font-weight:400;">0/8</span></h2>
          <div id="butterfly-grid" style="display:grid; grid-template-columns:repeat(4, 1fr); gap:14px;">
          </div>
          <div style="margin-top:20px; text-align:right;">
            <button id="backpack-close" class="btn" style="background:rgba(120,60,60,0.7);">关闭</button>
          </div>
        </div>
      </div>
      <div id="catch-toast" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.5); opacity:0; transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1); background:linear-gradient(135deg,#ff6b6b,#ffd93d); padding:16px 32px; border-radius:20px; font-size:20px; font-weight:700; color:#fff; box-shadow:0 4px 15px rgba(0,0,0,0.3); pointer-events:none; z-index:200;">
        🎉 捕捉成功！
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
