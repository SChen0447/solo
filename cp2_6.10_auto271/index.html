<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星尘视界</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000011;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: row;
    }

    #canvas-container {
      width: 80%;
      height: 100%;
      position: relative;
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #control-panel {
      width: 20%;
      height: 100%;
      background: rgba(10, 10, 46, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-left: 1px solid rgba(42, 42, 94, 0.6);
      border-radius: 0;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      overflow-y: auto;
    }

    .panel-title {
      font-size: 24px;
      font-weight: 200;
      color: #ffffff;
      text-align: center;
      letter-spacing: 8px;
      text-shadow: 0 0 12px rgba(139, 92, 246, 0.8),
                   0 0 24px rgba(139, 92, 246, 0.4);
      margin-bottom: 8px;
    }

    .control-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .control-label {
      font-size: 13px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: 1px;
    }

    .slider-container {
      position: relative;
      width: 100%;
      height: 32px;
      display: flex;
      align-items: center;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: #2a2a5e;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    input[type="range"]:hover {
      background: #3a3a7e;
      box-shadow: 0 0 12px rgba(139, 92, 246, 0.3);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 0 8px rgba(139, 92, 246, 0.6);
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 16px rgba(139, 92, 246, 0.9);
    }

    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
      box-shadow: 0 0 8px rgba(139, 92, 246, 0.6);
    }

    input[type="range"]::-moz-range-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 16px rgba(139, 92, 246, 0.9);
    }

    .slider-value {
      position: absolute;
      right: 0;
      top: -6px;
      font-size: 12px;
      font-weight: 300;
      color: rgba(139, 92, 246, 0.95);
    }

    .theme-container {
      display: flex;
      gap: 12px;
      justify-content: space-between;
    }

    .theme-swatch {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 2px solid transparent;
      position: relative;
      overflow: hidden;
    }

    .theme-swatch:hover {
      transform: scale(1.08);
      box-shadow: 0 0 16px rgba(255, 255, 255, 0.25);
    }

    .theme-swatch.active {
      border-color: #ffffff;
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
    }

    .theme-swatch-inner {
      position: absolute;
      inset: 0;
    }

    .particle-count {
      font-size: 14px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.75);
      text-align: center;
      letter-spacing: 1px;
      padding: 12px;
      background: rgba(42, 42, 94, 0.3);
      border-radius: 8px;
      border: 1px solid rgba(42, 42, 94, 0.5);
    }

    .particle-count span {
      color: #8b5cf6;
      font-weight: 400;
      font-size: 16px;
    }

    #particle-info {
      position: absolute;
      pointer-events: none;
      background: rgba(10, 10, 30, 0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(139, 92, 246, 0.4);
      border-radius: 8px;
      padding: 12px 16px;
      color: #ffffff;
      font-size: 13px;
      font-weight: 300;
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: 100;
      min-width: 160px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    #particle-info.visible {
      opacity: 1;
    }

    #particle-info .info-title {
      font-size: 11px;
      color: rgba(139, 92, 246, 0.9);
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    #particle-info .info-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 3px 0;
    }

    #particle-info .info-label {
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
    }

    #particle-info .info-value {
      color: #ffffff;
      font-weight: 400;
    }

    #particle-info .info-color-preview {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 4px;
      margin-left: 6px;
      vertical-align: middle;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    @media (max-width: 768px) {
      #app {
        flex-direction: column;
      }

      #canvas-container {
        width: 100%;
        height: 70%;
      }

      #control-panel {
        width: 100%;
        height: 30%;
        border-left: none;
        border-top: 1px solid rgba(42, 42, 94, 0.6);
        flex-direction: row;
        flex-wrap: wrap;
        gap: 16px;
        padding: 16px;
      }

      .panel-title {
        width: 100%;
        font-size: 20px;
        letter-spacing: 6px;
        margin-bottom: 0;
      }

      .control-section {
        flex: 1;
        min-width: 140px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="control-panel">
      <div class="panel-title">星尘视界</div>
      <div class="control-section">
        <div class="control-label">粒子密度</div>
        <div class="slider-container">
          <input type="range" id="density-slider" min="1" max="20" value="5" step="1" />
          <span class="slider-value" id="density-value">5</span>
        </div>
      </div>
      <div class="control-section">
        <div class="control-label">运动速度</div>
        <div class="slider-container">
          <input type="range" id="speed-slider" min="0" max="5" value="1" step="0.1" />
          <span class="slider-value" id="speed-value">1.0</span>
        </div>
      </div>
      <div class="control-section">
        <div class="control-label">配色主题</div>
        <div class="theme-container" id="theme-container">
          <div class="theme-swatch active" data-theme="nebula_purple">
            <div class="theme-swatch-inner" style="background: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 50%, #ec4899 100%);"></div>
          </div>
          <div class="theme-swatch" data-theme="flame_orange">
            <div class="theme-swatch-inner" style="background: linear-gradient(135deg, #f97316 0%, #ef4444 50%, #eab308 100%);"></div>
          </div>
          <div class="theme-swatch" data-theme="ice_blue">
            <div class="theme-swatch-inner" style="background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 50%, #22d3ee 100%);"></div>
          </div>
          <div class="theme-swatch" data-theme="life_green">
            <div class="theme-swatch-inner" style="background: linear-gradient(135deg, #22c55e 0%, #10b981 50%, #84cc16 100%);"></div>
          </div>
        </div>
      </div>
      <div class="particle-count">粒子总数：<span id="particle-count">5000</span></div>
    </div>
  </div>
  <div id="particle-info"></div>
  <script type="module" src="/src/MainScene.ts"></script>
</body>
</html>
