<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>霓虹之网 - 3D城市电力网络可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0b1a;
      font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    #app:active {
      cursor: grabbing;
    }

    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 20px 30px;
      z-index: 10;
      pointer-events: none;
    }

    #title {
      font-size: 28px;
      font-weight: bold;
      color: #00ffaa;
      text-shadow:
        0 0 10px #00ffaa,
        0 0 20px #00ffaa,
        0 0 40px #00ffaa,
        0 0 80px rgba(0, 255, 170, 0.5);
      letter-spacing: 4px;
      transition: all 0.3s ease;
    }

    #subtitle {
      font-size: 13px;
      color: rgba(0, 255, 170, 0.6);
      margin-top: 6px;
      letter-spacing: 2px;
    }

    #controls {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(10, 11, 26, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 16px;
      z-index: 10;
      width: 280px;
      border: 1px solid rgba(0, 255, 170, 0.2);
      cursor: default;
      transition: all 0.3s ease;
    }

    #controls:hover {
      border-color: rgba(0, 255, 170, 0.4);
      box-shadow: 0 0 20px rgba(0, 255, 170, 0.15);
    }

    .control-label {
      font-size: 13px;
      color: rgba(0, 255, 170, 0.9);
      margin-bottom: 10px;
      display: block;
      letter-spacing: 1px;
    }

    .control-row {
      margin-bottom: 18px;
    }

    .control-row:last-child {
      margin-bottom: 0;
    }

    .slider-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right, #00ff88, #ff3355);
      outline: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 255, 170, 0.8);
      transition: all 0.3s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 15px rgba(0, 255, 170, 1);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 255, 170, 0.8);
      border: none;
      transition: all 0.3s ease;
    }

    #loadValue {
      font-size: 14px;
      color: #ffffff;
      font-weight: bold;
      min-width: 40px;
      text-align: right;
      font-family: "Consolas", monospace;
    }

    #resetBtn {
      width: 100%;
      padding: 10px 16px;
      background: linear-gradient(135deg, rgba(0, 255, 170, 0.2), rgba(0, 170, 255, 0.2));
      border: 1px solid rgba(0, 255, 170, 0.5);
      border-radius: 8px;
      color: #00ffaa;
      font-size: 13px;
      font-family: "Microsoft YaHei", sans-serif;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.3s ease;
    }

    #resetBtn:hover {
      background: linear-gradient(135deg, rgba(0, 255, 170, 0.35), rgba(0, 170, 255, 0.35));
      border-color: rgba(0, 255, 170, 0.8);
      box-shadow: 0 0 15px rgba(0, 255, 170, 0.3);
      transform: translateY(-1px);
    }

    #resetBtn:active {
      transform: translateY(0);
    }

    #fpsCounter {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 6px;
      font-family: "Consolas", monospace;
    }

    #fpsLabel {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
    }

    #fpsValue {
      font-size: 16px;
      font-weight: bold;
      color: #00ff88;
      transition: color 0.3s ease;
    }

    #fpsValue.low {
      color: #ffaa00;
    }

    #fpsValue.critical {
      color: #ff3355;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .stat-item {
      padding: 8px 10px;
      background: rgba(0, 0, 0, 0.25);
      border-radius: 6px;
    }

    .stat-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 2px;
    }

    .stat-value {
      font-size: 14px;
      color: #00ffaa;
      font-family: "Consolas", monospace;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="header">
    <div id="title">霓虹之网</div>
    <div id="subtitle">NEON GRID · 3D CITY POWER NETWORK</div>
  </div>

  <div id="controls">
    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-label">节点数</div>
        <div class="stat-value" id="nodeCount">0</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">连线数</div>
        <div class="stat-value" id="lineCount">0</div>
      </div>
    </div>

    <div class="control-row">
      <label class="control-label">模拟负载调节</label>
      <div class="slider-container">
        <input type="range" id="loadSlider" min="0" max="100" step="1" value="30">
        <span id="loadValue">30</span>
      </div>
    </div>

    <div class="control-row">
      <button id="resetBtn">重置网络</button>
    </div>

    <div class="control-row">
      <div id="fpsCounter">
        <span id="fpsLabel">帧率 FPS</span>
        <span id="fpsValue">60</span>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
