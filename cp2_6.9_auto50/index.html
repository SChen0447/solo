<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Sandbox - 像素沙盒模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
      font-family: 'Courier New', 'Consolas', monospace;
      color: #A0A0A0;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
    }

    .toolbar {
      position: relative;
      z-index: 10;
      width: 80px;
      height: 100vh;
      background: rgba(30, 30, 46, 0.9);
      backdrop-filter: blur(10px);
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      border-right: 1px solid #3B3B5A;
    }

    .toolbar-title {
      font-size: 10px;
      color: #666;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    .element-btn {
      width: 48px;
      height: 48px;
      border: 2px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2D2D44 0%, #1E1E2E 100%);
      transition: all 0.15s ease;
      position: relative;
    }

    .element-btn:hover {
      transform: scale(1.08);
      filter: brightness(1.2);
    }

    .element-btn.active {
      border-color: #00FFCC;
      box-shadow: 0 0 15px rgba(0, 255, 204, 0.4),
                  inset 0 0 10px rgba(0, 255, 204, 0.1);
    }

    .element-btn svg {
      width: 32px;
      height: 32px;
    }

    .clear-btn {
      width: 48px;
      height: 48px;
      border: 2px solid #FF3333;
      border-radius: 6px;
      cursor: pointer;
      background: linear-gradient(135deg, #3D1515 0%, #1E0A0A 100%);
      color: #FF3333;
      font-size: 11px;
      font-weight: bold;
      transition: all 0.15s ease;
      margin-top: auto;
    }

    .clear-btn:hover {
      background: #FF3333;
      color: #fff;
      box-shadow: 0 0 15px rgba(255, 51, 51, 0.5);
    }

    .canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #000000;
    }

    #gameCanvas {
      display: block;
      cursor: none;
    }

    .stats-panel {
      position: absolute;
      right: 16px;
      bottom: 56px;
      z-index: 10;
      background: rgba(30, 30, 46, 0.85);
      backdrop-filter: blur(8px);
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #3B3B5A;
      font-size: 13px;
      line-height: 1.8;
      min-width: 160px;
    }

    .stats-panel .label {
      color: #666;
      margin-right: 8px;
    }

    .stats-panel .value {
      color: #A0A0A0;
    }

    .stats-panel.accelerated .fps-value {
      color: #FFD700;
    }

    .bottom-bar {
      position: absolute;
      left: 80px;
      right: 0;
      bottom: 0;
      height: 44px;
      z-index: 10;
      background: rgba(30, 30, 46, 0.9);
      backdrop-filter: blur(10px);
      border-top: 1px solid #3B3B5A;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 24px;
    }

    .toggle-container {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
    }

    .toggle-switch {
      position: relative;
      width: 42px;
      height: 22px;
      background: #2D2D44;
      border-radius: 11px;
      transition: all 0.2s ease;
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      background: #666;
      border-radius: 50%;
      transition: all 0.2s ease;
    }

    .toggle-container.active .toggle-switch {
      background: rgba(255, 215, 0, 0.2);
    }

    .toggle-container.active .toggle-switch::after {
      left: 23px;
      background: #FFD700;
      box-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
    }

    .toggle-label {
      font-size: 13px;
      color: #A0A0A0;
    }

    .toggle-container.active .toggle-label {
      color: #FFD700;
    }

    .hint-text {
      font-size: 11px;
      color: #555;
      margin-left: auto;
    }

    .flash-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #FFFFFF;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      transition: opacity 0.1s ease-out;
    }

    .flash-overlay.flash {
      opacity: 0.6;
      transition: opacity 0s;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="toolbar">
      <div class="toolbar-title">ELEMENTS</div>
      <button class="element-btn active" data-element="sand" title="沙子 (Sand)">
        <svg viewBox="0 0 32 32">
          <rect x="8" y="8" width="4" height="4" fill="#E8D5B1"/>
          <rect x="14" y="6" width="4" height="4" fill="#E8D5B1" opacity="0.9"/>
          <rect x="20" y="10" width="4" height="4" fill="#E8D5B1" opacity="0.8"/>
          <rect x="6" y="16" width="4" height="4" fill="#E8D5B1" opacity="0.85"/>
          <rect x="12" y="14" width="4" height="4" fill="#E8D5B1"/>
          <rect x="18" y="18" width="4" height="4" fill="#E8D5B1" opacity="0.9"/>
          <rect x="24" y="16" width="4" height="4" fill="#E8D5B1" opacity="0.75"/>
          <rect x="10" y="22" width="4" height="4" fill="#E8D5B1" opacity="0.8"/>
          <rect x="16" y="24" width="4" height="4" fill="#E8D5B1" opacity="0.9"/>
          <rect x="22" y="22" width="4" height="4" fill="#E8D5B1"/>
        </svg>
      </button>
      <button class="element-btn" data-element="water" title="水 (Water)">
        <svg viewBox="0 0 32 32">
          <rect x="4" y="20" width="24" height="8" fill="#3B82F6" rx="1"/>
          <rect x="8" y="16" width="16" height="4" fill="#3B82F6" opacity="0.9"/>
          <rect x="12" y="12" width="8" height="4" fill="#3B82F6" opacity="0.8"/>
          <rect x="14" y="8" width="4" height="4" fill="#3B82F6" opacity="0.7"/>
          <rect x="6" y="22" width="2" height="2" fill="#60A5FA" opacity="0.6"/>
          <rect x="20" y="24" width="2" height="2" fill="#60A5FA" opacity="0.6"/>
        </svg>
      </button>
      <button class="element-btn" data-element="lava" title="岩浆 (Lava)">
        <svg viewBox="0 0 32 32">
          <rect x="4" y="20" width="24" height="8" fill="#FF4500" rx="1"/>
          <rect x="6" y="16" width="20" height="4" fill="#FF4500" opacity="0.9"/>
          <rect x="10" y="12" width="12" height="4" fill="#FF6600" opacity="0.85"/>
          <rect x="14" y="8" width="4" height="4" fill="#FF8800" opacity="0.7"/>
          <rect x="8" y="22" width="3" height="3" fill="#FFD700" opacity="0.6"/>
          <rect x="18" y="24" width="3" height="3" fill="#FFD700" opacity="0.6"/>
          <rect x="22" y="21" width="2" height="2" fill="#FFD700" opacity="0.5"/>
        </svg>
      </button>
      <button class="element-btn" data-element="wood" title="木材 (Wood)">
        <svg viewBox="0 0 32 32">
          <rect x="8" y="4" width="16" height="24" fill="#8B4513"/>
          <rect x="10" y="6" width="2" height="20" fill="#6B3410" opacity="0.6"/>
          <rect x="15" y="6" width="2" height="20" fill="#6B3410" opacity="0.5"/>
          <rect x="20" y="6" width="2" height="20" fill="#6B3410" opacity="0.6"/>
          <rect x="8" y="10" width="16" height="1" fill="#A0522D" opacity="0.4"/>
          <rect x="8" y="18" width="16" height="1" fill="#A0522D" opacity="0.4"/>
        </svg>
      </button>
      <button class="element-btn" data-element="gunpowder" title="火药 (Gunpowder)">
        <svg viewBox="0 0 32 32">
          <rect x="10" y="20" width="3" height="3" fill="#FF0000"/>
          <rect x="16" y="22" width="3" height="3" fill="#FF0000" opacity="0.9"/>
          <rect x="22" y="20" width="3" height="3" fill="#FF0000" opacity="0.85"/>
          <rect x="8" y="14" width="3" height="3" fill="#FF0000" opacity="0.8"/>
          <rect x="14" y="12" width="3" height="3" fill="#FF0000" opacity="0.95"/>
          <rect x="20" y="14" width="3" height="3" fill="#FF0000"/>
          <rect x="11" y="8" width="3" height="3" fill="#FF0000" opacity="0.9"/>
          <rect x="18" y="6" width="3" height="3" fill="#FF0000" opacity="0.85"/>
          <rect x="24" y="10" width="3" height="3" fill="#FF0000" opacity="0.75"/>
        </svg>
      </button>
      <button class="clear-btn" id="clearBtn" title="清空世界">
        清空
      </button>
    </div>

    <div class="canvas-container">
      <canvas id="gameCanvas"></canvas>
      <div class="stats-panel" id="statsPanel">
        <div><span class="label">种子:</span><span class="value" id="seedCount">0</span></div>
        <div><span class="label">FPS:</span><span class="value fps-value" id="fpsValue">60</span></div>
        <div><span class="label">步数:</span><span class="value" id="stepCount">0</span></div>
      </div>
      <div class="flash-overlay" id="flashOverlay"></div>
    </div>

    <div class="bottom-bar">
      <div class="toggle-container" id="speedToggle">
        <div class="toggle-switch"></div>
        <span class="toggle-label">加速模式 x2</span>
      </div>
      <div class="hint-text">
        左键放置 | 右键移除 | Shift+拖拽填充区域 | 滚轮缩放 | Ctrl+Z 撤销
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
