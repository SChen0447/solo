<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D手势点云交互</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0D0D2B;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
      position: relative;
    }
    .control-panel {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid #4A90D9;
      border-radius: 16px;
      padding: 20px;
      min-width: 240px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    .panel-title {
      color: #e2e8f0;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px 16px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #4A90D9, #6C63FF);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(74, 144, 217, 0.4);
    }
    .btn:active {
      transform: translateY(0);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
      padding: 8px 0;
    }
    .status-label {
      color: #94a3b8;
      font-size: 12px;
    }
    .status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 8px #ef4444;
      transition: all 0.3s ease;
    }
    .status-indicator.tracking {
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
      animation: pulse-green 1.5s ease-in-out infinite;
    }
    @keyframes pulse-green {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }
    .gesture-display {
      color: #FFD93D;
      font-size: 12px;
      margin-top: 8px;
      padding-top: 12px;
      border-top: 1px solid rgba(74, 144, 217, 0.3);
    }
    .fps-display {
      color: #64748b;
      font-size: 11px;
      margin-top: 6px;
    }
    #video-feed {
      display: none;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <video id="video-feed" autoplay playsinline muted></video>

  <div class="control-panel">
    <div class="panel-title">手势交互控制台</div>
    <button id="btn-camera" class="btn">开启摄像头</button>
    <button id="btn-reset" class="btn">重置姿态</button>
    <div class="status-row">
      <span class="status-label">追踪状态</span>
      <div id="status-indicator" class="status-indicator"></div>
    </div>
    <div class="gesture-display" id="gesture-display">等待手势输入...</div>
    <div class="fps-display" id="fps-display">FPS: --</div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
