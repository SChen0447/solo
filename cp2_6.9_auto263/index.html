<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>深海沉船 - 像素探险游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000B18;
      font-family: monospace;
    }
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #001F3F 0%, #000B18 100%);
    }
    #game-canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }
    #hud {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 960px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
      z-index: 10;
    }
    #artifact-counter, #timer-display {
      background: #00000080;
      color: #FFFFFF;
      padding: 8px 16px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 16px;
      min-width: 120px;
      text-align: center;
    }
    #timer-display {
      color: #FF4444;
      font-size: 20px;
      display: none;
    }
    #timer-display.blinking {
      animation: blink 0.5s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="960" height="540"></canvas>
    <div id="hud">
      <div id="artifact-counter">文物: 0</div>
      <div id="timer-display">60</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
