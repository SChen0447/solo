<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>音律石阵 - 古风解谜</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #16213e 100%);
      border: 8px solid #d4a017;
      overflow: hidden;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #step-counter {
      position: absolute;
      top: 24px;
      left: 24px;
      color: #ffffff;
      font-size: 16px;
      font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: transform 0.15s ease-out;
      cursor: default;
    }

    #step-counter:hover {
      transform: scale(1.1);
    }

    #dots-indicator {
      display: flex;
      gap: 10px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: #6c6c7c;
      transition: all 0.3s ease-out;
    }

    .dot.active {
      background-color: #f1c40f;
      transform: scale(1.2);
      box-shadow: 0 0 12px rgba(241, 196, 15, 0.8);
    }

    #reset-btn {
      position: absolute;
      bottom: 24px;
      right: 24px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: #e74c3c;
      border: none;
      cursor: pointer;
      pointer-events: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease-out;
      box-shadow: 0 4px 12px rgba(231, 76, 60, 0.4);
    }

    #reset-btn:hover {
      transform: scale(1.1);
    }

    #reset-btn svg {
      width: 20px;
      height: 20px;
      stroke: #ffffff;
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="ui-layer">
      <div id="step-counter">
        <span id="step-text">步数：0/3</span>
        <div id="dots-indicator">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
      <button id="reset-btn" title="重开">
        <svg viewBox="0 0 24 24">
          <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
        </svg>
      </button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
