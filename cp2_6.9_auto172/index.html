<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>手势识别交互</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #12121A;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #ffffff;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    #canvas-wrapper {
      position: relative;
      width: 70%;
      height: 70%;
      box-shadow: 0 0 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      background: #1E1E2E;
      overflow: hidden;
      transition: width 0.3s ease, height 0.3s ease;
    }

    #drawing-canvas, #effects-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    #effects-canvas {
      pointer-events: none;
    }

    #controls {
      position: absolute;
      top: 16px;
      left: 16px;
      display: flex;
      flex-direction: row;
      gap: 8px;
      z-index: 10;
    }

    .control-btn {
      width: 120px;
      height: 36px;
      border: none;
      border-radius: 8px;
      background: #333333;
      color: #ffffff;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    .control-btn:hover {
      background: #555555;
    }

    .control-btn:active {
      transform: scale(0.95);
    }

    #result-label {
      position: absolute;
      bottom: 16px;
      right: 16px;
      padding: 10px 18px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 10px;
      font-size: 16px;
      color: #ffffff;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 10;
    }

    #result-label.visible {
      opacity: 1;
    }

    #status-bar {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: row;
      gap: 12px;
      padding: 10px 20px;
      background: rgba(30, 30, 46, 0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 10px;
      min-height: 44px;
      align-items: center;
      z-index: 10;
      transition: flex-direction 0.3s ease;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.85);
      padding: 4px 10px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      opacity: 0;
      animation: fadeIn 0.3s ease forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .shake {
      animation: shakeAnim 0.3s ease-in-out;
    }

    @keyframes shakeAnim {
      0%, 100% { transform: translate(0, 0); }
      20% { transform: translate(-8px, 0); }
      40% { transform: translate(8px, 0); }
      60% { transform: translate(-4px, 0); }
      80% { transform: translate(4px, 0); }
    }

    #canvas-wrapper.shake {
      animation: shakeAnim 0.3s ease-in-out;
    }

    @media (max-width: 768px) {
      #canvas-wrapper {
        width: 95%;
        height: 70%;
      }
      .control-btn {
        width: 100px;
      }
      #result-label {
        font-size: 14px;
      }
    }

    @media (max-width: 480px) {
      #canvas-wrapper {
        width: 100%;
        height: 100%;
        border-radius: 0;
      }
      #controls {
        flex-direction: column;
        top: 12px;
        left: 12px;
      }
      .control-btn {
        width: 100px;
        height: 32px;
        font-size: 12px;
      }
      #status-bar {
        flex-direction: column;
        bottom: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-wrapper">
      <canvas id="drawing-canvas"></canvas>
      <canvas id="effects-canvas"></canvas>
      <div id="controls">
        <button class="control-btn" id="btn-reset">重置画布</button>
        <button class="control-btn" id="btn-undo">撤销</button>
        <button class="control-btn" id="btn-save">保存图片</button>
      </div>
      <div id="result-label"></div>
    </div>
    <div id="status-bar"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
