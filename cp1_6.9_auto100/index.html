<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>极光与星轨 · 夜空可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #0a0a2e;
      cursor: grab;
    }

    body:active {
      cursor: grabbing;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #canvas-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .control-panel {
      position: fixed;
      right: 24px;
      bottom: 24px;
      width: 220px;
      height: auto;
      padding: 20px;
      background: rgba(10, 10, 30, 0.7);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 10;
      user-select: none;
    }

    .control-panel .title {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.9);
      font-weight: 600;
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }

    .slider-group {
      margin-bottom: 16px;
    }

    .slider-group:last-child {
      margin-bottom: 0;
    }

    .slider-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .slider-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.8);
    }

    .slider-value {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      font-variant-numeric: tabular-nums;
      min-width: 32px;
      text-align: right;
    }

    .slider-wrapper {
      position: relative;
      width: 100%;
      height: 4px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: transparent;
      outline: none;
      cursor: pointer;
      position: relative;
      z-index: 2;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.1);
    }

    input[type="range"]::-moz-range-track {
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.1);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
      margin-top: -5px;
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.4);
      transition: transform 0.15s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.4);
    }

    .slider-track-fill {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 4px;
      border-radius: 2px;
      z-index: 1;
      pointer-events: none;
    }

    .slider-group[data-color="green"] .slider-track-fill {
      background: #00ff88;
      box-shadow: 0 0 8px rgba(0, 255, 136, 0.5);
    }

    .slider-group[data-color="pink"] .slider-track-fill {
      background: #ff66aa;
      box-shadow: 0 0 8px rgba(255, 102, 170, 0.5);
    }

    .slider-group[data-color="gray"] .slider-track-fill {
      background: #aaaaaa;
      box-shadow: 0 0 8px rgba(170, 170, 170, 0.3);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div class="control-panel">
      <div class="title">夜空控制</div>

      <div class="slider-group" data-color="green">
        <div class="slider-row">
          <span class="slider-label">极光强度</span>
          <span class="slider-value" id="intensity-value">1.0</span>
        </div>
        <div class="slider-wrapper">
          <div class="slider-track-fill" id="intensity-fill"></div>
          <input type="range" id="intensity-slider" min="0.5" max="2.0" step="0.1" value="1.0" />
        </div>
      </div>

      <div class="slider-group" data-color="pink">
        <div class="slider-row">
          <span class="slider-label">色彩饱和度</span>
          <span class="slider-value" id="saturation-value">1.0</span>
        </div>
        <div class="slider-wrapper">
          <div class="slider-track-fill" id="saturation-fill"></div>
          <input type="range" id="saturation-slider" min="0.0" max="1.5" step="0.05" value="1.0" />
        </div>
      </div>

      <div class="slider-group" data-color="gray">
        <div class="slider-row">
          <span class="slider-label">星轨速度</span>
          <span class="slider-value" id="speed-value">1.0</span>
        </div>
        <div class="slider-wrapper">
          <div class="slider-track-fill" id="speed-fill"></div>
          <input type="range" id="speed-slider" min="0.0" max="2.0" step="0.1" value="1.0" />
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
