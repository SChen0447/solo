<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>万花筒生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #kaleidoscope-canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      background: #000000;
      cursor: crosshair;
      min-width: 600px;
      min-height: 600px;
    }

    #controls-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 240px;
      height: 100vh;
      background: rgba(30, 30, 46, 0.8);
      backdrop-filter: blur(10px);
      padding: 24px 20px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 24px;
      box-shadow: -4px 0 20px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>
  <canvas id="kaleidoscope-canvas"></canvas>
  <div id="controls-panel"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
