<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>3D 熔岩灯 Lava Lamp</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #ffffff;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.8s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-bottle {
      width: 60px;
      height: 100px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 30px 30px 10px 10px;
      position: relative;
      overflow: hidden;
      margin-bottom: 30px;
    }

    .loading-glow {
      position: absolute;
      width: 100%;
      height: 100%;
      background: conic-gradient(
        from 0deg,
        rgba(255, 100, 50, 0.8),
        rgba(255, 200, 50, 0.8),
        rgba(255, 100, 50, 0.8)
      );
      animation: loadingSpin 3s linear infinite;
      filter: blur(8px);
      opacity: 0.6;
    }

    @keyframes loadingSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 14px;
      letter-spacing: 4px;
      color: rgba(255, 255, 255, 0.6);
    }

    .loading-dots span {
      animation: blink 1.4s infinite both;
    }

    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }

    .bg-glow {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120vmax;
      height: 120vmax;
      background: radial-gradient(
        circle at center,
        rgba(30, 30, 80, 0.4) 0%,
        rgba(15, 15, 40, 0.2) 30%,
        rgba(10, 10, 26, 0) 60%
      );
      pointer-events: none;
      z-index: 0;
    }

    .bg-ring {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80vmin;
      height: 80vmin;
      border: 1px solid rgba(100, 100, 200, 0.08);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    .bg-ring::before,
    .bg-ring::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 1px solid rgba(100, 100, 200, 0.05);
    }

    .bg-ring::before {
      width: 120%;
      height: 120%;
    }

    .bg-ring::after {
      width: 140%;
      height: 140%;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="bg-glow"></div>
    <div class="bg-ring"></div>
    <div id="canvas-container"></div>

    <div id="loading-screen">
      <div class="loading-bottle">
        <div class="loading-glow"></div>
      </div>
      <div class="loading-text">
        LOADING<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
