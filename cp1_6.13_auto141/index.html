<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>磁流体雕塑 - Magnetic Fluid Sculpture</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #1a1a2e 0%, #0d0d1a 100%);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    #canvas:active {
      cursor: grabbing;
    }

    #border-frame {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      border: 15px solid;
      border-image: linear-gradient(135deg, #1a1a2e, #16213e, #1a1a2e) 1;
      border-radius: 8px;
      z-index: 1;
    }

    #control-panel {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 150px;
      height: 200px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 10px;
      padding: 16px;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(0, 212, 255, 0.2);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .slider-label {
      font-size: 11px;
      color: #00d4ff;
      text-shadow: 0 0 6px rgba(0, 212, 255, 0.5);
      letter-spacing: 0.5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .slider-value {
      font-size: 10px;
      font-weight: 600;
      color: #00d4ff;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: rgba(0, 212, 255, 0.2);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #00d4ff;
      box-shadow: 0 0 8px rgba(0, 212, 255, 0.8);
      cursor: pointer;
      transition: box-shadow 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 12px rgba(0, 212, 255, 1);
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #00d4ff;
      box-shadow: 0 0 8px rgba(0, 212, 255, 0.8);
      cursor: pointer;
      border: none;
    }

    #hint {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(0, 212, 255, 0.6);
      font-size: 12px;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
      z-index: 50;
      pointer-events: none;
      user-select: none;
    }

    @media (max-width: 768px) {
      #control-panel {
        bottom: 16px;
        right: 50%;
        transform: translateX(50%);
        width: calc(100% - 32px);
        height: auto;
        flex-direction: row;
        justify-content: space-around;
        padding: 12px;
      }

      .slider-group {
        flex: 1;
        min-width: 0;
      }

      .slider-label {
        font-size: 10px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="canvas"></canvas>
    <div id="border-frame"></div>
    <div id="hint">拖拽拉伸 · 快速划动 · 双击触发动画</div>
    <div id="control-panel">
      <div class="slider-group">
        <div class="slider-label">
          <span>连线粗细</span>
          <span class="slider-value" id="connection-width-value">1.5</span>
        </div>
        <input type="range" id="connection-width" min="1" max="4" step="0.1" value="1.5" />
      </div>
      <div class="slider-group">
        <div class="slider-label">
          <span>回弹速度</span>
          <span class="slider-value" id="bounce-value">2.0s</span>
        </div>
        <input type="range" id="bounce-speed" min="1" max="3" step="0.1" value="2" />
      </div>
      <div class="slider-group">
        <div class="slider-label">
          <span>尾迹数量</span>
          <span class="slider-value" id="trail-value">25</span>
        </div>
        <input type="range" id="trail-count" min="10" max="40" step="1" value="25" />
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
