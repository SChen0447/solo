<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>3D 粒子雕塑工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ffffff;
      font-size: 18px;
      letter-spacing: 4px;
      z-index: 100;
      transition: opacity 0.5s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #stats {
      position: absolute;
      left: 16px;
      bottom: 16px;
      color: rgba(255, 255, 255, 0.7);
      font-family: 'JetBrains Mono', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.6;
      z-index: 50;
      user-select: none;
      pointer-events: none;
      text-shadow: 0 0 4px rgba(0, 0, 0, 0.8);
    }

    #stats .fps {
      font-weight: 600;
    }

    #stats .fps.good { color: #4ade80; }
    #stats .fps.warn { color: #facc15; }
    #stats .fps.bad  { color: #f87171; }

    @media (max-width: 768px) {
      #stats {
        font-size: 10px;
        left: 8px;
        bottom: 72px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="loading">加载中...</div>
    <div id="stats">
      <div><span class="fps good" id="fps-value">--</span> FPS</div>
      <div id="particle-count">-- 粒子</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
