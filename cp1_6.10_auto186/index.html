<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>极光幻境</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000011;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }

    .control-panel {
      position: fixed;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 240px;
      padding: 24px;
      background: rgba(10, 10, 20, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 0 0 15px 15px;
      border-top-left-radius: 15px;
      border-top-right-radius: 15px;
      color: #ffffff;
      z-index: 100;
      user-select: none;
    }

    .panel-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #00ff88;
      text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
    }

    .control-group {
      margin-bottom: 18px;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #cccccc;
      margin-bottom: 8px;
    }

    .control-value {
      color: #00ff88;
      font-weight: 500;
    }

    .slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(90deg, #1a1a3a 0%, #4a4a8a 100%);
      outline: none;
      cursor: pointer;
      transition: filter 0.2s ease-out, transform 0.2s ease-out;
    }

    .slider:hover {
      filter: brightness(1.3);
      transform: scale(1.05);
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #00ff88;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
      transition: filter 0.2s ease-out, transform 0.2s ease-out;
    }

    .slider::-webkit-slider-thumb:hover {
      filter: brightness(1.3);
      transform: scale(1.15);
    }

    .slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #00ff88;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
      transition: filter 0.2s ease-out, transform 0.2s ease-out;
    }

    .slider::-moz-range-thumb:hover {
      filter: brightness(1.3);
      transform: scale(1.15);
    }

    .reset-btn {
      width: 100%;
      padding: 10px 16px;
      margin-top: 8px;
      background: linear-gradient(135deg, #1a3a2a 0%, #2a5a4a 100%);
      color: #00ff88;
      border: 1px solid rgba(0, 255, 136, 0.3);
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: filter 0.2s ease-out, transform 0.2s ease-out, box-shadow 0.2s ease-out;
    }

    .reset-btn:hover {
      filter: brightness(1.3);
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div class="control-panel">
      <div class="panel-title">极光幻境</div>
      <div class="control-group">
        <div class="control-label">
          <span>波动速度</span>
          <span class="control-value" id="speed-value">1.00x</span>
        </div>
        <input type="range" class="slider" id="speed-slider" min="0.5" max="3" step="0.01" value="1">
      </div>
      <div class="control-group">
        <div class="control-label">
          <span>整体透明度</span>
          <span class="control-value" id="opacity-value">0.80</span>
        </div>
        <input type="range" class="slider" id="opacity-slider" min="0.2" max="1" step="0.01" value="0.8">
      </div>
      <div class="control-group">
        <div class="control-label">
          <span>太阳风强度</span>
          <span class="control-value" id="solar-value">50</span>
        </div>
        <input type="range" class="slider" id="solar-slider" min="0" max="100" step="1" value="50">
      </div>
      <button class="reset-btn" id="reset-btn">重置视角</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
