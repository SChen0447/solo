<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <title>森林共鸣 - 音控治愈小游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #0B0C10 0%, #1F2833 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-width: 440px;
      min-height: 600px;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .game-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 100vw;
      max-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #gameCanvas {
      display: block;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .ui-overlay {
      position: absolute;
      pointer-events: none;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 12px 16px;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    #scorePanel {
      position: absolute;
      top: 20px;
      left: 20px;
      pointer-events: none;
    }

    #scoreValue {
      color: rgba(255, 255, 255, 0.8);
      font-size: 24px;
      font-weight: 300;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      letter-spacing: 1px;
    }

    #audioPanel {
      position: absolute;
      top: 20px;
      right: 20px;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #audioLabel {
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
    }

    #audioBarContainer {
      width: 200px;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
    }

    #audioBar {
      height: 100%;
      width: 0%;
      border-radius: 4px;
      transition: width 0.05s linear, background 0.2s ease;
    }

    #helpPanel {
      position: absolute;
      bottom: 20px;
      left: 20px;
      pointer-events: none;
    }

    #helpText {
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
    }

    #startOverlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 24px;
      z-index: 100;
      pointer-events: all;
      background: rgba(11, 12, 16, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: opacity 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    #startOverlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #startTitle {
      color: #FFD700;
      font-size: 42px;
      font-weight: 300;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
      letter-spacing: 4px;
    }

    #startSubtitle {
      color: rgba(255, 255, 255, 0.6);
      font-size: 16px;
      max-width: 400px;
      text-align: center;
      line-height: 1.8;
    }

    #startBtn {
      padding: 14px 40px;
      font-size: 16px;
      color: #0B0C10;
      background: linear-gradient(135deg, #FFD700 0%, #00FF88 100%);
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 500;
      letter-spacing: 2px;
      transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  box-shadow 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
    }

    #startBtn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 8px 30px rgba(255, 215, 0, 0.4);
    }

    #startBtn:active {
      transform: translateY(0) scale(0.98);
    }

    #winOverlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 30px;
      z-index: 90;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    #winOverlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    #winTitle {
      font-size: 36px;
      color: #FFD700;
      font-weight: 300;
      letter-spacing: 6px;
      text-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
    }

    #winScore {
      color: rgba(255, 255, 255, 0.8);
      font-size: 20px;
    }

    #restartBtn {
      padding: 12px 32px;
      font-size: 14px;
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 30px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    #restartBtn:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.4);
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="game-wrapper">
      <canvas id="gameCanvas"></canvas>

      <div class="ui-overlay">
        <div id="scorePanel" class="glass-panel">
          <span id="scoreValue">0</span>
        </div>

        <div id="audioPanel" class="glass-panel">
          <span id="audioLabel">音频输入</span>
          <div id="audioBarContainer">
            <div id="audioBar"></div>
          </div>
        </div>

        <div id="helpPanel" class="glass-panel">
          <span id="helpText">对麦克风发声控制小生物</span>
        </div>
      </div>

      <div id="startOverlay">
        <h1 id="startTitle">森林共鸣</h1>
        <p id="startSubtitle">
          用你的声音唤醒沉睡的森林<br/>
          音调控制方向，音量控制跳跃<br/>
          收集所有光点，与森林共鸣
        </p>
        <button id="startBtn">开始游戏</button>
      </div>

      <div id="winOverlay">
        <h2 id="winTitle">森林共鸣</h2>
        <p id="winScore">总分：0</p>
        <button id="restartBtn">再次挑战</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
