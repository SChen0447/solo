<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, initial-scale=1.0" />
  <title>太空站机械臂调试系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0e1a;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }

    #canvas-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    canvas {
      display: block;
    }

    .ui-panel {
      position: absolute;
      background: rgba(10, 25, 55, 0.75);
      border: 1px solid rgba(100, 180, 255, 0.4);
      border-radius: 8px;
      padding: 16px 20px;
      color: #a8d4ff;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 20px rgba(80, 150, 255, 0.15);
    }

    #task-panel {
      top: 20px;
      left: 20px;
      min-width: 280px;
    }

    #control-panel {
      bottom: 20px;
      right: 20px;
      min-width: 260px;
    }

    .panel-title {
      font-size: 14px;
      font-weight: 600;
      color: #6fb5ff;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(100, 180, 255, 0.3);
      letter-spacing: 1px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 13px;
    }

    .stat-label {
      color: #7aa8d8;
    }

    .stat-value {
      color: #c8e4ff;
      font-weight: 500;
    }

    .target-module {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 3px;
      margin-right: 6px;
      vertical-align: middle;
      box-shadow: 0 0 6px currentColor;
    }

    .slider-container {
      margin: 8px 0;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 4px;
    }

    input[type="range"] {
      width: 100%;
      height: 4px;
      background: rgba(100, 180, 255, 0.2);
      border-radius: 2px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #4a9eff;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(100, 180, 255, 0.6);
    }

    .hint-text {
      font-size: 11px;
      color: #6a98c8;
      margin-top: 10px;
      line-height: 1.6;
    }

    .key {
      display: inline-block;
      background: rgba(100, 180, 255, 0.2);
      border: 1px solid rgba(100, 180, 255, 0.4);
      border-radius: 3px;
      padding: 1px 6px;
      margin: 0 2px;
      font-family: monospace;
      font-size: 11px;
    }

    #game-over-panel {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      min-width: 400px;
      text-align: center;
      display: none;
      z-index: 100;
    }

    #game-over-panel.show {
      display: block;
    }

    .grade-display {
      font-size: 64px;
      font-weight: bold;
      text-align: center;
      margin: 20px 0;
      text-shadow: 0 0 30px currentColor;
    }

    .grade-S { color: #ffd700; }
    .grade-A { color: #5eff88; }
    .grade-B { color: #5eb8ff; }
    .grade-C { color: #ff8855; }

    .restart-btn {
      margin-top: 16px;
      padding: 10px 32px;
      background: linear-gradient(135deg, rgba(80, 150, 255, 0.3), rgba(50, 100, 200, 0.3));
      border: 1px solid rgba(100, 180, 255, 0.6);
      color: #c8e4ff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }

    .restart-btn:hover {
      background: linear-gradient(135deg, rgba(100, 180, 255, 0.5), rgba(80, 150, 255, 0.5));
      box-shadow: 0 0 15px rgba(100, 180, 255, 0.4);
    }

    #disturbance-warning {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px 40px;
      font-size: 24px;
      font-weight: bold;
      color: #ff6644;
      background: rgba(80, 20, 10, 0.8);
      border: 2px solid rgba(255, 100, 60, 0.6);
      border-radius: 8px;
      display: none;
      text-shadow: 0 0 10px rgba(255, 100, 60, 0.8);
      z-index: 50;
    }

    #disturbance-warning.show {
      display: block;
      animation: pulse 0.5s infinite alternate;
    }

    @keyframes pulse {
      from { opacity: 0.7; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <div id="task-panel" class="ui-panel">
      <div class="panel-title">任务面板</div>
      <div class="stat-row">
        <span class="stat-label">当前目标:</span>
        <span class="stat-value" id="current-target"><span class="target-module" id="target-color"></span><span id="target-name">等待中...</span></span>
      </div>
      <div class="stat-row">
        <span class="stat-label">已安装:</span>
        <span class="stat-value" id="installed-count">0 / 5</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">当前得分:</span>
        <span class="stat-value" id="current-score">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">总用时:</span>
        <span class="stat-value" id="total-time">00:00</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">碰撞次数:</span>
        <span class="stat-value" id="collision-count">0</span>
      </div>
    </div>

    <div id="control-panel" class="ui-panel">
      <div class="panel-title">关节控制</div>
      <div class="slider-container">
        <div class="slider-label">
          <span>基座旋转 <span class="key">W</span> <span class="key">S</span></span>
          <span id="angle-base">0.0°</span>
        </div>
        <input type="range" id="slider-base" min="-180" max="180" value="0" step="0.5">
      </div>
      <div class="slider-container">
        <div class="slider-label">
          <span>肩关节 <span class="key">A</span> <span class="key">D</span></span>
          <span id="angle-shoulder">0.0°</span>
        </div>
        <input type="range" id="slider-shoulder" min="-90" max="90" value="0" step="0.5">
      </div>
      <div class="slider-container">
        <div class="slider-label">
          <span>肘关节 <span class="key">Q</span> <span class="key">E</span></span>
          <span id="angle-elbow">0.0°</span>
        </div>
        <input type="range" id="slider-elbow" min="-90" max="90" value="0" step="0.5">
      </div>
      <div class="slider-container">
        <div class="slider-label">
          <span>腕关节 <span class="key">R</span> <span class="key">F</span></span>
          <span id="angle-wrist">0.0°</span>
        </div>
        <input type="range" id="slider-wrist" min="-180" max="180" value="0" step="0.5">
      </div>
      <div class="hint-text">
        <span class="key">空格</span> 抓取/释放 &nbsp;
        <span class="key">双击</span> 安装<br>
        <span class="key">鼠标右键</span> 旋转视角
      </div>
    </div>

    <div id="disturbance-warning">⚠ 空间站震动中</div>

    <div id="game-over-panel" class="ui-panel">
      <div class="panel-title">任务完成</div>
      <div class="grade-display" id="final-grade">S</div>
      <div class="stat-row"><span class="stat-label">总得分:</span><span class="stat-value" id="final-score">0</span></div>
      <div class="stat-row"><span class="stat-label">总耗时:</span><span class="stat-value" id="final-time">00:00</span></div>
      <div class="stat-row"><span class="stat-label">成功安装:</span><span class="stat-value" id="final-installed">0</span></div>
      <div class="stat-row"><span class="stat-label">碰撞次数:</span><span class="stat-value" id="final-collisions">0</span></div>
      <button class="restart-btn" id="restart-btn">重新开始</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
