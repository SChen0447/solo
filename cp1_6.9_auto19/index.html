<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>彩色玻璃窗光影模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #2a2a2a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      user-select: none;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
    }

    .toolbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
      z-index: 10;
      pointer-events: none;
    }

    .toolbar button {
      pointer-events: auto;
      padding: 10px 24px;
      border: none;
      border-radius: 4px;
      color: #ffffff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
    }

    .toolbar button:hover {
      transform: scale(1.05);
    }

    #resetBtn {
      background-color: #6a4a3a;
    }

    #resetBtn:hover {
      background-color: #8a6a5a;
    }

    #saveBtn {
      background-color: #3a6a4a;
    }

    #saveBtn:hover {
      background-color: #5a8a6a;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="toolbar">
      <button id="resetBtn">重置布局</button>
      <button id="saveBtn">保存快照</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
