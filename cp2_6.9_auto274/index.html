<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>时间地衣 | Time Lichen</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #3A2E28;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #canvas-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #lichen-canvas {
      display: block;
      touch-action: none;
      cursor: crosshair;
    }
    .warming-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: #5A4A3A;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .time-button {
      position: absolute;
      right: 24px;
      bottom: 24px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #6B5A4A;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s ease, transform 0.3s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      z-index: 10;
    }
    .time-button:hover {
      background: #8B7A66;
      transform: rotate(180deg);
    }
    .time-button svg {
      width: 24px;
      height: 24px;
      fill: #D4C4A8;
    }
    .time-button.active {
      background: #D46A35;
      box-shadow: 0 0 20px rgba(212, 106, 53, 0.6);
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <canvas id="lichen-canvas"></canvas>
    <div class="warming-overlay" id="warming-overlay"></div>
    <button class="time-button" id="time-button" title="时间推移">
      <svg viewBox="0 0 24 24">
        <path d="M12 2V6L7.5 10.5L9 12L12 9V2ZM12 22V18L16.5 13.5L15 12L12 15V22ZM2 12H6L10.5 7.5L9 6L6 9H2ZM22 12H18L13.5 16.5L15 18L18 15H22ZM4.93 4.93L7.76 7.76L6.34 9.17L3.51 6.34L4.93 4.93ZM19.07 19.07L16.24 16.24L17.66 14.83L20.49 17.66L19.07 19.07ZM4.93 19.07L3.51 17.66L6.34 14.83L7.76 16.24L4.93 19.07ZM19.07 4.93L20.49 6.34L17.66 9.17L16.24 7.76L19.07 4.93Z"/>
      </svg>
    </button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
