<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智慧城市 3D 热力图</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #2a2d3a 0%, #0f1a3a 100%);
      color: #e8f0ff;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .glass-panel {
      background: rgba(20, 30, 60, 0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(120, 180, 255, 0.2);
      border-radius: 8px;
      color: #e8f0ff;
    }

    #control-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 16px;
      min-width: 200px;
      z-index: 10;
    }

    #control-panel h2 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #6ec8ff;
      letter-spacing: 0.5px;
    }

    .panel-btn {
      width: 100%;
      padding: 10px 14px;
      background: linear-gradient(135deg, #1e4d8b, #3a7bd5);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 13px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 2px 8px rgba(58, 123, 213, 0.4);
    }

    .panel-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(58, 123, 213, 0.6);
    }

    .panel-btn:active {
      transform: translateY(0);
    }

    .legend-section {
      margin-top: 16px;
    }

    .legend-section h3 {
      font-size: 12px;
      color: #8fb8e8;
      margin-bottom: 8px;
      font-weight: normal;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      margin-bottom: 4px;
      color: #c8d8ee;
    }

    .legend-color {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    #stats-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 16px;
      min-width: 220px;
      z-index: 10;
    }

    #stats-panel h2 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #6ec8ff;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 13px;
      border-bottom: 1px solid rgba(120, 180, 255, 0.1);
    }

    .stat-row:last-child {
      border-bottom: none;
    }

    .stat-label {
      color: #a0b8d8;
    }

    .stat-value {
      font-weight: bold;
      color: #6ec8ff;
    }

    .stat-badge {
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: bold;
    }

    .badge-green {
      background: rgba(80, 200, 120, 0.25);
      color: #50c878;
    }

    .badge-yellow {
      background: rgba(240, 200, 80, 0.25);
      color: #f0c850;
    }

    .badge-red {
      background: rgba(230, 80, 80, 0.25);
      color: #e65050;
    }

    #timeline-container {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 85%;
      max-width: 900px;
      padding: 16px 24px;
      z-index: 10;
    }

    .timeline-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .timeline-title {
      font-size: 13px;
      color: #6ec8ff;
    }

    #current-time {
      font-size: 14px;
      font-weight: bold;
      color: #ffffff;
    }

    .slider-wrapper {
      position: relative;
      padding: 10px 0;
    }

    #timeline-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 8px;
      border-radius: 4px;
      background: linear-gradient(90deg,
        #3a7bd5 0%,
        #50c878 25%,
        #f0c850 50%,
        #f09050 75%,
        #e65050 100%
      );
      outline: none;
      cursor: pointer;
    }

    #timeline-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4), 0 0 0 3px rgba(110, 200, 255, 0.3);
      transition: transform 0.15s ease;
    }

    #timeline-slider::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    #timeline-slider::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4), 0 0 0 3px rgba(110, 200, 255, 0.3);
    }

    .timeline-ticks {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 10px;
      color: #8098b8;
    }

    #info-bubble {
      position: absolute;
      display: none;
      padding: 14px 16px;
      min-width: 200px;
      z-index: 20;
      pointer-events: none;
    }

    #info-bubble h3 {
      font-size: 15px;
      color: #6ec8ff;
      margin-bottom: 10px;
    }

    #info-bubble .bubble-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 12px;
    }

    #info-bubble .bubble-label {
      color: #a0b8d8;
    }

    #info-bubble .bubble-value {
      font-weight: bold;
      color: #ffffff;
    }

    .bubble-close {
      position: absolute;
      top: 8px;
      right: 10px;
      font-size: 16px;
      cursor: pointer;
      color: #8098b8;
      pointer-events: auto;
      line-height: 1;
    }

    .bubble-close:hover {
      color: #ffffff;
    }

    @media (max-width: 768px) {
      #control-panel {
        top: auto;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        width: calc(100% - 40px);
        max-width: 400px;
        transition: transform 0.3s ease, bottom 0.3s ease;
      }

      #control-panel.collapsed {
        bottom: -200px;
      }

      #stats-panel {
        top: 10px;
        right: 10px;
        min-width: 160px;
        padding: 10px;
      }

      #timeline-container {
        width: calc(100% - 20px);
        bottom: 10px;
        padding: 10px 14px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div id="control-panel" class="glass-panel">
      <h2>控制面板</h2>
      <button id="refresh-btn" class="panel-btn">刷新数据</button>
      <div class="legend-section">
        <h3>污染等级 (颜色)</h3>
        <div class="legend-item">
          <div class="legend-color" style="background: #3a7bd5;"></div>
          <span>低 (0-50)</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #f09050;"></div>
          <span>中 (50-150)</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #c83030;"></div>
          <span>高 (150+)</span>
        </div>
      </div>
      <div class="legend-section">
        <h3>拥堵等级 (顶块)</h3>
        <div class="legend-item">
          <div class="legend-color" style="background: #50c878; box-shadow: 0 0 6px #50c878;"></div>
          <span>畅通 (&lt;30)</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #f0c850; box-shadow: 0 0 6px #f0c850;"></div>
          <span>缓行 (30-60)</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #e65050; box-shadow: 0 0 6px #e65050;"></div>
          <span>拥堵 (&gt;60)</span>
        </div>
      </div>
    </div>

    <div id="stats-panel" class="glass-panel">
      <h2>实时统计</h2>
      <div class="stat-row">
        <span class="stat-label">当前时刻</span>
        <span class="stat-value" id="stat-hour">08:00</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">平均人口密度</span>
        <span class="stat-value" id="stat-population">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">平均拥堵指数</span>
        <span id="stat-traffic" class="stat-badge badge-green">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">平均 PM2.5</span>
        <span id="stat-pm" class="stat-badge badge-green">—</span>
      </div>
    </div>

    <div id="timeline-container" class="glass-panel">
      <div class="timeline-header">
        <span class="timeline-title">时间轴 (小时)</span>
        <span id="current-time">08:00</span>
      </div>
      <div class="slider-wrapper">
        <input type="range" id="timeline-slider" min="0" max="23" step="1" value="8" />
      </div>
      <div class="timeline-ticks">
        <span>00</span>
        <span>04</span>
        <span>08</span>
        <span>12</span>
        <span>16</span>
        <span>20</span>
        <span>23</span>
      </div>
    </div>

    <div id="info-bubble" class="glass-panel">
      <span class="bubble-close" id="bubble-close">&times;</span>
      <h3 id="bubble-title">街区信息</h3>
      <div class="bubble-row">
        <span class="bubble-label">人口密度</span>
        <span class="bubble-value" id="bubble-population">—</span>
      </div>
      <div class="bubble-row">
        <span class="bubble-label">拥堵指数</span>
        <span class="bubble-value" id="bubble-traffic">—</span>
      </div>
      <div class="bubble-row">
        <span class="bubble-label">PM2.5</span>
        <span class="bubble-value" id="bubble-pm">—</span>
      </div>
      <div class="bubble-row">
        <span class="bubble-label">综合评级</span>
        <span class="bubble-value" id="bubble-rating">—</span>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
